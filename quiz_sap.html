는 인스턴스에 패치를 수동으로 설치합니다. 과거에는 패치 적용으로 인해 다운타임이 발생했습니다. 회사는 애플리케이션의 가용성을 높여야 합니다. 가장 짧은 개발 시간으로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["애플리케이션 계층을 기존 VPC의 AWS Lambda 함수로 이동합니다. Lambda 기능 전체에 트래픽을 분산시키기 위해 Application Load Balancer를 생성합니다. Amazon GuardDuty를 사용하여 Lambda 함수를 스캔합니다. 데이터베이스를 Amazon DocumentDB(MongoDB와 호환 가능)로 마이그레이션합니다.", "EC2 인스턴스 유형을 더 작은 Graviton 기반 인스턴스 유형으로 변경합니다. 기존 AMI를 사용하여 Auto Scaling 그룹에 대한 시작 템플릿을 생성합니다. Auto Scaling 그룹의 인스턴스 전체에 트래픽을 분산시키기 위해 Application Load Balancer를 생성합니다. CPU 사용률에 따라 조정되도록 Auto Scaling 그룹을 설정합니다. 데이터베이스를 Amazon DynamoDB로 마이그레이션합니다.", "Docker를 사용하여 애플리케이션 계층을 컨테이너로 이동합니다. EC2 인스턴스를 사용하여 Amazon Elastic Container Service(Amazon ECS)에서 컨테이너를 실행합니다. ECS 클러스터 전체에 트래픽을 분산시키기 위해 Application Load Balancer를 생성합니다. CPU 사용률에 따라 확장되도록 ECS 클러스터를 구성합니다. 데이터베이스를 Amazon Neptune으로 마이그레이션합니다.", "AWS 시스템 관리자 에이전트(SSM 에이전트)로 구성된 새 AMI를 생성합니다. 새 AMI를 사용하여 Auto Scaling 그룹에 대한 시작 템플릿을 생성합니다. Auto Scaling 그룹에서 더 작은 인스턴스를 사용합니다. Auto Scaling 그룹의 인스턴스 전체에 트래픽을 분산시키기 위해 Application Load Balancer를 생성합니다. CPU 사용률에 따라 조정되도록 Auto Scaling 그룹을 설정합니다. 데이터베이스를 Amazon Aurora MySQL로 마이그레이션합니다."], "answers": [3]}, {"q": "한 회사에서 여러 애플리케이션을 AWS로 마이그레이션할 계획입니다. 회사는 전체 애플리케이션 자산을 제대로 이해하지 못하고 있습니다. 자산은 물리적 머신과 VM의 혼합으로 구성됩니다. 회사가 마이그레이션할 한 애플리케이션에는 대기 시간에 민감한 종속성이 많이 있습니다. 회사는 모든 종속성이 무엇인지 확신하지 못합니다. 그러나 회사는 지연 시간이 짧은 통신이 포트 1000에서 실행되는 사용자 지정 IP 기반 프로토콜을 사용한다는 것을 알고 있습니다. 회사는 애플리케이션과 이러한 종속성을 함께 마이그레이션하여 지연 시간이 짧은 모든 인터페이스를 동시에 AWS로 이동하려고 합니다. 회사는 AWS Application Discovery Agent를 설치하고 몇 달 동안 데이터를 수집해 왔습니다. 애플리케이션과 동일한 단계에서 마이그레이션해야 하는 종속성을 식별하려면 회사는 무엇을 해야 합니까?", "opts": ["AWS Migration Hub를 사용하고 애플리케이션을 호스팅하는 서버를 선택하십시오. 네트워크 그래프를 시각화하여 애플리케이션과 상호 작용하는 서버를 찾으세요. Amazon Athena에서 데이터 탐색을 활성화합니다. 서버 간에 전송되는 데이터를 쿼리하여 포트 1000에서 통신하는 서버를 식별합니다. Migration Hub로 돌아갑니다. Athena 쿼리 결과를 기반으로 이동 그룹을 만듭니다.", "AWS Application Migration Service를 사용하고 애플리케이션을 호스팅하는 서버를 선택합니다. 네트워크 그래프를 시각화하여 애플리케이션과 상호 작용하는 서버를 찾으세요. 애플리케이션과 상호 작용하는 모든 서버에 대해 테스트 인스턴스를 시작하도록 Application Migration Service를 구성합니다. 테스트 인스턴스에 대한 승인 테스트를 수행합니다. 문제가 식별되지 않으면 테스트된 서버를 기반으로 이동 그룹을 만듭니다.", "AWS Migration Hub를 사용하고 애플리케이션을 호스팅하는 서버를 선택합니다. 네트워크 액세스 분석기에서 데이터 탐색을 활성화합니다. 네트워크 액세스 분석기 콘솔을 사용하여 애플리케이션을 호스팅하는 서버를 선택합니다. 포트 1000의 네트워크 액세스 범위를 선택하고 일치하는 서버를 기록해 둡니다. 마이그레이션 허브로 돌아갑니다. Network Access Analyser의 결과를 기반으로 이동 그룹을 만듭니다.", "AWS Migration Hub를 사용하고 애플리케이션을 호스팅하는 서버를 선택합니다. AWS Application Discovery Agent를 사용하여 Amazon CloudWalch 에이전트를 식별된 서버로 푸시합니다. 에이전트가 수집하는 CloudWatch 로그를 Amazon S3로 내보냅니다. Amazon Athena를 사용하여 로그를 쿼리하여 포트 1000에서 통신하는 서버를 찾습니다. Migration Hub로 돌아가기 Athena 쿼리 결과를 기반으로 이동 그룹을 생성합니다."], "answers": [0]}, {"q": "한 회사가 AWS Lambda 함수에서 실행될 애플리케이션을 구축하고 있습니다. 수백 명의 고객이 응용 프로그램을 사용합니다. 회사는 각 고객에게 특정 기간 동안 요청 할당량을 제공하려고 합니다. 할당량은 고객 사용 패턴과 일치해야 합니다. 일부 고객은 더 짧은 기간 동안 더 높은 할당량을 받아야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["프록시 통합을 통해 Amazon API Gateway REST API를 생성하여 Lambda 함수를 호출합니다. 각 고객에 대해 적절한 요청 할당량이 포함된 API Gateway 사용 계획을 구성합니다. 고객이 필요로 하는 사용자별 사용량 계획에서 API 키를 생성합니다.", "프록시 통합을 통해 Amazon API Gateway HTTP API를 생성하여 Lambda 함수를 호출합니다. 각 고객에 대해 적절한 요청 할당량이 포함된 API Gateway 사용량 계획을 구성합니다. 각 사용량 계획에 대해 경로 수준 조절을 구성합니다. 고객이 필요로 하는 사용자별 사용량 계획에서 API 키를 생성합니다.", "각 고객에 대한 Lambda 함수 별칭을 생성합니다. 적절한 요청 할당량과 함께 동시성 제한을 포함합니다. 각 함수 별칭에 대한 Lambda 함수 URL을 생성합니다. 관련 고객과 각 별칭에 대한 Lambda 함수 URL을 공유합니다.", "VPC에 ALB(Application Load Balancer)를 생성합니다. Lambda 함수를 ALB의 대상으로 구성합니다. ALB에 대한 AWS WAF 웹 ACL을 구성합니다. 각 고객에 대해 적절한 요청 할당량이 포함된 비율 기반 규칙을 구성합니다."], "answers": [0]}, {"q": "한 회사는 120개 VMS로 구성된 온프레미스 VMware 클러스터를 AWS로 마이그레이션할 계획입니다. VMS에는 다양한 운영 체제와 다양한 맞춤형 소프트웨어 패키지가 설치되어 있습니다. 이 회사에는 크기가 10TB인 온프레미스 NFS 서버도 있습니다. 회사는 마이그레이션을 위해 AWS에 대한 10GbpsAWS Direct Connect 연결을 설정했습니다. 가장 짧은 시간 내에 AWS로의 마이그레이션을 완료할 솔루션은 무엇입니까?", "opts": ["온프레미스 VMS를 내보내고 Amazon S3 버킷에 복사합니다. VM Import/Export를 사용하여 Amazon S3에 저장된 VM 이미지에서 AMIS를 생성합니다. AWS Snowball Edge 디바이스를 주문하세요. NFS 서버 데이터를 장치에 복사합니다. NFS가 구성된 Amazon EC2 인스턴스로 NFS 서버 데이터를 복원합니다.", "VMware 클러스터에 연결하여 AWS Application Migration Service를 하고 예측할 수 없는 로드를 경험합니다. 애플리케이션에는 Amazon MemoryDB for Redis 클러스터를 사용하는 캐싱 계층이 포함되어 있습니다. 솔루션 설계자는 회사의 전체 월별 비용을 최소화할 수 있는 솔루션을 권장해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["EC2 인스턴스를 보장하려면 EC2 Instance Savings Plan을 구매하세요. Lambda 함수의 최소 예상 소비량을 충당하려면 Lambda용 컴퓨팅 절감 플랜을 구매하세요. MemoryDB 캐시 노드를 포함하려면 예약 노드를 구매하세요.", "EC2 인스턴스를 포함하는 Compute Savings Plan을 구매하세요. 예상되는 Lambda 사용량을 처리하려면 Lambda 예약 동시성을 구매하세요. MemoryDB 캐시 노드를 포함하려면 예약 노드를 구매하세요.", "EC2 인스턴스, Lambda 함수 및 MemoryDB 캐시 노드의 전체 예상 비용을 충당하려면 Compute Savings Plan을 구매하세요.", "EC2 인스턴스와 MemoryDB 캐시 노드를 포함하는 Compute Savings Plan을 구매하세요. 예상되는 Lambda 사용량을 처리하려면 Lambda 예약 동시성을 구매하세요."], "answers": [0]}, {"q": "한 회사가 Amazon EC2 인스턴스에서 새로운 온라인 게임을 출시하고 있습니다. 게임은 전 세계적으로 이용 가능해야 합니다. 회사는 us-east-1, eu-west-1 및 ap-southeast-1의 3개 AWS 리전에서 게임을 실행할 계획입니다. 게임의 순위표, 플레이어 인벤토리 및 이벤트 상태는 여러 지역에서 사용할 수 있어야 합니다. 솔루션 설계자는 모든 지역의 로드를 처리할 수 있도록 확장할 수 있는 기능을 모든 지역에 제공하는 솔루션을 설계해야 합니다. 또한 사용자는 지연 시간이 가장 짧은 지역에 자동으로 연결해야 합니다. 최소한의 운영 오버헤드로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["EC2 스팟 집합을 생성합니다. 각 리전의 NLB(Network Load Balancer)에 스팟 집합을 연결합니다. NLB를 가리키는 AWS Global Accelerator IP 주소를 생성합니다. Global Accelerator IP 주소에 대한 Amazon Route 53 지연 시간 기반 라우팅 항목을 생성합니다. 각 리전의 MySQL용 Amazon RDS DB 인스턴스에 게임 메타데이터를 저장합니다. 다른 리전에 읽기 전용 복제본을 설정하세요.", "EC2 인스턴스용 Auto Scaling 그룹을 생성합니다. Auto Scaling 그룹을 각 리전의 NLB(Network Load Balancer)에 연결합니다. 각 지역에 대해 지리 근접 라우팅을 사용하고 해당 지역의 NLB를 가리키는 Amazon Route 53 항목을 생성합니다. 각 지역의 EC2 인스턴스에 있는 MySQL 데이터베이스에 게임 메타데이터를 저장합니다. 각 리전의 데이터베이스 EC2 인스턴스 간 복제를 설정합니다.", "EC2 인스턴스에 대한 Auto Scaling 그룹을 생성합니다. Auto Scaling 그룹을 각 리전의 Network Load Balancer(NLB)에 연결합니다. 각 지역에 대해 지연 시간 기반 라우팅을 사용하고 해당 지역의 NLB를 가리키는 Amazon Route 53 항목을 생성합니다. 게임 메타데이터를 Amazon DynamoDB 전역 테이블에 저장합니다.", "EC2 글로벌 뷰를 사용하세요. 각 지역에 EC2 인스턴스를 배포합니다. 인스턴스를 Network Load Balancer(NLB)에 연결합니다. 각 리전의 EC2 인스턴스에 DNS 서버를 배포합니다. 각 DNS 서버에 사용자 지정 논리를 설정하여 사용자를 가장 짧은 지연 시간을 제공하는 지역으로 리디렉션합니다. 게임 메타데이터를 Amazon Aurora 글로벌 데이터베이스에 저장합니다."], "answers": [2]}, {"q": "회사는 회사의 AWS 환경에서 나가는 트래픽을 모니터링하고 보호하기 위해 AWS Marketplace의 타사 방화벽 어플라이언스 솔루션을 배포하고 있습니다. 회사는 이 어플라이언스를 공유 서비스 VPC에 배포하고 모든 아웃바운드 인터넷 바인딩 트래픽을 어플라이언스를 통해 라우팅하려고 합니다. 솔루션 아키텍트는 안정성을 우선시하고 단일 AWS 리전 내 방화벽 어플라이언스 간의 장애 조치 시간을 최소화하는 배포 방법을 권장해야 합니다. 회사는 공유 서비스 VPC에서 다른 VPC로의 라우팅을 설정했습니다. 이러한 요구 사항을 충족하기 위해 솔루션 설계자는 어떤 단계를 권장해야 합니까? (3개 선택)", "opts": ["두 개의 방화벽 어플라이언스를 각각 별도의 가용 영역에 있는 공유 서비스 VPC에 배포합니다.", "공유 서비스 VPC에 새 Network Load Balancer를 생성합니다. 새 대상 그룹을 생성하고 이를 새 Network Load Balancer에 연결합니다. 각 방화벽 어플라이언스 인스턴스를 대상 그룹에 추가합니다.", "공유 서비스 VPC에 새 게이트웨이 로드 밸런서를 생성합니다. 새 대상 그룹을 생성하고 이를 새 게이트웨이 로드 밸런서에 연결합니다. 각 방화벽 어플라이언스 인스턴스를 대상 그룹에 추가합니다.", "VPC 인터페이스 엔드포인트를 생성합니다. 공유 서비스 VPC의 라우팅 테이블에 경로를 추가합니다. 다른 VPC에서 공유 서비스 VPC로 들어오는 트래픽에 대한 다음 홉으로 새 엔드포인트를 지정합니다.", "두 개의 방화벽 어플라이언스를 공유 서비스 VPC에 배포합니다. 각각은 동일한 가용 영역에 있습니다.", "VPC 게이트웨이 로드 밸런서 엔드포인트를 생성합니다. 공유 서비스 VPC의 라우팅 테이블에 경로를 추가합니다. 다른 VPC에서 공유 서비스 VPC로 들어오는 트래픽에 대한 다음 홉으로 새 엔드포인트를 지정합니다."], "answers": [0, 2, 5]}, {"q": "솔루션 아키텍트는 온프레미스 레거시 애플리케이션을 AWS로 마이그레이션해야 합니다. 애플리케이션은 불량 밸런서 뒤의 두 서버에서 실행됩니다. 애플리케이션에는 서버 네트워크 어댑터의 MAC 주소와 연결된 라이센스 파일이 필요합니다. 소프트웨어 공급업체가 새 라이센스 파일을 보내는 데 12시간이 걸립니다. 또한 애플리케이션은 고정 IP 주소가 포함된 구성 파일을 사용하여 데이터베이스 호스트 이름에 액세스하는 것은 지원되지 않습니다. 이러한 요구 사항을 고려할 때 AWS의 애플리케이션 서버에 대한 고가용성 아키텍처를 구현하려면 어떤 단계 조합을 취해야 합니까? (2개 선택)", "opts": ["ENI 풀을 생성합니다. 풀 공급업체에 라이선스 파일을 요청하고 Amazon S3에 라이선스 파일을 저장합니다. 부트스트랩 자동화 스크립트를 생성하여 라이선스 파일을 다운로드하고 해당 ENI를 Amazon EC2 인스턴스에 연결합니다.", "ENI 풀을 생성합니다. 풀 공급업체에 라이선스 파일을 요청하고 Amazon EC2 인스턴스에 라이선스 파일을 저장합니다. 인스턴스에서 AMI를 생성하고 향후 모든 EC2에 이 AMI를 사용합니다.", "공급업체에 새 라이센스 파일을 요청하는 부트스트랩 자동화 스크립트를 만듭니다. 응답을 받으면 라이선스 파일을 Amazon EC2 인스턴스에 적용합니다.", "부트스트랩 자동화 스크립트를 편집하여 AWS 시스템 관리자 매개 변수 저장소에서 데이터베이스 서버 IP 주소를 읽습니다. 로컬 구성 파일에 값을 삽입합니다.", "구성 파일에 데이터베이스 서버 IP 주소를 포함하도록 Amazon EC2 인스턴스를 편집하고 향후 모든 EC2 인스턴스에 사용할 AMI를 다시 생성합니다."], "answers": [0, 3]}, {"q": "회사는 미국의 AWS 리전에서 판매 보고 애플리케이션을 실행합니다. 이 애플리케이션은 Amazon API Gateway 지역 API 및 AWS Lambda 함수를 사용하여 Amazon RDS for MySQL 데이터베이스의 데이터에서 온디맨드 보고서를 생성합니다. 애플리케이션의 프런트엔드는 Amazon S3에서 호스팅되며 Amazon CloudFront 배포를 통해 사용자가 액세스합니다. 이 회사는 Amazon Route 53을 도메인의 DNS 서비스로 사용하고 있습니다. Route 53은 트래픽을 API Gateway API로 라우팅하는 간단한 라우팅 정책으로 구성됩니다. 향후 6개월 내에 회사는 유럽으로 사업을 확장할 계획입니다. 데이터베이스 트래픽의 90% 이상이 읽기 전용 트래픽입니다. 회사는 이미 새 리전에 API Gateway API 및 Lambda 함수를 배포했습니다. 솔루션 설계자는 보고서를 다운로드하는 사용자의 대기 시간을 최소화하는 솔루션을 설계해야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["전체 로드와 함께 AWS Database Migration Service(AWS DMS) 작업을 사용하여 원래 리전의 기본 데이터베이스를 새 리전의 데이터베이스로 복제합니다. Route 53 레코드를 지연 시간 기반 라우팅으로 변경하여 API Gateway API에 연결합니다.", "전체 로드와 변경 데이터 캡처(CDC)가 포함된 AWS Database Migration Service(AWS DMS) 작업을 사용하여 원래 리전의 기본 데이터베이스를 새 리전의 데이터베이스로 복제합니다. Route 53 레코드를 지리적 위치 라우팅으로 변경하여 API Gateway API에 연결합니다.", "새 리전의 RDS 데이터베이스에 대한 리전 간 읽기 전용 복제본을 구성합니다. Route 53 레코드를 지연 시간 기반 라우팅으로 변경하여 API Gateway API에 연결합니다.", "새 리전의 RDS 데이터베이스에 대한 리전 간 읽기 전용 복제본을 구성합니다. Route 53 레코드를 지리적 위치 라우팅으로 변경하여 API에 연결합니다."], "answers": [2]}, {"q": "소프트웨어 회사는 개발 프로세스의 일부로 풀 요청을 테스트하기 위해 단기 테스트 환경을 만들어야 합니다. 각 테스트 환경은 Auto Scaling 그룹에 있는 단일 Amazon EC2 인스턴스로 구성됩니다. 테스트 환경은 테스트 결과를 보고하기 위해 중앙 서버와 통신할 수 있어야 합니다. 중앙 서버는 온프레미스 데이터 센터에 있습니다. 솔루션 아키텍트는 회사가 수동 개입 없이 테스트 환경을 생성하고 삭제할 수 있도록 솔루션을 구현해야 합니다. 회사는 온프레미스 네트워크에 대한 VPN 연결을 사용하여 전송 게이트웨이를 만들었습니다. 최소한의 운영 오버헤드로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["전송 게이트웨이 연결 및 관련 라우팅 구성이 포함된 AWS CloudFormation 템플릿을 생성합니다. 이 템플릿을 포함하는 CloudFormation 스택 세트를 생성합니다. CloudFormation StackSets를 사용하여 계정의 각 VPC에 대해 새 스택을 배포합니다. 각 테스트 환경에 대해 새 VPC를 배포합니다.", "테스트 환경을 위한 단일 VPC를 생성합니다. 운송 게이트웨이(Transit Gateway) 연결 및 관련 라우팅 구성을 포함합니다. AWS CloudFormation을 사용하여 모든 테스트 환경을 VPC에 배포합니다.", "테스트를 위해 AWS Organizations에 새 OU를 생성합니다. VPC, 필요한 네트워킹 리소스, 전송 게이트웨이 연결 및 관련 라우팅 구성이 포함된 AWS CloudFormation 템플릿을 생성합니다. 이 템플릿을 포함하는 CloudFormation 스택 세트를 생성합니다. 테스트 01.1에서 각 계정에 배포하려면 CloudFormation StackSets를 사용하세요. 각 테스트 환경에 대해 새 계정을 만듭니다.", "테스트 환경 EC2 인스턴스를 Docker 이미지로 변환합니다. AWS CloudFormation을 사용하여 새 VPC에서 Amazon Elastic Kubernetes Service(Amazon EKS) 클러스터를 구성하고, 전송 게이트웨이 연결을 생성하고, 관련 라우팅 구성을 생성합니다. Kubernetes를 사용하여 테스트 환경의 배포 및 수명 주기를 관리하세요."], "answers": [1]}, {"q": "한 회사가 AWS에 새로운 API를 배포하고 있습니다. API는 호스팅을 위해 지역 API 엔드포인트 및 AWS Lambda 함수와 함께 Amazon API Gateway를 사용합니다. API는 외부 공급업체 API에서 데이터를 검색하고, Amazon DynamoDB 글로벌 테이블에 데이터를 저장하고, DynamoDB 글로벌 테이블에서 데이터를 검색합니다. 공급업체 API의 API 키는 AWS Secrets Manager에 저장되고 AWS에서 고객 관리형 키로 암호화됩니다. 키 관리 서비스(AWS KMS). 회사는 단일 AWS 리전에 자체 API를 배포했습니다. 솔루션 아키텍트는 회사 API의 API 구성 요소를 변경하여 구성 요소가 활성-활성 구성으로 여러 지역에서 실행될 수 있도록 해야 합니다. 최소한의 운영 오버헤드로 이 요구 사항을 충족하는 변경 사항 조합은 무엇입니까? (3개 선택)", "opts": ["API를 여러 지역에 배포합니다. 각 지역 API 엔드포인트로 트래픽을 라우팅하는 사용자 지정 도메인 이름으로 Amazon Route 53을 구성합니다. Route 53 다중 응답 라우팅 정책을 구현합니다.", "새로운 KMS 다중 지역 고객 관리형 키를 생성합니다. 각 범위 내 리전에서 새 KMS 고객 관리형 복제본 키를 생성합니다.", "기존 Secrets Manager 비밀을 다른 리전에 복제합니다. 각 범위 내 리전의 복제된 암호에 대해 적절한 KMS 키를 선택합니다.", "각 범위 내 지역에서 새로운 AWS 관리형 KMS 키를 생성합니다. 기존 키를 multiRegion 키로 변환합니다. 다른 리전에서는 다중 리전 키를 사용하세요.", "각 범위 내 지역에서 새로운 Secrets Manager 비밀을 생성합니다. 기존 리전의 비밀 값을 각 범위 내 리전의 새 비밀로 복사합니다.", "범위 내 지역 전체에 걸쳐 배포를 반복하도록 Lambda 함수의 배포 프로세스를 수정합니다. 기존 API에 대해 다중 리전 옵션을 활성화합니다. 다중 지역 API의 백엔드로 각 지역에 배포되는 Lambda 함수를 선택합니다."], "answers": [0, 1, 2]}, {"q": "온라인 소매 회사는 단일 서버의 온프레미스 데이터 센터에서 상태 저장 웹 기반 애플리케이션과 MySQL 데이터베이스를 호스팅합니다. 회사는 더 많은 마케팅 캠페인과 프로모션을 실시하여 고객 기반을 확대하려고 합니다. 준비 과정에서 회사는 아키텍처의 안정성을 높이기 위해 애플리케이션과 데이터베이스를 AWS로 마이그레이션하려고 합니다. 가장 높은 수준의 안정성을 제공해야 하는 솔루션은 무엇입니까?", "opts": ["데이터베이스를 Amazon RDS MySQL 다중 AZ DB 인스턴스로 마이그레이션합니다. Application Load Balancer 뒤에 있는 Amazon EC2 인스턴스의 Auto Scaling 그룹에 애플리케이션을 배포합니다. Amazon Neptune에 세션을 저장합니다.", "데이터베이스를 Amazon Aurora MySQL로 마이그레이션합니다. Application Load Balancer 뒤에 있는 Amazon EC2 인스턴스의 Auto Scaling 그룹에 애플리케이션을 배포합니다. Redis용 Amazon ElastiCache 복제 그룹에 세션을 저장합니다.", "데이터베이스를 Amazon DocumentDB(MongoDB와 호환)로 마이그레이션합니다. Network Load Balancer 뒤에 있는 Amazon EC2 인스턴스의 Auto Scaling 그룹에 애플리케이션을 배포합니다. Amazon Kinesis Data Firehose에 세션을 저장합니다.", "데이터베이스를 Amazon RDS MariaDB 다중 AZ DB 인스턴스로 마이그레이션합니다. Application Load Balancer 뒤에 있는 Amazon EC2 인스턴스의 Auto Scaling 그룹에 애플리케이션을 배포합니다. Memcached용 Amazon ElastiCache에 세션을 저장합니다."], "answers": [1]}, {"q": "회사의 솔루션 아키텍트는 VPC에서 호스팅되는 Amazon EC2 Windows 인스턴스의 사용자에게 안전한 원격 데스크톱 연결을 제공해야 합니다. 솔루션은 중앙 집중식 사용자 관리를 회사의 온프레미스 Active Directory와 통합해야 합니다. VPC에 대한 연결은 인터넷을 통해 이루어집니다. 회사에는 AWS Site-to-Site VPN 연결을 설정하는 데 사용할 수 있는 하드웨어가 있습니다. 이러한 요구 사항을 가장 비용 효율적으로 충족하는 솔루션은 무엇입니까?", "opts": ["Microsoft Active Directory용 AWS Directory Service를 사용하여 관리형 Active Directory를 배포합니다. 온프레미스 Active Directory와의 신뢰를 설정합니다. EC2 인스턴스를 VPC의 배스천 호스트로 배포합니다. EC2 인스턴스가 도메인에 가입되어 있는지 확인하세요. 배스천 호스트를 사용하여 RDP를 통해 대상 인스턴스에 액세스합니다.", "Microsoft Active Directory AD Connector용 AWS 디렉터리 서비스를 사용하여 온프레미스 Active Directory와 통합하도록 AWS IAM Identity Center(AWS Single Sign-On)를 구성합니다. AWS 시스템 관리자에 액세스하기 위해 사용자 그룹에 대한 권한 세트를 구성합니다. RDP를 통해 대상 인스턴스에 액세스하려면 Systems Manager Fleet Manager를 사용하십시오.", "온프레미스 환경과 대상 VPC 간에 VPN을 구현합니다. 대상 인스턴스가 VPN 연결을 통해 온프레미스 Active Directory 도메인에 조인되었는지 확인하세요. VPN을 통해 RDP 접근을 구성합니다. 회사 네트워크에서 대상 인스턴스로 연결합니다.", "Microsoft Active Directory용 AWS Directory Service를 사용하여 관리형 Active Directory를 배포합니다. 온프레미스 Active Directory와 S신뢰를 설정합니다. AWS Quick Start를 사용하여 AWS에 원격 데스크톱 게이트웨이를 배포합니다. 원격 데스크톱 게이트웨이가 도메인에 가입되어 있는지 확인하세요. 원격 데스크톱 게이트웨이를 사용하여 RDP를 통해 대상 인스턴스에 액세스합니다."], "answers": [2]}, {"q": "한 회사의 규정 준수 감사 결과 AWS 계정에서 생성된 일부 Amazon Elastic Block Store(Amazon EBS) 볼륨이 암호화되지 않은 것으로 나타났습니다. 솔루션 설계자는 저장 중인 모든 새로운 EBS 볼륨을 암호화하는 솔루션을 구현해야 합니다. 최소한의 노력으로 이 요구 사항을 충족할 수 있는 솔루션은 무엇입니까?", "opts": ["암호화되지 않은 EBS 볼륨 생성을 감지하는 Amazon EventBridge 규칙을 생성합니다. AWS Lambda 함수를 호출하여 비준수 볼륨을 삭제합니다.", "데이터 암호화와 함께 AWS Audit Manager를 사용하십시오.", "새로운 EBS 볼륨 생성을 감지하는 AWS Config 규칙을 생성합니다. AWS 시스템 관리자 자동화를 사용하여 볼륨을 암호화합니다.", "모든 AWS 리전에서 기본적으로 EBS 암호화를 활성화합니다."], "answers": [3]}, {"q": "한 연구 회사는 높은 수요를 충족하기 위해 AWS 클라우드에서 매일 시뮬레이션을 실행하고 있습니다. 시뮬레이션은 Amazon Linux 2를 기반으로 하는 수백 개의 Amazon EC2 인스턴스에서 실행됩니다. 때때로 시뮬레이션이 중단되고 클라우드 운영 엔지니어가 SSH를 통해 EC2 인스턴스에 연결하여 문제를 해결해야 합니다. 회사 정책에 따르면 EC2 인스턴스는 동일한 SSH 키를 사용할 수 없으며 모든 연결은 AWS CloudTrail에 기록되어야 합니다. 솔루션 설계자는 이러한 요구 사항을 어떻게 충족할 수 있습니까?", "opts": ["새로운 EC2 인스턴스를 시작하고 각 인스턴스에 대해 개별 SSH 키를 생성하십시오. AWS Secrets Manager에 SSH 키를 저장합니다. 새 IAM 정책을 생성하고 GetSecretValue 작업에 대한 Allow 문을 사용하여 이를 엔지니어의 IAM 역할에 연결합니다. SSH 클라이언트를 통해 연결할 때 Secrets Manager에서 SSH 키를 가져오도록 엔지니어에게 지시합니다.", "EC2 인스턴스에서 명령을 실행하여 새로운 고유 SSH 키를 설정하는 AWS 시스템 관리자 문서를 생성합니다. 새 IAM 정책을 생성하고 이를 엔지니어의 IAM 역할에 연결하여 시스템 관리자 문서를 실행하도록 허용합니다. 엔지니어에게 문서를 실행하여 SSH 키를 설정하고 SSH 클라이언트를 통해 연결하도록 지시하십시오.", "인스턴스에 대한 SSH 키를 설정하지 않고 새 EC2 인스턴스를 시작합니다. 각 인스턴스에 EC2 Instance Connect를 설정합니다. 새 IAM 정책을 생성하고 SendSSHPublicKey 작업에 대한 Allow 문을 사용하여 이를 엔지니어의 IAM 역할에 연결합니다. EC2 콘솔에서 브라우저 기반 SSH 클라이언트를 사용하여 인스턴스에 연결하도록 엔지니어에게 지시합니다.", "EC2 SSH 키를 저장하도록 AWS Secrets Manager를 설정합니다. 새 AWS Lambda 함수를 생성하여 새 SSH 키를 생성하고 AWS Systems Manager Session Manager를 호출하여 EC2 인스턴스에 SSH 키를 설정합니다. 매일 한 번씩 자동 교체를 위해 Lambda 함수를 사용하도록 Secrets Manager를 구성합니다. SSH 클라이언트를 통해 연결할 때 Secrets Manager에서 SSH 키를 가져오도록 엔지니어에게 지시합니다."], "answers": [2]}, {"q": "한 회사가 VPC의 Amazon EC2 인스턴스에서 실행되도록 모바일 뱅킹 애플리케이션을 마이그레이션하고 있습니다. 백엔드 서비스 애플리케이션은 온프레미스 데이터 센터에서 실행됩니다. 데이터 센터에는 AWS에 대한 AWS Direct Connect 연결이 있습니다. VPC에서 실행되는 애플리케이션은 데이터 센터에서 실행되는 온프레미스 Active Directory 도메인에 대한 DNS 요청을 확인해야 합니다. 최소한의 관리 오버헤드로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["VPC 내 애플리케이션 서버의 DNS 쿼리를 해결하기 위해 캐싱 DNS 서버로 VPC의 두 가용 영역에 걸쳐 EC2 인스턴스 세트를 프로비저닝합니다.", "Amazon Route 53 프라이빗 호스팅 영역을 프로비저닝합니다. 온프레미스 DNS 서버를 가리키는 NS 레코드를 구성합니다.", "Amazon Route 53 Resolver를 사용하여 DNS 엔드포인트를 생성합니다. 조건부 전달 규칙을 추가하여 온프레미스 데이터 센터와 VPC 간의 DNS 네임스페이스를 확인합니다.", "이 새 도메인과 온프레미스 Active Directory 도메인 간의 양방향 신뢰를 통해 VPC에 새 Active Directory 도메인 컨트롤러를 프로비저닝합니다."], "answers": [2]}, {"q": "회사에서 환경 데이터를 처리합니다. 이 회사는 도시의 다양한 영역에서 지속적인 데이터 스트림을 제공하기 위해 센서를 설치했습니다. 데이터는 JSON 형식으로 제공됩니다. 회사는 AWS 솔루션을 사용하여 저장을 위해 고정된 스키마가 필요하지 않은 데이터베이스에 데이터를 전송하려고 합니다. 데이터는 실시간으로 전송되어야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["Amazon Kinesis Data Firehose를 사용하여 Amazon Redshift로 데이터를 보냅니다.", "Amazon Kinesis Data Streams를 사용하여 Amazon DynamoDB로 데이터를 보냅니다.", "Amazon Managed Streaming for Apache Kafka(Amazon MSK)를 사용하여 데이터를 Amazon Aurora로 보냅니다.", "Amazon Kinesis Data Firehose를 사용하여 Amazon Keyspaces(Apache Cassandra용)로 데이터를 보냅니다."], "answers": [1]}, {"q": "회사는 온프레미스 데이터 센터의 레거시 애플리케이션을 AWS로 마이그레이션하고 있습니다. 애플리케이션은 MongoDB를 키-값 데이터베이스로 사용합니다. 회사의 기술 지침에 따라 모든 Amazon EC2 인스턴스는 인터넷 연결 없이 프라이빗 서브넷에서 호스팅되어야 합니다. 또한 애플리케이션과 데이터베이스 간의 모든 연결은 암호화되어야 합니다. 데이터베이스는 수요에 따라 확장할 수 있어야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["프로비저닝된 IOPS 볼륨이 있는 애플리케이션을 위한 새로운 Amazon DocumentDB(MongoDB 호환) 테이블을 생성합니다. 인스턴스 엔드포인트를 사용하여 Amazon DocumentDB에 연결합니다.", "온디맨드 용량을 갖춘 애플리케이션을 위한 새로운 Amazon DynamoDB 테이블을 생성합니다. DynamoDB용 게이트웨이 VPC 엔드포인트를 사용하여 DynamoDB 테이블에 연결합니다.", "온디맨드 용량을 갖춘 애플리케이션을 위한 새로운 Amazon DynamoDB 테이블을 생성합니다. DynamoDB용 인터페이스 VPC 엔드포인트를 사용하여 DynamoDB 테이블에 연결합니다.", "프로비저닝된 IOPS 볼륨이 있는 애플리케이션을 위한 새로운 Amazon DocumentDB(MongoDB 호환) 테이블을 생성합니다. 클러스터 엔드포인트를 사용하여 Amazon DocumentDB에 연결합니다."], "answers": [1]}, {"q": "회사는 AWS 클라우드의 Amazon EC2 인스턴스에서 애플리케이션을 실행하고 있습니다. 애플리케이션은 데이터 계층으로 설정된 복제본과 함께 MongoDB 데이터베이스를 사용하고 있습니다. MongoDB 데이터베이스는 회사 온프레미스 데이터 센터의 시스템에 설치되며 데이터 센터 환경에 대한 AWS Direct Connect 연결을 통해 액세스할 수 있습니다. 솔루션 설계자는 온프레미스 MongoDB 데이터베이스를 Amazon DocumentDB(MongoDB와 호환)로 마이그레이션해야 합니다. 솔루션 설계자는 이 마이그레이션을 수행하기 위해 어떤 전략을 선택해야 합니까?", "opts": ["EC2 인스턴스 플릿을 생성합니다. EC2 인스턴스에 MongoDB Community Edition을 설치하고 데이터베이스를 생성합니다. 온프레미스 데이터 센터에서 실행 중인 데이터베이스로 지속적인 동기식 복제를 구성합니다.", "AWS Database Migration Service(AWS DMS) 복제 인스턴스를 생성합니다. CDC(변경 데이터 캡처)를 사용하여 온프레미스 MongoDB 데이터베이스에 대한 소스 엔드포인트를 생성합니다. Amazon DocumentDB 데이터베이스에 대한 대상 엔드포인트를 생성합니다. DMS 마이그레이션 작업을 만들고 실행합니다.", "AWS Data Pipeline을 사용하여 데이터 마이그레이션 파이프라인을 생성합니다. 온프레미스 MongoDB 데이터베이스 및 Amazon DocumentDB 데이터베이스에 대한 데이터 노드를 정의합니다. 데이터 파이프라인을 실행할 예약된 작업을 만듭니다.", "AWS Glue 크롤러를 사용하여 온프레미스 MongoDB 데이터베이스의 소스 엔드포인트를 생성합니다. MongoDB 데이터베이스와 Amazon DocumentDB 데이터베이스 간에 지속적 비동기 복제를 구성합니다."], "answers": [1]}, {"q": "한 회사가 AWS에서 실행되도록 애플리케이션을 재설계하고 있습니다. 이 회사의 인프라에는 여러 Amazon EC2 인스턴스가 포함되어 있습니다. 회사의 개발  EC2 인스턴스에서 비즈니스 로직을 실행합니다. Amazon Aurora Serverless에 플레이어 세션 데이터를 저장합니다.", "ALB(Application Load Balancer)를 사용하여 REST API를 구현합니다. AWS Lambda에서 비즈니스 로직을 실행합니다. 온디맨드 용량으로 Amazon DynamoDB에 플레이어 세션 데이터를 저장합니다.", "Amazon API Gateway를 사용하여 REST API를 구현합니다. AWS Lambda에서 비즈니스 로직을 실행합니다. 온디맨드 용량으로 Amazon DynamoDB에 플레이어 세션 데이터를 저장합니다.", "AWS AppSync를 사용하여 REST API를 구현합니다. AWS Lambda에서 비즈니스 로직을 실행합니다. Amazon Aurora Serverless에 플레이어 세션 데이터를 저장합니다."], "answers": [2]}, {"q": "한 회사가 애플리케이션을 AWS 클라우드로 마이그레이션하고 있습니다. 애플리케이션은 온프레미스 데이터 센터에서 실행되며 매일 밤 마운트된 NFS 파일 시스템에 수천 개의 이미지를 씁니다. 회사는 애플리케이션을 마이그레이션한 후 Amazon Elastic File System(Amazon EFS) 파일 시스템이 탑재된 Amazon EC2 인스턴스에서 애플리케이션을 호스팅합니다. 회사는 AWS에 대한 AWS Direct Connect 연결을 설정했습니다. 마이그레이션 중단 전에 솔루션 설계자는 새로 생성된 온프레미스 이미지를 EFS 파일 시스템에 복제하는 프로세스를 구축해야 합니다. 이미지를 복제하는 가장 운영상 효율적인 방법은 무엇입니까?", "opts": ["온프레미스 파일 시스템에서 Amazon S3로 aws s3 sync 명령을 실행하도록 정기적인 프로세스를 구성합니다. Amazon S3의 이벤트 알림을 처리하고 Amazon S3의 이미지를 EFS 파일 시스템으로 복사하도록 AWS Lambda 함수를 구성합니다.", "NFS 마운트 지점을 사용하여 AWS Storage Gateway 파일 게이트웨이를 배포합니다. 온프레미스 서버에 파일 게이트웨이 파일 시스템을 탑재합니다. 이미지를 마운트 지점에 주기적으로 복사하는 프로세스를 구성합니다.", "NFS 파일 시스템에 액세스할 수 있는 온프레미스 서버에 AWS DataSync 에이전트를 배포합니다. 퍼블릭 VIF를 사용하여 Direct Connect 연결을 통해 S3 버킷으로 데이터를 보냅니다. Amazon S3의 이벤트 알림을 처리하고 Amazon S3의 이미지를 EFS 파일 시스템으로 복사하도록 AWS Lambda 함수를 구성합니다.", "NFS 파일 시스템에 액세스할 수 있는 온프레미스 서버에 AWS DataSync 에이전트를 배포합니다. 프라이빗 VIF를 사용하여 Direct Connect 연결을 통해 Amazon EFS용 AWS PrivateLink 인터페이스 VPC 엔드포인트로 데이터를 보냅니다. 24시간마다 EFS 파일 시스템에 이미지를 보내도록 DataSync 예약 작업을 구성합니다."], "answers": [3]}, {"q": "한 회사는 최근 온프레미스 데이터 센터에서 AWS 클라우드로의 웹 애플리케이션을 원했습니다. 웹 애플리케이션 인프라는 요청을 처리하기 위해 Amazon Elastic Container Service(Amazon ECS)를 사용하여 ALB(Application Load Balancer)로 라우팅하는 Amazon CloudFront 배포로 구성됩니다. 최근 보안 감사에서는 CloudFront와 ALB 엔드포인트를 모두 사용하여 웹 애플리케이션에 액세스할 수 있는 것으로 나타났습니다. 하지만. 회사에서는 CloudFront 엔드포인트를 통해서만 웹 애플리케이션에 액세스할 수 있도록 요구합니다. 최소한의 노력으로 이 요구 사항을 충족할 수 있는 솔루션은 무엇입니까?", "opts": ["새 보안 그룹을 생성하여 CloudFront 배포에 연결합니다. CloudFront 보안 그룹에서만 접근을 허용하도록 ALB 보안 그룹 수신을 업데이트합니다.", "CloudFront 관리형 접두사 목록에서만 접근을 허용하도록 ALB 보안 그룹 수신을 업데이트합니다.", "Elastic Load Balancing을 위한 VPC 인터페이스 엔드포인트를 생성합니다. ALB 체계를 인터넷 연결에서 내부로 업데이트합니다.", "AWS가 제공한 ip-ranges.json 문서에서 CloudFront IPS를 추출합니다. CloudFront IP에서만 접근을 허용하도록 ALB 보안 그룹 수신을 업데이트합니다."], "answers": [1]}, {"q": "회사는 ALB(Application Load Balancer)와 Amazon ECS 클러스터에서 호스팅되는 Docker 애플리케이션을 사용하여 커뮤니티 포럼 사이트를 호스팅합니다. 사이트 데이터는 MySQL용 Amazon RDS에 저장되고 컨테이너 이미지는 ECR에 저장됩니다. 회사는 RTO가 24시간 이하, RPO가 8시간 이하인 재해 복구 SLA를 고객에게 제공해야 합니다. 다음 솔루션 중 요구 사항을 충족하는 가장 비용 효율적인 방법은 무엇입니까?", "opts": ["AWS CloudFormation을 사용하여 두 지역에 동일한 ALB, EC2, ECS 및 RDS 리소스를 배포하십시오. 8시간마다 RDS 스냅샷을 예약합니다. RDS 다중 지역 복제를 사용하여 보조 지역의 데이터베이스 복사본을 업데이트합니다. 오류가 발생하면 최신 스냅샷에서 복원하고 Amazon Route 53 DNS 장애 조치 정책을 사용하여 자동으로 고객을 보조 지역의 ALB로 리디렉션합니다.", "두 지역의 ECR에 Docker 이미지를 저장합니다. 스냅샷을 보조 지역에 복사하여 8시간마다 RDS 스냅샷을 예약합니다. 오류가 발생하는 경우 AWS CloudFormation을 사용하여 보조 지역에 ALB, EC2, ECS 및 RDS 리소스를 배포하고, 최신 스냅샷에서 복원하고, 보조 지역의 ALB를 가리키도록 DNS 레코드를 업데이트합니다.", "AWS CloudFormation을 사용하여 보조 지역에 동일한 ALB, EC2, ECS 및 RDS 리소스를 배포합니다. Amazon S3에 대한 시간별 RDS MySQL 백업을 예약하고 지역 간 복제를 사용하여 보조 지역의 버킷에 데이터를 복제합니다. 오류가 발생하면 최신 Docker 이미지를 보조 지역의 Amazon ECR로 가져오고, EC2 인스턴스에 배포하고, 최신 MySQL 백업을 복원하고, 보조 지역의 ALB를 가리키도록 DNS 레코드를 업데이트하세요.", "인스턴스 크기와 노드 수를 늘리기 위한 조정 정책을 사용하여 AWS Auto Scaling 그룹의 Docker용 ALB 및 최소 리소스 EC2 배포를 사용하여 보조 지역에 파일럿 라이트 환경을 배포합니다. RDS 데이터의 리전 간 읽기 복제본을 생성합니다. 오류가 발생하는 경우 복제본을 기본으로 승격하고 보조 지역의 ALB를 가리키도록 DNS 레코드를 업데이트합니다."], "answers": [1]}, {"q": "한 회사가 인프라를 AWS 클라우드로 마이그레이션하고 있습니다. 회사는 다양한 프로젝트에 대한 다양한 규제 표준을 준수해야 합니다. 회사에는 다중 계정 환경이 필요합니다. 솔루션 아키텍트는 기본 인프라를 준비해야 합니다. 솔루션은 일관된 관리 및 보안 기준을 제공해야 하지만 다양한 AWS 계정 내의 다양한 규정 준수 요구 사항에 대한 유연성을 허용해야 합니다. 또한 솔루션은 기존 온프레미스 AD FS(Active Directory Federation Services) 서버와 통합되어야 합니다. 최소한의 운영 오버헤드로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["AWS Organizations에서 조직을 생성합니다. 모든 계정에 대한 최소 권한 접근을 위해 단일 SCP를 만듭니다. 모든 계정에 대해 단일 OU를 만듭니다. 온프레미스 AD FS 서버와의 연동을 위해 IAM ID 공급자를 구성합니다. 로그 이벤트를 중앙 계정으로 보내려면 로그 생성 서비스에 대해 정의된 프로세스로 중앙 로깅 계정을 구성합니다. 모든 계정에 대한 적합성 팩을 사용하여 중앙 계정에서 AWS Config를 활성화합니다.", "AWS Organizations에서 조직을 생성합니다. 조직에서 AWS Control Tower를 활성화합니다. SCP에 포함된 제어(가드레일)를 검토합니다. 추가가 필요한 영역은 AWS Config를 확인하세요. 필요에 따라 OUS를 추가합니다. AWS IAM Identity Center(AWS Single Sign-On)를 온프레미스 AD FS 서버에 연결합니다.", "AWS Organizations에서 조직을 생성합니다. 최소 권한 접근을 위해 SCP를 생성합니다. OU 구조를 생성하고 이를 사용하여 AWS 계정을 그룹화합니다. AWS IAM Identity Center(AWS Single Sign-On)를 온프레미스 AD FS 서버에 연결합니다. 로그 이벤트를 중앙 계정으로 보내려면 로그 생성 서비스에 대해 정의된 프로세스로 중앙 로깅 계정을 구성합니다. 집계자 및 적합성 팩을 사용하여 중앙 계정에서 AWS Config를 활성화합니다.", "AWS Organizations에서 조직을 생성합니다. 조직에서 AWS Control Tower를 활성화합니다. SCP에 포함된 제어(가드레일)를 검토합니다. 추가가 필요한 영역은 AWS Config를 확인하세요. 온프레미스 AD FS 서버와의 연동을 위해 IAM ID 공급자를 구성합니다."], "answers": [1]}, {"q": "온라인 잡지가 이번 달 최신판을 출시할 예정입니다. 이 버전은 전 세계적으로 최초로 배포될 예정입니다. 이 잡지의 동적 웹 사이트는 현재 웹 계층 앞에 Application Load Balancer, 웹 및 애플리케이션 서버용 Amazon EC2 인스턴스 집합, Amazon Aurora MySQL을 사용하고 있습니다. 웹사이트의 일부에는 정적 콘텐츠가 포함되어 있으며 거의 모든 트래픽은 읽기 전용입니다. 이 잡지는 새 판이 출시되면 인터넷 트래픽이 크게 급증할 것으로 예상하고 있습니다. 출시 다음 주에는 최적의 성능이 최우선 과제입니다. 전 세계 사용자의 시스템 응답 시간을 줄이기 위해 솔루션 아키텍트가 수행해야 하는 단계 조합은 무엇입니까? (2개 선택)", "opts": ["논리적 교차 리전 복제를 사용하여 Aurora MySQL 데이터베이스를 보조 리전에 복제하십시오. 웹 서버를 Amazon S3로 교체합니다. 리전 간 복제 모드로 S3 버킷을 배포합니다.", "웹 및 애플리케이션 계층이 각각 Auto Scaling 그룹에 있는지 확인합니다. AWS Direct Connect 연결을 도입합니다. 전 세계 지역에 웹 및 애플리케이션 계층을 배포합니다.", "Amazon Aurora에서 MySQL용 Amazon RDS로 데이터베이스를 마이그레이션합니다. 세 가지 애플리케이션 계층 \"웹, 애플리케이션 및 데이터베이스\"가 모두 프라이빗 서브넷에 있는지 확인하세요.", "물리적 교차 리전 복제를 위해 Aurora 글로벌 데이터베이스를 사용하십시오. 정적 콘텐츠 및 리소스에 대해 리전 간 복제와 함께 Amazon S3를 사용하십시오. 전 세계 지역에 웹 및 애플리케이션 계층을 배포합니다.", "지연 시간 기반 라우팅 및 Amazon CloudFront 배포 기능을 갖춘 Amazon Route 53을 소개합니다. 웹 및 애플리케이션 계층이 각각 Auto Scaling 그룹에 있는지 확인합니다."], "answers": [3, 4]}, {"q": "온라인 게임 회사는 AWS에서 워크로드 비용을 최적화해야 합니다. 회사는 전용 계정을 사용하여 온라인 게임 애플리케이션과 분석 애플리케이션을 위한 프로덕션 환경을 호스팅합니다. Amazon EC2 인스턴스는 게임 애플리케이션을 호스팅하며 항상 사용 가능해야 합니다. EC2 인스턴스는 일년 내내 실행됩니다. 분석 애플리케이션은 Amazon S3에 저장된 데이터를 사용합니다. 분석 애플리케이션은 문제 없이 중단되었다가 재개될 수 있습니다. 이러한 요구 사항을 가장 비용 효율적으로 충족하는 솔루션은 무엇입니까?", "opts": ["온라인 게임 애플리케이션 인스턴스에 대한 EC2 Instance Savings Plan을 구매하십시오. 분석 애플리케이션에 온디맨드 인스턴스를 사용합니다.", "온라인 게임 애플리케이션 인스턴스에 대한 EC2 인스턴스 Savings Plan을 구매합니다. 분석 애플리케이션에 스팟 인스턴스를 사용합니다.", "온라인 게임 애플리케이션 및 분석 애플리케이션에 스팟 인스턴스를 사용합니다. 할인된 가격으로 서비스를 프로비저닝하려면 AWS Service Catalog에 카탈로그를 설정하세요.", "온라인 게임 애플리케이션에 온디맨드 인스턴스를 사용합니다. 분석 애플리케이션에 스팟 인스턴스를 사용합니다. 할인된 가격으로 서비스를 프로비저닝하려면 AWS Service Catalog에 카탈로그를 설정하세요."], "answers": [1]}, {"q": "회사는 수백 개의 프로덕션 AWS 계정에서 애플리케이션을 실행합니다. 회사는 모든 기능이 활성화된 AWS Organizations를 사용하며 AWS Backup을 사용하는 중앙 집중식 백업 작업을 수행합니다. 회사는 랜섬웨어 공격을 우려하고 있습니다. 이러한 문제를 해결하기 위해 회사는 모든 백업이 모든 프로덕션 계정의 권한 있는 사용자 자격 증명 위반에 대해 복원력을 가져야 한다는 새로운 정책을 만들었습니다. 이 새로운 요구 사항을 충족하는 단계 조합은 무엇입니까? (3개 선택)", "opts": ["지정된 비프로덕션 계정에서 AWS Backup 볼트를 사용하여 교차 계정 백업을 구현합니다.", "AWS Backup 볼트 수정을 제한하는 SCP를 추가합니다.", "규정 준수 모드에서 AWS Backup Vault Lock을 구현합니다.", "콜드 계층에 항상 하나 이상의 백업이 존재하도록 백업 빈도, 수명 주기 및 보존 기간을 구성합니다.", "지정된 비프로덕션 계정의 Amazon S3 버킷에 모든 백업을 기록하도록 AWS Backup을 구성합니다. S3 버킷에 S3 객체 잠금이 활성화되어 있는지 확인하세요.", "AWS Backup에 할당된 IAM 서비스 역할에 대한 최소 권한 접근을 구현합니다."], "answers": [0, 1, 2]}, {"q": "회사는 AWS 계정의 Amazon CloudWatch 로그를 하나의 중앙 로깅 계정으로 집계해야 합니다. 수집된 로그는 생성된 AWS 리전에 남아 있어야 합니다. 그런 다음 중앙 로깅 계정은 로그를 처리하고, 로그를 표준 출력 형식으로 정규화하고, 추가 처리를 위해 출력 로그를 보안 도구로 스트리밍합니다. 솔루션 설계자는 수집해야 하는 대량의 로깅 데이터를 처리할 수 있는 솔루션을 설계해야 합니다. 정규 업무 시간 동안보다 정규 업무 시간 외에는 로깅이 덜 발생합니다. 로깅 솔루션은 예상 부하에 따라 확장되어야 합니다. 솔루션 아키텍트는 다중 계정 로깅 프로세스를 처리하기 위해 AWS Control Tower 설계를 사용하기로 결정했습니다. 솔루션 설계자는 요구 사항을 충족하기 위해 어떤 단계 조합을 수행해야 합니까? (3개 선택)", "opts": ["중앙 로깅 계정에 대상 Amazon Kinesis 데이터 스트림을 생성합니다.", "중앙 로깅 계정에 대상 Amazon Simple Queue Service(Amazon SQS) 대기열을 생성합니다.", "Amazon CloudWatch Logs에 Amazon Kinesis 데이터 스트림에 데이터를 추가할 수 있는 권한을 부여하는 IAM 역할을 생성합니다. 신뢰 정책을 만듭니다. IAM 역할에 신뢰 정책을 지정합니다. 각 회원 계정에서 각 로그 그룹에 대한 구독 필터를 생성하여 Kinesis 데이터 스트림으로 데이터를 보냅니다.", "Amazon CloudWatch Logs에 Amazon Simple Queue Service(Amazon SQS) 대기열에 데이터를 추가할 수 있는 권한을 부여하는 IAM 역할을 생성합니다. 신뢰 정책을 만듭니다. IAM 역할에 신뢰 정책을 지정합니다. 각 회원 계정에서 모든 로그 그룹에 대한 단일 구독 필터를 생성하여 SQS 대기열로 데이터를 보냅니다.", "AWS Lambda 함수를 생성합니다. 중앙 로깅 계정의 로그를 정규화하고 보안 도구에 로그를 쓰도록 Lambda 함수를 프로그래밍합니다.", "AWS Lambda 함수를 생성합니다. 회원 계정의 로그를 정규화하고 보안 도구에 로그를 쓰도록 Lambda 함수를 프로그래밍합니다."], "answers": [0, 2, 4]}, {"q": "회사는 온프레미스 데이터 센터의 레거시 애플리케이션을 AWS로 마이그레이션하고 있습니다. 애플리케이션은 단일 애플리케이션 서버와 Microsoft SQL Server 데이터베이스 서버로 구성됩니다. 각 서버는 연결된 여러 볼륨에서 500TB의 데이터를 소비하는 VMware VM에 배포됩니다. 이 회사는 가장 가까운 AWS 지역에서 온프레미스 데이터 센터까지 10Gbps AWS Direct Connect 연결을 설정했습니다. Direct Connect 연결은 현재 다른 서비스에서 사용되지 않습니다. 가동 중지 시간을 최소화하면서 애플리케이션을 마이그레이션하려면 솔루션 설계자가 수행해야 하는 단계 조합은 무엇입니까? (2개 선택)", "opts": ["AWS SMS(AWS Server Migration Service) 복제 작업을 사용하여 데이터베이스 서버 VM을 AWS로 마이그레이션합니다.", "VM Import/Export를 사용하여 애플리케이션 서버 VM을 가져옵니다.", "VM 이미지를 AWS Snowball Edge Storage Optimized 디바이스로 내보냅니다.", "AWS SMS(AWS Server Migration Service) 복제 작업을 사용하여 애플리케이션 서버 VM을 AWS로 마이그레이션합니다.", "AWS DMS(AWS Database Migration Service) 복제 인스턴스를 사용하여 데이터베이스를 Amazon RDS DB 인스턴스로 마이그레이션합니다."], "answers": [3, 4]}, {"q": "회사는 온프레미스로 서버 집합을 운영하고 AWS 조직의 조직에서 Amazon EC2 인스턴스 집합을 운영합니다. 회사의 AWS 계정에는 수백 개의 VPC가 포함되어 있습니다. 회사는 AWS 계정을 온프레미스 네트워크에 연결하려고 합니다. AWS Site-to-Site VPN 연결은 이미 단일 AWS 계정에 설정되어 있습니다. 회사는 어떤 VPC가 다른 VPC와 통신할 수 있는지 제어하려고 합니다. 최소한의 운영 노력으로 이러한 수준의 제어를 달성할 수 있는 단계 조합은 무엇입니까? (3개 선택)", "opts": ["AWS 계정에서 전송 게이트웨이를 생성하십시오. AWS Resource Access Manager(AWS RAM)를 사용하여 계정 간에 전송 게이트웨이를 공유합니다.", "모든 VPC 및 VPN에 대한 연결을 구성합니다.", "운송 게이트웨이(Transit Gateway) 라우팅 테이블을 설정합니다. VPC 및 VPN을 라우팅 테이블과 연결합니다.", "VPC 간 VPC 피어링을 구성합니다.", "VPC와 VPN 간의 연결을 구성합니다.", "VPC 및 VPN에 라우팅 테이블을 설정합니다."], "answers": [0, 1, 2]}, {"q": "회사는 AWS에서의 애플리케이션 비용을 최적화해야 합니다. 애플리케이션은 AWS Fargate에서 실행되는 AWS Lambda 함수와 Amazon Elastic Container Service(Amazon ECS) 컨테이너를 사용합니다. 이 애플리케이션은 쓰기 집약적이며 Amazon Aurora MySQL 데이터베이스에 데이터를 저장합니다. 애플리케이션의 로드가 일정하지 않습니다. 애플리케이션이 장기간 사용되지 않은 후 갑자기 트래픽이 크게 증가하거나 감소합니다. 데이터베이스는 로드를 처리할 수 없는 메모리 최적화 DB 인스턴스에서 실행됩니다. 솔루션 설계자는 트래픽 변화를 처리할 수 있도록 확장할 수 있는 솔루션을 설계해야 합니다. 이러한 요구 사항을 가장 비용 효율적으로 충족하는 솔루션은 무엇입니까?", "opts": ["데이터베이스에 추가 읽기 전용 복제본을 추가합니다. 인스턴스 Savings Plan과 RDS 예약 인스턴스를 구매하세요.", "여러 작성자 인스턴스가 있는 Aurora DB 클러스터로 데이터베이스를 마이그레이션합니다. 인스턴스 절약 플랜을 구매하세요.", "데이터베이스를 Aurora 글로벌 데이터베이스로 마이그레이션합니다. Compute Savings Plan 및 RDS 예약 인스턴스를 구매하세요.", "데이터베이스를 Aurora Serverless v1로 마이그레이션합니다. Compute Savings Plan을 구매하세요."], "answers": [3]}, {"q": "한 회사가 애플리케이션을 AWS 클라우드로 마이그레이션했습니다. 애플리케이션은 ALB(Application Load Balancer) 뒤에 있는 두 개의 Amazon EC2 인스턴스에서 실행됩니다. 애플리케이션 데이터는 추가 EC2 인스턴스에서 실행되는 MySQL 데이터베이스에 저장됩니다. 애플리케이션의 데이터베이스 사용은 읽기 중심입니다. 각 EC2 인스턴스에 연결된 Amazon Elastic Block Store(Amazon EBS) 볼륨에서 정적 콘텐츠를 로드합니다. 정적 콘텐츠는 자주 업데이트되므로 각 EBS 볼륨에 복사해야 합니다. 애플리케이션의 로드는 하루 종일 변경됩니다. 사용량이 많은 시간에는 애플리케이션이 들어오는 요청을 모두 처리할 수 없습니다. 추적 데이터에 따르면 데이터베이스는 피크 시간 동안 읽기 로드를 처리할 수 없습니다. 애플리케이션의 안정성을 향상시키는 솔루션은 무엇입니까?", "opts": ["애플리케이션을 AWS Lambda 함수 세트로 마이그레이션합니다. Lambda 함수를 ALB의 대상으로 설정합니다. 정적 콘텐츠를 위한 새로운 단일 EBS 볼륨을 생성합니다. 새 EBS 볼륨에서 읽도록 Lambda 함수를 구성합니다. 데이터베이스를 MySQL 다중 AZ DB 클러스터용 Amazon RDS로 마이그레이션합니다.", "애플리케이션을 AWS Step Functions 상태 머신 세트로 마이그레이션합니다. 상태 머신을 ALB의 대상으로 설정합니다. 정적 콘텐츠를 위한 Amazon Elastic File System(Amazon EFS) 파일 시스템을 생성합니다. EFS 파일 시스템에서 읽도록 상태 시스템을 구성합니다. 리더 DB 인스턴스를 사용하여 데이터베이스를 Amazon Aurora MySQL Serverless v2로 마이그레이션합니다.", "애플리케이션을 컨테이너화합니다. 애플리케이션을 Amazon Elastic Container Service(Amazon ECS) 클러스터로 마이그레이션합니다. 애플리케이션을 호스팅하는 작업에는 AWS Fargate 시작 유형을 사용합니다. 정적 콘텐츠로 새로운 단일 EBS 볼륨을 생성합니다. ECS Duster에 새 EBS 볼륨을 마운트합니다. ECS 클러스터에서 AWS Application Auto Scaling을 구성합니다. ECS 서비스를 ALB의 대상으로 설정합니다. 데이터베이스를 MySOL 다중 AZ DB 클러스터용 Amazon RDS로 마이그레이션합니다.", "애플리케이션을 컨테이너화합니다. 애플리케이션을 Amazon Elastic Container Service(Amazon ECS) 클러스터로 마이그레이션합니다. 애플리케이션을 호스팅하는 작업에는 AWS Fargate 시작 유형을 사용합니다. 정적 콘텐츠를 위한 Amazon Elastic File System(Amazon EFS) 파일 시스템을 생성합니다. EFS 파일 시스템을 각 컨테이너에 탑재합니다. ECS 클러스터에서 AWS Application Auto Scaling 구성 ECS 서비스를 ALB의 대상으로 설정합니다. 리더 DB 인스턴스를 사용하여 데이터베이스를 Amazon Aurora MySQL Serverless v2로 마이그레이션합니다."], "answers": [3]}, {"q": "Solutions Architect는 적절한 권한이 있는 AWS 사용자 또는 역할만 새로운 Amazon API Gateway 엔드포인트에 액세스할 수 있는지 확인하려고 합니다. Solutions Architect는 요청의 대기 시간을 분석하고 서비스 맵을 생성하기 위해 각 요청에 대한 엔드투엔드 보기를 원합니다. Solutions Architect는 어떻게 API 게이트웨이 액세스 제어를 설계하고 요청 검사를 수행할 수 있습니까?", "opts": ["API Gateway 방식의 경우 인증을 AWS_IAM으로 설정하세요. 그런 다음 IAM 사용자 또는 역할에 REST API 리소스에 대한 실행-api:Invoke 권한을 부여합니다. 엔드포인트에 액세스할 때 API 호출자가 AWS 서명으로 요청에 서명하도록 활성화합니다. AWS X-Ray를 사용하여 API Gateway에 대한 사용자 요청을 추적하고 분석합니다.", "API 게이트웨이 리소스의 경우 CORS를 활성화로 설정하고 Access-Control-Allow-Origin 헤더에 회사 도메인만 반환합니다. 그런 다음 IAM 사용자 또는 역할에 REST API 리소스에 대한 실행-api:Invoke 권한을 부여합니다. Amazon CloudWatch를 사용하여 API Gateway에 대한 사용자 요청을 추적하고 분석합니다.", "AWS Lambda 함수를 사용자 지정 권한 부여자로 생성하고 API 클라이언트에 호출 시 키와 비밀을 전달하도록 요청한 다음 Lambda를 사용하여 IAM 시스템에 대해 키/비밀 쌍을 검증합니다. AWS X-Ray를 사용하여 API Gateway에 대한 사용자 요청을 추적하고 분석합니다.", "API Gateway용 클라이언트 인증서를 생성합니다. 엔드포인트에 액세스해야 하는 AWS 사용자 및 역할에 인증서를 배포합니다. 엔드포인트에 액세스할 때 API 호출자가 클라이언트 인증서를 전달하도록 활성화합니다. Amazon CloudWatch를 사용하여 API Gateway에 대한 사용자 요청을 추적하고 분석합니다."], "answers": [0]}, {"q": "한 회사에서 Amazon EC2 Auto Scaling 그룹에 대한 애플리케이션의 CI/CD에 AWS CodePipeline을 사용하고 있습니다. 모든 AWS 리소스는 AWS CloudFormation 템플릿에 정의됩니다. 애플리케이션 아티팩트는 Amazon S3 버킷에 저장되고 인스턴스 사용자 데이터 스크립트를 사용하여 Auto Scaling 그룹에 배포됩니다. 애플리케이션이 더욱 복잡해짐에 따라 CloudFormation 템플릿의 최근 리소스 변경으로 인해 계획되지 않은 가동 중지 시간이 발생했습니다. 솔루션 설계자는 템플릿 변경으로 인해 가동 중지 시간이 발생할 가능성을 줄이기 위해 CI/CD 파이프라인을 어떻게 개선해야 합니까?", "opts": ["배포를 수행할 때 CloudFormation 오류 조건을 감지하고 보고하도록 배포 스크립트를 조정합니다. 프로덕션 변경을 승인하기 전에 테스트 팀이 비프로덕션 환경에서 실행할 테스트 계획을 작성합니다.", "테스트 환경에서 AWS CodeBuild를 사용하여 자동화된 테스트를 구현합니다. CloudFormation 변경 세트를 사용하여 배포 전에 변경 사항을 평가합니다. AWS CodeDeploy를 사용하면 블루/그린 배포 패턴을 활용하여 필요한 경우 평가 및 변경 사항을 되돌릴 수 있습니다.", "IDE(통합 개발 환경)용 플러그인을 사용하여 템플릿에 오류가 있는지 확인하고, AWS CLI를 사용하여 템플릿이 올바른지 확인합니다. 오류 조건을 확인하고 오류에 대한 알림을 생성하도록 배포 코드를 조정합니다. 프로덕션 변경을 승인하기 전에 테스트 환경에 배포하고 수동 테스트 계획을 실행하십시오.", "AWS CodeDeploy 및 CloudFormation과 함께 블루/그린 배포 패턴을 사용하여 사용자 데이터 배포 스크립트를 대체합니다. 운영자가 실행 중인 인스턴스에 로그인하고 수동 테스트 계획을 통해 애플리케이션이 예상대로 실행되고 있는지 확인하도록 합니다."], "answers": [1]}, {"q": "동부 해안에 본사를 둔 북미 회사는 us-east-1 지역의 Amazon EC2에서 실행되는 새로운 웹 애플리케이션을 배포하고 있습니다. 애플리케이션은 사용자 요구를 충족하고 탄력성을 유지하기 위해 동적으로 확장되어야 합니다. 또한 애플리케이션에는 us-west-1 리전의 활성-수동 구성에서 재해 복구 기능이 있어야 합니다. us-east-1 리전에서 VPC를 생성한 후 솔루션 아키텍트가 수행해야 하는 단계는 무엇입니까?", "opts": ["us-west-1 리전에 VPC를 생성합니다. 리전 간 VPC 피어링을 사용하여 두 VPC를 모두 연결합니다. 여러 가용 영역(AZ)에 걸쳐 있는 Application Load Balancer(ALB)를 useast-1 지역의 VPC에 배포합니다. 두 VPC에 걸쳐 있고 ALB에서 제공하는 Auto Scaling 그룹의 일부로 각 지역의 여러 AZ에 EC2 인스턴스를 배포합니다.", "여러 가용 영역(AZ)에 걸쳐 있는 ALB(Application Load Balancer)를 us-east-1 지역의 VPC에 배포합니다. ALB에서 제공하는 Auto Scaling 그룹의 일부로 여러 AZ에 EC2 인스턴스를 배포합니다. us-west-1 리전에 동일한 솔루션을 배포합니다. 두 리전에 걸쳐 고가용성을 제공하기 위해 장애 조치 라우팅 정책과 상태 확인이 활성화된 Amazon Route 53 레코드 세트를 생성합니다.", "us-west-1 지역에 VPC를 생성합니다. 리전 간 VPC 피어링을 사용하여 두 VPC를 모두 연결합니다. 두 VPC 모두에 걸쳐 있는 ALB(Application Load Balancer)를 배포합니다. ALB가 제공하는 각 VPC에서 Auto Scaling 그룹의 일부로 여러 가용 영역에 EC2 인스턴스를 배포합니다. ALB를 가리키는 Amazon Route 53 레코드를 생성합니다.", "여러 가용 영역(AZ)에 걸쳐 있는 ALB(Application Load Balancer)를 us-east-1 지역의 VPC에 배포합니다. ALB에서 제공하는 Auto Scaling 그룹의 일부로 여러 AZ에 EC2 인스턴스를 배포합니다. us-west-1 리전에 동일한 솔루션을 배포합니다. 해당 지역의 ALB를 가리키는 각 지역에 별도의 Amazon Route 53 레코드를 생성합니다. Route 53 상태 확인을 사용하여 두 리전에 걸쳐 고가용성을 제공합니다."], "answers": [1]}, {"q": "회사에는 여러 NET Framework 구성 요소에서 실행되는 레거시 응용 프로그램이 있습니다. 구성 요소는 동일한 Microsoft SQL Server 데이터베이스를 공유하고 MSMQ(Microsoft Message Queuing)를 사용하여 비동기적으로 서로 통신합니다. 회사는 컨테이너화된 .NET Core 구성 요소로의 마이그레이션을 시작하고 있으며 AWS에서 실행되도록 애플리케이션을 리팩터링하려고 합니다. .NET Core 구성 요소에는 복잡한 오케스트레이션이 필요합니다. 회사는 네트워킹 및 호스트 구성을 완전히 제어할 수 있어야 합니다. 애플리케이션의 데이터베이스 모델은 강력한 관계형입니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["AWS App Runner에서 INET Core 구성 요소를 호스팅합니다. SQL Server용 Amazon RDS에서 데이터베이스를 호스팅합니다. 비동기 메시징에는 Amazon EventBiridge를 사용하십시오.", "AWS Fargate 시작 유형을 사용하여 Amazon Elastic Container Service(Amazon ECS)에서 .NET Core 구성 요소를 호스팅합니다. Amazon Dynamo에서 데이터베이스 호스팅비동기 메시징을 위해 Amazon Simple 알림 서비스(Amazon SNS)를 사용하세요.", "AWS Elastic Beanstalk에서 .NET Core 구성 요소를 호스팅합니다. Amazon Aurora PostgreSQL Serverless v2에서 데이터베이스를 호스팅합니다. 비동기 메시징에는 Amazon Managed Streaming for Apache Kafka(Amazon MSK)를 사용합니다.", "Amazon EC2 시작 유형을 사용하여 Amazon Elastic Container Service(Amazon ECS)에서 NET Core 구성 요소를 호스팅합니다. Amazon Aurora MySQL Serverless v2에서 데이터베이스를 호스팅합니다. 비동기 메시징에는 Amazon Simple Queue Service(Amazon SQS)를 사용합니다."], "answers": [3]}, {"q": "솔루션 아키텍트가 단일 가용 영역 내의 배치 그룹에서 여러 Amazon EC2 인스턴스를 시작했습니다. 시스템에 대한 추가 로드로 인해 솔루션 설계자는 배치 그룹에 새 인스턴스를 추가하려고 시도합니다. 그러나 솔루션 설계자는 용량 부족 오류를 수신합니다. 이 문제를 해결하려면 솔루션 설계자가 무엇을 해야 합니까?", "opts": ["스프레드 배치 그룹을 사용하십시오. 각 가용 영역에 대해 최소 8개의 인스턴스를 설정합니다.", "배치 그룹의 모든 인스턴스를 중지하고 시작합니다. 다시 실행해 보세요.", "새 배치 그룹을 생성합니다. 새 배치 그룹을 원래 배치 그룹과 병합합니다.", "배치 그룹에서 전용 호스트로 추가 인스턴스를 시작합니다."], "answers": [1]}, {"q": "한 회사는 IaC(Infrastructure as Code)를 사용하여 두 개의 Amazon EC2 인스턴스 세트를 프로비저닝했습니다. 이러한 사례는 몇 년 동안 동일하게 유지되었습니다. 회사의 사업은 지난 몇 달 동안 급속히 성장했습니다. 이에 대응하여 회사 운영팀은 갑작스러운 트래픽 증가를 관리하기 위해 Auto Scaling 그룹을 구현했습니다. 회사 정책에 따라 실행 중인 모든 운영 체제에 보안 업데이트를 매월 설치해야 합니다. 최신 보안 업데이트에는 재부팅이 필요했습니다. 결과적으로 Auto Scaling 그룹은 인스턴스를 종료하고 패치가 적용되지 않은 새 인스턴스로 교체했습니다. 이 문제의 재발을 피하기 위해 솔루션 설계자는 어떤 단계 조합을 권장해야 합니까? (2개 선택)", "opts": ["교체를 위해 가장 오래된 시작 구성을 대상으로 하도록 업데이트 정책을 설정하여 Auto Scaling 그룹을 수정합니다.", "다음 패치 점검 전에 새로운 Auto Scaling 그룹을 생성합니다. 유지 관리 기간 동안 두 그룹을 모두 패치하고 인스턴스를 재부팅합니다.", "Auto Scaling 그룹 앞에 Elastic Load Balancer를 생성합니다. Auto Scaling 그룹이 종료된 인스턴스를 교체한 후 대상 그룹 상태 확인이 정상으로 반환되도록 모니터링을 구성합니다.", "AMI를 패치하고, 시작 구성을 업데이트하고, Auto Scaling 인스턴스 새로 고침을 호출하는 자동화 스크립트를 생성합니다.", "Auto Scaling 그룹 앞에 Elastic Load Balancer를 생성합니다. 인스턴스에 종료 방지 기능을 구성합니다."], "answers": [2, 3]}, {"q": "데이터 과학자 팀은 Amazon SageMaker 인스턴스와 SageMaker API를 사용하여 기계 학습(ML) 모델을 교육하고 있습니다. SageMaker 인스턴스는 인터넷에 대한 액세스 권한이 없거나 인터넷에서 액세스할 수 없는 VPC에 배포됩니다. ML 모델 훈련을 위한 데이터 세트는 Amazon S3 버킷에 저장됩니다. 인터페이스 VPC 엔드포인트는 Amazon S3 및 SageMaker API에 대한 접근을 제공합니다. 경우에 따라 데이터 과학자는 워크플로의 일부로 사용하는 Python 패키지를 업데이트하기 위해 PyPl(Python Package Index) 리포지토리에 액세스해야 합니다. 솔루션 설계자는 SageMaker 인스턴스가 인터넷에서 격리된 상태를 유지하도록 보장하면서 PyPI 저장소에 대한 접근을 제공해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["데이터 과학자가 액세스해야 하는 각 패키지에 대해 AWS CodeCommit 리포지토리를 생성합니다. PyPl 리포지토리와 CodeCommit 리포지토리 간의 코드 동기화를 구성합니다. CodeCommit에 대한 VPC 엔드포인트를 생성합니다.", "VPC에 NAT 게이트웨이를 생성합니다. PyPl 저장소 엔드포인트에만 접근을 허용하는 네트워크 ACL을 사용하여 인터넷에 액세스할 수 있도록 VPC 경로를 구성합니다.", "VPC에 NAT 인스턴스를 생성합니다. 인터넷 접근을 허용하도록 VPC 경로를 구성합니다. PyPI 리포지토리 엔드포인트에만 접근을 허용하는 SageMaker 노트북 인스턴스 방화벽 규칙을 구성합니다.", "AWS CodeArtifact 도메인 및 리포지토리를 생성합니다. CodeArtifact 리포지토리에 public:pypi에 대한 외부 연결을 추가합니다. CodeArtifact 리포지토리를 사용하도록 Python 클라이언트를 구성합니다. CodeArtifact에 대한 VPC 엔드포인트를 생성합니다."], "answers": [3]}, {"q": "솔루션 설계자는 재해 복구 요구 사항이 엄격한 정부 기관에서 근무합니다. 모든 Amazon Elastic Block Store(Amazon EBS) 스냅샷은 2개 이상의 추가 AWS 리전에 저장되어야 합니다. 기관은 또한 가능한 최저 운영 간접비를 유지해야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["EBS 스냅샷을 추가 지역에 복사하기 위해 매일 한 번 실행되도록 Amazon Data Lifecycle Manager(Amazon DLM)에서 정책을 구성합니다.", "Amazon EventBridge(Amazon CloudWatch Events)를 사용하여 EBS 스냅샷을 추가 지역에 복사하도록 AWS Lambda 함수를 예약합니다.", "EBS 스냅샷을 생성하도록 AWS Backup을 설정합니다. EBS 스냅샷을 추가 지역에 복사하도록 Amazon S3 교차 지역 복제를 구성합니다.", "Amazon EC2 Image Builder가 매일 한 번 실행되도록 예약하여 AMI를 생성하고 AMI를 추가 지역에 복사합니다."], "answers": [0]}, {"q": "회사에 필요한 것보다 더 큰 Amazon EC2 인스턴스를 시작하는 프로젝트가 있습니다. 이 활동을 기업 IT 외부에 유지하라는 정책 제한으로 인해 프로젝트 계정은 AWS Organizations의 회사 조직에 속할 수 없습니다. 회사는 프로젝트 계정의 개발자가 t3.small EC2 인스턴스를 시작하는 것만 허용하려고 합니다. 이러한 EC2 인스턴스는 us-east-2 리전으로 제한되어야 합니다. 솔루션 설계자는 이러한 요구 사항을 충족하기 위해 무엇을 해야 합니까?", "opts": ["새 개발자 계정을 만드세요. 모든 EC2 인스턴스, 사용자 및 자산을 us-east-2로 이동합니다. AWS Organizations에서 회사 조직에 계정을 추가합니다. 지역 선호도를 나타내는 태그 지정 정책을 시행합니다.", "us-east-2에서 t3.small EC2 인스턴스를 제외한 모든 EC2 인스턴스의 시작을 거부하는 SCP를 생성합니다. SCP를 프로젝트 계정에 연결합니다.", "us-east-2의 각 개발자에 대해 t3.small EC2 예약 인스턴스를 생성하고 구매합니다. 각 개발자에게 이름을 태그로 사용하여 특정 EC2 인스턴스를 할당합니다.", "us-east-2에서 t3.small EC2 인스턴스만 시작하도록 허용하는 IAM 정책을 생성합니다. 개발자가 프로젝트 계정에서 사용하는 역할 및 그룹에 정책을 연결합니다."], "answers": [3]}, {"q": "과학 회사는 Amazon S3 버킷의 텍스트 및 이미지 데이터를 처리해야 합니다. 데이터는 심우주 임무의 시간이 중요한 실시간 단계 동안 여러 레이더 스테이션에서 수집됩니다. 레이더 스테이션은 데이터를 소스 S3 버킷에 업로드합니다. 데이터 앞에는 레이더 스테이션 식별 번호가 붙습니다. 회사는 두 번째 계정에 대상 S3 버킷을 생성했습니다. 규정 준수 목표를 달성하려면 소스 S3 버킷에서 대상 S3 버킷으로 데이터를 복사해야 합니다. 복제는 소스 S3 버킷의 모든 객체를 포괄하는 S3 복제 규칙을 사용하여 발생합니다. 하나의 특정 레이더 스테이션이 가장 정확한 데이터를 보유한 것으로 식별됩니다. 이 레이더 스테이션의 데이터 복제는 레이더 스테이션이 소스 S3 버킷에 객체를 업로드한 후 30분 이내에 완료되도록 모니터링해야 합니다. 솔루션 설계자는 이러한 요구 사항을 충족하기 위해 무엇을 해야 합니까?", "opts": ["소스 S3 버킷에서 대상 S3 버킷으로 접두사가 붙은 데이터를 복제하도록 AWS DataSync 에이전트를 설정합니다. 작업에서 사용 가능한 모든 대역폭을 사용하도록 선택하고 작업을 모니터링하여 TRANSFERRING 상태인지 확인합니다. 이 상태가 변경되면 알림을 트리거하는 Amazon EventBridge(Amazon CloudWatch Events) 규칙을 생성합니다.", "두 번째 계정에서는 가장 정확한 데이터로 레이더 스테이션으로부터 데이터를 수신하기 위해 또 다른 S3 버킷을 생성합니다. 복제를 다른 레이더 스테이션과 분리하려면 이 새로운 S3 버킷에 대한 새 복제 규칙을 설정하십시오. 대상까지의 최대 복제 시간을 모니터링합니다. 시간이 원하는 임계값을 초과하면 알림을 트리거하는 Amazon EventBridge(Amazon CloudWatch Events) 규칙을 생성합니다.", "소스 S3 버킷에서 Amazon S3 Transfer Acceleration을 활성화하고 새 엔드포인트를 사용하도록 가장 정확한 데이터로 레이더 스테이션을 구성합니다. S3 대상 버킷의 TotalRequestLatency 지표를 모니터링합니다. 이 상태가 변경되면 알림을 트리거하는 Amazon EventBridge(Amazon CloudWatch Events) 규칙을 생성합니다.", "가장 정확한 데이터로 레이더 스테이션의 접두사를 사용하는 키를 필터링하는 소스 S3 버킷에 새로운 S3 복제 규칙을 만듭니다. S3 복제 시간 제어(S3 RTC)를 활성화합니다. 대상까지의 최대 복제 시간을 모니터링합니다. 시간이 원하는 임계값을 초과하면 알림을 트리거하는 Amazon EventBridge(Amazon CloudWatch Events) 규칙을 생성합니다."], "answers": [3]}, {"q": "회사에서 온프레미스 데이터 센터를 AWS 클라우드로 마이그레이션하려고 합니다. 여기에는 수천 개의 가상화된 Linux 및 Microsoft Windows 서버, SAN 스토리지, MYSQL이 포함된 Java 및 PHP 애플리케이션, Oracle 데이터베이스가 포함됩니다. 동일한 데이터 센터 또는 외부에서 호스팅되는 종속 서비스가 많이 있습니다. 기술 문서가 불완전하고 오래되었습니다. 솔루션 아키텍트는 현재 환경을 이해하고 마이그레이션 후 클라우드 리소스 비용을 추정해야 합니다. 솔루션 설계자는 클라우드 마이그레이션을 계획하기 위해 어떤 도구 또는 서비스를 사용해야 합니까? (3개 선택)", "opts": ["AWS Application Discovery Service (AWS 애플리케이션 검색 서비스)", "AWS SMS", "AWS x-Ray", "AWS 클라우드 채택 준비 도구(CART) (AWS Cloud Adoption Readiness Tool (CART))", "Amazon Inspector (Amazon 인스펙터)", "AWS Migration Hub (AWS 마이그레이션 허브)"], "answers": [0, 3, 5]}, {"q": "솔루션 설계자는 출시 전에 애플리케이션의 복원력을 검토하고 있습니다. 애플리케이션은 VPC의 프라이빗 서브넷에 배포된 Amazon EC2 인스턴스에서 실행됩니다. EC2 인스턴스는 최소 용량이 I이고 최대 용량이 I인 Auto Scaling 그룹에 의해 프로비저닝됩니다. 애플리케이션은 MySQL용 Amazon RDS DB 인스턴스에 데이터를 저장합니다. VPC에는 3개의 가용 영역에 구성된 서브넷이 있으며 단일 NAT 게이트웨이로 구성됩니다. 솔루션 아키텍트는 애플리케이션이 여러 가용 영역에서 작동하도록 보장하는 솔루션을 권장해야 합니다. 이 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["다른 가용 영역에 추가 NAT 게이트웨이를 배포합니다. 적절한 경로로 경로 테이블을 업데이트합니다. MySQL용 RDS DB 인스턴스를 다중 AZ 구성으로 수정합니다. 가용 영역 전체에서 인스턴스를 시작하도록 Auto Scaling 그룹을 구성합니다. Auto Scaling 그룹의 최소 용량과 최대 용량을 3으로 설정합니다.", "NAT 게이트웨이를 가상 프라이빗 게이트웨이로 교체합니다. MySQL용 RDS DB 인스턴스를 Amazon Aurora MySQL DB 클러스터로 교체합니다. VPC의 모든 서브넷에서 인스턴스를 시작하도록 Auto Scaling 그룹을 구성합니다. Auto Scaling 그룹의 최소 용량과 최대 용량을 3으로 설정합니다.", "NAT 게이트웨이를 NAT 인스턴스로 교체합니다. MySQL용 RDS DB 인스턴스를 PostgreSQL용 RDS DB 인스턴스로 마이그레이션합니다. 다른 가용 영역에서 새 EC2 인스턴스를 시작합니다.", "다른 가용 영역에 추가 NAT 게이트웨이를 배포합니다. 적절한 경로로 경로 테이블을 업데이트합니다. 자동 백업을 활성화하고 백업을 7일 동안 유지하도록 MySQL DB 인스턴스용 RDS를 수정합니다. VPC의 모든 서브넷에서 인스턴스를 시작하도록 Auto Scaling 그룹을 구성합니다. Auto Scaling 그룹의 최소 용량과 최대 용량을 1로 유지합니다."], "answers": [0]}, {"q": "한 회사가 온프레미스 트랜잭션 처리 애플리케이션을 AWS로 마이그레이션할 계획입니다. 애플리케이션은 회사 데이터 센터의 VM에서 호스팅되는 Docker 컨테이너 내에서 실행됩니다. Docker 컨테이너에는 애플리케이션이 트랜잭션 데이터를 기록하는 공유 스토리지가 있습니다. 거래는 시간에 민감합니다. 애플리케이션 내부의 거래량은 예측할 수 없습니다. 회사는 증가하는 수요에 맞춰 처리량을 자동으로 확장하는 지연 시간이 짧은 스토리지 솔루션을 구현해야 합니다. 회사는 애플리케이션을 더 이상 개발할 수 없으며 Docker 호스팅 환경을 계속 관리할 수 없습니다. 이러한 요구 사항을 충족하려면 회사에서 애플리케이션을 AWS로 어떻게 마이그레이션해야 합니까?", "opts": ["애플리케이션을 실행하는 컨테이너를 Amazon Elastic Kubernetes Service(Amazon EKS)로 마이그레이션합니다. Amazon S3를 사용하여 컨테이너가 공유하는 거래 데이터를 저장합니다.", "애플리케이션을 실행하는 컨테이너를 Amazon Elastic Container Service(Amazon ECS)용 AWS Fargate로 마이그레이션합니다. Amazon Elastic File System(Amazon EFS) 파일 시스템을 생성합니다. Fargate 작업 정의를 생성합니다. EFS 파일 시스템을 가리키도록 작업 정의에 볼륨을 추가합니다.", "애플리케이션을 실행하는 컨테이너를 Amazon Elastic Container Service(Amazon ECS)용 AWS Fargate로 마이그레이션합니다. Amazon Elastic Block Store(Amazon EBS) 볼륨을 생성합니다. Fargate 작업 정의를 생성합니다. 실행 중인 각 작업에 EBS 볼륨을 연결합니다.", "Amazon EC2 인스턴스를 시작합니다. EC2 인스턴스에 Docker를 설치합니다. 컨테이너를 EC2 인스턴스로 마이그레이션합니다. Amazon Elastic File System(Amazon EFS) 파일 시스템을 생성합니다. EFS 파일 시스템의 EC2 인스턴스에 탑재 지점을 추가합니다."], "answers": [1]}, {"q": "한 회사가 AWS 클라우드로 마이그레이션할 계획을 갖고 있습니다. 이 회 제어합니다.", "AWS CloudFormation을 사용하여 EMR 클러스터를 시작합니다. 클러스터 생성 중에 EMR 클러스터에 리소스 기반 정책을 연결합니다. 비준수 클러스터와 비준수 Amazon S3 버킷을 확인하는 AWS Config 규칙을 생성합니다. 비준수 리소스를 수정하도록 관리자에게 알리도록 규칙을 구성합니다."], "answers": [2]}, {"q": "SaaS(Software as a Service) 회사는 AWS를 사용하여 AWS PrivateLink에서 제공하는 서비스를 호스팅합니다. 이 서비스는 Network Load Balancer(NL B) 뒤에 있는 3개의 Amazon EC2 인스턴스에서 실행되는 독점 소프트웨어로 구성됩니다. 인스턴스는 eu-west-2 지역의 여러 가용 영역에 있는 프라이빗 서브넷에 있습니다. 회사의 모든 고객은 eu-west-2에 있습니다. 그러나 회사는 이제 us-east-I 지역에서 새로운 고객을 확보했습니다. 회사는 us-east-I에 새 VPC와 새 서브넷을 생성합니다. 회사는 두 지역의 VPC 간에 지역 간 VPC 피어링을 설정합니다. 회사는 신규 고객에게 SaaS 서비스에 대한 액세스 권한을 부여하고 싶지만 us-east-I에 새로운 EC2 리소스를 즉시 배포하는 것을 원하지 않습니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["eu-west-2에 있는 기존 NL B를 사용하도록 us-east-I에서 PrivateLink 엔드포인트 서비스를 구성합니다. 특정 AWS 계정에 SaaS 서비스에 연결할 수 있는 액세스 권한을 부여합니다.", "us-east-I에 NL B를 생성합니다. SaaS 서비스를 호스팅하는 eu-west-2에서 회사 인스턴스의 IP 주소를 사용하는 IP 대상 그룹을 생성합니다. us-east-I에 있는 NLB를 사용하는 PrivateLink 엔드포인트 서비스를 구성합니다. 특정 AWS 계정에 SaaS 서비스에 연결할 수 있는 액세스 권한을 부여합니다.", "eu-west-2의 EC2 인스턴스 앞에 Application Load Balancer(ALB)를 생성합니다. us-east-I에서 NLB를 생성합니다. us-east-I에 있는 NLB를 eu-west-2에 있는 ALB를 사용하는 ALB 대상 그룹과 연결합니다. us-east-I에 있는 NLB를 사용하는 PrivateLink 엔드포인트 서비스를 구성합니다. 특정 AWS 계정에 SaaS 서비스에 연결할 수 있는 액세스 권한을 부여합니다.", "AWS Resource Access Manager(AWS RAM)를 사용하여 eu-west-2에 있는 EC2 인스턴스를 공유합니다. us-east-I에서 eu-west-2의 공유 EC2 인스턴스를 포함하는 NLB와 인스턴스 대상 그룹을 생성합니다. us-east-I에 있는 NLB를 사용하는 PrivateLink 엔드포인트 서비스를 구성합니다. 특정 AWS 계정에 SaaS 서비스에 연결할 수 있는 액세스 권한을 부여합니다."], "answers": [1]}, {"q": "회사는 두 AWS 리전에서 점점 늘어나는 Amazon S3 버킷 수를 모니터링해야 합니다. 또한 회사는 Amazon S3에서 암호화된 객체의 비율을 추적해야 합니다. 회사에는 내부 규정 준수 팀을 위해 이 정보를 표시하는 대시보드가 필요합니다. 최소한의 운영 오버헤드로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["버킷 및 암호화 지표를 추적하려면 각 지역에 새로운 S3 Storage Lens 대시보드를 생성하십시오. 규정 준수 팀을 위해 두 지역 대시보드의 데이터를 Amazon QuickSight의 단일 대시보드로 집계합니다.", "각 지역에 AWS Lambda 함수를 배포하여 버킷 수와 객체의 암호화 상태를 나열합니다. 이 데이터를 Amazon S3에 저장합니다. Amazon Athena 쿼리를 사용하여 규정 준수 팀을 위해 Amazon QuickSight의 사용자 지정 대시보드에 데이터를 표시합니다.", "S3 Storage  워크로드를 실행하고 있습니다. 워크로드는 여러 퍼블릭 서브넷과 프라이빗 서브넷이 포함된 VPC에서 실행되고 있습니다. 퍼블릭 서브넷에는 기존 인터넷 게이트웨이에 대한 0.0.0.0/0 경로가 있습니다. 프라이빗 서브넷에는 기존 NAT 게이트웨이에 대한 0.0.0.0/0 경로가 있습니다. 솔루션 아키텍트는 IPv6를 사용하기 위해 전체 EC2 인스턴스 플릿을 마이그레이션해야 합니다. 프라이빗 서브넷에 있는 EC2 인스턴스는 퍼블릭 인터넷에서 액세스할 수 없어야 합니다. 솔루션 설계자는 이러한 요구 사항을 충족하기 위해 무엇을 해야 합니까?", "opts": ["기존 VPC를 업데이트하고 사용자 지정 IPv6 CIDR 블록을 VPC 및 모든 서브넷과 연결합니다. 모든 VPC 라우팅 테이블을 업데이트하고 ::/0에 대한 경로를 인터넷 게이트웨이에 추가합니다.", "기존 VPC를 업데이트하고 Amazon 제공 IPv6 CIDR 블록을 VPC 및 모든 서브넷과 연결합니다. 모든 프라이빗 서브넷의 VPC 라우팅 테이블을 업데이트하고 NAT 게이트웨이에 ::/0에 대한 경로를 추가합니다.", "기존 VPC를 업데이트하고 Amazon 제공 IPv6 CIDR 블록을 VPC 및 모든 서브넷과 연결합니다. 외부 전용 인터넷 게이트웨이를 만듭니다. 모든 프라이빗 서브넷의 VPC 라우팅 테이블을 업데이트하고 외부 전용 인터넷 게이트웨이에 ::/0에 대한 경로를 추가합니다.", "기존 VPC를 업데이트하고 사용자 지정 IPv6 CIDR 블록을 VPC 및 모든 서브넷과 연결합니다. 새 NAT 게이트웨이를 생성하고 IPv6 지원을 활성화합니다. 모든 프라이빗 서브넷의 VPC 라우팅 테이블을 업데이트하고 IPv6 지원 NAT 게이트웨이에 ::/0에 대한 경로를 추가합니다."], "answers": [2]}, {"q": "한 회사는 Amazon API Gateway를 사용하여 민감한 데이터에 대한 접근을 제공하는 프라이빗 REST API를 배포하고 있습니다. API는 VPC에 배포된 애플리케이션에서만 액세스할 수 있어야 합니다. 회사는 API를 성공적으로 배포했습니다. 그러나 VPC에 배포된 Amazon EC2 인스턴스에서는 API에 액세스할 수 없습니다. EC2 인스턴스와 API 간의 연결을 제공하는 솔루션은 무엇입니까?", "opts": ["API 게이트웨이용 인터페이스 VPC 엔드포인트를 생성합니다. apigateway:* 작업을 허용하는 엔드포인트 정책을 연결합니다. VPC 엔드포인트에 대한 프라이빗 DNS 이름 지정을 비활성화합니다. VPC에서의 접근을 허용하는 API 리소스 정책을 구성합니다. API에 액세스하려면 VPC 엔드포인트의 DNS 이름을 사용하십시오.", "API 게이트웨이용 인터페이스 VPC 엔드포인트를 생성합니다. Execute-api:lnvoke 작업을 허용하는 엔드포인트 정책을 연결합니다. VPC 엔드포인트에 대한 프라이빗 DNS 이름 지정을 활성화합니다. VPC 엔드포인트에서의 접근을 허용하는 API 리소스 정책을 구성합니다. API 엔드포인트의 DNS 이름을 사용하여 API에 액세스합니다.", "NLB(Network Load Balancer)와 VPC 링크를 생성합니다. API 게이트웨이와 NLB 간의 프라이빗 통합을 구성합니다. API 엔드포인트의 DNS 이름을 사용하여 API에 액세스합니다.", "ALB(Application Load Balancer)와 VPC 링크를 생성합니다. API Gateway와 ALB 간의 프라이빗 통합을 구성합니다. ALB 엔드포인트의 DNS 이름을 사용하여 API에 액세스합니다."], "answers": [1]}, {"q": "최근 대규모 급여 회사가 소규모 채용 회사와 합병되었습니다. 이제 통합된 회사에는 여러 사업부가 있으며 각 사업부는 자체 기존 AWS 계정을 가지고 있습니다. 솔루션 아키텍트는 회사가 모든 AWS 계정에 대한 청구 및 액세스 정책을 중앙에서 관리할 수 있는지 확인해야 합니다. 솔루션 아키텍트는 중앙 집중식 마스터 계정에서 회사의 모든 회원 계정에 초대를 보내 0, 3, 4]}, {"q": "이미지 스토리지 서비스를 제공하는 회사는 AWS에 고객 레이싱 솔루션을 배포하려고 합니다. 수백만 명의 개인 고객이 이 솔루션을 사용할 것입니다. 이 솔루션은 대용량 이미지 파일 배치를 수신하고, 파일 크기를 조정하고, 파일을 최대 6개월 동안 Amazon S3 버킷에 저장합니다. 솔루션은 수요의 상당한 변화를 처리해야 합니다. 또한 솔루션은 엔터프라이즈 규모에서 안정적이어야 하며 장애 발생 시 처리 작업을 재실행할 수 있어야 합니다. 이러한 요구 사항을 가장 비용 효율적으로 충족하는 솔루션은 무엇입니까?", "opts": ["AWS Step Functions를 사용하여 사용자가 이미지를 저장할 때 발생하는 S3 이벤트를 처리합니다. 이미지 크기를 조정하고 S3 버킷의 원본 파일을 대체하는 AWS Lambda 함수를 실행합니다. 저장된 모든 이미지가 6개월 후에 만료되도록 S3 수명 주기 만료 정책을 생성합니다.", "Amazon EventBridge를 사용하여 사용자가 이미지를 업로드할 때 발생하는 S3 이벤트를 처리합니다. 이미지 크기를 조정하고 S3 버킷의 원본 파일을 대체하는 AWS Lambda 함수를 실행합니다. 저장된 모든 이미지가 6개월 후에 만료되도록 S3 수명 주기 만료 정책을 생성합니다.", "S3 이벤트 알림을 사용하여 사용자가 이미지를 저장할 때 AWS Lambda 함수를 호출합니다. Lambda 함수를 사용하여 이미지 크기를 조정하고 원본 파일을 S3 버킷에 저장합니다. 6개월 후에 저장된 모든 이미지를 S3 Standard-Infrequent Access(S3 Standard-IA)로 이동하는 S3 수명 주기 정책을 생성합니다.", "Amazon Simple Queue Service(Amazon SQS)를 사용하여 사용자가 이미지를 저장할 때 발생하는 S3 이벤트를 처리합니다. 이미지 크기를 조정하고 크기 조정된 파일을 S3 Standard-Infrequent Access(S3 Standard-IA)를 사용하는 S3 버킷에 저장하는 AWS Lambda 함수를 실행합니다. 6개월 후 저장된 모든 이미지를 S3 Glacier Deep Archive로 이동하는 S3 수명 주기 정책을 생성합니다."], "answers": [1]}, {"q": "회사에는 회사의 각 부서에 대한 별도의 AWS 계정을 포함하는 AWS Organizations에 조직이 있습니다. 다양한 부서의 애플리케이션 팀이 독립적으로 솔루션을 개발하고 배포합니다. 회사는 컴퓨팅 비용을 줄이고 부서 전체에서 비용을 적절하게 관리하기를 원합니다. 또한 회사는 개별 부서의 청구에 대한 가시성을 향상하고자 합니다. 회사는 컴퓨팅 리소스를 선택할 때 운영 유연성을 잃고 싶지 않습니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["각 부서에 AWS 예산을 사용하십시오. 태그 편집기를 사용하여 적절한 리소스에 태그를 적용합니다. EC2 Instance Savings Plan을 구매하세요.", "통합 결제를 사용하도록 AWS Organizations를 구성합니다. 부서를 식별하는 태그 지정 전략을 구현합니다. SCP를 사용하여 적절한 리소스에 태그를 적용합니다. EC2 Instance Savings Plan을 구매하세요.", "통합 결제를 사용하도록 AWS Organizations를 구성합니다. 부서를 식별하는 태그 지정 전략을 구현합니다. 태그 편집기를 사용하여 적절한 리소스에 태그를 적용합니다. Compute Savings Plan을 구매하세요.", "각 부서에 AWS 예산을 사용합니다. SCP를 사용하여 적절한 리소스에 태그를 적용합니다. Compute Savings Plan을 구매하세요."], "answers": [2]}, {"q": "한 회사에 사진과 비디오를 Amazon S3 버킷에 안전하게 업로드하는 웹 애플리케이션이 있습니다. 회사는 인증된 사용자만이 콘텐츠를 게시할 수 있도록 요구하고 있습니다. 애플리케이션은 브라우저 인터페이스를 통해 객체를 업로드하는 데 사용되는 미리 서명된 URL을 생성합니다. 대부분의 사용자는 100MB보다 큰 개체의 업로드 시간이 느리다고 보고합니다. 인증된 사용자만 콘텐츠를 게시할 수 있도록 허용하면서 이러한 업로드 성능을 향상시키기 위해 Solutions Architect는 무엇을 할 수 있습니까?", "opts": ["S3 서비스 프록시로 리소스가 있는 엣지 최적화 API 엔드포인트를 사용하여 Amazon API Gateway를 설정합니다. S3 PutObject 작업을 노출하려면 이 리소스에 대한 PUT 메서드를 구성하십시오. COGNITO_USER_POOLS 권한 부여자를 사용하여 API 게이트웨이를 보호합니다. 브라우저 인터페이스에서 미리 서명된 URL 대신 API 게이트웨이를 사용하여 객체를 업로드하도록 합니다.", "S3 서비스 프록시로 리소스가 있는 지역 API 엔드포인트를 사용하여 Amazon API Gateway를 설정합니다. S3 PutObject 작업을 노출하려면 이 리소스에 대한 PUT 메서드를 구성하십시오. AWS Lambda 권한 부여자를 사용하여 API 게이트웨이를 보호합니다. 브라우저 인터페이스에서 미리 서명된 URL 대신 API 게이트웨이를 사용하여 API 개체를 업로드하도록 합니다.", "S3 버킷에서 S3 Transfer Acceleration 엔드포인트를 활성화합니다. 미리 서명된 URL을 생성할 때 엔드포인트를 사용하세요. 브라우저 인터페이스가 S3 멀티파트 업로드 API를 사용하여 객체를 이 URL에 업로드하도록 합니다.", "대상 S3 버킷에 대한 Amazon CloudFront 배포를 구성합니다. CloudFront 캐시 동작에 대해 PUT 및 POST 메서드를 활성화합니다. OAI(원본 액세스 ID)를 사용하도록 CloudFront 오리진을 업데이트합니다. 버킷 정책에서 OAI 사용자 s3:PutObject 권한을 부여합니다. CloudFront 배포를 사용하여 브라우저 인터페이스에서 객체를 업로드하도록 합니다."], "answers": [2]}, {"q": "한 대기업이 전체 IT 포트폴리오를 AWS로 마이그레이션하고 있습니다. 회사의 각 사업부에는 개발 및 테스트 환경을 모두 지원하는 독립형 AWS 계정이 있습니다. 프로덕션 워크로드를 지원하기 위한 새로운 계정이 곧 필요할 것입니다. 재무 부서에는 중앙 집중식 결제 방법이 필요하지만 비용을 할당하기 위해 각 그룹의 지출에 대한 가시성을 유지해야 합니다. 보안 팀에는 회사의 모든 계정에서 IAM 사용을 제어하기 위한 중앙 집중식 메커니즘이 필요합니다. 다음 옵션 중 가장 적은 노력으로 회사의 요구 사항을 충족하는 조합은 무엇입니까? (2개 선택)", "opts": ["각 계정으로 시작되는 공통 IAM 권한을 정의하는 매개변수화된 AWS CloudFormation 템플릿 모음을 사용하십시오. 최소 권한 모델을 시행하려면 모든 신규 및 기존 계정에서 적절한 스택을 시작해야 합니다.", "AWS Organizations를 사용하여 선택한 지불자 계정에서 새 조직을 생성하고 조직 단위 계층 구조를 정의합니다. 기존 계정을 조직에 초대하고 조직을 사용하여 새 계정을 만듭니다.", "각 사업부가 자체 AWS 계정을 사용하도록 요구합니다. 각 AWS 계정에 적절하게 태그를 지정하고 비용 탐색기를 활성화하여 지불 거절을 관리합니다.", "AWS Organizations의 모든 기능을 활성화하고 하위 계정에 대한 IAM 권한을 필터링하는 적절한 서비스 제어 정책을 설정합니다.", "회사의 모든 AWS 계정을 단일 AWS 계정으로 통합합니다. 청구 목적으로 태그를 사용하고 LAM의 액세스 관리자 기능을 사용하여 최소 권한 모델을 시행합니다."], "answers": [1, 3]}, {"q": "한 회사에는 수천 개의 기상 관측소에서 수집된 기상 데이터를 분석하는 솔루션이 있습니다. 기상 관측소는 AWS Lambda 기능이 통합된 Amazon API Gateway REST API를 통해 데이터를 보냅니다. Lambda 함수는 데이터 사전 처리를 위해 타사 서비스를 호출합니다. 타 마이그레이션합니다. DynamoDB의 읽기 및 쓰기 용량을 늘립니다.", "백엔드 서비스를 AWS Lambda로 마이그레이션합니다. 전역 테이블을 사용하도록 DynamoDB를 구성합니다.", "백엔드 서비스에 Auto Scaling 그룹을 사용합니다. DynamoDB Auto Scaling을 사용합니다.", "백엔드 서비스에 Auto Scaling 그룹을 사용합니다. Amazon Simple Queue Service(Amazon SQS) 및 AWS Lambda 함수를 사용하여 DynamoDB에 씁니다."], "answers": [2]}, {"q": "한 회사가 클라우드로 마이그레이션하고 있습니다. 기존 데이터 센터 환경의 가상 머신 구성을 평가하여 새로운 Amazon EC2 인스턴스의 크기를 정확하게 조정할 수 있는지 확인하려고 합니다. 회사는 CPU와 같은 지표를 수집하려고 합니다. 메모리, 디스크 사용률 및 각 인스턴스에서 실행 중인 프로세스에 대한 인벤토리가 필요합니다. 또한 회사는 네트워크 연결을 모니터링하여 서버 간의 통신을 매핑하려고 합니다. 이 데이터를 가장 비용 효율적으로 수집할 수 있는 방법은 무엇입니까?", "opts": ["AWS Application Discovery Service를 사용하고 데이터 센터의 각 가상 머신에 데이터 수집 에이전트를 배포합니다.", "로컬 환경 내의 모든 서버에서 Amazon CloudWatch 에이전트를 구성하고 Amazon CloudWatch Logs에 지표를 게시합니다.", "AWS Application Discovery Service를 사용하고 기존 시각화 환경에서 에이전트 없는 검색을 활성화합니다.", "AWS Management Console에서 AWS Application Discovery Service를 활성화하고 VPN을 통한 검색을 허용하도록 회사 방화벽을 구성합니다."], "answers": [0]}, {"q": "회사는 AWS 클라우드에서 실행되는 SaaS(Software as a Service) 애플리케이션을 제공합니다. 애플리케이션은 NLB(Network Load Balancer) 뒤의 Amazon EC2 인스턴스에서 실행됩니다. 인스턴스는 Auto Scaling 그룹에 속하며 단일 AWS 지역의 3개 가용 영역에 분산됩니다. 회사는 추가 지역에 애플리케이션을 배포하고 있습니다. 회사는 고객이 IP 주소를 허용 목록에 추가할 수 있도록 애플리케이션에 대한 고정 IP 주소를 고객에게 제공해야 합니다. 솔루션은 고객을 지리적으로 가장 가까운 지역으로 자동 라우팅해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["Amazon CloudFront 배포판을 생성합니다. CloudFront 오리진 그룹을 생성합니다. 각 추가 지역에 대한 NLB를 원본 그룹에 추가합니다. 고객에게 배포 엣지 위치의 IP 주소 범위를 제공합니다.", "AWS Global Accelerator 표준 액셀러레이터를 생성합니다. 각 추가 지역에서 NLB에 대한 표준 가속기 엔드포인트를 생성합니다. 고객에게 Global Accelerator IP 주소를 제공합니다.", "Amazon CloudFront 배포판을 생성합니다. 각 추가 지역에서 NLB에 대한 사용자 지정 원본을 만듭니다. 고객에게 배포 엣지 위치의 IP 주소 범위를 제공합니다.", "AWS Global Accelerator 사용자 지정 라우팅 액셀러레이터를 생성합니다. 사용자 정의 라우팅 가속기에 대한 수신기를 만듭니다. 각 추가 지역에 NLB에 대한 IP 주소와 포트를 추가합니다. 고객에게 Global Accelerator IP 주소를 제공합니다."], "answers": [1]}, {"q": "한 회사가 AWS 클라우드에서 여러 워크로드를 실행하고 있습니다. 회사에는 소프트웨어 개발을 위한 별도의 부서가 있습니다. 회사는 AWS Organizations 및 SAML과의 연동을 사용하여 개발자에게 AWS 계정의 리소스를 관리할 수 있는 권한을 부여합니다. 각 개발 단위는 프로덕션 워크로드를 공통 프로덕션 계정에 배포합니다. 최근 프로덕션 계정에서 개발 단위 구성원이 다른 개발 단위에 속한 EC2 인스턴스를 종료하는 사건이 발생했습니다. 솔루션 설계자는 향후 유사한 사고가 발생하지 않도록 방지하는 솔루션을 만들어야 합니다. 또한 솔루션을 통해 개발자는 워크로드에 사용되는 인스턴스를 관리할 수 있어야 합니다. 이러한 요구 사항을 충족하는 전략은 무엇입니까?", "opts": ["각 개발 단위에 대해 AWS Organizations에서 별도의 OU를 생성합니다. 생성된 OU를 회사 AWS 계정에 할당합니다. 개발 단위 이름과 일치하는 DevelopmentUnit 리소스 태그에 대한 거부 작업 및 StringNotEquals 조건을 사용하여 별도의 SCP를 생성합니다. 해당 OU에 SCP를 할당합니다.", "SAML 연동 중에 DevelopmentUnit의 속성을 AWS Security Token Service(AWS STS) 세션 태그로 전달합니다. DevelopmentUnit 리소스 태그 및 aws:PrincipalTag/DevelopmentUnit에 대한 거부 작업 및 StringNotEquals 조건을 사용하여 개발자가 맡은 IAM 역할에 대한 IAM 정책을 업데이트합니다.", "SAML 연동 중에 DevelopmentUnit의 속성을 AWS Security Token Service(AWS STS) 세션 태그로 전달합니다. DevelopmentUnit 리소스 태그 및 aws:PrincipalTag/DevelopmentUnit에 대한 허용 작업과 StringEquals 조건을 사용하여 SCP를 생성합니다. SCP를 루트 OU에 할당합니다.", "각 개발 단위에 대해 별도의 IAM 정책을 만듭니다. 모든 IAM 정책에 대해 DevelopmentUnit 리소스 태그와 개발 단위 이름에 대한 허용 작업과 StringEquals 조건을 추가합니다. SAML 연동 중에 AWS Security Token Service(AWS STS)를 사용하여 IAM 정책을 할당하고 개발 단위 이름을 가정된 IAM 역할과 일치시킵니다."], "answers": [1]}, {"q": "한 엔터프라이즈 회사가 사용자를 위한 인프라 서비스 플랫폼을 구축하고 있습니다. 회사는 다음과 같은 요구 사항을 가지고 있습니다: • 사용자가 승인되지 않은 서비스를 프로비저닝할 수 없도록 AWS 인프라를 시작할 때 사용자에게 최소 권한 접근을 제공합니다. • 중앙 계정을 사용하여 인프라 서비스 생성을 관리합니다. \\ • AWS Organizations의 여러 계정에 인프라 서비스를 배포하는 기능을 제공합니다. • 사용자가 시작한 모든 인프라에 태그를 적용하는 기능을 제공합니다. AWS 서비스를 사용하는 어떤 작업 조합이 이러한 요구 사항을 충족합니까? (3개 선택)", "opts": ["AWS Cloud Formation 템플릿을 사용하여 인프라 서비스를 개발합니다. 중앙 Amazon S3 버킷에 템플릿을 추가하고 S3 버킷 정책에 액세스해야 하는 IAM 역할 또는 사용자를 추가합니다.", "AWS Cloud Formation 템플릿을 사용하여 인프라 서비스를 개발합니다. 중앙 AWS 계정에서 생성된 포트폴리오에 각 템플릿을 AWS Service Catalog 제품으로 업로드합니다. 이러한 포트폴리오를 회사를 위해 생성된 조직 구조와 공유하세요.", "사용자 IAM 역할이 AWSCloudFormationFullAccess 및 AmazonS3ReadOnlyAccess 권한을 갖도록 허용합니다. AWS CloudFormation 및 Amazon S3를 제외한 모든 서비스를 거부하려면 AWS 계정 루트 사용자 수준에서 조직 SCP를 추가합니다.", "사용자 IAM 역할이 ServiceCatalogEndUserAccess 권한만 갖도록 허용합니다. 자동화 스크립트를 사용하여 중앙 포트폴리오를 로컬 AWS 계정으로 가져오고, TagOption을 복사하여 사용자 액세스 권한을 할당하고, 시작 제약 조건을 적용합니다.", "AWS Service Catalog TagOption 라이브러리를 사용하여 회사에서 요구하는 태그 목록을 유지 관리합니다. AWS Service Catalog 제품 또는 포트폴리오에 TagOption을 적용합니다.", "AWS CloudFormation 리소스 태그 속성을 사용하여 사용자를 위해 생성될 모든 CloudFormation 템플릿에 태그 적용을 적용합니다."], "answers": [1, 3, 4]}, {"q": "회사에서 새로운 웹 애플리케이션을 배포합니다. 설정의 일부로 회사는 Amazon Kinesis Data Firehose를 통해 Amazon S3에 로그인하도록 AWS WAF를 구성합니다. 이 회사는 매일 한 번 실행되어 지난 24시간 동안의 AWS WAF 로그 데이터를 반환하는 Amazon Athena 쿼리를 개발합니다. 일일 로그의 양은 일정합니다. 그러나 시간이 지남에 따라 동일한 쿼리를 실행하는 데 더 많은 시간이 걸립니다. 솔루션 설계자는 쿼리 시간이 계속해서 증가하지 않도록 솔루션을 설계해야 합니다. 솔루션은 운영 오버헤드를 최소화해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["매일의 AWS WAF 로그를 하나의 로그 파일로 통합하는 AWS Lambda 함수를 생성합니다.", "매일 다른 S3 버킷으로 로그를 보내도록 AWS WAF를 구성하여 스캔되는 데이터의 양을 줄입니다.", "Amazon S3의 데이터를 날짜 및 시간별로 분할하도록 Kinesis Data Firehose 구성을 업데이트합니다. Amazon Redshift용 외부 테이블을 생성합니다. 데이터 소스를 쿼리하도록 Amazon Redshift Spectrum을 구성합니다.", "날짜 및 시간별로 데이터를 분할하도록 Kinesis Data Firehose 구성 및 Athena 테이블 정의를 수정합니다. 관련 파티션을 보려면 Athena 쿼리를 변경하세요."], "answers": [3]}, {"q": "한 회사는 공용 ALB(Application Load Balancer) 뒤에 있는 Auto Scaling 그룹의 Amazon EC2 인스턴스에서 실행되는 웹 애플리케이션을 개발하고 있습니다. 특정 국가의 사용자만 애플리케이션에 액세스할 수 있습니다. 회사에는 차단된 액세스 요청을 기록하는 기능이 필요합니다. 솔루션에는 최소한의 유지 관리만 필요합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["지정된 국가에 속하는 IP 범위 목록을 포함하는 IPSet을 생성합니다. AWS WAF 웹 ACL을 생성합니다. IPSet의 IP 범위에서 발생하지 않는 요청을 차단하는 규칙을 구성합니다. 규칙을 웹 ACL과 연결합니다. 웹 ACL을 ALB와 연결합니다.", "AWS WAF 웹 ACL을 생성합니다. 지정된 국가에서 발생하지 않는 요청을 차단하는 규칙을 구성합니다. 규칙을 웹 ACL과 연결합니다. 웹 ACL을 ALB와 연결합니다.", "지정된 국가에서 발생하지 않는 요청을 차단하도록 AWS Shield를 구성합니다. AWS Shield를 ALB와 연결합니다.", "지정된 국가에 속한 IP 범위에서 포트 80 및 443을 허용하는 보안 그룹 규칙을 생성합니다. 보안 그룹을 ALB와 연결합니다."], "answers": [1]}, {"q": "한 회사가 온프레미스 인프라에서 AWS 클라우드로 애플리케이션을 마이그레이션하고 있습니다. 마이그레이션 설계 회의에서 회사는 레거시 Windows 파일 서버의 가용성 및 복구 옵션에 대한 우려를 표명했습니다. 파일 서버에는 데이터 손상이나 데이터 손실 시 다시 생성할 수 없는 중요한 비즈니스 크리티컬 데이터가 포함되어 있습니다. 규정 준수 요구 사항에 따라 데이터는 공용 인터넷을 통해 이동해서는 안 됩니다. 회사는 가능한 경우 AWS 관리형 서비스로 전환하려고 합니다. 회사는 Amazon FSx for Windows File Server 파일 시스템에 데이터를 저장하기로 결정했습니다. 솔루션 아키텍트는 재해 복구(DR) 목적으로 데이터를 다른 AWS 리전에 복사하는 솔루션을 설계해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["DR 지역에 대상 Amazon S3 버킷을 생성합니다. Amazon FSx 파일 게이트웨이를 사용하여 기본 지역의 FSx for Windows File Server 파일 시스템과 DR 지역의 S3 버킷 간에 연결을 설정합니다. FSx 파일 게이트웨이에서 S3 버킷을 연속 백업 소스로 구성합니다.", "DR 지역에 FSx for Windows File Server 파일 시스템을 생성합니다. AWS Site-to-Site VPN을 사용하여 기본 지역의 VPC와 DR 지역의 VPC 간에 연결을 설정합니다. VPN 엔드포인트를 사용하여 통신하도록 AWS DataSync를 구성합니다.", "DR 지역에 FSx for Windows File Server 파일 시스템을 생성합니다. VPC 피어링을 사용하여 기본 지역의 VPC와 DR 지역의 VPC 간의 연결을 설정합니다. AWS PrivateLink와 인터페이스 VPC 엔드포인트를 사용하여 통신하도록 AWS DataSync를 구성합니다.", "DR 지역에 FSx for Windows File Server 파일 시스템을 생성합니다. 각 리전의 AWS 운송 게이트웨이(Transit Gateway)를 사용하여 기본 리전의 VPC와 DR 리전의 VPC 간의 연결을 설정합니다. AWS Transfer Family를 사용하여 프라이빗 AWS 백본 네트워크를 통해 기본 지역의 FSx for Windows File Server 파일 시스템과 DR 지역의 FSx for Windows File Server 파일 시스템 간에 파일을 복사합니다."], "answers": [2]}, {"q": "한 회사는 현재 5분 미만의 RPO와 10분 미만의 RTO가 필요한 애플리케이션의 설계 단계에 있습니다. 솔루션 아키텍처 팀은 데이터베이스가 약 10TB의 데이터를 저장할 것으로 예상하고 있습니다. 설계의 일환으로 그들은 회사에 보조 지역으로 장애 조치할 수 있는 기능을 제공할 데이터베이스 솔루션을 찾고 있습니다. 가장 저렴한 비용으로 이러한 비즈니스 요구 사항을 충족할 수 있는 솔루션은 무엇입니까?", "opts": ["Amazon Aurora DB 클러스터를 배포하고 5분마다 클러스터의 스냅샷을 찍습니다. 스냅샷이 완료되면 스냅샷을 보조 리전에 복사하여 장애 발생 시 백업으로 사용하세요.", "보조 지역에 지역 간 읽기 전용 복제본이 있는 Amazon RDS 인스턴스를 배포합니다. 오류가 발생하면 읽기 전용 복제본을 기본 복제본으로 승격하세요.", "기본 지역에 Amazon Aurora DB 클러스터를 배포하고 보조 지역에 또 다른 클러스터를 배포합니다. AWS DMS를 사용하여 보조 리전을 동기화 상태로 유지하세요.", "동일한 지역에 읽기 전용 복제본이 있는 Amazon RDS 인스턴스를 배포합니다. 오류가 발생하면 읽기 전용 복제본을 기본 복제본으로 승격하세요."], "answers": [1]}, {"q": "금융 회사는 새로운 디지털 지갑 애플리케이션을 위해 별도의 AWS 계정을 생성해야 합니다. 회사는 AWS Organizations를 사용하여 계정을 관리합니다. 솔루션 아키텍트는 마스터 계정의 IAM 사용자 Supportl을 사용하여 이메일 주소가 Finance1@example.com인 새 멤버 계정을 생성합니다. 새 멤버 계정에 IAM 사용자를 생성하려면 솔루션 아키텍트가 무엇을 해야 합니까?", "opts": ["초기 AWS Organizations 이메일에서 보낸 64자 암호를 사용하여 AWS 계정 루트 사용자 자격 증명으로 AWS Management Console에 로그인합니다. 필요에 따라 IAM 사용자를 설정합니다.", "마스터 계정에서 역할을 전환하여 새 회원 계정의 계정 ID로 OrganizationAccountAccessRole 역할을 맡습니다. 필요에 따라 IAM 사용자를 설정합니다.", "AWS Management Console 로그인 페이지로 이동합니다. \"루트 계정 자격 증명을 사용하여 로그인\"을 선택하십시오. 이메일 주소 Finance1@example.com과 마스터 계정의 루트 비밀번호를 사용하여 로그인하세요. 필요에 따라 IAM 사용자를 설정합니다.", "AWS Management Console 로그인 페이지로 이동합니다. 새 회원 계정의 계정 ID와 Supportl IAM 자격 증명을 사용하여 로그인합니다. 필요에 따라 IAM 사용자를 설정합니다."], "answers": [1]}, {"q": "자동차 렌탈 회사는 모바일 앱에 데이터를 제공하기 위해 서버리스 REST API를 구축했습니다. 이 앱은 지역 엔드포인트가 있는 Amazon API Gateway API, AWS Lambda 함수, Amazon Aurora MySQL 서버리스 DB 클러스터로 구성됩니다. 회사는 최근 파트너사의 모바일 앱에 API를 오픈했습니다. 요청 수가 크게 증가하여 산발적인 데이터베이스 메모리 오류가 발생했습니다. API 트래픽 분석에 따르면 클라이언트는 짧은 시간 내에 동일한 쿼리에 대해 여러 HTTP GET 요청을 하고 있는 것으로 나타났습니다. 업무 시간 동안 트래픽이 집중되며 휴일 및 기타 행사 기간에는 트래픽이 급증합니다. 회사는 솔루션과 관련된 비용 증가를 최소화하면서 추가 사용량을 지원하는 능력을 향상시켜야 합니다. 이러한 요구 사항을 충족하는 전략은 무엇입니까?", "opts": ["API Gateway 지역 엔드포인트를 엣지 최적화 엔드포인트로 변환합니다. 프로덕션 단계에서 캐싱을 활성화합니다.", "Redis 캐시용 Amazon ElastiCache를 구현하여 데이터베이스 호출 결과를 저장합니다. 캐시를 사용하도록 Lambda 함수를 수정합니다.", "Aurora Serverless DB 클러스터 구성을 수정하여 사용 가능한 최대 메모리 양을 늘립니다.", "API Gateway 프로덕션 단계에서 조절을 활성화합니다. 수신 통화를 제한하려면 속도와 버스트 값을 설정하세요."], "answers": [1]}, {"q": "한 회사가 온프레미스 애플리케이션과 MySQL 데이터베이스를 AWS로 마이그레이션하고 있습니다. 애플리케이션은 매우 민감한 데이터를 처리하며 데이터베이스에 새로운 데이터가 지속적으로 업데이트됩니다. 데이터는 인터넷을 통해 전송되어서는 안 됩니다. 또한 회사는 전송 중인 데이터와 저장 중인 데이터를 암호화해야 합니다. 데이터베이스 크기는 5TB입니다. 회사는 이미 MySQL DB 인스턴스용 Amazon RDS에 데이터베이스 스키마를 생성했습니다. 회사는 AWS에 1Gbps AWS Direct Connect 연결을 설정했습니다. 회사는 또한 공개 VIF와 비공개 VIF를 설정했습니다. 솔루션 아키텍트는 가동 중지 시간을 최소화하면서 데이터를 AWS로 마이그레이션하는 솔루션을 설계해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["데이터베이스 백업을 수행하십시오. 백업 파일을 AWS Snowball Edge Storage Optimized 디바이스에 복사합니다. 백업을 Amazon S3로 가져옵니다. 유휴 암호화에는 Amazon S3 관리형 암호화 키(SSE-S3)를 사용한 서버 측 암호화를 사용합니다. 전송 중 암호화에는 TLS를 사용합니다. Amazon S3에서 DB 인스턴스로 데이터를 가져옵니다.", "AWS Database Migration Service(AWS DMS)를 사용하여 데이터를 AWS로 마이그레이션합니다. 프라이빗 서브넷에 DMS 복제 인스턴스를 생성합니다. AWS DMS용 VPC 엔드포인트를 생성합니다. 전체 로드와 변경 데이터 캡처(CDC)를 사용하여 온프레미스 데이터베이스에서 DB 인스턴스로 데이터를 복사하도록 DMS 작업을 구성합니다. 유휴 암호화에는 AWS Key Management Service(AWS KMS) 기본 키를 사용합니다. 전송 중 암호화에는 TLS를 사용합니다.", "데이터베이스 백업을 수행합니다. AWS DataSync를 사용하여 백업 파일을 Amazon S3로 전송합니다. 유휴 암호화에는 Amazon S3 관리형 암호화 키(SSE-S3)를 사용한 서버 측 암호화를 사용합니다. 전송 중 암호화에는 TLS를 사용합니다. Amazon S3에서 DB 인스턴스로 데이터를 가져옵니다.", "Amazon S3 파일 게이트웨이를 사용하십시오. AWS PrivateLink를 사용하여 Amazon S3에 대한 비공개 연결을 설정합니다. 데이터베이스 백업을 수행합니다. 백업 파일을 Amazon S3에 복사합니다. 유휴 암호화에는 Amazon S3 관리형 암호화 키(SSE-S3)를 사용한 서버 측 암호화를 사용합니다. 전송 중 암호화에는 TLS를 사용합니다. Amazon S3에서 DB 인스턴스로 데이터를 가져옵니다."], "answers": [1]}, {"q": "한 회사가 AWS에 빅 데이터 분석을 위한 새로운 클러스터를 배포하고 있습니다. 클러스터는 여러 가용 영역에 분산되어 있는 여러 Linux Amazon EC2 인스턴스에서 실행됩니다. 클러스터의 모든 노드에는 공통 기본 파일 스토리지에 대한 읽기 및 쓰기 액세스 권한이 있어야 합니다. 파일 저장소는 가용성이 높아야 하고 복원력이 있어야 하며 POSIX(이동식 운영 체제 인터페이스)와 호환되어야 합니다. 높은 수준의 처리량을 수용해야 합니다. 이러한 요구 사항을 충족하는 스토리지 솔루션은 무엇입니까?", "opts": ["Amazon S3 버킷에 연결된 AWS Storage Gateway 파일 게이트웨이 NFS 파일 공유를 프로비저닝합니다. Duster의 각 EC2 인스턴스에 NFS 파일 공유를 탑재합니다.", "범용 성능 모드를 사용하는 새로운 Amazon Elastic File System(Amazon EFS) 파일 시스템을 프로비저닝합니다. 클러스터의 각 EC2 인스턴스에 EFS 파일 시스템을 탑재합니다.", "io2 볼륨 유형을 사용하는 새로운 Amazon Elastic Block Store(Amazon EBS) 볼륨을 프로비저닝합니다. 클러스터의 모든 EC2 인스턴스에 EBS 볼륨을 연결합니다.", "최대 I/O 성능 모드를 사용하는 새로운 Amazon Elastic File System(Amazon EFS) 파일 시스템을 프로비저닝합니다. 클러스터의 각 EC2 인스턴스에 EFS 파일 시스템을 탑재합니다."], "answers": [3]}, {"q": "한 회사가 AWS에서 SaaS(Software as a Service) 솔루션을 호스팅합니다. 솔루션에는 HTTPS 엔드포인트를 제공하는 Amazon API Gateway API가 있습니다. API는 컴퓨팅을 위해 AWS Lambda 함수를 사용합니다. Lambda 함수는 Amazon Aurora Serverless VI 데이터베이스에 데이터를 저장합니다. 이 회사는 AWS Serverless Application Model(AWS SAM)을 사용하여 솔루션을 배포했습니다. 이 솔루션은 여러 가용 영역에 걸쳐 확장되며 재해 복구(DR) 계획이 없습니다. 솔루션 아키텍트는 다른 AWS 리전에서 솔루션을 복구할 수 있는 DR 전략을 설계해야 합니다. 이 솔루션의 R TO는 5분, RPO는 1분입니다. 솔루션 설계자는 이러한 요구 사항을 충족하기 위해 무엇을 해야 합니까?", "opts": ["대상 리전에 Aurora Serverless VI 데이터베이스의 읽기 전용 복제본을 생성하십시오. AWS SAM을 사용하여 Runbook을 생성하여 대상 리전에 솔루션을 배포합니다. 재해 발생 시 읽기 전용 복제본을 기본 복제본으로 승격합니다.", "Aurora Serverless VI 데이터베이스를 소스 지역과 대상 지역 전체에 걸쳐 확장되는 표준 Aurora MySQL 글로벌 데이터베이스로 변경합니다. AWS SAM을 사용하여 Runbook을 생성하여 대상 리전에 솔루션을 배포합니다.", "대상 지역에 여러 라이터 인스턴스가 있는 Aurora Serverless VI DB 클러스터를 생성합니다. 대상 지역에서 솔루션을 시작합니다. 활성-수동 구성에서 작동하도록 두 지역 솔루션을 구성합니다.", "Aurora Serve 미지 처리가 완료되면 사용자에게 알림이 전송됩니다. 로드를 처리할 수 있도록 이미지 처리를 확장할 수 있도록 솔루션 설계자는 어떤 작업 조합을 취해야 합니까? (3개 선택)", "opts": ["모바일 소프트웨어의 파일을 Amazon S3에 직접 업로드합니다. S3 이벤트 알림을 사용하여 Amazon MQ 대기열에 메시지를 생성합니다.", "모바일 소프트웨어의 파일을 Amazon S3에 직접 업로드합니다. S3 이벤트 알림을 사용하여 Amazon Simple Queue Service(Amazon SQS) 표준 대기열에 메시지를 생성합니다.", "대기열에서 메시지를 사용할 수 있을 때 이미지 처리를 수행하도록 AWS Lambda 함수를 호출합니다.", "S3 배치 작업 작업을 호출하여 대기열에서 메시지를 사용할 수 있을 때 이미지 처리를 수행합니다.", "처리가 완료되면 Amazon Simple 알림 서비스(Amazon SNS)를 사용하여 모바일 앱에 푸시 알림을 보냅니다.", "처리가 완료되면 Amazon Simple Email Service(Amazon SES)를 사용하여 모바일 앱에 푸시 알림을 보냅니다."], "answers": [1, 2, 4]}, {"q": "한 회사가 AWS에서 애플리케이션을 구축하고 있습니다. 애플리케이션은 분석을 위해 Amazon Elasticsearch Service(Amazon ES) 클러스터에 로그를 보냅니다. 모든 데이터는 VPC 내에 저장되어야 합니다. 회사의 개발자 중 일부는 집에서 일합니다. 다른 개발자들은 세 곳의 회사 사무실에서 근무합니다. 개발자는 Amazon ES에 액세스하여 로컬 개발 시스템에서 직접 로그를 분석하고 시각화해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["AWS 클라이언트 VPN 엔드포인트를 구성하고 설정합니다. 클라이언트 VPN 엔드포인트를 VPC의 서브넷과 연결합니다. 클라이언트 VPN 셀프 서비스 포털을 구성합니다. 개발자에게 클라이언트 VPN용 클라이언트를 사용하여 연결하도록 지시합니다.", "전송 게이트웨이를 생성하고 이를 VPC에 연결합니다. AWS 사이트 간 VPN을 생성합니다. 운송 게이트웨이(Transit Gateway)에 대한 연결을 생성합니다. 개발자에게 OpenVPN 클라이언트를 사용하여 연결하도록 지시합니다.", "전송 게이트웨이를 생성하고 이를 VPC에 연결합니다. AWS Direct Connect 연결을 주문하세요. Direct Connect 연결에 퍼블릭 VIF를 설정합니다. 퍼블릭 VIF를 전송 게이트웨이와 연결합니다. 개발자에게 Direct Connect 연결에 연결하도록 지시합니다.", "VPC의 퍼블릭 서브넷에서 배스천 호스트를 생성하고 구성합니다. 회사 CIDR 범위에서 SSH 접근을 허용하도록 배스천 호스트 보안 그룹을 구성합니다. 개발자에게 SSH를 사용하여 연결하도록 지시합니다."], "answers": [0]}, {"q": "한 회사에서 웹 사이트를 온프레미스 데이터 센터에서 AWS로 마이그레이션하려고 합니다. 동시에 가용성과 비용 효율성을 개선하기 위해 웹사이트를 컨테이너화된 마이크로서비스 기반 아키텍처로 마이그레이션하려고 합니다. 회사의 보안 정책에는 권한과 네트워크 권한이 모범 사례에 따라 최소 권한을 사용하여 구성되어야 한다고 명시되어 있습니다. Solutions Architect는 보안 요구 사항을 충족하고 Amazon ECS 클러스터에 애플리케이션을 배포한 컨테이너화된 아키텍처를 생성해야 합니다. 요구 사항을 충족하려면 배포 후 어떤 단계가 필요합니까? (2개 선택)", "opts": ["브리지 네트워크 모드를 사용하여 작업을 생성합니다.", "awsvpc 네트워크 모드를 사용하여 작업을 생성합니다.", "Amazon EC2 인스턴스에 보안 그룹을 적용하고 EC2 인스턴스에 대한 IAM 역할을 사용하여 다른 리소스에 액세스합니다.", "작업에 보안 그룹을 적용하고 시작 시 IAM 자격 증명을 컨테이너에 전달하여 다른 리소스에 액세스합니다.", "작업에 보안 그룹을 적용하고 작업에 IAM 역할을 사용하여 다른 리소스에 액세스합니다."], "answers": [1, 4]}, {"q": "한 회사가 여러 AWS Lambda 함수와 Amazon DynamoDB 테이블로 구성된 서버리스 애플리케이션을 실행하고 있습니다. 이 회사는 Amazon Neptune DB 클러스터에 액세스하기 위해 Lambda 함수가 필요한 새로운 기능을 만들었습니다. Neptune DB 클러스터는 VPC의 서브넷 3개에 위치합니다. 다음 중 Lambda 함수가 Neptune DB 클러스터 및 DynamoDB 테이블에 액세스하도록 허용하는 솔루션은 무엇입니까? (2개 선택)", "opts": ["Neptune VPC에 3개의 퍼블릭 서브넷을 생성하고 인터넷 게이트웨이를 통해 트래픽을 라우팅합니다. 세 개의 새로운 퍼블릭 서브넷에서 Lambda 함수를 호스팅합니다.", "Neptune VPC에 3개의 프라이빗 서브넷을 생성하고 NAT 게이트웨이를 통해 인터넷 트래픽을 라우팅합니다. 세 개의 새로운 프라이빗 서브넷에서 Lambda 함수를 호스팅합니다.", "VPC 외부에서 Lambda 함수를 호스팅합니다. Lambda 함수의 IP 범위에서 접근을 허용하도록 Neptune 보안 그룹을 업데이트합니다.", "VPC 외부에서 Lambda 함수를 호스팅합니다. Neptune 데이터베이스에 대한 VPC 엔드포인트를 생성하고 Lambda 함수가 VPC 엔드포인트를 통해 Neptune에 액세스하도록 합니다.", "Neptune VPC에 3개의 프라이빗 서브넷을 생성합니다. 세 개의 새로운 격리된 서브넷에서 Lambda 함수를 호스팅합니다. DynamoDB용 VPC 엔드포인트를 생성하고 DynamoDB 트래픽을 VPC 엔드포인트로 라우팅합니다."], "answers": [1, 4]}, {"q": "회사는 회사 데이터 센터에서 실행되는 애플리케이션을 위한 재해 복구(DR) 솔루션을 설계하려고 합니다. 애플리케이션은 SMB 파일 공유에 쓰고 두 번째 파일 공유에 복사본을 만듭니다. 두 파일 공유는 모두 데이터 센터에 있습니다. 애플리케이션은 메타데이터 파일과 이미지 파일이라는 두 가지 유형의 파일을 사용합니다. 회사는 복사본을 AWS에 저장하려고 합니다. 회사는 재해가 발생할 경우 SMB를 사용하여 데이터 센터나 AWS의 데이터에 액세스할 수 있는 능력이 필요합니다. 데이터 사본은 거의 액세스되지 않지만 5분 이내에 사용 가능해야 합니다.", "opts": ["Amazon S3 스토리지를 사용하여 AWS Outposts를 배포합니다. Outposts에서 Windows Amazon EC2 인스턴스를 파일 서버로 구성합니다.", "Amazon FSx 파일 게이트웨이를 배포합니다. SSD 스토리지를 사용하는 Windows 파일 서버 다중 AZ 파일 시스템용 Amazon FSx를 구성합니다.", "Amazon S3 파일 게이트웨이를 배포합니다. 메타데이터 파일에 Amazon S3 Standard-Infrequent Access(S3 Standard-IA)를 사용하고 이미지 파일에 S3 Glacier Deep Archive를 사용하도록 S3 파일 게이트웨이를 구성합니다.", "Amazon S3 파일 게이트웨이를 배포합니다. 메타데이터 파일 및 이미지 파일에 Amazon S3 Standard-Infrequent Access(S3 Standard-IA)를 사용하도록 S3 파일 게이트웨이를 구성합니다."], "answers": [3]}, {"q": "한 회사에서는 예상치 못한 재해가 발생할 경우 400명의 직원을 원격 근무 환경으로 이동할 수 있는 솔루션을 만들고 있습니다. 사용자 데스크탑에는 Windows와 Linux 운영 체제가 혼합되어 있습니다. 웹 브라우저, 메일 클라이언트 등 다양한 유형의 소프트웨어가 각 데스크톱에 설치됩니다. 솔루션 설계자는 직원이 기존 ID 자격 증명을 사용할 수 있도록 회사의 온프레미스 Active Directory와 통합할 수 있는 솔루션을 구현해야 합니다. 솔루션은 다중 인증(MFA)을 제공해야 하며 기존 데스크탑의 사용자 경험을 복제해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["클라우드 데스크톱 서비스에는 Amazon WorkSpaces를 사용하십시오. 온프레미스 네트워크에 대한 VPN 연결을 설정합니다. AD 커넥터를 생성하고 온프레미스 Active Directory에 연결합니다. AWS Management Console을 사용하여 Amazon WorkSpaces에 대한 MFA를 활성화합니다.", "Amazon AppStream 2.0을 애플리케이션 스트리밍 서비스로 사용하십시오. 직원을 위한 데스크탑 보기를 구성하십시오. 온프레미스 네트워크에 대한 VPN 연결을 설정합니다. 온프레미스에 AD FS(Active Directory Federation Services)를 설정합니다. VPN 연결을 통해 VPC 네트워크를 AD FS에 연결합니다.", "클라우드 데스크톱 서비스에는 Amazon WorkSpaces를 사용하십시오. 온프레미스 네트워크에 대한 VPN 연결을 설정합니다. AD 커넥터를 생성하고 온프레미스 Active Directory에 연결합니다. MFA용 RADIUS 서버를 구성합니다.", "Amazon AppStream 2.0을 애플리케이션 스트리밍 서비스로 사용하십시오. 온프레미스에 Active Directory Federation Services를 설정합니다. AppStream 2.0에 대한 사용자 액세스 권한을 부여하도록 MFA를 구성합니다."], "answers": [2]}, {"q": "한 회사에서 Amazon Connect 연락 센터를 배포했습니다. 연락 센터 상담원은 컴퓨터에서 생성된 수많은 통화를 보고하고 있습니다. 회사는 이러한 통화로 인한 비용 및 생산성 영향을 우려하고 있습니다. 회사는 상담원이 해당 통화를 스팸으로 표시하고 향후 상담원에게 전달되는 번호를 자동으로 차단할 수 있는 솔루션을 원합니다. 이러한 요구 사항을 충족하는 가장 운영 효율적인 솔루션은 무엇입니까?", "opts": ["UpdateContactAttributes API를 호출하는 AWS Lambda 함수를 호출하는 플래그 호출 버튼을 추가하여 CCP(Contact Control Panel)를 사용자 지정합니다. Amazon DynamoDB 테이블을 사용하여 스팸 번호를 저장합니다. 업데이트된 속성을 찾고 Lambda 함수를 사용하여 DynamoDB 테이블을 읽고 쓰도록 고객 응대 흐름을 수정합니다.", "스팸 전화를 찾는 Amazon Connect 규칙용 콘택트 렌즈를 사용합니다. Amazon DynamoDB 테이블을 사용하여 스팸 번호를 저장합니다. 규칙을 찾고 AWS Lambda 함수를 호출하여 DynamoDB 테이블을 읽고 쓰도록 고객 응대 흐름을 수정합니다.", "Amazon DynamoDB 테이블을 사용하여 스팸 번호를 저장합니다. 상담원이 CCP(Contact Control Panel)에서 스팸 전화를 연결할 수 있는 빠른 연결을 만듭니다. DynamoDB 테이블에 쓰기 위해 AWS Lambda 함수를 호출하도록 빠른 연결 고객 응대 흐름을 수정합니다.", "발신자 입력을 요청하도록 초기 고객 응대 흐름을 수정합니다. 에이전트가 입력을 받지 못한 경우 에이전트는 발신자를 스팸으로 표시해야 합니다. Amazon DynamoDB 테이블을 사용하여 스팸 번호를 저장합니다. AWS Lambda 함수를 사용하여 DynamoDB 테이블을 읽고 씁니다."], "answers": [0]}, {"q": "한 회사는 회사 전체 공장 전체에 습도, 빛과 같은 환경 매개변수에 대한 정보를 수집하기 위해 센서를 장착했습니다. 회사는 AWS 클라우드의 데이터를 실시간으로 스트리밍하고 분석해야 합니다. 매개변수 중 하나라도 허용 가능한 범위를 벗어나면 공장 운영팀은 즉시 알림을 받아야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["데이터를 Amazon Kinesis Data Firehose 전송 스트림으로 스트리밍합니다. AWS Step Functions를 사용하여 Kinesis Data Firehose 전송 스트림의 데이터를 사용하고 분석합니다. Amazon Simple 알림 서비스(Amazon SNS)를 사용하여 운영팀에 알립니다.", "데이터를 Amazon Managed Streaming for Apache Kafka(Amazon MSK) 클러스터로 스트리밍합니다. Amazon MSK에서 트리거를 설정하여 AWS Fargate 작업을 호출하여 데이터를 분석합니다. Amazon Simple Email Service(Amazon SES)를 사용하여 운영 팀에 알립니다.", "데이터를 Amazon Kinesis 데이터 스트림으로 스트리밍합니다. Kinesis 데이터 스트림을 사용하고 데이터를 분석하는 AWS Lambda 함수를 생성합니다. Amazon Simple 알림 서비스(Amazon SNS)를 사용하여 운영팀에 알립니다.", "데이터를 Amazon Kinesis Data Analytics 애플리케이션으로 스트리밍합니다. I-Jse는 데이터를 소비하고 분석하기 위해 Amazon Elastic Container Service(Amazon ECS)에서 자동으로 확장되고 컨테이너화된 서비스입니다. Amazon Simple Email Service(Amazon SES)를 사용하여 운영 팀에 알립니다."], "answers": [2]}, {"q": "한 회사가 워크로드를 위해 Amazon Elastic Kubernetes Service(Amazon EKS) 클러스터 배포를 준비하고 있습니다. 회사는 클러스터가 예측할 수 없는 수의 상태 비저장 포드를 지원할 것으로 기대합니다. 워크로드가 사용하는 복제본 수를 자동으로 확장하므로 짧은 기간 동안 많은 포드가 생성됩니다. 노드 복원력을 극대화하는 솔루션은 무엇입니까?", "opts": ["별도의 시작 템플릿을 사용하여 워크로드 노드 그룹과 별개인 두 번째 클러스터에 EKS 제어 플레인을 배포합니다.", "워크로드 노드 그룹을 업데이트합니다. 더 적은 수의 노드 그룹과 더 큰 인스턴스를 노드 그룹에 사용하세요.", "워크로드 노드 그룹의 컴퓨팅 용량이 프로비저닝되지 않은 상태로 유지되도록 Kubernetes Cluster Autoscaler를 구성합니다.", "가용 영역을 기반으로 하는 토폴로지 분산 제약 조건을 사용하도록 워크로드를 구성합니다."], "answers": [3]}, {"q": "회사는 웹 애플리케이션에 대한 재해 복구(DR) 계획을 구현해야 합니다. 애플리케이션은 단일 AWS 리전에서 실행됩니다. 애플리케이션은 컨테이너에서 실행되는 마이크로서비스를 사용합니다. 컨테이너는 Amazon Elastic Container Service(Amazon ECS)의 AWS Fargate에서 호스팅됩니다. 애플리케이션에는 데이터 계층으로 MYSQL DB 인스턴스용 Amazon RDS가 있으며 DNS 확인을 위해 Amazon Route 53을 사용합니다. 애플리케이션에 오류가 발생하면 Amazon CloudWatch 경보는 Amazon EventBridge 규칙을 호출합니다. 솔루션 설계자는 별도의 지역에 애플리케이션 복구를 제공하도록 DR 솔루션을 설계해야 합니다. 솔루션은 오류로부터 복구하는 데 필요한 시간을 최소화해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["별도 리전의 Fargate에 두 번째 ECS 클러스터와 ECS 서비스를 설정합니다. 다음 작업을 수행하는 AWS Lambda 함수를 생성합니다. ROS DB 인스턴스의 스냅샷을 생성합니다. 스냅샷을 별도의 리전에 복사합니다. 스냅샷에서 새 RDS DB 인스턴스를 생성하고 Route 53을 업데이트하여 두 번째 ECS 클러스터로 트래픽을 라우팅합니다. EventBridge 규칙을 업데이트하여 Lambda 함수를 호출할 대상을 추가합니다.", "별도의 지역에 두 번째 ECS 클러스터와 ECS 서비스를 생성하는 AWS Lambda 함수를 생성합니다. 다음 작업을 수행하도록 Lambda 함수를 구성합니다. thQRDS DB 인스턴스의 스냅샷을 만들고 해당 스냅샷을 별도의 리전에 복사합니다. 스냅샷에서 새 RDS DB 인스턴스를 생성합니다. 두 번째 ECS 클러스터로 트래픽을 라우팅하도록 Route 53을 업데이트합니다. EventBridge 규칙을 업데이트하여 Lambda 함수를 호출할 대상을 추가합니다.", "별도의 지역에 있는 Fargate에 두 번째 ECS 클러스터와 ECS 서비스를 설정합니다. 별도의 리전에서 RDS DB 인스턴스의 리전 간 읽기 전용 복제본을 생성합니다. 읽기 전용 복제본을 기본 데이터베이스에 할당하는 AWS Lambda 함수를 생성합니다. Route 53을 업데이트하여 두 번째 ECS 클러스터로 트래픽을 라우팅하도록 Lambda 함수를 구성합니다. EventBridge 규칙을 업데이트하여 Lambda 함수를 호출할 대상을 추가합니다.", "별도의 지역에 있는 Fargate에 두 번째 ECS 클러스터와 ECS 서비스를 설정합니다. ROS DB 인스턴스의 스냅샷을 찍습니다. 스냅샷을 Amazon DynamoDB 전역 테이블로 변환합니다. 트래픽을 두 번째 ECS 클러스터로 라우팅하도록 Route 53을 업데이트하는 AWS Lambda 함수를 생성합니다. EventBridge 규칙을 업데이트하여 Lambda 함수를 호출할 대상을 추가합니다."], "answers": [2]}, {"q": "회사에는 AWS Organizations의 조직에 속한 AWS 계정이 있습니다. 회사는 Amazon EC2 사용량을 지표로 추적하려고 합니다. 회사의 아키텍처 팀은 EC2 사용량이 지난 30일 동안의 평균 EC2 사용량보다 10% 이상 높은 경우 매일 알림을 받아야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["조직의 마스터 계정에서 AWS 예산을 구성합니다. EC2 실행 시간의 사용 유형을 지정합니다. 일일 기간을 지정합니다. AWS Cost Explorer에서 지난 30일 동안 보고된 평균 사용량보다 10% 더 높게 예산 금액을 설정합니다. 사용량 임계값이 충족되면 아키텍처 팀에 알리도록 경고를 구성합니다.", "조직의 마스터 계정에서 AWS 비용 이상 탐지를 구성합니다. AWS 서비스의 모니터 유형을 구성합니다. Amazon EC2 필터를 적용합니다. 사용량이 지난 30일 동안의 평균 사용량보다 10% 많은 경우 아키텍처 팀에 알리도록 경고 구독을 구성합니다.", "조직의 마스터 계정에서 AWS Trusted Advisor를 활성화합니다. EC2 사용량이 지난 30일 동안 보고된 평균 사용량보다 10% 더 많은 경우 아키텍처 팀에 알리도록 비용 최적화 권고 경고를 구성합니다.", "조직의 마스터 계정에서 Amazon Detective를 구성합니다. Detective가 10%가 넘는 사용 이상을 식별한 경우 아키텍처 팀에 알리도록 EC2 사용 이상 경고를 구성합니다."], "answers": [0]}, {"q": "한 전자 상거래 회사는 IT 인프라를 개편하고 있으며 AWS 서비스를 사용할 계획입니다. 회사의 CIO는 솔루션 설계자에게 간단하고 가용성이 높으며 느슨하게 결합된 주문 처리 애플리케이션을 설계해 달라고 요청했습니다. 애플리케이션은 주문을 Amazon DynamoDB 테이블에 저장하기 전에 수신하고 처리하는 역할을 담당합니다. 애플리케이션에는 산발적인 트래픽 패턴이 있으며 마케팅 캠페인 중에 확장하여 지연을 최소화하면서 주문을 처리할 수 있어야 합니다. 다음 중 요구 사항을 충족하기 위한 가장 신뢰할 수 있는 접근 방식은 무엇입니까?", "opts": ["Amazon EC2 호스팅 데이터베이스에서 주문을 받고 EC2 인스턴스를 사용하여 처리합니다.", "Amazon SQS 대기열에서 주문을 받고 AWS Lambda 함수를 호출하여 처리합니다.", "AWS Step Functions 프로그램을 사용하여 주문을 받고 Amazon ECS 컨테이너를 시작하여 처리합니다.", "Amazon Kinesis Data Streams에서 주문을 받고 Amazon EC2 인스턴스를 사용하여 처리합니다."], "answers": [1]}, {"q": "한 회사가 PostgreSQL용 Amazon RDS 데이터베이스에 액세스하는 AWS Lambda 함수를 배포하고 있습니다. 회사는 QA 환경과 프로덕션 환경에서 Lambda 기능을 시작해야 합니다. 회사는 애플리케이션 코드 내에서 자격 증명을 노출해서는 안 되며 비밀번호를 자동으로 교체해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["두 환경 모두에 대한 데이터베이스 자격 증명을 AWS Systems Manager Parameter Store에 저장하십시오. AWS Key Management Service(AWS KMS) 키를 사용하여 자격 증명을 암호화합니다. Lambda 함수의 애플리케이션 코드 내에서 Python용 AWS SDK(Bot03)를 사용하여 Parameter Store 매개변수에서 자격 증명을 가져옵니다. Parameter Store 파라미터에 대한 접근을 제공하기 위해 Lambda 함수에 역할을 추가합니다.", "QA 환경과 프로덕션 환경에 대한 고유한 키 항목을 사용하여 AWS Secrets Manager의 두 환경에 대한 데이터베이스 자격 증명을 저장합니다. 회전을 켭니다. Lambda 함수의 환경 변수로 Secrets Manager 키에 대한 참조를 제공합니다.", "AWS Key Management Service(AWS KMS)에 두 환경 모두에 대한 데이터베이스 자격 증명을 저장합니다. 회전을 켭니다. Lambda 함수에 대한 환경 변수로 AWS KMS에 저장된 자격 증명에 대한 참조를 제공합니다.", "QA 환경과 프로덕션 환경을 위해 별도의 S3 버킷을 생성합니다. S3 버킷에 대해 AWS KMS 키(SSE-KMS)를 사용하여 서버 측 암호화를 활성화합니다. 각 Lambda 함수의 애플리케이션 코드에 함수의 해당 환경에 대한 올바른 자격 증명을 가져오는 기능을 제공하는 객체 명명 패턴을 사용합니다. 각 Lambda 함수의 실행 역할에 Amazon S3에 대한 액세스 권한을 부여합니다."], "answers": [1]}, {"q": "한 회사가 AWS Control Tower를 사용하여 AWS Organizations에 속한 조직의 AWS 계정을 관리하고 있습니다. 회사에는 계정이 포함된 OU가 있습니다. 회사는 OU 계정의 신규 또는 기존 Amazon EC2 인스턴스가 퍼블릭 IP 주소를 얻지 못하도록 방지해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["AWS 시스템 관리자를 사용하도록 OU의 각 계정에 있는 모든 인스턴스를 구성합니다. 시스템 관리자 자동화 Runbook을 사용하여 퍼블릭 IP 주소가 인스턴스에 연결되는 것을 방지합니다.", "OU 계정의 인스턴스에 퍼블릭 IP 주소가 있는지 확인하기 위해 AWS Control Tower 사전 제어를 구현합니다. ssociatePubIicIpAddress 속성을 False로 설정합니다. OU에 사전 제어를 연결합니다.", "공용 IP 주소가 있는 인스턴스의 시작을 방지하는 SCP를 생성합니다. 또한 기존 인스턴스에 공용 IP 주소가 연결되지 않도록 SCP를 구성합니다. SCP를 OU에 연결합니다.", "퍼블릭 IP 주소가 있는 인스턴스를 감지하는 AWS Config 사용자 지정 규칙을 생성합니다. AWS Lambda 함수를 사용하여 인스턴스에서 퍼블릭 IP 주소를 분리하는 해결 작업을 구성합니다."], "answers": [2]}, {"q": "한 회사가 AWS에 타사 웹 애플리케이션을 배포하고 있습니다. 애플리케이션은 Docker 이미지로 패키지됩니다. 회사는 Docker 이미지를 Amazon Elastic Container Service(Amazon ECS)에 AWS Fargate 서비스로 배포했습니다. ALB(Application Load Balancer)는 트래픽을 애플리케이션으로 전달합니다. 회사는 특정 사용자 목록에만 인터넷에서 애플리케이션에 액세스할 수 있는 기능을 제공해야 합니다. 회사는 애플리케이션을 변경할 수 없으며 애플리케이션을 ID 공급자와 통합할 수도 없습니다. 모든 사용자는 다단계 인증(MFA)을 통해 인증되어야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["Amazon Cognito에서 사용자 풀을 생성합니다. 애플리케이션에 대한 풀을 구성합니다. 필요한 사용자로 풀을 채웁니다. MFA를 요구하도록 풀을 구성합니다. Amazon Cognito 호스팅 UI를 통해 인증을 요구하도록 ALB에서 리스너 규칙을 구성합니다.", "AWS Identity and Access Management(IAM)에서 사용자를 구성합니다. 사용자가 MFA를 사용하도록 요구하려면 Fargate 서비스에 리소스 정책을 연결합니다. IAM을 통한 인증을 요구하도록 ALB에서 리스너 규칙을 구성합니다.", "AWS Identity and Access Management(IAM)에서 사용자를 구성합니다. AWS IAM ID 센터(AWS Single Sign-On)를 활성화합니다. ALB에 대한 리소스 보호를 구성합니다. 사용자가 MFA를 사용하도록 요구하는 리소스 보호 규칙을 만듭니다.", "AWS Amplify에서 사용자 풀을 생성합니다. 애플리케이션에 대한 풀을 구성합니다. 필요한 사용자로 풀을 채웁니다. MFA를 요구하도록 풀을 구성합니다. Amplify 호스팅 UI를 통해 인증을 요구하도록 ALB에서 리스너 규칙을 구성합니다."], "answers": [0]}, {"q": "솔루션 아키텍트는 이전에 사용되지 않은 여러 AWS 리전에 새로운 보안 도구를 배포할 준비를 하고 있습니다. 솔루션 아키텍트는 AWS CloudFormation 스택 세트를 사용하여 도구를 배포합니다. 스택 세트의 템플릿에는 사용자 지정 이름이 있는 IAM 역할이 포함되어 있습니다. 스택 세트를 생성하면 스택 인스턴스가 성공적으로 생성되지 않습니다. 스택을 성공적으로 배포하려면 솔루션 설계자가 무엇을 해야 합니까?", "opts": ["모든 관련 계정에서 새 지역을 활성화합니다. 스택 세트를 생성하는 동안 CAPABILITY_NAMED_IAM 기능을 지정합니다.", "Service Quotas 콘솔을 사용하여 모든 관련 계정의 각 새 지역에서 CloudFormation 스택 수에 대한 할당량 증가를 요청합니다. 스택 세트를 생성하는 동안 CAPABILITYJAM 기능을 지정합니다.", "스택 세트를 생성하는 동안 CAPABILITY_NAMED_IAM 기능과 SELF_MANAGED 권한 모델을 지정합니다.", "스택 세트를 생성하는 동안 관리 역할 ARN 및 CAPABILITYJAM 기능을 지정합니다."], "answers": [0]}, {"q": "회사에는 애플리케이션 데이터베이스로 Amazon Aurora PostgreSQL DB 클러스터를 사용하는 애플리케이션이 있습니다. DB 클러스터에는 하나의 작은 기본 인스턴스와 세 개의 큰 복제본 인스턴스가 포함되어 있습니다. 애플리케이션은 AWS Lambda 함수에서 실행됩니다. 애플리케이션은 읽기 전용 작업을 수행하기 위해 데이터베이스의 복제본 인스턴스에 대한 단기 연결을 여러 개 만듭니다. 트래픽이 많은 기간에는 애플리케이션이 불안정해지고 데이터베이스에서 너무 많은 연결이 설정되고 있다고 보고합니다. 트래픽이 많은 기간의 빈도는 예측할 수 없습니다. 애플리케이션의 안정성을 향상시키는 솔루션은 무엇입니까?", "opts": ["Amazon RDS 프록시를 사용하여 DB 클러스터에 대한 프록시를 생성하십시오. 프록시에 대한 읽기 전용 끝점을 구성합니다. 프록시 엔드포인트에 연결하도록 Lambda 함수를 업데이트합니다.", "DB 클러스터의 파라미터 그룹에서 max_connections 설정을 늘립니다. DB 클러스터의 모든 인스턴스를 재부팅합니다. DB 클러스터 엔드포인트에 연결하도록 Lambda 함수를 업데이트합니다.", "DatabaseConnections 지표가 최대 연결 수 설정에 가까울 때 발생하도록 DB 클러스터에 대한 인스턴스 조정을 구성합니다. Aurora 리더 엔드포인트에 연결하도록 Lambda 함수를 업데이트합니다.", "Amazon RDS 프록시를 사용하여 DB 클러스터용 프록시를 생성합니다. 프록시에서 Aurora 데이터 API에 대한 읽기 전용 엔드포인트를 구성합니다. 프록시 엔드포인트에 연결하도록 Lambda 함수를 업데이트합니다."], "answers": [0]}, {"q": "한 소매업체가 전 세계 모든 매장에 IoT 센서를 탑재하고 있습니다. 각 센서를 제조하는 동안 회사의 사설 인증 기관(CA)은 고유 일련 번호가 포함된 X.509 인증서를 발급합니다. 그런 다음 회사는 각 인증서를 해당 센서에 배포합니다. 솔루션 아키텍트는 센서가 설치된 후 AWS로 데이터를 전송할 수 있는 기능을 센서에 부여해야 합니다. 센서는 설치될 때까지 AWS로 데이터를 보낼 수 없어야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["일련번호를 검증할 수 있는 AWS Lambda 함수를 생성합니다. AWS IoT Core 프로비저닝 템플릿을 생성합니다. 매개변수 섹션에 SerialNumber 매개변수를 포함합니다. Lambda 함수를 사전 프로비저닝 후크로 추가합니다. 제조 중에 RegisterThing API 작업을 호출하고 템플릿과 매개변수를 지정합니다.", "일련 번호를 확인할 수 있는 AWS Step Functions 상태 머신을 생성합니다. AWS IoT Core 프로비저닝 템플릿을 생성합니다. 매개변수 섹션에 SerialNumber 매개변수를 포함합니다. 매개변수를 검증하려면 Step Functions 상태 시스템을 지정하세요. 설치 중에 StartThingRegistrationTask API 작업을 호출합니다.", "일련번호를 검증할 수 있는 AWS Lambda 함수를 생성합니다. AWS IoT Core 프로비저닝 템플릿을 생성합니다. 매개변수 섹션에 SerialNumber 매개변수를 포함합니다. Lambda 함수를 사전 프로비저닝 후크로 추가합니다. AWS IoT Core에 CA를 등록하고, 프로비저닝 템플릿을 지정하고, Allow-auto-registration 매개변수를 설정합니다.", "AWS IoT Core 프로비저닝 템플릿을 생성합니다. 매개변수 섹션에 SerialNumber 매개변수를 포함합니다. 템플릿에 매개변수 검증을 포함합니다. CA를 사용하는 각 장치에 대해 청구 인증서와 프라이빗 키를 프로비저닝합니다. 프로비저닝 중에 AWS IoT 사물을 업데이트할 수 있는 AWS IoT Core 서비스 권한을 부여합니다."], "answers": [2]}, {"q": "한 스타트업 회사는 최근 대규모 전자 상거래 웹사이트를 AWS로 마이그레이션했습니다. 웹사이트 매출이 70% 증가했습니다. 소프트웨어 엔지니어는 개인 GitHub 저장소를 사용하여 코드를 관리하고 있습니다. DevOps 팀은 빌드 및 단위 테스트에 Jenkins를 사용하고 있습니다. 엔지니어는 배포 중에 잘못된 빌드와 가동 중지 시간에 대한 알림을 받아야 합니다. 또한 엔지니어는 프로덕션 변경 사항이 사용자에게 원활하게 전달되고 중대한 문제가 발생할 경우 롤백될 수 있는지 확인해야 합니다. 소프트웨어 엔지니어는 AWS CodePipeline을 사용하여 빌드 및 배포 프로세스를 관리하기로 결정했습니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["GitHub 웹소켓을 사용하여 CodePipeline 파이프라인을 트리거하십시오. AWS CodeBuild용 Jenkins 플러그인을 사용하여 단위 테스트를 수행합니다. 잘못된 빌드에 대해 Amazon SNS 주제에 알림을 보냅니다. AWS CodeDeploy를 사용하여 전체 동시 배포 구성으로 배포합니다.", "GitHub 웹훅을 사용하여 CodePipeline 파이프라인을 트리거합니다. AWS CodeBuild용 Jenkins 플러그인을 사용하여 단위 테스트를 수행합니다. 잘못된 빌드에 대해 Amazon SNS 주제에 알림을 보냅니다. AWS CodeDeploy를 사용하여 블루/그린 배포로 배포합니다.", "GitHub 웹소켓을
