"answers": [1]}, {"q": "한 회사에 데이터 계층이 단일 AWS 리전에 배포된 중요한 애플리케이션이 있습니다. 데이터 계층은 Amazon DynamoDB 테이블과 Amazon Aurora MySQL DB 클러스터를 사용합니다. 현재 Aurora MySQL 엔진 버전은 글로벌 데이터베이스를 지원합니다. 애플리케이션 계층은 이미 두 지역에 배포되었습니다. 회사 정책에 따르면 중요한 애플리케이션에는 애플리케이션 계층 구성 요소와 데이터 계층 구성 요소가 두 지역에 걸쳐 배포되어야 합니다. RTO 및 RPO는 각각 몇 분을 넘지 않아야 합니다. 솔루션 설계자는 데이터 계층이 회사 정책을 준수하도록 하는 솔루션을 권장해야 합니다. 이러한 요구 사항을 충족하는 단계 조합은 무엇입니까? (2개 선택)", "opts": ["Aurora MySQL DB 클러스터에 다른 리전 추가", "Aurora MySQL DB 클러스터의 각 테이블에 다른 리전 추가", "DynamoDB 테이블 및 Aurora MySQL DB 클러스터에 대한 예약된 교차 리전 백업 설정", "구성에 다른 리전을 추가하여 기존 DynamoDB 테이블을 전역 테이블로 변환", "Amazon Route 53 Application Recovery Controller를 사용하여 보조 리전으로 데이터베이스 백업 및 복구 자동화"], "answers": [0, 3]}, {"q": "통신 회사는 AWS에서 애플리케이션을 실행하고 있습니다. 회사는 회사의 온프레미스 데이터 센터와 AWS 간에 AWS Direct Connect 연결을 설정했습니다. 회사는 내부 Application Load Balancer(ALB) 뒤에 있는 여러 가용 영역의 Amazon EC2 인스턴스에 애플리케이션을 배포했습니다. 회사의 클라이언트는 HTTPS를 사용하여 온프레미스 네트워크에서 연결합니다. TLS는 ALB에서 종료됩니다. 회사에는 여러 대상 그룹이 있으며 경로 기반 라우팅을 사용하여 URL 경로를 기반으로 요청을 전달합니다. 회사는 IP 주소를 기반으로 하는 허용 목록을 사용하여 온프레미스 방화벽 어플라이언스를 배포할 계획입니다. 솔루션 설계자는 클라이언트가 애플리케이션에 계속 액세스할 수 있도록 온프레미스 네트워크에서 AWS로의 트래픽 흐름을 허용하는 솔루션을 개발해야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["고정 IP 주소를 사용하도록 기존 ALB를 구성합니다. 여러 가용 영역의 IP 주소를 ALB에 할당합니다. 방화벽 어플라이언스에 ALB IP 주소를 추가합니다.", "NLB(Network Load Balancer)를 생성합니다. NLB를 여러 가용 영역에 있는 하나의 정적 IP 주소와 연결합니다. NLB에 대한 ALB 유형 대상 그룹을 생성하고 방화벽 어플라이언스에 기존 ALAdd the NLB IP 주소를 추가합니다. NLB에 연결하도록 클라이언트를 업데이트합니다.", "NLB(Network Load Balancer)를 생성합니다. LNB를 여러 가용 영역에 있는 하나의 고정 IP 주소와 연결합니다. 기존 대상 그룹을 NLB에 추가하십시오. NLB에 연결하도록 클라이언트를 업데이트합니다. ALB 삭제 방화벽 어플라이언스에 NLB IP 주소를 추가합니다.", "게이트웨이 로드 밸런서(GWLB)를 생성합니다. 여러 가용 영역에서 GWLB에 고정 IP 주소를 할당합니다. GWLB에 대한 ALB 유형 대상 그룹을 생성하고 기존 ALB를 추가합니다. 방화벽 어플라이언스에 GWLB IP 주소를 추가합니다. GWLB에 연결하도록 클라이언트를 업데이트합니다."], "answers": [1]}, {"q": "회사는 인터넷 연결 Application Load Balancer(ALB) 뒤에 있는 프라이빗 서브넷에 있는 Amazon EC2 인스턴스 플릿에서 애플리케이션을 실행합니다. ALB는 Amazon CloudFront 배포의 오리진입니다. 다양한 AWS 관리형 규칙을 포함하는 AWS WAF 웹 ACL은 CloudFront 배포와 연결됩니다. 회사는 인터넷 트래픽이 ALB에 직접 액세스하지 못하도록 하는 솔루션이 필요합니다. 최소한의 운영 오버헤드로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["기존 웹 ACL에 포함된 것과 동일한 규칙을 포함하는 새 웹 ACL을 생성합니다. 새 웹 ACL을 ALB와 연결합니다.", "기존 웹 ACL을 ALB와 연결합니다.", "ALB에 보안 그룹 규칙을 추가하여 CloudFront에 대해서만 AWS 관리형 접두사 목록의 트래픽을 허용합니다.", "다양한 CloudFront IP 주소 범위만 허용하도록 보안 그룹 규칙을 ALB에 추가합니다."], "answers": [2]}, {"q": "회사는 Redis용 Amazon ElastiCache 클러스터를 캐싱 계층으로 사용하는 애플리케이션을 실행하고 있습니다. 최근 보안 감사에서 회사가 ElastiCache에 대해 저장된 데이터 암호화를 구성한 것으로 나타났습니다. 그러나 회사는 전송 중 암호화를 사용하도록 ElastiCache를 구성하지 않았습니다. 또한 사용자는 인증 없이 캐시에 액세스할 수 있습니다. 솔루션 설계자는 사용자 인증을 요구하고 회사가 엔드투엔드 암호화를 사용하도록 변경해야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["AUTH 토큰을 생성합니다. 토큰을 AWS System Manager Parameter Store에 암호화된 매개변수로 저장합니다. AUTH로 새 클러스터를 만들고 전송 중 암호화를 구성합니다. 필요한 경우 Parameter Store에서 AUTH 토큰을 검색하고 인증에 AUTH 토큰을 사용하도록 애플리케이션을 업데이트합니다.", "AUTH 토큰을 생성합니다. AWS Secrets Manager에 토큰을 저장합니다. AUTH 토큰을 사용하도록 기존 클러스터를 구성하고 전송 중 암호화를 구성합니다. 필요한 경우 Secrets Manager에서 AUTH 토큰을 검색하고 인증에 AUTH 토큰을 사용하도록 애플리케이션을 업데이트합니다.", "SSL 인증서를 생성합니다. AWS Secrets Manager에 인증서를 저장합니다. 새 클러스터를 만들고 전송 중 암호화를 구성합니다. 필요한 경우 Secrets Manager에서 SSL 인증서를 검색하고 인증에 인증서를 사용하도록 애플리케이션을 업데이트합니다.", "SSL 인증서를 생성합니다. 인증서를 암호화된 고급 파라미터로 AWS Systems Manager Parameter Store에 저장합니다. 기존 클러스터를 업데이트하여 전송 중 암호화를 구성합니다. 필요한 경우 Parameter Store에서 SSL 인증서를 검색하고 인증에 인증서를 사용하도록 애플리케이션을 업데이트합니다."], "answers": [1]}, {"q": "회사는 Auto Scaling 그룹에 있는 Amazon EC2 스팟 인스턴스를 사용하여 컴퓨팅 워크로드를 실행하고 있습니다. 시작 템플릿은 두 개의 배치 그룹과 단일 인스턴스 유형을 사용합니다. 최근 모니터링 시스템에서 시스템 사용자의 대기 시간이 길어지는 Auto Scaling 인스턴스 시작 실패를 보고했습니다. 회사는 워크로드의 전반적인 안정성을 개선해야 합니다. 이 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["시작 템플릿을 시작 구성으로 교체하여 속성 기반 인스턴스 유형 선택을 사용하는 Auto Scaling 그룹을 사용합니다.", "속성 기반 인스턴스 유형 선택을 사용하는 새로운 시작 템플릿 버전을 생성합니다. 새 시작 템플릿 버전을 사용하도록 Auto Scaling 그룹을 구성합니다.", "시작 템플릿 Auto Scaling 그룹을 업데이트하여 배치 그룹 수를 늘립니다.", "더 큰 인스턴스 유형을 사용하도록 시작 템플릿을 업데이트합니다."], "answers": [1]}, {"q": "회사에서 문서 처리 워크로드를 AWS로 마이그레이션하고 있습니다. 이 회사는 기본적으로 Amazon S3 API를 사용하여 처리 서버가 초당 약 5개의 문서 속도로 생성하는 문서를 저장, 검색 및 수정하도록 많은 애플리케이션을 업데이트했습니다. 문서 처리가 완료되면 고객은 Amazon S3에서 직접 문서를 다운로드할 수 있습니다. 마이그레이션 과정에서 회사는 S3 API를 지원하기 위해 많은 문서를 생성하는 처리 서버를 즉시 업데이트할 수 없음을 발견했습니다. 서버는 Linux에서 실행되며 서버가 생성하고 수정하는 파일에 대한 빠른 로컬 액세스가 필요합니다. 서버가 처리를 마치면 파일을 30분 이내에 다운로드할 수 있도록 대중이 사용할 수 있어야 합니다. 최소한의 노력으로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["애플리케이션을 AWS Lambda 함수로 마이그레이션합니다. Java용 AWS SDK를 사용하여 회사에서 Amazon S3에 직접 저장하는 파일을 생성, 수정 및 액세스합니다.", "Amazon S3 파일 게이트웨이를 설정하고 문서 저장소에 연결된 파일 공유를 구성합니다. NFS를 사용하여 Amazon EC2 인스턴스에 파일 공유를 탑재합니다. Amazon S3에서 변경 사항이 발생하면 RefreshCache API 호출을 시작하여 S3 파일 게이트웨이를 업데이트합니다.", "가져오기 및 내보내기 정책으로 Amazon FSx for Lustre를 구성합니다. 새 파일 시스템을 S3 버킷에 연결합니다. NFS를 사용하여 Lustre 클라이언트를 설치하고 문서 저장소를 Amazon EC2 인스턴스에 마운트합니다.", "Amazon EC2 인스턴스에 연결하도록 AWS DataSync를 구성합니다. 생성된 파일을 Amazon S3와 동기화하도록 작업을 구성합니다."], "answers": [1]}, {"q": "배송 회사는 AWS 클라우드에서 서버리스 솔루션을 실행하고 있습니다. 이 솔루션은 사용자 데이터, 배송 정보 및 과거 구매 내역을 관리합니다. 이 솔루션은 여러 마이크로 서비스로 구성됩니다. 중앙 사용자 서비스는 민감한 데이터를 Amazon DynamoDB 테이블에 저장합니다. 다른 여러 마이크로 서비스는 민감한 데이터의 일부 사본을 다른 스토리지 서비스에 저장합니다. 회사는 요청 시 사용자 정보를 삭제할 수 있는 권한이 필요합니다. 중앙 사용자 서비스가 사용자를 삭제하는 즉시 다른 모든 마이크로 서비스도 데이터 복사본을 즉시 삭제해야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["DynamoDB 테이블에서 DynamoDB 스트림을 활성화합니다. Amazon Simple Queue Service(Amazon SQS) 대기열에서 사용자 삭제에 대한 이벤트를 게시할 DynamoDB 스트림에 대한 AWS Lambda 트리거를 생성합니다. 대기열을 폴링하고 DynamoDB 테이블에서 사용자를 삭제하도록 각 마이크로 서비스를 구성합니다.", "DynamoDB 테이블에서 DynamoDB 이벤트 알림을 설정합니다. DynamoDB 이벤트 알림의 대상으로 Amazon Simple Notification Service(Amazon SNS) 주제를 생성합니다. SNS 주제를 구독하고 DynamoDB 테이블에서 사용자를 삭제하도록 각 마이크로서비스를 구성합니다.", "회사에서 사용자를 삭제할 때 사용자 지정 Amazon EventBridge 이벤트 버스에 이벤트를 게시하도록 중앙 사용자 서비스를 구성합니다. 각 마이크로 서비스에 대한 EventBridge 규칙을 생성하여 사용자 삭제 이벤트 패턴과 일치시키고 마이크로 서비스의 로직을 호출하여 DynamoDB 테이블에서 사용자를 삭제합니다.", "회사에서 사용자를 삭제할 때 Amazon Simple Queue Service(Amazon SQS) 대기열에 메시지를 게시하도록 중앙 사용자 서비스를 구성합니다. SQS 대기열에 이벤트 필터를 생성하고 DynamoDB 테이블에서 사용자를 삭제하도록 각 마이크로서비스를 구성합니다."], "answers": [2]}, {"q": "회사가 VPC에서 웹 애플리케이션을 실행하고 있습니다. 웹 애플리케이션은 ALB(Application Load Balancer) 뒤의 Amazon EC2 인스턴스 그룹에서 실행됩니다. ALB는 AWS WAF를 사용하고 있습니다. 외부 고객은 웹 애플리케이션에 연결해야 합니다. 회사는 모든 외부 고객에게 IP 주소를 제공해야 합니다. 최소한의 운영 오버헤드로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["ALB를 NLB(Network Load Balancer)로 교체합니다. NLB에 탄력적 IP 주소를 할당합니다.", "탄력적 IP 주소를 할당합니다. 탄력적 IP 주소를 ALP에 할당 고객에게 탄력적 IP 주소를 제공합니다.", "AWS Global Accelerator 표준 가속기를 생성합니다. 가속기의 끝점으로 ALB를 지정합니다. 액셀러레이터의 IP 주소를 고객에게 제공합니다.", "Amazon CloudFront 배포를 구성합니다. ALB를 원점으로 설정합니다. 배포의 DNS 이름을 ping하여 배포의 퍼블릭 IP 주소를 확인합니다. 고객에게 IP 주소를 제공합니다."], "answers": [2]}, {"q": "회사는 개발용 AWS 계정이 몇 개 있고 프로덕션 애플리케이션을 AWS로 이동하려고 합니다. 회사는 유휴 상태의 Amazon Elastic Block Store(Amazon EBS) 암호화를 현재 프로덕션 계정과 향후 프로덕션 계정에만 적용해야 합니다. 이 회사는 빌트인 청사진과 가드레일을 포함하는 솔루션이 필요합니다. 이러한 요구 사항을 충족하는 단계 조합은 무엇입니까? (3개 선택)", "opts": ["AWS CloudFormation StackSets를 사용하여 프로덕션 계정에 AWS Config 규칙을 배포합니다.", "기존 개발자 계정에서 새 AWS Control Tower 랜딩 존을 생성합니다. 계정에 대한 OU를 만듭니다. 프로덕션 및 개발 OU에 각각 프로덕션 및 개발 계정을 추가합니다.", "회사의 마스터 계정에서 새로운 AWS Control Tower 랜딩 존을 생성합니다. 프로덕션 및 개발 OU에 프로덕션 및 개발 계정을 추가합니다. 각기.", "AWS Organizations에서 조직에 가입하도록 기존 계정을 초대합니다. 준수를 보장하기 위해 SCP를 생성합니다.", "마스터 계정에서 가드레일을 생성하여 EBS 암호화를 감지합니다.", "프로덕션 OU에 대한 가드레일을 생성하여 EBS 암호화를 감지합니다."], "answers": [2, 3, 5]}, {"q": "한 회사가 Amazon RDS for MySQL 데이터베이스가 있는 Application Load Balancer(ALB) 뒤에 있는 두 개의 Linux Amazon EC2 인스턴스에서 중요한 상태 저장 웹 애플리케이션을 실행하고 있습니다. 회사는 Amazon Route 53에서 애플리케이션에 대한 DNS 레코드를 호스팅합니다. 솔루션 설계자는 애플리케이션의 복원력을 개선하기 위한 솔루션을 추천해야 합니다. 솔루션은 다음 목표를 충족해야 합니다. • 애플리케이션 계층: RPO 2분. 30분의 RTO • 데이터베이스 계층: 5분의 RPO. 30분의 RTO 회사는 기존 애플리케이션 아키텍처를 크게 변경하기를 원하지 않습니다. 회사는 장애 조치 후 최적의 대기 시간을 보장해야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["AWS Elastic Disaster Recovery를 사용하도록 EC2 인스턴스를 구성합니다. RDS DB 인스턴스에 대한 리전 간 읽기 전용 복제본을 생성합니다. 두 번째 AWS 리전에서 ALB를 생성합니다. AWS Global Accelerator 엔드포인트를 생성하고 엔드포인트를 ALB와 연결합니다. Global Accelerator 끝점을 가리키도록 DNS 레코드를 업데이트합니다.", "Amazon Data Lifecycle Manager(Amazon DLM)를 사용하여 EBS 볼륨의 스냅샷을 생성하도록 EC2 인스턴스를 구성합니다. RDS 자동 백업을 구성합니다. 두 번째 AWS 리전에 대한 백업 복제를 구성합니다. 두 번째 리전에서 ALB를 생성합니다. AWS Global Accelerator 엔드포인트를 생성하고 엔드포인트를 ALB와 연결합니다. Global Accelerator 끝점을 가리키도록 DNS 레코드를 업데이트합니다.", "AWS Backup에서 EC2 인스턴스 및 RDS DB 인스턴스에 대한 백업 계획을 생성합니다. 두 번째 AWS 리전에 대한 백업 복제를 구성합니다. 두 번째 리전에서 ALB를 생성합니다. ALB 앞에 Amazon CloudFront 배포를 구성합니다. CloudFront를 가리키도록 DNS 레코드를 업데이트합니다.", "Amazon Data Lifecycle Manager(Amazon DLM)를 사용하여 EBS 볼륨의 스냅샷을 생성하도록 EC2 인스턴스를 구성합니다. RDS DB 인스턴스에 대한 리전 간 읽기 전용 복제본을 생성합니다. 두 번째 AWS 리전에서 ALB를 생성합니다. AWS Global Accelerator 엔드포인트를 생성하고 엔드포인트를 ALB와 연결합니다."], "answers": [0]}, {"q": "솔루션 아키텍트는 비용을 최적화하고 단일 AWS 계정에서 Amazon EC2 인스턴스의 크기를 적절하게 조정하려고 합니다. 솔루션 아키텍트는 인스턴스가 CPU, 메모리 및 네트워크 메트릭을 기반으로 최적화되었는지 확인하려고 합니다. 솔루션 설계자는 이러한 요구 사항을 충족하기 위해 어떤 단계 조합을 수행해야 합니까? (2개 선택)", "opts": ["해당 계정에 대해 AWS Business Support 또는 AWS Enterprise Support를 구매합니다.", "AWS Trusted Advisor를 켜고 \"사용률이 낮은 Amazon EC2 인스턴스\" 권장 사항을 검토합니다.", "Amazon CloudWatch 에이전트를 설치하고 EC2 인스턴스에서 메모리 메트릭 수집을 구성합니다.", "결과 및 최적화 권장 사항을 수신하도록 AWS 계정에서 AWS Compute Optimizer를 구성합니다.", "관심 있는 AWS 리전, 인스턴스 제품군 및 운영 체제에 대한 EC2 인스턴스 절감 계획을 생성합니다."], "answers": [2, 3]}, {"q": "회사에서 AWS CodeCommit 리포지토리를 사용합니다. 회사는 두 번째 AWS 리전의 리포지토리에 있는 데이터의 백업 복사본을 저장해야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["CodeCommit 리포지토리 데이터를 두 번째 리전에 복제하도록 AWS Elastic Disaster Recovery를 구성합니다.", "AWS Backup을 사용하여 매시간 일정에 따라 CodeCommit 리포지토리를 백업합니다. 두 번째 리전에서 리전 간 복사본을 생성합니다.", "회사가 코드를 리포지토리에 푸시할 때 AWS CodeBuild를 호출하는 Amazon EventBridge 규칙을 생성합니다. CodeBuild를 사용하여 리포지토리를 복제합니다. 콘텐츠의 .zip 파일을 만듭니다. 두 번째 리전의 S3 버킷에 파일을 복사합니다.", "시간별 일정에 따라 AWS Step Functions 워크플로를 생성하여 CodeCommit 리포지토리의 스냅샷을 생성합니다. 두 번째 리전의 S3 버킷에 스냅샷을 복사하도록 워크플로 구성 합니다."], "answers": [2]}, {"q": "회사에는 각각 AWS에 별도의 계정이 있는 여러 비즈니스 단위가 있습니다. 각 사업부는 CIDR 범위가 겹치는 여러 VPC로 자체 네트워크를 관리합니다. 회사의 마케팅 팀은 새로운 내부 응용 프로그램을 만들었고 다른 모든 비즈니스 단위에서 응용 프로그램에 액세스할 수 있도록 하려고 합니다. 솔루션은 사설 IP 주소만 사용해야 합니다. 최소한의 운영 오버헤드로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["각 사업부에 지시하여 사업부의 VPC에 고유한 보조 CIDR 범위를 추가합니다. VPC를 피어링하고 보조 범위의 프라이빗 NAT 게이트웨이를 사용하여 트래픽을 마케팅 팀으로 라우팅합니다.", "마케팅 계정의 VPC에서 가상 어플라이언스 역할을 할 Amazon EC2 인스턴스를 생성합니다. 마케팅 팀과 각 사업부의 VPC 간에 AWS Site-to-Site VPN 연결을 생성합니다. 필요한 경우 NAT를 수행합니다.", "마케팅 애플리케이션을 공유할 AWS PrivateLink 엔드포인트 서비스를 생성합니다. 서비스에 연결할 수 있도록 특정 AWS 계정에 권한을 부여합니다. 프라이빗 IP 주소를 사용하여 애플리케이션에 액세스하려면 다른 계정에 인터페이스 VPC 엔드포인트를 생성합니다.", "프라이빗 서브넷의 마케팅 애플리케이션 앞에 NLB(Network Load Balancer)를 생성합니다. API 게이트웨이 API를 생성합니다. Amazon API Gateway 프라이빗 통합을 사용하여 API를 NLB에 연결합니다. API에 대한 IAM 승인을 활성화합니다. 다른 사업부의 계정에 대한 액세스 권한을 부여합니다."], "answers": [2]}, {"q": "회사는 새로 취득한 AWS 계정의 보안 태세를 감사해야 합니다. 회사의 데이터 보안 팀은 Amazon S3 버킷이 공개적으로 노출될 때만 알림을 요구합니다. 회사는 데이터 보안 팀의 이메일 주소가 구독된 Amazon Simple Notification Service(Amazon SNS) 주제를 이미 설정했습니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["isPublic 이벤트에 대한 모든 S3 버킷에서 S3 이벤트 알림을 생성합니다. 이벤트 알림 대상으로 SNS 주제를 선택합니다.", "AWS Identity and Access Management Access Analyzer에서 분석기를 생성합니다. \"isPublic: true\"에 대한 필터를 사용하여 이벤트 유형 \"액세스 분석기 결과\"에 대한 Amazon EventBridge 규칙을 생성합니다. EventBridge 규칙 대상으로 SNS 주제를 선택합니다.", "\"PutBucketPolicy\"에 대한 필터를 사용하여 이벤트 유형 \"CloudTrail을 통한 버킷 수준 API 호출\"에 대한 Amazon EventBridge 규칙을 생성합니다. EventBridge 규칙 대상으로 SNS 주제를 선택합니다.", "AWS Config를 활성화하고 cloudtrail-s3-dataevents-enabled 규칙을 추가합니다. \"NON_COMPLIANT\"에 대한 필터를 사용하여 이벤트 유형 \"Config Rules Re-evaluation Status\"에 대한 Amazon EventBridge 규칙을 생성합니다. EventBridge 규칙 대상으로 SNS 주제를 선택합니다."], "answers": [1]}, {"q": "솔루션 설계자는 새로 인수한 회사의 애플리케이션 및 데이터베이스 포트폴리오를 평가해야 합니다. 솔루션 설계자는 포트폴리오를 AWS로 마이그레이션하기 위한 비즈니스 사례를 생성해야 합니다. 새로 인수한 회사는 온프레미스 데이터 센터에서 애플리케이션을 실행합니다. 데이터 센터는 잘 문서화되어 있지 않습니다. 솔루션 설계자는 존재하는 애플리케이션과 데이터베이스의 수를 즉시 확인할 수 없습니다. 애플리케이션의 트래픽은 가변적입니다. 일부 응용 프로그램은 매달 말에 실행되는 배치 프로세스입니다. 솔루션 설계자는 AWS로의 마이그레이션을 시작하기 전에 포트폴리오를 더 잘 이해해야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["AWS Server Migration Service(AWS SMS) 및 AWS Database Migration Service(AWS DMS)를 사용하여 마이그레이션을 평가합니다. AWS Service Catalog를 사용하여 애플리케이션 및 데이터베이스 종속성을 이해합니다.", "AWS 애플리케이션 마이그레이션 서비스를 사용합니다. 온프레미스 인프라에서 에이전트를 실행합니다. AWS Migration Hub를 사용하여 에이전트를 관리합니다. AWS Storage Gateway를 사용하여 로컬 스토리지 요구 사항 및 데이터베이스 종속성을 평가 ata Exchange를 Redshift 클러스터에 연결하여 AWS Data Exchange 데이터 공유를 생성합니다. 구독 확인을 구성합니다. 데이터 고객이 데이터 제품을 구독하도록 요구합니다.", "Amazon Redshift 테이블에서 Amazon S3 버킷으로 데이터를 주기적으로 다운로드합니다. S3용 AWS Data Exchange를 사용하여 고객과 데이터를 공유하십시오. 구독 확인을 구성합니다. 데이터 고객이 데이터 제품을 구독하도록 요구합니다.", "AWS Data Exchange의 Open Data에 Amazon Redshift 데이터를 게시합니다. 고객이 AWS Data Exchange에서 데이터 제품을 구독하도록 요구합니다. 데이터를 생산하는 회사의 AWS 계정에서 IAM 리소스 기반 정책을 Amazon Redshift 테이블에 연결하여 확인된 AWS 계정에만 액세스할 수 있도록 합니다."], "answers": [1]}, {"q": "솔루션 설계자가 이벤트를 처리하는 솔루션을 설계하고 있습니다. 솔루션에는 솔루션이 수신하는 이벤트 수에 따라 확장 및 축소할 수 있는 기능이 있어야 합니다. 처리 오류가 발생하면 이벤트는 검토를 위해 별도의 대기열로 이동해야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["Amazon Simple Notification Service(Amazon SNS) 주제로 이벤트 세부 정보를 보냅니다. 이벤트를 처리할 SNS 주제에 대한 구독자로 AWS Lambda 함수를 구성합니다. 기능에 실패 시 대상을 추가합니다. Amazon Simple Queue Service(Amazon SQS) 대기열을 대상으로 설정합니다.", "Amazon Simple Queue Service(Amazon SQS) 대기열에 이벤트를 게시합니다. Amazon EC2 Auto Scaling 그룹을 생성합니다. 대기열의 ApproximateAgeOfOldestMessage 지표를 기반으로 확장 및 축소하도록 Auto Scaling 그룹을 구성합니다. 배달 못한 편지 큐에 실패한 메시지를 쓰도록 애플리케이션을 구성합니다.", "Amazon DynamoDB 테이블에 이벤트를 씁니다. 테이블에 대한 DynamoDB 스트림을 구성합니다. AWS Lambda 함수를 호출하도록 스트림을 구성합니다. 이벤트를 처리하도록 Lambda 함수를 구성합니다.", "Amazon EventBndge 이벤트 버스에 이벤트를 게시합니다. Application Load Balancer(ALB) 뒤에 있는 Auto Scaling 그룹이 있는 Amazon EC2 인스턴스에서 애플리케이션을 생성하고 실행합니다. ALB를 이벤트 버스 대상으로 설정합니다. 이벤트를 재시도하도록 이벤트 버스를 구성하십시오. 애플리케이션이 메시지를 처리할 수 없는 경우 배달 못한 편지 대기열에 메시지를 씁니다."], "answers": [0]}, {"q": "회사는 AWS 클라우드에서 처리 엔진을 실행합니다. 엔진은 물류 센터의 환경 데이터를 처리하여 지속 가능성 지수를 계산합니다. 이 회사는 유럽 전역에 퍼져 있는 물류 센터에 수백만 대의 장치를 보유하고 있습니다. 장치는 RESTful API를 통해 처리 엔진에 정보를 보냅니다. API는 예측할 수 없는 트래픽 폭증을 경험합니다. 회사는 장치가 처리 엔진으로 보내는 모든 데이터를 처리하는 솔루션을 구현해야 합니다. 데이터 손실은 허용되지 않습니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["RESTful API용 Application Load Balancer(ALB)를 생성합니다. Amazon Simple Queue Service(Amazon SQS) 대기열을 생성합니다. ALB에 대한 리스너 및 대상 그룹 생성 SQS 대기열을 대상으로 추가합니다. Fargate 시작 유형으로 Amazon Elastic Container Service(Amazon ECS)에서 실행되는 컨테이너를 사용하여 대기열의 메시지를 처리합니다.", "RESTful API를 구현하는 Amazon API Gateway HTTP API를 생성합니다. Amazon Simple Queue Service(Amazon SQS) 대기열을 생성합니다. SQS 대기열과 API 게이트웨이 서비스 통합을 생성합니다. SQS 대기열의 메시지를 처리하는 AWS Lambda 함수를 생성합니다.", "RESTful API를 구현하는 Amazon API Gateway REST API를 생성합니다. Auto Scaling 그룹에서 Amazon EC2 인스턴스 플릿을 생성합니다. API Gateway Auto Scaling 그룹 프록시 통합을 생성합니다. EC2 인스턴스를 사용하여 수신 데이터를 처리합니다.", "RESTful API용 Amazon CloudFront 배포를 생성합니다. Amazon Kinesis Data Streams에서 데이터 스트림을 생성합니다. 데이터 스트림을 배포 원본으로 설정합니다. 데이터 스트림에서 데이터를 소비하고 처리하는 AWS Lambda 함수를 생성합니다."], "answers": [1]}, {"q": "회사는 AWS 클라우드에서 네트워크 구성을 설계하고 있습니다. 이 회사는 AWS Organizations를 사용하여 다중 계정 설정을 관리합니다. 회사에는 세 개의 OU가 있습니다. 각 OU에는 100개가 넘는 AWS 계정이 포함되어 있습니다. 각 계정에는 단일 VPC가 있으며 각 OU의 모든 VPC는 동일한 AWS 리전에 있습니다. 모든 AWS 계정의 CIDR 범위는 겹치지 않습니다. 회사는 동일한 OU에 있는 VPC가 서로 통신할 수 있지만 다른 OU에 있는 VPC와 통신할 수 없는 솔루션을 구현해야 합니다. 최소한의 운영 오버헤드로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["각 OU의 계정 간에 VPC 피어링을 설정하는 AWS CloudFormation 스택 세트를 생성합니다. 각 OU에 스택 세트를 프로비저닝합니다.", "각 OU에서 단일 VPC가 있는 전용 네트워킹 계정을 만듭니다. AWS Resource Access Manager(AWS RAM)를 사용하여 OU의 다른 모든 계정과 이 VPC를 공유합니다. 네트워킹 계정과 OU의 각 계정 간에 VPC 피어링 연결을 만듭니다.", "각 OU의 계정에서 전송 게이트웨이를 프로비저닝합니다. AWS Resource Access Manager(AWS RAM)를 사용하여 조직 전체에서 전송 게이트웨이를 공유합니다. 각 VPC에 대한 전송 게이트웨이 VPC 연결을 생성합니다.", "각 OU에서 단일 VPC가 있는 전용 네트워킹 계정을 만듭니다. 네트워킹 계정과 OU의 다른 계정 간에 VPN 연결을 설정합니다. 타사 라우팅 소프트웨어를 사용하여 VPC 간에 전환 트래픽을 라우팅합니다."], "answers": [2]}, {"q": "회사에서 애플리케이션을 AWS로 마이그레이션하고 있습니다. 마이그레이션 중에 완전 관리형 서비스를 최대한 많이 사용하려고 합니다. 회사는 다음 요구 사항에 따라 응용 프로그램 내에 큰 중요 문서를 저장해야 합니다. 1. 데이터는 내구성과 가용성이 높아야 합니다. 2. 저장 및 전송 중에 데이터를 항상 암호화해야 합니다. 3. 암호화 키는 회사에서 관리하고 주기적으로 교체해야 합니다. 솔루션 설계자는 다음 중 어떤 솔루션을 권장해야 합니까?", "opts": ["파일 게이트웨이 모드에서 스토리지 게이트웨이를 AWS에 배포합니다. AWS KMS 키를 사용하는 Amazon EBS 볼륨 암호화를 사용하여 스토리지 게이트웨이 볼륨을 암호화합니다.", "버킷 정책과 함께 Amazon S3를 사용하여 버킷 연결에 HTTPS를 적용하고 객체 암호화에 서버 측 암호화 및 AWS KMS를 적용합니다.", "SSL과 함께 Amazon DynamoDB를 사용하여 DynamoDB에 연결합니다. AWS KMS 키를 사용하여 저장된 DynamoDB 객체를 암호화합니다.", "이 데이터를 저장하기 위해 Amazon EBS 볼륨이 연결된 인스턴스를 배포합니다. AWS KMS 키를 사용하는 EBS 볼륨 암호화를 사용하여 데이터를 암호화합니다."], "answers": [1]}, {"q": "회사의 공개 API는 Amazon Elastic Container Service(Amazon ECS)에서 작업으로 실행됩니다. 작업은 Application Load Balancer(ALB) 뒤에 있는 AWS Fargate에서 실행되며 CPU 사용률을 기반으로 작업에 대해 Service Auto Scaling으로 구성됩니다. 이 서비스는 몇 달 동안 잘 운영되고 있습니다. 최근에 API 성능이 느려지고 애플리케이션을 사용할 수 없게 되었습니다. 이 회사는 API에 대해 상당한 수의 SQL 주입 공격이 발생했으며 API 서비스가 최대 규모로 확장되었음을 발견했습니다. 솔루션 설계자는 SQL 인젝션 공격이 ECS API 서비스에 도달하지 못하도록 방지하는 솔루션을 구현해야 합니다. 솔루션은 합법적인 트래픽을 허용해야 하며 운영 효율성을 극대화해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["새 AWS WAF 웹 ACL을 생성하여 ECS 작업 앞에서 ALB로 전달되는 HTTP 요청 및 HTTPS 요청을 모니터링합니다.", "새로운 AWS WAF Bot Control 구현을 생성합니다. AWS WAF Bot Control 관리형 규칙 그룹에 규칙을 추가하여 트래픽을 모니터링하고 ECS 작업 앞의 ALB에 대한 적법한 트래픽만 허용합니다.", "새로운 AWS WAF 웹 ACL을 생성합니다. SQL 데이터베이스 규칙 그룹과 일치하는 요청을 차단하는 새 규칙을 추가합니다. 해당 규칙과 일치하지 않는 다른 모든 트래픽을 허용하도록 웹 ACL을 설정합니다. ECS 작업 앞의 ALB에 웹 ACL을 연결합니다.", "새 AWS WAF 웹 ACL을 생성합니다. AWS WAF에서 새로운 빈 IP 세트를 생성합니다. 새 IP 세트의 IP 주소에서 발생하는 요청을 차단하려면 웹 ACL에 새 규칙을 추가하십시오. SQL 삽입 공격을 보내는 IP 주소에 대한 API 로그를 스크랩하는 AWS Lambda 함수를 생성하고 해당 IP 주소를 IP 세트에 추가합니다. ECS 작업 앞의 ALB에 웹 ACL을 연결합니다."], "answers": [2]}, {"q": "한 환경 기업이 전국 주요 도시에 센서를 배치해 대기질을 측정하고 있다. 센서는 AWS IoT Core에 연결하여 시계열 데이터 판독값을 수집합니다. 회사는 데이터를 Amazon DynamoDB에 저장합니다. 비즈니스 연속성을 위해 회사는 두 개의 AWS 리전에서 데이터를 수집하고 저장할 수 있어야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["두 리전의 AWS IoT Core 데이터 엔드포인트에 대한 값을 사용하여 Amazon Route 53 별칭 장애 조치 라우팅 정책을 생성합니다. 데이터를 Amazon Aurora 글로벌 테이블로 마이그레이션합니다.", "각 리전에서 AWS IoT Core에 대한 도메인 구성을 생성합니다. Amazon Route 53 지연 시간 기반 라우팅 정책을 생성합니다. 두 리전에서 AWS IoT Core 데이터 엔드포인트를 값으로 사용합니다. Redis용 Amazon DynamoDB 로 데이터를 마이그레이션하고 리전 간 복제를 구성합니다.", "각 리전에서 AWS IoT Core에 대한 도메인 구성을 생성합니다. 도메인 구성 상태를 평가하는 Amazon Route 53 상태 확인을 생성합니다. AWS IoT Core 도메인 구성의 도메인 이름 값으로 장애 조치 라우팅 정책을 생성합니다. DynamoDB 테이블을 전역 테이블로 업데이트합니다.", "Amazon Route 53 지연 시간 기반 라우팅 정책을 생성합니다. 두 리전에서 AWS IoT Core 데이터 엔드포인트를 값으로 사용합니다. DynamoDB 스트림 및 리전 간 데이터 복제를 구성합니다."], "answers": [2]}, {"q": "회사는 AWS 클라우드에서 다중 계정 설정을 위해 AWS Organizations를 사용합니다. 회사의 재무 팀에는 AWS Lambda 및 Amazon DynamoDB를 사용하는 데이터 처리 애플리케이션이 있습니다. 회사의 마케팅 팀은 DynamoDB 테이블에 저장된 데이터에 액세스하려고 합니다. DynamoDB 테이블에는 기밀 데이터가 포함되어 있습니다. 마케팅 팀은 DynamoDB 테이블에 있는 데이터의 특정 속성에만 액세스할 수 있습니다. 재무팀과 마케팅팀은 별도의 AWS 계정을 가지고 있습니다. DynamoDB 테이블에 대한 적절한 액세스 권한을 마케팅 팀에 제공하려면 솔루션 설계자가 무엇을 해야 합니까?", "opts": ["마케팅 팀의 AWS 계정에 DynamoDB 테이블의 특정 속성에 대한 액세스 권한을 부여하는 SCP를 생성합니다. 재무 팀의 OU에 SCP를 연결합니다.", "특정 DynamoDB 속성에 대한 IAM 정책 조건을 사용하여 재무 팀 계정에서 IAM 역할을 생성합니다(세분화된 액세스 제어). 마케팅 팀의 계정과 신뢰를 구축합니다. 마케팅 팀 계정에서 재무 팀 계정의 IAM 역할을 맡을 수 있는 권한이 있는 IAM 역할을 생성합니다.", "특정 DynamoDB 속성(세분화된 액세스 제어)에 대한 조건을 포함하는 리소스 기반 IAM 정책을 생성합니다. 정책을 DynamoDB 테이블에 연결합니다. 마케팅 팀 계정에서 재무 팀 계정의 DynamoDB 테이블에 액세스할 수 있는 권한이 있는 IAM 역할을 생성합니다.", "DynamoDB 테이블에 액세스하기 위해 재무 팀의 계정에서 IAM 역할을 생성합니다. IAM 권한 경계를 사용하여 특정 속성에 대한 접근을 제한합니다. 마케팅 팀 계정에서 재무 팀 계정의 IAM 역할을 맡을 수 있는 권한이 있는 IAM 역할을 생성합니다."], "answers": [1]}, {"q": "솔루션 아키텍트가 Amazon S3 버킷에 객체를 저장하는 애플리케이션을 만들고 있습니다. 솔루션 설계자는 동시에 사용할 두 AWS 리전에 애플리케이션을 배포해야 합니다. 두 S3 버킷의 객체는 서로 동기화된 상태를 유지해야 합니다. 최소한의 운영 오버헤드로 이러한 요구 사항을 충족하는 단계 조합은 무엇입니까? (3개 선택)", "opts": ["S3 다중 리전 액세스 포인트 생성 다중 리전 액세스 포인트를 참조하도록 애플리케이션을 변경합니다.", "두 S3 버킷 간에 양방향 S3 CRR(Cross-Region Replication)을 구성합니다.", "각 S3 버킷에 객체를 저장하도록 애플리케이션을 수정합니다.", "각 S3 버킷에 대한 S3 수명 주기 규칙을 생성하여 하나의 S3 버킷에서 다른 S3 버킷으로 객체를 복사합니다.", "각 S3 버킷에 대해 S3 버전 관리를 활성화합니다.", "한 S3 버킷에서 다른 S3 버킷으로 객체를 복사하는 AWS Lambda 함수를 호출하도록 각 S3 버킷에 대한 이벤트 알림을 구성합니다."], "answers": [0, 1, 4]}, {"q": "회사에는 온프레미스 환경에서 실행되는 IoT 플랫폼이 있습니다. 플랫폼은 MQTT 프로토콜을 사용하여 IoT 장치에 연결하는 서버로 구성됩니다. 플랫폼은 적어도 5분마다 한 번씩 장치에서 원격 측정 데이터를 수집합니다. 플랫폼은 또한 MongoDB 클러스터에 디바이스 메타데이터를 저장합니다. 온프레미스 머신에 설치된 애플리케이션은 정기적인 작업을 실행하여 원격 분석 및 디바이스 메타데이터를 집계하고 변환합니다. 애플리케이션은 동일한 온프레미스 머신에서 실행되는 다른 웹 애플리케이션을 사용하여 사용자가 보는 보고서를 생성합니다. 주기적 작업을 실행하는 데 120-600초가 걸립니다. 그러나 웹 애플리케이션은 항상 실행 중입니다. 회사는 플랫폼을 AWS로 이전하고 있으며 스택의 운영 오버헤드를 줄여야 합니다. 최소한의 운영 오버헤드로 이러한 요구 사항을 충족하는 단계 조합은 무엇입니까? (3개 선택)", "opts": ["AWS Lambda 함수를 사용하여 IoT 장치에 연결하십시오.", "AWS IoT Core에 게시하도록 IoT 장치를 구성합니다.", "Amazon EC2 인스턴스의 자체 관리형 MongoDB 데이터베이스에 메타데이터를 씁니다.", "메타데이터를 Amazon DocumentDB(MongoDB와 호환)에 씁니다.", "AWS Lambda 작업과 함께 AWS Step Functions 상태 머신을 사용하여 보고서를 준비하고 Amazon S3에 보고서를 작성합니다. S3 오리진과 함께 Amazon CloudFront를 사용하여 보고서를 제공합니다.", "Amazon EC2 인스턴스와 함께 Amazon Elastic Kubernetes Service(Amazon EKS) 클러스터를 사용하여 보고서를 준비합니다. EKS 클러스터의 수신 컨트롤러를 사용하여 보고서를 제공합니다."], "answers": [1, 3, 4]}, {"q": "한 글로벌 제조 회사는 대부분의 애플리케이션을 AWS로 마이그레이션할 계획입니다. 그러나 회사는 데이터 규정 요구 사항 또는 한 자릿수 밀리초의 대기 시간 요구 사항으로 인해 특정 국가 또는 회사의 중앙 온프레미스 데이터 센터에 유지해야 하는 애플리케이션에 대해 우려하고 있습니다. 회사는 또한 제한된 네트워크 인프라가 존재하는 일부 공장 사이트에서 호스팅하는 애플리케이션에 대해 우려하고 있습니다. 회사는 개발자가 애플리케이션을 한 번 빌드하고 온프레미스, 클라우드 또는 하이브리드 아키텍처에 배포할 수 있도록 일관된 개발자 경험을 원합니다. 개발자는 자신에게 익숙한 동일한 도구, API 및 서비스를 사용할 수 있어야 합니다. 이러한 요구 사항을 충족하기 위해 일관된 하이브리드 환경을 제공하는 솔루션은 무엇입니까?", "opts": ["모든 애플리케이션을 규정을 준수하는 가장 가까운 AWS 리전으로 마이그레이션합니다. 중앙 온프레미스 데이터 센터와 AWS 간에 AWS Direct Connect 연결을 설정합니다. Direct Connect 게이트웨이를 배포합니다.", "데이터 규제 요구 사항 또는 한 자릿수 밀리초의 지연 시간 요구 사항이 있는 애플리케이션에는 AWS Snowball Edge Storage Optimized 장치를 사용하십시오. 장치를 온프레미스에 보관하십시오. AWS Wavelength를 배포하여 공장 사이트에서 워크로드를 호스팅합니다.", "데이터 규제 요구 사항 또는 한 자릿수 밀리초의 지연 시간 요구 사항이 있는 애플리케이션을 위해 AWS Outposts를 설치합니다. AWS Snowball Edge Compute Optimized 디바이스를 사용하여 공장 사이트에서 워크로드를 호스팅합니다.", "데이터 규제 요구 사항 또는 한 자릿수 밀리초의 지연 시간 요구 사항이 있는 애플리케이션을 AWS 로컬 영역으로 마이그레이션합니다. AWS Wavelength를 배포하여 공장 사이트에서 워크로드를 호스팅합니다."], "answers": [2]}, {"q": "회사에서 고객이 온라인 주문에 사용하는 애플리케이션을 업데이트하고 있습니다. 최근 악성 행위자의 애플리케이션 공격 횟수가 증가했습니다. 회사는 Amazon Elastic Container Service(Amazon ECS) 클러스터에서 업데이트된 애플리케이션을 호스팅합니다. 회사는 Amazon DynamoDB를 사용하여 애플리케이션 데이터를 저장합니다. 공용 Application Load Balancer(ALB)는 최종 사용자에게 애플리케이션에 대한 액세스 권한을 제공합니다. 회사는 공격을 방지하고 공격이 진행되는 동안 최소한의 서비스 중단으로 비즈니스 연속성을 보장해야 합니다. 이러한 요구 사항을 가장 비용 효율적으로 충족하는 단계 조합은 무엇입니까? (2개 선택)", "opts": ["ALB를 오리진으로 사용하여 Amazon CloudFront 배포를 생성합니다. CloudFront 도메인에 사용자 지정 헤더와 임의 값을 추가합니다. 헤더와 값이 일치하는 경우 트래픽을 조건부로 전달하도록 ALB를 구성합니다.", "두 개의 AWS 리전에 애플리케이션을 배포합니다. 동일한 가중치로 두 리전으로 라우팅하도록 Amazon Route 53을 구성합니다.", "Amazon ECS 작업에 대한 Auto Scaling 구성 DynamoDB Accelerator(DAX) 클러스터를 생성합니다.", "DynamoDB의 오버헤드를 줄이도록 Amazon ElastiCache를 구성합니다.", "적절한 규칙 그룹을 포함하는 AWS WAF 웹 ACL을 배포합니다. 웹 ACL을 Amazon CloudFront 배포와 연결합니다."], "answers": [0, 4]}, {"q": "회사는 AWS에서 웹 애플리케이션을 실행합니다. 웹 애플리케이션은 Amazon CloudFront 배포 뒤에 있는 Amazon S3 버킷에서 정적 콘텐츠를 제공합니다. 이 애플리케이션은 Auto Scaling 그룹의 Amazon EC2 인스턴스 플릿에 요청을 분산하는 Application Load Balancer(ALB)를 사용하여 동적 콘텐츠를 제공합니다. 애플리케이션은 Amazon Route 53의 도메인 이름 설정을 사용합니다. 일부 사용자는 사용자가 사용량이 많은 시간에 웹 사이트에 액세스하려고 할 때 간헐적인 문제를 보고했습니다. 운영 팀은 ALB가 때때로 HTTP 503 서비스를 사용할 수 없음 오류를 반환했음을 발견했습니다. 회사는 이러한 오류가 발생할 때 사용자 지정 오류 메시지 페이지를 표시하려고 합니다. 이 오류 코드에 대해 페이지가 즉시 표시되어야 합니다. 최소한의 운영 오버헤드로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["Route 53 장애 조치 라우팅 정책을 설정합니다. ALB 엔드포인트의 상태를 확인하고 장애 조치 S3 버킷 엔드포인트로 장애 조치하도록 상태 확인을 구성합니다.", "사용자 지정 오류 페이지를 호스팅할 두 번째 CloudFront 배포 및 S3 정적 웹 사이트를 만듭니다. Route 53 장애 조치 라우팅 정책을 설정합니다. 두 배포 간에 활성-수동 구성을 사용합니다.", "두 개의 오리진이 있는 CloudFront 오리진 그룹을 생성합니다. ALB 엔드포인트를 기본 오리진으로 설정합니다. 보조 오리진의 경우 정적 웹 사이트를 호스팅하도록 구성된 S3 버킷을 설정합니다. CloudFront 배포에 대한 오리진 장애 조치를 설정합니다. 사용자 지정 오류 페이지를 통합하도록 S3 정적 웹 사이트를 업데이트합니다.", "ALB가 반환하는 각 HTTP 응답 코드를 검증하는 CloudFront 함수를 생성합니다. S3 버킷에 S3 정적 웹사이트를 생성합니다. 장애 조치로 사용자 지정 오류 페이지를 S3 버킷에 업로드합니다. S3 버킷을 읽고 오류 페이지를 최종 사용자에게 제공하도록 함수를 업데이트합니다."], "answers": [2]}, {"q": "회사에서 애플리케이션을 AWS로 마이그레이션할 계획입니다. 애플리케이션은 Docker 컨테이너로 실행되며 NFS 버전 4 파일 공유를 사용합니다. 솔루션 설계자는 기본 인프라의 프로비저닝 또는 관리가 필요하지 않은 안전하고 확장 가능한 컨테이너화된 솔루션을 설계해야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["Fargate 시작 유형으로 Amazon Elastic Container Service(Amazon ECS)를 사용하여 애플리케이션 컨테이너를 배포합니다. 공유 스토리지에 Amazon Elastic File System(Amazon EFS)을 사용합니다. ECS 작업 정의에서 EFS 파일 시스템 ID, 컨테이너 마운트 지점 및 EFS 권한 부여 IAM 역할을 참조하십시오.", "Fargate 시작 유형으로 Amazon Elastic Container Service(Amazon ECS)를 사용하여 애플리케이션 컨테이너를 배포합니다. 공유 스토리지에는 Amazon FSx for Lustre를 사용하십시오. ECS 작업 정의에서 FSx for Lustre 파일 시스템 ID, 컨테이너 마운트 지점 및 FSx for Lustre 인증 IAM 역할을 참조하십시오.", "Amazon EC2 시작 유형 및 Auto Scaling을 켠 상태에서 Amazon Elastic Container Service(Amazon ECS)를 사용하여 애플리케이션 컨테이너를 배포합니다. 공유 스토리지에 Amazon Elastic File System(Amazon EFS)을 사용합니다. ECS 컨테이너 인스턴스에 EFS 파일 시스템을 탑재합니다. EFS 인증 IAM 역할을 EC2 인스턴스 프로파일에 추가합니다.", "Amazon EC2 시작 유형 및 Auto Scaling을 켠 상태에서 Amazon Elastic Container Service(Amazon ECS)를 사용하여 애플리케이션 컨테이너를 배포합니다. 공유 스토리지에 다중 연결이 활성화된 Amazon Elastic Block Store(Amazon EBS) 볼륨을 사용합니다. EBS 볼륨을 ECS 컨테이너 인스턴스에 연결합니다. EBS 인증 IAM 역할을 EC2 인스턴스 프로파일에 추가합니다."], "answers": [0]}, {"q": "회사가 AWS 클라우드에서 애플리케이션을 실행하고 있습니다. 핵심 비즈니스 로직은 Auto Scaling 그룹의 Amazon EC2 인스턴스 세트에서 실행됩니다. ALB(Application Load Balancer)는 EC2 인스턴스에 트래픽을 분산합니다. Amazon Route 53 레코드 api.example.com이 ALB를 가리키고 있습니다. 회사의 개발 팀은 비즈니스 논리를 크게 업데이트합니다. 회사에는 변경 사항이 배포되면 테스트 기간 동안 고객의 10%만 새로운 논리를 받을 수 있다는 규칙이 있습니다. 고객은 테스트 기간 동안 동일한 버전의 비즈니스 로직을 사용해야 합니다. 회사는 이러한 요구 사항을 충족하기 위해 업데이트를 어떻게 배포해야 합니까?", "opts": ["두 번째 ALB를 만들고 새 Auto Scaling 그룹의 EC2 인스턴스 집합에 새 논리를 배포합니다. EC2 인스턴스에 트래픽을 분산하도록 ALB를 구성합니다. 가중치 기반 라우팅을 사용하도록 Route 53 레코드를 업데이트하고 레코드가 두 ALB를 가리키도록 합니다.", "이 새 대상 그룹의 EC2 인스턴스에 대한 새 논리를 ALDeploy에서 참조하는 두 번째 대상 그룹을 생성합니다. 가중 대상 그룹을 사용하도록 ALB 리스너 규칙을 업데이트합니다. ALB 대상 그룹 고정성을 구성합니다.", "Auto Scaling 그룹에 대한 새로운 시작 구성을 생성합니다. AutoScalingRollingUpdate 정책을 사용하도록 시작 구성을 지정하고 MaxBatchSize 옵션을 10으로 설정합니다. Auto Scaling 그룹에서 시작 구성을 교체합니다. 변경 사항을 배포합니다.", "ALB에서 참조하는 두 번째 Auto Scaling 그룹을 생성합니다. 이 새 Auto Scaling 그룹의 EC2 인스턴스 집합에 새 논리를 배포합니다. ALB 라우팅 알고리즘을 최소 미해결 요청(LOR)으로 변경합니다. ALB 세션 고정성을 구성합니다."], "answers": [1]}, {"q": "대규모 교육 회사는 최근 여러 대학에서 내부 애플리케이션에 대한 접근을 제공하기 위해 Amazon Workspaces를 도입했습니다. 이 회사는 Windows File Server 파일 시스템용 Amazon FSx에 사용자 프로필을 저장하고 있습니다. 파일 시스템은 DNS 별칭으로 구성되며 자체 관리되는 Active Directory에 연결됩니다. 더 많은 사용자가 작업 공간을 사용하기 시작하면 로그인 시간이 허용할 수 없는 수준으로 증가합니다. 조사 결과 파일 시스템의 성능 저하가 드러났습니다. 회사는 처리량이 16MBps인 HDD 스토리지에 파일 시스템을 만들었습니다. 솔루션 설계자는 정의된 유지 관리 기간 동안 파일 시스템의 성능을 개선해야 합니다. 최소한의 관리 노력으로 이러한 요구 사항을 충족하기 위해 솔루션 설계자는 무엇을 해야 합니까?", "opts": ["AWS Backup을 사용하여 파일 시스템의 특정 시점 백업을 생성합니다. 백업을 새 FSx for Windows 파일 서버 파일 시스템으로 복원합니다. 스토리지 유형으로 SSD를 선택합니다. 처리 용량으로 32MBps를 선택합니다. 백업 및 복원 프로세스가 완료되면 그에 따라 DNS 별칭을 조정합니다. 원본 파일 시스템을 삭제합니다.", "파일 시스템에서 사용자 연결을 끊습니다. Amazon FSx 콘솔에서 처리 용량을 32MBps로 업데이트합니다. 스토리지 유형을 SSD로 업데이트합니다. 사용자를 파일 시스템에 다시 연결합니다.", "새로운 Amazon EC2 인스턴스에 AWS DataSync 에이전트를 배포합니다. 작업을 만듭니다. 기존 파일 시스템을 소스 위치로 구성합니다. SSD 스토리지 및 32MBps의 처리량을 대상 위치로 사용하여 새로운 FSx for Windows File Server 파일 시스템을 구성합니다. 작업을 예약합니다. 작업이 완료되면 그에 따라 DNS 별칭을 조정합니다. 원본 파일 시스템을 삭제합니다.", "Windows PowerShell 명령을 사용하여 기존 파일 시스템에서 섀도 복사본을 활성화합니다. 파일 시스템의 지정 시간 백업을 생성하도록 섀도 복사 작업을 예약합니다. 이전 버전을 복원하려면 선택하십시오. SSD 스토리지 및 32MBps의 처리량으로 새로운 FSx for Windows File Server 파일 시스템을 만듭니다. 복사 작업이 완료되면 DNS 별칭을 조정합니다. 원본 파일 시스템을 삭제합니다."], "answers": [1]}, {"q": "회사는 AWS에서 애플리케이션을 호스팅합니다. 애플리케이션은 단일 Amazon S3 버킷에 저장된 객체를 읽고 씁니다. 회사는 두 AWS 리전에 애플리케이션을 배포하도록 애플리케이션을 수정해야 합니다. 최소한의 운영 오버헤드로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["S3 버킷을 오리진으로 사용하여 Amazon CloudFront 배포를 설정합니다. 애플리케이션을 두 번째 리전에 배포합니다. CloudFront 배포를 사용하도록 애플리케이션을 수정합니다. AWS Global Accelerator를 사용하여 S3 버킷의 데이터에 액세스합니다.", "두 번째 리전에서 새 S3 버킷을 생성합니다. 원래 S3 버킷과 새 S3 버킷 간에 양방향 S3 CRR(Cross-Region Replication)을 설정합니다. 두 S3 버킷을 모두 사용하는 S3 다중 리전 액세스 포인트를 구성합니다. 수정된 애플리케이션을 두 리전에 배포합니다.", "두 번째 리전에 새 S3 버킷을 생성합니다. 두 번째 리전에 애플리케이션을 배포합니다. 새 S3 버킷을 사용하도록 애플리케이션을 구성합니다. 원래 S3 버킷에서 새 S3 버킷으로 S3 CRR(Cross-Region Replication)을 설정합니다.", "S3 버킷을 오리진으로 사용하여 S3 게이트웨이 엔드포인트를 설정합니다. 애플리케이션을 두 번째 지역에 배포합니다. 새 S3 게이트웨이 엔드포인트를 사용하도록 애플리케이션을 수정합니다. S3 버킷에서 S3 Intelligent-Tiering을 사용합니다."], "answers": [1]}, {"q": "온라인 게임 회사는 AWS에서 게임 플랫폼을 다시 호스팅해야 합니다. 이 회사의 게임 응용 프로그램에는 고성능 컴퓨팅(HPC) 처리가 필요하며 자주 변경되는 순위표가 있습니다. 컴퓨팅 생성에 최적화된 Ubuntu 인스턴스는 게임 디스플레이용 Node.js 애플리케이션을 호스팅합니다. 게임 상태는 온프레미스 Redis 인스턴스에서 추적됩니다. 회사는 애플리케이션 성능을 최적화하는 마이그레이션 전략이 필요합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["Application Load Balancer 뒤에 m5.large Amazon EC2 스팟 인스턴스의 Auto Scaling 그룹을 생성합니다. Amazon ElastlCache for Redis 클러스터를 사용하여 순위표를 유지합니다.", "Application Load Balancer 뒤에 c5.large Amazon EC2 스팟 인스턴스의 Auto Scaling 그룹을 생성합니다. Amazon OpenSearch Service 클러스터를 사용하여 순위표를 유지합니다.", "Application Load Balancer 뒤에 c5.large Amazon EC2 온디맨드 인스턴스의 Auto Scaling 그룹을 만듭니다. Redis 클러스터용 Amazon ElastiCache를 사용하여 순위표를 유지합니다.", "Application Load Balancer 뒤에 m5.large Amazon EC2 온디맨드 인스턴스의 Auto Scaling 그룹을 생성합니다. Amazon DynamoDB 테이블을 사용하여 순위표를 유지합니다."], "answers": [2]}, {"q": "솔루션 설계자는 모바일 장치에서 직원의 작업표 항목을 수락하는 애플리케이션을 설계하고 있습니다. 작업표는 매주 제출되며 대부분의 제출은 금요일에 이루어집니다. 데이터는 급여 관리자가 월별 보고서를 실행할 수 있는 형식으로 저장되어야 합니다. 인프라는 가용성이 높아야 하며 들어오는 데이터 및 보고 요청 속도에 맞게 확장되어야 합니다. 운영 오버헤드를 최소화하면서 이러한 요구 사항을 충족하는 단계 조합은 무엇입니까? (2개 선택)", "opts": ["여러 가용 영역에서 로드 밸런싱을 통해 Amazon EC2 온디맨드 인스턴스에 애플리케이션을 배포합니다. 예약된 Amazon EC2 Auto Scaling을 사용하여 금요일 대량 제출 전에 용량을 추가하십시오.", "여러 가용 영역에서 로드 밸런싱이 있는 Amazon Elastic Container Service(Amazon ECS)를 사용하여 컨테이너에 애플리케이션을 배포합니다. 예약 서비스 사용 Auto Scaling은 금요일 제출량이 많기 전에 용량을 추가합니다.", "Amazon CloudFront에서 제공하는 Amazon S3 버킷에 애플리케이션 프런트 엔드를 배포합니다. AWS Lambda 프록시 통합과 함께 Amazon API Gateway를 사용하여 애플리케이션 백엔드를 배포합니다.", "작업표 제출 데이터를 Amazon Redshift에 저장합니다. Amazon QuickSight를 사용하여 Amazon Redshift를 데이터 원본으로 사용하여 보고서를 생성합니다.", "작업표 제출 데이터를 Amazon S3에 저장합니다. Amazon Athena 및 Amazon QuickSight를 사용하여 Amazon S3를 데이터 원본으로 사용하여 보고서를 생성합니다."], "answers": [2, 4]}, {"q": "회사에서 Amazon S3 버킷에 민감한 데이터를 저장하고 있습니다. 회사는 S3 버킷의 객체에 대한 모든 활동을 기록하고 5년 동안 로그를 유지해야 합니다. 또한 회사의 보안 팀은 S3 버킷에서 데이터를 삭제하려는 시도가 있을 때마다 이메일 알림을 받아야 합니다. 이러한 요구 사항을 가장 비용 효율적으로 충족하는 단계 조합은 무엇입니까? (3개 선택)", "opts": ["S3 데이터 이벤트를 기록하도록 AWS CloudTrail을 구성합니다.", "S3 버킷에 대한 S3 서버 액세스 로깅을 구성합니다.", "객체 삭제 이벤트를 Amazon Simple Email Service(Amazon SES)로 보내도록 Amazon S3를 구성합니다.", "Amazon Simple Notification Service(Amazon SNS) 주제에 게시하는 Amazon EventBridge 이벤트 버스로 객체 삭제 이벤트를 보내도록 Amazon S3를 구성합니다.", "데이터 스토리지 계층화를 사용하여 로그를 Amazon Timestream으로 보내도록 Amazon S3를 구성합니다.", "S3 수명 주기 정책으로 로그를 저장하도록 새 S3 버킷을 구성합니다."], "answers": [0, 3, 5]}, {"q": "회사는 온프레미스 데이터 센터와 AWS 클라우드의 서버를 포함하는 하이브리드 환경을 구축하고 있습니다. 이 회사는 3개의 VPC에 Amazon EC2 인스턴스를 배포했습니다. 각 VPC는 서로 다른 AWS 리전에 있습니다. 이 회사는 AWS Direct를 설립했습니다. 데이터 센터에 가장 가까운 리전에서 데이터 센터에 연결하십시오. 53 장애 조치 라우팅 정책을 사용하여 재해 발생 시 자동으로 DR 리전으로 장애 조치합니다."], "answers": [1]}, {"q": "회사에서 온프레미스 MySQL 데이터베이스를 us-east-1 리전의 Amazon Aurora MySQL로 일회성 마이그레이션을 계획하고 있습니다. 회사의 현재 인터넷 연결은 대역폭이 제한되어 있습니다. 온프레미스 MySQL 데이터베이스의 크기는 60TB입니다. 회사는 현재 인터넷 연결을 통해 데이터를 AWS로 전송하는 데 한 달이 걸릴 것으로 예상합니다. 회사는 데이터베이스를 보다 신속하게 마이그레이션할 마이그레이션 솔루션이 필요합니다. 가장 짧은 시간 내에 데이터베이스를 마이그레이션할 솔루션은 무엇입니까?", "opts": ["온프레미스 데이터 센터와 AWS 간에 1Gbps AWS Direct Connect 연결을 요청합니다. AWS Database Migration Service(AWS DMS)를 사용하여 온프레미스 MySQL 데이터베이스를 Aurora MySQL로 마이그레이션합니다.", "현재 인터넷 연결과 함께 AWS DataSync를 사용하여 온프레미스 데이터 센터와 AWS 간의 데이터 전송을 가속화하십시오. AWS Application Migration Service를 사용하여 온프레미스 MySQL 데이터베이스를 Aurora MySQL로 마이그레이션합니다.", "AWS Snowball Edge 디바이스를 주문합니다. S3 인터페이스를 사용하여 Amazon S3 버킷에 데이터를 로드합니다. AWS Database Migration Service(AWS DMS)를 사용하여 Amazon S3에서 Aurora MySQL로 데이터를 마이그레이션합니다.", "AWS Snowball 디바이스를 주문합니다. Snowball용 S3 어댑터를 사용하여 Amazon S3 버킷에 데이터를 로드합니다. AWS Application Migration Service를 사용하여 Amazon S3에서 Aurora MySQL로 데이터를 마이그레이션합니다."], "answers": [2]}, {"q": "회사는 AWS 클라우드에 애플리케이션을 가지고 있습니다. 이 애플리케이션은 20개의 Amazon EC2 인스턴스 플릿에서 실행됩니다. EC2 인스턴스는 영구적이며 연결된 여러 Amazon Elastic Block Store(Amazon EBS) 볼륨에 데이터를 저장합니다. 회사는 별도의 AWS 리전에서 백업을 유지 관리해야 합니다. 회사는 하루 분량의 데이터 손실 없이 영업일 기준 1일 이내에 EC2 인스턴스와 해당 구성을 복구할 수 있어야 합니다. 이 회사는 직원이 제한되어 있으며 운영 효율성과 비용을 최적화하는 백업 솔루션이 필요합니다. 이 회사는 보조 리전에 필요한 네트워크 구성을 배포할 수 있는 AWS CloudFormation 템플릿을 이미 생성했습니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["보조 리전에서 EC2 인스턴스를 다시 생성할 수 있는 두 번째 CloudFormation 템플릿을 생성합니다. AWS Systems Manager Automation Runbook을 사용하여 매일 다중 볼륨 스냅샷을 실행합니다. 스냅샷을 보조 리전에 복사합니다. 장애가 발생하면 CloudFormation 템플릿을 시작하고 스냅샷에서 EBS 볼륨을 복원하고 사용량을 보조 리전으로 전송합니다.", "Amazon Data Lifecycle Manager(Amazon DLM)를 사용하여 EBS 볼륨의 일일 다중 볼륨 스냅샷을 생성합니다. 장애가 발생한 경우 CloudFormation 템플릿을 시작하고 Amazon DLM을 사용하여 EBS 볼륨을 복원하고 사용량을 보조 리전으로 전송합니다.", "AWS Backup을 사용하여 EC2 인스턴스에 대한 예약된 일일 백업 계획을 생성합니다. 보조 리전의 볼트에 백업을 복사하도록 백업 작업을 구성합니다. 장애가 발생한 경우 CloudFormation 템플릿을 시작하고 백업 볼트에서 인스턴스 볼륨 및 구성을 복원하고 사용량을 보조 리전으로 전송합니다.", "동일한 크기 및 구성의 EC2 인스턴스를 보조 지역에 배포합니다. 기본 리전에서 보조 리전으로 데이터를 복사하도록 매일 AWS DataSync를 구성합니다. 장애가 발생한 경우 CloudFormation 템플릿을 시작하고 사용량을 보조 리전으로 전송합니다."], "answers": [2]}, {"q": "회사에서 정적 콘텐츠를 호스팅하는 새 웹 사이트를 디자인하고 있습니다. 이 웹사이트는 사용자에게 대용량 파일을 업로드하고 다운로드할 수 있는 기능을 제공합니다. 회사 요구 사항에 따라 모든 데이터는 전송 중 및 유휴 상태에서 암호화되어야 합니다. 솔루션 설계자는 Amazon S3 및 Amazon CloudFront를 사용하여 솔루션을 구축하고 있습니다. 어떤 단계 조합이 암호화 요구 사항을 충족합니까? (3개 선택)", "opts": ["웹 애플리케이션이 사용하는 S3 버킷에 대해 S3 서버 측 암호화를 켭니다.", "S3 ACL의 읽기 및 쓰기 작업에 대해 \"aws:SecureTransport\": \"true\" 정책 속성을 추가합니다.", "웹 애플리케이션이 사용하는 S3 버킷에서 암호화되지 않은 작업을 거부하는 버킷 정책을 만듭니다.", "AWS KMS 키(SSE-KMS)로 서버 측 암호화를 사용하여 CloudFront에서 유휴 암호화를 구성합니다.", "CloudFront에서 HTTP 요청의 HTTPS 요청으로의 리디렉션을 구성합니다.", "웹 애플리케이션이 사용하는 S3 버킷에 대해 미리 서명된 URL을 생성할 때 RequireSSL 옵션을 사용하십시오."], "answers": [0, 2, 4]}, {"q": "회사는 Amazon RDS에서 Microsoft SQL Server DB 인스턴스에 액세스해야 하는 AWS Lambda 함수를 사용하여 서버리스 아키텍처를 구현하고 있습니다. 이 회사는 데이터베이스 시스템의 복제본을 포함하여 개발 및 생산을 위한 별도의 환경을 가지고 있습니다. 회사의 개발자는 개발 데이터베이스의 자격 증명에 액세스할 수 있습니다. 그러나 프로덕션 데이터베이스의 자격 증명은 IT 보안 팀의 IAM 사용자 그룹 구성원만 액세스할 수 있는 키로 암호화해야 합니다. 이 키는 정기적으로 순환되어야 합니다. 솔루션 설계자는 이러한 요구 사항을 충족하기 위해 프로덕션 환경에서 무엇을 해야 합니까?", "opts": ["AWS Key Management Service(AWS KMS) 고객 관리형 키로 암호화된 SecureString 파라미터를 사용하여 AWS Systems Manager Parameter Store에 데이터베이스 자격 증명을 저장합니다. SecureString 파라미터에 대한 접근을 제공하기 위해 각 Lambda 함수에 역할을 연결합니다. IT 보안 팀만 매개변수와 키에 액세스할 수 있도록 SecureString 매개변수와 고객 관리형 키에 대한 접근을 제한하십시오.", "AWS Key Management Service(AWS KMS) 기본 Lambda 키를 사용하여 데이터베이스 자격 증명을 암호화합니다. 각 Lambda 함수의 환경 변수에 자격 증명을 저장합니다. Lambda 코드의 환경 변수에서 자격 증명을 로드합니다. IT 보안 팀만 키에 액세스할 수 있도록 KMS 키에 대한 접근을 제한합니다.", "각 Lambda 함수의 환경 변수에 데이터베이스 자격 증명을 저장합니다. AWS Key Management Service(AWS KMS) 고객 관리형 키를 사용하여 환경 변수를 암호화합니다. IT 보안 팀만 키에 액세스할 수 있도록 고객 관리형 키에 대한 접근을 제한합니다.", "데이터베이스 자격 증명을 AWS Secrets Manager에 AWS Key Management Service(AWS KMS) 고객 관리형 키와 연결된 암호로 저장합니다. 비밀에 대한 접근을 제공하기 위해 각 Lambda 함수에 역할을 연결합니다. IT 보안 팀만 암호 및 키에 액세스할 수 있도록 암호 및 고객 관리형 키에 대한 접근을 제한합니다."], "answers": [3]}, {"q": "온라인 소매 회사는 레거시 온프레미스 .NET 애플리케이션을 AWS로 마이그레이션하고 있습니다. 이 애플리케이션은 부하가 분산된 프런트엔드 웹 서버, 부하가 분산된 애플리케이션 서버 및 Microsoft SQL Server 데이터베이스에서 실행됩니다. 회사는 가능한 경우 AWS 관리형 서비스를 사용하려고 하며 애플리케이션을 다시 작성하고 싶지 않습니다. 솔루션 설계자는 확장 문제를 해결하고 애플리케이션 확장에 따른 라이선스 비용을 최소화하기 위한 솔루션을 구현해야 합니다. 이러한 요구 사항을 가장 비용 효율적으로 충족하는 솔루션은 무엇입니까?", "opts": ["웹 계층 및 애플리케이션 계층에 대해 Application Load Balancer 뒤의 Auto Scaling 그룹에 Amazon EC2 인스턴스를 배포합니다. Babelfish가 켜진 상태에서 Amazon Aurora PostgreSQL을 사용하여 SQL Server 데이터베이스를 플랫폼을 변경하십시오.", "AWS Database Migration Service(AWS DMS)를 사용하여 모든 서버의 이미지를 생성합니다. 온프레미스 가져오기를 기반으로 하는 Amazon EC2 인스턴스를 배포합니다. 웹 계층 및 애플리케이션 계층에 대해 Network Load Balancer 뒤의 Auto Scaling 그룹에 인스턴스를 배포합니다. Amazon DynamoDB를 데이터베이스 계층으로 사용합니다.", "웹 프런트엔드 계층과 애플리케이션 계층을 컨테이너화합니다. Amazon Elastic Kubernetes Service(Amazon EKS) 클러스터를 프로비저닝합니다. 웹 계층 및 애플리케이션 계층에 대한 Network Load Balancer 뒤에 Auto Scaling 그룹을 생성합니다. SQL Server용 Amazon RDS를 사용하여 데이터베이스를 호스팅합니다.", "애플리케이션 기능을 AWS Lambda 기능으로 분리합니다. 웹 프런트엔드 계층 및 애플리케이션 계층에 Amazon API Gateway를 사용합니다. 데이터를 Amazon S3로 마이그레이션합니다. Amazon Athena를 사용하여 데이터를 쿼리합니다."], "answers": [0]}, {"q": "SaaS(Software-as-a-Service) 공급자는 ALB(Application Load Balancer)를 통해 API를 노출합니다. ALB는 us-east-1 지역에 배포된 Amazon Elastic Kubernetes Service(Amazon EKS) 클러스터에 연결됩니다. 노출된 API에는 LINK, UNLINK, LOCK 및 UNLOCK과 같은 몇 가지 비표준 REST 메서드 사용이 포함되어 있습니다. 미국 이외 지역의 사용자는 이러한 API에 대해 길고 일관성 없는 응답 시간을 보고하고 있습니다. 솔루션 설계자는 운영 오버헤드를 최소화하는 솔루션으로 이 문제를 해결해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["Amazon CloudFront 배포를 추가합니다. ALB를 원본으로 구성합니다.", "Amazon API Gateway 엣지 최적화 API 엔드포인트를 추가하여 API를 노출합니다. ALB를 대상으로 구성합니다.", "AWS Global Accelerator에 액셀러레이터를 추가합니다. ALB를 원본으로 구성합니다.", "두 개의 추가 AWS 지역인 eu-west-1 및 ap-southeast-2에 API를 배포합니다. Amazon Route 53에 지연 시간 기반 라우팅 레코드를 추가합니다."], "answers": [2]}, {"q": "회사는 AWS 클라우드에서 IoT 애플리케이션을 실행합니다. 이 회사는 미국의 주택에서 데이터를 수집하는 수백만 개의 센서를 보유하고 있습니다. 센서는 MQTT 프로토콜을 사용하여 사용자 지정 MQTT 브로커에 연결하고 데이터를 보냅니다. MQTT 브로커는 단일 Amazon EC2 인스턴스에 데이터를 저장합니다. 센서는 iot.example.com이라는 도메인을 통해 브로커에 연결됩니다. 이 회사는 Amazon Route 53을 DNS 서비스로 사용합니다. 회사는 데이터를 Amazon DynamoDB에 저장합니다. 여러 경우에 데이터 양이 MQTT 브로커에 과부하를 일으켜 센서 데이터가 손실되었습니다. 회사는 솔루션의 신뢰성을 향상시켜야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["MQTT 브로커를 위한 ALB(Application Load Balancer) 및 Auto Scaling 그룹을 생성합니다. Auto Scaling 그룹을 ALB의 대상으로 사용합니다. Route 53의 DNS 레코드를 별칭 레코드로 업데이트합니다. 별칭 레코드가 ALB를 가리키도록 합니다. MQTT 브로커를 사용하여 데이터를 저장합니다.", "센서 데이터를 수신하도록 AWS IoT Core를 설정합니다. AWS IoT Core에 연결할 사용자 지정 도메인을 생성하고 구성합니다. AWS IoT Core Data-ATS 엔드포인트를 가리키도록 Route 53의 DNS 레코드를 업데이트합니다. 데이터를 저장하도록 AWS IoT 규칙을 구성합니다.", "NLB(Network Load Balancer)를 생성합니다. MQTT 브로커를 대상으로 설정합니다. AWS Global Accelerator 액셀러레이터를 생성합니다. NLB를 액셀러레이터의 끝점으로 설정합니다. Route 53의 DNS 레코드를 다중값 응답 레코드로 업데이트합니다. Global Accelerator IP 주소를 값으로 설정합니다. MQTT 브로커를 사용하여 데이터를 저장합니다.", "센서 데이터를 수신하도록 AWS IoT Greengrass를 설정합니다. AWS IoT Greengrass 엔드포인트를 가리키도록 Route 53의 DNS 레코드를 업데이트합니다. 데이터를 저장하기 위해 AWS Lambda 함수를 호출하도록 AWS IoT 규칙을 구성합니다."], "answers": [1]}, {"q": "회사에 Linux 기반 Amazon EC2 인스턴스가 있습니다. 사용자는 EC2 SSH 키 쌍과 함께 SSH를 사용하여 인스턴스에 액세스해야 합니다. 각 시스템에는 고유한 EC2 키 쌍이 필요합니다. 회사는 요청 시 모든 EC2 키 쌍을 자동으로 교체하고 키를 안전하게 암호화된 위치에 보관하는 키 교체 정책을 구현하려고 합니다. 회사는 키 순환 중 1분 미만의 다운타임을 허용합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["AWS Secrets Manager에 모든 키를 저장합니다. AWS Lambda 함수를 호출하여 새 키 쌍을 생성하도록 Secrets Manager 교체 일정을 정의합니다. EC2 인스턴스의 퍼블릭 키를 교체합니다. Secrets Manager에서 프라이빗 키를 업데이트합니다.", "AWS Systems Manager의 기능인 Parameter Store의 모든 키를 문자열로 저장합니다. 새 키 쌍을 생성하기 위해 AWS Lambda 함수를 호출하도록 Systems Manager 유지 관리 기간을 정의합니다. EC2 인스턴스의 퍼블릭 키를 교체합니다. Parameter Store에서 프라이빗 키를 업데이트합니다.", "EC2 키 쌍을 AWS Key Management Service(AWS KMS)로 가져옵니다. 이러한 키 쌍에 대해 자동 키 순환을 구성합니다. AWS KMS에서 키 교체를 시작하기 위해 AWS Lambda 함수를 호출하는 Amazon EventBridge 예약 규칙을 생성합니다.", "AWS Systems Manager의 기능인 Fleet Manager에 모든 EC2 인스턴스를 추가합니다. Systems Manager 유지 관리 기간을 정의하여 Systems Manager Run Command 문서를 발행하여 새 키 쌍을 생성하고 퍼블릭 키를 Fleet Manager의 모든 인스턴스로 교체합니다."], "answers": [0]}, {"q": "회사에서 AWS로 마이그레이션하려고 합니다. 이 회사는 VMware ESXi 환경에서 수천 개의 VM을 실행하고 있습니다. 이 회사는 구성 관리 데이터베이스가 없으며 VMware 포트폴리오 활용에 대한 지식이 거의 없습니다. 솔루션 설계자는 회사가 비용 효율적인 마이그레이션을 계획할 수 있도록 회사에 정확한 인벤토리를 제공해야 합니다. 최소한의 운영 오버헤드로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["AWS Systems Manager Patch Manager를 사용하여 Migration Evaluator를 각 VM에 배포합니다. Amazon QuickSight에서 수집된 데이터를 검토합니다. 사용률이 높은 서버를 식별합니다. 마이그레이션 목록에서 사용률이 높은 서버를 제거합니다. 데이터를 AWS Migration Hub로 가져옵니다.", "VMware 포트폴리오를 .csv 파일로 내보냅니다. 각 서버의 디스크 사용률을 확인하십시오. 사용률이 높은 서버를 제거합니다. 데이터를 AWS Application Migration Service로 내보냅니다. AWS Server Migration Service(AWS SMS)를 사용하여 나머지 서버를 마이그레이션합니다.", "Migration Evaluator 에이전트 없는 수집기를 ESXi 하이퍼바이저에 배포합니다. Migration Evaluator에서 수집된 데이터를 검토합니다. 비활성 서버를 식별합니다. 마이그레이션 목록에서 비활성 서버를 제거하십시오. 데이터를 AWS Migration Hub로 가져옵니다.", "각 VM에 AWS Application Migration Service 에이전트를 배포합니다. 데이터가 수집되면 Amazon Redshift를 사용하여 데이터를 가져와 분석합니다. 데이터 시각화를 위해 Amazon QuickSight를 사용하십시오."], "answers": [2]}, {"q": "회사는 마이크로 서비스를 AWS Lambda 함수로 실행합니다. 마이크로서비스는 제한된 수의 동시 연결을 지원하는 온프레미스 SQL 데이터베이스에 데이터를 씁니다. Lambda 함수 호출 수가 너무 많으면 데이터베이스가 충돌하고 애플리케이션 가동 중지 시간이 발생합니다. 회사에는 회사의 VPC와 온프레미스 데이터 센터 간에 AWS Direct Connect 연결이 있습니다. 회사는 충돌로부터 데이터베이스를 보호하려고 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["Amazon Simple Queue Service(Amazon SQS) 대기열에 데이터를 씁니다. 대기열에서 읽고 기존 데이터베이스에 쓰도록 Lambda 함수를 구성합니다. 데이터베이스가 지원하는 연결 수보다 적은 Lambda 함수에 대해 예약된 동시성 제한을 설정합니다.", "새로운 Amazon Aurora Serverless DB 클러스터를 생성합니다. AWS DataSync를 사용하여 기존 데이터베이스에서 Aurora Serverless로 데이터를 마이그레이션합니다. Aurora에 쓰도록 Lambda 함수를 재구성합니다.", "Amazon RDS 프록시 DB 인스턴스를 생성합니다. RDS Proxy DB 인스턴스를 Amazon RDS DB 인스턴스에 연결합니다. RDS Proxy DB 인스턴스에 쓰도록 Lambda 함수를 재구성합니다.", "Amazon Simple Notification Service(Amazon SNS) 주제에 데이터를 씁니다. 주제가 새 메시지를 수신하면 Lambda 함수를 호출하여 기존 데이터베이스에 씁니다. Lambda 함수가 데이터베이스가 지원하는 연결 수와 동일하도록 프로비저닝된 동시성을 구성합니다."], "answers": [0]}, {"q": "회사는 단일 Amazon EC2 인스턴스에서 실행되는 Grafana 데이터 시각화 솔루션을 사용하여 회사의 AWS 워크로드 상태를 모니터링합니다. 회사는 회사가 보존하고 싶은 대시보드를 만들기 위해 시간과 노력을 투자했습니다. 대시보드는 가용성이 높아야 하며 10분 이상 다운될 수 없습니다. 회사는 지속적인 유지 관리를 최소화해야 합니다. 최소한의 운영 오버헤드로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["Amazon CloudWatch 대시보드로 마이그레이션합니다. 기존 Grafana 대시보드와 일치하도록 대시보드를 다시 만듭니다. 가능한 경우 자동 대시보드를 사용하십시오.", "Amazon 관리형 Grafana 작업 공간을 생성합니다. 새 Amazon CloudWatch 데이터 원본을 구성합니다. 기존 Grafana 인스턴스에서 대시보드를 내보냅니다. 대시보드를 새 작업 공간으로 가져옵니다.", "Grafana가 사전 설치된 AMI를 생성합니다. Amazon Elastic File System(Amazon EFS)에 기존 대시보드를 저장합니다. 새 AMI를 사용하는 Auto Scaling 그룹을 생성합니다. Auto Scaling 그룹의 최소, 희망, 최대 인스턴스 수를 하나로 설정합니다. 두 개 이상의 가용 영역을 제공하는 Application Load Balancer를 생성합니다.", "매시간 한 번씩 Grafana를 실행하는 EC2 인스턴스를 백업하도록 AWS Backup을 구성합니다. 필요한 경우 대체 가용 영역의 최신 스냅샷에서 EC2 인스턴스를 복원합니다."], "answers": [1]}, {"q": "회사는 고객 트랜잭션 데이터베이스를 온프레미스에서 AWS로 마이그레이션해야 합니다. 데이터베이스는 Linux 서버에서 실행되는 Oracle DB 인스턴스에 상주합니다. 새로운 보안 요구 사항에 따라 회사는 매년 데이터베이스 암호를 순환해야 합니다. 최소한의 운영 오버헤드로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["AWS Schema Conversion Tool(AWS SCT)을 사용하여 데이터베이스를 Amazon DynamoDB로 변환합니다. AWS Systems Manager Parameter Store에 암호를 저장합니다. 연간 패스타드 교체를 위해 AWS Lambda 함수를 호출하는 Amazon CloudWatch 경보를 생성합니다.", "데이터베이스를 Oracle용 Amazon RDS로 마이그레이션합니다. AWS Secrets Manager에 암호를 저장합니다. 자동 회전을 켭니다. 연간 순환 일정을 구성합니다.", "데이터베이스를 Amazon EC2 인스턴스로 마이그레이션합니다. AWS Systems Manager Parameter Store를 사용하여 연간 일정에 따라 AWS Lambda 함수를 사용하여 연결 문자열을 유지하고 교체합니다.", "AWS Schema Conversion Tool(AWS SCT)을 사용하여 데이터베이스를 Amazon Neptune으로 마이그레이션합니다. 연간 암호 교체를 위해 AWS Lambda 함수를 호출하는 Amazon CloudWatch 경보를 생성합니다."], "answers": [1]}, {"q": "솔루션 아키텍트는 여러 팀으로 구성된 회사의 AWS 계정 구조를 설계하고 있습니다. 모든 팀은 동일한 AWS 리전에서 작업합니다. 회사에는 온프레미스 네트워크에 연결된 VPC가 필요합니다. 회사는 온프레미스 네트워크에서 들어오고 나가는 총 트래픽이 50Mbps 미만일 것으로 예상합니다. 이러한 요구 사항을 가장 비용 효율적으로 충족하는 단계 조합은 무엇입니까? (2개 선택)", "opts": ["VPC와 필수 서브넷을 프로비저닝하는 AWS CloudFormation 템플릿을 생성합니다. 각 AWS 계정에 템플릿을 배포합니다.", "VPC와 필수 서브넷을 프로비저닝하는 AWS CloudFormation 템플릿을 생성합니다. 공유 서비스 계정에 템플릿을 배포합니다. AWS Resource Access Manager를 사용하여 서브넷을 공유합니다.", "온프레미스 네트워크에 연결하기 위해 AWS Site-to-Site VPN과 함께 AWS 운송 게이트웨이(Transit Gateway)를 사용합니다. AWS Resource Access Manager를 사용하여 전송 게이트웨이를 공유합니다.", "온프레미스 네트워크 연결을 위해 AWS Site-to-Site VPN을 사용합니다.", "온프레미스 네트워크 연결을 위해 AWS Direct Connect를 사용합니다."], "answers": [1, 3]}, {"q": "대기업의 솔루션 설계자는 AWS Organizations의 조직 내 모든 AWS 계정에서 인터넷으로 나가는 아웃바운드 트래픽에 대한 네트워크 보안을 설정해야 합니다. 조직에는 100개가 넘는 AWS 계정이 있으며 계정은 중앙 집중식 AWS 운송 게이트웨이(Transit Gateway)를 사용하여 서로 라우팅됩니다. 각 계정에는 인터넷으로의 아웃바운드 트래픽을 위한 인터넷 게이트웨이와 NAT 게이트웨이가 모두 있습니다. 회사는 단일 AWS 리전에만 리소스를 배포합니다. 회사는 조직의 모든 AWS 계정에 대해 인터넷으로 향하는 모든 아웃바운드 트래픽에 대해 중앙에서 관리되는 규칙 기반 필터링을 추가할 수 있는 기능이 필요합니다. 아웃바운드 트래픽의 최대 부하는 각 가용 영역에서 25Gbps를 초과하지 않습니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["인터넷으로의 아웃바운드 트래픽을 위한 새 VPC를 생성합니다. 기존 전송 게이트웨이를 새 VPC에 연결합니다. 새 NAT 게이트웨이를 구성합니다. 리전의 모든 가용 영역에서 규칙 기반 필터링을 위해 오픈 소스 인터넷 프록시를 실행하는 Amazon EC2 인스턴스의 Auto Scaling 그룹을 생성합니다. 프록시의 Auto Scaling 그룹을 가리키도록 모든 기본 경로를 수정합니다.", "인터넷으로의 아웃바운드 트래픽을 위한 새 VPC를 생성합니다. 기존 전송 게이트웨이를 새 VPC에 연결합니다. 새 NAT 게이트웨이를 구성합니다. 규칙 기반 필터링을 위해 AWS Network Firewall 방화벽을 사용하십시오. 각 가용 영역에서 네트워크 방화벽 엔드포인트를 생성합니다. 네트워크 방화벽 끝점을 가리키도록 모든 기본 경로를 수정합니다.", "각 AWS 계정에서 규칙 기반 필터링을 위한 AWS 네트워크 방화벽 방화벽을 생성합니다. 각 계정의 네트워크 방화벽 방화벽을 가리키도록 모든 기본 경로를 수정합니다.", "각 AWS 계정에서 규칙 기반 필터링을 위해 오픈 소스 인터넷 프록시를 실행하는 네트워크 최적화 Amazon EC2 인스턴스의 Auto Scaling 그룹을 생성합니다. 프록시의 Auto Scaling 그룹을 가리키도록 모든 기본 경로를 수정합니다."], "answers": [1]}, {"q": "회사는 로드 밸런서를 사용하여 단일 가용 영역의 Amazon EC2 인스턴스에 트래픽을 분산합니다. 이 회사는 보안에 대해 우려하고 있으며 솔루션 설계자가 다음 요구 사항을 충족하도록 솔루션을 다시 설계하기를 원합니다. • 일반적인 취약성 공격에 대해 인바운드 요청을 필터링해야 합니다. • 거부된 요청은 타사 감사 응용 프로그램으로 보내야 합니다. • 모든 리소스는 가용성이 높아야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["애플리케이션의 AMI를 사용하여 다중 AZ Auto Scaling 그룹을 구성합니다. ALB(Application Load Balancer)를 생성하고 이전에 생성한 Auto Scaling 그룹을 대상으로 선택합니다. Amazon Inspector를 사용하여 ALB 및 EC2 인스턴스에 대한 트래픽을 모니터링합니다. WAF에서 웹 ACL을 생성합니다. 웹 ACL 및 ALB를 사용하여 AWS WAF를 생성합니다. AWS Lambda 함수를 사용하여 Amazon Inspector 보고서를 타사 감사 애플리케이션에 자주 푸시합니다.", "ALB(Application Load Balancer)를 구성하고 EC2 인스턴스를 대상으로 추가합니다. WAF에서 웹 ACL을 생성합니다. 웹 ACL 및 ALB 이름을 사용하여 AWS WAF를 생성하고 Amazon CloudWatch Logs로 로깅을 활성화합니다. AWS Lambda 함수를 사용하여 타사 감사 애플리케이션에 로그를 자주 푸시합니다.", "EC2 인스턴스를 대상으로 추가하는 대 . 솔루션 설계자는 개발자가 서비스를 배포할 때 따라야 할 지침을 권장해야 합니다. 이러한 지침은 전체 환경에 대한 데이터 전송 요금을 최소화해야 합니다. 어떤 지침이 이러한 요구 사항을 충족합니까? (2개 선택)", "opts": ["AWS Resource Access Manager를 사용하여 서비스 공급자 애플리케이션을 호스팅하는 서브넷을 조직의 다른 계정과 공유하십시오.", "동일한 조직의 AWS 계정에 서비스 공급자 애플리케이션과 서비스 소비자 애플리케이션을 배치합니다.", "모든 서비스 공급자 애플리케이션 배포에서 Network Load Balancer에 대한 교차 영역 로드 밸런싱을 끕니다.", "엔드포인트의 로컬 DNS 이름을 사용하여 서비스 소비자 컴퓨팅 리소스가 가용 영역별 엔드포인트 서비스를 사용하는지 확인합니다.", "조직의 계획된 가용 영역 간 데이터 전송 사용에 대해 적절한 적용 범위를 제공하는 절약 계획을 만듭니다."], "answers": [2, 3]}, {"q": "회사에는 밤마다 로컬 드라이브에 200GB 내보내기를 작성하는 온프레미스 Microsoft SQL Server 데이터베이스가 있습니다. 회사는 백업을 Amazon S3의 보다 강력한 클라우드 스토리지로 이동하려고 합니다. 회사는 온프레미스 데이터 센터와 AWS 간에 10Gbps AWS Direct Connect 연결을 설정했습니다. 이러한 요구 사항을 가장 비용 효율적으로 충족하는 솔루션은 무엇입니까?", "opts": ["새 S3 버킷을 생성합니다. Direct Connect 연결에 연결된 VPC 내에 AWS Storage Gateway 파일 게이트웨이를 배포합니다. 새 SMB 파일 공유를 만듭니다. 야간 데이터베이스 내보내기를 새 SMB 파일 공유에 씁니다.", "Direct Connect 연결에 연결된 VPC 내에 Windows 파일 서버 단일 AZ 파일 시스템용 Amazon FSx를 생성합니다. 새 SMB 파일 공유를 만듭니다. Amazon FSx 파일 시스템의 SMB 파일 공유에 야간 데이터베이스 내보내기를 작성합니다. 야간 백업을 활성화합니다.", "Direct Connect 연결에 연결된 VPC 내에 Windows 파일 서버 다중 AZ 파일 시스템용 Amazon FSx를 생성합니다. 새 SMB 파일 공유를 만듭니다. Amazon FSx 파일 시스템의 SMB 파일 공유에 야간 데이터베이스 내보내기를 작성합니다. 야간 백업을 활성화합니다.", "새 S3 버킷을 생성합니다. Direct Connect 연결에 연결된 VPC 내에 AWS Storage Gateway 볼륨 게이트웨이를 배포합니다. 새 SMB 파일 공유를 만듭니다. 볼륨 게이트웨이의 새 SMB 파일 공유에 야간 데이터베이스 내보내기를 작성하고 이 데이터의 복사본을 S3 버킷으로 자동화합니다."], "answers": [0]}, {"q": "회사는 온프레미스 데이터 센터에서 AWS로의 연결을 설정해야 합니다. 회사는 VPC 네트워크 간의 전이 라우팅 기능을 사용하여 서로 다른 AWS 리전에 있는 모든 VPC를 연결해야 합니다. 회사는 또한 네트워크 아웃바운드 트래픽 비용을 줄이고 대역폭 처리량을 늘리고 최종 사용자에게 일관된 네트워크 경험을 제공해야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["온프레미스 데이터 센터와 새로운 중앙 VPC 간에 AWS Site-to-Site VPN 연결을 생성합니다. 중앙 VPC에서 다른 모든 VPC로 시작되는 VPC 피어링 연결을 생성합니다.", "온프레미스 데이터 센터와 AWS 간에 AWS Direct Connect 연결을 생성합니다. 전송 VIF를 프로비저닝하고 이를 Direct Connect 게이트웨이에 연결합니다. 각 리전에서 전송 게이트웨이를 사용하여 Direct Connect 게이트웨이를 다른 모든 VPC에 연결합니다.", "온프레미스 데이터 센터와 새로운 중앙 VP 간에 AWS Site-to-Site VPN 연결 생성동적 라우팅이 있는 전송 게이트웨이를 사용합니다. 전송 게이트웨이를 다른 모든 VPC에 연결합니다.", "온프레미스 데이터 센터와 AWS 간에 AWS Direct Connect 연결을 생성합니다. 각 리전의 모든 VPC 간에 AWS Site-to-Site VPN 연결을 설정합니다. 중앙 VPC에서 다른 모든 VPC로 시작되는 VPC 피어링 연결을 생성합니다."], "answers": [1]}, {"q": "회사에서 개발 및 프로덕션 워크로드를 AWS Organizations의 새 조직으로 마이그레이션하고 있습니다. 회사는 개발을 위한 별도의 회원 계정과 프로덕션을 위한 별도의 회원 계정을 생성했습니다. 통합 결제는 마스터 계정에 연결됩니다. 마스터 계정에서 솔루션 설계자는 두 멤버 계정의 리소스를 중지하거나 종료할 수 있는 IAM 사용자를 생성해야 합니다. 이 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["마스터 계정에서 IAM 사용자 및 교차 계정 역할을 생성합니다. 멤버 계정에 대한 최소 액세스 권한으로 교차 계정 역할을 구성합니다.", "각 멤버 계정에서 IAM 사용자를 생성합니다. 마스터 계정에서 최소 권한 액세스 권한이 있는 교차 계정 역할을 생성합니다. 신뢰 정책을 사용하여 IAM 사용자에게 교차 계정 역할에 대한 액세스 권한을 부여합니다.", "마스터 계정에서 IAM 사용자를 생성합니다. 멤버 계정에서 최소 액세스 권한이 있는 IAM 그룹을 생성합니다. 마스터 계정의 IAM 사용자를 멤버 계정의 각 IAM 그룹에 추가합니다.", "마스터 계정에서 IAM 사용자를 생성합니다. 멤버 계정에서 최소 권한 액세스 권한이 있는 교차 계정 역할을 생성합니다. 신뢰 정책을 사용하여 IAM 사용자에게 역할에 대한 액세스 권한을 부여합니다."], "answers": [3]}, {"q": "회사에서 온프레미스 애플리케이션의 재해 복구를 위해 AWS를 사용하려고 합니다. 이 회사는 응용 프로그램을 실행하는 수백 대의 Windows 기반 서버를 보유하고 있습니다. 모든 서버는 공통 공유를 마운트합니다. 회사의 RTO는 15분이고 RPO는 5분입니다. 솔루션은 기본 장애 조치 및 폴백 기능을 지원해야 합니다. 이러한 요구 사항을 가장 비용 효율적으로 충족하는 솔루션은 무엇입니까?", "opts": ["AWS Storage Gateway 파일 게이트웨이를 생성합니다. 매일 Windows 서버 백업을 예약합니다. 데이터를 Amazon S3에 저장합니다. 재해 발생 시 백업에서 온프레미스 서버를 복구합니다. 테일백 중에 Amazon EC2 인스턴스에서 온프레미스 서버를 실행합니다.", "AWS CloudFormation 템플릿 세트를 생성하여 인프라를 생성합니다. AWS DataSync를 사용하여 모든 데이터를 Amazon Elastic File System(Amazon EFS)에 복제합니다. 재해 발생 시 AWS CodePipeline을 사용하여 템플릿을 배포하여 온프레미스 서버를 복원하십시오. DataSync를 사용하여 데이터를 장애 복구합니다.", "AWS에서 다중 사이트 활성-활성 환경을 유지하기 위해 AWS Cloud Development Kit(AWS CDK) 파이프라인을 생성합니다. s3 sync 명령을 사용하여 Amazon S3에 데이터를 복제합니다. 재해 발생 시 AWS를 가리키도록 DNS 엔드포인트를 교체합니다. s3 sync 명령을 사용하여 데이터를 장애 복구합니다.", "AWS Elastic Disaster Recovery를 사용하여 온프레미스 서버를 복제합니다. AWS DataSync를 사용하여 Windows 파일 서버용 Amazon FSx 파일 시스템에 데이터를 복제합니다. 파일 시스템을 AWS 서버에 탑재합니다. 재해 발생 시 온프레미스 서버를 AWS로 장애 조치합니다. Elastic Disaster Recovery를 사용하여 새 서버 또는 기존 서버로 장애 복구합니다."], "answers": [3]}, {"q": "한 회사는 Amazon EFS에 저장된 많은 수의 공유 파일을 생성하는 밀접하게 연결된 워크로드를 위해 AWS에 고성능 컴퓨팅(HPC) 클러스터를 구축했습니다. 클러스터의 Amazon EC2 인스턴스 수가 100개일 때는 클러스터가 잘 작동했습니다. 그러나 회사에서 클러스터 크기를 1,000개의 EC2 인스턴스로 늘렸을 때 전반적인 성능은 예상보다 훨씬 낮았습니다. 솔루션 설계자가 HPC 클러스터에서 최대 성능을 달성하기 위해 어떤 디자인을 선택해야 합니까? (3개 선택)", "opts": ["HPC 클러스터가 단일 가용 영역 내에서 시작되었는지 확인합니다.", "EC2 인스턴스를 시작하고 탄력적 네트워크 인터페이스를 4의 배수로 연결합니다.", "EFA(Elastic Fabric Adapter)가 활성화된 EC2 인스턴스 유형을 선택합니다.", "클러스터가 여러 가용 영역에서 시작되는지 확인합니다.", "Amazon EFS를 RAID 어레이의 여러 Amazon EBS 볼륨으로 교체합니다.", "Amazon EFS를 Lustre용 Amazon FSx로 교체합니다."], "answers": [0, 2, 5]}, {"q": "회사에서 AWS Organizations 구조를 설계하고 있습니다. 회사는 조직 전체에 태그를 적용하는 프로세스를 표준화하려고 합니다. 회사는 사용자가 새 리소스를 만들 때 특정 값이 있는 태그를 요구합니다. 회사의 각 OU에는 고유한 태그 값이 있습니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["필요한 태그가 없는 리소스 생성을 거부하려면 SCP를 사용하십시오. 회사에서 각 OU에 할당한 태그 값을 포함하는 태그 정책을 만듭니다. 태그 정책을 OU에 연결합니다.", "필요한 태그가 없는 리소스 생성을 거부하려면 SCP를 사용하십시오. 회사에서 각 OU에 할당한 태그 값을 포함하는 태그 정책을 만듭니다. 태그 정책을 조직의 마스터 계정에 연결합니다.", "리소스에 필요한 태그가 있는 경우에만 SCP를 사용하여 리소스 생성을 허용합니다. 회사에서 각 OU에 할당한 태그 값을 포함하는 태그 정책을 만듭니다. 태그 정책을 OU에 연결합니다.", "SCP를 사용하여 필수 태그가 없는 리소스 생성을 거부합니다. 태그 목록을 정의합니다. SCP를 OU에 연결합니다."], "answers": [0]}, {"q": "회사에는 MQTT(Message Queuing Telemetry Transport) 프로토콜을 사용하여 온프레미스 Apache Kafka 서버로 데이터를 보내는 10,000개 이상의 센서가 있습니다. 온프레미스 Kafka 서버는 데이터를 변환한 다음 결과를 Amazon S3 버킷에 객체로 저장합니다. 최근 Kafka 서버가 충돌했습니다. 회사는 서버를 복원하는 동안 센서 데이터를 손실했습니다. 솔루션 설계자는 유사한 발생을 방지하기 위해 AWS에서 가용성과 확장성이 뛰어난 새로운 디자인을 생성해야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["2개의 Amazon EC2 인스턴스를 시작하여 2개의 가용 영역에서 활성/대기 구성으로 Kafka 서버를 호스팅합니다. Amazon Route 53에서 도메인 이름을 생성합니다. Route 53 장애 조치 정책을 생성합니다. 센서를 라우팅하여 데이터를 도메인 이름으로 보냅니다.", "온프레미스 Kafka 서버를 Amazon Managed Streaming for Apache Kafka(Amazon MSK)로 마이그레이션합니다. Amazon MSK 브로커를 가리키는 NLB(Network Load Balancer)를 생성합니다. NLB 상태 확인을 활성화합니다. 데이터를 NLB로 보내도록 센서를 라우팅합니다.", "AWS IoT Core를 배포하고 Amazon Kinesis Data Firehose 전송 스트림에 연결합니다. AWS Lambda 함수를 사용하여 데이터 변환을 처리합니다. 데이터를 AWS IoT Core로 보내도록 센서를 라우팅합니다.", "AWS IoT Core를 배포하고 Amazon EC2 인스턴스를 시작하여 Kafka 서버를 호스팅합니다. 데이터를 EC2 인스턴스로 보내도록 AWS IoT Core를 구성합니다. 데이터를 AWS IoT Core로 보내도록 센서를 라우팅합니다."], "answers": [2]}, {"q": "한 회사가 최근 AWS 클라우드에서 새로운 애플리케이션 워크로드를 호스팅하기 시작했습니다. 회사는 Amazon EC2 인스턴스를 사용하고 있습니다. Amazon Elastic File System(Amazon EFS) 파일 시스템 및 Amazon RDS DB 인스턴스. 규정 및 비즈니스 요구 사항을 충족하기 위해 회사는 데이터 백업에 대해 다음과 같이 변경해야 합니다. • 백업은 사용자 정의 일일, 주간 및 월간 요구 사항에 따라 유지되어야 합니다. • 백업은 캡처 직후 하나 이상의 다른 AWS 리전에 복제되어야 합니다. • 백업 솔루션은 AWS 환경 전체에서 단일 백업 상태 소스를 제공해야 합니다. • 백업 솔루션은 리소스 백업 실패 시 즉시 알림을 보내야 합니다. 최소한의 운영 오버헤드로 이러한 요구 사항을 충족하는 단계 조합은 무엇입니까? (3개 선택)", "opts": ["각 보존 요구 사항에 대한 백업 규칙을 사용하여 AWS Backup 계획을 생성합니다.", "백업을 다른 지역으로 복사하도록 AWS Backup 계획을 구성합니다.", "백업을 다른 리전에 복제하고 실패가 발생하면 알림을 보내는 AWS Lambda 함수를 생성합니다.", "백업 계획에 Amazon Simple Notification Service(Amazon SNS) 주제를 추가하여 BACKUP_JOB_COMPLETED 이외의 상태인 완료된 작업에 대한 알림을 보냅니다.", "각 보존 요구 사항에 대해 Amazon Data Lifecycle Manager(Amazon DLM) 스냅샷 수명 주기 정책을 생성합니다.", "각 데이터베이스에 RDS 스냅샷을 설정합니다."], "answers": [0, 1, 3]}, {"q": "한 회사에서 연구자들이 다양한 모집단으로부터 대량의 데이터 샘플을 수집하는 데 도움이 되도록 게놈 정보를 수집할 유전자 보고 장치를 개발하고 있습니다. 이 장치는 데이터를 처리 및 분석하고 연구원에게 정보를 다시 제공해야 하는 데이터 플랫폼에 매초 8KB의 게놈 데이터를 푸시합니다. 데이터 플랫폼은 다음 요구 사항을 충족해야 합니다. • 인바운드 게놈 데이터의 거의 실시간 분석 제공 • 데이터가 유연하고 병렬적이며 내구성이 있는지 확인 • 처리 결과를 데이터 웨어하우스로 전달 이러한 요구 사항을 충족하기 위해 솔루션 설계자는 어떤 전략을 사용해야 합니까?", "opts": ["Amazon Kinesis Data Firehose를 사용하여 인바운드 센서 데이터를 수집하고 Kinesis 클라이언트로 데이터를 분석하고 결과를 Amazon RDS 인스턴스에 저장합니다.", "Amazon Kinesis Data Streams를 사용하여 인바운드 센서 데이터를 수집하고, Kinesis 클라이언트로 데이터를 분석하고, Amazon EMR을 사용하여 Amazon Redshift 클러스터에 결과를 저장합니다.", "Amazon S3를 사용하여 인바운드 디바이스 데이터를 수집하고 Amazon SQS에서 Kinesis로 데이터를 분석하고 결과를 Amazon Redshift 클러스터에 저장합니다.", "Amazon API Gateway를 사용하여 요청을 Amazon SQS 대기열에 넣고, AWS Lambda 함수로 데이터를 분석하고, Amazon EMR을 사용하여 Amazon Redshift 클러스터에 결과를 저장합니다."], "answers": [1]}, {"q": "솔루션 설계자는 웹을 사용하는 3계층 애플리케이션용 솔루션에 대한 참조 아키텍처를 정의해야 합니다. 애플리케이션 및 NoSQL 데이터 계층. 참조 아키텍처는 다음 요구 사항을 충족해야 합니다. • AWS 리전 내 고가용성 • 재해 복구를 위해 1분 안에 다른 AWS 리전으로 장애 조치 가능 • 사용자 경험에 미치는 영향을 최소화하면서 가장 효율적인 솔루션 제공 이러한 요구 사항을 충족하는 단계 조합은 무엇입니까? (3개 선택)", "opts": ["선택한 두 리전에서 100/0으로 설정된 Amazon Route 53 가중치 라우팅 정책을 사용합니다. TTL(Time to Live)을 1시간으로 설정합니다.", "기본 지역에서 재해 복구 지역으로의 장애 조치를 위해 Amazon Route 53 장애 조치 라우팅 정책을 사용하십시오. TTL(Time to Live)을 30초로 설정합니다.", "선택한 두 리전에서 데이터에 액세스할 수 있도록 Amazon DynamoDB 내에서 전역 테이블을 사용합니다.", "기본 리전의 Amazon DynamoDB 테이블에서 60분마다 데이터를 백업한 다음 데이터를 Amazon S3에 씁니다. S3 교차 리전 복제를 사용하여 기본 리전에서 재해 복구 리전으로 데이터를 복사합니다. 재해 복구 시나리오에서 스크립트가 데이터를 DynamoDB로 가져오도록 합니다.", "리전의 여러 가용 영역에서 웹 및 애플리케이션 계층에 대해 Auto Scaling 그룹을 사용하여 상시 대기 모델을 구현합니다. 최소 서버 수에는 영역 예약 인스턴스를 사용하고 추가 리소스에는 온디맨드 인스턴스를 사용합니다.", "리전의 여러 가용 영역에서 웹 및 애플리케이션 계층에 대해 Auto Scaling 그룹을 사용합니다. 필요한 리소스에 스팟 인스턴스를 사용합니다."], "answers": [1, 2, 4]}, {"q": "스마트 자동차를 제조하는 회사입니다. 회사는 맞춤형 애플리케이션을 사용하여 차량 데이터를 수집합니다. 차량은 MQTT 프로토콜을 사용하여 애플리케이션에 연결합니다. 회사는 5분 간격으로 데이터를 처리합니다. 그런 다음 회사는 차량 텔레매틱스 데이터를 온프레미스 스토리지에 복사합니다. 맞춤형 애플리케이션은 이 데이터를 분석하여 이상을 감지합니다. 데이터를 전송하는 차량의 수는 지속적으로 증가하고 있습니다. 최신 차량은 많은 양의 데이터를 생성합니다. 온프레미스 스토리지 솔루션은 피크 트래픽에 맞게 확장할 수 없으므로 데이터 손실이 발생합니다. 회사는 솔루션을 현대화하고 솔루션을 AWS로 마이그레이션하여 확장 문제를 해결해야 합니다. 최소한의 운영 오버헤드로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["AWS IoT Greengrass를 사용하여 차량 데이터를 Amazon Managed Streaming for Apache Kafka(Amazon MSK)로 보냅니다. Amazon S3에 데이터를 저장할 Apache Kafka 애플리케이션을 생성합니다. Amazon SageMaker에서 사전 훈련된 모델을 사용하여 이상을 감지합니다.", "AWS IoT Core를 사용하여 차량 데이터를 수신합니다. Amazon S3에 데이터를 저장하는 Amazon Kinesis Data Firehose 전송 스트림으로 데이터를 라우팅하도록 규칙을 구성합니다. 이상을 감지하기 위해 전송 스트림에서 읽는 Amazon Kinesis Data Analytics 애플리케이션을 생성합니다.", "AWS IoT FleetWise를 사용하여 차량 데이터를 수집합니다. 데이터를 Amazon Kinesis 데이터 스트림으로 보냅니다. Amazon Kinesis Data Firehose 전송 스트림을 사용하여 Amazon S3에 데이터를 저장합니다. AWS Glue에 내장된 기계 학습 변환을 사용하여 이상을 감지합니다.", "RabbitMQ용 Amazon MQ를 사용하여 차량 데이터를 수집합니다. 데이터를 Amazon Kinesis Data Firehose 전송 스트림으로 보내 Amazon S3에 데이터를 저장합니다. Amazon Lookout for Metrics를 사용하여 이상 징후를 탐지하십시오."], "answers": [1]}, {"q": "감사 중에 보안 팀은 개발 팀이 코드에 IAM 사용자 보안 액세스 키를 넣은 다음 AWS CodeCommit 리포지토리에 커밋하고 있음을 발견했습니다. 보안 팀은 이 보안 취약점의 인스턴스를 자동으로 찾아 수정하기를 원합니다. 자격 증명이 자동으로 적절하게 보호되도록 보장하는 솔루션은 무엇입니까?", "opts": ["AWS Systems Manager Run Command를 사용하여 야간에 스크립트를 실행하여 개발 인스턴스에서 자격 증명을 검색합니다. 찾은 경우 AWS Secrets Manager를 사용하여 자격 증명을 교체합니다.", "예약된 AWS Lambda 함수를 사용하여 CodeCommit에서 애플리케이션 코드를 다운로드하고 스캔합니다. 자격 증명이 발견되면 새 자격 증명을 생성하고 AWS KMS에 저장합니다.", "CodeCommit 리포지토리에서 자격 증명을 검색하도록 Amazon Macie를 구성합니다. 자격 증명이 발견되면 AWS Lambda 함수를 트리거하여 자격 증명을 비활성화하고 사용자에게 알립니다.", "AWS Lambda 함수를 호출하여 자격 증명에 대한 새 코드 제출을 스캔하도록 CodeCommit 트리거를 구성합니다. 자격 증명이 발견되면 AWS IAM에서 비활성화하고 사용자에게 알립니다."], "answers": [3]}, {"q": "회사는 Amazon S3에 여러 AWS 계정에 걸쳐 수백 개의 애플리케이션에서 액세스해야 하는 데이터 레이크를 보유하고 있습니다. 회사의 정보 보안 정책에 따르면 공용 인터넷을 통해 S3 버킷에 액세스할 수 없으며 각 애플리케이션이 작동하는 데 필요한 최소한의 권한이 있어야 합니다. 이러한 요구 사항을 충족하기 위해 솔루션 설계자는 각 애플리케이션의 특정 VPC로 제한된 S3 액세스 포인트를 사용할 계획입니다. 솔루션 설계자는 이 솔루션을 구현하기 위해 어떤 단계 조합을 수행해야 합니까? (2개 선택)", "opts": ["S3 버킷을 소유한 AWS 계정의 각 애플리케이션에 대한 S3 액세스 포인트를 생성합니다. 애플리케이션의 VPC에서만 액세스할 수 있도록 각 액세스 포인트를 구성합니다. 액세스 포인트에서 접근을 요구하도록 버킷 정책을 업데이트합니다.", "각 애플리케이션의 VPC에서 Amazon S3에 대한 인터페이스 엔드포인트를 생성합니다. S3 액세스 포인트에 대한 접근을 허용하도록 엔드포인트 정책을 구성합니다. S3 엔드포인트에 대한 VPC 게이트웨이 연결을 생성합니다.", "각 애플리케이션의 VPC에서 Amazon S3에 대한 게이트웨이 엔드포인트를 생성하고 S3 액세스 포인트에 대한 접근을 허용하도록 엔드포인트 정책을 구성합니다. 액세스 포인트에 액세스하는 데 사용되는 라우팅 테이블을 지정합니다.", "각 AWS 계정의 각 애플리케이션에 대한 S3 액세스 포인트를 생성하고 액세스 포인트를 S3 버킷에 연결합니다. 애플리케이션의 VPC에서만 액세스할 수 있도록 각 액세스 포인트를 구성합니다. 액세스 포인트에서 접근을 요구하도록 버킷 정책을 업데이트합니다.", "데이터 레이크의 VPC에서 Amazon S3에 대한 게이트웨이 엔드포인트를 생성합니다. S3 버킷에 대한 접근을 허용하는 엔드포인트 정책을 연결합니다. 버킷에 액세스하는 데 사용되는 라우팅 테이블을 지정합니다."], "answers": [0, 2]}, {"q": "한 회사에서 데이터 센터와 AWS 간의 하이브리드 솔루션을 개발했습니다. 이 회사는 애플리케이션 로그를 Amazon CloudWatch로 전송하는 Amazon VPC 및 Amazon EC2 인스턴스를 사용합니다. EC2 인스턴스는 온프레미스에서 호스팅되는 여러 관계형 데이터베이스에서 데이터를 읽습니다. 회사는 거의 실시간으로 데이터베이스에 연결된 EC2 인스턴스를 모니터링하려고 합니다. 이 회사는 이미 온프레미스에서 Splunk를 사용하는 모니터링 솔루션을 보유하고 있습니다. 솔루션 설계자는 네트워킹 트래픽을 Splunk로 보내는 방법을 결정해야 합니다. 솔루션 설계자는 이러한 요구 사항을 어떻게 충족해야 합니까?", "opts": ["VPC 흐름 로그를 활성화하고 CloudWatch로 보냅니다. 미리 정의된 내보내기 기능을 사용하여 CloudWatch 로그를 Amazon S3 버킷으로 주기적으로 내보내는 AWS Lambda 함수를 생성합니다. ACCESS_KEY 및 SECRET_KEY AWS 자격 증명을 생성합니다. 해당 자격 증명을 사용하여 S3 버킷에서 로그를 가져오도록 Splunk를 구성합니다.", "Splunk를 대상으로 사용하여 Amazon Kinesis Data Firehose 전송 스트림을 생성합니다. CloudWatch Logs 구독 필터에서 보낸 레코드에서 개별 로그 이벤트를 추출하는 Kinesis Data Firehose 스트림 프로세서로 전처리 AWS Lambda 함수를 구성합니다. VPC 흐름 로그를 활성화하고 CloudWatch로 보냅니다. 로그 이벤트를 Kinesis Data Firehose 전송 스트림으로 보내는 CloudWatch Logs 구독을 생성합니다.", "EC2 인스턴스 IP 주소와 함께 데이터베이스에 대한 모든 요청을 기록하도록 회사에 요청합니다. CloudWatch 로그를 Amazon S3 버킷으로 내보냅니다. Amazon Athena를 사용하여 데이터베이스 이름별로 그룹화된 로그를 쿼리합니다. Athena 결과를 다른 S3 버킷으로 내보냅니다. AWS Lambda 함수를 호출하여 S3 버킷에 저장되는 새 파일을 자동으로 Splunk로 보냅니다.", "SQL 애플리케이션용 Amazon Kinesis Data Analytics를 사용하여 CloudWatch 로그를 Amazon Kinesis 데이터 스트림으로 보냅니다. 이벤트를 수집하도록 1분 슬라이딩 윈도우를 구성합니다. 이상 탐지 템플릿을 사용하는 SQL 쿼리를 생성하여 네트워킹 트래픽 이상을 거의 실시간으로 모니터링합니다. Splunk를 대상으로 하는 Amazon Kinesis Data Firehose 전송 스트림으로 결과를 보냅니다."], "answers": [1]}, {"q": "회사에는 애플리케이션을 개발하고 호스팅하기 위해 각각 5개의 AWS 계정을 생성한 5개의 개발 팀이 있습니다. 지출을 추적하기 위해 개발 팀은 매월 각 계정에 로그인하고 AWS Billing and Cost Management 콘솔에서 현재 비용을 기록하고 회사의 재무 팀에 정보를 제공합니다. 이 회사는 엄격한 규정 준수 요구 사항이 있으며 리소스가 미국의 AWS 리전에서만 생성되도록 해야 합니다. 그러나 일부 리소스는 다른 리전에서 생성되었습니다. 솔루션 설계자는 재무 팀이 모든 계정에 대한 지출을 추적하고 통합할 수 있는 기능을 제공하는 솔루션을 구현해야 합니다. 솔루션은 또한 회사가 미국 지역에서만 리소스를 생성할 수 있도록 해야 합니다. 운영상 가장 효율적인 방식으로 이러한 요구 사항을 충족하는 단계 조합은 무엇입니까? (3개 선택)", "opts": ["마스터 계정 역할을 할 새 계정을 만듭니다. 재무 팀을 위한 Amazon S3 버킷을 생성합니다. AWS 비용 및 사용 보고서를 사용하여 월별 보고서를 생성하고 재무 팀의 S3 버킷에 데이터를 저장합니다.", "마스터 계정 역할을 할 새 계정을 생성합니다. 모든 기능이 활성화된 상태에서 AWS Organizations에 조직을 배포합니다. 모든 기존 계정을 조직에 초대합니다. 각 계정이 초대를 수락하는지 확인하십시오.", "모든 개발 팀을 포함하는 OU를 만듭니다. 미국에 있는 리전에서만 리소스 생성을 허용하는 SCP를 생성합니다. SCP를 OU에 적용합니다.", "모든 개발 팀을 포함하는 OU를 만듭니다. 미국 이외의 리전에서 리소스 생성을 거부하는 SCP를 만듭니다. SCP를 OU에 적용합니다.", "마스터 계정에서 IAM 역할을 생성합니다. Billing and Cost Management 콘솔을 볼 수 있는 권한이 포함된 정책을 연결합니다. 재무 팀 사용자가 역할을 맡도록 허용합니다. AWS Cost Explorer와 Billing and Cost Management 콘솔을 사용하여 비용을 분석합니다.", "각 AWS 계정에서 IAM 역할을 생성합니다. Billing and Cost Management 콘솔을 볼 수 있는 권한이 포함된 정책을 연결합니다. 재무 팀 사용자가 역할을 맡도록 허용합니다."], "answers": [1, 3, 4]}, {"q": "회사는 중앙 위치에서 여러 부서의 여러 AWS 계정을 만 서브넷과의 통신을 허용하는지 확인합니다. NACL이 인터페이스 엔드포인트 서브넷에 연결되어 EC2 인스턴스에서 실행되는 로깅 서비스 서브넷과의 통신을 허용하는지 확인하십시오.", "EC2 인스턴스에서 실행 중인 로깅 서비스의 보안 그룹을 확인하여 NLB 서브넷에서 수신을 허용하는지 확인합니다.", "EC2 인스턴스에서 실행되는 로깅 서비스의 보안 그룹을 확인하여 클라이언트로부터의 수신을 허용하는지 확인하십시오.", "NLB의 보안 그룹을 확인하여 인터페이스 엔드포인트 서브넷에서 수신을 허용하는지 확인합니다."], "answers": [0, 2]}, {"q": "회사는 Amazon S3 버킷에 수백만 개의 객체를 가지고 있습니다. 객체는 S3 Standard 스토리지 클래스에 있습니다. 모든 S3 객체는 자주 액세스됩니다. 개체에 액세스하는 사용자 및 응용 프로그램의 수가 빠르게 증가하고 있습니다. 객체는 AWS KMS 키(SSE-KMS)를 사용한 서버 측 암호화로 암호화됩니다. 솔루션 아키텍트는 회사의 월별 AWS 송장을 검토하고 Amazon S3의 많은 요청으로 인해 AWS KMS 비용이 증가하고 있음을 확인합니다. 솔루션 설계자는 애플리케이션에 대한 최소한의 변경으로 비용을 최적화해야 합니다. 최소한의 운영 오버헤드로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["고객 제공 키(SSE-C)를 암호화 유형으로 사용하여 서버 측 암호화가 있는 새 S3 버킷을 생성합니다. 기존 객체를 새 S3 버킷에 복사합니다. SSE-C를 지정합니다.", "Amazon S3 관리 키(SSE-S3)를 암호화 유형으로 사용하여 서버 측 암호화가 있는 새 S3 버킷을 생성합니다. S3 배치 작업을 사용하여 기존 객체를 새 S3 버킷에 복사합니다. SSE-S3를 지정합니다.", "AWS CloudHSM을 사용하여 암호화 키를 저장합니다. 새 S3 버킷을 생성합니다. S3 배치 작업을 사용하여 기존 객체를 새 S3 버킷에 복사합니다. CloudHSM의 키를 사용하여 객체를 암호화합니다.", "S3 버킷에 S3 Intelligent-Tiering 스토리지 클래스를 사용합니다. S3 Intelligent-Tiering 아카이브 구성을 생성하여 90일 동안 액세스되지 않은 객체를 S3 Glacier Deep Archive로 전환합니다."], "answers": [1]}, {"q": "미디어 스토리지 애플리케이션은 AWS Lambda 기능으로 처리하기 위해 사용자 사진을 Amazon S3에 업로드합니다. 애플리케이션 상태는 Amazon DynamoDB 테이블에 저장됩니다. 일부 업로드된 사진이 제대로 처리되지 않는다는 사용자의 보고가 있습니다. 애플리케이션 개발자는 로그를 추적하고 수천 명의 사용자가 동시에 사진을 업로드할 때 Lambda가 사진 처리 문제를 겪고 있음을 발견합니다. 문제는 데이터 저장 시 Lambda 동시성 제한 및 DynamoDB 성능의 결과입니다. 애플리케이션의 성능과 안정성을 높이기 위해 솔루션 설계자가 취해야 하는 작업 조합은 무엇입니까? (2개 선택)", "opts": ["DynamoDB 테이블에 대한 RCU를 평가하고 조정합니다.", "DynamoDB 테이블에 대한 WCU를 평가하고 조정합니다.", "Amazon ElastiCache 계층을 추가하여 Lambda 함수의 성능을 높입니다.", "Amazon S3와 Lambda 함수 사이에 Amazon Simple Queue Service(Amazon SQS) 대기열 및 재처리 로직을 추가합니다.", "S3 Transfer Acceleration을 사용하여 사용자에게 더 짧은 지연 시간을 제공합니다."], "answers": [1, 3]}, {"q": "회사는 온프레미스 데이터 센터에서 애플리케이션을 실행합니다. 이 애플리케이션은 사용자에게 미디어 파일을 업로드할 수 있는 기능을 제공합니다. 파일은 파일 서버에 유지됩니다. 웹 애플리케이션에는 많은 사용자가 있습니다. 응용 프로그램 서버가 과도하게 사용되어 때때로 데이터 업로드가 실패합니다. 회사는 파일 서버에 새 스토리지를 자주 추가합니다. 회사는 애플리케이션을 AWS로 마이그레이션하여 이러한 문제를 해결하고자 합니다. 미국과 캐나다 전역의 사용자가 애플리케이션에 액세스합니다. 인증된 사용자만 애플리케이션에 액세스하여 파일을 업로드할 수 있어야 합니다. 회사는 애플리케이션을 리팩터링하는 솔루션을 고려할 것이며 회사는 애플리케이션 개발을 가속화해야 합니다. 최소한의 운영 오버헤드로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["AWS Application Migration Service를 사용하여 애플리케이션 서버를 Amazon EC2 인스턴스로 마이그레이션합니다. EC2 인스턴스에 대한 Auto Scaling 그룹을 생성합니다. Application Load Balancer를 사용하여 요청을 분산합니다. Amazon S3를 사용하여 파일을 유지하도록 애플리케이션을 수정합니다. Amazon Cognito를 사용하여 사용자를 인증합니다.", "AWS Application Migration Service를 사용하여 애플리케이션 서버를 Amazon EC2 인스턴스로 마이그레이션합니다. EC2 인스턴스에 대한 Auto Scaling 그룹을 생성합니다. Application Load Balancer를 사용하여 요청을 분산합니다. 사용자가 애플리케이션에 로그인할 수 있도록 AWS IAM Identity Center(AWS Single Sign-On)를 설정합니다. Amazon S3를 사용하여 파일을 유지하도록 애플리케이션을 수정합니다.", "미디어 파일 업로드를 위한 정적 웹사이트를 만듭니다. 정적 자산을 Amazon S3에 저장합니다. AWS AppSync를 사용하여 API를 생성합니다. AWS Lambda 확인자를 사용하여 미디어 파일을 Amazon S3에 업로드합니다. Amazon Cognito를 사용하여 사용자를 인증합니다.", "AWS Amplify를 사용하여 미디어 파일 업로드를 위한 정적 웹사이트를 생성합니다. Amplify Hosting을 사용하여 Amazon CloudFront를 통해 웹 사이트를 제공합니다. Amazon S3를 사용하여 업로드된 미디어 파일을 저장합니다. Amazon Cognito를 사용하여 사용자를 인증합니다."], "answers": [3]}, {"q": "회사에는 ALB(Application Load Balancer) 뒤의 Amazon EC2 인스턴스에 배포된 애플리케이션이 있습니다. 인스턴스는 Auto Scaling 그룹의 일부입니다. 애플리케이션에 예측할 수 없는 워크로드가 있고 확장 및 확장이 자주 발생합니다. 회사의 개발 팀은 애플리케이션 로그를 분석하여 애플리케이션 성능을 개선할 방법을 찾고자 합니다. 그러나 인스턴스가 축소된 후에는 더 이상 로그를 사용할 수 없습니다. 축소 이벤트 후 개발 팀이 애플리케이션 로그를 볼 수 있는 솔루션은 무엇입니까?", "opts": ["ALB에 대한 액세스 로그를 활성화합니다. Amazon S3 버킷에 로그를 저장합니다.", "통합 CloudWatch 에이전트를 사용하여 Amazon CloudWatch Logs에 로그를 게시하도록 EC2 인스턴스를 구성합니다.", "단계 조정 정책을 사용하도록 Auto Scaling 그룹을 수정합니다.", "AWS X-Ray 추적으로 애플리케이션을 구성합니다."], "answers": [1]}, {"q": "회사는 사용자 등록 양식이 포함된 인증되지 않은 정적 웹사이트(www.example.com)를 운영합니다. 이 웹 사이트는 호스팅에 Amazon S3를 사용하고 AWS WAF가 구성된 콘텐츠 전송 네트워크로 Amazon CloudFront를 사용합니다. 등록 양식이 제출되면 웹 사이트는 AWS Lambda 함수를 호출하는 Amazon API Gateway API 엔드포인트를 호출하여 페이로드를 처리하고 페이로드를 외부 API 호출로 전달합니다. 테스트 중에 솔루션 설계자가 CORS(교차 원본 리소스 공유) 오류를 발견했습니다. 솔루션 설계자는 CloudFront 배포 오리진에 www.example.com으로 설정된 Access-Control-Allow-Origin 헤더가 있는지 확인합니다. 솔루션 설계자는 오류를 해결하기 위해 무엇을 해야 합니까?", "opts": ["S3 버킷에서 CORS 구성을 변경합니다. www.example.com의 AllowedOrigin 요소에 CORS에 대한 규칙을 추가합니다.", "AWS WAF에서 CORS 설정을 활성화합니다. Access-Control-Allow-Origin 헤더가 www.example.com으로 설정된 웹 ACL 규칙을 생성합니다.", "API Gateway API 엔드포인트에서 CORS 설정을 활성화합니다. Access-Control-Allow-Origin 헤더가 www.example.com으로 설정된 모든 응답을 반환하도록 API 엔드포인트가 구성되었는지 확인합니다.", "Lambda 함수에서 CORS 설정을 활성화합니다. 함수의 반환 코드에 www.example.com으로 설정된 Access-Control-Allow-Origin 헤더가 있는지 확인하십시오."], "answers": [2]}, {"q": "회사에는 별도의 AWS 계정이 많이 있으며 중앙 청구 또는 관리를 사용하지 않습니다. 각 AWS 계정은 회사의 여러 부서에 대한 서비스를 호스팅합니다. 회사에는 배포된 Microsoft Azure Active Directory가 있습니다. 솔루션 설계자는 회사의 AWS 계정에 대한 청구 및 관리를 중앙 집중화해야 합니다. 회사는 수동 사용자 관리 대신 ID 연합을 사용하기를 원합니다. 회사는 또한 수명이 긴 액세스 키 대신 임시 자격 증명을 사용하려고 합니다. 이러한 요구 사항을 충족하는 단계 조합은 무엇입니까? (3개 선택)", "opts": ["마스터 계정 역할을 할 새 AWS 계정을 생성합니다. AWS Organizations에서 조직을 배포합니다. 각 기존 AWS 계정을 조직에 가입하도록 초대합니다. 각 계정이 초대를 수락하는지 확인하십시오.", "각 AWS 계정의 이메일 주소를 aws+@example.com으로 구성하여 계정 관리 이메일 메시지와 인보이스가 같은 곳으로 전송되도록 합니다.", "마스터 계정에서 AWS IAM Identity Center(AWS Single Sign-On)를 배포합니다. IAM Identity Center를 Azure Active Directory에 연결합니다. 사용자 및 그룹의 자동 동기화를 위해 IAM Identity Center를 구성합니다.", "마스터 계정에 AWS Managed Microsoft AD 디렉터리를 배포합니다. AWS Resource Access Manager(AWS RAM)를 사용하여 조직의 다른 모든 계정과 디렉터리를 공유합니다.", "AWS IAM Identity Center(AWS Single Sign-On) 권한 집합을 생성합니다. 적절한 IAM 자격 증명 센터 그룹 및 AWS 계정에 권한 집합을 연결합니다.", "인증 및 권한 부여에 AWS Managed Microsoft AD를 사용하도록 각 AWS 계정에서 AWS Identity and Access Management(IAM)를 구성합니다."], "answers": [0, 2, 4]}, {"q": "한 회사에서 AWS로 마이그레이션하여 자주 사용하지는 않지만 여전히 비즈니스에 중요한 애플리케이션 그룹 20개와 관련된 비용을 관리하려고 합니다. 애플리케이션은 서로 다른 인스턴스 클러스터에 분산된 Java와 Node.js의 혼합입니다. 회사는 단일 배포 방법론을 사용하여 표준화하면서 비용을 최소화하려고 합니다. 대부분의 응용 프로그램은 동시 사용자 수가 적은 월말 처리 루틴의 일부이지만 때때로 다른 시간에 실행됩니다. 평균 애플리케이션 메모리 사용량은 1GB 미만입니다. 일부 응용 프로그램은 피크 처리 중에 최대 2.5GB의 메모리를 사용합니다. 그룹에서 가장 중요한 애플리케이션은 여러 데이터 소스에 액세스하고 종종 몇 시간 동안 실행되는 Java로 작성된 청구 보고서입니다. 가장 비용 효율적인 솔루션은 무엇입니까?", "opts": ["각 애플리케이션에 대해 별도의 AWS Lambda 함수를 배포합니다. AWS CloudTrail 로그 및 Amazon CloudWatch 경보를 사용하여 중요한 작업의 완료를 확인하십시오.", "75%의 메모리 사용률로 구성된 Auto Scaling을 사용하여 Amazon EC2에 Amazon ECS 컨테이너를 배포합니다. ECS 작업 확장으로 마이그레이션되는 각 애플리케이션에 대해 ECS 작업을 배포합니다. Amazon CloudWatch를 사용하여 서비스 및 호스트를 모니터링합니다.", "Auto Scaling을 사용하여 각 애플리케이션에 대해 AWS Elastic Beanstalk를 배포하여 모든 요청에 충분한 리소스가 있는지 확인합니다. CloudWatch 경보를 사용하여 각 AWS Elastic Beanstalk 배포를 모니터링합니다.", "EC2 Auto Scaling 및 Application Load Balancer를 사용하여 모든 애플리케이션을 공동 호스팅하는 새로운 Amazon EC2 인스턴스 클러스터를 배포합니다. 인스턴스 메모리 사용률에 설정된 사용자 지정 메트릭을 기반으로 클러스터 크기를 확장합니다. Auto Scaling 그룹의 GroupMaxSize 파라미터와 동일한 3년 예약 인스턴스 예약을 구매합니다."], "answers": [1]}, {"q": "솔루션 설계자는 EMRFS(EMR 파일 시스템)를 사용하는 Amazon EMR 클러스터의 설계를 검토해야 합니다. 클러스터는 비즈니스 요구에 중요한 작업을 수행합니다. 클러스터는 모든 작업, 기본 및 코어 노드에 대해 항상 Amazon EC2 온디맨드 인스턴스를 실행하고 있습니다. EMR 작업은 매일 아침 오전 1시에 시작하여 실행됩니다. 실행을 완료하는 데 6시간이 걸립니다. 데이터가 늦은 시간까지 참조되지 않기 때문에 처리를 완료하는 데 걸리는 시간은 우선순위가 아닙니다. 솔루션 설계자는 아키텍처를 검토하고 컴퓨팅 비용을 최소화하는 솔루션을 제안해야 합니다. 이러한 요구 사항을 충족하기 위해 솔루션 설계자는 어떤 솔루션을 권장해야 합니까?", "opts": ["인스턴스 플릿의 스팟 인스턴스에서 모든 작업, 기본 및 코어 노드를 시작합니다. 처리가 완료되면 모든 인스턴스를 포함하여 클러스터를 종료합니다.", "온디맨드 인스턴스에서 기본 및 코어 노드를 시작합니다. 인스턴스 플릿의 스팟 인스턴스에서 작업 노드를 시작합니다. 처리가 완료되면 모든 인스턴스를 포함하여 클러스터를 종료합니다. 온디맨드 인스턴스 사용량을 충당하려면 Compute Savings Plans를 구입하십시오.", "온디맨드 인스턴스에서 모든 노드를 계속 시작합니다. 처리가 완료되면 모든 인스턴스를 포함하여 클러스터를 종료합니다. 온디맨드 인스턴스 사용량을 충당하려면 Compute Savings Plans를 구입하십시오.", "온디맨드 인스턴스에서 기본 및 코어 노드를 시작합니다. 인스턴스 플릿의 스팟 인스턴스에서 작업 노드를 시작합니다. 처리가 완료되면 작업 노드 인스턴스만 종료합니다. 온디맨드 인스턴스 사용량을 충당하려면 Compute Savings Plans를 구입하십시오."], "answers": [3]}, {"q": "회사에서 레거시 애플리케이션을 AWS 클라우드로 마이그레이션했습니다. 애플리케이션은 3개의 가용 영역에 분산된 3개의 Amazon EC2 인스턴스에서 실행됩니다. 하나의 EC2 인스턴스는 각 가용 영역에 있습니다. EC2 인스턴스는 VPC의 프라이빗 서브넷 3개에서 실행 중이며 퍼블릭 서브넷 3개와 연결된 ALB(Application Load Balancer)의 대상으로 설정됩니다. 애플리케이션은 온프레미스 시스템과 통신해야 합니다. 회사의 IP 주소 범위에 있는 IP 주소의 트래픽만 온프레미스 시스템에 액세스할 수 있습니다. 회사의 보안 팀은 내부 IP 주소 범위에서 클라우드로 하나의 IP 주소만 가져오고 있습니다. 회사는 이 IP 주소를 회사 방화벽의 허용 목록에 추가했습니다. 회사는 또한 이 IP 주소에 대해 ling 그룹을 생성합니다. Auto Scaling 그룹에 새 시작 템플릿을 연결합니다. Auto Scaling 그룹을 기존 ALB에 연결합니다. 기존 ALB가 기존 EC2 인스턴스를 Auto Scaling 그룹에 등록할 때까지 기다립니다."], "answers": [1]}, {"q": "회사는 AWS Organizations의 회사 조직 내 개발자 계정에서 AWS 데이터 전송 비용 및 컴퓨팅 비용을 최적화하려고 합니다. 개발자는 단일 AWS 리전에서 VPC를 구성하고 Amazon EC2 인스턴스를 시작할 수 있습니다. EC2 인스턴스는 Amazon S3에서 매일 약 1TB의 데이터를 검색합니다. 개발자 활동으로 인해 높은 컴퓨팅 비용과 함께 EC2 인스턴스와 S3 버킷 간의 과도한 월 데이터 전송 요금 및 NAT 게이트웨이 처리 요금이 발생합니다. 이 회사는 개발자가 AWS 계정 내에 배포하는 모든 EC2 인스턴스 및 VPC 인프라에 대해 승인된 아키텍처 패턴을 사전에 시행하고자 합니다. 회사는 이러한 시행이 개발자가 작업을 수행할 수 있는 속도에 부정적인 영향을 미치는 것을 원하지 않습니다. 이러한 요구 사항을 가장 비용 효율적으로 충족하는 솔루션은 무엇입니까?", "opts": ["개발자가 승인되지 않은 EC2 인스턴스 유형을 시작하지 못하도록 SCP를 생성합니다. 개발자에게 AWS CloudFormation 템플릿을 제공하여 S3 인터페이스 엔드포인트가 있는 승인된 VPC 구성을 배포합니다. 개발자가 CloudFormation으로만 VPC 리소스를 시작할 수 있도록 개발자의 IAM 권한 범위를 지정합니다.", "개발자 계정 전체에서 EC2 컴퓨팅 비용 및 S3 데이터 전송 비용을 모니터링하기 위해 AWS 예산으로 일일 예측 예산을 생성합니다. 예상 비용이 실제 예산 비용의 75%가 되면 개발자 팀에 알림을 보냅니다. 실제 예산 비용이 100%인 경우 개발자의 EC2 인스턴스 및 VPC 인프라를 종료하는 예산 작업을 생성합니다.", "사용자가 S3 게이트웨이 엔드포인트 및 승인된 EC2 인스턴스로 승인된 VPC 구성을 생성하는 데 사용할 수 있는 AWS Service Catalog 포트폴리오를 생성합니다. 개발자 계정과 포트폴리오를 공유합니다. 승인된 IAM 역할을 사용하도록 AWS Service Catalog 시작 제약 조건을 구성합니다. AWS Service Catalog에 대한 액세스만 허용하도록 개발자의 IAM 권한 범위를 지정합니다.", "개발자 AWS 계정에서 EC2 및 VPC 리소스의 규정 준수를 모니터링하기 위해 AWS Config 규칙을 생성하고 배포합니다. 개발자가 승인되지 않은 EC2 인스턴스를 시작하거나 개발자가 S3 게이트웨이 엔드포인트 없이 VPC를 생성하는 경우 수정 조치를 수행하여 승인되지 않은 리소스를 종료하십시오."], "answers": [2]}, {"q": "회사가 확장되고 있습니다. 이 회사는 리소스를 여러 AWS 리전에 있는 수백 개의 서로 다른 AWS 계정으로 분리할 계획입니다. 솔루션 설계자는 특별히 지정된 지역 외부의 모든 작업에 대한 접근을 거부하는 솔루션을 권장해야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["각 계정에 대한 IAM 역할을 생성합니다. 계정에 대해 승인된 리전만 포함하는 조건부 허용 권한으로 IAM 정책을 생성합니다.", "AWS Organizations에서 조직을 생성합니다. 각 계정에 대해 IAM 사용자를 생성합니다. 각 사용자에게 정책을 연결하여 계정이 인프라를 배포할 수 없는 지역에 대한 접근을 차단합니다.", "AWS Control Tower 랜딩 존을 시작합니다. OU를 만들고 승인된 지역 외부에서 서비스를 실행하기 위한 접근을 거부하는 SCP를 연결합니다.", "각 계정에서 AWS Security Hub를 활성화합니다. 계정이 인프라를 배포할 수 있는 지역을 지정하는 컨트롤을 만듭니다."], "answers": [2]}, {"q": "회사는 웹 호스팅, 데이터베이스 API 서비스 및 비즈니스 로직을 는 이름 서버를 가리키는 회사의 온프레미스 company.example 영역에 추가 NS 레코드를 추가합니다.", "VPC의 DNS 호스트 이름을 켭니다. Amazon Route 53 Resolver로 새로운 아웃바운드 엔드포인트를 구성합니다. company.example에 대한 요청을 온프레미스 이름 서버로 전달하는 확인자 규칙을 만듭니다.", "Amazon Route 53 Resolver를 사용하여 새로운 인바운드 해석기 엔드포인트를 구성하는 VPC에 대한 DNS 호스트 이름을 켭니다. company.example에 대한 요청을 새 해석기로 전달하도록 온프레미스 DNS 서버를 구성합니다(&T).", "AWS Systems Manager를 사용하여 필요한 호스트 이름이 포함된 호스트 파일을 설치할 실행 문서를 구성합니다. 인스턴스가 실행 중 상태에 들어갈 때 Amazon EventBridge 규칙을 사용하여 문서를 실행합니다."], "answers": [1]}, {"q": "회사는 AWS CloudFormation을 사용하여 전송 게이트웨이에 모두 연결된 여러 VPC 내에 애플리케이션을 배포합니다. 퍼블릭 인터넷으로 트래픽을 전송하는 각 VPC는 공유 서비스 VPC를 통해 트래픽을 전송해야 합니다. VPC 내의 각 서브넷은 기본 VPC 라우팅 테이블을 사용하고 트래픽은 전송 게이트웨이로 라우팅됩니다. 전송 게이트웨이는 모든 VPC 연결에 기본 라우팅 테이블을 사용합니다. 보안 감사 결과 VPC 내에 배포된 Amazon EC2 인스턴스가 회사의 다른 VPC에 배포된 EC2 인스턴스와 통신할 수 있는 것으로 나타났습니다. 솔루션 설계자는 VPC 간의 트래픽을 제한해야 합니다. 각 VPC는 미리 정의되고 제한된 승인된 VPC 세트와만 통신할 수 있어야 합니다. 솔루션 설계자는 이러한 요구 사항을 충족하기 위해 무엇을 해야 합니까?", "opts": ["승인된 VPC에 대한 아웃바운드 트래픽만 허용하도록 VPC 내 각 서브넷의 네트워크 ACL을 업데이트합니다. 기본 거부 규칙을 제외한 모든 거부 규칙을 제거합니다.", "승인되지 않은 VPC 내에서 사용되는 보안 그룹에 대한 아웃바운드 트래픽을 거부하도록 VPC 내에서 사용되는 모든 보안 그룹을 업데이트합니다.", "각 VPC 연결에 대한 전용 운송 게이트웨이(Transit Gateway) 라우팅 테이블을 생성합니다. 승인된 VPC로만 트래픽을 라우팅합니다.", "전송 게이트웨이를 통해 승인된 VPC로만 트래픽을 라우팅하도록 각 VPC의 기본 라우팅 테이블을 업데이트합니다."], "answers": [2]}, {"q": "회사에는 패키지화되어 사용자의 Windows 컴퓨터에 배포되는 Windows 기반 데스크톱 응용 프로그램이 있습니다. 이 회사는 최근 Linux 운영 체제가 설치된 시스템을 주로 사용하는 직원이 있는 다른 회사를 인수했습니다. 인수 회사는 Windows 기반 데스크톱 애플리케이션을 AWS로 마이그레이션하고 다시 호스팅하기로 결정했습니다. 모든 직원은 애플리케이션을 사용하기 전에 인증을 받아야 합니다. 인수 회사는 온프레미스에서 Active Directory를 사용하지만 모든 직원을 위해 AWS에서 애플리케이션에 대한 접근을 관리하는 간소화된 방법을 원합니다. 최소한의 개발 노력으로 AWS에서 애플리케이션을 다시 호스팅하는 솔루션은 무엇입니까?", "opts": ["모든 직원을 위해 Amazon Workspaces 가상 데스크톱을 설정하고 프로비저닝합니다. Amazon Cognito 자격 증명 풀을 사용하여 인증을 구현합니다. 프로비저닝된 Workspaces 가상 데스크톱에서 애플리케이션을 실행하도록 직원에게 지시합니다.", "Windows 기반 Amazon EC2 인스턴스의 Auto Scaling 그룹을 생성합니다. 각 EC2 인스턴스를 회사의 Active Directory 도메인에 가입시킵니다. 온프레미스에서 실행 중인 Active Directory를 사용하여 인증을 구현합니다. Windows 원격 데스크톱을 사용하여 애플리케이션을 실행하도록 직원에게 지시합니다.", "Amazon AppStream 2.0 이미지 빌더를 사용하여 애플리케이션과 필요한 구성을 포함하는 이미지를 생성합니다. 이미지 실행을 위한 동적 플릿 Auto Scaling 정책으로 AppStream 2.0 온디맨드 플릿을 프로비저닝합니다. AppStream 2.0 사용자 풀을 사용하여 인증을 구현합니다. 직원들에게 브라우저 기반 AppStream 2.0 스트리밍 세션을 시작하여 애플리케이션에 액세스하도록 지시합니다.", "웹 기반 애플리케이션으로 실행되도록 애플리케이션을 리팩터링하고 컨테이너화합니다. 단계 조정 정책을 사용하여 AWS Fargate의 Amazon Elastic Container Service(Amazon ECS)에서 애플리케이션을 실행합니다. Amazon Cognito 사용자 풀을 사용하여 인증을 구현합니다. 직원들에게 브라우저에서 애플리케이션을 실행하도록 지시합니다."], "answers": [2]}, {"q": "한 회사가 IoT 장치에서 대량의 데이터를 수집하고 있습니다. 데이터는 영구 Amazon EMR 클러스터의 HDFS(Hadoop Distributed File System)에 ORC(Optimized Row Columnar) 파일로 저장됩니다. 회사의 데이터 분석 팀은 동일한 EMR 클러스터에 배포된 Apache Presto에서 SQL을 사용하여 데이터를 쿼리합니다. 쿼리는 많은 양의 데이터를 스캔하고 항상 15분 미만 동안 실행되며 오후 5시에서 오후 10시 사이에만 실행됩니다. 회사는 현재 솔루션과 관련된 높은 비용에 대해 우려하고 있습니다. 솔루션 설계자는 SQL 데이터 쿼리를 허용하는 가장 비용 효율적인 솔루션을 제안해야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["Amazon S3에 데이터를 저장합니다. Amazon Redshift Spectrum을 사용하여 데이터를 쿼리합니다.", "Amazon S3에 데이터를 저장합니다. AWS Glue 데이터 카탈로그 및 Amazon Athena를 사용하여 데이터를 쿼리합니다.", "EMR 파일 시스템(EMRFS)에 데이터를 저장합니다. Amazon EMR에서 Presto를 사용하여 데이터를 쿼리합니다.", "Amazon Redshift에 데이터를 저장합니다. Amazon Redshift를 사용하여 데이터를 쿼리합니다."], "answers": [1]}, {"q": "최근 한 대기업에서 Amazon RDS 및 Amazon DynamoDB 비용이 예기치 않게 증가했습니다. 회사는 AWS Billing and Cost Management의 세부 정보에 대한 가시성을 높여야 합니다. 많은 개발 및 프로덕션 계정을 포함하여 AWS Organizations와 연결된 다양한 계정이 있습니다. 조직 전체에 일관된 태깅 전략은 없지만 일관된 태깅과 함께 AWS CloudFormation을 사용하여 모든 인프라를 배포해야 하는 지침이 있습니다. 관리에는 모든 기존 및 향후 DynamoDB 테이블과 RDS 인스턴스에 대한 비용 센터 번호와 프로젝트 ID 번호가 필요합니다. 이러한 요구 사항을 충족하기 위해 솔루션 설계자는 어떤 전략을 제공해야 합니까?", "opts": ["Tag Editor를 사용하여 기존 리소스에 태그를 지정합니다. 비용 할당 태그를 생성하여 비용 센터 및 프로젝트 ID를 정의하고 태그가 기존 리소스에 전파되는 데 24시간을 허용합니다.", "AWS Config 규칙을 사용하여 태그가 지정되지 않은 리소스를 재무 팀에 알립니다. 교차 계정 역할을 사용하여 매시간 태그가 지정되지 않은 RDS 데이터베이스 및 DynamoDB 리소스에 태그를 지정하는 중앙 집중식 AWS Lambda 기반 솔루션을 생성합니다.", "Tag Editor를 사용하여 기존 리소스에 태그를 지정합니다. 비용 할당 태그를 생성하여 비용 센터 및 프로젝트 ID를 정의합니다. SCP를 사용하여 리소스에 비용 센터 및 프로젝트 ID가 없는 리소스 생성을 제한합니다.", "비용 할당 태그를 생성하여 비용 센터 및 프로젝트 ID를 정의하고 태그가 기존 리소스에 전파되는 데 24시간을 허용합니다. 리소스에 대한 비용 센터 및 프로젝트 ID를 포함하지 않는 리소스를 프로비저닝할 수 있는 권한을 제한하도록 기존 연합 역할을 업데이트합니다."], "answers": [2]}, {"q": "회사에서 온프레미스 시스템의 데이터를 Amazon S3 버킷으로 보내려고 합니다. 회사는 세 개의 서로 다른 계정에 S3 버킷을 생성했습니다. 회사는 데이터가 인터넷을 통해 이동하지 않고 비공개로 데이터를 보내야 합니다. 이 회사는 AWS에 대한 기존 전용 연결이 없습니다. 이러한 요구 사항을 충족하기 위해 솔루션 설계자는 어떤 단계 조합을 수행해야 합니까? (2개 선택)", "opts": ["AWS 클라우드에서 네트워킹 계정을 설정합니다. 네트워킹 계정에서 프라이빗 VPC를 생성합니다. 온프레미스 환경과 프라이빗 VPC 간의 프라이빗 VIF로 AWS Direct Connect 연결을 설정합니다.", "AWS 클라우드에서 네트워킹 계정을 설정합니다. 네트워킹 계정에서 프라이빗 VPC를 생성합니다. 온프레미스 환경과 프라이빗 VPC 간에 퍼블릭 VIF로 AWS Direct Connect 연결을 설정합니다.", "네트워킹 계정에서 Amazon S3 인터페이스 엔드포인트를 생성합니다.", "네트워킹 계정에서 Amazon S3 게이트웨이 엔드포인트를 생성합니다.", "AWS 클라우드에서 네트워킹 계정을 설정합니다. 네트워킹 계정에서 프라이빗 VPC를 생성합니다. 네트워크 계정의 VPC와 S3 버킷을 호스팅하는 계정의 VPC를 피어링합니다."], "answers": [0, 2]}, {"q": "한 회사에서 퀵서비스 레스토랑을 운영하고 있습니다. 레스토랑은 매일 4시간 동안 높은 판매 트래픽으로 예측 가능한 모델을 따릅니다. 영업 트래픽은 피크 시간 외에는 더 낮습니다. POS 및 관리 플랫폼은 AWS 클라우드에 배포되며 Amazon DynamoDB를 기반으로 하는 백엔드가 있습니다. 데이터베이스 테이블은 100,000개의 RCU 및 80,000개의 WCU가 있는 프로비저닝된 처리량 모드를 사용하여 알려진 최대 리소스 소비와 일치합니다. 이 회사는 DynamoDB 비용을 줄이고 IT 직원의 운영 오버헤드를 최소화하려고 합니다. 이러한 요구 사항을 가장 비용 효율적으로 충족하는 솔루션은 무엇입니까?", "opts": ["프로비저닝된 RCU 및 WCU를 줄입니다.", "온디맨드 용량을 사용하도록 DynamoDB 테이블을 변경합니다.", "테이블에 대해 Dynamo DB Auto Scaling을 활성화합니다.", "매일 4시간 동안 최대 부하를 처리하기에 충분한 1년 예약 용량을 구입합니다."], "answers": [2]}, {"q": "회사는 Amazon API Gateway, Amazon DynamoDB 및 AWS Lambda를 사용하여 AWS에서 블로그 게시물 애플리케이션을 호스팅합니다. 애플리케이션은 현재 API 키를 사용하여 요청을 승인하지 않습니다. API 모델은 다음과 같습니다. GET /posts/{postId}: 게시물 세부정보 가져오기 GET /users/{userId}: 사용자 세부 정보 가져오기 GET /comments/{commentId}: 댓글 세부정보 가져오기 회사는 사용자가 댓글 섹션에서 주제에 대해 적극적으로 논의하고 있음을 확인했으며 댓글을 실시간으로 표시하여 사용자 참여를 늘리고자 합니다. 댓글 대기 시간을 줄이고 사용자 경험을 개선하려면 어떤 디자인을 사용해야 합니까?", "opts": ["Amazon CloudFront와 함께 엣지 최적화 API를 사용하여 API 응답을 캐시합니다.", "10초마다 GET/comments/{commentId}를 요청하도록 블로그 애플리케이션 코드를 수정합니다.", "AWS AppSync를 사용하고 WebSocket을 활용하여 의견을 전달합니다.", "Lambda 함수의 동시성 제한을 변경하여 API 응답 시간을 낮춥니다."], "answers": [2]}, {"q": "회사는 AWS Organizations의 조직에서 중앙 집중식으로 수백 개의 AWS 계정을 관리합니다. 이 회사는 최근 제품 팀이 자신의 계정에서 자체 S3 액세스 포인트를 생성하고 관리할 수 있도록 허용하기 시작했습니다. S3 액세스 포인트는 인터넷이 아닌 VPC 내에서만 액세스할 수 있습니다. 이 요구 사항을 적용하는 가장 효율적인 운영 방법은 무엇입니까?", "opts": ["s3:AccessPointNetworkOrigin 조건 키가 VPC로 평가되지 않는 한 s3:CreateAccessPoint 작업을 거부하도록 S3 액세스 포인트 리소스 정책을 설정합니다.", "조직의 루트 수준에서 SCP를 생성하여 s3:AccessPointNetworkOrigin 조건 키가 VPC로 평가되지 않는 한 s3:CreateAccessPoint 작업을 거부합니다.", "AWS CloudFormation StackSets를 사용하여 각 AWS 계정에서 s3:AccessPointNetworkOrigin 조건 키가 VPC로 평가되는 경우에만 s3:CreateAccessPoint 작업을 허용하는 새 IAM 정책을 생성합니다.", "s3:AccessPointNetworkOrigin 조건 키가 VPC로 평가되지 않는 한 s3:CreateAccessPoint 작업을 거부하도록 S3 버킷 정책을 설정합니다."], "answers": [1]}, {"q": "솔루션 설계자는 블루/그린 배포 방법을 사용하여 AWS Elastic Beanstalk 내에서 애플리케이션 환경을 업데이트해야 합니다. 솔루션 설계자는 기존 애플리케이션 환경과 동일한 환경을 생성하고 애플리케이션을 새로운 환경에 배포합니다. 업데이트를 완료하려면 다음에 무엇을 해야 합니까?", "opts": ["Amazon Route 53을 사용하여 새 환경으로 리디렉션합니다.", "환경 URL 교환 옵션을 선택합니다.", "Auto Scaling 시작 구성을 교체합니다.", "녹색 환경을 가리키도록 DNS 레코드를 업데이트합니다."], "answers": [1]}, {"q": "한 회사가 웹에서 사용자가 임의의 사진을 업로드하고 검색할 수 있는 이미지 서비스를 구축하고 있습니다. 사용량이 가장 많을 때는 전 세계적으로 최대 10,000명의 사용자가 이미지를 업로드합니다. 그러면 업로드된 이미지에 텍스트가 오버레이되어 회사 웹사이트에 게시됩니다. 솔루션 설계자는 어떤 디자인을 구현해야 합니까?", "opts": ["업로드된 이미지를 Amazon Elastic File System(Amazon EFS)에 저장합니다. 각 이미지에 대한 애플리케이션 로그 정보를 Amazon CloudWatch Logs로 보냅니다. 처리해야 할 이미지를 결정하기 위해 CloudWatch Logs를 사용하는 Amazon EC2 인스턴스 플릿을 생성합니다. 처리된 이미지를 Amazon EFS의 다른 디렉터리에 배치합니다. Amazon CloudFront를 활성화하고 플릿의 EC2 인스턴스 중 하나가 되도록 오리진을 구성합니다.", "업로드된 이미지를 Amazon S3 버킷에 저장하고 Amazon Simple Notification Service(Amazon SNS)에 메시지를 보내도록 S3 버킷 이벤트 알림을 구성합니다. ALB(Application Load Balancer) 뒤에 Amazon EC2 인스턴스 플릿을 생성하여 Amazon SNS에서 메시지를 가져와 이미지를 처리하고 Amazon Elastic File System(Amazon EFS)에 배치합니다. SNS 메시지 볼륨에 대한 Amazon CloudWatch 지표를 사용하여 EC2 인스턴스를 확장합니다. Amazon CloudFront를 활성화하고 원본이 EC2 인스턴스 앞의 ALB가 되도록 구성합니다.", "업로드된 이미지를 Amazon S3 버킷에 저장하고 Amazon Simple Queue Service(Amazon SQS) 대기열에 메시지를 보내도록 S3 버킷 이벤트 알림을 구성합니다. Amazon EC2 인스턴스 플릿을 생성하여 SQS 대기열에서 메시지를 가져와 이미지를 처리하고 다른 S3 버킷에 배치합니다. 대기열 깊이에 대한 Amazon CloudWatch 지표를 사용하여 EC2 인스턴스를 확장합니다. Amazon CloudFront를 활성화하고 오리진이 처리된 이미지를 포함하는 S3 버킷이 되도록 구성합니다.", "업로드된 이미지를 Amazon EC2 스팟 인스턴스 플릿에 탑재된 공유 Amazon Elastic Block Store(Amazon EBS) 볼륨에 저장합니다. 업로드된 각 이미지 및 처리 여부에 대한 정보가 포함된 Amazon DynamoDB 테이블을 생성합니다. Amazon EventBridge 규칙을 사용하여 EC2 인스턴스를 확장합니다. Amazon CloudFront를 활성화하고 EC2 인스턴스 플릿 앞에서 Elastic Load Balancer를 참조하도록 오리진을 구성합니다."], "answers": [2]}, {"q": "한 회사가 us-east-1 리전의 Amazon RDS for MySQL DB 인스턴스에 데이터베이스를 배포했습니다. 회사는 유럽의 고객이 데이터를 사용할 수 있도록 해야 합니다. 유럽의 고객은 미국(US)의 고객과 동일한 데이터에 액세스할 수 있어야 하며 높은 애플리케이션 대기 시간 또는 오래된 데이터를 허용하지 않습니다. 유럽 고객과 미국 고객은 데이터베이스에 기록해야 합니다. 두 고객 그룹 모두 다른 그룹의 업데이트를 실시간으로 확인해야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["RDS for MySQL DB 인스턴스의 Amazon Aurora MySQL 복제본을 생성합니다. RDS DB 인스턴스에 대한 애플리케이션 쓰기를 일시 중지합니다. Aurora 복제본을 독립 실행형 DB 클러스터로 승격합니다. Aurora 데이터베이스를 사용하도록 애플리케이션을 재구성하고 쓰기를 재개하십시오. eu-west-1을 DB 클러스터에 보조 리전으로 추가합니다. DB 클러스터에서 쓰기 전달을 활성화합니다. eu-west-1에 애플리케이션을 배포합니다. eu-west-1에서 Aurora MySQL 엔드포인트를 사용하도록 애플리케이션을 구성합니다.", "RDS for MySQL DB 인스턴스에 대해 eu-west-1에 교차 리전 복제본을 추가합니다. 쓰기 쿼리를 다시 기본 DB 인스턴스로 복제하도록 복제본을 구성합니다. eu-west-1에 애플리케이션을 배포합니다. eu-west-1에서 RDS for MySQL 엔드포인트를 사용하도록 애플리케이션을 구성합니다.", "RDS for MySQL DB 인스턴스에서 가장 최근 스냅샷을 eu-west-1에 복사합니다. 스냅샷에서 eu-west-1에 새 RDS for MySQL DB 인스턴스를 생성합니다. us-east-1에서 eu-west-1로 MySQL 논리적 복제를 구성합니다. DB 클러스터에서 쓰기 전달을 활성화합니다. eu-wes&1에 애플리케이션을 배포합니다. eu-west-1에서 RDS for MySQL 엔드포인트를 사용하도록 애플리케이션을 구성합니다.", "RDS for MySQL DB 인스턴스를 Amazon Aurora MySQL DB 클러스터로 변환합니다. eu-west-1을 DB 클러스터에 보조 리전으로 추가합니다. DB 클러스터에서 쓰기 전달을 활성화합니다. eu-west-1에 애플리케이션을 배포합니다. eu-west-1에서 Aurora MySQL 엔드포인트를 사용하도록 애플리케이션을 구성합니다."], "answers": [0]}, {"q": "회사는 인터넷을 통해 액세스할 수 있는 SFTP 서버를 통해 고객에게 파일을 제공하고 있습니다. SFTP 서버는 탄력적 IP 주소가 연결된 단일 Amazon EC2 인스턴스에서 실행됩니다. 고객은 탄력적 IP 주소를 통해 SFTP 서버에 연결하고 인증을 위해 SSH를 사용합니다. EC2 인스턴스에는 모든 고객 IP 주소에서 접근을 허용하는 연결된 보안 그룹도 있습니다. 솔루션 설계자는 가용성을 개선하고 인프라 관리의 복잡성을 최소화하며 파일에 액세스하는 고객의 중단을 최소화하는 솔루션을 구현해야 합니다. 솔
