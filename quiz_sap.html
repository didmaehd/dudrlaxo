ts": ["VM ImportExport를 사용하여 각 VM의 이미지를 생성합니다. AWS Application Migration Service를 사용하여 이미지를 관리하고 봅니다. Windows 파일 공유 데이터를 Amazon Elastic File System(Amazon EFS) 파일 시스템에 복사합니다. 마이그레이션 후 파일 공유를 EFS 파일 시스템에 다시 매핑합니다.", "AWS Application Discovery Service 에이전트 없는 어플라이언스를 VMware vCenter에 배포합니다. AWS Migration Hub에서 검색된 VM의 포트폴리오를 검토합니다.", "AWS Application Migration Service 에이전트 없는 어플라이언스를 VMware vCenter에 배포합니다. Windows 파일 공유 데이터를 새로운 Amazon FSx for Windows File Server 파일 시스템에 복사합니다. 마이그레이션 후 각 VM의 파일 공유를 FSx for Windows File Server 파일 시스템으로 다시 매핑합니다.", "AWS Migration Hub에서 포트폴리오를 생성하고 검토합니다. AWS Snowcone 디바이스를 주문하세요. AWS Application Migration Service를 VMware vCenter에 배포하고 모든 VM을 Snowcone 디바이스로 내보냅니다. 모든 Windows 파일 공유 데이터를 Snowcone 디바이스에 복사합니다. Snowcone 디바이스를 AWS로 배송합니다. Application Migration Service를 사용하여 마이그레이션된 모든 인스턴스를 배포합니다.", "AWS Application Discovery Service Agent와 AWS Application Migration Service Agent를 각 VMware 하이퍼바이저에 직접 배포합니다. AWS Migration Hub에서 포트폴리오를 검토하세요. 각 VM의 파일 공유 데이터를 새로운 Amazon FSx for Windows File Server 파일 시스템에 복사합니다. 마이그레이션 후 각 VM의 파일 공유를 FSx for Windows File Server 파일 시스템으로 다시 매핑합니다."], "answers": [2]}, {"q": "회사에는 AWS Organizations의 조직에 여러 AWS 계정이 있습니다. 회사는 AWS 계정 활동을 저장하고 SQL을 사용하여 중앙 위치에서 데이터를 쿼리해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["각 계정에 AWS CloudTraii 추적을 생성합니다. 추적에 대한 CloudTrail 관리 이벤트를 지정합니다. 이벤트를 Amazon CloudWatch Logs로 보내도록 CloudTrail을 구성합니다. CloudWatch 교차 계정 관측성을 구성합니다. CloudWatch Logs Insights에서 데이터를 쿼리합니다.", "위임된 관리자 계정을 사용하여 AWS CloudTrail Lake 데이터 스토어를 생성합니다. 데이터 스토어에 대한 CloudTrail 관리 이벤트를 지정합니다. 조직의 모든 계정에 대해 데이터 저장소를 활성화합니다. CloudTrail Lake에서 데이터를 쿼리합니다.", "위임된 관리자 계정을 사용하여 AWS CloudTral 추적을 생성합니다. 추적에 대한 CloudTrail 관리 이벤트를 지정합니다. 조직의 모든 계정에 대해 추적을 활성화합니다. 다른 모든 설정은 기본값으로 유지합니다. CloudTrail 이벤트 기록 페이지에서 CloudTrail 데이터를 쿼리합니다.", "AWS CloudFormation StackSets를 사용하여 각 계정에 AWS CloudTrail Lake 데이터 스토어를 배포합니다. 데이터 스토어에 대한 CloudTrail 관리 이벤트를 지정합니다. 다른 모든 설정은 기본값으로 유지하고 CloudTrail Lake에서 데이터를 쿼리합니다."], "answers": [1]}, {"q": "한 회사에서 AWS를 사용하여 프로덕션 웹 애플리케이션을 개발하고 관리하고 있습니다. 애플리케이션에는 AWS Lambda 함수를 호출하는 Amazon API Gateway HTTP API가 포함되어 있습니다. Lambda 함수는 데이터를 처리한 다음 데이터베이스에 저장합니다. 회사는 웹 애플리케이션에 대한 사용자 인증을 통합된 방식으로 구현하려고 합니다. 회사는 이미 회사의 다른 애플리케이션에 대해 OAuth 토큰을 발급하는 타사 ID 공급자를 사용하고 있습니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["회사의 타사 ID 공급자를 API 게이트웨이와 통합합니다. ID 공급자의 토큰을 검증하도록 API Gateway Lambda 권한 부여자를 구성합니다. 모든 API 경로에 Lambda 권한 부여자가 필요합니다. API Gateway HTTP API를 호출할 때 자격 증명 공급자로부터 토큰을 가져오고 Authorization 헤더에 토큰을 포함하도록 웹 애플리케이션을 업데이트합니다.", "회사의 타사 자격 증명 공급자를 AWS Directory Service와 통합합니다. ID 공급자의 토큰을 검증하려면 디렉터리 서비스를 API 게이트웨이 권한 부여자로 구성하세요. 모든 API 경로에 디렉터리 서비스 권한 부여자가 필요합니다. AWS IAM 자격 증명 센터를 SAML 2.0 자격 증명 공급자로 구성합니다. 웹 애플리케이션을 사용자 정의 SAML 2.0 애플리케이션으로 구성합니다.", "회사의 타사 자격 증명 공급자를 AWS IAM Identity Center와 통합합니다. 구성이 필요 없는 인증 및 승인을 위해 IAM ID 센터를 사용하도록 API 게이트웨이를 구성합니다. IAM Identity Center에서 AWS Security Token Service(AWS STS) 토큰을 검색하고 API Gateway HTTP API를 호출할 때 Authorization 헤더에 토큰을 포함하도록 웹 애플리케이션을 업데이트합니다.", "회사의 타사 자격 증명 공급자를 AWS IAM Identity Center와 통합합니다. API Gateway HTTP API를 호출할 수 있는 권한으로 IAM 사용자를 구성합니다. IAM 사용자로부터 요청 매개변수를 추출하고 API Gateway HTTP API를 호출할 때 Authorization 헤더에 매개변수를 포함하도록 웹 애플리케이션을 업데이트합니다."], "answers": [0]}, {"q": "한 회사가 AWS 계정의 수천 개의 Amazon EC2 인스턴스에 애플리케이션을 배포했습니다. 보안 감사를 통해 암호화되지 않은 여러 Amazon Elastic Block Store(Amazon EBS) 볼륨이 EC2 인스턴스에 연결되어 있음을 발견했습니다. 회사의 보안 정책에 따라 EBS 볼륨을 암호화해야 합니다. 회사는 EBS 볼륨을 암호화하기 위한 자동화된 솔루션을 구현해야 합니다. 또한 솔루션은 개발 팀이 암호화되지 않은 EBS 볼륨을 생성하지 못하도록 방지해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["암호화되지 않은 EBS 볼륨을 식별하는 AWS Config 관리 규칙을 구성합니다. 자동 수정 작업을 구성합니다. 새로운 암호화된 EBS 볼륨을 생성하는 단계가 포함된 AWS 시스템 관리자 자동화 Runbook을 연결합니다. AWS Key Management Service(AWS KMS) 고객 관리형 키를 생성합니다. 키 정책에는 암호화되지 않은 EBS 볼륨 생성을 거부하는 설명을 포함합니다.", "AWS 시스템 관리자 플릿 관리자를 사용하여 암호화되지 않은 EBS 볼륨 목록을 생성하고, 새로운 암호화된 EBS 볼륨을 생성하는 단계가 포함된 시스템 관리자 자동화 런북을 생성합니다. 암호화되지 않은 EBS 볼륨 생성을 거부하는 SCP를 생성합니다.", "AWS Systems Manager Fleet Manager를 사용하여 암호화되지 않은 EBS 볼륨 목록을 생성합니다. 암호화된 새 EBS 볼륨을 생성하는 단계가 포함된 Systems Manager Automation Runbook을 생성합니다. 항상 새 EBS 볼륨을 암호화하도록 EBS 암호화에 대한 AWS 계정 설정을 수정합니다.", "암호화되지 않은 EBS 볼륨을 식별하는 AWS Config 관리 규칙을 구성합니다. 자동 수정 작업을 구성합니다. 새로운 암호화된 EBS 볼륨을 생성하는 단계가 포함된 AWS 시스템 관리자 자동화 Runbook을 연결합니다. 항상 새 EBS 볼륨을 암호화하도록 EBS 암호화에 대한 AWS 계정 설정을 수정합니다."], "answers": [3]}, {"q": "한 회사가 AWS 클라우드에서 컨테이너화된 대규모 워크로드를 실행하고 있습니다. 워크로드는 약 100개의 다양한 서비스로 구성됩니다. 이 회사는 Amazon Elastic Container Service(Amazon ECS)를 사용하여 워크로드를 조정합니다. 최근 회사 개발팀은 ECS 클러스터에서 Amazon EC2 인스턴스 대신 AWS Fargate를 사용하기 시작했습니다. 과거에는 워크로드가 계정에서 사용 가능한 최대 EC2 인스턴스 수를 실행하는 데 거의 근접했습니다. 회사에서는 워크로드가 허용되는 최대 ECS 작업 수에 도달할 수 있다는 점을 우려하고 있습니다. 솔루션 아키텍트는 Fargate가 최대 작업 수의 80%에 도달하면 개발 팀에 알리는 솔루션을 구현해야 합니다. 이 요구 사항을 충족하려면 솔루션 설계자가 무엇을 해야 합니까?", "opts": ["Amazon CloudWatch를 사용하여 ECS 클러스터의 각 서비스에 대한 샘플 수 통계를 모니터링하십시오. 수학 표현식 샘플 개수/SERVICE_QUOTA(service)*100이 80보다 큰 경우 경보를 설정합니다. Amazon Simple 알림 서비스(Amazon SNS)를 사용하여 개발팀에 알립니다.", "Amazon CloudWatch를 사용하여 AWS/Usage 지표 네임스페이스에 게시된 서비스 할당량을 모니터링합니다. 수학 표현식 metric/SERVICE_QUOTA(metric)*100이 80보다 큰 경우 경보를 설정합니다. Amazon Simple 알림 서비스(Amazon SNS)를 사용하여 개발팀에 알립니다.", "ECS 클러스터에서 자세한 지표를 폴링하는 AWS Lambda 함수를 생성합니다. 실행 중인 Fargate 작업 수가 80개보다 큰 경우 Amazon Simple Email Service(Amazon SES)를 호출하여 개발 팀에 알립니다.", "AWS Config 규칙을 생성하여 Fargate SERVICE_QUOTA가 80보다 큰지 평가합니다. AWS Config 규칙이 준수되지 않는 경우 Amazon Simple Email Service(Amazon SES)를 사용하여 개발 팀에 알립니다."], "answers": [1]}, {"q": "회사에는 Python으로 작성된 여러 AWS Lambda 함수가 있습니다. 함수는 .zip 패키지 배포 유형으로 배포됩니다. 이 함수는 .zip 파일에 공통 라이브러리와 패키지가 포함된 Lambda 계층을 사용합니다. Lambda .zip 패키지와 Lambda 계층 .zip 파일은 Amazon S3 버킷에 저장됩니다. 회사는 CVE를 식별하기 위해 Lambda 기능과 Lambda 계층의 자동 스캔을 구현해야 합니다. Lambda 함수의 하위 집합은 잠재적인 데이터 유출 및 기타 취약점을 감지하기 위해 자동화된 코드 스캔을 받아야 합니다. 코드 스캔은 모든 Lambda 함수가 아닌 선택한 Lambda 함수에 대해서만 수행되어야 합니다. 이러한 요구 사항을 충족하는 작업 조합은 무엇입니까? (3개 선택)", "opts": ["Amazon Inspector를 활성화하십시오. 자동화된 CVE 스캔을 시작하세요.", "Amazon Inspector에서 Lambda 표준 스캐닝 및 Lambda 코드 스캐닝을 활성화합니다.", "Amazon GuardDuty를 활성화합니다. GuardDuty에서 Lambda 보호 기능을 활성화합니다.", "코드 스캔이 필요한 Lambda 함수의 모니터 설정에서 스캔을 활성화합니다.", "코드 스캔이 필요하지 않은 Lambda 함수에 태그를 지정합니다. 태그에 InspectorCodeExclusion 키와 LambdaCodeScanning 값을 포함합니다.", "Amazon Inspector를 사용하여 코드 스캔을 위한 Lambda .zip 패키지와 Lambda 계층 .zip 파일이 포함된 3개의 버킷을 스캔합니다."], "answers": [0, 1, 4]}, {"q": "한 회사가 애플리케이션 계정에서 Amazon EC2 인스턴스 패치를 처리하는 방식을 변경하고 있습니다. 회사는 현재 애플리케이션 계정의 VPC에 있는 NAT 게이트웨이를 사용하여 인터넷을 통해 인스턴스를 패치합니다. 회사는 핵심 계정의 전용 프라이빗 VPC에 패치 소스 저장소로 EC2 인스턴스를 설정했습니다. 회사는 AWS Systems Manager 패치 관리자와 핵심 계정의 패치 소스 리포지토리를 사용하여 애플리케이션 계정의 EC2 인스턴스를 패치하려고 합니다. 회사는 애플리케이션 계정의 모든 EC2 인스턴스가 인터넷에 액세스하지 못하도록 차단해야 합니다. 애플리케이션 계정의 EC2 인스턴스는 애플리케이션 데이터가 저장되는 Amazon S3에 액세스해야 합니다. 이러한 EC2 인스턴스는 Systems Manager 및 핵심 계정의 프라이빗 VPC에 있는 패치 소스 리포지토리에 연결되어야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["포트 80에서 아웃바운드 트래픽을 차단하는 네트워크 ACL을 생성합니다. 네트워크 ACL을 애플리케이션 계정의 모든 서브넷과 연결합니다. 애플리케이션 계정과 코어 계정에서 사용자 지정 VPN 서버를 실행하는 EC2 인스턴스 하나를 배포합니다. 프라이빗 VPC에 액세스하기 위한 VPN 터널을 만듭니다. 애플리케이션 계정에서 라우팅 테이블을 업데이트합니다.", "Systems Manager 및 Amazon S3용 프라이빗 VIF를 생성합니다. 애플리케이션 계정의 VPC에서 NAT 게이트웨이를 삭제합니다. 핵심 계정의 패치 소스 리포지토리 EC2 인스턴스에 액세스하기 위한 전송 게이트웨이를 생성합니다. 핵심 계정의 라우팅 테이블을 업데이트합니다.", "Systems Manager 및 Amazon S3용 VPC 엔드포인트를 생성합니다. 애플리케이션 계정의 VPC에서 NAT 게이트웨이를 삭제합니다. 코어 계정의 패치 소스 리포지토리 EC2 인스턴스에 액세스하려면 VPC 피어링 연결을 생성합니다. 두 계정 모두에서 라우팅 테이블을 업데이트합니다.", "포트 80에서 인바운드 트래픽을 차단하는 네트워크 ACL을 생성합니다. 네트워크 ACL을 애플리케이션 계정의 모든 서브넷과 연결합니다. 핵심 계정의 패치 소스 리포지토리 EC2 인스턴스에 액세스하기 위한 전송 게이트웨이를 생성합니다. 두 계정 모두에서 라우팅 테이블을 업데이트합니다."], "answers": [2]}, {"q": "미국(US)의 회사가 유럽의 회사를 인수했습니다. 두 회사 모두 AWS 클라우드를 사용합니다. 미국 회사는 마이크로서비스 아키텍처를 사용하여 새로운 애플리케이션을 구축했습니다. 미국 회사는 us-east-2 지역의 5개 VPC에서 애플리케이션을 호스팅하고 있습니다. 애플리케이션은 eu-west-1 리전의 한 VPC에 있는 리소스에 액세스할 수 있어야 합니다. 그러나 애플리케이션은 다른 VPC에 액세스할 수 없어야 합니다. 두 리전의 VPC에는 겹치는 CIDR 범위가 없습니다. 모든 계정은 이미 AWS Organizations의 하나의 조직에 통합되어 있습니다. 이러한 요구 사항을 가장 비용 효율적으로 충족하는 솔루션은 무엇입니까?", "opts": ["eu-west-1에 하나의 전송 게이트웨이를 생성합니다. us-east-2의 VPC와 eu-west-1의 VPC를 Transit Gateway에 연결합니다. 트래픽이 Transit Gateway를 통해 라우팅되도록 각 VPC에 필요한 경로 항목을 생성합니다.", "각 리전에 하나의 전송 게이트웨이를 생성합니다. 관련 서브넷을 지역 Transit Gateway에 연결합니다. 트래픽이 지역 Transit Gateway를 통해 라우팅되도록 각 서브넷에 연결된 라우팅 테이블에 필요한 라우팅 항목을 생성합니다. 두 개의 Transit Gateway를 피어링합니다.", "모든 VPC 간에 풀 메시 VPC 피어링 연결 구성을 생성합니다. 트래픽이 VPC 피어링 연결을 통해 라우팅되도록 각 VPC에 필요한 경로 항목을 생성합니다.", "us-east-2의 각 VPC에 대해 eu-west-1의 VPC에 대한 하나의 VPC 피어링 연결을 생성합니다. 트래픽이 VPC 피어링 연결을 통해 라우팅되도록 각 VPC에 필요한 경로 항목을 생성합니다."], "answers": [3]}, {"q": "한 여행사는 Amazon Simple Email Service(Amazon SES)를 사용하여 사용자에게 이메일 알림을 보내는 웹 애플리케이션을 구축했습니다. 회사는 이메일 전달 문제를 해결하는 데 도움이 되도록 로깅을 활성화해야 합니다. 또한 회사는 수신자, 제목, 보낸 시간을 기준으로 검색할 수 있는 기능도 필요합니다. 이러한 요구 사항을 충족하려면 솔루션 설계자가 수행해야 하는 단계 조합은 무엇입니까? (2개 선택)", "opts": ["Amazon Data Firehose를 대상으로 하여 Amazon SES 구성 세트를 생성합니다. Amazon S3 버킷으로 로그를 보내도록 선택합니다.", "AWS CloudTrail 로깅을 활성화합니다. Amazon S3 버킷을 로그 대상으로 지정합니다.", "Amazon Athena를 사용하여 Amazon S3 버킷의 로그에서 수신자, 제목 및 전송 시간을 쿼리합니다.", "Amazon CloudWatch 로그 그룹을 생성합니다. 로그 그룹에 로그를 보내도록 Amazon SES를 구성합니다.", "Amazon Athena를 사용하여 Amazon CloudWatch의 로그에서 수신자, 제목 및 전송 시간을 쿼리합니다."], "answers": [0, 2]}, {"q": "회사가 AWS로 마이그레이션하여 AWS Business Support를 사용하고 있습니다. 회사는 AWS 계정 전체에서 Amazon EC2 인스턴스의 비용 효율성을 모니터링하려고 합니다. EC2 인스턴스에는 부서, 사업부 및 환경에 대한 태그가 있습니다. 개발 EC2 인스턴스는 비용은 높지만 활용도는 낮습니다. 회사는 활용도가 낮은 개발 EC2 인스턴스를 감지하고 중지해야 합니다. 지난 14일 중 4일 이상 동안 일일 평균 CPU 사용률이 10% 이하이고 네트워크 I/O가 5MB 이하인 인스턴스는 활용도가 낮은 것입니다. 최소한의 운영 오버헤드로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["부서, 사업부 및 환경에 대한 태그를 기반으로 EC2 인스턴스 활용도를 모니터링하도록 Amazon CloudWatch 대시보드를 구성합니다. 활용도가 낮은 개발 EC2 인스턴스를 중지하기 위해 AWS Lambda 함수를 호출하는 Amazon EventBridge 규칙을 생성합니다.", "EC2 인스턴스 활용도를 추적하고 활용도가 낮은 인스턴스를 Amazon CloudWatch에 보고하도록 AWS 시스템 관리자를 구성합니다. 부서, 사업부 및 환경에 대한 태그를 기준으로 CloudWatch 데이터를 필터링합니다. 활용도가 낮은 개발 EC2 인스턴스를 중지하기 위해 AWS Lambda 함수를 호출하는 Amazon EventBridge 규칙을 생성합니다.", "AWS Trusted Advisor에서 보고한 EC2 인스턴스의 낮은 활용도를 감지하는 Amazon EventBridge 규칙을 생성합니다. 부서, 사업부 및 환경에 대한 태그별로 데이터를 필터링하고 활용도가 낮은 개발 EC2 인스턴스를 중지하는 AWS Lambda 함수를 호출하도록 규칙을 구성합니다.", "모든 EC2 인스턴스에 대한 사용률 데이터를 검색하기 위해 매일 실행되는 AWS Lambda 함수를 생성합니다. 데이터를 Amazon DynamoDB 테이블에 저장합니다. DynamoDB 테이블을 데이터 소스로 사용하여 활용도가 낮은 개발 EC2 인스턴스를 식별하고 중지하는 Amazon QuickSight 대시보드를 생성합니다."], "answers": [2]}, {"q": "한 회사가 향후 3년 동안 진행될 프로젝트를 위해 AWS에서 애플리케이션을 호스팅하고 있습니다. 애플리케이션은 Network Load Balancer(NLB)의 대상 그룹에 등록된 20개의 Amazon EC2 온디맨드 인스턴스로 구성됩니다. 인스턴스는 두 개의 가용 영역에 분산되어 있습니다. 애플리케이션은 무상태이며 하루 24시간, 주 7일 실행됩니다. 회사는 애플리케이션의 응답 속도가 느린 사용자로부터 신고를 받습니다. 성능 지표에 따르면 일반적인 애플리케이션 사용 중에 인스턴스의 CPU 사용률은 10%입니다. 그러나 바쁜 시간에는 CPU 사용률이 100%로 증가하며 일반적으로 몇 시간 동안 지속됩니다. 회사는 애플리케이션의 느린 응답 문제를 해결하기 위해 새로운 아키텍처가 필요합니다. 이러한 요구 사항을 가장 비용 효율적으로 충족하는 솔루션은 무엇입니까?", "opts": ["Auto Scaling 그룹을 생성합니다. NLB의 대상 그룹에 Auto Scaling 그룹을 연결합니다. 최소 용량을 20으로, 원하는 용량을 28로 설정합니다. 인스턴스 20개에 대해 예약 인스턴스를 구매합니다.", "요청 유형이 요청인 스팟 집합을 생성합니다. TotalTargetCapacity 매개 변수를 20으로 설정합니다. DefaultTargetCapacityType 매개 변수를 On-Demand로 설정합니다. 스팟 집합을 생성할 때 NLB를 지정합니다.", "요청 유형이 유지인 스팟 집합을 생성합니다. TotalTargetCapacity 매개변수를 20으로 설정합니다. DefaultTargetCapacityType 매개변수를 Spot으로 설정합니다. NLB를 Application Load Balancer로 교체합니다.", "Auto Scaling 그룹을 생성합니다. NLB의 대상 그룹에 Auto Scaling 그룹을 연결합니다. 최소 용량을 4로, 최대 용량을 28로 설정합니다. 4개의 인스턴스에 대한 예약 인스턴스를 구매하세요."], "answers": [3]}, {"q": "Accompany는 공장에서 센서 데이터를 수집하고 전송하는 애플리케이션을 구축하고 있습니다. 애플리케이션은 AWS IoT Core를 사용하여 수백 개의 장치에서 Amazon S3 데이터 레이크로 데이터를 보냅니다. 회사는 Amazon S3에 데이터를 로드하기 전에 데이터를 보강해야 합니다. 애플리케이션은 5초마다 센서 데이터를 전송합니다. 애플리케이션이 데이터를 수집한 후 30분 이내에 Amazon S3에서 새로운 센서 데이터를 사용할 수 있어야 합니다. 다른 애플리케이션은 AWS IoT Core의 센서 데이터를 처리하지 않습니다. 이러한 요구 사항을 가장 비용 효율적으로 충족하는 솔루션은 무엇입니까?", "opts": ["AWS IoT Core에서 주제를 생성하여 센서 데이터를 수집합니다. 데이터를 강화하고 Amazon S3에 데이터를 쓰는 AWS Lambda 함수를 생성합니다. Lambda 함수를 호출하도록 AWS IoT 규칙 작업을 구성합니다.", "AWS IoT Core 기본 수집을 사용하여 센서 데이터를 수집합니다. Amazon Kinesis Data Firehose에 데이터를 쓰도록 AWS IoT 규칙 작업을 구성합니다. Kinesis Data Firehose 버퍼링 간격을 900초로 설정합니다. Kinesis Data Firehose를 사용하여 AWS Lambda 함수를 호출하여 데이터를 강화하고 Kinesis Data Firehose를 구성하여 데이터를 Amazon S3에 전달합니다.", "AWS IoT Core에서 주제를 생성하여 센서 데이터를 수집합니다. 데이터를 Amazon Timestream 테이블로 보내도록 AWS IoT 규칙 작업을 구성합니다. Timestream에서 데이터를 읽는 함수인 AWS Lambda를 생성합니다. 데이터를 강화하고 Amazon S3에 데이터를 쓰도록 Lambda 함수를 구성합니다.", "*AWS loT Core Basic Ingest를 사용하여 센서 데이터를 수집합니다. *Amazon Kinesis Data Streams에 데이터를 쓰도록 AWS IoT 규칙 작업을 구성합니다. Kinesis Data Streams의 데이터를 처리하고 데이터를 강화하는 소비자 AWS Lambda 함수를 생성합니다. Lambda 함수에서 S3 PutObject API 작업을 호출하여 Amazon S3에 데이터를 씁니다."], "answers": [1]}, {"q": "한 회사가 대규모 IoT 장치 세트에서 데이터를 수집하고 있습니다. 데이터는 Amazon S3 데이터 레이크에 저장됩니다. 데이터 과학자는 별도의 AWS 계정에 있는 VPC의 퍼블릭 서브넷 2개에서 실행되는 Amazon EC2 인스턴스에 대한 분석을 수행합니다. 데이터 과학자는 EC2 인스턴스에서 데이터 레이크에 액세스해야 합니다. EC2 인스턴스에는 이미 Amazon S3에 액세스할 수 있는 권한이 있는 할당된 역할이 있습니다. 회사 정책에 따라 승인된 네트워크만 IoT 데이터에 접근할 수 있도록 허용됩니다. 이러한 요구 사항을 충족하려면 솔루션 설계자가 수행해야 하는 단계 조합은 무엇입니까? (2개 선택)", "opts": ["데이터 과학자의 VPC에 Amazon S3용 게이트웨이 VPC 엔드포인트를 생성합니다.", "데이터 레이크에 대한 데이터 과학자의 AWS 계정에 S3 액세스 포인트를 생성합니다.", "EC2 인스턴스 역할을 업데이트합니다. s3:DataAccessPointArn 조건 키의 값이 유효한 액세스 포인트 ARN인 경우 s3:GetObject 작업을 허용하는 조건이 포함된 정책을 추가합니다.", "S3 트래픽을 S3 액세스 포인트로 라우팅하도록 VPC 라우팅 테이블을 업데이트합니다.", "s3:DataAccessPointArn 조건 키의 값이 유효한 액세스 포인트 ARN일 때 s3:GetObject 작업을 허용하는 조건이 포함된 S3 버킷 정책을 추가합니다."], "answers": [0, 4]}, {"q": "한 회사에서 웹사이트를 AWS로 마이그레이션하려고 합니다. 웹사이트는 온프레미스 자체 관리형 Kubernetes 클러스터에 배포된 컨테이너를 사용합니다. 웹사이트의 모든 데이터는 온프레미스 PostgreSQL 데이터베이스에 저장됩니다. 회사는 온프레미스 Kubernetes 클러스터를 Amazon Elastic Kubernetes Service(Amazon EKS) 클러스터로 마이그레이션하기로 결정했습니다. EKS 클러스터는 노드 수가 고정된 EKS 관리형 노드 그룹을 사용합니다. 또한 회사는 온프레미스 데이터베이스를 PostgreSQL용 Amazon RDS 데이터베이스로 마이그레이션할 예정입니다. 솔루션 설계자는 마이그레이션 전에 이 워크로드에 대한 총 소유 비용(TCO)을 추정해야 합니다. 필요한 TCO 정보를 제공하는 솔루션은 무엇입니까?", "opts": ["Migration Evaluator에 대한 액세스를 요청합니다. Migration Evaluator Collector를 실행하고 데이터를 가져옵니다. 시나리오를 구성합니다. Migration Evaluator에서 Quick Insights 보고서를 내보냅니다.", "온프레미스 데이터베이스용 AWS Database Migration Service(AWS DMS)를 시작합니다. 평가 보고서를 생성합니다. EKS 마이그레이션 비용에 대한 추정치를 AWS 가격 계산기에서 생성합니다.", "AWS 애플리케이션 마이그레이션 서비스를 초기화합니다. 온프레미스 서버를 원본 서버로 추가합니다. 테스트 인스턴스를 시작합니다. Application Migration Service에서 TCO 보고서를 출력합니다.", "AWS 클라우드 경제 센터 웹페이지에 액세스하여 AWS 클라우드 가치 프레임워크를 평가합니다. Cloud Value Framework에서 AWS 비용 및 사용 보고서를 생성합니다."], "answers": [0]}, {"q": "한 이벤트 회사가 AWS에서 티켓팅 플랫폼을 운영하고 있습니다. 회사의 고객은 플랫폼에서 이벤트를 구성하고 예약합니다. 이벤트로 인해 플랫폼에 대한 트래픽이 크게 증가합니다. 회사는 각 고객의 행사 날짜와 시간을 알고 있습니다. 이 회사는 Amazon Elastic Container Service(Amazon ECS) 클러스터에서 플랫폼을 실행합니다. ECS 클러스터는 Auto Scaling 그룹에 속한 Amazon EC2 온디맨드 인스턴스로 구성됩니다. Auto Scaling 그룹은 예측 조정 정책을 사용합니다. ECS 클러스터는 티켓 자산을 다운로드하기 위해 Amazon S3 버킷에 자주 요청합니다. ECS 클러스터와 S3 버킷은 동일한 AWS 리전 및 동일한 AWS 계정에 있습니다. ECS 클러스터와 S3 버킷 간의 트래픽은 NAT 게이트웨이를 통해 흐릅니다. 회사는 플랫폼의 가용성을 저하시키지 않으면서 플랫폼 비용을 최적화해야 합니다. 이러한 요구 사항을 충족하는 단계 조합은 무엇입니까? (2개 선택)", "opts": ["S3 버킷에 대한 게이트웨이 VPC 엔드포인트를 생성합니다.", "스팟 인스턴스의 Auto Scaling 그룹을 사용하는 다른 ECS 용량 공급자를 추가합니다. 기존 용량 공급자 전략과 동일한 가중치를 갖도록 새 용량 공급자 전략을 구성합니다.", "예약된 조정 정책 기간 동안 해당 인스턴스 유형에 대한 온디맨드 용량 예약을 생성합니다.", "S3 버킷에서 S3 Transfer Acceleration을 활성화합니다.", "예측적 조정 정책을 예약된 이벤트에 대한 예약된 조정 정책으로 대체합니다."], "answers": [0, 4]}, {"q": "솔루션 설계자는 회사가 온프레미스에서 호스팅하는 3계층 애플리케이션을 재설계하고 있습니다. 이 응용 프로그램은 사용자 프로필을 기반으로 개인화 된 권장 사항을 제공합니다. 회사에는 이미 AWS 계정이 있으며 애플리케이션을 호스팅하도록 VPC를 구성했습니다. 프런트엔드는 온프레미스 VM에서 실행되는 Java 기반 애플리케이션입니다. 회사는 물리적 애플리케이션 서버에서 개인화 모델을 호스팅하고 TensorFlow를 사용하여 모델을 구현합니다. 개인화 모델은 인공 지능 및 기계 학습(AI/ML)을 사용합니다. 회사는 사용자 정보를 Microsoft SQL Server 데이터베이스에 저장합니다. 웹 애플리케이션은 데이터베이스에서 사용자 프로필을 읽고 권장 사항을 제공하는 개인화 모델을 호출합니다. 회사는 재설계된 애플리케이션을 AWS로 마이그레이션하려고 합니다. 최소한의 운영 오버헤드로 이 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["AWS Server Migration Service(AWS SMS)를 사용하여 온프레미스 물리적 애플리케이션 서버와 웹 애플리케이션 VM을 AWS로 마이그레이션합니다. AWS Database Migration Service(AWS DMS)를 사용하여 SQL Server 데이터베이스를 SQL Server용 Amazon RDS로 마이그레이션합니다.", "개인화 모델을 내보냅니다. 모델 아티팩트를 Amazon S3에 저장합니다. 모델을 Amazon SageMaker에 배포하고 엔드포인트를 생성합니다. AWS Elastic Beanstalk에서 Java 애플리케이션을 호스팅합니다. AWS Database Migration Service(AWS DMS)를 사용하여 SQL Server 데이터베이스를 SQL Server용 Amazon RDS로 마이그레이션합니다.", "AWS Application Migration Service를 사용하여 온프레미스 개인화 모델 및 VM을 Auto Scaling 그룹의 Amazon EC2 인스턴스로 마이그레이션합니다. AWS Database Migration Service(AWS DMS)를 사용하여 SQL Server 데이터베이스를 EC2 인스턴스로 마이그레이션합니다.", "개인화 모델 및 Java 애플리케이션을 컨테이너화합니다. Amazon Elastic Kubernetes Service(Amazon EKS) 관리형 노드 그룹을 사용하여 모델 및 애플리케이션을 Amazon EKS에 배포합니다. VPC에서 노드 그룹을 호스팅합니다. AWS Database Migration Service(AWS DMS)를 사용하여 SQL Server 데이터베이스를 SQL Server용 Amazon RDS로 마이그레이션합니다."], "answers": [1]}, {"q": "한 회사가 센서에서 대기질 데이터를 수집합니다. 이 회사는 MQTT 프로토콜을 사용하여 AWS IoT Core로 데이터를 전송할 계획입니다. 회사는 데이터를 처리한 후 Amazon Aurora 데이터베이스에 저장합니다. 대기질이 좋지 않은 기간에는 센서에서 데이터를 더 자주 전송합니다. 회사는 데이터 처리 및 저장 전에 데이터 손실이 발생하지 않도록 이 기간 동안 데이터를 버퍼링해야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["Amazon Kinesis 데이터 스트림을 생성합니다. AWS IoT 규칙 작업을 생성하고 데이터 스트림을 대상으로 설정합니다. 데이터 스트림에 의해 호출되는 AWS Step Functions 상태 머신을 생성합니다. 상태 머신을 사용하여 데이터를 처리하고 저장합니다.", "Amazon Kinesis 데이터 스트림을 생성합니다. AWS IoT 규칙 작업을 생성하고 데이터 스트림을 대상으로 설정합니다. AWS Fargate 시작 유형으로 Amazon ECS 클러스터에서 실행되는 애플리케이션을 생성합니다. 데이터 스트림에서 데이터를 읽고, 처리하고, 저장하도록 애플리케이션을 구성합니다.", "Amazon SQS 대기열을 생성합니다. AWS IoT 규칙 작업을 생성하고 SQS 대기열을 대상으로 설정합니다. SQS 대기열에서 호출되는 AWS Step Functions 상태 머신을 생성합니다. 이 상태 머신을 사용하여 데이터를 처리하고 저장합니다.", "Amazon SNS 주제를 생성합니다. AWS IoT 규칙 작업을 생성하고 SNS 주제를 대상으로 설정합니다. AWS Fargate 시작 유형으로 Amazon ECS 클러스터에서 실행되는 애플리케이션을 생성합니다. SNS 주제에서 데이터를 읽고, 처리하고, 저장하도록 애플리케이션을 구성합니다."], "answers": [1]}, {"q": "회사의 솔루션 아키텍트가 샌드박스 AWS 계정에서 내부적으로 개발된 새로운 애플리케이션을 검토하고 있습니다. 애플리케이션은 IAM 인스턴스 프로파일이 연결된 Amazon EC2 인스턴스의 AWS Auto Scaling 그룹을 사용합니다. 애플리케이션 로직의 일부는 AWS Secrets Manager에서 비밀을 생성하고 액세스합니다. 회사에는 애플리케이션 API를 호출하여 기능을 테스트하는 AWS Lambda 함수가 있습니다. 회사는 또한 계정에 AWS CloudTrail 추적을 생성했습니다. 애플리케이션의 개발자가 SecretsManagerReadWnte AWS 관리형 IAM 정책을 IAM 역할에 연결했습니다. IAM 역할은 EC2 인스턴스에 연결된 인스턴스 프로필과 연결됩니다. 솔루션 설계자가 테스트를 위해 Lambda 함수를 호출했습니다. 솔루션 설계자는 SecretsManagerReadWnte 정책을 애플리케이션에 필요한 Secrets Manager 작업에 대한 최소 권한 접근을 제공하는 새 정책으로 교체해야 합니다. 이러한 요구 사항을 충족하는 운영상 가장 효율적인 솔루션은 무엇입니까?", "opts": ["IAM 역할에 대한 CloudTrail 이벤트를 기반으로 정책을 생성합니다. 생성된 정책 출력을 사용하여 새 IAM 정책을 생성합니다. 새로 생성된 IAM 정책을 사용하여 IAM 역할에 연결된 SecretsManagerReadWnte 정책을 대체합니다.", "AWS Identity and Access Management Access Analyzer에서 분석기를 생성합니다. IAM 역할의 Access Advisor 결과를 사용하여 새 IAM 정책을 생성합니다. 새로 생성된 IAM 정책을 사용하여 IAM 역할에 연결된 SecretsManagerReadWnte 정책을 대체합니다.", "aws cloudtrail lookup-events AWS CLI 명령을 사용하여 Secrets Manager와 관련된 CloudTrail 이벤트를 필터링하고 내보냅니다. CloudTrail의 작업이 포함된 새 IAM 정책을 사용하여 IAM 역할에 연결된 SecretsManagerReadWnte 정책을 교체합니다.", "IAM 정책 시뮬레이터를 사용하여 IAM 역할에 대한 IAM 정책을 생성합니다. 새로 생성된 IAM 정책을 사용하여 IAM 역할에 연결된 SecretsManagerReadWnte 정책을 대체합니다."], "answers": [1]}, {"q": "한 회사에서 모든 데이터베이스 백업을 격리된 AWS 계정에 저장해야 하는 새로운 요구 사항이 있습니다. 이 회사는 AWS Organizations를 사용하고 있으며 백업을 위한 중앙 WORM(write-once, read-many) 계정을 만들었습니다. 이 회사는 프로덕션 계정에 40개의 Amazon RDS to MySQL 데이터베이스를 보유하고 있습니다. 데이터베이스는 기본 RDS AWS Key Management Service(AWS KMS) 키로 암호화됩니다. 데이터베이스의 RDS 자동 백업은 매일 수행되며 보관 기간은 30일입니다. 어떤 솔루션이 데이터베이스 백업을 중앙 계정에 성공적으로 복사할까요?", "opts": ["AWS Backup에 대한 Organizations 신뢰할 수 있는 액세스 및 백업 정책을 활성화합니다. 중앙 계정을 AWS Backup의 위임된 관리자로 구성합니다. IAM 정책 및 백업 정책을 만듭니다. 교차 계정 관리를 활성화합니다. 중앙 계정에 백업 볼트를 만듭니다. 백업 볼트에 대한 KMS 키를 만들고 프로덕션 계정과 키를 공유합니다. 프로덕션 계정에서 스냅샷에서 데이터베이스를 복원하고 공유된 KMS 키를 새 DB 인스턴스에 적용합니다. 중앙 계정에서 백업 계획을 만들어 데이터베이스를 백업 볼트에 백업합니다.", "AWS Backup에 대한 Organizations Trusted Access 및 백업 정책을 활성화합니다. 중앙 계정을 AWS Backup의 위임된 관리자로 구성합니다. IAM 정책 및 백업 정책을 만듭니다. 교차 계정 관리를 활성화합니다. 프로덕션 계정에서 기본 RDS KMS 키를 중앙 계정과 공유합니다. 중앙 계정에서 백업 볼트를 만듭니다. 공유된 기본 RDS KMS 키를 백업 볼트에 적용합니다. 중앙 계정에서 백업 계획을 만들어 데이터베이스를 백업 볼트에 백업합니다.", "매일 AWS Lambda 함수를 호출하는 Amazon EventBridge 규칙을 만듭니다. Lambda 함수를 프로그래밍하여 스냅샷을 해독하고 암호화되지 않은 모든 스냅샷의 복사 요청을 중앙 계정으로 시작합니다. 복사 작업이 완료되면 새 KMS 키를 만듭니다. 새 KMS 키를 사용하여 중앙 계정에서 데이터베이스 스냅샷을 암호화합니다.", "매일 AWS Lambda 함수를 호출하는 Amazon EventBridge 규칙을 만듭니다. 프로덕션 계정에서 기본 RDS KMS 키를 중앙 계정과 공유합니다. Lambda 함수를 프로그래밍하여 스냅샷을 복호화하고 암호화되지 않은 모든 스냅샷을 중앙 계정으로 복사 요청을 시작합니다. 복사 작업이 완료되면 중앙 계정의 공유 기본 RDS KMS 키로 데이터베이스 스냅샷을 암호화합니다."], "answers": [1]}, {"q": "회사는 Amazon EC2 인스턴스 플릿에서 프록시 서버를 운영합니다. 다른 국가의 파트너는 프록시 서버를 사용하여 회사의 기능을 테스트합니다. EC2 인스턴스는 VPC에서 실행 중입니다. 인스턴스는 인터넷에 접근할 수 있습니다. 회사의 보안 정책에 따라 파트너는 회사가 소유한 도메인에서만 리소스에 접근할 수 있습니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["허용된 도메인이 포함된 Amazon Route 53 Resolver bemates Service(Amazon EKS) 클러스터에서 제공하는 백엔드 API와 함께 Amazon S3에서 호스팅되는 상태 웹 사이트를 사용하여 애플리케이션에 보고서를 제공합니다.", "Amazon S3를 사용하여 데이터 저장 Amazon Athena를 사용하여 애플리케이션에 보고서를 제공합니다. AWS App Runner를 사용하여 보고서를 볼 수 있는 애플리케이션을 제공합니다.", "Amazon DynamoDB를 사용하여 데이터를 저장하고, 직접 쿼리 데이터 세트가 포함된 내장형 Amazon QuickStight 대시보드를 사용하여 애플리케이션에 보고서를 제공합니다.", "Amazon Keyspaces(Apache Cassandra용)를 사용하여 데이터를 저장하고 AWS Elastic Beanstalk를 사용하여 애플리케이션에 보고서를 제공합니다."], "answers": [2]}, {"q": "회사는 AWS 조직의 조직을 사용하여 AWS 계정을 관리하고 있습니다. 각각의 새로운 프로젝트에 대해 회사는 새로운 연결 계정을 만듭니다. 새 계정을 생성한 후 루트 사용자는 새 계정에 로그인하고 Amazon EC2 인스턴스에 대한 서비스 할당량을 늘리기 위한 서비스 요청을 생성합니다. 솔루션 아키텍트는 이 프로세스를 자동화해야 합니다. 최소한의 운영 오버헤드로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["Amazon EventBridge 규칙을 생성하여 새 계정 생성을 감지합니다. AWS Lambda 함수를 호출하는 Amazon Simple 알림 서비스(Amazon SNS) 주제로 이벤트를 보냅니다. request-service-quota-increase 명령을 실행하여 EC2 인스턴스에 대한 서비스 할당량 증가를 요청하도록 Lambda 함수를 구성합니다.", "마스터 계정에서 서비스 할당량 요청 템플릿을 생성합니다. EC2 인스턴스에 대해 원하는 서비스 할당량 증가를 구성합니다.", "EC2 인스턴스에 대한 서비스 할당량을 설정하려면 마스터 계정에서 AWS Config 규칙을 생성합니다.", "새 계정 생성을 감지하는 Amazon EventBridge 규칙을 생성합니다. AWS Lambda 함수와 관련된 Amazon Simple 알림 서비스(Amazon SNS) 주제로 이벤트를 보냅니다. create-case 명령을 실행하여 EC2 인스턴스에 대한 서비스 할당량 증가를 요청하도록 Lambda 함수를 구성합니다."], "answers": [1]}, {"q": "한 회사에 여러 AWS 계정이 있습니다. 개발 팀은 클라우드 거버넌스 및 문제 해결 프로세스를 위한 자동화 프레임워크를 구축하고 있습니다. 자동화 프레임워크는 중앙 집중식 계정에서 AWS Lambda 함수를 사용합니다. 솔루션 설계자는 Lambda 함수가 회사의 각 AWS 계정에서 실행될 수 있도록 허용하는 최소 권한 정책을 구현해야 합니다. 이러한 요구 사항을 충족하는 단계 조합은 무엇입니까? (2개 선택)", "opts": ["중앙 집중식 계정에서 Lambda 서비스를 신뢰할 수 있는 엔터티로 포함하는 IAM 역할을 생성합니다. 다른 AWS 계정의 역할을 맡도록 인라인 정책을 추가합니다.", "다른 AWS 계정에서 최소한의 권한을 가진 IAM 역할을 생성합니다. 중앙 집중식 계정의 Lambda IAM 역할을 신뢰할 수 있는 엔터티로 추가합니다.", "중앙 집중식 계정에서 다른 계정의 역할을 신뢰할 수 있는 엔터티로 갖는 IAM 역할을 생성합니다. 최소한의 권한을 제공합니다.", "다른 AWS 계정에서 중앙 집중식 계정의 역할을 맡을 권한이 있는 IAM 역할을 생성합니다. Lambda 서비스를 신뢰할 수 있는 엔터티로 추가합니다.", "다른 AWS 계정에서 최소 권한을 가진 IAM 역할을 생성합니다. Lambda 서비스를 신뢰할 수 있는 엔터티로 추가합니다."], "answers": [0, 1]}, {"q": "회사는 신뢰성 있는 티켓팅 애플리케이션을 개선해야 합니다. 애플리케이션은 Amazon Elastic Container Service(Amazon ECS) 클러스터에서 실행됩니다. 이 회사는 Amazon CloudFront를 사용하여 애플리케이션을 제공합니다. ECS 클러스터의 단일 ECS 서비스는 CloudFront 배포의 오리진입니다. 이 애플리케이션에서는 특정 수의 활성 사용자만 티켓 구매 흐름에 참여할 수 있습니다. 이러한 사용자는 JWT(JSON 웹 토큰)의 암호화된 속성으로 식별됩니다. 다른 모든 사용자는 구매할 수 있는 용량이 확보될 때까지 대기실 모듈로 리디렉션됩니다. 애플리케이션에 높은 부하가 발생하고 있습니다. 대기실 모듈로는 설계된 대로 작동하지만 대기실에 대한 부하로 인해 애플리케이션의 가용성이 저하됩니다. 이러한 중단은 애플리케이션의 티켓 판매 거래에 부정적인 영향을 미치고 있습니다. 부하가 높은 기간 동안 티켓 판매 거래에 가장 높은 신뢰성을 제공하는 솔루션은 무엇입니까?", "opts": ["ECS 클러스터에 대기실용으로 별도의 서비스를 생성합니다. 별도의 확장 구성을 사용하세요. 티켓 서비스가 JWT 정보 국가를 사용하고 요청을 창고 서비스에 적절하게 전달하는지 확인하십시오.", "애플리케이션을 Amazon Elastic Kubernetes Service(Amazon EKS) 클러스터로 이동합니다. 대기실 모듈을 발권 포드와 별도의 포드로 분할합니다. 티켓팅 포드를 StatefuISeL의 일부로 만들기 티켓팅 포드가 JWT 정보를 사용하고 요청을 대기실 포드에 적절하게 전달하는지 확인하세요.", "대기실을 위해 ECS 클러스터에 별도의 서비스를 생성합니다. 별도의 확장 구성을 사용하세요. JWT 정보를 검사하고 티켓 서비스 또는 대기실 서비스에 요청을 적절하게 전달하는 CloudFront 함수를 만듭니다.", "애플리케이션을 Amazon Elastic Kubernetes Service(Amazon EKS) 클러스터로 이동합니다. 대기실 모듈을 발권 포드와 별도의 포드로 분할합니다. Kubermetes용 App Mesh 컨트롤러를 프로비저닝하여 AWS App Mesh를 사용하세요. 티켓팅 포드와 대기실 포드 간의 통신을 위해 mTLS 인증 및 서비스 간 인증을 활성화합니다. 발권 포드가 JWT 정보를 사용하고 요청을 대기실 포드에 적절하게 전달하는지 확인하세요."], "answers": [2]}, {"q": "한 회사에는 각 부서에 대한 별도의 AWS 계정이 있습니다. 계정은 AWS Organizations의 조직에 있는 OU에 있습니다. IT 부서는 계정에서 AWS Private Certificate Authority를 ​​사용하여 개인 인증 기관(CA)을 관리합니다. 회사에는 다른 부서 계정의 개발자 팀이 개인 CA에 액세스하여 애플리케이션에 대한 인증서를 발급할 수 있는 솔루션이 필요합니다. 솔루션은 계정 간에 적절한 보안 경계를 유지해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "opts": ["IT 계정에서 AWS Lambda 함수를 만듭니다. Lambda 함수를 프로그래밍하여 AWS Private CA API를 사용하여 개인 CA 인증서를 각 부서 계정으로 내보내고 가져옵니다. Amazon EventBridge를 사용하여 일정에 따라 Lambda 함수를 호출합니다.", "AWS Private CA에 대한 교차 계정 액세스를 허용하는 IAM ID 기반 정책을 만듭니다. IT 계정에서 이 정책을 개인 CA에 연결합니다. AWS Private CA API를 사용하여 AWS Private CA에 대한 액세스 권한을 부여합니다.", "조직의 관리 계정에서 AWS CloudFormation 스택을 만들어 리소스 기반 위임 정책을 설정합니다. 정책을 업데이트하여 organizations:EnableAWSServiceAccess 작업을 허용합니다. IT 계정의 개인 CA ARN을 정책 설명의 주체로 추가합니다.", "IT 계정에서 AWS Resource Access Manager(AWS RAM)를 사용하여 조직에서 공유를 활성화합니다. 리소스 공유를 만듭니다. 개인 CA 리소스를 리소스 공유에 추가합니다. 부서 OU에 공유 CA에 대한 액세스 권한을 부여합니다."], "answers": [2]}, {"q": "한 회사에 단일 AWS 계정이 있습니다. 이 회사는 한 AWS 지역의 여러 VPC에 있는 Amazon EC2 인스턴스에서 워크로드를 실행합니다. 이 회사는 또한 AWS Direct Connect를 사용하여 회사의 AWS 계정에 연결하는 온프레미스 데이터 센터에서 워크로드를 실행합니다. 이 회사는 VPC에 있는 모든 EC2 인스턴스가 온프레미스 데이터 센터에 있는 권한 있는 DNS 서버에 대한 internal.company.com 도메인에 대한 DNS 쿼리를 해결해야 합니다. 이 솔루션은 VPC와 온프레미스 네트워크 간에 개인 통신을 사용해야 합니다. 모든 경로 테이블, 네트워크 ACL 및 보안 그룹이 AWS와 온프레미스 데이터 센터 간에 올바르게 구성되었습니다. 이러한 요구 사항을 충족하는 작업 조합은 무엇입니까? (3개 선택)", "opts": ["모든 워크로드 VPC에 Amazon Route 53 인바운드 엔드포인트를 만듭니다.", "워크로드 VPC 중 하나에 Amazon Route 53 아웃바운드 엔드포인트를 만듭니다.", "온프레미스 DNS 서버에 대한 internal.company.com에 대한 쿼리를 전달하도록 구성된 Forward 유형으로 Amazon Route 53 Resolver 규칙을 만듭니다.", "내부 DNS 서버에 internal.company.com에 대한 쿼리를 전달하도록 구성된 시스템 유형으로 Amazon Route 53 Resolver 규칙을 만듭니다.", "Amazon Route 53 Resolver 규칙을 모든 워크로드 VPC와 연결합니다.", "Amazon Route 53 Resolver 규칙을 워크로드 VPC와 새 Route 53 엔드포인트와 연결합니다."], "answers": [1, 2, 4]}, {"q": "한 회사에서 모놀리식 온프레미스 .NET Framework 프로덕션 애플리케이션을 AWS로 마이그레이션하고 있습니다. 애플리케이션 수요는 향후 6개월 동안 기하급수적으로 증가할 것입니다. 회사는 애플리케이션이 적절하게 확장될 수 있도록 해야 합니다. 애플리케이션은 현재 Microsoft SQL Server 트랜잭션 데이터베이스에 연결되어 있습니다. 회사는 애플리케이션에 대한 잘 문서화된 소스 코드를 보유하고 있습니다. 일부 비즈니스 로직은 저장 프로시저에 포함되어 있습니다. 솔루션 아키텍트는 수요 증가에 맞춰 애플리케이션을 재설계하는 솔루션을 추천해야 합니다. 이 요구 사항을 가장 비용 효율적으로 충족하는 솔루션은 무엇입니까?", "opts": ["Amazon API Gateway API와 Amazon EC2 Spot Instances를 사용하여 확장 가능한 마이크로서비스 아키텍처로 애플리케이션을 다시 호스팅합니다. EC2 인스턴스를 클러스터 배치 그룹에 배포합니다. EC2 자동 크기 조정을 구성합니다. Amazon RDS for SQL Server에 데이터와 저장 프로시저를 저장합니다.", "AWS Application Migration Service를 사용하여 애플리케이션을 AWS Elastic Beanstalk로 마이그레이션합니다. Elastic Beanstalk 패키지를 배포하여 애플리케이션을 마이크로서비스로 구성하고 배포합니다. 여러 가용성 영역에 Elastic Beanstalk를 배포하고 자동 크기 조정을 구성합니다. Amazon RDS for MySQL에 데이터와 저장 프로시저를 저장합니다.", "AWS App2Container를 사용하여 애플리케이션을 마이그레이션합니다. 여러 AWS 리전에서 AWS Fargate를 사용하여 컨테이너를 호스팅합니다. Amazon API Gateway API와 AWS Lambda 함수를 사용하여 컨테이너를 호출합니다. Amazon DynamoDB Accelerator(DAX)에 데이터와 저장 프로시저를 저장합니다.", "Amazon API Gateway API와 AWS Lambda 함수를 사용하여 애플리케이션을 마이크로서비스로 분리합니다. AWS Schema Conversion Tool(AWS SCT)을 사용하여 저장 프로시저를 검토하고 수정합니다. Amazon Aurora Serverless v2에 데이터를 저장합니다."], "answers": [3]}, {"q": "한 회사에 애플리케이션 로드 밸런서(ALB) 뒤에 있는 Amazon EC2 인스턴스 플릿에서 실행되는 애플리케이션이 있습니다. 이 애플리케이션은 AWS CloudTrail이 활성화된 AWS 계정에 있습니다. 이 회사는 ALB와 연결된 보안 그룹에 최종 사용자의 IP 주소를 추가하여 애플리케이션에 대한 액세스를 제한합니다. 이 회사는 허용된 IP 주소가 최근에 애플리케이션에 액세스했는지 확인하기 위해 AWS Lambda 함수를 개발하고 있습니다. 허용된 IP 주소가 지난 90일 동안 애플리케이션에 액세스하지 않은 경우 Lambda 함수는 보안 그룹에서 IP 주소를 제거합니다. 이 회사는 Lambda 함수가 IP 주소를 확인하는 기능을 구현해야 합니다. 이 기능을 가장 비용 효율적으로 제공하는 단계 조합은 무엇입니까? (2개 선택)", "opts": ["ALB가 포함된 VPC의 경우 Amazon CloudWatch Logs의 로그 그룹으로 전송되도록 VPC 흐름 로그를 구성합니다.", "ALB에서 액세스 로깅을 활성화합니다. ALB 액세스 로그를 쿼리하기 위해 Amazon Athena 테이블을 만듭니다.", "보안 그룹의 각 허용 IP 주소가 VPC 흐름 로그에 마지막으로 나타난 시점을 확인하도록 Lambda 함수를 프로그래밍합니다.", "보안 그룹의 각 허용 IP 주소가 ALB 액세스 로그에 마지막으로 나타난 시점을 확인하도록 Lambda 함수를 프로그래밍합니다.", "보안 그룹의 각 허용 IP 주소가 CloudTrail 로그에 마지막으로 나타난 시점을 확인하도록 Lambda 함수를 프로그래밍합니다."], "answers": [1, 3]}, {"q": "회사에서 환경 데이터를 처리합니다. 도시의 여러 지역에서 연속적인 데이터 스트림을 제공하기 위해 센서를 설정했습니다. 데이터는 JSON 형식으로 제공됩니다. 회사에서는 AWS 솔루션을 사용하여 고정된 스키마 없이도 저장할 수 있는 데이터베이스로 데이터를 전송하려고 합니다. 데이터는 실시간으로 전송해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "opts": ["Amazon Kinesis Data Firehouse를 사용하여 데이터를 Amazon Redshift로 전송합니다.", "Amazon Kinesis Data Streams를 사용하여 데이터를 Amazon DynamoDB로 전송합니다.", "Amazon Managed Streaming for Apache Kafka(Amazon MSK)를 사용하여 데이터를 Amazon Aurora로 전송합니다.", "Amazon Kinesis Data Firehouse를 사용하여 데이터를 Amazon Keyspaces(Apache Cassandra용)로 전송합니다."], "answers": [1, 0]}, {"q": "한 회사가 Linux를 실행하는 Amazon EC2 인스턴스에서 퍼블릭 SaaS(Software as a Service) 애플리케이션을 호스팅합니다. EC2 인스턴스는 애플리케이션 로드 밸런서 뒤의 여러 가용성 영역에 있습니다. 이 애플리케이션은 Amazon RDS Multi-AZ 데이터베이스를 사용하여 사용자 세션을 포함한 애플리케이션 데이터를 저장합니다. 이 회사는 사용자 세션을 저장하고 액세스하는 데 관련된 지연 시간을 최소화해야 합니다. 이 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["Amazon S3 버킷을 만듭니다. S3 Standard 스토리지에 사용자 세션을 저장합니다.", "Amazon FSx for Windows File Server 볼륨을 만듭니다. 각 EC2 인스턴스에 볼륨을 마운트합니다. 볼륨에 사용자 세션을 저장합니다.", "Provisioned IOPS SSD(io2) Amazon Ela g 그룹에 요청을 분산합니다. EC2 인스턴스는 각 가용 영역의 공유 Amazon EBS io2 볼륨에 연결됩니다. EBS 볼륨은 참조 데이터 세트를 저장합니다. 테스트 중 여러 병렬 분석으로 인해 수많은 디스크 오류가 발생하여 작업 실패가 발생했습니다. 이 회사는 모든 인스턴스에 대해 원활한 데이터 읽기 기능을 제공하는 솔루션을 원합니다. 이러한 요구 사항을 가장 비용 효율적으로 충족하는 솔루션은 무엇입니까?", "opts": ["각 EC2 인스턴스에 대해 새 EBS 볼륨을 생성합니다. 공유 볼륨의 데이터를 새 EBS 볼륨으로 정기적으로 복사합니다. 새 EBS 볼륨을 참조하도록 애플리케이션을 업데이트합니다.", "모든 참조 데이터를 Amazon S3 버킷으로 이동합니다. EC2 인스턴스에 Amazon S3용 마운트 지점을 설치합니다. VPC에 Amazon S3용 게이트웨이 엔드포인트를 생성합니다. EBS 마운트 지점을 S3 마운트 지점으로 바꿉니다.", "모든 참조 데이터를 Amazon S3 버킷으로 이동합니다. Amazon S3 지원 다중 AZ Amazon EFS 볼륨을 생성합니다. EC2 인스턴스에 EFS 볼륨을 마운트합니다. EBS 마운트 지점을 EFS 마운트 지점으로 바꿉니다.", "인스턴스를 로컬 스토리지로 업그레이드합니다. 공유 EBS 볼륨의 데이터를 로컬 스토리지로 정기적으로 복사합니다. 로컬 스토리지를 참조하도록 애플리케이션을 업데이트합니다."], "answers": [2]}, {"q": "한 회사가 AWS Organizations를 사용합니다. 이 회사는 단일 AWS 리전의 네트워킹용으로 지정된 AWS 계정에 중앙 VPC를 생성합니다. 중앙 VPC에는 회사의 온프레미스 네트워크에 대한 AWS Site-to-Site VPN 연결이 있습니다. 솔루션 아키텍트는 중앙 VPC와 동일한 네트워킹 리소스를 사용하는 다른 AWS 계정을 생성해야 합니다. 다음 요구 사항을 가장 비용 효율적으로 충족하는 솔루션은 무엇입니까?", "opts": ["새 AWS 계정에 VPC를 생성합니다. 온프레미스 연결을 위한 새 Site-to-Site VPN 연결을 생성합니다.", "AWS Resource Access Manager를 사용하여 중앙 VPC의 VPN 연결을 새 AWS 계정과 공유합니다.", "새 AWS 계정에 VPC를 생성합니다. 중앙 VPC에 연결하기 위한 가상 프라이빗 게이트웨이를 구성합니다.", "AWS Resource Access Manager를 사용하여 중앙 VPC의 서브넷을 새 AWS 계정과 공유합니다."], "answers": [3]}, {"q": "한 회사에서 저장 프로시저가 포함된 대규모 온프레미스 Oracle 데이터베이스를 AWS로 마이그레이션하고 있습니다. 이 솔루션은 관리형 서비스를 사용하고, 고가용성을 보장하며, 최소한의 다운타임으로 빠른 마이그레이션을 지원해야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["AWS DMS를 사용하여 Oracle용 RDS에 데이터를 복제합니다. 데이터베이스 파일은 S3에 저장합니다.", "EC2에 호스팅된 Oracle 클러스터에 백업 및 복원을 사용합니다.", "DMS를 사용하여 데이터를 DynamoDB로 이동합니다. Lambda에서 저장 프로시저를 다시 생성합니다.", "DMS를 사용하여 Amazon Aurora PostgreSQL로 마이그레이션합니다. AWS SCT를 사용하여 저장 프로시저를 변환합니다."], "answers": [3]}, {"q": "한 회사가 Amazon ECS를 사용하여 AWS 클라우드에서 대규모 컨테이너화된 워크로드를 실행하고 있습니다. 개발팀은 최근 ECS 클러스터에서 EC2 대신 AWS Fargate를 사용하기 시작했습니다. 회사는 계정에 허용되는 최대 ECS 작업 수에 도달하는 것을 우려하고 있습니다. 솔루션 아키텍트는 Fargate 사용량이 할당량의 80%에 도달하면 개발팀에 알리는 솔루션을 구현해야 합니다. 아키텍트는 어떻게 해야 합니까?", "opts": ["CloudWatch를 사용하여 각 서비스의 샘플 수를 모니터링합니다. 사용량이 80%를 초과하면 알림을 보냅니다.", "CloudWatch를 사용하여 AWS/Usage 네임스페이스에서 ECS 서비스 할당량을 모니터링합니다. 사용률이 80%를 초과하면 경보를 생성합니다. SNS를 통해 알립니다.", "Lambda 함수를 사용하여 Fargate 지표를 폴링합니다. 사용량이 80%를 초과하면 SES를 통해 알립니다.", "AWS Config를 사용하여 Fargate 할당량을 모니터링합니다. 규정을 준수하지 않으면 SES를 통해 알립니다."], "answers": [1]}, {"q": "한 회사가 Amazon EC2와 AWS Lambda에서 애플리케이션을 실행합니다. 이 애플리케이션은 Amazon S3에 임시 데이터를 저장합니다. S3 객체는 24시간 후 삭제됩니다. 이 회사는 AWS CloudFormation 스택을 실행하여 새 버전의 애플리케이션을 배포합니다. 스택은 필요한 리소스를 생성합니다. 새 버전의 유효성을 검사한 후 회사는 이전 스택을 삭제합니다. 최근 이전 개발 스택 삭제가 실패했습니다. 솔루션 아키텍트는 주요 아키텍처 변경 없이 이 문제를 해결해야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["S3 버킷에서 객체를 삭제하는 Lambda 함수를 생성합니다. CloudFormation 스택에 Lambda 함수를 사용자 지정 리소스로 추가하고, DependsOn 속성을 S3 버킷 리소스를 가리키도록 설정합니다.", "S3 버킷에 Delete 값을 갖는 DeletionPolicy 속성을 연결하도록 CloudFormation 스택을 수정합니다.", "S3 버킷 리소스에 대해 Snapshot 값을 갖는 DeletionPolicy 속성을 추가하도록 CloudFormation 스택을 업데이트합니다.", "CloudFormation 템플릿을 업데이트하여 Amazon S3 대신 임시 파일을 저장할 Amazon EFS 파일 시스템을 생성합니다. Lambda 함수가 EFS 파일 시스템과 동일한 VPC에서 실행되도록 구성합니다."], "answers": [0]}, {"q": "한 회사가 AWS Organizations를 사용하고 모든 리소스에 BusinessUnit 태그를 지정합니다. 이 회사는 사업부별로 클라우드 비용을 할당하고 시각화하려고 합니다. 아키텍트는 어떻게 해야 할까요?", "opts": ["관리 계정에서 BusinessUnit 비용 할당 태그를 활성화합니다. S3에 비용 및 사용량 보고서(CUR)를 생성합니다. Athena와 QuickSight를 사용하여 보고합니다.", "각 구성원 계정에 비용 할당 태그를 생성합니다. CloudWatch 대시보드를 사용합니다.", "관리 계정에 비용 할당 태그를 생성합니다. 계정별로 CUR을 배포합니다.", "계정별로 태그와 CUR을 사용합니다. 관리 계정에서 QuickSight를 사용하여 시각화합니다."], "answers": [0]}, {"q": "한 회사에는 매일 밤 200GB의 데이터를 로컬 드라이브에 내보내는 온프레미스 Microsoft SOL Server 데이터베이스가 있습니다. 이 회사는 백업을 Amazon S3의 더욱 강력한 클라우드 스토리지로 옮기려고 합니다. 이 회사는 온프레미스 데이터 센터와 AWS 간에 10Gbps AWS Direct Connect 연결을 설정했습니다. 이러한 요구 사항을 가장 비용 효율적으로 충족하는 솔루션은 무엇입니까?", "opts": ["새 S3 버킷을 생성합니다. Direct Connect 연결에 연결된 VPC 내에 AWS Storage Gateway 파일 게이트웨이를 배포합니다. 새 SMB 파일 공유를 생성합니다. 새 SMB 파일 공유에 야간 데이터베이스 내보내기를 작성합니다.", "Direct Connect 연결에 연결된 VPC 내에 Amazon FSx for Windows File Server 단일 AZ 파일 시스템을 생성합니다. 새 SMB 파일 공유를 생성합니다. Amazon FSx 파일 시스템의 SMB 파일 공유에 야간 데이터베이스 내보내기를 작성합니다. 야간 백업을 활성화합니다.", "Direct Connect 연결에 연결된 VPC 내에 Amazon FSx for Windows File Server 다중 AZ 파일 시스템을 생성합니다. 새 SMB 파일 공유를 생성합니다. Amazon FSx 파일 시스템의 SMB 파일 공유에 야간 데이터베이스 내보내기를 작성합니다. 야간 백업을 활성화합니다.", "새 S3 버킷을 생성합니다. Direct Connect 연결에 연결된 VPC 내에 AWS Storage Gateway 볼륨 게이트웨이를 배포합니다. 새 SMB 파일 공유를 생성합니다. 볼륨 게이트웨이의 새 SMB 파일 공유에 야간 데이터베이스 내보내기를 작성하고, 이 데이터를 S3 버킷에 자동으로 복사합니다."], "answers": [0]}, {"q": "한 회사가 여러 가용 영역에 새로운 빅데이터 분석 클러스터를 구축하고 있습니다. 모든 노드는 고가용성, POSIX 호환, 높은 처리량을 갖춘 공유 파일 스토리지에 대한 읽기/쓰기 권한이 있어야 합니다. 설계자는 어떻게 해야 합니까?", "opts": ["Amazon S3 기반 AWS Storage Gateway(파일 게이트웨이)를 사용합니다.", "범용 성능 모드에서 Amazon EFS를 사용합니다.", "다중 연결 기능이 있는 Amazon EBS를 사용합니다.", "최대 I/O 성능 모드의 Amazon EFS를 사용합니다."], "answers": [3]}, {"q": "한 회사가 온프레미스 데이터 센터에서 Amazon EC2 인스턴스로 워크로드를 마이그레이션할 계획입니다. 워크로드는 물리적 서버와 VMware 가상 서버에서 실행됩니다. 회사는 서버 사양, CPU 사용률, 메모리 사용률을 포함하여 각 온프레미스 서버와 가상 서버에 대한 세부 정보를 수집했습니다. 회사는 이러한 세부 정보를 onprem.csv라는 .csv 파일에 저장했습니다. 마이그레이션 전에 회사는 AWS에서 서버를 실행하는 데 드는 비용을 예측하고 서버에 권장되는 EC2 인스턴스 유형을 결정해야 합니다. 회사는 이 정보를 다른 .csv 파일로 내보내야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["외부 소스에서 권장 사항을 생성하도록 AWS Compute Optimizer를 구성합니다. onprem.csv 파일을 가져옵니다. Compute Optimizer 권장 사항을 새 .csv 파일로 내보냅니다.", "AWS Migration Hub 가져오기를 사용하여 onprem.csv 파일을 AWS Migration Hub로 가져옵니다. Migration Hub의 EC2 인스턴스 권장 사항을 사용하여 권장 사항을 생성합니다. 권장 사항을 새 .csv 파일로 내보냅니다.", "온프레미스에 AWS Application Discovery Service Agentless Collector를 배포합니다. Agentless Collector를 사용하여 onprem.csv 파일을 가져옵니다. 이 파일을 AWS Migration Hub로 전송합니다. Migration Hub의 EC2 인스턴스 권장 사항을 사용하여 권장 사항을 생성합니다. 권장 사항을 새 .csv 파일로 내보냅니다.", "onprem.csv 파일을 Amazon S3 버킷에 업로드합니다. S3 버킷에서 데이터를 가져오도록 Migration Evaluator를 구성합니다. Migration Evaluator Quick Insights를 사용하여 권장 사항을 생성하고 확인합니다. 최종 권장 사항을 S3 버킷의 새 .csv 파일로 내보냅니다."], "answers": [3]}, {"q": "한 회사가 여러 환경에서 Amazon EC2 온디맨드 인스턴스와 Amazon RDS for PostgreSQL DB 인스턴스에 프로덕션 워크로드를 배포했습니다. 이 회사는 AWS Business Support 플랜을 이용하고 있습니다. 솔루션 아키텍트는 워크로드의 가용성이나 컴퓨터 용량에 부정적인 영향을 미치지 않으면서 워크로드 비용을 최적화해야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["AWS 비용 및 사용 보고서를 사용하여 가장 비용이 많이 드는 인스턴스와 사용 패턴을 분석합니다. AWS Lambda를 사용하여 사용률이 낮은 인스턴스를 종료합니다. 사용률이 높은 워크로드의 경우 Compute Savings Plans를 구매합니다.", "AWS Budgets를 사용하여 각 환경의 지출을 추적합니다. AWS Trusted Advisor 비용 최적화 검사를 구성하여 인스턴스 크기를 조정합니다. Amazon CloudWatch에서 청구 알림을 생성합니다. 사용률이 낮은 인스턴스를 종료합니다. 사용률이 높은 워크로드의 경우 예약 인스턴스를 구매합니다.", "AWS Compute Optimizer에 가입합니다. Compute Optimizer와 AWS Trusted Advisor를 사용하여 사용률이 낮은 인스턴스를 식별합니다. Compute Optimizer의 권장 사항을 구현하고, 인스턴스 유형을 수정하고, 인스턴스 크기를 조정하고, Auto Scaling 그룹을 적용합니다. Compute Savings Plan을 구매하세요.", "AWS Cost Explorer 권장 사항을 사용하여 활용도가 낮은 인스턴스의 크기를 조정합니다. Amazon CloudWatch에서 청구 알림을 생성합니다. 활용도가 낮은 인스턴스의 EC2 온디맨드 인스턴스를 스팟 인스턴스로 교체합니다. 사용하지 않는 인스턴스는 중지합니다."], "answers": [2]}, {"q": "한 회사가 다양한 위치에 있는 AWS IoT 센서를 기반으로 IoT 플랫폼을 운영하고 있으며, 데이터를 회사로 전송합니다. Amazon EC2 인스턴스의 Node.js API 서버는 애플리케이션 로드 밸런서 뒤에서 실행됩니다. 데이터는 4TB 범용 SSD 볼륨을 사용하는 Amazon RDS MySQL DB 인스턴스에 저장됩니다. 회사가 현장에 배치한 센서 수는 시간이 지남에 따라 증가했으며, 향후 크게 증가할 것으로 예상됩니다. API 서버는 지속적으로 과부하 상태이며, RDS 지표는 높은 쓰기 지연 시간을 나타냅니다. 다음 중 어떤 단계를 함께 적용하면 문제를 영구적으로 해결하고 새로운 센서가 프로비저닝됨에 따라 성장할 수 있으며, 동시에 플랫폼의 비용 효율성을 유지할 수 있습니까? (2개 선택)", "opts": ["볼륨의 IOPS를 개선하기 위해 MySQL 범용 SSD 스토리지의 크기를 6TB로 조정합니다.", "RDS MySQL DB 인스턴스 대신 Amazon Aurora를 사용하도록 데이터베이스 계층을 재설계하고 읽기 복제본을 추가합니다.", "Amazon Kinesis Data Streams와 AWS Lambda를 활용하여 원시 데이터를 수집하고 처리합니다.", "AWS X-Ray를 사용하여 애플리케이션 문제를 분석 및 디버깅하고 부하에 맞춰 API 서버를 추가합니다.", "RDS MySQL DB 인스턴스 대신 Amazon DynamoDB를 사용하도록 데이터베이스 계층을 재설계합니다."], "answers": [2, 4]}, {"q": "한 회사가 AWS에서 애플리케이션을 실행합니다. 이 애플리케이션은 기본 AWS 관리형 KMS 키로 암호화된 Amazon Aurora MySQL 데이터베이스를 사용합니다. 이 회사는 데이터베이스 암호화 키를 180일마다 교체하는 솔루션을 구현해야 합니다. 이 솔루션은 암호화 키가 이 표준을 준수하지 않을 경우 알림을 제공해야 합니다. 다음 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["기존 AWS 관리형 KMS 키의 교체 기간을 180일로 설정합니다. 기존 KMS 키에 대해 cmk-backing-key-rotation-enabled AWS Config 관리형 규칙을 구현합니다. 키 교체가 준수되지 않을 경우 Amazon SNS를 사용하여 보안팀에 알리도록 AWS Config를 구성합니다.", "자동 교체 기간이 180일로 설정된 새 AWS 관리형 KMS 키를 생성합니다. 데이터베이스 스냅샷을 생성합니다. 새 KMS 키를 사용하는 새 : [0]}, {"q": "VPC는 각각 퍼블릭 서브넷과 프라이빗 서브넷을 가진 세 개의 가용 영역에 걸쳐 있습니다. NAT 게이트웨이와 인터넷 게이트웨이가 하나씩 있습니다. 프라이빗 EC2 인스턴스는 인터넷에 연결되어야 합니다. 설계자는 어떻게 해야 합니까?", "opts": ["NAT 게이트웨이를 두 개 더 추가합니다(가용 영역당 하나씩). 각 프라이빗 서브넷이 해당 가용 영역의 NAT 게이트웨이를 사용하도록 구성합니다.", "NAT 게이트웨이를 두 개 더 추가하고 퍼블릭 서브넷을 구성합니다.", "가용 영역당 인터넷 게이트웨이를 추가하고 프라이빗 서브넷을 라우팅합니다.", "가용 영역당 인터넷 게이트웨이를 추가하고 퍼블릭 서브넷을 구성합니다."], "answers": [0]}, {"q": "한 회사가 AWS로 마이그레이션 중이며, 마이그레이션 규모를 적절히 조정하고 계획을 수립하기 위해 물리적 및 가상 서버, 앱, 데이터베이스 관계를 파악해야 합니다. 설계자는 어떻게 해야 합니까?", "opts": ["에이전트리스 컬렉터와 함께 마이그레이션 평가기를 사용합니다.", "디스커버리 에이전트 및 전략 권장 사항과 함께 마이그레이션 허브를 사용합니다.", "에이전트리스 컬렉터 및 마이그레이션 서비스와 함께 마이그레이션 허브를 사용합니다.", "마이그레이션 허브 가져오기 도구를 사용합니다."], "answers": [1]}, {"q": "한 회사가 보조 리전에서 애플리케이션을 복제하고 있습니다. 이 애플리케이션은 DynamoDB와 RDS for MySQL을 사용합니다. 보조 리전은 재해 발생 시 독립적으로 작동해야 합니다. 설계자는 어떻게 해야 할까요?", "opts": ["DynamoDB 글로벌 테이블과 RDS 읽기 전용 복제본을 사용합니다.", "DAX와 읽기 전용 복제본을 사용합니다.", "보조 리전에서 대기 리전과 함께 글로벌 테이블과 RDS 다중 AZ를 사용합니다.", "Streams와 Lambda를 사용하여 데이터를 복사합니다. 읽기 전용 복제본을 사용합니다."], "answers": [0]}, {"q": "한 회사에는 Amazon S3 버킷에 .csv 파일로 거래를 저장하는 판매 시스템이 있습니다. 이 S3 버킷은 S3 Intelligent-Tiering을 사용하도록 구성되어 있습니다. 대부분의 .csv 파일은 크기가 64KB에서 100KB 사이입니다. 데이터 처리 시 .csv 파일의 모든 행과 열을 읽어야 합니다. 회사는 데이터를 5년 동안 보관해야 합니다. 회사는 매일 수백만 개의 csv 파일을 저장합니다. 회사는 csv 파일의 저장 및 쿼리 비용을 최소화해야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["AWS Glue 작업을 생성하여 .csv 파일을 Apache Parquet 형식으로 변환합니다. Amazon S3를 사용하여 .csv 파일이 도착할 때마다 AWS Glue 작업을 호출합니다.", "AWS Glue 작업을 생성하여 .csv 파일을 압축합니다. AWS Glue 작업을 매시간 예약하여 이전 시간의 파일을 하나의 .csv 파일로 압축합니다.", ".csv 파일을 Apache Parquet 형식으로 변환하는 AWS Lambda 함수를 생성합니다. .csv 파일이 도착할 때마다 Amazon S3를 사용하여 Lambda 함수를 호출합니다.", ".csv 파일을 압축하는 AWS Lambda 함수를 생성합니다. .csv 파일이 도착할 때마다 Amazon S3를 사용하여 Lambda 함수를 호출합니다."], "answers": [0]}, {"q": "어떤 애플리케이션이 CloudFront, App Runner, 그리고 두 개의 S3 버킷(정적 자산용 하나, 사용자 업로드 콘텐츠용 하나)을 사용합니다. 사용자 콘텐츠는 30일 후 거의 액세스되지 않습니다. 사용자는 유럽에만 있습니다. 이 회사는 어떻게 비용을 최적화할 수 있습니까? (두개 선택)", "opts": ["30일 후 S3 객체를 만료시킵니다.", "30일 후 S3 콘텐츠를 Glacier Deep Archive로 전환합니다.", "App Runner와 함께 스팟 인스턴스를 사용합니다.", "Aurora 읽기 전용 복제본에 자동 크기 조정을 추가합니다.", "CloudFront 가격 등급 200(유럽 및 미국만 해당)을 사용합니다."], "answers": [1, 4]}, {"q": "한 회사가 규정 준수를 위해 일부 Oracle 데이터베이스를 AWS로 마이그레이션하고 다른 데이터베이스는 온프레미스에 유지해야 합니다. 온프레미스 데이터베이스에는 공간 데이터가 포함되어 있으며 Cron 작업이 실행됩니다. 솔루션은 AWS에서 온프레미스 데이터를 외래 테이블로 쿼리할 수 있어야 합니다.", "opts": ["DynamoDB, SCT, Lambda를 사용합니다. 공간 데이터를 S3로 이동하고 Athena를 사용하여 쿼리합니다.", "Oracle 액세스에는 SQL Server용 RDS와 AWS Glue 크롤러를 사용합니다.", "Application Migration Service와 함께 EC2 호스팅 Oracle을 사용합니다. Cron 액세스에는 Step Functions를 사용합니다.", "DMS 및 SCT와 함께 RDS for PostgreSQL을 사용합니다. PostgreSQL 외래 데이터 래퍼를 사용합니다. Direct Connect를 통해 연결합니다."], "answers": [3]}, {"q": "한 회사가 Amazon S3에 정적 웹사이트를 저장합니다. AWS Lambda 함수는 S3 버킷에서 콘텐츠를 검색하여 웹사이트로 제공합니다. Application Load Balancer(ALB)는 수신 트래픽을 Lambda 함수로 전달합니다. Amazon CloudFront 배포는 요청을 ALB로 라우팅합니다. 이 회사는 ALB의 HTTPS 리스너에 AWS Certificate Manager(ACM) 인증서를 설정했습니다. 회사는 모든 사용자가 HTTPS를 통해 웹사이트와 통신하도록 요구합니다. HTTP 사용자는 오류를 수신해서는 안 됩니다. 다음 요구 사항을 충족하는 단계 조합은 무엇입니까? (3개 선택)", "opts": ["백엔드 시스템으로의 패스스루를 위해 포트 443에서 TCP 리스너를 사용하여 ALB를 구성합니다.", "aws:SecureTransport 요청이 false인 경우 S3 버킷에 대한 액세스를 거부하는 S3 버킷 정책을 생성합니다.", "S3 버킷에서 HTTP-HTTPS 리디렉션을 구성합니다.", "CloudFront에 대해 오리진 프로토콜 정책을 HTTPS 전용으로 설정합니다.", "CloudFront의 뷰어 프로토콜 정책을 HTTPS 전용으로 설정합니다.", "CloudFront의 뷰어 프로토콜 정책을 HTTP를 HTTPS로 리디렉션으로 설정합니다."], "answers": [3, 4, 5]}, {"q": "한 회사에서 매니페스트 파일이 포함된 컨테이너화된 Kubernetes 앱을 AWS로 마이그레이션하고 있습니다. 가장 쉬운 마이그레이션 경로는 무엇입니까?", "opts": ["App Runner + 오픈소스 저장소", "관리형 노드 그룹과 Aurora가 있는 Amazon EKS", "EC2 기반 ECS + 작업 정의", "EC2에서 Kubernetes 클러스터를 수동으로 재구축"], "answers": [1]}, {"q": "한 회사의 인벤토리 애플리케이션은 단일 AWS 리전의 Amazon Aurora PostgreSQL DB 클러스터에 데이터를 저장합니다. 이 회사는 데이터베이스 인프라를 보조 리전으로 확장하여 복원력을 향상시키고자 합니다. 회사는 15분의 RTO와 5분의 RPO를 원합니다. 이 솔루션은 애플리케이션이 기본 리전에서 작동 중일 때 보조 리전에서 Aurora DB 인스턴스를 실행해서는 안 됩니다. 다음 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["기본 리전의 Aurora DB 클러스터를 보조 리전으로 복사하도록 AWS DMS를 구성합니다. AWS DMS를 사용하여 기본 DB 클러스터를 보조 DB 클러스터와 동기화합니다.", "보조 리전에 새 Aurora PostgreSQL DB 클러스터를 생성합니다. AWS Backup을 사용하여 기본 DB 클러스터를 보조 DB 클러스터와 동기화합니다.", "기본 리전의 DB 클러스터와 동일한 글로벌 DB 클러스터에 속하는 헤드리스 Aurora DB 클러스터를 보조 리전에 생성합니다.", "DB 클러스터를 백업하고 5분마다 보조 리전에 DB 클러스터를 복사하는 AWS Backup 작업을 생성합니다."], "answers": [2]}, {"q": "한 회사의 웹 애플리케이션은 Amazon API Gateway API, AWS Lambda 함수, Amazon DynamoDB 전역 테이블을 사용하여 백엔드 요청을 처리합니다. 이 웹 애플리케이션은 액티브-패시브 모델로 두 개의 AWS 리전에 배포됩니다. 회사는 DNS를 위해 Amazon Route 53을 사용합니다. 웹 애플리케이션은 보조 리전으로 장애 조치하기 위해 수동 DNS 업데이트가 필요합니다. 분석 Lambda 함수는 동일한 AWS 계정에서 실행됩니다. 이 함수로 인해 Lambda 동시성이 평균적으로 현재 할당량의 90%에 도달했습니다. 최근 분석 워크로드 트래픽이 급증하여 Lambda 요청이 제한되고 웹 애플리케이션 사용자에게 열악한 사용자 환경이 발생했습니다. 솔루션 아키텍트는 웹 애플리케이션의 안정성을 향상해야 합니다. 솔루션은 Lambda 동시성이 특정 사용률 임계값에 도달하면 Amazon CloudWatch 알람을 사용하여 Amazon SNS 알림을 전송해야 합니다. 운영 오버헤드를 최소화하면서 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["웹 애플리케이션 Lambda 함수에 예약된 동시성을 설정합니다. Route 53 상태 확인 및 장애 조치 레코드를 구현하여 트래픽을 보조 리전으로 라우팅합니다. AWS Trusted Advisor ServiceLimitUsage 지표를 사용하고 SNS 알림을 전송하도록 CloudWatch 알람을 구성합니다.", "웹 애플리케이션 Lambda 함수에서 예약된 동시성을 설정합니다. Route 53 상태 확인 및 지연 시간 레코드를 구현하여 트래픽을 보조 리전으로 라우팅합니다. AWS Trusted Advisor ServiceLimitUsage 지표를 사용하고 SNS 알림을 전송하도록 CloudWatch 알람을 구성합니다.", "웹 애플리케이션 Lambda 함수에서 프로비저닝된 동시성을 설정합니다. Route 53 상태 확인 및 장애 조치 레코드를 구현하여 트래픽을 보조 리전으로 라우팅합니다. Lambda ConcurrentExecutions 지표를 사용하고 SNS 알림을 전송하도록 CloudWatch 알람을 구성합니다.", "웹 애플리케이션 Lambda 함수에서 프로비저닝된 동시성을 설정합니다. Route 53 상태 확인 및 지리적 위치 레코드를 구현하여 트래픽을 보조 리전으로 라우팅합니다. Lambda ProvisionedConcurrencyInvocations 지표를 사용하고 SNS 알림을 전송하도록 CloudWatch 알람을 구성합니다."], "answers": [2]}, {"q": "한 회사에 온프레미스 Oracle 데이터베이스를 사용하는 애플리케이션이 있습니다. 이 회사는 데이터베이스를 AWS 클라우드로 마이그레이션하고 있습니다. 데이터베이스에는 고객 데이터와 저장 프로시저가 포함되어 있습니다. 회사는 최소한의 다운타임으로 최대한 빨리 데이터베이스를 마이그레이션해야 합니다. AWS 솔루션은 고가용성을 제공해야 하며 데이터베이스에 대해 관리형 서비스를 사용해야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["AWS DMS를 사용하여 온프레미스 Oracle 데이터베이스의 데이터를 새로운 Amazon RDS for Oracle 데이터베이스로 복제합니다. 데이터베이스 파일을 Amazon S3 버킷으로 전송합니다. S3 버킷을 데이터베이스 저장소로 사용하도록 RDS 데이터베이스를 구성합니다. 고가용성을 위해 S3 복제를 설정합니다. 애플리케이션을 RDS DB 인스턴스로 리디렉션합니다.", "온프레미스 Oracle 데이터베이스의 데이터베이스 백업을 생성합니다. 백업을 Amazon S3 버킷에 업로드합니다. 새로운 트랜잭션이 발생하지 않도록 온프레미스 Oracle 데이터베이스를 종료합니다. 두 가용 영역에 걸쳐 있는 Amazon EC2 인스턴스로 구성된 새로운 Oracle 클러스터에 백업을 복원합니다. 애플리케이션을 EC2 인스턴스로 리디렉션합니다.", "AWS DMS를 사용하여 온프레미스 Oracle 데이터베이스의 데이터를 새로운 Amazon DynamoDB 테이블로 복제합니다. DynamoDB Accelerator(DAX)를 사용하고 고가용성을 위해 전역 테이블을 구현합니다. AWS Lambda에서 저장 프로시저를 다시 작성합니다. DAX에서 저장 프로시저를 실행합니다. 복제 후 애플리케이션을 DAX 클러스터 엔드포인트로 리디렉션합니다.", "AWS DMS를 사용하여 온프레미스 Oracle 데이터베이스의 데이터를 새로운 Amazon Aurora PostgreSQL 데이터베이스로 복제합니다. AWS SCT를 사용하여 스키마와 저장 프로시저를 변환합니다. 애플리케이션을 Aurora DB 클러스터로 리디렉션합니다."], "answers": [3]}, {"q": "한 회사에 데이터 과학 교육을 위한 온라인 학습 플랫폼이 있습니다. 이 플랫폼은 AWS 클라우드를 사용하여 학생들에게 온디맨드 랩 환경을 제공합니다. 각 학생은 단기간 전용 AWS 계정을 받습니다. 학생들은 단일 Amazon SageMaker 머신 러닝 학습 작업을 실행하고 추론 엔드포인트를 배포하기 위해 ml.p2.xlarge 인스턴스에 액세스해야 합니다. 계정 프로비저닝은 자동화되어 있습니다. 계정은 모든 기능이 활성화된 AWS Organizations의 조직 구성원입니다. 계정은 apsoutheast-2 리전에서 프로비저닝되어야 합니다. 기본 리소스 사용 할당량은 계정에 충분하지 않습니다. 솔루션 아키텍트는 자동 할당량 증가를 포함하도록 계정 프로비저닝 프로세스를 개선해야 합니다. 다음 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["조직의 관리 계정에서 us-east-1 리전에 할당량 요청 템플릿을 생성합니다. 템플릿 연결을 활성화합니다. ml.p2.xlarge 학습 작업 사용을 위해 apsoutheast-2에 SageMaker 할당량을 추가합니다. 원하는 할당량을 1로 설정합니다. ml.p2.xlarge 엔드포인트 사용량을 위해 ap-southeast-2에 SageMaker 할당량을 추가합니다. 원하는 할당량을 1로 설정합니다.", "조직의 관리 계정에서 us-east-1 리전에 할당량 요청 템플릿을 생성합니다. 템플릿 연결을 활성화합니다. ml.p2.xlarge 학습 웜 풀 사용량을 위해 apsoutheast-2에 SageMaker 할당량을 추가합니다. 원하는 할당량을 2로 설정합니다.", "조직의 관리 계정에서 ap-southeast-2에 할당량 요청 템플릿을 생성합니다. 템플릿 연결을 활성화합니다. ml.p2.xlarge 학습 작업 사용량을 위해 us-east-1 리전에 SageMaker 할당량을 추가합니다. 원하는 할당량을 1로 설정합니다. ml.p2.xlarge 엔드포인트 사용량을 위해 us-east-1에 SageMaker 할당량을 추가합니다. 원하는 할당량을 1로 설정합니다.", "조직의 관리 계정에서 ap-southeast-2에 할당량 요청 템플릿을 생성합니다. 템플릿 연결을 활성화합니다. ml.p2.xlarge 학습 웜 풀 사용을 위해 us-east-1 리전에 SageMaker 할당량을 추가합니다. 원하는 할당량을 2로 설정합니다."], "answers": [0]}, {"q": "한 회사가 데이터 과학자 접근을 위해 IAM Identity Center를 사용합니다. 각 사용자는 S3 버킷에 있는 자신의 데이터에만 접근할 수 있어야 합니다. 또한 회사는 사용자별로 월별 접근 보고서를 생성해야 합니다. 다음 요구 사항을 충족하는 솔루션은 무엇입니까? (두 가지 선택)", "opts": ["IAM Identity Center 권한 집합을 사용하여 `userName` 태그로 범위가 지정된 S3 접근을 허용합니다.", "모든 사용자와 버킷 정책에 대해 공유 IAM Identity Center 역할을 사용합니다.", "AWS CloudTrail을 사용하여 S3 데이터 이벤트를 로깅하고 Athena를 통해 쿼리합니다.", "CloudTrail 관리 이벤트를 CloudWatch로 전송한 다음 Athena를 사용합니다.", "보고를 위해 S3 액세스 로그와 S3 Select를 사용합니다."], "answers": [0, 2]}, {"q": "한 회사가 AWS Organizations의 한 조직에 20개의 계정을 가지고 있습니다. 각 계정은 개발 및 프로덕션의 두 OU에 속해 있습니다. 여러 팀이 개발 계정을 사용하고 있습니다. 이 회사는 개발 계정과 관련된 비용을 관리하려고 합니다. 모든 개발 계정의 예상 월별 비용이 임계값을 초과할 때 알림을 제공하는 솔루션이 필요합니다. 솔루션 아키텍트는 Amazon SNS 주제를 생성하고 해당 주제에 이메일 주소를 구독합니다. 솔루션 아키텍트는 최소한의 구성 작업으로 알림 요구 사항을 충족하기 위해 다음으로 무엇을 해야 합니까?", "opts": ["조직의 관리 계정에서 Amazon CloudWatch 결제 알림을 활성화합니다. 각 개발 계정에 대한 EstimatedCharges 지표를 연결된 계정으로 구성하여 CloudWatch 결제 경보를 생성합니다. EstimatedCharges 지표 값이 임계값을 초과할 때 이메일 알림을 받도록 SNS 주제를 구성합니다.", "조직의 관리 계정에서 AWS 비용 및 사용 보고서를 생성합니다. Amazon S3 버킷으로 보고서 전송을 구성합니다. 보고서 데이터를 Amazon Athena로 추출하도록 AWS Glue 작업을 구성합니다. 모든 개발 계정의 통합 비용을 분석하도록 AWS Step Functions를 구성합니다. 비용이 임계값을 초과할 경우 이메일 알림을 위한 SNS 주제를 구성합니다.", "AWS Budgets를 사용하여 조직의 관리 계정에 비용 예산을 생성합니다. 각 개발 계정을 연결된 계정으로 구성합니다. 알림 임계값을 구성합니다. 이메일 알림을 위한 SNS 주제를 구성합니다.", "조직의 관리 계정에서 AWS Cost Explorer를 활성화합니다. 각 개발 계정을 연결된 계정으로 구성합니다. 알림 임계값을 구성합니다. 이메일 알림을 위한 SNS 주제를 구성합니다."], "answers": [2]}, {"q": "한 회사에서 모든 기능이 활성화된 AWS Organizations를 사용하여 계정을 관리합니다. 이 회사는 eu-west-2 리전의 여러 Amazon EFS 마운트 지점에서 4시간마다 AWS Backup을 실행하도록 구성했습니다. 백업은 기본 저장소에 저장됩니다. 이 회사에는 eu-west-1 리전과 특정 복구 계정으로 복원하는 재해 복구(DR) 계획이 필요합니다. 백업은 항상 암호화되어야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["AWS Resource Access Manager(AWS RAM)가 백업 저장소를 복구 계정과 공유하도록 구성합니다. 복구 계정에 새 백업 저장소를 생성합니다. AWS 관리형 KMS 키를 사용하여 데이터를 암호화합니다. 복구 계정에서 복사 작업을 예약하여 백업 저장소를 새 저장소로 복사합니다.", "원본 계정에 새 백업 저장소를 생성하고 복구 계정에 새 백업 저장소를 생성합니다. 다중 리전 고객 관리형 KMS 키를 사용하여 데이터를 암호화합니다. 백업을 새 백업 저장소로 리디렉션합니다. 복구 계정에서 키에 액세스할 수 있도록 키 정책 문을 구성합니다. 복구 계정에 대한 교차 계정 백업 계획을 예약합니다.", "Amazon S3 버킷을 생성합니다. S3 버킷 데이터를 암호화하기 위해 새로운 다중 리전 고객 관리형 KMS 키를 생성합니다. 백업 볼트에서 데이터를 S3 버킷으로 복사하는 복사 작업을 예약합니다. 복구 계정에 대한 S3 버킷에 대한 교차 계정 액세스를 하여 로드를 분산합니다.", "Lambda 함수의 새 배포 버전마다 버전을 생성합니다. AWS CLI update-functionconfiguration 명령에 routing-config 매개변수를 사용하여 로드를 분산합니다.", "AWS CodeDeploy를 구성하고 배포 구성에서 codeDeployDefault.OneAtATime을 사용하여 로드를 분산합니다."], "answers": [0]}, {"q": "한 회사가 AWS CloudFormation 템플릿을 사용하여 Amazon ECS 서비스를 프로덕션 환경에 배포합니다. 이 템플릿에는 CloudFormation 스택 이름과 공통 접두사를 사용하여 이름이 지정된 Amazon S3 버킷이 포함되어 있습니다. 이 회사는 동일한 템플릿을 사용하여 개발 및 지속적 통합을 위한 임시 환경을 생성합니다. 개발자는 환경을 성공적으로 생성할 수 있지만, 환경을 삭제하려고 하면 CloudFormation에서 오류가 발생합니다. 개발자는 개발 및 테스트 프로세스의 일부로 동일한 이름의 스택을 삭제하고 다시 생성해야 하는 경우가 많습니다. 솔루션 아키텍트는 이 문제를 해결하기 위해 어떤 단계 조합을 수행해야 합니까? (두 가지 선택)", "opts": ["특정 S3 버킷에 있는 모든 키를 삭제하는 CloudFormation 사용자 지정 리소스에 AWS Lambda 함수를 연결합니다. 이 사용자 지정 리소스를 애플리케이션의 CloudFormation 템플릿의 일부로 구현합니다.", "CloudFormation 템플릿에서 S3 버킷 리소스를 수정하여 DeletionPolicy 속성을 Delete로 지정합니다. CloudFormation 삭제 작업을 처리하기 위해 CAPABILITY_DELETE_NONEMPTY 기능을 지정합니다.", "CloudFormation 템플릿에서 S3 버킷 리소스의 DeletionPolicy 속성을 Retain으로 지정하여 수정합니다. CloudFormation 스택에서 더 이상 소유하지 않는 버킷을 식별하고, 비우고, 삭제하도록 24시간마다 실행되는 AWS Config 사용자 지정 규칙을 구성합니다.", "CloudFormation 작업이 버킷의 모든 객체에 대해 s3:DeleteObject 권한을 가진 역할에 의해 호출되는지 확인합니다.", "CloudFormation 템플릿에서 S3 버킷 리소스를 수정하여 버킷의 모든 객체에 대해 s3:DeleteObject 권한을 부여하는 버킷 정책을 구성합니다."], "answers": [0, 3]}, {"q": "한 회사가 비즈니스에 필수적인 다계층 애플리케이션을 AWS로 이전하고 있습니다. 아키텍처는 데스크톱 클라이언트 애플리케이션과 서버 인프라로 구성됩니다. 서버 인프라는 온프레미스 데이터 센터에 있으며, 해당 데이터 센터는 애플리케이션 가동 시간 SLA 99.95%를 유지하는 데 자주 실패합니다. 솔루션 아키텍트는 애플리케이션이 SLA를 충족하거나 초과할 수 있도록 재설계해야 합니다. 이 애플리케이션은 단일 가상 머신에서 실행되는 PostgreSQL 데이터베이스를 포함합니다. 비즈니스 로직 및 프레젠테이션 계층은 여러 가상 머신 간에 로드 밸런싱됩니다. 원격 사용자는 지연 시간에 민감한 이 애플리케이션을 사용할 때 로딩 속도가 느리다고 불평합니다. 다음 중 애플리케이션을 거의 변경하지 않고 가용성 요구 사항을 충족하면서 사용자 경험을 개선하고 비용을 최소화하는 방법은 무엇입니까?", "opts": ["데이터베이스를 Amazon EC2의 PostgreSQL 데이터베이스로 마이그레이션합니다. 애플리케이션 및 프레젠테이션 계층을 애플리케이션 로드 밸런서 뒤에 있는 자동 확장되는 Amazon ECS 컨테이너에서 호스팅합니다. 사용자 경험을 개선하기 위해 각 최종 사용자에게 Amazon WorkSpaces 워크스페이스를 할당합니다.", "데이터베이스를 Amazon RDS Aurora PostgreSQL 구성으로 마이그레이션합니다. 애플리케이션 및 프레젠테이션 계층을 Application Load Balancer 뒤에 있는 Amazon EC2 인스턴스의 자동 확장 구성으로 호스팅합니다. Amazon AppStream 2.0을 사용하여 사용자 경험을 개선합니다.", "데이터베이스를 Amazon RDS PostgreSQL 다중 가용 영역 구성으로 마이그레이션합니다. 애플리케이션 및 프레젠테이션 계층을 네트워크 로드 밸런서 뒤에 있는 자동 확장되는 AWS Fargate 컨테이너에 호스팅합니다. Amazon ElastiCache를 사용하여 사용자 경험을 개선합니다.", "데이터베이스를 최소 두 개의 노드가 있는 Amazon Redshift 클러스터로 마이그레이션합니다. 애플리케이션 및 프레젠테이션 계층을 결합하여 Application Load Balancer 뒤에 있는 자동 확장되는 Amazon ECS 컨테이너에 호스팅합니다. Amazon CloudFront를 사용하여 사용자 경험을 개선합니다."], "answers": [1]}, {"q": "한 회사가 6개월 전에 온프레미스 VM에서 AWS 계정의 Amazon EC2 인스턴스로 애플리케이션을 마이그레이션했습니다. 이제 이 회사는 해당 애플리케이션을 두 번째 AWS 리전에 배포해야 합니다. 향후 2년 동안 애플리케이션의 일부를 AWS Lambda 함수를 사용하도록 재설계할 예정입니다. 회사는 향후 3년 동안 애플리케이션 사용 패턴이 안정적일 것으로 예상합니다. 어떤 전략이 회사의 비용 절감을 극대화할까요?", "opts": ["AWS Cost Management에서 매년 절약 플랜 권장 사항을 평가하고, 권장 사항에 따라 1년 컴퓨팅 절약 플랜을 구매합니다.", "AWS Compute Optimizer를 사용하여 절약 플랜 권장 사항을 평가하고, 권장 사항에 따라 3년 EC2 인스턴스 절약 플랜을 구매합니다. Compute Optimizer를 사용하여 권장 사항에 따라 Lambda 함수를 조정합니다.", "선불금이 없는 1년 EC2 인스턴스 절약 플랜을 구매하고, 매년 인프라를 검토합니다. 애플리케이션의 일부가 Lambda 함수로 전환됨에 따라 향후 EC2 인스턴스 절약 플랜의 시간당 약정 금액을 줄입니다.", "선불금 없이 3년 EC2 인스턴스 절약 플랜을 구매합니다. 애플리케이션의 일부가 Lambda 함수로 전환됨에 따라 EC2 인스턴스 절약 플랜의 시간당 약정 금액을 줄입니다."], "answers": [0]}, {"q": "한 회사가 Amazon Redshift 클러스터를 사용하여 다양한 소스에서 데이터를 수집합니다. 수집된 데이터는 분석 및 보고를 위해 다른 내부 애플리케이션과 공유됩니다. 클러스터는 8개의 ra3.4xlarge 노드로 구성되어 있습니다. 데이터 수집은 매일 자정부터 오전 8시까지 3시간 동안 진행됩니다. 클러스터의 평균 CPU 사용률은 데이터 수집 시간 동안 85%입니다. 클러스터는 온디맨드 노드 요금제를 사용하며, 8시간의 데이터 수집 시간 외에는 일시 중지됩니다. 클러스터에는 스냅샷 기능이 활성화되어 있습니다. 이 회사는 비용 절감을 위해 이 워크로드를 최적화하고자 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["기존 클러스터의 최신 스냅샷을 사용하여 동시성 확장 모드로 8개의 ra3.4xlarge 노드로 구성된 새 Redshift 클러스터를 생성합니다. 내부 애플리케이션이 새 Redshift 클러스터에서 데이터를 가져오도록 수정합니다. 기존 Redshift 클러스터를 종료합니다. 1년 선불 Redshift 예약 노드 8개를 구매합니다.", "기존 클러스터의 최신 스냅샷을 사용하여 ra3.16xlarge 노드 6개로 구성된 새 Redshift 클러스터를 생성합니다. 자동 스케일링을 활성화합니다. 내부 애플리케이션을 수정하여 새 Redshift 클러스터에서 데이터를 가져오도록 합니다. 기존 Redshift 클러스터를 종료합니다.", "기존 Redshift 클러스터의 최신 스냅샷을 사용하여 Redshift 처리 장치(RPU) 64개로 구성된 새 Redshift 서버리스 엔드포인트를 생성합니다. 내부 애플리케이션을 업데이트하여 새 Redshift 서버리스 엔드포인트에서 데이터를 가져오도록 합니다. 기존 Redshift 클러스터를 삭제합니다.", "기존 Redshift 클러스터에 Redshift Spectrum을 구성합니다. Redshift Spectrum이 Amazon S3에 액세스할 수 있도록 IAM 권한을 설정합니다. 기존 클러스터의 데이터를 S3 버킷으로 언로드합니다. 내부 애플리케이션을 업데이트하여 S3 데이터를 쿼리하도록 합니다."], "answers": [2]}, {"q": "한 회사가 AWS Cloud Formation을 사용하여 인프라를 배포하고 있습니다. 이 회사는 프로덕션 Cloud Formation 스택을 삭제할 경우 Amazon RDS 데이터베이스 또는 Amazon EBS 볼륨에 저장된 데이터가 삭제될 수 있다는 점을 우려하고 있습니다. 이러한 방식으로 사용자가 실수로 데이터를 삭제하는 것을 방지하려면 어떻게 해야 할까요?", "opts": ["Cloud Formation 템플릿을 수정하여 RDS 리소스 및 EBS 리소스에 삭제 정책이 유지(Retain)인 DeletionPolicy 속성을 추가합니다.", "RDS 리소스 및 EBS 리소스의 삭제를 허용하지 않는 스택 정책을 구성합니다.", "aws:cloudformation:stack-name 태그가 지정된 RDS 리소스 및 EBS 리소스의 삭제를 거부하도록 IAM 정책을 수정합니다.", "AWS Config 규칙을 사용하여 RDS 리소스 및 EBS 리소스의 삭제를 방지합니다."], "answers": [0]}, {"q": "한 회사가 AWS Organizations의 조직에 계정을 보유하고 있습니다. 해당 조직은 모든 ​​기능을 활성화했습니다. 회사는 중앙 AWS 계정(계정 A)의 AWS Secrets Manager에 비밀 정보를 저장합니다. 이 비밀 정보에는 조직 외부 계정(계정 B)의 IAM 역할에 읽기 전용 액세스를 허용하는 리소스 정책이 설정되어 있습니다. 조직 내 계정의 일부 권한 있는 사용자는 IAM 역할을 사용하여 비밀 정보에 액세스할 수 있습니다. 보안 사고로 인해 회사는 계정 A에 저장된 비밀 정보에 대한 모든 액세스 권한을 취소해야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["모든 리소스에 대해 secretsmanager:GetSecretValue 작업을 명시적으로 거부하는 SCP(보안 조치 프로토콜)를 생성합니다. 해당 SCP를 계정 A에 연결합니다.", "계정 A에 저장된 비밀 정보의 리소스 정책을 수정하여 모든 보안 주체에 대해 secretsmanagenGetSecretValue 작업을 명시적으로 거부합니다.", "계정 A에 Secrets Manager용 VPC 엔드포인트를 배포합니다. VPC 엔드포인트 정책을 업데이트하여 모든 보안 주체에 대해 secretsmanagenGetSecretValue 작업을 명시적으로 거부합니다.", "계정 B의 IAM 역할 인라인 정책을 수정하여 계정 A의 모든 시크릿에 대해 secretsmanager:GetSecretValue 작업을 명시적으로 거부합니다."], "answers": [1]}, {"q": "한 회사가 사용자 관리를 위해 Microsoft Active Directory를 사용하고, ID 공급자(IdP)로 Microsoft Enterprise ID를 사용합니다. 이 회사는 AWS Organizations의 조직을 사용하여 여러 AWS 계정을 관리합니다. 회사는 IdP와 통합된 AWS IAM Identity Center 인스턴스를 구축하고 필요한 사용자 그룹을 생성합니다. 여러 부서와 애플리케이션에서 Amazon S3를 사용하고 있으며, S3 버킷 정책을 사용하여 권한을 관리합니다. 회사가 생성하는 세분화된 권한으로 인해 정책 크기가 너무 커져 S3 버킷 정책 길이 할당량을 초과하는 문제가 발생합니다. 회사는 회사 ID에 대한 세분화된 S3 버킷 권한 관리 프로세스를 간소화해야 합니다. 다음 중 운영 오버헤드가 가장 적은 솔루션은 무엇입니까?", "opts": ["S3 액세스 권한을 생성합니다. S3 액세스 권한을 IAM Identity Center 인스턴스와 연결합니다. 비즈니스 요구 사항에 따라 적절한 S3 버킷을 지정하여 사용자 그룹에 대한 S3 액세스 권한을 생성합니다. Amazon S3 API를 사용하여 사용자 그룹에 필요한 S3 버킷에 액세스할 수 있는 임시 자격 증명을 부여합니다.", "각 S3 버킷에 대해 S3 액세스 포인트를 생성합니다. 사용자 권한에 따라 Amazon S3에서 데이터를 쿼리하는 AWS Lambda 함수를 생성합니다. S3 액세스 포인트에 대한 Object Lambda 액세스 포인트를 생성합니다. Lambda 함수를 Object Lambda 액세스 포인트와 연결합니다.", "각 S3 버킷에 대해 S3 액세스 포인트를 생성합니다. S3 액세스 포인트 설정에서 공용 액세스를 차단합니다. 사용자 요구 사항에 따라 액세스 정책을 생성합니다. 액세스 정책을 S3 액세스 포인트에 연결합니다. S3 액세스 포인트를 사용하여 S3 버킷에 액세스합니다.", "조직에서 사용자를 적절한 OU로 그룹화합니다. 비즈니스 요구 사항에 따라 특정 S3 버킷에 대한 액세스 권한을 부여하는 SCP를 생성합니다. SCP를 적절한 OU에 연결합니다. IAM Identity Center에서 권한 집합을 사용하여 S3 버킷에 대한 액세스 권한을 부여합니다."], "answers": [0]}, {"q": "한 글로벌 기업이 컴퓨팅을 위해 Amazon EC2에서 분석 애플리케이션을 실행하고 있습니다. 이 회사는 원시 데이터와 처리된 데이터를 저장하는 기본 스토리지로 Amazon EBS를 사용합니다. 사용자는 온프레미스 스토리지 컴퓨터에서 SSH를 이용하여 매일 수동으로 원시 데이터를 Amazon EC2에 업로드합니다. 분석 애플리케이션은 데이터를 처리하고, 사용자는 처리된 데이터를 장기 저장을 위해 수동으로 Amazon S3에 업로드합니다. 이 회사는 처리 로직을 컨테이너화하고 Amazon EKS로 마이그레이션하려고 합니다. 처리된 데이터를 업로드하고 이동하는 자동화된 솔루션이 필요하며, 이 솔루션은 멀티 프로토콜을 지원하고 EKS 클러스터에서 바로 사용할 수 있어야 합니다. 이러한 요구 사항을 충족하면서 운영 노력이 가장 적은 솔루션은 무엇입니까?", "opts": ["AWS DataSync를 사용하여 원시 데이터를 Amazon EFS로 복사합니다. Amazon EFS를 Amazon EKS에 볼륨으로 마운트합니다. AWS Transfer for SFTP를 사용하여 처리된 데이터를 Amazon EFS에서 Amazon S3로 복사합니다.", "AWS DataSync를 사용하여 원시 데이터를 Amazon FSx for Lustre로 복사합니다. FSx for Lustre를 Amazon EKS에 볼륨으로 마운트합니다. DataSync를 사용하여 Lustre용 FSx에서 Amazon S3로 처리된 데이터를 복사합니다.", "AWS DataSync를 사용하여 원시 데이터를 NetApp ONTAP용 Amazon FSx로 복사합니다. NetApp ONTAP용 FSx를 Amazon EKS에 볼륨으로 마운트합니다. DataSync를 사용하여 NetApp ONTAP용 FSx에서 Amazon S3로 처리된 데이터를 복사합니다.", "AWS DataSync를 사용하여 원시 데이터를 NetApp ONTAP용 Amazon FSx로 복사합니다. NetApp ONTAP용 FSx를 Amazon EKS에 볼륨으로 마운트합니다. AWS Transfer for SFTP를 사용하여 NetApp ONTAP용 FSx에서 Amazon S3로 처리된 데이터를 복사합니다."], "answers": [2]}, {"q": "한 회사가 Amazon Managed Streaming for Apache Kafka(Amazon MSK) 클러스터에서 메시지를 소비하는 지연 시간에 민감한 애플리케이션을 운영하고 있습니다. MSK 클러스터는 세 개의 가용 영역에 걸쳐 실행됩니다. 현재 MSK 클러스터는 각 가용 영역에 두 개의 표준 대형 인스턴스를 사용하는 표준 브로커를 사용합니다. 이 회사는 브로커와 동일한 가용 영역에 배포된 Apache Kafka 클라이언트 간의 지연 시간을 최소화하고자 합니다. 또한 가용 대역폭을 늘리고 클러스터의 확장 속도를 향상시키고자 합니다. 클라이언트는 현재 기본 설정을 사용하고 있습니다. 솔루션을 구현하는 동안 일정 시간 동안 다운타임이 허용됩니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["예측 확장 정책을 구성하고 MSK 클러스터를 대상으로 설정합니다. 대상 값을 80으로 설정하고 스케줄링 버퍼 크기를 0으로 설정합니다. Kafka 클라이언트에 대한 배치 그룹을 구성하고 MSK 호스트를 배치 그룹과 연결합니다.", "MSK 클러스터에 Cruise Control을 구성하고 대역폭 제어 및 재조정을 활성화합니다. 지연 시간 기반 라우팅을 사용하는 Amazon MSK Connect 프록시 계층을 배포합니다. Kafka 클라이언트가 프록시 엔드포인트를 사용하도록 재구성합니다.", "표준 브로커를 Express Large 인스턴스를 사용하는 Express 브로커로 교체합니다. Kafka 클라이언트의 client.rack 속성을 az_id로 설정합니다.", "브로커 크기를 표준 XLarge 인스턴스로 조정합니다. 각 가용 영역에 MSK PrivateLink 엔드포인트를 생성합니다. 각 Kafka 클라이언트가 클라이언트와 동일한 가용 영역에 있는 엔드포인트를 사용하도록 재구성합니다."], "answers": [2]}, {"q": "한 회사가 여러 개의 AWS 계정을 보유하고 있으며 AWS Organizations를 사용하여 이러한 계정을 관리합니다. 개발자에게 AWS 리소스에 액세스하기 위한 IAM 사용자 자격 증명이 제공되었습니다. 개발자는 계정의 모든 Amazon S3 버킷에 대해 읽기 전용 액세스 권한이 있어야 합니다. 그러나 개발자가 콘솔에서 S3 버킷에 액세스하려고 하면 버킷 목록 없이 액세스 거부 오류 메시지가 표시됩니다. 솔루션 아키텍트는 권한을 검토한 결과 개발자의 IAM 사용자가 계정의 모든 S3 버킷에 대해 읽기 전용 액세스 권한만 가지고 있는 것을 확인했습니다. 솔루션 아키텍트는 이 문제를 해결하기 위해 어떤 추가 조치를 취해야 합니까? (두 가지 선택)", "opts": ["모든 S3 버킷의 버킷 정책을 확인합니다.", "모든 S3 버킷의 ACL을 확인합니다.", "조직 단위(OU)에 설정된 SCP를 확인합니다.", "IAM 사용자에게 설정된 권한 경계를 확인합니다.", "IAM 사용자에게 적절한 IAM 역할이 연결되어 있는지 확인합니다."], "answers": [2, 3]}, {"q": "한 회사가 Amazon ECS에서 Application Load Balancer(ALB)를 사용하여 전자상거래 웹사이트를 운영하고 있습니다. 컨테이너 이미지는 Amazon ECR에 저장되어 있습니다. 웹사이트 데이터는 Amazon Aurora MySQL DB 클러스터에 저장됩니다. ALB는 AWS Certificate Manager(ACM)에 저장된 공개 SSL 인증서를 사용하는 HTTPS 리스너를 사용합니다. 웹사이트 도메인은 Amazon Route 53에 등록되어 있습니다. 이 회사는 이 설정을 두 번째 AWS 리전에 액티브-액티브 구성으로 복제하려고 합니다. 웹사이트는 리전 간 데이터 복제에 따른 약간의 지연 시간을 허용할 수 있습니다. 회사는 이미 두 번째 리전에 ALB가 있는 ECS 클러스터를 배포했습니다. ECS 클러스터는 Route 53에 지리적 위치 기반 라우팅을 위해 등록되어 있습니다. 다음 중 운영 오버헤드가 가장 적은 단계 조합은 무엇입니까? (세 가지 선택)", "opts": ["두 번째 리전의 회사 웹사이트에 대한 새 ACM 인증서를 요청합니다. 두 번째 리전의 ALB를 HTTPS 리스너로 구성합니다. 새 ACM 인증서를 기본 인증서로 설정합니다.", "AWS Resource Access Manager(AWS RAM)를 사용하여 ACM 인증서를 두 번째 리전과 공유합니다. 보조 리전의 ALB를 HTTPS 리스너로 구성합니다. 공유 ACM 인증서를 기본 인증서로 설정합니다.", "보조 리전에 Amazon ECR용 VPC 엔드포인트를 생성합니다. Amazon EC2 인스턴스가 기본 리전에서 컨테이너 이미지를 다운로드하도록 구성합니다.", "ECR 리포지토리의 보조 리전으로의 리전 간 복제를 활성화합니다. 기존 이미지를 새 태그와 함께 ECR 리포지토리로 다시 푸시합니다.", "기본 리전에 Aurora 글로벌 데이터베이스를 구성합니다. 보조 리전으로의 쓰기 전달을 활성화합니다.", "기본 리전에 여러 개의 쓰기 인스턴스가 있는 Aurora DB 클러스터를 사용합니다. 보조 리전에 보조 Aurora DB 인스턴스를 생성합니다. DB 클러스터 간의 리전 간 쓰기를 활성화합니다."], "answers": [0, 3, 4]}, {"q": "한 회사가 동일한 AWS 리전 내의 여러 VPC를 연결하는 트랜짓 게이트웨이를 보유하고 있습니다. 이 회사는 네트워크 트래픽을 검사하고 워크로드 VPC에 인터넷 액세스를 허용하는 중앙 집중식 방법이 필요합니다. 다음 중 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["기존 워크로드 VPC에 게이트웨이 로드 밸런서(GWLB), GWLB 엔드포인트 및 네트워크 가상 어플라이언스를 생성합니다. 나머지 워크로드 VPC의 라우팅 테이블을 업데이트하여 트래픽을 트랜짓 게이트웨이로 전송하도록 합니다. 트랜짓 게이트웨이 라우팅 테이블을 구성하여 트래픽을 GWLB 엔드포인트로 전달하도록 합니다. GWLB에서 어플라이언스 모드를 활성화합니다.", "기존 워크로드 VPC에 게이트웨이 로드 밸런서(GWLB)를 생성합니다. 다른 워크로드 VPC에 GWLB 엔드포인트와 네트워크 가상 어플라이언스를 생성합니다. 모든 워크로드 VPC의 라우팅 테이블을 업데이트하여 트래픽을 트랜짓 게이트웨이로 전송하도록 합니다. 트랜짓 게이트웨이 라우팅 테이블을 구성하여 트래픽을 GWLB 엔드포인트로 전달하도록 합니다. GWLB 엔드포인트에서 어플라이언스 모드를 활성화합니다.", "검사 VPC와 인터넷 액세스 VPC를 생성합니다. 검사 VPC에 게이트웨이 로드 밸런서(GWLB)와 GWLB 엔드포인트를 생성합니다. 인터넷 VPC에 네트워크 가상 어플라이언스를 생성합니다. 워크로드 VPC에서 흐름 로그를 활성화하여 트래픽을 트랜짓 게이트웨이로 라우팅합니다. 네트워크 가상 어플라이언스에서 어플라이언스 모드를 활성화합니다.", "게이트웨이 로드 밸런서(GWLB), GWLB 엔드포인트 및 네트워크 가상 어플라이언스가 포함된 검사 VPC를 생성합니다. 모든 워크로드 VPC의 라우팅 테이블을 업데이트하여 트래픽을 트랜짓 게이트웨이로 보냅니다. 트랜짓 게이트웨이 라우팅 테이블을 구성하여 트래픽을 GWLB 엔드포인트로 전달합니다. 트랜짓 게이트웨이에서 어플라이언스 모드를 활성화합니다."], "answers": [3]}, {"q": "한 회사가 Amazon SageMaker AI 노트북 인스턴스와 SageMaker API를 사용하여 머신러닝(ML) 모델을 학습시키고 있습니다. SageMaker AI 노트북 인스턴스는 인터넷에 접속할 수 없는 VPC에 배포되어 있습니다. ML 모델 학습용 데이터셋은 Amazon S3 버킷에 저장되어 있습니다. 인터페이스 VPC 엔드포인트는 Amazon S3 및 SageMaker API에 대한 접근을 제공합니다. 데이터 과학자들은 워크플로의 일부로 사용하는 애플리케이션 패키지를 업데이트하기 위해 비공개 Git 리포지토리에 접근해야 하는 경우가 있습니다. 회사는 SageMaker AI 노트북 인스턴스가 인터넷과 격리된 상태를 유지하면서 Git 리포지토리에 대한 접근을 제공해야 합니다. 다음 중 운영 오버헤드가 가장 적은 솔루션은 무엇입니까?", "opts": ["원격 URL을 참조하여 Git 리포지토리를 SageMaker의 리소스로 추가합니다. AWS Secrets Manager를 구성하여 Git 자격 증명을 사용하여 리포지토리에 접근합니다.", "원격 URL을 참조하여 Git 리포지토리를 SageMaker의 리소스로 추가합니다. 리포지토리에 접근하는 데 필요한 URL에 사용자 이름을 추가합니다.", "VPC에 NAT 게이트웨이를 생성합니다. 인터넷 접근을 허용하도록 VPC 경로를 구성합니다. SageMaker A1 Notebook 인스턴스가 Git 리포지토리 URL에만 접근할 수 있도록 네트워크 ACL 규칙을 구성합니다.", "VPC에 NAT 게이트웨이를 생성합니다. 인터넷 접근을 허용하도록 VPC 경로를 구성하고, Git 리포지토리 URL에만 접근할 수 있도록 네트워크 ACL 규칙을 구성합니다."], "answers": [0]}, {"q": "한 회사가 자사 데이터 센터에 있는 모놀리식 애플리케이션을 현대화하고 AWS에 배포하려고 합니다. 이 모놀리식 애플리케이션은 중앙 계정의 이벤트 브로커와 개별 AWS 계정에 있는 여러 마이크로서비스로 구성됩니다. 이벤트 브로커와 마이크로서비스는 Fargate 시작 유형을 사용하는 Amazon ECS 클러스터에 배포됩니다. 여러 마이크로서비스가 이벤트 브로커에서 동일한 이벤트에 액세스해야 합니다. 회사는 중앙 이벤트 브로커에서 각 계정에 있는 마이크로서비스로 이벤트를 분산하려고 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["중앙 계정에 Amazon SNS 토픽을 생성합니다. 다른 계정에서 해당 토픽을 구독할 수 있도록 토픽 정책을 추가합니다. 각 개별 AWS 계정에 Amazon SQS 큐를 생성합니다. SQS 큐를 SNS 토픽에 구독합니다. 마이크로서비스가 자체 SQS 큐에서 이벤트를 읽도록 구성합니다.", "중앙 계정에 필요한 권한으로 새 Amazon EventBridge 이벤트 버스를 생성합니다. 각 마이크로서비스에 대해 서비스별로 필터링된 EventBridge 규칙을 추가합니다. 규칙을 호출하여 이벤트를 다른 계정으로 라우팅합니다.", "중앙 계정의 Amazon Kinesis Data Streams에 데이터 스트림을 생성합니다. 데이터 스트림에 액세스하는 데 필요한 권한을 부여하는 IAM 정책을 생성합니다. 각 마이크로서비스를 Kinesis 스트림의 이벤트 소스로 설정합니다. 스트림이 각 마이크로서비스를 호출하도록 구성합니다.", "중앙 계정에 이벤트 브로커로 사용할 새 Amazon SQS 큐를 생성합니다. 필요한 권한을 부여합니다. 각 마이크로서비스가 중앙 SQS 큐에서 메시지를 읽도록 구성합니다."], "answers": [1]}, {"q": "한 회사가 AWS 클라우드에서 워크로드를 실행하고 있습니다. 이 회사는 애플리케이션 데이터를 이전 버전의 Amazon DocumentDB에 저장하고 있습니다. 여러 백엔드 서비스가 24시간 내내 데이터베이스에서 데이터를 읽고 씁니다. 모든 서비스는 Amazon Route 53에 DNS 레코드로 등록된 Amazon DocumentDB 클러스터 엔드포인트를 사용하여 데이터베이스에 연결합니다. 이 회사는 데이터 손실 없이 데이터베이스를 최신 버전의 Amazon DocumentDB로 업그레이드해야 합니다. 또한 백엔드 서비스에서 업그레이드된 버전을 사용하기 전에 업그레이드를 테스트하고 검증해야 합니다. 회사는 이미 변경 스트림을 활성화하고 24시간의 보존 기간을 설정했습니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["최신 버전의 Amazon DocumentDB 클러스터를 새로 생성합니다. Amazon DocumentDB 인덱스 도구를 사용하여 기존 인덱스를 내보내고 새 클러스터로 가져옵니다. 새 AWS DMS 인스턴스와 소스 및 대상 엔드포인트를 생성합니다. '마이그레이션 및 복제' 마이그레이션 유형을 사용하여 데이터를 마이그레이션하는 DMS 작업을 생성합니다. 새 클러스터를 테스트하고 검증합니다. Route 53 레코드를 새 클러스터를 가리키도록 업데이트합니다.", "최신 버전이 실행되는 새 Amazon DocumentDB 클러스터를 생성합니다. Amazon EC2 인스턴스에 MongoDB 명령줄 인터페이스(CLI) 데이터베이스 업을 실행하도록 구성합니다.", "Amazon SNS 토픽을 생성합니다. DataSync 작업 실행 상태가 성공 또는 오류로 변경될 때 SNS 토픽으로 이메일 알림을 보내는 Amazon EventBridge 규칙을 생성합니다.", "Amazon SNS 토픽을 생성합니다. DataSync 작업 실행 상태가 성공 또는 오류로 변경될 때 SNS 토픽으로 이메일 알림을 보내는 AWS Lambda 함수를 생성합니다."], "answers": [0, 3, 4]}, {"q": "한 회사가 정적 웹 애플리케이션 프런트엔드와 여러 Amazon EC2 인스턴스에 호스팅된 API로 구성된 다계층 데이터 처리 애플리케이션을 운영하고 있습니다. 이 애플리케이션은 EC2 인스턴스에서 실행되는 단일 노드 Amazon OpenSearch Service 클러스터에 검색 데이터를 저장합니다. 또한 다른 EC2 인스턴스에서 실행되는 PostgreSQL 데이터베이스에도 추가 데이터를 저장합니다. EC2 인스턴스에서 호스팅되는 NGINX 서버가 웹 애플리케이션에 서비스를 제공합니다. 이 회사는 애플리케이션 관련 지원 문제를 경험했으며 애플리케이션을 현대화하고자 합니다. 다음 중 운영 오버헤드가 가장 적은 솔루션은 무엇입니까?", "opts": ["AWS Fargate에서 실행되는 Amazon ECS 클러스터를 생성합니다. OpenSearch Service, PostgreSQL 및 NGINX 이미지는 Amazon ECR 공개 리포지토리에서, API 이미지는 비공개 리포지토리에서 가져오도록 ECS 클러스터를 구성합니다.", "Amazon S3 오리진을 사용하여 Amazon CloudFront에 웹 애플리케이션을 호스팅합니다. 검색 데이터는 OpenSearch Service를 사용하여 저장하고 PostgreSQL 데이터베이스는 Amazon Aurora PostgreSQL 클러스터로 마이그레이션합니다. AWS App Runner에서 API를 실행합니다.", "관리형 노드 그룹이 있는 Amazon EKS 클러스터를 생성합니다. OpenSearch Service, PostgreSQL 및 NGINX의 경우 Amazon ECR 공개 리포지토리에서, API의 경우 비공개 리포지토리에서 이미지를 가져오도록 EKS 클러스터를 구성합니다.", "OpenSearch Service, PostgreSQL 및 NGINX의 경우 Amazon ECR 공개 리포지토리에서, API의 경우 비공개 리포지토리에서 이미지를 가져오도록 AWS App Runner를 구성합니다. 이미지를 App Runner에 배포합니다."], "answers": [1]}, {"q": "한 연구 회사가 AWS 클라우드에서 수학적 시뮬레이션을 수행합니다. 시뮬레이션은 수백 개의 Amazon EC2 Linux 인스턴스에서 실행됩니다. 시뮬레이션에 문제가 발생하면 엔지니어는 해당 EC2 인스턴스에 SSH 연결을 설정합니다. 회사 정책에 따라 각 EC2 인스턴스 세션은 고유한 SSH 키로 설정되어야 하며 모든 SSH 연결은 AWS CloudTrail에 기록되어야 합니다. CloudTrail은 회사 계정과 회사가 사용하는 AWS 리전에 대해 활성화되어 있습니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["새 EC2 인스턴스를 시작합니다. 새 EC2 인스턴스마다 개별 SSH 키를 생성합니다. 생성된 SSH 키를 AWS Secrets Manager에 저장합니다. 새 IAM 정책을 생성합니다. GetSecretValue 작업에 대한 Allow 문을 사용하여 엔지니어의 IAM 역할에 IAM 정책을 연결합니다. 엔지니어가 SSH 클라이언트를 통해 연결할 때 Secrets Manager에서 SSH 키를 가져오도록 지시합니다.", "EC2 인스턴스에서 명령을 실행하여 새롭고 고유한 SSH 키를 설정하는 AWS Systems Manager 문서를 생성합니다. 새 IAM 정책을 생성합니다. 엔지니어의 IAM 역할에 Systems Manager 문서를 실행할 수 있도록 Allow 문을 포함하는 IAM 정책을 연결합니다. 엔지니어에게 SSH 키를 설정하고 모든 SSH 클라이언트를 통해 연결하기 위해 문서를 실행하도록 지시합니다.", "새 EC2 인스턴스에 대한 SSH 키를 설정하지 않고 새 EC2 인스턴스를 시작합니다. 각 새 EC2 인스턴스에 EC2 Instance Connect를 설정합니다. 새 IAM 정책을 생성합니다. SendSSHPublicKey 작업에 대한 Allow 문을 포함하는 IAM 정책을 엔지니어의 IAM 역할에 연결합니다. 엔지니어에게 AWS CLI의 Instance Connect를 사용하여 EC2 인스턴스에 연결하도록 지시합니다.", "EC2 SSH 키를 저장하도록 AWS Secrets Manager를 설정합니다. 새 SSH 키를 생성하고 AWS Systems Manager Session Manager를 호출하여 EC2 인스턴스에 SSH 키를 설정하는 AWS Lambda 함수를 생성합니다. Lambda 함수를 사용하여 SSH 키를 매일 자동으로 갱신하도록 Secrets Manager를 구성합니다. 엔지니어에게 모든 SSH 클라이언트를 통해 연결할 때 Secrets Manager에서 SSH 키를 검색하도록 지시합니다."], "answers": [2]}, {"q": "한 소매업체가 100개 이상의 Python으로 작성된 AWS Lambda 함수를 사용하는 주문 및 결제 솔루션을 운영하고 있습니다. 제품 카탈로그가 확장됨에 따라 많은 함수에서 타임아웃이 발생하는 것을 확인했습니다. 회사는 함수의 타임아웃 값을 최대로 설정하고 메모리 용량을 늘렸지만, 타임아웃 문제는 계속 발생했습니다. 타임아웃 원인을 조사한 결과, 여러 함수가 연결되어 있을 때 첫 번째 함수가 응답을 기다리는 동안 타임아웃이 발생하는 것을 발견했습니다. 솔루션 아키텍트는 Lambda 함수 사용의 비용 및 운영상의 이점을 유지하면서 이러한 타임아웃 문제를 해결해야 합니다. 다음 중 애플리케이션 변경을 최소화하면서 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["솔루션을 컨테이너 환경에서 실행되도록 변환합니다. Amazon EKS 클러스터를 배포하고 컨테이너에 대한 자동 스케일링을 활성화합니다.", "Lambda 함수를 Java로 다시 작성합니다. 함수 간에 Amazon SQS 큐를 구현합니다.", "AWS Step Functions 워크플로를 사용하여 Lambda 함수를 호출하도록 솔루션을 변환합니다. 함수 간 직접 호출을 제거합니다.", "연결된 함수 그룹을 단일 컨테이너 이미지로 결합합니다. Amazon EC2 스팟 인스턴스에 Amazon ECS를 사용하여 컨테이너를 배포합니다."], "answers": [2]}, {"q": "한 회사가 AWS에서 매일 수백만 건의 거래를 처리하는 결제 게이트웨이를 운영하고 있습니다. 이 솔루션은 자동 스케일링이 구성되지 않은 단일 Amazon EC2 인스턴스와 Amazon Aurora PostgreSQL 데이터베이스를 사용하는 Amazon ECS를 활용합니다. 솔루션의 모든 리소스는 동일한 가용 영역에 배포되어 있습니다. 회사는 도메인 이름 확인을 위해 Amazon Route 53을 사용합니다. 이 회사는 애플리케이션의 가용성을 높이기 위한 새로운 전략을 구현해야 합니다. 다음 중 운영 오버헤드가 가장 적은 솔루션은 무엇입니까?", "opts": ["Aurora 데이터베이스 앞에 Amazon RDS 프록시를 설정합니다. 두 번째 가용 영역에 읽기 복제본을 추가하여 Aurora 데이터베이스를 다중 가용 영역 DB 클러스터로 변경합니다.", "여러 가용 영역에 작업을 분산하도록 Amazon ECS 서비스를 구성합니다. 두 번째 AWS 리전에 Aurora 데이터베이스의 교차 리전 읽기 복제본을 생성합니다. 수동 장애 조치 프로세스를 수행하는 스크립트를 생성합니다.", "여러 가용 영역에 작업을 분산하도록 AWS Fargate에서 Amazon ECS 서비스를 구성합니다. 두 번째 가용 영역에 읽기 복제본을 추가하여 Aurora 데이터베이스를 다중 가용 영역 DB 클러스터로 변경합니다.", "게이트웨이 애플리케이션을 두 번째 AWS 리전에 배포합니다. Aurora 데이터베이스를 Aurora 글로벌 데이터베이스로 마이그레이션합니다. 액티브-액티브 게이트웨이 요청 라우팅을 위해 Route 53을 구성합니다."], "answers": [2]}, {"q": "한 회사가 Amazon EC2 인스턴스에서 테스트 애플리케이션을 실행하고 있습니다. 미국 전역의 테스트 클라이언트들이 REST API를 사용하여 애플리케이션으로 데이터를 전송합니다. 트래픽이 증가함에 따라 애플리케이션 응답 시간도 증가합니다. 이 회사는 서버리스 아키텍처로 마이그레이션하고 WebSocket을 통해 클라이언트로 데이터를 스트리밍하려고 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["새로운 Amazon API Gateway REST API를 생성합니다. AWS Lambda 함수에 비즈니스 로직을 구현합니다. Lambda 함수를 새 REST API의 통합 대상으로 설정합니다. 새로운 AWS Step Functions 상태 머신을 생성하고 클라이언트를 대상으로 설정합니다. 상태 머신을 사용하여 클라이언트로 데이터를 전송합니다.", "새로운 Amazon API Gateway HTTP API와 Amazon SQS 큐를 생성합니다. HTTP API가 SQS 큐와 통합되도록 구성합니다. AWS Lambda 함수에 비즈니스 로직을 구현합니다. SQS 큐를 사용하여 Lambda 함수를 호출합니다. Lambda 함수가 AWS AppSync 이벤트 채널에 데이터를 기록하도록 구성합니다. 클라이언트가 AWS AppSync 이벤트 채널을 구독하는지 확인합니다.", "새로운 AWS AppSync API와 새로운 Amazon SQS 큐를 생성합니다. SQS 큐를 AWS AppSync API와 통합합니다. 현재 비즈니스 로직을 업데이트하여 SQS 큐에서 데이터를 소비하도록 합니다. 새로운 Amazon EventBridge 이벤트 버스와 EventBridge 규칙을 생성합니다. 클라이언트를 규칙의 대상으로 설정합니다. EventBridge 이벤트 버스를 사용하여 클라이언트로 데이터를 전송합니다.", "새로운 Amazon CloudFront 배포를 생성합니다. CloudFront 함수에 비즈니스 로직을 구현합니다. CloudFront 함수를 CloudFront 배포의 원본으로 설정합니다. AWS IoT Core를 활성화합니다. CloudFront 함수가 MQTT 토픽에 데이터를 기록하도록 구성합니다. 클라이언트가 WebSockets를 통해 IoT Core MQTT 토픽을 구독하는지 확인합니다."], "answers": [1]}, {"q": "한 회사가 IaC(Infrastructure as Code)를 사용하여 Amazon EC2 인스턴스를 프로비저닝합니다. 트래픽 증가를 관리하기 위해 EC2 Auto Scaling 그룹을 구현하는 데 시작 템플릿을 사용합니다. 회사는 모든 EC2 인스턴스에 매달 보안 업데이트를 적용합니다. 최근 인스턴스 재부팅이 필요한 업데이트 이후, Auto Scaling 그룹은 기존 인스턴스를 종료하고 패치가 적용되지 않은 새 인스턴스를 시작했습니다. 트래픽 부하에 따라 Auto Scaling 그룹이 새로 시작하는 인스턴스 또한 패치가 적용되지 않은 상태입니다. 회사는 Auto Scaling 그룹이 최신 보안 패치가 적용된 인스턴스를 시작하도록 해야 합니다. 이 요구 사항을 충족하는 솔루션 조합은 무엇입니까? (두 가지 선택)", "opts": ["Auto Scaling 그룹 종료 정책을 \"가장 오래된 시작 템플릿\" 설정으로 구성합니다.", "다음 패치 유지 관리 기간 전에 새 Auto Scaling 그룹을 생성합니다. 다음 유지 관리 기간 동안 두 Auto Scaling 그룹의 인스턴스에 패치를 적용하고 재부팅합니다.", "Auto Scaling 그룹 앞에 ALB(Application Load Balancer)를 배포합니다. 인스턴스 교체 후 대상 그룹의 상태를 모니터링합니다.", "AWS Systems Manager를 사용하여 패치된 AMI를 자동으로 생성합니다. Auto Scaling 그룹 시작 템플릿을 업데이트합니다. Auto Scaling 그룹에 대한 인스턴스 새로 고침을 시작합니다.", "Auto Scaling 그룹 앞에 네트워크 로드 밸런서(NLB)를 배포합니다. 인스턴스에 대한 종료 보호를 구성합니다."], "answers": [2, 3]}, {"q": "한 회사가 문서 처리 워크로드를 AWS로 마이그레이션하고 있습니다. 클라이언트 애플리케이션은 처리를 위해 문서를 Amazon S3 버킷에 업로드합니다. 문서 처리 엔진은 Amazon EC2 Linux 인스턴스에서 실행되며, 처리 중에 파일을 읽고, 생성하고, 수정하기 위해 POSIX(Portable Operating System Interface) 규격을 준수하는 파일 시스템 접근이 필요합니다. 처리된 문서는 클라이언트 애플리케이션이 다운로드할 수 있도록 S3 버킷에 자동으로 저장되어야 합니다. 이 회사는 문서 처리 엔진을 직접 수정하여 S3 API를 사용하도록 할 수 없습니다. 따라서 EC2 인스턴스에 파일 시스템 접근 권한을 제공하는 솔루션이 필요합니다. 이 솔루션은 입력 및 출력 파일 모두에 대해 S3 버킷과의 자동 동기화를 유지해야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["에이전트 없이 EC2 인스턴스에 연결하도록 AWS DataSync를 구성합니다. 향상된 모드에서 DataSync 작업을 구성하여 처리된 문서를 Amazon S3와 동기화합니다.", "S3 버킷에 연결된 가져오기 및 내보내기 정책이 있는 Amazon FSx for Lustre 파일 시스템을 구성합니다. EC2 인스턴스에 Lustre 클라이언트를 설치하고 파일 시스템을 마운트합니다.", "Amazon EFS 파일 시스템을 생성합니다. 데이터 저장소 연결을 S3 버킷에 설정합니다. EFS 클라이언트를 설치하고 파일 시스템을 마운트합니다. 새 객체 및 변경된 객체에 대한 자동 가져오기 및 내보내기 정책을 생성합니다.", "Amazon S3 파일 게이트웨이를 설정합니다. Amazon S3에서 변경 사항이 발생할 때 S3 파일 게이트웨이를 업데이트하기 위해 캐시 새로 고침 API 호출을 시작합니다."], "answers": [1]}, {"q": "한 회사가 AWS에 애플리케이션을 호스팅하고 있습니다. 이 애플리케이션은 Amazon API Gateway API에서 호출되는 AWS Lambda 함수를 사용합니다. 이 회사는 API Gateway API를 오리진으로 사용하는 Amazon CloudFront 배포를 운영하고 있으며, 이 CloudFront 배포는 전 세계 고객에게 웹 요청을 처리합니다. 테스트 중에 사용자는 애플리케이션 API의 응답 속도가 느리다는 문제를 경험했습니다. 회사는 서로 다른 AWS 리전에서 오는 요청에 대소문자가 혼합된 일관성 없는 쿼리 매개변수가 포함되어 있어 캐시 미스가 증가하고 Lambda 함수에 도달하는 요청 수가 늘어나는 것을 발견했습니다. 이 회사는 API가 최소한의 지연 시간으로 일관되게 응답하도록 보장하고자 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["들어오는 요청의 쿼리 매개변수를 알파벳순으로 정렬하고 소문자로 변환하는 새로운 Lambda 함수를 생성합니다. CloudFront 배포에서 Lambda@Edge 함수 유형을 사용하도록 구성합니다. 오리진 요청에서 Lambda 함수를 호출하도록 구성합니다.", "들어오는 요청의 쿼리 매개변수를 알파벳순으로 정렬하고 소문자로 변환하는 CloudFront 함수를 생성합니다. CloudFront 배포에서 CloudFront Functions 함수 유형을 사용하도록 구성합니다. CloudFront 함수가 뷰어 요청 시 호출되도록 구성합니다.", "API Gateway API가 매핑 템플릿을 사용하여 들어오는 요청 쿼리 매개변수를 알파벳순으로 정렬하고 Lambda가 요청을 처리하기 전에 소문자로 변환하도록 구성합니다.", "API Gateway API가 Lambda 인증자를 사용하여 들어오는 요청 쿼리 매개변수를 알파벳순으로 정렬하고 Lambda가 요청을 처리하기 전에 소문자로 변환하도록 구성합니다."], "answers": [1]}, {"q": "한 회사가 Amazon ECS 클러스터를 사용하여 데이터 처리 애플리케이션을 실행하고 있습니다. 여러 사업부가 ECS 클러스터에서 ECS 서비스를 공유합니다. ECS 클러스터는 Amazon EC2 인스턴스에서 실행되며, 자동 스케일링이 활성화되어 있습니다. 이 회사는 ECS 작업에 대한 EC2 비용을 각 사업부에 할당해야 합니다. 다음 중 운영 오버헤드가 가장 적은 솔루션은 무엇입니까?", "opts": ["EC2 자동 스케일링 그룹에 사업부를 나타내는 비용 할당 태그를 생성합니다. AWS Cost Explorer를 사용하여 EC2 비용을 각 사업부에 할당합니다.", "AWS Cost Explorer에서 비용 분할 할당 데이터를 활성화합니다. 태그를 사용하여 EC2 비용을 각 사업부에 할당하는 AWS 비용 및 사용량 보고서를 생성합니다.", "각 사업부별로 별도의 ECS 클러스터를 생성합니다. AWS Cost Explorer를 사용하여 EC2 비용을 각 사업부에 할당합니다.", "각 사업부별로 AWS 비용 범주를 생성합니다. 사업부별로 ECS 클러스터에 대한 분할 요금 규칙을 정의합니다. AWS 비용 및 사용량 보고서를 생성합니다."], "answers": [1]}, {"q": "한 회사가 여러 AWS 리전에서 결제 게이트웨이를 운영하고 있습니다. 또한, 보안 규정을 준수하기 위해 민감한 결제 데이터를 토큰화하는 하드웨어 보안 모듈(HSM)을 관리하는 온프레미스 데이터 센터도 운영하고 있습니다. 회사의 성능 SLA 내에서 결제 거래를 처리하기 위해 온프레미스 HSM과 AWS 결제 서비스 간에 전용 프라이빗 연결을 제공할 수 있는 자동화되고 중앙에서 관리되는 솔루션이 필요합니다. 이 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["AWS 글로벌 액셀러레이터에서 중앙에서 관리되는 액셀러레이터를 사용하여 각 데이터 센터의 트래픽을 가장 가까운 AWS 리전으로 라우팅합니다.", "데이터 센터와 AWS 간에 AWS 사이트 간 VPN 연결을 설정합니다. 중앙에서 관리되는 트랜짓 게이트웨이를 설정하고 적절한 경로를 지정합니다.", "AWS CloudHSM을 사용하여 민감한 결제 데이터를 토큰화합니다. CloudHSM을 결제 서비스 워크로드와 동일한 프라이빗 서브넷에 배포합니다.", "온프레미스 데이터 센터와 AWS 간에 AWS Direct Connect 연결을 사용하여 AWS Cloud WAN을 설정합니다."], "answers": [3]}, {"q": "한 회사가 VPC에서 실행되는 서버리스 애플리케이션을 개발하고 있습니다. VPC는 여러 가용 영역에 걸쳐 공용 및 프라이빗 IPv4 서브넷을 가지고 있습니다. 애플리케이션은 여러 공용 NAT 게이트웨이와 인터넷 게이트웨이를 통해 인터넷에 연결됩니다. 이 회사는 AWS Lambda 함수를 사용하여 외부 공급자의 새로운 서비스와 애플리케이션을 통합해야 합니다. 외부 공급자는 승인된 목록에 있는 공용 IPv4 주소에서만 요청을 수락합니다. 회사는 애플리케이션이 새 서비스를 사용하기 전에 외부 공급자에게 연결 정보를 제공해야 합니다. 어떤 솔루션을 사용하면 애플리케이션이 새 서비스에 액세스할 수 있을까요?", "opts": ["프라이빗 서브넷을 사용하여 Lambda 함수를 VPC에 연결합니다. NAT 게이트웨이의 탄력적 IP 주소를 제공합니다.", "송신 전용 인터넷 게이트웨이를 배포합니다. Lambda 함수가 인터넷 게이트웨이를 사용하도록 구성합니다. 인터넷 게이트웨이의 탄력적 IP 주소를 제공합니다.", "인터넷 게이트웨이에 탄력적 IP 주소를 연결합니다. Lambda 함수가 VPC의 공용 서브넷에 액세스하도록 구성합니다. 인터넷 게이트웨이의 탄력적 IP 주소를 제공합니다.", "Lambda 함수를 ENA(Elastic Network Adapter)로 구성합니다. ENA 드라이버를 사용하는 Lambda 레이어를 생성합니다. ENA 인터페이스의 IP 주소를 제공합니다."], "answers": [0]}, {"q": "한 회사가 여러 AWS 리전에 걸쳐 결제 처리 플랫폼을 운영하고 있습니다. 이 플랫폼은 결제 처리 API 엔드포인트를 제공합니다. 회사는 Amazon Route 53을 사용하여 각 리전의 애플리케이션 로드 밸런서(ALB)로 트래픽을 라우팅하고, ALB는 백엔드 결제 게이트웨이로 요청을 분산합니다. 또한, 결제 게이트웨이에 Auto Scaling을 구현했습니다. 회사는 애플리케이션 장애 발생 시 신속하게 처리하여 안정성과 가용성을 향상해야 합니다. 전 세계 사용자를 대상으로 최소 응답 시간을 제공하는 솔루션은 무엇일까요?", "opts": ["Route 53에서 지리적 위치 기반 라우팅 정책을 사용하여 DNS를 Amazon CloudFront 배포로 확인하도록 구성합니다. 각 리전의 ALB를 오리진으로 포함하는 오리진 그룹을 사용하여 배포를 구성합니다.", "AWS Global Accelerator에서 액셀러레이터를 생성합니다. 엔드포인트 그룹을 생성하고 각 ALB를 그룹의 엔드포인트로 추가합니다. Route 53 별칭 레코드를 액셀러레이터를 가리키도록 업데이트합니다.", "Route 53에서 지연 시간 기반 라우팅 정책과 각 리전 엔드포인트에 대한 상태 확인을 사용하도록 구성합니다.", "AWS 클라우드 WAN을 사용하여 리전 간 VPC를 연결함으로써 리전 간 연결을 설정합니다. 네트워크 정책을 사용하여 각 리전에서 출발지 리전과 가장 가까운 리전으로 트래픽을 라우팅합니다."], "answers": [1]}, {"q": "한 회사가 AWS Organizations에서 모든 기능을 활성화한 단일 조직을 사용하여 300개의 AWS 계정을 관리합니다. 솔루션 아키텍트는 멤버 계정에 배포된 모든 비공개 Amazon ECR 리포지토리가 동일한 조직에 속한 보안 주체만 액세스할 수 있도록 해야 합니다. 회사는 전체 조직과 현재 및 향후 모든 ECR 리포지토리에 대해 액세스 제어를 적용해야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["aws:PrincipalType 속성 값이 Service인 경우를 제외하고 모든 ecr:* 작업을 거부하는 SCP를 조직 루트에 연결합니다.", "aws:PrincipalOrgID 조건이 회사 조직 ID와 일치하는 경우에만 ECR에 대한 액세스를 허용하는 리소스 제어 정책(RCP)을 조직 루트에 연결합니다.", "호출자의 aws:PrincipalAccount 속성이 조직 ID와 일치하는 경우를 제외하고 ecr:*에 대한 거부 문을 포함하도록 모든 계정의 IAM 정책을 수정합니다.", "모든 ECR 리포지토리를 AWS 리소스 액세스 관리자(AWS RAM)를 통해 공유합니다. 계정 수준 허용 목록을 기반으로 보안 주체 액세스를 제어합니다."], "answers": [1]}, {"q": "한 회사가 공급업체와 데이터 공유 계약을 체결했습니다. 솔루션 아키텍트는 AWS Organizations에서 회사 조직과 공급업체 조직 간에 Amazon S3 버킷에 대한 양방향 액세스를 설정해야 합니다. 회사 S3 버킷은 us-east-1 리전에 있고, 공급업체 버킷은 us-west-1 리전에 있습니다. 회사는 저장된 데이터를 암호화하고 모든 S3 버킷 액세스 로그를 수집해야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["소스 계정에 특정 권한이 있는 S3 액세스 권한을 생성합니다. AWS Resource Access Manager(AWS RAM)를 사용하여 두 조직과 액세스 권한을 공유합니다. AWS KMS 키(SSE-KMS)를 사용한 서버 측 암호화로 데이터를 암호화합니다. 대상 계정에 KMS 키에 대한 액세스 권한을 부여합니다. AWS CloudTrail을 구성하여 S3 데이터 이벤트를 로깅합니다.", "두 조직의 VPC 간에 VPC 피어링 연결을 설정합니다. AWS PrivateLink를 사용하여 S3 인터페이스 엔드포인트를 구현합니다. 각 조직에서 엔드포인트 액세스를 제어하는 ​​IAM 정책을 구성합니다. Amazon S3 관리형 키(SSE-S3)를 사용하여 Amazon S3 서버 측 암호화로 데이터를 암호화합니다. VPC 흐름 로그를 활성화합니다.", "두 조직 모두에 대해 S3 액세스 포인트를 생성하고 AWS Resource Access Manager(AWS RAM)를 사용하여 액세스 포인트를 공유합니다. 액세스 포인트에 대한 조직 간 액세스 권한을 부여하는 IAM 정책을 연결합니다. 고객 관리형 AWS KMS 키를 사용하여 데이터를 암호화합니다. 두 리전 모두에서 AWS CloudTrail을 활성화합니다.", "S3 리전 간 복제를 구성합니다. S3:GetObject 및 S3:PutObject 작업을 허용하는 SCP를 생성합니다. 두 조직 간에 SCP를 공유합니다. Amazon S3 관리형 키(SSE-S3)를 사용하여 Amazon S3 서버 측 암호화로 데이터를 암호화합니다. S3 서버 액세스 로깅을 구현합니다."], "answers": [2]}, {"q": "어떤 회사가 하이브리드 DNS 아키텍처를 필요로 합니다. 이 아키텍처는 회사의 온프레미스 네트워크와 VPC를 포함해야 합니다. AWS 사이트 간 VPN 연결을 통해 VPC와 온프레미스 네트워크를 연결합니다. 회사는 이미 온프레미스에 onprem.mydc.com 도메인 이름을 호스팅하고 있습니다. 회사는 myvpc.example.com 도메인 이름을 회사 AWS 계정에 호스팅하고 VPC로 확인되도록 하려고 합니다. 또한 온프레미스 디바이스에서 myvpc.example.com 도메인에 대한 DNS 쿼리를 확인할 수 있어야 합니다. 다음 중 어떤 단계 조합이 이러한 요구 사항을 충족합니까? (세 가지 선택)", "opts": ["myvpc.example.com 도메인에 대한 Amazon Route 53 프라이빗 호스팅 영역을 생성하고 해당 도메인을 VPC와 연결합니다.", "myvpc.example.com 도메인에 대한 Amazon Route 53 퍼블릭 호스팅 영역을 생성하고 해당 도메인을 VPC와 연결합니다.", "Amazon Route 53 리졸버를 사용하여 VPC가 속한 AWS 리전에 인바운드 엔드포인트를 생성합니다.", "Amazon Route 53 리졸버를 사용하여 VPC의 AWS 리전에 아웃바운드 엔드포인트를 생성합니다.", "Amazon Route 53 리졸버를 사용하여 아웃바운드 엔드포인트의 Route 53 프라이빗 호스팅 영역 도메인과 IP 주소에 대한 전달 규칙을 생성합니다.", "온프레미스 DNS 리졸버를 구성하여 인바운드 엔드포인트의 Amazon Route 53 프라이빗 호스팅 영역 도메인과 IP 주소에 대한 DNS 쿼리에 대한 조건부 전달 규칙을 설정합니다."], "answers": [0, 2, 5]}, {"q": "한 회사가 Amazon S3에 데이터를 업로드하는 애플리케이션의 인프라를 최적화해야 합니다. 업로드되는 데이터의 평균 크기는 64KB입니다. 데이터가 업로드되면 Amazon S3는 Amazon EventBridge로 이벤트를 전송합니다. 그러면 EventBridge는 Amazon ECS 애플리케이션 태스크를 호출합니다. ECS 태스크는 데이터를 처리하고 결과를 Amazon DynamoDB 테이블에 저장합니다. 처리 시간은 평균 15분입니다. 회사는 S3 데이터를 5년 동안, DynamoDB 데이터를 15일 동안 보관해야 합니다. 이 애플리케이션은 사용자가 증가하고 있으며 매시간 수백만 건의 S3 업로드를 처리하고 있습니다. 이 애플리케이션에 가장 비용 효율적인 솔루션을 제공하는 변경 사항은 무엇입니까?", "opts": ["ECS 태스크를 AWS Lambda 함수로 교체하여 처리합니다. S3 객체가 1일 후 S3 인텔리전트 티어링으로 이동하고 5년 후 만료되도록 S3 수명 주기 규칙을 생성합니다. DynamoDB 테이블에 대해 DynamoDB 표준-간헐적 액세스(Standard-Infrequent Access)를 구성합니다.", "S3 버킷을 Amazon Managed Streaming for Apache Kafka(Amazon MSK)로 교체하여 데이터를 수신합니다. 1일 이상 된 데이터에 대해서는 계층형 스토리지를 구성합니다. EventBridge가 Amazon MSK에서 1,000개 메시지씩 일괄 처리하도록 구성합니다. ECS 작업을 AWS Lambda 함수로 교체하여 처리합니다. DynamoDB 테이블의 TTL을 15일로 구성합니다.", "Amazon Data Firehose 스트림을 생성하여 데이터를 수신합니다. 버퍼링을 구성하여 메시지를 매분 gzip 형식으로 Amazon S3에 전송합니다. 사용량 권장 사항에 따라 컴퓨팅 절약 플랜을 구매합니다. S3 객체가 1일 후 S3 Glacier Deep Archive로 이동하고 5년 후 만료되도록 S3 수명 주기 규칙을 생성합니다. DynamoDB 테이블의 TTL을 15일로 구성합니다.", "사용량 권장 사항에 따라 컴퓨팅 절약 플랜을 구매합니다. S3 객체가 1일 후 S3 Glacier Deep Archive로 이동하고 5년 후 만료되도록 S3 수명 주기 규칙을 생성합니다. DynamoDB 테이블에 대해 DynamoDB 표준-간헐적 액세스(Standard-Infrequent Access)를 구성합니다."], "answers": [2]}, {"q": "Example Corp는 여러 AWS 계정을 관리하기 위해 모든 기능이 활성화된 AWS Organizations 조직을 사용하고 있습니다. Example Corp는 현재 단일 AWS 계정에서 AWS 환경을 호스팅하는 AnyCompany를 인수했습니다. Example Corp는 AnyCompany의 AWS 계정을 Example Corp의 기존 조직에 추가하려고 합니다. 이 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["AnyCompany의 AWS 계정에서 Example Corp의 기존 AWS 관리 계정을 초대하여 참여 프로세스를 시작합니다. Organizations에서 필요한 권한을 가진 OrganizationAccountAccessRole IAM 역할을 생성하도록 합니다.", "Example Corp의 관리 AWS 계정에서 AWS 지원팀에 AnyCompany의 AWS 계정을 기존 조직에 추가해 달라는 요청을 보냅니다. Organizations에서 필요한 권한을 가진 OrganizationAccountAccessRole IAM 역할을 생성하도록 합니다.", "Example Corp의 관리 AWS 계정에서 AnyCompany의 AWS 계정으로 초대장을 보냅니다. AnyCompany 계정에서 초대장을 수락합니다. 적절한 관리형 IAM 정책을 사용하여 OrganizationAccountAccessRole IAM 역할을 생성합니다.", "AnyCompany의 AWS 계정에서 적절한 관리형 IAM 정책을 사용하여 OrganizationAccountAccessRole IAM 역할을 생성합니다. AnyCompany의 AWS 계정이 Example Corp 조직의 구성원이 되도록 구성합니다."], "answers": [2]}, {"q": "한 회사가 AWS 클라우드에서 API 서비스를 운영하고 있습니다. 이 서비스는 AWS Lambda 함수와 통합된 Amazon API Gateway REST API를 기반으로 합니다. Lambda 함수는 Amazon DynamoDB 테이블에 데이터를 저장합니다. DynamoDB 테이블은 온디맨드 용량 모드로 구성되어 있습니다. 애플리케이션은 하루 중 간헐적으로 API 서비스에 액세스합니다. 성능 테스트 결과 응답 시간에 상당한 변동성이 나타났습니다. 동일한 요청에 대한 첫 번째 응답은 이후 응답보다 처리 시간이 더 오래 걸렸습니다. 일관된 성능을 보장하는 해결책은 무엇입니까?", "opts": ["Lambda 함수 엔드포인트를 Amazon Route 53 레코드 세트의 대상으로 구성합니다. Route 53의 지연 시간 기반 라우팅을 사용하여 트래픽을 분산합니다.", " 다시 생성합니다.", "조직 전체에 AWS Security Hub를 구성합니다. AWS Trusted Advisor를 구성하여 조직 내 모든 EC2 인스턴스에 대해 매일 보안 검사를 수행합니다.", "조직 전체에 AWS Security Hub를 구성합니다. Amazon Inspector를 구성하여 조직 내 모든 EC2 인스턴스에 대해 매일 보안 검사를 수행합니다.", "각 계정에 AWS Systems Manager Patch Manager를 구성합니다. 각 계정에 대해 패치 기준선과 보고서를 별도로 정의합니다.", "위임된 관리자 계정을 사용하여 조직 전체에 AWS Systems Manager Patch Manager를 구성합니다. 조직 전체 패치 기준선을 생성하고 규정 준수 보고를 구성합니다."], "answers": [0, 3, 5]}, {"q": "한 회사가 프라이빗 VPC 내의 Amazon EC2 인스턴스에서 애플리케이션을 실행하고 있습니다. 이 애플리케이션은 Amazon S3 버킷의 데이터에 접근합니다. 현재 애플리케이션은 기존 NAT 게이트웨이를 통해 외부 인터넷에 접속하고 있습니다. 이 회사는 온프레미스 사무실에서 VPC로 AWS 사이트 간 VPN 연결을 구축했습니다. 회사는 애플리케이션과 온프레미스 사용자 모두 공용 인터넷을 거치지 않고 S3 버킷에 접근할 수 있도록 하고 싶어하며, NAT 게이트웨이도 제거하고 싶어합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["VPC 내부에 프라이빗 DNS를 사용하는 S3 게이트웨이 엔드포인트를 생성합니다. 온프레미스 환경의 라우팅을 업데이트하여 S3 버킷으로 가는 트래픽을 VPC 내부에 있는 게이트웨이 엔드포인트로 라우팅합니다. 온프레미스 DNS를 업데이트하여 S3 버킷의 프라이빗 DNS 이름을 사용하도록 합니다.", "VPC 내부에 프라이빗 DNS를 사용하는 S3 게이트웨이 엔드포인트와 S3 인터페이스 엔드포인트를 모두 생성합니다. VPC의 각 서브넷과 온프레미스 환경의 라우팅을 업데이트합니다. 온프레미스 DNS를 업데이트하여 S3 버킷의 프라이빗 DNS 이름을 사용하도록 합니다.", "EC2 인스턴스에 Amazon S3 마운트포인트를 설치합니다. S3 버킷을 EC2 인스턴스에 직접 마운트합니다. 애플리케이션이 새 마운트포인트를 사용하여 S3 버킷에 액세스하도록 구성합니다.", "EC2 인스턴스에 S3용 스토리지 브라우저를 설치하고 애플리케이션에 추가합니다. 애플리케이션 사용자가 스토리지 브라우저를 사용하여 S3 데이터에 액세스하는지 확인합니다."], "answers": [1]}, {"q": "한 회사가 10,000개의 Amazon EC2 인스턴스에 대한 바이러스 백신 솔루션을 새로운 SaaS(Software as a Service) 솔루션으로 마이그레이션했습니다. 새 SaaS 에이전트에서 보고된 인스턴스는 5% 미만입니다. 회사는 새 에이전트가 로드되지 않았거나 새 에이전트의 구성이 변경되었을 가능성이 있다고 의심합니다. 모든 인스턴스가 미리 정의된 구성으로 최신 에이전트 버전을 일관되게 실행하도록 하는 솔루션을 구현해야 합니다. 다음 중 관리 오버헤드가 가장 적은 솔루션은 무엇입니까?", "opts": ["예약된 시간에 실행되도록 AWS Lambda 함수를 생성합니다. 머신 목록을 Amazon S3에 저장합니다. Lambda 함수가 모든 머신에 로그인하여 최신 에이전트 버전을 다운로드 및 설치하고 에이전트를 구성하도록 구성합니다.", "규정 미준수 이벤트에 대해 AWS Lambda를 사용하는 자동 복구 기능이 있는 AWS Config 규칙을 구현합니다. 머신에 액세스하여 최신 에이전트 버전을 다운로드 및 설치하는 Lambda 함수를 개발합니다. Lambda 함수가 매일 실행되도록 예약합니다.", "에이전트 설치 및 구성 프로세스를 정의하는 AWS Systems Manager 문서를 생성합니다. AWS Systems Manager 상태 관리자를 구성하여 문서를 EC2 인스턴스와 연결합니다. 원하는 상태를 매일 적용합니다.", "  컨테이너에서 호스팅됩니다. 규정 준수 요건을 충족하기 위해 각 컨테이너 플랫폼 노드에 자체 보안 에이전트 소프트웨어를 설치했습니다. MySQL 데이터베이스는 소스-복제본 구성으로 두 개의 별도 VM에 설치되어 있습니다. 솔루션 아키텍트는 전체 웹사이트 환경을 AWS로 마이그레이션하는 솔루션을 설계해야 합니다. 이러한 요구 사항을 충족하면서 운영 오버헤드가 가장 적은 솔루션은 무엇입니까?", "opts": ["웹사이트 서비스를 Amazon EC2 인스턴스에 컨테이너로 배포합니다. EC2 인스턴스에는 자체 보안 에이전트 소프트웨어와 컨테이너 관리 소프트웨어가 사전 설치된 사용자 지정 AMI를 사용합니다. AWS DMS를 사용하여 MySQL 데이터베이스 데이터를 Amazon Aurora DB 클러스터로 마이그레이션합니다. Aurora DB 클러스터에 읽기 복제본을 하나 더 추가합니다.", "관리형 노드 그룹으로 구성된 Amazon EKS 클러스터를 생성합니다. 자체 보안 에이전트 소프트웨어가 사전 설치된 사용자 지정 AMI를 사용합니다. 웹사이트 서비스를 Kubernetes Pod로 배포합니다. AWS DMS를 사용하여 MySQL 데이터베이스 데이터를 Amazon RDS for MySQL DB 인스턴스로 마이그레이션합니다. RDS DB 인스턴스에 대해 다중 가용 영역(Multi-AZ) 배포를 구성합니다.", "AWS Lambda 함수에서 웹 서비스 컨테이너를 배포합니다. 백엔드에서 Lambda 함수로 들어오는 요청을 처리하기 위해 Amazon API Gateway API를 생성합니다. 정적 콘텐츠를 Amazon S3 버킷에 저장합니다. AWS DMS를 사용하여 MySQL 데이터베이스 데이터를 Amazon RDS for MySQL DB 인스턴스로 마이그레이션합니다. RDS DB 인스턴스에 대해 다중 가용 영역(Multi-AZ) 배포를 구성합니다.", "Fargate 시작 유형을 사용하는 Amazon ECS 클러스터를 생성합니다. 자체 보안 에이전트 소프트웨어가 사전 설치된 사용자 지정 AMI로 Fargate를 구성합니다. 웹 서비스를 ECS 작업으로 배포합니다. AWS DMS를 사용하여 MySQL 데이터베이스 데이터를 Amazon Aurora DB 클러스터로 마이그레이션합니다. Aurora DB 클러스터에 읽기 복제본을 추가합니다."], "answers": [1]}, {"q": "한 회사가 메시징, 이메일, 파일 공유를 위해 여러 SaaS(Software as a Service) 애플리케이션을 사용하고 있습니다. 이 SaaS 애플리케이션들은 AWS AppFabric과 호환됩니다. 회사의 웹 애플리케이션은 Amazon EKS 클러스터의 VPC에서 실행되며 Amazon S3를 사용하여 데이터를 저장합니다. 이 회사는 회사 데이터 유출로 이어질 수 있는 SaaS 애플리케이션과 웹 애플리케이션 전반의 보안 사고를 탐지하고자 합니다. 이를 위해 중앙 집중식 대시보드 솔루션이 필요합니다. 대시보드에는 SaaS 애플리케이션과 웹 애플리케이션 전반에 걸쳐 고유 사용자의 IP 주소, 이메일 주소, 접속 빈도가 표시되어야 합니다. 이러한 요구 사항을 가장 적은 운영 오버헤드로 충족하는 단계 조합은 무엇입니까? (세가지 선택)", "opts": ["각 SaaS 애플리케이션의 감사 로그 데이터를 AWS AppFabric으로 수집합니다. 감사 로그 데이터를 OCSF(Open Cybersecurity Schema Framework) 정규화된 Apache Parquet 형식으로 변환합니다. 변환된 로그를 Amazon Data Firehose로 전송하여 Amazon Security Lake S3 버킷에 저장합니다.", "각 SaaS 애플리케이션의 네트워킹 및 사용량 로그 데이터를 AWS AppFabric으로 수집합니다. 네트워킹 및 사용 로그 데이터를 JSON 형식으로 변환합니다. 변환된 로그를 Amazon Data Firehose로 전송하여 Amazon OpenSearch Service로 전달합니다.", "Amazon Data Firehose를
