<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>AWS SAP 문제풀기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f7f7f5;--surface:#ffffff;--border:#e2e2de;--border-strong:#c8c8c4;
  --text:#1a1a18;--text2:#6b6b67;--text3:#9b9b97;
  --accent:#2563eb;--accent-bg:#eff4ff;--accent-border:#bfcffe;
  --success:#16a34a;--success-bg:#f0fdf4;--success-border:#86efac;
  --danger:#dc2626;--danger-bg:#fef2f2;--danger-border:#fca5a5;
  --radius:10px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1a;--surface:#2a2a28;--border:#3a3a38;--border-strong:#4a4a48;
    --text:#f0f0ee;--text2:#a0a09c;--text3:#606060;
    --accent-bg:#1e2d4a;--accent-border:#3b5bdb;
    --success-bg:#0f2a1a;--success-border:#166534;
    --danger-bg:#2a1010;--danger-border:#991b1b;
  }
}
html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;color:var(--text)}
body{display:flex;flex-direction:column;align-items:center;padding:0}
#wrap{width:100%;max-width:480px;padding:16px;display:flex;flex-direction:column;gap:14px;min-height:100svh}
.screen{display:none;flex-direction:column;gap:14px}
.screen.active{display:flex}
.hidden{display:none!important}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px}
.badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:600;background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-border)}
.toggle-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.toggle-label{display:flex;align-items:center;gap:7px;font-size:14px;color:var(--text2);cursor:pointer}
.toggle-label input[type=checkbox]{width:18px;height:18px;accent-color:var(--accent);cursor:pointer}
.btn{width:100%;padding:14px;border-radius:var(--radius);border:none;font-size:16px;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s;font-family:inherit}
.btn:active{transform:scale(0.98)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border-strong)}
.btn-danger{background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger-border)}
.btn-row{display:flex;gap:8px}
.btn-row .btn{flex:1}
.prog-wrap{display:flex;flex-direction:column;gap:6px}
.prog-bar{height:5px;background:var(--border);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .3s ease}
.prog-meta{display:flex;justify-content:space-between;font-size:13px;color:var(--text3)}
.q-num{font-size:13px;font-weight:600;color:var(--accent);margin-bottom:8px}
.q-text{font-size:18px;font-weight:600;color:var(--text);line-height:1.55}
.q-hint{font-size:13px;color:var(--text3);margin-top:7px}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{display:flex;align-items:flex-start;gap:11px;padding:13px 14px;border:1.5px solid var(--border);border-radius:var(--radius);cursor:pointer;background:var(--surface);transition:border-color .12s,background .12s;user-select:none}
.opt:hover{border-color:var(--border-strong)}
.opt.sel{border-color:var(--accent);background:var(--accent-bg)}
.opt.ok{border-color:var(--success-border);background:var(--success-bg)}
.opt.ng{border-color:var(--danger-border);background:var(--danger-bg)}
.opt-num{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border-strong);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;font-weight:600;color:var(--text3);margin-top:1px;transition:border-color .12s,background .12s,color .12s}
.opt.sel .opt-num{background:var(--accent);border-color:var(--accent);color:#fff}
.opt.ok .opt-num{background:var(--success);border-color:var(--success);color:#fff}
.opt.ng .opt-num{background:var(--danger);border-color:var(--danger);color:#fff}
.opt-text{font-size:16px;color:var(--text);line-height:1.5}
.opt.ok .opt-text{color:var(--success)}
.opt.ng .opt-text{color:var(--danger)}
.feedback{padding:11px 14px;border-radius:var(--radius);font-size:14px;line-height:1.5;display:none}
.feedback.ok{display:block;background:var(--success-bg);color:var(--success);border:1px solid var(--success-border)}
.feedback.ng{display:block;background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger-border)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.stat-val{font-size:28px;font-weight:700;color:var(--text)}
.stat-val.accent{color:var(--accent)}
.stat-lbl{font-size:13px;color:var(--text3);margin-top:3px}
.missed-list{display:flex;flex-direction:column;gap:8px;max-height:320px;overflow-y:auto}
.missed-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px}
.missed-q{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px;line-height:1.4}
.missed-ans{font-size:13px;color:var(--success)}
.sec-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3)}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:4px 0}
.topbar-title{font-size:18px;font-weight:700;color:var(--text)}
.topbar-back{font-size:14px;color:var(--accent);cursor:pointer;padding:4px 0}
.divider{border:none;border-top:1px solid var(--border);margin:2px 0}
</style>
</head>
<body>
<div id="wrap">

  <!-- HOME -->
  <div class="screen active" id="s-home">
    <div class="topbar">
      <span class="topbar-title">AWS SAP 문제풀기</span>
      <span class="badge">707문제</span>
    </div>
    <div class="toggle-row">
      <label class="toggle-label"><input type="checkbox" id="chk-instant" checked>즉시 정오답 확인</label>
      <label class="toggle-label"><input type="checkbox" id="chk-random" checked>랜덤 출제</label>
    </div>
    <button class="btn btn-primary" onclick="startQuiz()">시작하기</button>
    <hr class="divider">
    <div id="missed-start-wrap" class="hidden">
      <button class="btn btn-secondary" id="btn-missed-start" onclick="startMissedOnly()">오답만 풀기 (<span id="missed-count">0</span>문제)</button>
    </div>
    <button class="btn btn-danger" onclick="clearMissed()" id="btn-clear-missed" style="display:none">오답 기록 초기화</button>
  </div>

  <!-- QUIZ -->
  <div class="screen" id="s-quiz">
    <div class="topbar">
      <span class="topbar-back" onclick="showHome()">← 홈</span>
      <span id="score-live" style="font-size:14px;color:var(--text3)"></span>
    </div>
    <div class="prog-wrap">
      <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
      <div class="prog-meta"><span id="prog-txt"></span><span id="prog-pct"></span></div>
    </div>
    <div class="card">
      <div class="q-num" id="q-num"></div>
      <div class="q-text" id="q-text"></div>
      <div class="q-hint" id="q-hint"></div>
    </div>
    <div class="opts" id="opts"></div>
    <div class="feedback" id="fb"></div>
    <div class="btn-row">
      <button class="btn btn-primary" id="btn-check" onclick="checkAnswer()" disabled>확인</button>
      <button class="btn btn-primary hidden" id="btn-next" onclick="nextQ()">다음 →</button>
    </div>
  </div>

  <!-- RESULT -->
  <div class="screen" id="s-result">
    <div class="topbar"><span class="topbar-title">결과</span></div>
    <div class="stat-grid">
      <div class="stat"><div class="stat-val accent" id="r-score"></div><div class="stat-lbl">점수</div></div>
      <div class="stat"><div class="stat-val accent" id="r-pct"></div><div class="stat-lbl">정답률</div></div>
      <div class="stat"><div class="stat-val" id="r-ok"></div><div class="stat-lbl">정답</div></div>
      <div class="stat"><div class="stat-val" id="r-ng"></div><div class="stat-lbl">오답</div></div>
    </div>
    <div id="missed-sec" class="hidden" style="flex-direction:column;gap:8px">
      <div class="sec-label">오답 목록</div>
      <div class="missed-list" id="missed-list"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="showHome()">홈으로</button>
      <button class="btn btn-primary" id="btn-retry" onclick="retryMissed()">오답만 다시풀기</button>
    </div>
  </div>

</div>
<script>
var ALL_Q = [{"q": "회사는 하이브리드 DNS 솔루션을 설계해야 합니다. 이 솔루션은 VPC 내에 저장된 리소스에 대해 도메인 cloud.example.com에 대해 Amazon Route 53 프라이빗 호스팅 영역을 사용합니다. 회사에는 다음과 같은 DNS 확인 요구 사항이 있습니다. 온프레미스 시스템은 cloud.example.com을 확인하고 연결할 수 있어야 합니다. 모든 VPC는 cloud.example.com을 확인할 수 있어야 합니다. 온프레미스 회사 네트워크와 AWS 운송 게이트웨이(Transit Gateway) 사이에 이미 AWS Direct Connect 연결이 있습니다. 회사는 최고의 성능으로 이러한 요구 사항을 충족하기 위해 어떤 아키텍처를 사용해야 합니까?", "opts": ["프라이빗 호스팅 영역을 모든 VPC에 연결합니다. 공유 서비스 VPC에서 Route 53 인바운드 해석기를 생성합니다. 모든 VPC를 전송 게이트웨이에 연결하고 인바운드 해석기를 가리키는 cloud.example.com에 대한 온프레미스 DNS 서버에서 전달 규칙을 생성합니다.", "프라이빗 호스팅 영역을 모든 VPC에 연결합니다. 공유 서비스 VPC에 Amazon EC2 조건부 전달자를 배포합니다. 모든 VPC를 운송 게이트웨이((Transit Gateway)에 연결하고 조건부 전달자를 가리키는 cloud.example.com에 대한 온프레미스 DNS 서버에서 전달 규칙을 생성합니다.", "프라이빗 호스팅 영역을 공유 서비스 VPC에 연결공유 서비스 VPA에서 Route 53 아웃바운드 확인자 생성모든 VPC를 전송 게이트웨이에 연결하고 온프레미스 DNS 서버에서 아웃바운드를 가리키는 cloud.example.com용 전달 규칙 생성 리졸버.", "프라이빗 호스팅 영역을 공유 서비스 VPC에 연결합니다. 공유 서비스 VPC에서 Route 53 인바운드 해석기를 생성합니다. 공유 서비스 VPC를 운송 게이트웨이(Transit Gateway)에 연결하고 인바운드 해석기를 가리키는 cloud.example.com에 대한 온프레미스 DNS 서버에서 전달 규칙을 생성합니다."], "answers": [0]}, {"q": "한 회사에서 REST 기반 API를 통해 여러 고객에게 날씨 데이터를 제공하고 있습니다. API는 Amazon API Gateway에서 호스팅되며 각 API 작업에 대해 서로 다른 AWS Lambda 함수와 통합됩니다. 이 회사는 DNS에 Amazon Route 53을 사용하고 weather.example.com이라는 리소스 레코드를 생성했습니다. 회사는 API용 데이터를 Amazon DynamoDB 테이블에 저장합니다. 회사는 API가 다른 AWS 리전으로 장애 조치할 수 있는 기능을 제공하는 솔루션이 필요합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["새로운 지역에 새로운 Lambda 함수 세트를 배포합니다. 두 리전의 Lambda 함수를 대상으로 사용하여 엣지 최적화 API 엔드포인트를 사용하도록 API Gateway API를 업데이트합니다. DynamoDB 테이블을 전역 테이블로 변환합니다.", "다른 리전에 새 API Gateway API 및 Lambda 함수를 배포합니다. Route 53 DNS 레코드를 다중값 응답으로 변경합니다. 답변에 두 API 게이트웨이 API를 모두 추가합니다. 대상 상태 모니터링을 활성화합니다. DynamoDB 테이블을 전역 테이블로 변환합니다.", "다른 리전에 새 API Gateway API 및 Lambda 함수를 배포합니다. Route 53 DNS 레코드를 장애 조치 레코드로 변경합니다. 대상 상태 모니터링을 활성화합니다. DynamoDB 테이블을 전역 테이블로 변환합니다.", "새 리전에 새 API Gateway API를 배포합니다. Lambda 함수를 전역 함수로 변경합니다. Route 53 DNS 레코드를 다중값 응답으로 변경합니다. 답변에 두 API 게이트웨이 API를 모두 추가합니다. 대상 상태 모니터링을 활성화합니다. DynamoDB 테이블을 전역 테이블로 변환합니다."], "answers": [2]}, {"q": "회사는 Production이라는 단일 OU가 있는 AWS Organizations를 사용하여 여러 계정을 관리합니다. 모든 계정은 프로덕션 OU의 구성원입니다. 관리자는 조직의 루트에 있는 거부 목록 SCP를 사용하여 제한된 서비스에 대한 접근을 관리합니다. 이 회사는 최근 새로운 사업부를 인수하고 새 사업부의 기존 AWS 계정을 조직에 초대했습니다. 온보딩 후 새 사업부의 관리자는 회사 정책을 충족하기 위해 기존 AWS Config 규칙을 업데이트할 수 없음을 발견했습니다. 관리자가 추가 장기 유지 관리 없이 현재 정책을 변경하고 계속 시행할 수 있는 옵션은 무엇입니까?", "opts": ["AWS Config에 대한 접근을 제한하는 조직의 루트 SCP를 제거합니다. 회사의 표준 AWS Config 규칙에 대한 AWS Service Catalog 제품을 생성하고 새 계정을 포함하여 조직 전체에 배포합니다.", "새 계정에 대해 Onboarding이라는 임시 OU를 만듭니다. 온보딩 OU에 SCP를 적용하여 AWS Config 작업을 허용합니다. AWS Config 조정이 완료되면 새 계정을 프로덕션 OU로 이동합니다.", "조직의 루트 SCP를 거부 목록 SCP에서 허용 목록 SCP가 필요한 서비스만 허용하도록 변환합니다. 새 계정의 보안 주체에 대해서만 AWS Config 작업을 허용하는 SCP를 조직의 루트에 일시적으로 적용합니다.", "새 계정에 대해 Onboarding이라는 임시 OU를 만듭니다. 온보딩 OU에 SCP를 적용하여 AWS Config 작업을 허용합니다. 조직의 루트 SCP를 프로덕션 OU로 이동합니다. AWS Config 조정이 완료되면 새 계정을 프로덕션 OU로 이동합니다."], "answers": [3]}, {"q": "회사는 온프레미스 데이터 센터에서 2계층 웹 기반 애플리케이션을 실행하고 있습니다. 애플리케이션 계층은 상태 저장 애플리케이션을 실행하는 단일 서버로 구성됩니다. 애플리케이션은 별도의 서버에서 실행되는 PostgreSQL 데이터베이스에 연결됩니다. 애플리케이션의 사용자 기반이 크게 성장할 것으로 예상되므로 회사는 애플리케이션과 데이터베이스를 AWS로 마이그레이션하고 있습니다. 이 솔루션은 Amazon Aurora PostgreSQL, Amazon EC2 Auto Scaling 및 Elastic Load Balancing을 사용합니다. 애플리케이션 및 데이터베이스 계층을 확장할 수 있는 일관된 사용자 경험을 제공하는 솔루션은 무엇입니까?", "opts": ["Aurora 복제본에 대해 Aurora Auto Scaling을 활성화합니다. 최소 미결 요청 라우팅 알고리즘 및 고정 세션이 활성화된 Network Load Balancer를 사용하십시오.", "Aurora 작성자에 대해 Aurora Auto Scaling을 활성화합니다. 라운드 로빈 라우팅 알고리즘 및 고정 세션이 활성화된 Application Load Balancer를 사용합니다.", "Aurora 복제본에 대해 Aurora Auto Scaling을 활성화합니다. 라운드 로빈 라우팅 및 고정 세션이 활성화된 Application Load Balancer를 사용하십시오.", "Aurora 작성자에 대해 Aurora Scaling을 활성화합니다. 최소 미결 요청 라우팅 알고리즘 및 고정 세션이 활성화된 Network Load Balancer를 사용하십시오."], "answers": [2]}, {"q": "회사는 온프레미스에서 호스팅하는 애플리케이션에서 메타데이터를 수집하기 위해 서비스를 사용합니다. TV 및 인터넷 라디오와 같은 소비자 장치는 애플리케이션에 액세스합니다. 많은 구형 장치는 특정 HTTP 헤더를 지원하지 않으며 이러한 헤더가 응답에 있을 때 오류를 표시합니다. 회사는 User-Agent 헤더로 회사에서 식별한 이전 장치로 전송된 응답에서 지원되지 않는 헤더를 제거하도록 온프레미스 로드 밸런서를 API SendCommand 작업을 호출하여 문서를 실행하여 로그 파일을 복사하고 ABANDON을 Auto Scaling 그룹에 전송하여 인스턴스를 종료합니다."], "answers": [1]}, {"q": "회사에서 여러 AWS 계정을 사용하고 있습니다. DNS 레코드는 계정 A의 Amazon Route 53용 프라이빗 호스팅 영역에 저장됩니다. 회사의 애플리케이션과 데이터베이스는 계정 B에서 실행 중입니다. 솔루션 설계자는 새 VPC에 2계층 애플리케이션을 배포합니다. 구성을 단순화하기 위해 Amazon RDS 엔드포인트에 대한 db.example.com CNAME 레코드 세트가 Amazon Route 53용 프라이빗 호스팅 영역에 생성되었습니다. 배포 중에 응용 프로그램을 시작하지 못했습니다. 문제 해결 결과 Amazon EC2 인스턴스에서 db.example.com을 확인할 수 없는 것으로 나타났습니다. 솔루션 설계자는 레코드 세트가 Route 53에서 올바르게 생성되었음을 확인했습니다. 솔루션 설계자는 이 문제를 해결하기 위해 어떤 단계 조합을 수행해야 합니까? (2개 선택)", "opts": ["새 VPC의 별도 EC2 인스턴스에 데이터베이스를 배포합니다. 프라이빗 호스팅 영역에서 인스턴스의 프라이빗 IP에 대한 레코드 세트를 생성합니다.", "SSH를 사용하여 애플리케이션 계층 EC2 인스턴스에 연결합니다. RDS 엔드포인트 IP 주소를 /etc/resolv.conf 파일에 추가합니다.", "계정 A의 프라이빗 호스팅 영역을 계정 B의 새 VPC와 연결하기 위한 권한 부여를 생성합니다.", "계정 B에서 예제 com 도메인에 대한 프라이빗 호스팅 영역을 생성합니다. AWS 계정 간에 Route 53 복제를 구성합니다.", "계정 B의 새 VPC를 계정 A의 호스팅 영역과 연결합니다. 계정 A에서 연결 승인을 삭제합니다."], "answers": [2, 4]}, {"q": "한 회사에서 Amazon EC2 인스턴스를 사용하여 웹 플릿을 배포하여 블로그 사이트를 호스팅했습니다. EC2 인스턴스는 ALB(Application Load Balancer) 뒤에 있으며 Auto Scaling 그룹에서 구성됩니다. 웹 애플리케이션은 모든 블로그 콘텐츠를 Amazon EFS 볼륨에 저장합니다. 이 회사는 최근 블로거가 게시물에 동영상을 추가할 수 있는 기능을 추가하여 이전 사용자 트래픽의 10배를 끌어들였습니다. 하루 중 피크 시간에 사용자는 사이트에 접속하거나 비디오를 시청하려고 시도하는 동안 버퍼링 및 시간 초과 문제를 보고합니다. 사용자의 문제를 해결할 가장 비용 효율적이고 확장 가능한 배포는 무엇입니까?", "opts": ["최대 I/O를 활성화하도록 Amazon EFS를 재구성합니다.", "스토리지에 인스턴스 스토어 볼륨을 사용하도록 블로그 사이트를 업데이트합니다. 시작할 때 사이트 콘텐츠를 볼륨에 복사하고 종료할 때 Amazon S3에 복사합니다.", "Amazon CloudFront 배포를 구성합니다. 배포를 S3 버킷으로 지정하고 비디오를 EFS에서 Amazon S3로 마이그레이션합니다.", "모든 사이트 콘텐츠에 대해 Amazon CloudFront 배포를 설정하고 배포가 ALB를 가리키도록 합니다."], "answers": [2]}, {"q": "글로벌 사무소가 있는 회사에는 단일 AWS 리전에 대한 단일 1Gbps AWS Direct Connect 연결이 있습니다. 회사의 온프레미스 네트워크는 연결을 사용하여 AWS 클라우드에 있는 회사 리소스와 통신합니다. 연결에는 단일 VPC에 연결되는 단일 프라이빗 가상 인터페이스가 있습니다. 솔루션 설계자는 동일한 리전에서 중복 Direct Connect 연결을 추가하는 솔루션을 구현해야 합니다. 솔루션은 또한 회사가 다른 지역으로 확장함에 따라 동일한 Direct Connect 연결 쌍을 통해 다른 지역에 대한 연결을 제공해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["Direct Connect 게이트웨이를 프로비저닝합니  및 API Gateway로 구성된 상위 스택과 Lambda 함수를 포함하는 하위 스택으로 중첩된 AWS CloudFormation 스택을 생성하고 배포합니다. Lambda를 변경하려면 AWS CloudFormation 변경 세트를 생성하고 배포하십시오. 오류가 트리거되면 AWS CloudFormation 변경 세트를 이전 버전으로 되돌립니다.", "AWS SAM 및 내장 AWS CodeDeploy를 사용하여 새 Lambda 버전을 배포하고 트래픽을 새 버전으로 점진적으로 이동하고 트래픽 전 및 트래픽 후 테스트 기능을 사용하여 코드를 확인합니다. Amazon CloudWatch 경보가 트리거되면 롤백합니다.", "AWS CLI 스크립트를 새 Lambda 버전을 배포하는 단일 스크립트로 리팩터링합니다. 배포가 완료되면 스크립트 테스트가 실행됩니다. 오류가 감지되면 이전 Lambda 버전으로 되돌립니다.", "새 Lambda 버전을 참조하는 새 API 게이트웨이 엔드포인트로 구성된 AWS CloudFormation 스택을 생성하고 배포합니다. CloudFront 오리진을 새 API 게이트웨이 엔드포인트로 변경하고 오류를 모니터링하며 감지된 경우 AWS CloudFront 오리진을 이전 API 게이트웨이 엔드포인트로 변경합니다."], "answers": [1]}, {"q": "회사에서 대량의 보관 문서를 저장하고 회사 인트라넷을 통해 직원이 문서를 사용할 수 있도록 할 계획입니다. 직원은 VPC에 연결된 클라이언트 VPN 서비스를 통해 연결하여 시스템에 액세스합니다. 데이터는 대중이 접근할 수 없어야 합니다. 회사가 저장하고 있는 문서는 다른 곳의 물리적 매체에 보관된 데이터의 사본입니다. 요청 수가 적습니다. 가용성과 검색 속도는 회사의 관심사가 아닙니다. 최저 비용으로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["Amazon S3 버킷을 생성합니다. S3 One Zone-Infrequent Access(S3 One Zone-IA) 스토리지 클래스를 기본값으로 사용하도록 S3 버킷을 구성합니다. 웹 사이트 호스팅을 위해 S3 버킷을 구성합니다. S3 인터페이스 엔드포인트를 생성합니다. 해당 엔드포인트를 통해서만 접근을 허용하도록 S3 버킷을 구성합니다.", "웹 서버를 실행하는 Amazon EC2 인스턴스를 시작합니다. Amazon Elastic File System(Amazon EFS) 파일 시스템을 연결하여 보관된 데이터를 EFS One Zone-Infrequent Access(EFS One Zone-IA) 스토리지 클래스에 저장합니다. 프라이빗 네트워크에서만 액세스할 수 있도록 인스턴스 보안 그룹을 구성합니다.", "웹 서버를 실행하는 Amazon EC2 인스턴스를 시작합니다. Amazon Elastic Block Store(Amazon EBS) 볼륨을 연결하여 아카이브된 데이터를 저장합니다. Cold HDD(sc1) 볼륨 유형을 사용합니다. 사설 네트워크에서만 접근을 허용하도록 인스턴스 보안 그룹을 구성합니다.", "Amazon S3 버킷을 생성합니다. S3 Glacier Deep Archive 스토리지 클래스를 기본값으로 사용하도록 S3 버킷을 구성합니다. 웹 사이트 호스팅을 위해 S3 버킷을 구성합니다. S3 인터페이스 엔드포인트를 생성합니다. 해당 엔드포인트를 통해서만 접근을 허용하도록 S3 버킷을 구성합니다."], "answers": [0]}, {"q": "회사에서 사용자 인증을 위해 온프레미스 Active Directory 서비스를 사용하고 있습니다. 회사는 동일한 인증 서비스를 사용하여 AWS Organizations를 사용하는 회사의 AWS 계정에 로그인하려고 합니다. 온프레미스 환경과 회사의 모든 AWS 계정 간에 AWS Site-to-Site VPN 연결이 이미 존재합니다. 회사의 보안 정책에 따라 사용자 그룹 및 역할에 따라 계정에 대한 조건부 액세스가 필요합니다. 사용자 ID는 단일 위치에서 관리되어야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["SAML 2.0을 사용하여 Active Directory에 연결하도록 AWS IAM Identity Center(AWS Single Sign-On)를 구성합니다. SCIM(System for Cross-domain Identity Management) v2.0 프로토콜을 사용하여 자동 프로비저닝을 활성화합니다. ABAC(속성 기반 액세스 제어)를 사용하여 AWS 계정에 대한 액세스 권한을 부여합니다.", "IAM Identity Center를 자격 증명 소스로 사용하여 AWS IAM Identity Center(AWS Single Sign-On)를 구성합니다. SCIM(System for Cross-domain Identity Management) v2.0 프로토콜을 사용하여 자동 프로비저닝을 활성화합니다. IAM Identity Center 권한 집합을 사용하여 AWS 계정에 대한 액세스 권한을 부여합니다.", "회사의 AWS 계정 중 하나에서 SAML 2.0 자격 증명 공급자를 사용하도록 AWS Identity and Access Management(IAM)를 구성합니다. 연동 사용자에 매핑된 IAM 사용자를 프로비저닝합니다. Active Directory의 적절한 그룹에 해당하는 액세스 권한을 부여합니다. 교차 계정 IAM 사용자를 사용하여 필요한 AWS 계정에 대한 액세스 권한을 부여합니다.", "회사의 AWS 계정 중 하나에서 OIDC(OpenID Connect) 자격 증명 공급자를 사용하도록 AWS Identity and Access Management(IAM)를 구성합니다. Active Directory의 적절한 그룹에 해당하는 연동 사용자의 AWS 계정에 대한 액세스 권한을 부여하는 IAM 역할을 프로비저닝합니다. 교차 계정 IAM 역할을 사용하여 필요한 AWS 계정에 대한 액세스 권한을 부여합니다."], "answers": [0]}, {"q": "소프트웨어 회사는 Amazon API Gateway, AWS Lambda 함수 및 Amazon DynamoDB 테이블을 사용하여 REST API를 사용하는 애플리케이션을 배포했습니다. 애플리케이션에서 PUT 요청 중 오류 수가 증가한 것으로 나타났습니다. 대부분의 PUT 호출은 특정 API 키로 인증된 소수의 클라이언트에서 발생합니다. 솔루션 설계자는 많은 수의 PUT 요청이 한 클라이언트에서 발생함을 확인했습니다. API는 중요하지 않으며 클라이언트는 실패한 호출의 재시도를 허용할 수 있습니다. 그러나 오류가 고객에게 표시되어 API 평판이 손상됩니다. 솔루션 설계자는 고객 경험을 개선하기 위해 무엇을 추천해야 합니까?", "opts": ["클라이언트 응용 프로그램에서 지수 백오프 및 불규칙한 변형으로 재시도 논리를 구현합니다. 설명 오류 메시지로 오류를 포착하고 처리하는지 확인하십시오.", "API 게이트웨이 수준에서 사용량 계획을 통해 API 조절을 구현합니다. 클라이언트 애플리케이션이 오류 없이 코드 429 응답을 처리하는지 확인하십시오.", "API 캐싱을 켜서 프로덕션 단계의 응답성을 높입니다. 10분 부하 테스트를 실행합니다. 캐시 용량이 워크로드에 적합한지 확인합니다.", "Lambda 기능 수준에서 예약된 동시성을 구현하여 트래픽이 갑자기 증가하는 동안 필요한 리소스를 제공합니다."], "answers": [1]}, {"q": "한 회사가 AWS에서 데이터 집약적인 애플리케이션을 실행하고 있습니다. 이 애플리케이션은 수백 개의 Amazon EC2 인스턴스로 구성된 클러스터에서 실행됩니다. 공유 파일 시스템은 200TB의 데이터를 저장하는 여러 EC2 인스턴스에서도 실행됩니다. 애플리케이션은 공유 파일 시스템의 데이터를 읽고 수정하며 보고서를 생성합니다. 작업은 한 달에 한 번 실행되며 공유 파일 시스템에서 파일의 하위 집합을 읽고 완료하는 데 약 72시간이 걸립니다. 컴퓨트 인스턴스는 Auto Scaling 그룹에서 확장되지만 공유 파일 시스템을 호스팅하는 인스턴스는 계속 실행됩니다. 컴퓨팅 및 스토리지 인스턴스는 모두  기능이 활성화된 AWS Organizations 계정 구조를 사용하고 조달 관리자가 사용할 각 조직 단위(OU)에 공유 서비스 계정을 가지고 있습니다. 조달 팀의 정책에 따르면 개발자는 승인된 목록에서만 타사 소프트웨어를 얻을 수 있어야 하며 AWS Marketplace에서 Private Marketplace를 사용하여 이 요구 사항을 충족할 수 있어야 합니다. 조달 팀은 Private Marketplace의 관리가 조달 관리자가 맡을 수 있는 조달-관리자-역할이라는 역할로 제한되기를 원합니다. 회사의 다른 IAM 사용자, 그룹, 역할 및 계정 관리자는 Private Marketplace 관리 액세스가 거부되어야 합니다. 이러한 요구 사항을 충족하는 아키텍처를 설계하는 가장 효율적인 방법은 무엇입니까?", "opts": ["조직의 모든 AWS 계정에서 procurement-manager-role이라는 IAM 역할을 생성합니다. 역할에 PowerUserAccess 관리 정책을 추가합니다. 모든 AWS 계정의 모든 IAM 사용자 및 역할에 인라인 정책을 적용하여 AWSPrivateMarketplaceAdminFullAccess 관리형 정책에 대한 권한을 거부합니다.", "조직의 모든 AWS 계정에서 procurement-manager-role이라는 IAM 역할을 생성합니다. 역할에 AdministratorAccess 관리 정책을 추가합니다. AWSPrivateMarketplaceAdminFullAccess 관리형 정책으로 권한 경계를 정의하고 이를 모든 개발자 역할에 연결합니다.", "조직의 모든 공유 서비스 계정에서 procurement-manager-role이라는 IAM 역할을 만듭니다. 역할에 AWSPrivateMarketplaceAdminFullAccess 관리형 정책을 추가합니다. procurement-manager-role이라는 역할을 제외한 모든 사람에게 Private Marketplace를 관리할 수 있는 권한을 거부하는 조직 루트 수준 SCP를 만듭니다. 다른 조직 루트 수준 SCP를 생성하여 조직의 모든 사람에게 procurement-manager-role이라는 IAM 역할을 생성할 수 있는 권한을 거부합니다.", "개발자가 사용할 모든 AWS 계정에서 procurement-manager-role이라는 IAM 역할을 생성합니다. 역할에 AWSPrivateMarketplaceAdminFullAccess 관리형 정책을 추가합니다. 조직에서 SCP를 생성하여 procurement-manager-role이라는 역할을 제외한 모든 사람에게 Private Marketplace를 관리할 수 있는 권한을 거부합니다. 조직의 모든 공유 서비스 계정에 SCP를 적용합니다."], "answers": [2]}, {"q": "회사는 개발자가 Amazon EC2, Amazon S3 및 Amazon DynamoDB만 사용하도록 제한하기 위해 AWS Organizations를 구현하는 과정에 있습니다. 개발자 계정은 전용 조직 단위(OU)에 상주합니다. 솔루션 설계자는 개발자 계정에 다음 SCP를 구현했습니다. 이 정책이 배포되면 개발자 계정의 IAM 사용자는 정책에 나열되지 않은 AWS 서비스를 계속 사용할 수 있습니다. 이 정책의 범위를 벗어난 서비스를 사용하는 개발자의 능력을 제거하기 위해 솔루션 설계자는 무엇을 해야 합니까?", "opts": ["제한해야 하는 각 AWS 서비스에 대해 명시적인 거부 문을 만듭니다.", "개발자 계정의 OU에서 FullAWSAccess SCP를 제거합니다.", "모든 서비스를 명시적으로 거부하도록 FullAWSAccess SCP를 수정합니다.", "SCP 끝에 와일드카드를 사용하여 명시적인 거부 문을 추가합니다."], "answers": [1]}, {"q": "한 회사가 VPC의 퍼블릭 서브넷에 있는 5개의 Amazon EC2 인스턴스에서 모바일 앱용 모놀리식 REST 기반 API를 호스팅하고 있습니다. 모바일 클라이언트는 Amazon Route 53에서 호스팅되는 도메인 이름을 사용하여 API에 연결합니다. 회사는 모든 EC2 인스턴스의 IP 주소로 Route 53 다중값 응답 라우팅 정책을 생성했습니다. 최근 이 앱은 갑작스러운 대규모 트래픽 증가에 압도당했습니다. 앱이 트래픽을 따라잡지 못했습니다. 솔루션 설계자는 앱이 새롭고 다양한 로드를 처리할 수 있도록 솔루션을 구현해야 합니다. 최소한의 운영 오버헤드로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["API를 개별 AWS Lambda 함수로 분리합니다. 백엔드에 대한 Lambda 통합으로 Amazon API Gateway REST API를 구성합니다. API Gateway API를 가리키도록 Route 53 레코드를 업데이트합니다.", "API 로직을 컨테이너화합니다. Amazon Elastic Kubernetes Service(Amazon EKS) 클러스터를 생성합니다. Amazon EC2를 사용하여 클러스터에서 컨테이너를 실행합니다. Kubernetes 인그레스를 만듭니다. Kubernetes 수신을 가리키도록 Route 53 레코드를 업데이트합니다.", "Auto Scaling 그룹을 생성합니다. Auto Scaling 그룹에 모든 EC2 인스턴스를 배치합니다. CPU 사용률을 기반으로 조정 작업을 수행하도록 Auto Scaling 그룹을 구성합니다. Auto Scaling 그룹 변경에 반응하고 Route 53 레코드를 업데이트하는 AWS Lambda 함수를 생성합니다.", "API 앞에 Application Load Balancer(ALB)를 생성합니다. EC2 인스턴스를 VPC의 프라이빗 서브넷으로 이동합니다. ALB의 대상으로 EC2 인스턴스를 추가합니다. ALB를 가리키도록 Route 53 레코드를 업데이트합니다."], "answers": [0]}, {"q": "회사에서 각 엔지니어링 팀을 위해 AWS Organizations에 OU를 생성했습니다. 각 OU는 여러 AWS 계정을 소유합니다. 조직에는 수백 개의 AWS 계정이 있습니다. 솔루션 설계자는 각 OU가 AWS 계정 전체의 사용 비용 내역을 볼 수 있도록 솔루션을 설계해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["AWS Resource Access Manager를 사용하여 각 OU에 대한 AWS 비용 및 사용 보고서(CUR)를 생성합니다. 각 팀이 Amazon QuickSight 대시보드를 통해 CUR을 시각화하도록 허용합니다.", "AWS Organizations 마스터 계정에서 AWS 비용 및 사용 보고서(CUR)를 생성합니다. 각 팀이 Amazon QuickSight 대시보드를 통해 CUR을 시각화하도록 허용합니다.", "각 AWS Organizations 멤버 계정에서 AWS 비용 및 사용 보고서(CUR)를 생성합니다. 각 팀이 Amazon QuickSight 대시보드를 통해 CUR을 시각화하도록 허용합니다.", "AWS Systems Manager를 사용하여 AWS 비용 및 사용 보고서(CUR)를 생성합니다. 각 팀이 Systems Manager OpsCenter 대시보드를 통해 CUR을 시각화할 수 있습니다."], "answers": [1]}, {"q": "회사는 Windows 파일 서버에 온프레미스로 데이터를 저장하고 있습니다. 회사는 매일 5GB의 새로운 데이터를 생성합니다. 이 회사는 Windows 기반 워크로드의 일부를 AWS로 마이그레이션했으며 클라우드의 파일 시스템에서 데이터를 사용할 수 있어야 합니다. 회사는 이미 온프레미스 네트워크와 AWS 간에 AWS Direct Connect 연결을 설정했습니다. 회사는 어떤 데이터 마이그레이션 전략을 사용해야 합니까?", "opts": ["AWS Storage Gateway의 파일 게이트웨이 옵션을 사용하여 기존 Windows 파일 서버를 교체하고 기존 파일 공유가 새 파일 게이트웨이를 가리키도록 합니다.", "AWS DataSync를 사용하여 온프레미스 Windows 파일 서버와 Amazon FSx 간에 데이터를 복제하는 일일 작업을 예약합니다.", "AWS Data Pipeline을 사용하여 온프레미스 Windows 파일 서버와 Amazon Elastic File System(Amazon EFS) 간에 데이터를 복제하는 일일 작업을 예약합니다.", "AWS DataSync를 사용하여 온프레미스 Windows 파일 서버와 Amazon Elastic File System(Amazon EFS) 간에 데이터를 복제하는 일일 작업을 예약합니다."], "answers": [1]}, {"q": "회사의 솔루션 아키텍트가 AWS에서 실행되는 웹 애플리케이션을 검토하고 있습니다. 애플리케이션은 us-east-1 리전의 Amazon S3 버킷에 있는 정적 자산을 참조합니다. 회사는 여러 AWS 리전에서 복원력이 필요합니다. 회사는 이미 두 번째 리전에 S3 버킷을 생성했습니다. 최소한의 운영 오버헤드로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["각 객체를 두 S3 버킷에 쓰도록 애플리케이션을 구성합니다. 각 S3 버킷에 대한 가중 라우팅 정책을 사용하여 레코드 세트로 Amazon Route 53 퍼블릭 호스팅 영역을 설정합니다. Route 53 DNS 이름을 사용하여 객체를 참조하도록 애플리케이션을 구성합니다.", "us-east-1의 S3 버킷에서 두 번째 리전의 S3 버킷으로 객체를 복사하는 AWS Lambda 함수를 생성합니다. 객체가 us-east-1의 S3 버킷에 기록될 때마다 Lambda 함수를 호출합니다. 두 개의 S3 버킷을 오리진으로 포함하는 오리진 그룹으로 Amazon CloudFront 배포를 설정합니다.", "두 번째 리전의 S3 버킷에 개체를 복제하도록 us-east-1의 S3 버킷에서 복제를 구성합니다. 두 개의 S3 버킷을 오리진으로 포함하는 오리진 그룹으로 Amazon CloudFront 배포를 설정합니다.", "두 번째 리전의 S3 버킷에 개체를 복제하도록 us-east-1의 S3 버킷에서 복제를 구성합니다. 장애 조치가 필요한 경우 두 번째 리전의 S3 버킷에서 S3 객체를 로드하도록 애플리케이션 코드를 업데이트합니다."], "answers": [2]}, {"q": "회사는 온프레미스 환경에서 3계층 웹 애플리케이션을 호스팅하고 있습니다. 최근 트래픽 급증으로 인해 가동 중지 시간이 발생하고 재정적으로 상당한 영향을 받았기 때문에 회사 경영진은 애플리케이션을 AWS로 이전하도록 명령했습니다. 애플리케이션은 .NET으로 작성되었으며 MySQL 데이터베이스에 종속됩니다. 솔루션 설계자는 일일 사용자 200,000명의 수요를 충족할 수 있는 확장 가능하고 가용성이 높은 솔루션을 설계해야 합니다. 솔루션 설계자는 적절한 솔루션을 설계하기 위해 어떤 단계를 수행해야 합니까?", "opts": ["AWS Elastic Beanstalk를 사용하여 웹 서버 환경과 Amazon RDS MySQL 다중 AZ DB 인스턴스로 새 애플리케이션을 만듭니다. 환경은 여러 가용 영역의 Amazon EC2 Auto Scaling 그룹 앞에서 Network Load Balancer(NLB)를 시작해야 합니다. Amazon Route 53 별칭 레코드를 사용하여 회사 도메인에서 NLB로 트래픽을 라우팅합니다.", "AWS CloudFormation을 사용하여 3개의 가용 영역에 걸쳐 있는 Amazon EC2 Auto Scaling 그룹 앞에 Application Load Balancer(ALB)가 포함된 스택을 시작합니다. 스택은 삭제 유지 정책을 사용하여 Amazon Aurora MySQL DB 클러스터의 다중 AZ 배포를 시작해야 합니다. Amazon Route 53 별칭 레코드를 사용하여 회사 도메인에서 ALB로 트래픽을 라우팅합니다.", "AWS Elastic Beanstalk를 사용하여 각 지역에 Application Load Balancer(ALB)가 있는 두 개의 개별 지역에 걸쳐 있는 자동 확장 웹 서버 환경을 만듭니다. 리전 간 읽기 전용 복제본이 있는 Amazon Aurora MySQL DB 클러스터의 다중 AZ 배포를 스팅하고 있습니다. VPC는 두 가용 영역에 걸쳐 확장됩니다. 각 가용 영역에는 퍼블릭 서브넷 1개와 프라이빗 서브넷 1개가 포함됩니다. 이 서비스는 프라이빗 서브넷의 Amazon EC2 인스턴스에서 실행됩니다. 퍼블릭 서브넷의 Application Load Balancer는 서비스 앞에 있습니다. 서비스는 인터넷과 통신해야 하며 두 개의 NAT 게이트웨이를 통해 통신합니다. 이 서비스는 이미지 저장을 위해 Amazon S3를 사용합니다. EC2 인스턴스는 매일 S3 버킷에서 약 1TВ의 데이터를 검색합니다. 회사는 서비스를 매우 안전하다고 홍보했습니다. 솔루션 설계자는 서비스의 보안 태세를 손상시키거나 진행 중인 작업에 소요되는 시간을 늘리지 않으면서 클라우드 지출을 최대한 줄여야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["NAT 게이트웨이를 NAT 인스턴스로 교체합니다. VPC 경로 테이블에서 프라이빗 서브넷에서 NAT 인스턴스로의 경로를 만듭니다.", "EC2 인스턴스를 퍼블릭 서브넷으로 이동합니다. NAT 게이트웨이를 제거합니다.", "VPA에서 S3 게이트웨이 VPC 엔드포인트를 설정합니다. 엔드포인트 정책을 엔드포인트에 연결하여 S3 버킷에서 필요한 작업을 허용합니다.", "EC2 인스턴스에 Amazon Elastic File System(Amazon EFS) 볼륨을 연결합니다. EFS 볼륨에서 이미지를 호스팅합니다."], "answers": [2]}, {"q": "한 회사가 최근 AWS에 애플리케이션을 배포했습니다. 애플리케이션은 Amazon DynamoDB를 사용합니다. 회사는 애플리케이션 부하를 측정하고 DynamoDB 테이블의 RCU 및 WCU를 예상 최대 부하와 일치하도록 구성했습니다. 최대 부하는 4시간 동안 일주일에 한 번 발생하며 평균 부하의 두 배입니다. 애플리케이션 로드는 나머지 주의 평균 로드에 가깝습니다. 액세스 패턴에는 테이블 읽기보다 테이블에 대한 쓰기가 더 많이 포함됩니다. 솔루션 설계자는 테이블 비용을 최소화하는 솔루션을 구현해야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["피크 기간 동안 용량을 늘리려면 AWS Application Auto Scaling을 사용하십시오. 예약된 RCU 및 WCU를 구매하여 평균 부하에 맞춥니다.", "테이블에 대한 온디맨드 용량 모드를 구성합니다.", "테이블 앞에 DynamoDB Accelerator(DAX)를 구성합니다. 프로비저닝된 읽기 용량을 테이블의 새로운 최대 로드와 일치하도록 줄입니다.", "테이블 앞에 DynamoDB Accelerator(DAX)를 구성합니다. 테이블에 대한 온디맨드 용량 모드를 구성합니다."], "answers": [0]}, {"q": "솔루션 설계자는 온프레미스 데이터 처리 애플리케이션을 AWS 클라우드로 마이그레이션하는 방법에 대해 회사에 조언해야 합니다. 현재 사용자는 웹 포털을 통해 입력 파일을 업로드합니다. 그런 다음 웹 서버는 업로드된 파일을 NAS에 저장하고 메시지 대기열을 통해 처리 서버에 메시지를 보냅니다. 각 미디어 파일을 처리하는 데 최대 1시간이 걸릴 수 있습니다. 회사는 처리 대기 중인 미디어 파일의 수가 업무 시간 동안 훨씬 더 많고 업무 시간 이후에는 파일 수가 급격히 감소한다는 사실을 확인했습니다. 가장 비용 효율적인 마이그레이션 권장 사항은 무엇입니까?", "opts": ["Amazon SQS를 사용하여 대기열을 생성합니다. 새 대기열에 게시하도록 기존 웹 서버를 구성합니다. 대기열에 메시지가 있으면 AWS Lambda 함수를 호출하여 대기열에서 요청을 가져와 파일을 처리합니다. 처리된 파일을 Amazon S3 버킷에 저장합니다.", "Amazon MQ를 사용하여 대기열을 생성합니다. 새 대기열에 게시하도록 기존 웹 서버를 구성합니다. 대기열에 메시지가 있는 경우 새 Amazon EC2 인스턴스를 생성하여 대기열에서 요청을 끌어오고 파일을 처리합니다. 처리된 파일을 Amazon EFS에 저장합니다. 작업이 완료된 후 EC2 인스턴스를 종료합니다.", "Amazon MQ를 사용하여 대기열을 생성합니다. 새 대기열에 게시하도록 기존 웹 서버를 구성합니다. 대기열에 메시지가 있으면 AWS Lambda 함수를 호출하여 대기열에서 요청을 가져와 파일을 처리합니다. 처리된 파일을 Amazon EFS에 저장합니다.", "Amazon SQS를 사용하여 대기열을 생성합니다. 새 대기열에 게시하도록 기존 웹 서버를 구성합니다. EC2 Auto Scaling 그룹의 Amazon EC2 인스턴스를 사용하여 대기열에서 요청을 가져오고 파일을 처리합니다. SQS 대기열 길이를 기준으로 EC2 인스턴스를 확장합니다. 처리된 파일을 Amazon S3 버킷에 저장합니다."], "answers": [3]}, {"q": "회사에서 Amazon OpenSearch Service를 사용하여 데이터를 분석하고 있습니다. 회사는 S3 Standard 스토리지를 사용하는 Amazon S3 버킷에서 10개의 데이터 노드가 있는 OpenSearch Service 클러스터로 데이터를 로드합니다. 데이터는 읽기 전용 분석을 위해 1개월 동안 클러스터에 상주합니다. 1개월 후 회사는 데이터가 포함된 인덱스를 클러스터에서 삭제합니다. 규정 준수를 위해 회사는 모든 입력 데이터의 사본을 보관해야 합니다. 회사는 지속적인 비용에 대해 우려하고 있으며 솔루션 설계자에게 새로운 솔루션을 추천해 달라고 요청합니다. 이러한 요구 사항을 가장 비용 효율적으로 충족하는 솔루션은 무엇입니까?", "opts": ["모든 데이터 노드를 UltraWarm 노드로 교체하여 예상 용량을 처리합니다. 회사에서 데이터를 클러스터에 로드할 때 입력 데이터를 S3 Standard에서 S3 Glacier Deep Archive로 전환합니다.", "클러스터의 데이터 노드 수를 2개로 줄입니다. UltraWarm 노드를 추가하여 예상 용량을 처리합니다. OpenSearch Service가 데이터를 수집할 때 UltraWarm으로 전환하도록 인덱스를 구성합니다. S3 수명 주기 정책을 사용하여 1개월 후에 입력 데이터를 S3 Glacier Deep Archive로 전환합니다.", "클러스터의 데이터 노드 수를 2로 줄입니다. UltraWarm 노드를 추가하여 예상 용량을 처리합니다. OpenSearch Service가 데이터를 수집할 때 UltraWarm으로 전환하도록 인덱스를 구성합니다. 클러스터에 콜드 스토리지 노드 추가 인덱스를 UltraWarm에서 콜드 스토리지로 전환합니다. S3 수명 주기 정책을 사용하여 1개월 후 S3 버킷에서 입력 데이터를 삭제합니다.", "클러스터의 데이터 노드 수를 2개로 줄입니다. 인스턴스 지원 데이터 노드를 추가하여 예상 용량을 처리합니다. 회사에서 데이터를 클러스터에 로드할 때 입력 데이터를 S3 Standard에서 S3 Glacier Deep Archive로 전환합니다."], "answers": [1]}, {"q": "회사에는 AWS Organizations의 조직에 속하는 10개의 계정이 있습니다. AWS Config는 각 계정에서 구성됩니다. 모든 계정은 Prod OU 또는 NonProd OU에 속합니다. 회사는 소스가 0.0.0.0/0인 Amazon EC2 보안 그룹 인바운드 규칙이 생성될 때 Amazon Simple Notification Service(Amazon SNS) 주제에 알리도록 각 AWS 계정에 Amazon EventBridge 규칙을 설정했습니다. 회사의 보안팀이 SNS 주제를 구독하고 있습니다. NonProd OU의 모든 계정에 대해 보안 팀은 0.0.0.0/0을 소스로 포함하는 보안 그룹 인바운드 규칙을 생성하는 기능을 제거해야 합니다. 최소한의 운영 오버헤드로 이 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["AWS Lambda 함수를 호출하여 보안 그룹 인바운드 규칙을 제거하고 SNS 주제에 게시하도록 EventBridge 규칙을 수정합니다. 업데이트된 규칙을 NonProd OU에 배포합니다.", "NonProd OU에 vpc-sg-open-only-to-authorized-ports AWS Config 관리 규칙을 추가합니다.", "aws:SourceIp 조건 키의 값이 0.0.0.0/0이 아닌 경우 ec2:AuthorizeSecurityGroupIngress 작업을 허용하도록 SCP를 구성합니다. SCP를 NonProd OU에 적용합니다.", "aws:SourceIp 조건 키의 값이 0.0.0.0/0일 때 ec2:AuthorizeSecurityGroupIngress 작업을 거부하도록 SCP를 구성합니다. SCP를 NonProd OU에 적용합니다."], "answers": [3]}, {"q": "회사는 온프레미스 데이터 센터에서 Git 리포지토리를 호스팅합니다. 이 회사는 웹후크를 사용하여 AWS 클라우드에서 실행되는 기능을 호출합니다. 회사는 Application Load Balancer(ALB)의 대상으로 설정한 Auto Scaling 그룹의 Amazon EC2 인스턴스 세트에서 웹후크 로직을 호스팅합니다. Git 서버는 구성된 웹후크에 대해 ALB를 호출합니다. 회사는 솔루션을 서버리스 아키텍처로 이동하려고 합니다. 최소한의 운영 오버헤드로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["각 Webhook에 대해 AWS Lambda 함수 URL을 생성하고 구성합니다. 개별 Lambda 함수 URL을 호출하도록 Git 서버를 업데이트합니다.", "Amazon API Gateway HTTP API를 생성합니다. 별도의 AWS Lambda 함수에서 각 Webhook 로직을 구현합니다. API Gateway 엔드포인트를 호출하도록 Git 서버를 업데이트합니다.", "Webhook 로직을 AWS App Runner에 배포합니다. ALB를 생성하고 App Runner를 대상으로 설정합니다. ALB 엔드포인트를 호출하도록 Git 서버를 업데이트합니다.", "웹후크 로직을 컨테이너화합니다. Amazon Elastic Container Service(Amazon ECS) 클러스터를 생성하고 AWS Fargate에서 웹후크 로직을 실행합니다. Amazon API Gateway REST API를 생성하고 Fargate를 대상으로 설정합니다. API Gateway 엔드포인트를 호출하도록 Git 서버를 업데이트합니다."], "answers": [1]}, {"q": "한 회사에서 1,000개의 온프레미스 서버를 AWS로 마이그레이션할 계획입니다. 서버는 회사 데이터 센터의 여러 VMware 클러스터에서 실행됩니다. 마이그레이션 계획의 일부로 회사는 CPU 세부 정보, RAM 사용량, 운영 체제 정보 및 실행 중인 프로세스와 같은 서버 메트릭을 수집하려고 합니다. 그런 다음 회사는 데이터를 쿼리하고 분석하려고 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["온프레미스 호스트에서 AWS Agentless Discovery Connector 가상 어플라이언스를 배포하고 구성합니다. AWS Migration Hub에서 데이터 탐색을 구성합니다. AWS Glue를 사용하여 데이터에 대해 ETL 작업을 수행합니다. Amazon S3 Select를 사용하여 데이터를 쿼리합니다.", "온프레미스 호스트에서 VM 성능 정보만 내보냅니다. 필요한 데이터를 AWS Migration Hub로 직접 가져옵니다. Migration Hub에서 누락된 정보를 업데이트합니다. Amazon QuickSight를 사용하여 데이터를 쿼리합니다.", "온프레미스 호스트에서 서버 정보를 자동으로 수집하는 스크립트를 만듭니다. AWS CLI를 사용하여 put-resource-attributes 명령을 실행하여 자세한 서버 데이터를 AWS Migration Hub에 저장합니다. Migration Hub 콘솔에서 직접 데이터를 쿼리합니다.", "각 온프레미스 서버에 AWS Application Discovery Agent를 배포합니다. AWS Migration Hub에서 데이터 탐색을 구성합니다. Amazon Athena를 사용하여 A answers": [2]}, {"q": "건강 보험 회사는 Amazon S3 버킷에 개인 식별 정보(PII)를 저장합니다. 회사는 S3 관리형 암호화 키(SSE-S3)로 서버 측 암호화를 사용하여 개체를 암호화합니다. 새로운 요구 사항에 따라 S3 버킷의 모든 현재 및 미래 개체는 회사의 보안 팀이 관리하는 키로 암호화되어야 합니다. S3 버킷에 버전 관리가 활성화되어 있지 않습니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["S3 버킷 속성에서 고객 관리형 키를 사용하여 기본 암호화를 SSE-S3로 변경합니다. AWS CLI를 사용하여 S3 버킷의 모든 객체를 다시 업로드합니다. 암호화되지 않은 PutObject 요청을 거부하도록 S3 버킷 정책을 설정합니다.", "S3 버킷 속성에서 기본 암호화를 AWS KMS 관리형 암호화 키(SSE-KMS)를 사용한 서버 측 암호화로 변경합니다. 암호화되지 않은 PutObject 요청을 거부하도록 S3 버킷 정책을 설정합니다. AWS CLI를 사용하여 S3 버킷의 모든 객체를 다시 업로드합니다.", "S3 버킷 속성에서 기본 암호화를 AWS KMS 관리형 암호화 키(SSE-KMS)를 사용하는 서버 측 암호화로 변경합니다. GetObject 및 PutObject 요청에서 객체를 자동으로 암호화하도록 S3 버킷 정책을 설정합니다.", "S3 버킷 속성에서 고객 관리 키를 사용하여 기본 암호화를 AES-256으로 변경합니다. S3 버킷에 액세스하는 모든 엔터티에 대한 암호화되지 않은 PutObject 요청을 거부하는 정책을 연결합니다. AWS CLI를 사용하여 S3 버킷의 모든 객체를 다시 업로드합니다."], "answers": [1]}, {"q": "회사는 AWS 클라우드에서 웹 애플리케이션을 실행하고 있습니다. 애플리케이션은 Amazon EC2 인스턴스 세트에서 생성되는 동적 콘텐츠로 구성됩니다. EC2 인스턴스는 Application Load Balancer(ALB)의 대상 그룹으로 구성된 Auto Scaling 그룹에서 실행됩니다. 이 회사는 Amazon CloudFront 배포를 사용하여 애플리케이션을 전 세계에 배포하고 있습니다. CloudFront 배포는 ALB를 오리진으로 사용합니다. 이 회사는 DNS에 Amazon Route 53을 사용하고 CloudFront 배포를 위해 www.example.com의 A 레코드를 생성했습니다. 솔루션 설계자는 가용성이 높고 내결함성이 있도록 애플리케이션을 구성해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["다른 AWS 리전에서 전체 보조 애플리케이션 배포를 프로비저닝합니다. 장애 조치 레코드가 되도록 Route 53 A 레코드를 업데이트합니다. 두 CloudFront 배포를 모두 값으로 추가합니다. Route 53 상태 확인을 생성합니다.", "다른 AWS 리전에서 ALB, Auto Scaling 그룹 및 EC2 인스턴스를 프로비저닝합니다. CloudFront 배포를 업데이트하고 새 AL에 대한 두 번째 오리진을 생성합니다. 두 오리진에 대한 오리진 그룹을 만듭니다. 하나의 오리진을 기본으로, 하나의 오리진을 보조로 구성하십시오.", "다른 AWS 지역에서 Auto Scaling 그룹 및 EC2 인스턴스를 프로비저닝합니다. ALB에서 새 Auto Scaling 그룹에 대한 두 번째 대상을 생성합니다. ALB에서 장애 조치 라우팅 알고리즘을 설정합니다.", "다른 AWS 리전에서 완전한 보조 애플리케이션 배포를 프로비저닝합니다. 두 번째 CloudFront 배포를 생성하고 새 애플리케이션 설정을 오리진으로 추가합니다. AWS Global Accelerator 액셀러레이터를 생성합니다. 두 CloudFront 배포를 엔드포인트로 추가합니다."], "answers": [1]}, {"q": "한 회사에 AWS Organizations에 AWS 계정이 많은 조직이 있습니다. AWS 계정 중 하나는 전송 계정으로 지정되며 다른 모든 AWS 계정과 공유되는 전송 게이트웨이가 있습니다. AWS Site-to-Site VPN 연결은 회사의 모든 글로벌 사무소와 전송 계정 간에 구성됩니다. 이 회사는 모든 계정에서 AWS Config를 활성화했습니다. 회사의 네트워킹 팀은 글로벌 사무소에 속하는 내부 IP 주소 범위 목록을 중앙에서 관리해야 합니다. 개발자는 이 목록을 참조하여 애플리케이션에 안전하게 액세스할 수 있습니다. 최소한의 운영 오버헤드로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["Amazon S3에서 호스팅되고 모든 내부 IP 주소 범위를 나열하는 JSON 파일을 생성합니다. JSON 파일이 업데이트될 때 호출할 수 있는 각 계정에서 Amazon Simple Notification Service(Amazon SNS) 주제를 구성합니다. SNS 주제에 대한 AWS Lambda 함수를 구독하여 업데이트된 IP 주소 범위로 모든 관련 보안 그룹 규칙을 업데이트합니다.", "모든 내부 IP 주소 범위를 포함하는 새 AWS Config 관리형 규칙을 생성합니다. 규칙을 사용하여 각 계정의 보안 그룹을 확인하여 IP 주소 범위 목록을 준수하는지 확인하십시오. 탐지된 규정 미준수 보안 그룹을 자동으로 수정하도록 규칙을 구성합니다.", "전송 계정에서 모든 내부 IP 주소 범위로 VPC 접두사 목록을 생성합니다. AWS Resource Access Manager를 사용하여 접두사 목록을 다른 모든 계정과 공유하십시오. 공유 접두사 목록을 사용하여 다른 계정에서 보안 그룹 규칙을 구성합니다.", "전송 계정에서 모든 내부 IP 주소 범위로 보안 그룹을 생성합니다. \"/sg-1a2b3c4d\"의 중첩된 보안 그룹 참조를 사용하여 전송 계정의 보안 그룹을 참조하도록 다른 계정의 보안 그룹을 구성합니다."], "answers": [2]}, {"q": "회사는 Amazon S3에서 정적 웹 사이트로 새 애플리케이션을 실행합니다. 이 회사는 프로덕션 AWS 계정에 애플리케이션을 배포했으며 Amazon CloudFront를 사용하여 웹 사이트를 제공합니다. 웹사이트는 Amazon API Gateway REST API를 호출합니다. AWS Lambda 함수는 각 API 메서드를 지원합니다. 회사는 2주마다 CSV 보고서를 생성하여 각 API Lambda 함수의 권장 구성 메모리, 권장 비용, 현재 구성과 권장 사항 간의 가격 차이를 표시하려고 합니다. 회사는 보고서를 S3 버킷에 저장합니다. 최소 개발 시간으로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["2주 동안 Amazon CloudWatch Logs에서 각 API Lambda 함수에 대한 지표 데이터를 추출하는 Lambda 함수를 생성합니다. 데이터를 표 형식으로 정렬합니다. 데이터를 S3 버킷에 .csv 파일로 저장합니다. Amazon EventBridge 규칙을 생성하여 Lambda 함수가 2주마다 실행되도록 예약합니다.", "AWS Compute Optimizer에 옵트인합니다. ExportLambdaFunctionRecommendations 작업을 호출하는 Lambda 함수를 생성합니다. .csv 파일을 S3 버킷으로 내보냅니다. Amazon EventBridge 규칙을 생성하여 Lambda 함수가 2주마다 실행되도록 예약합니다.", "AWS Compute Optimizer에 옵트인합니다. 향상된 인프라 메트릭을 설정합니다. Compute Optimizer 콘솔 내에서 Lambda 권장 사항을 .csv 파일로 내보내는 작업을 예약합니다. 2주마다 S3 버킷에 파일을 저장합니다.", "프로덕션 계정에 대한 AWS Business Support 플랜을 구매합니다. AWS Trusted Advisor 검사를 위해 AWS Compute Optimizer에 옵트인합니다. Trusted Advisor 콘솔에서 비용 최적화 검사를 .csv 파일로 내보내는 작업을 예약합니다. 2주마다 S3 버킷에 파일을 저장합니다."], "answers": [1]}, {"q": "회사의 공장 및 자동화 애플리케이션이 단일 VPC에서 실행되고 있습니다. 20개 이상의 애플리케이션이 Amazon EC2, Amazon Elastic Container Service(Amazon ECS) 및 Amazon RDS의 조합에서 실행됩니다. 이 회사에는 세 팀에 소프트웨어 엔지니어가 분산되어 있습니다. 세 팀 중 한 팀이 각 애플리케이션을 소유하고 매번 모든 애플리케이션의 비용과 성능을 책임집니다. 팀 리소스에는 애플리케이션과 팀을 나타내는 태그가 있습니다. 팀은 일상 활동에 IAM 접근을 사용합니다. 회사는 월별 AWS 청구서에서 각 애플리케이션 또는 팀에 귀속되는 비용을 결정해야 합니다. 회사는 또한 지난 12개월의 비용을 비교하고 향후 12개월의 비용을 예측하는 데 도움이 되는 보고서를 생성할 수 있어야 합니다. 솔루션 설계자는 이러한 비용 보고서를 제공하는 AWS Billing and Cost Management 솔루션을 추천해야 합니다. 이러한 요구 사항을 충족하는 작업 조합은 무엇입니까? (3개 선택)", "opts": ["애플리케이션과 팀을 나타내는 사용자 정의 비용 할당 태그를 활성화합니다.", "애플리케이션과 팀을 나타내는 AWS 생성 비용 할당 태그를 활성화합니다.", "Billing and Cost Management에서 각 애플리케이션에 대한 비용 범주를 생성합니다.", "Billing and Cost Management에 대한 IAM 접근을 활성화합니다.", "비용 예산을 작성합니다.", "비용 탐색기를 활성화합니다."], "answers": [0, 2, 5]}, {"q": "AWS 고객에게는 온프레미스에서 실행되는 웹 애플리케이션이 있습니다. 웹 애플리케이션은 방화벽 뒤에 있는 타사 API에서 데이터를 가져옵니다. 타사는 각 클라이언트의 허용 목록에서 하나의 공개 CIDR 블록만 허용합니다. 고객은 웹 애플리케이션을 AWS 클라우드로 마이그레이션하려고 합니다. 애플리케이션은 VPC의 Application Load Balancer(ALB) 뒤에 있는 Amazon EC2 인스턴스 세트에서 호스팅됩니다. ALB는 퍼블릭 서브넷에 있습니다. EC2 인스턴스는 프라이빗 서브넷에 있습니다. NAT 게이트웨이는 프라이빗 서브넷에 대한 인터넷 접근을 제공합니다. 솔루션 설계자는 웹 애플리케이션이 마이그레이션 후 타사 API를 계속 호출할 수 있는지 어떻게 확인해야 합니까?", "opts": ["고객 소유의 퍼블릭 IP 주소 블록을 VPC에 연결합니다. VPC의 퍼블릭 서브넷에 대한 퍼블릭 IP 주소 지정을 활성화합니다.", "고객 소유의 퍼블릭 IP 주소 블록을 AWS 계정에 등록합니다. 주소 블록에서 탄력적 IP 주소를 생성하고 VPC의 NAT 게이트웨이에 할당합니다.", "고객 소유 IP 주소 블록에서 탄력적 IP 주소를 생성합니다. 고정 탄력적 IP 주소를 ALB에 할당합니다.", "고객 소유의 퍼블릭 IP 주소 블록을 AWS 계정에 등록합니다. 주소 블록의 탄력적 IP 주소를 사용하도록 AWS Global Accelerator를 설정합니다. ALB를 가속기 끝점으로 설정합니다."], "answers": [1]}, {"q": "여러 AWS 계정이 있는 회사에서 AWS Organizations 및 서비스 제어 정책(SCP)을 사용하고 있습니다. 관리자가 다음 SCP를 생성하여 AWS 계정 1111-1111-1111을 포함하는 조직 단위(OU)에 연결했습니다. 계정 1111-1111-1111에서 작업하는 개발자는 Amazon S3 버킷을 생성할 수 없다고 불평합니다. 관리자는 이 문제를 어떻게 해결해야 합니까?", "opts": ["SCP에 \"허용\" 효과가 있는 s3:CreateBucket을 추가합니다.", "OU에서 계정을 제거하고 SCP를 계정 1111-1111-1111에 직접 연결합니다.", "개발자에게 IAM 엔터티에 Amazon S3 권한을 추가하도록 지시합니다.", "계정 1111-1111-1111에서 SCP를 제거합니다."], "answers": [2]}, {"q": "회사에는 회사의 비즈니스에 중요한 모놀리식 애플리 te-function-configuration 명령을 사용하여 로드를 분산합니다.", "AWS CodeDeploy를 구성하고 배포 구성에서 CodeDeployDefault.OneAtATime을 사용하여 로드를 분산합니다."], "answers": [0]}, {"q": "금융 회사는 Amazon S3에서 데이터 레이크를 호스팅합니다. 회사는 SFTP를 통해 매일 밤 여러 제3자로부터 재무 데이터 기록을 받습니다. 회사는 VPC의 퍼블릭 서브넷에 있는 Amazon EC2 인스턴스에서 자체 SFTP 서버를 실행합니다. 파일이 업로드되면 동일한 인스턴스에서 실행되는 cron 작업에 의해 데이터 레이크로 이동됩니다. SFTP 서버는 Amazon Route 53을 사용하여 DNS sftp.example.com에서 연결할 수 있습니다. 솔루션 설계자는 SFTP 솔루션의 안정성과 확장성을 개선하기 위해 무엇을 해야 합니까?", "opts": ["EC2 인스턴스를 Auto Scaling 그룹으로 이동합니다. ALB(Application Load Balancer) 뒤에 EC2 인스턴스를 배치합니다. ALB를 가리키도록 Route 53의 DNS 레코드 sftp.example.com을 업데이트합니다.", "SFTP 서버를 AWS Transfer for SFTP로 마이그레이션합니다. 서버 엔드포인트 호스트 이름을 가리키도록 Route 53의 DNS 레코드 sftp.example.com을 업데이트합니다.", "SFTP 서버를 AWS Storage Gateway의 파일 게이트웨이로 마이그레이션합니다. 파일 게이트웨이 엔드포인트를 가리키도록 Route 53의 DNS 레코드 sftp.example.com을 업데이트합니다.", "NLB(Network Load Balancer) 뒤에 EC2 인스턴스를 배치합니다. NLB를 가리키도록 Route 53의 DNS 레코드 sftp.example.com을 업데이트합니다."], "answers": [1]}, {"q": "회사에서 온프레미스 데이터 센터에서 실행되는 VMware Infrastructure에서 Amazon EC2로 애플리케이션을 마이그레이션하려고 합니다. 솔루션 설계자는 마이그레이션 중에 소프트웨어 및 구성 설정을 보존해야 합니다. 솔루션 설계자는 이러한 요구 사항을 충족하기 위해 무엇을 해야 합니까?", "opts": ["Windows File Server용 Amazon FSx에 데이터 스토어 복제를 시작하도록 AWS DataSync 에이전트를 구성합니다. SMB 공유를 사용하여 VMware 데이터 저장소를 호스팅합니다. VM Import/Export를 사용하여 VM을 Amazon EC2로 이동합니다.", "VMware vSphere 클라이언트를 사용하여 애플리케이션을 OVF(Open Virtualization Format) 형식의 이미지로 내보냅니다. 대상 AWS 리전에 이미지를 저장할 Amazon S3 버킷을 생성합니다. VM 가져오기에 대한 IAM 역할을 생성하고 적용합니다. AWS CLI를 사용하여 EC2 가져오기 명령을 실행합니다.", "CIFS(Common Internet File System) 공유를 내보내도록 파일 서비스용 AWS Storage Gateway를 구성합니다. 공유 폴더에 대한 백업 복사본을 만듭니다. AWS Management Console에 로그인하고 백업 복사본에서 AMI를 생성합니다. AMI를 기반으로 하는 EC2 인스턴스를 시작합니다.", "AWS Systems Manager에서 하이브리드 환경에 대한 관리형 인스턴스 활성화를 생성합니다. 온프레미스 VM에 Systems Manager Agent를 다운로드하고 설치합니다. 관리형 인스턴스가 되도록 Systems Manager에 VM을 등록합니다. AWS Backup을 사용하여 VM의 스냅샷을 생성하고 AMI를 생성합니다. AMI를 기반으로 하는 EC2 인스턴스를 시작합니다."], "answers": [1]}, {"q": "비디오 처리 회사에는 Amazon S3 버킷에서 이미지를 다운로드하고, 이미지를 처리하고, 변환된 이미지를 두 번째 S3 버킷에 저장하고, Amazon DynamoDB 테이블에서 이미지에 대한 메타데이터를 업데이트하는 애플리케이션이 있습니다. 애플리케이션은 Node.js로 작성되고 AWS Lambda 함수를 사용하여 실행됩니다. 새 이미지가 Amazon S3에 업로드되면 Lambda 함수가 호출됩니다. 애플리케이션은 한동안 아무 문제 없이 실행되었습니다. 그러나 이미지의 크기가 크게 커졌습니다. 이제 Lambda 함수가 시간 초과 오류로 인해 자주 실패합니다. 기능 제한 시간은 최대값으로 설정됩니다. 솔루션 설계자는 호출 실패를 방지하기 위해 애플리케이션의 아키텍처를 리팩터링해야 합니다. 회사는 기본 인프라를 관리하기를 원하지 않습니다. 솔루션 설계자는 이러한 요구 사항을 충족하기 위해 어떤 단계 조합을 수행해야 합니까? (2개 선택)", "opts": ["애플리케이션 코드가 포함된 Docker 이미지를 빌드하여 애플리케이션 배포를 수정합니다. 이미지를 Amazon Elastic Container Registry(Amazon ECR)에 게시합니다.", "호환 유형이 AWS Fargate인 새 Amazon Elastic Container Service(Amazon ECS) 작업 정의를 생성합니다. Amazon Elastic Container Registry(Amazon ECR)에서 새 이미지를 사용하도록 작업 정의를 구성합니다. 새 파일이 Amazon S3에 도착하면 ECS 작업 정의를 사용하여 ECS 작업을 호출하도록 Lambda 함수를 조정합니다.", "Parallel 상태로 AWS Step Functions 상태 시스템을 생성하여 Lambda 함수를 호출합니다. Lambda 함수의 프로비저닝된 동시성을 높입니다.", "호환성 유형이 Amazon EC2인 새 Amazon Elastic Container Service(Amazon ECS) 작업 정의를 생성합니다. Amazon Elastic Container Registry(Amazon ECR)에서 새 이미지를 사용하도록 작업 정의를 구성합니다. 새 파일이 Amazon S3에 도착하면 ECS 작업 정의를 사용하여 ECS 작업을 호출하도록 Lambda 함수를 조정합니다.", "Amazon Elastic File System(Amazon EFS)에 이미지를 저장하고 Amazon RDS DB 인스턴스에 메타데이터를 저장하도록 애플리케이션을 수정합니다. Lambda 함수를 조정하여 EFS 파일 공유를 탑재합니다."], "answers": [0, 1]}, {"q": "회사에는 AWS Organizations에 조직이 있습니다. 이 회사는 AWS Control Tower를 사용하여 조직의 랜딩 존을 배포하고 있습니다. 회사는 거버넌스 및 정책 집행을 구현하려고 합니다. 회사는 회사의 프로덕션 OU에서 유휴 상태에서 암호화되지 않은 Amazon RDS DB 인스턴스를 감지하는 정책을 구현해야 합니다. 이 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["AWS Control Tower에서 필수 가드레일을 켭니다. 프로덕션 OU에 필수 가드레일을 적용합니다.", "AWS Control Tower의 강력 권장 가드레일 목록에서 적절한 가드레일을 활성화합니다. 프로덕션 OU에 가드레일을 적용합니다.", "AWS Config를 사용하여 새로운 필수 가드레일을 생성합니다. 프로덕션 OU의 모든 계정에 규칙을 적용합니다.", "AWS Control Tower에서 사용자 지정 SCP를 생성합니다. 프로덕션 OU에 SCP를 적용합니다."], "answers": [1]}, {"q": "스타트업 회사는 최신 Amazon Linux 2 AMI를 사용하여 프라이빗 서브넷에서 Amazon EC2 인스턴스 플릿을 호스팅합니다. 회사의 엔지니어는 문제 해결을 위해 인스턴스에 대한 SSH 액세스에 크게 의존합니다. 회사의 기존 아키텍처에는 다음이 포함됩니다. • 프라이빗 및 퍼블릭 서브넷이 있는 VPC와 NAT 게이트웨이. • 온프레미스 환경과의 연결을 위한 사이트 간 VPN. 이트합니다.", "Amazon S3 버킷을 생성합니다. AWS Database Migration Service(AWS DMS)를 사용하여 데이터베이스를 Amazon S3로 내보냅니다. S3 버킷을 데이터 저장소로 사용하도록 Amazon Athena를 구성합니다. 애플리케이션용 최신 ODBC(Open Database Connectivity) 드라이버를 설치합니다. Athena 엔드포인트를 가리키도록 애플리케이션의 연결 설정 업데이트"], "answers": [1]}, {"q": "회사에서 AWS 클라우드에 솔루션을 구축하고 있습니다. 수천 또는 장치가 솔루션에 연결되어 데이터를 전송합니다. 각 장치는 MQTT 프로토콜을 통해 실시간으로 데이터를 보내고 받을 수 있어야 합니다. 각 장치는 고유한 X.509 인증서를 사용하여 인증해야 합니다. 최소한의 운영 오버헤드로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["AWS IoT Core를 설정합니다. 각 디바이스에 대해 해당 Amazon MQ 대기열을 생성하고 인증서를 프로비저닝합니다. 각 디바이스를 Amazon MQ에 연결합니다.", "NLB(Network Load Balancer)를 생성하고 AWS Lambda 권한 부여자로 구성합니다. Auto Scaling 그룹의 Amazon EC2 인스턴스에서 MQTT 브로커를 실행합니다. Auto Scaling 그룹을 NLConnect 각 장치를 NLB에 대한 대상으로 설정합니다.", "AWS IoT Core를 설정합니다. 각 디바이스에 대해 해당 AWS IoT 사물을 생성하고 인증서를 프로비저닝합니다. 각 디바이스를 AWS IoT Core에 연결합니다.", "Amazon API Gateway HTTP API 및 NLB(Network Load Balancer)를 설정합니다. API 게이트웨이와 NLB 간의 통합을 생성합니다. HTTP API에서 상호 TLS 인증 권한 부여자를 구성합니다. NLB가 대상으로 하는 Amazon EC2 인스턴스에서 MQTT 브로커를 실행합니다. 각 장치를 NLB에 연결합니다."], "answers": [2]}, {"q": "한 회사가 단일 AWS 계정에서 여러 워크로드를 실행하고 있습니다. 새로운 회사 정책에 따르면 엔지니어는 승인된 리소스만 프로비저닝할 수 있으며 엔지니어는 AWS CloudFormation을 사용하여 이러한 리소스를 프로비저닝해야 합니다. 솔루션 설계자는 엔지니어가 액세스에 사용하는 IAM 역할에 새로운 제한을 적용하는 솔루션을 만들어야 합니다. 솔루션 설계자는 솔루션을 생성하기 위해 무엇을 해야 합니까?", "opts": ["승인된 리소스가 포함된 AWS CloudFormation 템플릿을 Amazon S3 버킷에 업로드합니다. Amazon S3 및 AWS CloudFormation에 대한 액세스만 허용하도록 엔지니어의 IAM 역할에 대한 IAM 정책을 업데이트합니다. AWS CloudFormation 템플릿을 사용하여 리소스를 프로비저닝합니다.", "승인된 리소스 및 AWS CloudFormation의 프로비저닝만 허용하는 권한으로 엔지니어의 IAM 역할에 대한 IAM 정책을 업데이트합니다. AWS CloudFormation 템플릿을 사용하여 승인된 리소스로 스택을 생성합니다.", "AWS CloudFormation 작업만 허용하는 권한으로 엔지니어의 IAM 역할에 대한 IAM 정책을 업데이트합니다. 승인된 리소스를 프로비저닝할 수 있는 권한이 있는 새 IAM 정책을 생성하고 정책을 새 IAM 서비스 역할에 할당합니다. 스택 생성 중에 AWS CloudFormation에 IAM 서비스 역할을 할당합니다.", "AWS CloudFormation 스택에서 리소스를 프로비저닝합니다. 자체 AWS CloudFormation 스택에 대한 액세스만 허용하도록 엔지니어의 IAM 역할에 대한 IAM 정책을 업데이트합니다."], "answers": [2]}, {"q": "솔루션 설계자는 회사에서 곧 출시할 새 애플리케이션의 데이터 저장 및 검색 아키텍처를 설계하고 있습니다. 이 애플리케이션은 전 세계 디바이스에서 분당 수백만 개의 작은 레코드를 수집하도록 설계되었습니다. 각 레코드는 크기가 4KB 미만이며 짧은 대기 시간으로 검색할 수 있는 내구성 있는 위치에 저장해야 합니다. 데이터는 일시적이며 회사는 데이터를 120일 동안만 저장해야 하며 그 이후에는 데이터를 삭제할 수 있습니다. 솔루션 설계자는 1년 동안 스토리지 요구 사항이 약 10-15TB가 될 것이라고 계산합니다. 가장 비용 효율적이고 설계 요구 사항을 충족하는 스토리지 전략은 무엇입니까?", "opts": ["인덱싱된 검색이 가능하도록 각 수신 레코드를 Amazon S3 버킷에 단일 .csv 파일로 저장하도록 애플리케이션을 설계합니다. 120일보다 오래된 데이터를 삭제하도록 수명 주기 정책을 구성합니다.", "각 수신 레코드를 규모에 맞게 구성된 Amazon DynamoDB 테이블에 저장하도록 애플리케이션을 설계합니다. 120일보다 오래된 레코드를 삭제하도록 DynamoDB TTL(Time to Live) 기능을 구성합니다.", "Amazon RDS MySQL 데이터베이스의 단일 테이블에 각 수신 레코드를 저장하도록 애플리케이션을 설계합니다. 쿼리를 실행하는 야간 cron 작업을 실행하여 120일보다 오래된 레코드를 삭제합니다.", "수신 레코드를 Amazon S3 버킷에 쓰기 전에 일괄 처리하도록 애플리케이션을 설계합니다. 배치의 레코드 목록을 포함하도록 객체의 메타데이터를 업데이트하고 Amazon S3 메타데이터 검색 기능을 사용하여 데이터를 검색합니다. 120일 후에 데이터를 삭제하도록 수명 주기 정책을 구성합니다."], "answers": [1]}, {"q": "소매 회사는 여러 AWS 리전에 걸쳐 AWS에서 전자 상거래 웹 사이트를 호스팅하고 있습니다. 회사는 온라인 구매를 위해 웹 사이트가 항상 작동하기를 원합니다. 웹 사이트는 MySQL DB 인스턴스용 Amazon RDS에 데이터를 저장합니다. 데이터베이스에 가장 높은 가용성을 제공하는 솔루션은 무엇입니까?", "opts": ["Amazon RDS에서 자동 백업을 구성합니다. 중단 시 자동 백업을 독립 실행형 DB 인스턴스로 승격합니다. 데이터베이스 트래픽을 승격된 DB 인스턴스로 보냅니다. 승격된 DB 인스턴스를 원본으로 하는 대체 읽기 전용 복제본을 생성합니다.", "Amazon RDS에서 전역 테이블 및 읽기 전용 복제본을 구성합니다. 리전 간 범위를 활성화합니다. 중단된 경우 AWS Lambda를 사용하여 한 리전에서 다른 리전으로 읽기 전용 복제본을 복사하십시오.", "Amazon RDS에서 전역 테이블 및 자동 백업을 구성합니다. 중단된 경우 AWS Lambda를 사용하여 한 리전에서 다른 리전으로 읽기 전용 복제본을 복사하십시오.", "Amazon RDS에서 읽기 전용 복제본을 구성합니다. 중단의 경우 리전 간 및 읽기 전용 복제본을 독립 실행형 DB 인스턴스로 승격합니다. 데이터베이스 트래픽을 승격된 DB 인스턴스로 보냅니다. 승격된 DB 인스턴스를 원본으로 하는 대체 읽기 전용 복제본을 생성합니다."], "answers": [3]}, {"q": "Example Corp.에는 온프레미스 데이터 센터와 Example Corp. AWS 계정에 VPC A라는 VPC가 있습니다. 온프레미스 네트워크는 AWS Site-To-Site VPN을 통해 VPC A에 연결됩니다. 온프레미스 서버는 VPC A에 적절하게 액세스할 수 있습니다. Example Corp은 방금 VPC B라는 이름의 VPC가 있는 AnyCompany를 인수했습니다. 이러한 네트워크 간에 IP 주소가 겹치지 않습니다. Example Corp.은 VPC A와 VPC B를 피어링했습니다. Example Corp.은 온프레미스 서버에서 VPC B로 연결하려고 합니다. Example Corp.은 네트워크 ACL 및 보안 그룹을 적절하게 설정했습니다. 최소한의 운영 노력으로 이 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["전송 게이트웨이를 생성합니다. Site-to-Site VPN, VPC A 및 VPC B를 운송 게이트웨이(Transit Gateway)에 연결합니다. 다른 모든 네트워크에 대한 IP 범위 경로를 추가하려면 모든 네트워크에 대한 전송 게이트웨이 경로 테이블을 업데이트하십시오.", "전송 게이트웨이를 생성합니다. 온프레미스 네트워크와 VPC B 간에 Site-to-Site VPN 연결을 생성하고 VPN 연결을 전송 게이트웨이에 연결합니다. 트래픽을 피어링된 VPC로 전달하는 경로를 추가하고 VPC A와 B에 대한 클라이언트 액세스 권한을 부여하는 권한 부여 규칙을 추가합니다.", "세 네트워크 모두에 대해 Site-to-Site VPN 및 두 VPC의 라우팅 테이블을 업데이트합니다. 세 네트워크 모두에 대해 BGP 전파를 구성합니다. BGP 전파가 완료될 때까지 최대 5분 동안 기다립니다.", "VPC A와 VPC B를 포함하도록 Site-to-Site VPN의 가상 프라이빗 게이트웨이 정의를 수정합니다. 두 VPC 간에 가상 프라이빗 휴양지의 두 라우터를 분할합니다."], "answers": [0]}, {"q": "한 회사는 최근 플랫폼 변경 전략을 사용하여 온프레미스 데이터 센터에서 AWS 클라우드로의 마이그레이션을 완료했습니다. 마이그레이션된 서버 중 하나는 중요한 애플리케이션이 의존하는 레거시 SMTP(Simple Mail Transfer Protocol) 서비스를 실행하고 있습니다. 애플리케이션은 회사 고객에게 아웃바운드 이메일 메시지를 보냅니다. 레거시 SMTP 서버는 TLS 암호화를 지원하지 않으며 TCP 포트 25를 사용합니다. 애플리케이션은 SMTP만 사용할 수 있습니다. 회사는 Amazon Simple Email Service(Amazon SES)를 사용하고 레거시 SMTP 서버를 폐기하기로 결정합니다. 회사는 SES 도메인을 생성하고 검증했습니다. 회사는 SES 한도를 해제했습니다. Amazon SES에서 이메일 메시지를 보내도록 애플리케이션을 수정하려면 회사는 어떻게 해야 합니까?", "opts": ["TLS 래퍼를 사용하여 Amazon SES에 연결하도록 애플리케이션을 구성합니다. ses:SendEmail 및 ses:SendRawEmail 권한이 있는 IAM 역할을 생성합니다. Amazon EC2 인스턴스에 IAM 역할을 연결합니다.", "STARTTLS를 사용하여 Amazon SES에 연결하도록 애플리케이션을 구성합니다. Amazon SES SMTP 자격 증명을 얻습니다. 자격 증명을 사용하여 Amazon SES로 인증합니다.", "SES API를 사용하여 이메일 메시지를 보내도록 애플리케이션을 구성합니다. ses:SendEmail 및 ses:SendRawEmail 권한이 있는 IAM 역할을 생성합니다. Amazon SES에 대한 서비스 역할로 IAM 역할을 사용합니다.", "AWS SDK를 사용하여 이메일 메시지를 보내도록 애플리케이션을 구성합니다. Amazon SES에 대한 IAM 사용자를 생성합니다. API 액세스 키를 생성합니다. 액세스 키를 사용하여 Amazon SES로 인증합니다."], "answers": [1]}, {"q": "한 회사가 최근에 다른 여러 회사를 인수했습니다. 각 회사에는 청구 및 보고 방법이 다른 별도의 AWS 계정이 있습니다. 인수 회사는 모든 계정을 AWS Organizations의 하나의 조직으로 통합했습니다. 그러나 인수 회사는 모든 팀에 대해 의미 있는 그룹을 포함하는 비용 보고서를 생성하는 데 어려움을 겪었습니다. 인수 회사의 재무 팀은 자체 관리 애플리케이션을 통해 모든 회사의 비용을 보고할 수 있는 솔루션이 필요합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["조직에 대한 AWS 비용 및 사용 보고서를 생성합니다. 보고서에서 태그 및 비용 범주를 정의합니다. Amazon Athena에서 테이블을 생성합니다. Athena 테이블을 기반으로 Amazon QuickSight 데이터 세트를 생성합니다. 재무 팀과 데이터 세트를 공유합니다.", "조직에 대한 AWS 비용 및 , "AWS WAF 규칙을 연결하기 위해 선택한 OU의 모든 리소스가 필요한 조직 전체 AWS Config 규칙을 배포합니다. 규정을 준수하지 않는 리소스를 수정하기 위해 AWS Lambda를 사용하여 자동화된 수정 작업을 배포합니다. AWS Config 규칙이 적용되는 동일한 OU를 대상으로 하는 AWS CloudFormation 스택 세트를 사용하여 AWS WAF 규칙을 배포합니다.", "조직의 마스터 계정에서 AWS WAF 규칙을 생성합니다. AWS Lambda 환경 변수를 사용하여 관리할 계정 번호 및 OU를 저장합니다. 필요에 따라 환경 변수를 업데이트하여 계정 또는 OU를 추가하거나 제거합니다. 멤버 계정에서 교차 계정 IAM 역할을 생성합니다. Lambda 함수에서 AWS Security Token Service(AWS STS)를 사용하여 역할을 수임하여 구성원 계정에서 AWS WAF 규칙을 생성하고 업데이트합니다.", "AWS Control Tower를 사용하여 조직의 여러 계정에서 AWS WAF 규칙을 관리합니다. AWS Key Management Service(AWS KMS)를 사용하여 관리할 계정 번호 및 OU를 저장합니다. 필요에 따라 AWS KMS를 업데이트하여 계정 또는 OU를 추가하거나 제거합니다. 멤버 계정에서 IAM 사용자를 생성합니다. 마스터 계정의 AWS Control Tower가 액세스 키와 보안 액세스 키를 사용하여 회원 계정에서 AWS WAF 규칙을 생성하고 업데이트하도록 허용합니다."], "answers": [0]}, {"q": "솔루션 설계자는 회사의 보안 설정 또는 AWS Lambda 함수를 감사하고 있습니다. Lambda 함수는 Amazon Aurora 데이터베이스에서 최신 변경 사항을 검색합니다. Lambda 함수와 데이터베이스는 동일한 VPC에서 실행됩니다. Lambda 환경 변수는 Lambda 함수에 데이터베이스 자격 증명을 제공합니다. Lambda 함수는 데이터를 집계하고 AWS KMS 관리형 암호화 키(SSE-KMS)를 사용한 서버 측 암호화용으로 구성된 Amazon S3 버킷에서 데이터를 사용할 수 있도록 합니다. 데이터는 인터넷을 통해 이동해서는 안 됩니다. 데이터베이스 자격 증명이 손상되면 회사는 손상의 영향을 최소화하는 솔루션이 필요합니다. 이러한 요구 사항을 충족하기 위해 솔루션 설계자는 무엇을 권장해야 합니까?", "opts": ["Aurora DB 클러스터에서 IAM 데이터베이스 인증을 활성화합니다. 함수가 IAM 데이터베이스 인증을 사용하여 데이터베이스에 액세스할 수 있도록 Lambda 함수의 IAM 역할을 변경합니다. VPC에서 Amazon S3용 게이트웨이 VPC 엔드포인트를 배포합니다.", "Aurora DB 클러스터에서 IAM 데이터베이스 인증을 활성화합니다. 함수가 IAM 데이터베이스 인증을 사용하여 데이터베이스에 액세스할 수 있도록 Lambda 함수의 IAM 역할을 변경합니다. 데이터 전송 중 Amazon S3 연결에 HTTPS를 적용합니다.", "AWS Systems Manager Parameter Store에 데이터베이스 자격 증명을 저장합니다. Parameter Store의 자격 증명에 대한 암호 교체를 설정합니다. 함수가 Parameter Store에 액세스할 수 있도록 Lambda 함수의 IAM 역할을 변경합니다. Parameter Store에서 자격 증명을 검색하도록 Lambda 함수를 수정합니다. VPC에서 Amazon S3용 게이트웨이 VPC 엔드포인트를 배포합니다.", "AWS Secrets Manager에 데이터베이스 자격 증명을 저장합니다. Secrets Manager에서 자격 증명에 대한 암호 교체를 설정합니다. 함수가 Secrets Manager에 액세스할 수 있도록 Lambda 함수의 IAM 역할을 변경합니다. Secrets Manager에서 자격 증명을 검색하도록 Lambda 함수를 수정합니다. 데이터 전송 중 Amazon S3 연결에 HTTPS를 적용합니다."], "answers": [0]}, {"q": "대규모 모바일 게임 회사가 모든 온프레미스 인프라를 AWS 클라우드로 성공적으로 마이그레이션했습니다. 솔루션 설계자는 설계에 따라 구축되었고 Well-Architected 프레임워크에 맞춰 실행되고 있는지 확인하기 위해 환경을 검토하고 있습니다. 비용 탐색기에서 이전 월별 비용을 검토하는 동안 솔루션 설계자는 여러 대형 인스턴스 유형의 생성 및 후속 종료가 비용의 높은 비율을 차지한다는 사실을 알게 됩니다. 솔루션 설계자는 회사의 개발자가 테스트의 일부로 새로운 Amazon EC2 인스턴스를 시작하고 있으며 개발자가 적절한 인스턴스 유형을 사용하고 있지 않음을 알게 됩니다. 솔루션 설계자는 개발자만 시작할 수 있는 인스턴스 유형을 제한하는 제어 메커니즘을 구현해야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["AWS Config에서 원하는 인스턴스 유형의 관리형 규칙을 생성합니다. 허용되는 인스턴스 유형으로 규칙을 구성합니다. 새 EC2 인스턴스가 시작될 때마다 실행할 이벤트에 규칙을 연결합니다.", "EC2 콘솔에서 허용되는 인스턴스 유형을 지정하는 시작 템플릿을 생성합니다. 시작 템플릿을 개발자의 IAM 계정에 할당합니다.", "새 IAM 정책을 만듭니다. 허용되는 인스턴스 유형을 지정합니다. 개발자의 IAM 계정이 포함된 IAM 그룹에 정책을 연결합니다.", "EC2 Image Builder를 사용하여 개발자를 위한 이미지 파이프라인을 생성하고 골든 이미지 생성을 지원합니다."], "answers": [2]}, {"q": "한 회사가 AWS 클라우드에서 여러 프로젝트를 개발하고 호스팅하고 있습니다. 프로젝트는 AWS Organizations의 동일한 조직에 있는 여러 AWS 계정에서 개발됩니다. 회사는 클라우드 인프라 비용을 소유 프로젝트에 할당해야 합니다. 모든 AWS 계정을 담당하는 팀은 여러 Amazon EC2 인스턴스에 비용 할당에 사용되는 프로젝트 태그가 없음을 발견했습니다. 솔루션 아키텍트가 문제를 해결하고 향후 발생하지 않도록 방지하기 위해 어떤 조치를 취해야 합니까? (3개를 선택하세요.)", "opts": ["태그가 누락된 리소스를 찾기 위해 각 계정에서 AWS Config 규칙을 생성합니다.", "프로젝트 태그가 누락된 경우 조직에서 ec2:RunInstances에 대한 거부 작업으로 SCP를 생성합니다.", "조직에서 Amazon Inspector를 사용하여 태그가 누락된 리소스를 찾습니다.", "프로젝트 태그가 누락된 경우 ec2:RunInstances에 대한 거부 작업으로 각 계정에서 IAM 정책을 생성합니다.", "조직에서 프로젝트 태그가 누락된 EC2 인스턴스 목록을 수집하도록 AWS Config 집계자를 생성합니다.", "AWS Security Hub를 사용하여 프로젝트 태그가 누락된 EC2 인스턴스 목록을 집계합니다."], "answers": [0, 1, 4]}, {"q": "회사에는 이벤트 지속성을 위해 PostgreSQL 데이터베이스를 사용하는 온프레미스 모니터링 솔루션이 있습니다. 과도한 수집으로 인해 데이터베이스를 확장할 수 없으며 스토리지가 자주 부족합니다. 이 회사는 하이브리드 솔루션을 만들고자 하며 이미 네트워크와 AWS 간에 VPN 연결을 설정했습니다. 솔루션에는 다음 속성이 포함되어야 합니다. • 운영 복잡성을 최소화하기 위한 관리형 AWS 서비스. • 데이터 처리량에 맞게 자동으로 확장되며 지속적인 관리가 필요하지 않은 버퍼입니다. • 거의 실시간으로 이벤트를 관찰하기 위해 대시보드를 만드는 시각화 도구. • 반구조화된 JSON 데이터 및 동적 스키마 지원. 회사에서 이러한 요구 사항을 충족하는 모니터링 솔루션을 만들 수 있는 구성 요소의 조합은 무엇입니까? (2개 선택)", "opts": ["Amazon Kinesis Data Firehose를 사용하여 이벤트를 버퍼링하십시오. 이벤트를 처리하고 변환하는 AWS Lambda 함수를 생성합니다.", "이벤트를 버퍼링하기 위해 Amazon Kinesis 데이터 스트림을 생성합니다. 이벤트를 처리하고 변환하는 AWS Lambda 함수를 생성합니다.", "이벤트를 수신하도록 Amazon Aurora PostgreSQL DB 클러스터를 구성합니다. Amazon QuickSight를 사용하여 데이터베이스에서 읽고 실시간에 가까운 시각화 및 대시보드를 생성합니다.", "이벤트를 수신하도록 Amazon Elasticsearch Service(Amazon ES)를 구성합니다. Amazon ES와 함께 배포된 Kibana 엔드포인트를 사용하여 실시간에 가까운 시각화 및 대시보드를 생성합니다.", "이벤트를 수신하도록 Amazon Neptune DB 인스턴스를 구성합니다. Amazon QuickSight를 사용하여 데이터베이스에서 읽고 실시간에 가까운 시각화 및 대시보드를 생성합니다."], "answers": [0, 3]}, {"q": "팀은 회사 전체에 대한 행동 데이터를 수집하고 라우팅합니다. 이 회사는 퍼블릭 서브넷, 프라이빗 서브넷 및 인터넷 게이트웨이가 있는 다중 AZ VPC 환경을 실행합니다. 각 퍼블릭 서브넷에는 NAT 게이트웨이도 포함되어 있습니다. 대부분의 회사 애플리케이션은 Amazon Kinesis Data Streams에서 읽고 씁니다. 대부분의 워크로드는 프라이빗 서브넷에서 실행됩니다. 솔루션 설계자는 인프라를 검토해야 합니다. 솔루션 설계자는 비용을 절감하고 애플리케이션의 기능을 유지해야 합니다. 솔루션 설계자는 Cost Explorer를 사용하고 EC2-기타 범주의 비용이 지속적으로 높다는 것을 확인합니다. 추가 검토에 따르면 NatGateway-Bytes 요금이 EC2-기타 범주의 비용을 증가시키고 있습니다. 솔루션 설계자는 이러한 요구 사항을 충족하기 위해 무엇을 해야 합니까?", "opts": ["VPC 흐름 로그를 활성화합니다. Amazon Athena를 사용하여 제거할 수 있는 트래픽에 대한 로그를 분석합니다. 보안 그룹이 높은 비용을 초래하는 트래픽을 차단하고 있는지 확인하십시오.", "Kinesis Data Streams용 인터페이스 VPC 엔드포인트를 VPC에 추가합니다. 애플리케이션에 인터페이스 VPC 엔드포인트를 사용할 수 있는 올바른 IAM 권한이 있는지 확인하십시오.", "VPC 흐름 로그 및 Amazon Detective를 활성화합니다. Kinesis Data Streams와 관련되지 않은 트래픽에 대한 Detective 결과를 검토합니다. 해당 트래픽을 차단하도록 보안 그룹을 구성합니다.", "Kinesis Data Streams용 인터페이스 VPC 엔드포인트를 VPC에 추가합니다. VPC 엔드포인트 정책이 애플리케이션의 트래픽을 허용하는지 확인하십시오."], "answers": [3]}, {"q": "소매 회사는 유럽에 온프레미스 데이터 센터가 있습니다. 이 회사는 또한 eu-west-1 및 us-east-1 리전을 포함하는 다중 리전 AWS를 보유하고 있습니다. 회사는 온프레미스 인프라에서 해당 리전 중 하나의 VPC로 네트워크 트래픽을 라우팅할 수 있기를 원합니다. 또한 회사는 해당 리전의 VPC 간에 직접 라우팅되는 트래픽을 지원해야 합니다. 네트워크에는 단일 장애 지점이 존재할 수 없습니다. 이 회사는 이미 온프레미스 데이터 센터에서 2개의 1Gbps AWS Direct Connect 연결을 생성했습니다. 각 연결은 고가용성을 위해 유럽의 별도 Direct Connect 위치로 이동합니다. 이 두 위치는 각각 DX-A 및 DX-B로 명명됩니다. 각 리전에는 해당 리전 내의 모든 VPC 간 트래픽을 라우팅하도록 구성된 단일 AWS 운송 게이트웨이(Transit Gateway)가 있습니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["DX-A 연결에서 Direct Connect 게이트웨이로 프라이빗 VIF를 생성합니다. 고가용성을 위해 DX-B 연결에서 동일한 Direct Connect 게이트웨이로 프라이빗 VIF를 생성합니다. eu-west-1 및 us-east-1 전송 게이트웨이를 모두 Direct Connect 게이트 의 AWS 계정과 VPC를 갖게 될 것으로 예상합니다. 회사 네트워크는 AWS의 리소스에 원활하게 액세스할 수 있어야 하며 모든 VPC와 통신할 수 있어야 합니다. 회사는 또한 온프레미스 데이터 센터를 통해 클라우드 리소스를 인터넷으로 라우팅하려고 합니다. 이러한 요구 사항을 충족하는 단계 조합은 무엇입니까? (3개 선택)", "opts": ["중앙 계정에서 Direct Connect 게이트웨이를 생성합니다. 각 계정에서 Direct Connect 게이트웨이와 모든 가상 프라이빗 게이트웨이의 계정 ID를 사용하여 연결 제안을 생성합니다.", "중앙 네트워크 계정에서 Direct Connect 게이트웨이와 전송 게이트웨이를 생성합니다. 전송 VIF를 사용하여 전송 게이트웨이를 Direct Connect 게이트웨이에 연결합니다.", "인터넷 게이트웨이를 제공합니다. 인터넷 게이트웨이를 서브넷에 연결합니다. 게이트웨이를 통한 인터넷 트래픽을 허용합니다.", "전송 게이트웨이를 다른 계정과 공유합니다. 운송 게이트웨이(Transit Gateway)에 VPC를 연결합니다.", "필요에 따라 VPC 피어링을 프로비저닝합니다.", "프라이빗 서브넷만 프로비저닝합니다. 전송 게이트웨이 및 고객 게이트웨이에서 필요한 경로를 열어 AWS의 아웃바운드 인터넷 트래픽이 데이터 센터에서 실행되는 NAT 서비스를 통해 흐를 수 있도록 합니다."], "answers": [1, 3, 5]}, {"q": "한 회사에 수백 개의 AWS 계정이 있습니다. 이 회사는 최근 새로운 예약 인스턴스를 구매하고 기존 예약 인스턴스를 수정하기 위한 중앙 집중식 내부 프로세스를 구현했습니다. 이 프로세스에서는 예약 인스턴스를 구매하거나 수정하려는 모든 사업부가 조달을 위해 전담 팀에 요청을 제출해야 합니다. 이전에는 사업부가 각자의 AWS 계정에서 자율적으로 예약 인스턴스를 직접 구매하거나 수정했습니다. 솔루션 설계자는 가능한 한 가장 안전한 방법으로 새 프로세스를 시행해야 합니다. 솔루션 설계자는 이러한 요구 사항을 충족하기 위해 어떤 단계 조합을 수행해야 합니까? (2개 선택)", "opts": ["모든 AWS 계정이 모든 기능이 활성화된 AWS Organizations의 조직에 속하는지 확인하십시오.", "AWS Config를 사용하여 ec2:PurchaseReservedInstancesOffering 작업 및 ec2:ModifyReservedInstances 작업에 대한 접근을 거부하는 IAM 정책의 연결에 대해 보고합니다.", "각 AWS 계정에서 ec2:PurchaseReservedInstancesOffering 작업 및 ec2:ModifyReservedInstances 작업을 거부하는 IAM 정책을 생성합니다.", "ec2:PurchaseReservedInstancesOffering 작업 및 ec2:ModifyReservedInstances 작업을 거부하는 SCP를 생성합니다. SCP를 조직의 각 OU에 연결합니다.", "모든 AWS 계정이 통합 결제 기능을 사용하는 AWS Organizations의 조직에 속해 있는지 확인합니다."], "answers": [0, 3]}, {"q": "회사에서 Amazon RDS for MySQL 데이터베이스를 사용하여 데이터를 저장하는 중요한 애플리케이션을 실행하고 있습니다. RDS DB 인스턴스는 다중 AZ 모드로 배포됩니다. 최근 RDS 데이터베이스 장애 조치 테스트로 인해 애플리케이션이 40초 동안 중단되었습니다. 솔루션 설계자는 중단 시간을 20초 미만으로 줄이기 위한 솔루션을 설계해야 합니다. 솔루션 설계자는 이러한 요구 사항을 충족하기 위해 어떤 단계 조합을 수행해야 합니까? (3개 선택)", "opts": ["데이터베이스 앞에서 Amazon ElastiCache for Memcached 사용합니다.", "데이터베이스 앞에서 Redis용 Amazon ElastiCache 사용합니다.", "데이터베이스 앞에서 RDS Proxy를 사용합니다.", "데이터베이스를 Amazon Aurora MySQL로 마이그 을 역할에 부여합니다. DBA 계정에서 암호에 액세스할 수 있도록 애플리케이션 계정에 SCP를 연결합니다. 교차 계정 암호에 액세스하려면 DBA-Admin 역할을 EC2 인스턴스에 연결합니다."], "answers": [1]}, {"q": "회사는 AWS Organizations를 사용하여 여러 AWS 계정을 관리합니다. 루트 OU 아래 회사에는 Research 및 DataOps라는 두 개의 OU가 있습니다. 규정 요구 사항으로 인해 회사에서 조직에 배포하는 모든 리소스는 ap-northeast-1 리전에 있어야 합니다. 또한 회사가 DataOps OU에 배포하는 EC2 인스턴스는 사전 정의된 인스턴스 유형 목록을 사용해야 합니다. 솔루션 설계자는 이러한 제한 사항을 적용하는 솔루션을 구현해야 합니다. 솔루션은 운영 효율성을 극대화하고 지속적인 유지 관리를 최소화해야 합니다. 이러한 요구 사항을 충족하는 단계 조합은 무엇입니까? (2개 선택)", "opts": ["DataOps OU 아래의 한 계정에서 IAM 역할을 생성합니다. 역할에 대한 인라인 정책의 ec2:InstanceType 조건 키를 사용하여 특정 인스턴스 유형에 대한 접근을 제한합니다.", "루트 OU 아래의 모든 계정에서 IAM 사용자를 생성합니다. 각 사용자의 인라인 정책에서 aws:RequestedRegion 조건 키를 사용하여 ap-northeast-1을 제외한 모든 AWS 리전에 대한 접근을 제한합니다.", "SCP를 생성합니다. aws:RequestedRegion 조건 키를 사용하여 ap-northeast-1을 제외한 모든 AWS 리전에 대한 접근을 제한합니다. 루트 OU에 SCP를 적용합니다.", "SCP를 생성합니다. ec2:Region 조건 키를 사용하여 ap-northeast-1을 제외한 모든 AWS 리전에 대한 접근을 제한합니다. SCP를 루트 OU, DataOps OU 및 Research OU에 적용합니다.", "SCP를 생성합니다. ec2:InstanceType 조건 키를 사용하여 특정 인스턴스 유형에 대한 접근을 제한합니다. SCP를 DataOps OU에 적용합니다."], "answers": [2, 4]}, {"q": "회사는 단일 AWS 리전에서 서버리스 애플리케이션을 실행합니다. 애플리케이션은 외부 URL에 액세스하고 해당 사이트에서 메타데이터를 추출합니다. 회사는 Amazon Simple Notification Service(Amazon SNS) 주제를 사용하여 URL을 Amazon Simple Queue Service(Amazon SQS) 대기열에 게시합니다. AWS Lambda 함수는 대기열을 이벤트 소스로 사용하고 대기열의 URL을 처리합니다. 결과는 Amazon S3 버킷에 저장됩니다. 회사는 사이트 현지화의 가능한 차이점을 비교하기 위해 다른 지역에서 각 URL을 처리하려고 합니다. URL은 기존 리전에서 게시되어야 합니다. 결과는 현재 리전의 기존 S3 버킷에 기록되어야 합니다. 이러한 요구 사항을 충족하는 다중 리전 배포를 생성하는 변경 조합은 무엇입니까? (2개 선택)", "opts": ["Lambda 함수와 함께 SQS 대기열을 다른 지역에 배포합니다.", "각 리전의 SNS 주제를 SQS 대기열에 구독합니다.", "각 리전의 SQS 대기열을 SNS 주제에 구독합니다.", "각 리전의 SNS 주제에 URL을 게시하도록 SQS 대기열을 구성합니다.", "SNS 주제와 Lambda 함수를 다른 지역에 배포합니다."], "answers": [0, 2]}, {"q": "회사는 Amazon EC2 Linux 인스턴스에서 독점 상태 비저장 ETL 애플리케이션을 실행합니다. 응용 프로그램은 Linux 바이너리이며 소스 코드를 수정할 수 없습니다. 응용 프로그램은 단일 스레드이고 2GB RAM을 사용하며 CPU를 많이 사용합니다. 애플리케이션은 4시간마다 실행되도록 예약되며 최대 20분 동안 실행됩니다. 솔루션 아키텍트가 솔루션의 아키텍처를 수정하려고 합니다. 솔루션 설계자는 어떤 전략을 사용해야 합니까?", "opts": ["AWS Lambda를 사용하여 애플리케이션을 실행하십시오. Amazon CloudWatch Logs를 사용하여 4시간마다 Lambda 함수를 호출합니다.", "AWS Batch를 사용하여 애플리케이션을 실행합니다. AWS Step Functions 상태 머신을 사용하여 4시간마다 AWS Batch 작업을 호출합니다.", "AWS Fargate를 사용하여 애플리케이션을 실행합니다. Amazon EventBridge(Amazon CloudWatch Events)를 사용하여 4시간마다 Fargate 작업을 호출합니다.", "Amazon EC2 스팟 인스턴스를 사용하여 애플리케이션을 실행합니다. AWS CodeDeploy를 사용하여 4시간마다 애플리케이션을 배포하고 실행합니다."], "answers": [2]}, {"q": "한 회사가 인기 있는 온라인 게임의 속편을 만들고 있습니다. 전 세계의 많은 사용자가 출시 후 첫 주 이내에 게임을 플레이할 것입니다. 현재 이 게임은 단일 AWS 리전에 배포된 다음 구성 요소로 구성됩니다. • 게임 자산을 저장하는 Amazon S3 버킷 • 플레이어 점수를 저장하는 Amazon DynamoDB 테이블 솔루션 설계자는 대기 시간을 줄이고 안정성을 개선하며 구현하는 데 최소한의 노력이 필요한 다중 리전 솔루션을 설계해야 합니다. 솔루션 설계자는 이러한 요구 사항을 충족하기 위해 무엇을 해야 합니까?", "opts": ["S3 버킷의 자산을 제공하기 위해 Amazon CloudFront 배포를 생성합니다. S3 교차 리전 복제를 구성합니다. 새 리전에서 새 DynamoDB 테이블을 생성합니다. DynamoDB 전역 테이블의 복제 대상으로 새 테이블을 사용합니다.", "S3 버킷의 자산을 제공하기 위해 Amazon CloudFront 배포를 생성합니다. S3 동일 지역 복제를 구성합니다. 새 리전에서 새 DynamoDB 테이블을 생성합니다. CDC(변경 데이터 캡처)와 함께 AWS DMS(AWS Database Migration Service)를 사용하여 DynamoDB 테이블 간에 비동기식 복제를 구성합니다.", "새 리전에 또 다른 S3 버킷을 생성하고 버킷 간에 S3 교차 리전 복제를 구성합니다. Amazon CloudFront 배포를 생성하고 각 리전의 S3 버킷에 액세스하는 두 개의 오리진으로 오리진 장애 조치를 구성합니다. Amazon DynamoDB Streams를 활성화하여 DynamoDB 글로벌 테이블을 구성하고 새 리전에 복제본 테이블을 추가합니다.", "사인 지역에 또 다른 S3 버킷을 생성하고 버킷 간에 S3 동일 지역 복제를 구성합니다. Amazon CloudFront 배포를 생성하고 S3 버킷에 액세스하는 두 개의 오리진으로 오리진 장애 조치를 구성합니다. 새 리전에서 새 DynamoDB 테이블을 생성합니다. DynamoDB 전역 테이블의 복제 대상으로 새 테이블을 사용합니다."], "answers": [2]}, {"q": "회사에는 잠재적 임차인과 구매자에게 부동산 정보를 제공하는 온프레미스 웹 사이트 애플리케이션이 있습니다. 이 웹사이트는 Java 백엔드와 NoSQL MongoDB 데이터베이스를 사용하여 구독자 데이터를 저장합니다. 회사는 전체 애플리케이션을 비슷한 구조의 AWS로 마이그레이션해야 합니다. 응용 프로그램은 고가용성을 위해 배포되어야 하며 회사는 응용 프로그램을 변경할 수 없습니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["Amazon Aurora DB 클러스터를 구독자 데이터의 데이터베이스로 사용하십시오. Java 백엔드 애플리케이션을 위해 여러 가용 영역에 걸쳐 Auto Scaling 그룹에 Amazon EC2 인스턴스를 배포합니다.", "구독자 데이터의 데이터베이스로 Amazon EC2 인스턴스의 MongoDB를 사용합니다. Java 백엔드 애플리케이션을 위한 단일 가용 영역의 Auto Scaling 그룹에 EC2 인스턴스를 배포합니다.", "구독자 데이터의 데이터베이스로 여러 가용 영역에서 적절한 크기의 인스턴스로 Amazon DocumentDB(MongoDB와 호환)를 구성합니다. Java 백엔드 애플리케이션을 위해 여러 가용 영역에 걸쳐 Auto Scaling 그룹에 Amazon EC2 인스턴스를 배포합니다.", "여러 가용 영역에서 온디맨드 용량 모드로 Amazon DocumentDB(MongoDB와 호환)를 구독자 데이터용 데이터베이스로 구성합니다. Java 백엔드 애플리케이션을 위해 여러 가용 영역에 걸쳐 Auto Scaling 그룹에 Amazon EC2 인스턴스를 배포합니다."], "answers": [2]}, {"q": "디지털 마케팅 회사에는 다양한 팀에 속한 여러 AWS 계정이 있습니다. 크리에이티브 팀은 AWS 계정의 Amazon S3 버킷을 사용하여 회사 마케팅 캠페인의 콘텐츠로 사용되는 이미지와 미디어 파일을 안전하게 저장합니다. 크리에이티브 팀은 전략 팀이 개체를 볼 수 있도록 전략 팀과 S3 버킷을 공유하려고 합니다. 솔루션 설계자가 전략 계정에서 이름이 strategy_reviewer인 IAM 역할을 생성했습니다. 또한 솔루션 설계자는 Creative 계정에 사용자 지정 AWS Key Management Service(AWS KMS) 키를 설정하고 키를 S3 버킷과 연결했습니다. 그러나 전략 계정의 사용자가 IAM 역할을 맡고 S3 버킷의 객체에 액세스하려고 하면 액세스 거부 오류가 발생합니다. 솔루션 설계자는 전략 계정의 사용자가 S3 버킷에 액세스할 수 있는지 확인해야 합니다. 솔루션은 이러한 사용자에게 필요한 최소한의 권한만 제공해야 합니다. 솔루션 설계자는 이러한 요구 사항을 충족하기 위해 어떤 단계 조합을 수행해야 합니까? (3개 선택)", "opts": ["S3 버킷에 대한 읽기 권한을 포함하는 버킷 정책을 생성합니다. 버킷 정책의 주체를 전략 계정의 계정 ID로 설정합니다.", "S3 버킷에 대한 전체 권한을 부여하고 사용자 지정 KMS 키에 대한 암호 해독 권한을 부여하도록 strategy_reviewer IAM 역할을 업데이트합니다.", "Creative 계정에서 사용자 지정 KMS 키 정책을 업데이트하여 strategy_reviewer IAM 역할에 암호 해독 권한을 부여합니다.", "S3 버킷에 대한 읽기 권한을 포함하는 버킷 정책을 생성합니다. 버킷 정책의 주체를 익명 사용자로 설정합니다.", "Creative 계정에서 사용자 지정 KMS 키 정책을 업데이트하여 strategy_reviewer IAM 역할에 암호화 권한을 부여합니다.", "S3 버킷에 대한 읽기 권한을 부여하고 사용자 지정 KMS 키에 대한 암호 해독 권한을 부여하도록 strategy_reviewer IAM 역할을 업데이트합니다."], "answers": [0, 2, 5]}, {"q": "생명 과학 회사는 오픈 소스 도구의 조합을 사용하여 데이터 분석 워크플로를 관리하고 온프레미스 데이터 센터의 서버에서 실행되는 Docker 컨테이너를 사용하여 게놈 데이터를 처리합니다. 시퀀싱 데이터가 생성되어 로컬 SAN(Storage Area Network)에 저장된 다음 데이터가 처리됩니다. 연구 개발 팀은 용량 문제에 직면하고 있으며 AWS에서 게놈 분석 플랫폼을 재설계하여 워크로드 수요에 따라 확장하고 처리 시간을 몇 주에서 며칠로 단축하기로 결정했습니다. 회사에는 고속 AWS Direct Connect 연결이 있습니다. 시퀀서는 각 게놈에 대해 약 200GB의 데이터를 생성하며 개별 작업은 이상적인 컴퓨팅 용량으로 데이터를 처리하는 데 몇 시간이 걸릴 수 있습니다. 최종 결과는 Amazon S3에 저장됩니다. 회사는 매일 10-15개의 작업 요청을 예상하고 있습니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["정기적으로 예약된 AWS Snowball Edge 디바이스를 사용하여 시퀀싱 데이터를 AWS로 전송합니다. AWS가 Snowball Edge 디바이스를 수신하고 데이터가 Amazon S3에 로드되면 S3 이벤트를 사용하여 AWS Lambda 함수를 트리거하여 데이터를 처리합니다.", "AWS Data Pipeline을 사용하여 시퀀싱 데이터를 Amazon S3로 전송합니다. S3 이벤트를 사용하여 Amazon EC2 Auto Scaling 그룹을 트리거하여 데이터를 처리하기 위해 Docker 컨테이너를 실행하는 사용자 지정 AMI EC2 인스턴스를 시작합니다.", "AWS DataSync를 사용하여 시퀀싱 데이터를 Amazon S3로 전송합니다. S3 이벤트를 사용하여 AWS Step Functions 워크플로를 시작하는 AWS Lambda 함수를 트리거합니다. Docker 이미지를 Amazon Elastic Container Registry(Amazon ECR)에 저장하고 AWS Batch를 트리거하여 컨테이너를 실행하고 시퀀싱 데이터를 처리합니다.", "AWS Storage Gateway 파일 게이트웨이를 사용하여 시퀀싱 데이터를 Amazon S3로 전송합니다. S3 이벤트를 사용하여 Docker 컨테이너를 실행하는 Amazon EC2 인스턴스에서 실행되는 AWS Batch 작업을 트리거하여 데이터를 처리합니다."], "answers": [2]}, {"q": "회사는 개발 환경의 단일 Windows Amazon EC2 인스턴스에서 콘텐츠 관리 애플리케이션을 실행합니다. 애플리케이션은 인스턴스에 루트 디바이스로 연결된 2TB Amazon Elastic Block Store(Amazon EBS) 볼륨에 정적 콘텐츠를 읽고 씁니다. 이 회사는 이 애플리케이션을 여러 가용 영역에 걸쳐 최소 3개의 EC2 인스턴스에서 실행되는 고가용성 및 내결함성 솔루션으로 프로덕션 환경에 배포할 계획입니다. 솔루션 설계자는 응용 프로그램을 실행하는 모든 인스턴스를 Active Directory 도메인에 연결하는 솔루션을 설계해야 합니다. 솔루션은 또한 Windows ACL을 구현하여 파일 콘텐츠에 대한 접근을 제어해야 합니다. 애플리케이션은 항상 특정 시점에 실행 중인 모든 인스턴스에서 정확히 동일한 콘텐츠를 유지해야 합니다. 최소한의 관리 오버헤드로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["Amazon Elastic File System(Amazon EFS) 파일 공유를 생성합니다. 3개의 가용 영역에 걸쳐 확장되고 최소 3개의 인스턴스 크기를 유지하는 Auto Scaling 그룹을 생성합니다. 사용자 데이터 스크립트를 구현하여 애플리케이션을 설치하고, 인스턴스를 AD 도메인에 가입하고, EFS 파일 공유를 마운트합니다.", "실행 중인 현재 EC2 인스턴스에서 새 AMI를 생성합니다. Lustre용 Amazon FSx 파일 시스템을 생성합니다. 3개의 가용 영역에 걸쳐 확장되고 최소 3개의 인스턴스 크기를 유지하는 Auto Scaling 그룹을 생성합니다. 사용자 데이터 스크립트를 구현하여 인스턴스를 AD 도메인에 가입시키고 FSx for Lustre 파일 시스템을 마운트합니다.", "Windows 파일 서버 파일 시스템용 Amazon FSx를 생성합니다. 3개의 가용 영역에 걸쳐 확장되고 최소 3개의 인스턴스 크기를 유지하는 Auto Scaling 그룹을 생성합니다. 사용자 데이터 스크립트를 구현하여 애플리케이션을 설치하고 FSx for Windows File Server 파일 시스템을 마운트합니다. 원활한 도메인 가입을 수행하여 인스턴스를 AD 도메인에 가입합니다.", "실행 중인 현재 EC2 인스턴스에서 새 AMI를 생성합니다. Amazon Elastic File System(Amazon EFS) 파일 시스템을 생성합니다. 3개의 가용 영역에 걸쳐 확장되고 최소 3개의 인스턴스 크기를 유지하는 Auto Scaling 그룹을 생성합니다. 원활한 도메인 가입을 수행하여 인스턴스를 AD 도메인에 가입합니다."], "answers": [2]}, {"q": "SaaS(Software as a Service) 기반 회사는 솔루션의 A3 부분을 고객에게 사례 관리 솔루션을 제공합니다. 이 회사는 독립형 SMTP(Simple Mail Transfer Protocol) 서버를 사용하여 애플리케이션에서 이메일 메시지를 보냅니다. 애플리케이션은 또한 고객에게 이메일 메시지를 보내기 전에 고객 데이터를 채우는 확인 이메일 메시지에 대한 이메일 템플릿을 저장합니다. 회사는 이 메시징 기능을 AWS 클라우드로 마이그레이션할 계획이며 운영 오버헤드를 최소화해야 합니다. 이러한 요구 사항을 가장 비용 효율적으로 충족하는 솔루션은 무엇입니까?", "opts": ["AWS Marketplace의 AMI를 사용하여 Amazon EC2 인스턴스에 SMTP 서버를 설정합니다. 이메일 템플릿을 Amazon S3 버킷에 저장합니다. S3 버킷에서 템플릿을 검색하고 애플리케이션의 고객 데이터를 템플릿과 병합하는 AWS Lambda 함수를 생성합니다. Lambda 함수에서 SDK를 사용하여 이메일 메시지를 보냅니다.", "이메일 메시지를 보내도록 Amazon Simple Email Service(Amazon SES)를 설정합니다. 이메일 템플릿을 Amazon S3 버킷에 저장합니다. S3 버킷에서 템플릿을 검색하고 애플리케이션의 고객 데이터를 템플릿과 병합하는 AWS Lambda 함수를 생성합니다. Lambda 함수에서 SDK를 사용하여 이메일 메시지를 보냅니다.", "AWS Marketplace의 AMI를 사용하여 Amazon EC2 인스턴스에 SMTP 서버를 설정합니다. 고객 데이터에 대한 파라미터를 사용하여 이메일 템플릿을 Amazon Simple Email Service(Amazon SES)에 저장합니다. SES 템플릿을 호출하고 고객 데이터를 전달하여 파라미터를 대체하는 AWS Lambda 함수를 생성합니다. AWS Marketplace SMTP 서버를 사용하여 이메일 메시지를 보냅니다.", "이메일 메시지를 보내도록 Amazon Simple Email Service(Amazon SES)를 설정합니다. 고객 데이터에 대한 파라미터를 사용하여 Amazon SES에 이메일 템플릿을 저장합니다. SendTemplatedEmail API 작업을 호출하고 고객 데이터를 전달하여 파라미터와 이메일 대상을 대체하는 AWS Lambda 함수를 생성합니다."], "answers": [3]}, {"q": "회사는 Auto Scaling 그룹의 Amazon EC2 인스턴스를 사용하여 AWS Cloud에서 비디오를 처리하고 있습니다. 비디오를 처리하는 데 30분이 소요됩니다. Amazon Simple Queue Service(Amazon SQS) 대기열의 비디오 수에 따라 여러 EC2 인스턴스가 확장 및 축소됩니다. 회사는 대상 배달 못한 편지 대기열과 maxReceiveCount를 1로 지정하는 리드라이브 정책으로 SQS 대기열을 구성했습니다. 회사는 SQS 대기열에 대한 가시성 제한 시간을 1시간으로 설정했습니다. 이 회사는 배달 못한 편지 대기열에 메시지가 있을 때 개발 팀에 알리도록 Amazon CloudWatch 경보를 설정했습니다. 하루 동안 여러 번. 개발 팀은 메시지가 배달 못한 편지 대기열에 있고 비디오가 처리되지 않았다는 알림을 받습니다. 조사 결과 애플리케이션 로그에서 오류가 발견되지 않았습니다. 회사는 이 문제를 어떻게 해결할 수 있습니까?", "opts": ["EC2 인스턴스에 대한 종료 방지 기능을 켭니다.", "SQS 대기열의 가시성 제한 시간을 3시간으로 업데이트합니다.", "처리 중에 인스턴스에 대한 축소 보호를 구성합니다.", "리드라이브 정책을 업데이트하고 maxReceiveCount를 0으로 설정합니다."], "answers": [2]}, {"q": "한 회사에서 리전 엔드포인트와 함께 Amazon API Gateway를 사용하는 API를 개발했습니다. API는 API Gateway 인증 메커니즘을 사용하는 AWS Lambda 함수를 호출합니다. 설계 검토 후 솔루션 설계자는 공용 액세스가 필요하지 않은 API 세트를 식별합니다. 솔루션 설계자는 VPC에서만 API 세트에 액세스할 수 있도록 솔루션을 설계해야 합니다. 모든 API는 인증된 사용자로 호출해야 합니다. 최소한의 노력으로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["내부 Application Load Balancer(ALB)를 생성합니다. 대상 그룹을 만듭니다. 호출할 Lambda 함수를 선택합니다. ALB DNS 이름을 사용하여 VPC에서 API를 호출합니다.", "API Gateway에서 API와 연결된 DNS 항목을 제거합니다. Amazon Route 53에서 호스팅 영역을 생성합니다. 호스팅 영역에서 CNAME 레코드를 생성합니다. CNAME 레코드로 API Gateway에서 API를 업데이트합니다. CNAME 레코드를 사용하여 VPC에서 API를 호출합니다.", "API 게이트웨이에서 리전에서 프라이빗으로 API 엔드포인트를 업데이트합니다. VPC에서 인터페이스 VPC 엔드포인트 생성리소스 정책을 생성하고 API에 연결합니다. VPC 엔드포인트를 사용하여 VPC에서 API를 호출합니다.", "VPC 내부에 Lambda 함수 배포 EC2 인스턴스를 프로비저닝하고 Apache 서버를 설치합니다. Apache 서버에서 Lambda 함수를 호출합니다. EC2 인스턴스의 내부 CNAME 레코드를 사용하여 VPC에서 API를 호출합니다."], "answers": [2]}, {"q": "날씨 서비스는 eu-west-1 리전의 AWS에서 호스팅되는 웹 애플리케이션의 고해상도 날씨 지도를 제공합니다. 날씨 지도는 자주 업데이트되며 정적 HTML 콘텐츠와 함께 Amazon S3에 저장됩니다. 웹 애플리케이션은 Amazon CloudFront가 전면에 있습니다. 이 회사는 최근 us-east-1 지역의 사용자에게 서비스를 제공하도록 확장했으며 이러한 신규 사용자는 각각의 날씨 지도 보기가 때때로 느리다고 보고합니다. us-east-1 성능 문제를 해결하는 단계 조합은 무엇입니까? (2개 선택)", "opts": ["eu-west-1에서 S3 버킷에 대한 AWS Global Accelerator 엔드포인트를 구성합니다. us-east-1에서 TCP 포트 80 및 443에 대한 엔드포인트 그룹을 구성합니다.", "us-east-1에서 새 S3 버킷을 생성합니다. eu-west-1의 S3 버킷에서 동기화하도록 S3 교차 리전 복제를 구성합니다.", "Lambda@Edge를 사용하여 us-east-1에서 S3 Transfer Acceleration 엔드포인트를 사용하도록 북미에서 요청을 수정합니다.", "Lambda@Edge를 사용하여 북미에서 us-east-1의 S3 버킷을 사용하도록 요청을 수정합니다.", "us-east-1에 대한 AWS Global Accelerator 엔드포인트를 CloudFront 배포의 오리진으로 구성합니다. Lambda@Edge를 사용하여 북미에서 새 오리진을 사용하도록 요청을 수정합니다."], "answers": [1, 3]}, {"q": "솔루션 설계자는 회사가 Amazon Workspaces에서 새 세션을 설정할 수 없는 문제를 조사하고 있습니다. 초기 분석 결과 문제에 사용자 프로필이 관련되어 있음이 나타납니다. Amazon Workspaces 환경은 Amazon FSx for Windows File Server를 프로필 공유 스토리지로 사용하도록 구성됩니다. FSx for Windows File Server 파일 시스템은 10TB 스토리지로 구성됩니다. 솔루션 설계자는 파일 시스템이 최대 용량에 도달했음을 발견합니다. 솔루션 설계자는 사용자가 다시 액세스할 수 있는지 확인해야 합니다. 솔루션은 또한 문제가 다시 발생하지 않도록 방지해야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["이전 사용자 프로필을 제거하여 공간을 만듭니다. 사용자 프로필을 Amazon FSx for Lustre 파일 시스템으로 마이그레이션합니다.", "update-file-system 명령을 사용하여 용량을 늘립니다. 여유 공간을 모니터링하는 Amazon CloudWatch 지표를 구현합니다. Amazon EventBridge를 사용하여 AWS Lambda 함수를 호출하여 필요에 따라 용량을 늘립니다.", "Amazon CloudWatch에서 FreeStorageCapacity 지표를 사용하여 파일 시스템을 모니터링합니다. AWS Step Functions를 사용하여 필요에 따라 용량을 늘립니다.", "이전 사용자 프로필을 제거하여 공간을 만듭니다. Windows 파일 서버 파일 시스템용 추가 FSx를 만듭니다. 사용자의 50%가 새 파일 시스템을 사용하도록 사용자 프로필 리디렉션을 업데이트합니다."], "answers": [1]}, {"q": "국제 배송 회사는 AWS에서 배송 관리 시스템을 호스팅합니다. 드라이버는 시스템을 사용하여 배송 확인을 업로드합니다. 확인에는 수령인의 서명 또는 수령인과 함께 패키지 사진이 포함됩니다. 운전자의 핸드헬드 장치는 FTP를 통해 서명과 사진을 단일 Amazon EC2 인스턴스에 업로드합니다. 각 핸드헬드 장치는 로그인한 사용자를 기반으로 디렉토리에 파일을 저장하며 파일 이름은 배송 번호와 일치합니다. 그런 다음 EC2 인스턴스는 배달 정보를 가져오기 위해 중앙 데이터베이스를 쿼리한 후 파일에 메타데이터를 추가합니다. 그런 다음 파일은 보관을 위해 Amazon S3에 배치됩니다. 회사가 확장됨에 따라 운전자는 시스템이 연결을 거부하고 있다고 보고합니다. 이러한 문제에 대한 응답으로 연결 끊김 및 메모리 문제로 인해 FTP 서버에 문제가 발생했습니다. 시스템 엔지니어는 cron 작업을 예약하여 30분마다 EC2 인스턴스를 재부팅합니다. 청구 팀은 파일이 아카이브에 항상 있는 것은 아니며 중앙 시스템이 항상 업데이트되는 것은 아니라고 보고합니다. 솔루션 설계자는 아카이브가 항상 파일을 수신하고 시스템이 항상 업데이트되도록 확장성을 최대화하는 솔루션을 설계해야 합니다. 핸드헬드 장치는 수정할 수 없으므로 회사에서 새 애플리케이션을 배포할 수 없습니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["기존 EC2 인스턴스의 AMI를 생성합니다. Application Load Balancer 뒤에 EC2 인스턴스의 Auto Scaling 그룹을 생성합니다. 최소 3개의 인스턴스를 포함하도록 Auto Scaling 그룹을 구성합니다.", "AWS Transfer Family를 사용하여 파일을 Amazon Elastic File System(Amazon EFS)에 배치하는 FTP 서버를 생성합니다. EFS 볼륨을 기존 EC2 인스턴스에 마운트합니다. EC2 인스턴스가 파일 처리를 위한 새 경로를 가리킵니다.", "AWS Transfer Family를 사용하여 파일을 Amazon S3에 배치하는 FTP 서버를 생성합니다. Amazon Simple Notification Service(Amazon SNS)를 통해 S3 이벤트 알림을 사용하여 AWS Lambda 함수를 호출합니다. 메타데이터를 추가하고 전달 시스템을 업데이트하도록 Lambda 함수를 구성합니다.", "파일을 Amazon S3에 직접 배치하도록 핸드헬드 장치를 업데이트합니다. Amazon Simple Queue Service(Amazon SQS)를 통해 S3 이벤트 알림을 사용하여 AWS Lambda 함수를 호출합니다. 메타데이터를 추가하고 전달 시스템을 업데이트하도록 Lambda 함수를 구성합니다."], "answers": [2]}, {"q": "회사가 AWS 클라우드에서 애플리케이션을 실행하고 있습니다. 애플리케이션은 Amazon Elastic Container Service(Amazon ECS) 클러스터의 컨테이너에서 실행됩니다. ECS 작업은 Fargate 시작 유형을 사용합니다. 애플리케이션의 데이터는 관계형이며 Amazon Aurora MySQL에 저장됩니다. 규제 요구 사항을 충족하려면 애플리케이션 장애 시 애플리케이션이 별도의 AWS 리전으로 복구할 수 있어야 합니다. 장애가 발생해도 데이터가 손실되지 않습니다. 최소한의 운영 오버헤드로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["다른 리전에서 Aurora 복제본을 프로비저닝합니다.", "데이터를 다른 지역으로 지속적으로 복제하도록 AWS DataSync를 설정합니다.", "다른 리전으로 데이터를 지속적으로 복제하도록 AWS DMS(AWS Database Migration Service)를 설정합니다.", "Amazon Data Lifecycle Manager(Amazon DLM)를 사용하여 5분마다 스냅샷을 예약합니다."], "answers": [0]}, {"q": "금융 서비스 회사는 신용 카드 서비스 파트너로부터 정기적인 데이터 피드를 받습니다. 약 5,000개의 레코드가 15분마다 일반 텍스트로 전송되고 HTTPS를 통해 서버 측 암호화를 통해 Amazon S3 버킷으로 직접 전달됩니다. 이 피드에는 민감한 신용 카드 기본 계정 번호(PAN) 데이터가 포함되어 있습니다. 회사는 추가 내부 처리를 위해 데이터를 다른 S3 버킷으로 보내기 전에 자동으로 PAN을 마스킹해야 합니다. 회사는 또한 특정 필드를 제거 및 병합한 다음 레코드를 JSON 형식으로 변환해야 합니다. 또한 향후 추가 피드가 추가될 가능성이 있으므로 모든 디자인을 쉽게 확장할 수 있어야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["각 레코드를 추출하여 Amazon SQS 대기열에 기록하는 파일 전송 시 AWS Lambda 함수를 호출합니다. 새 메시지가 SQS 대기열에 도착하면 다른 Lambda 함수를 호출하여 레코드를 처리하고 결과를 Amazon S3의 임시 위치에 씁니다. SQS 대기열이 비어 있으면 최종 Lambda 함수를 호출하여 레코드를 JSON 형식으로 변환하고 내부 처리를 위해 결과를 다른 S3 버킷으로 보냅니다.", "각 레코드를 추출하여 Amazon SQS 대기열에 기록하는 파일 전송 시 AWS Lambda 함수를 호출합니다. SQS 대기열에 메시지가 포함된 경우 단일 인스턴스로 자동 확장되도록 AWS Fargate 컨테이너 애플리케이션을 구성합니다. 애플리케이션이 각 레코드를 처리하고 레코드를 JSON 형식으로 변환하도록 합니다. 대기열이 비어 있으면 내부 처리를 위해 결과를 다른 S3 버킷으로 보내고 AWS Fargate 인스턴스를 축소합니다.", "데이터 피드 형식을 기반으로 AWS Glue 크롤러 및 사용자 지정 분류자를 생성하고 일치시킬 테이블 정의를 구축합니다. 파일 전송 시 AWS Lambda 함수를 호출하여 처리 및 변환 요구 사항에 따라 전체 레코드를 변환하는 AWS Glue ETL 작업을 시작합니다. 출력 형식을 JSON으로 정의합니다. 완료되면 ETL 작업이 내부 처리를 위해 결과를 다른 S3 버킷으로 보내도록 합니다.", "데이터 피드 형식을 기반으로 AWS Glue 크롤러 및 사용자 지정 분류자를 생성하고 일치시킬 테이블 정의를 구축합니다. 파일 전송에 대해 Amazon Athena 쿼리를 수행하여 처리 및 변환 요구 사항에 따라 전체 레코드를 변환하는 Amazon EMR ETL 작업을 시작합니다. 출력 형식을 JSON으로 정의합니다. 완료되면 내부 처리를 위해 결과를 다른 S3 버킷으로 보내고 EMR 클러스터를 축소합니다."], "answers": [2]}, {"q": "회사는 회사의 기본 온프레미스 애플리케이션이 실패하는 경우 AWS를 사용하여 비즈니스 연속성 솔루션을 생성하려고 합니다. 애플리케이션은 다른 애플리케이션도 실행하는 물리적 서버에서 실행됩니다. 회사에서 마이그레이션할 계획인 온프레미스 애플리케이션은 MySQL 데이터베이스를 데이터 저장소로 사용합니다. 회사의 모든 온프레미스 애플리케이션은 Amazon EC2와 호환되는 운영 체제를 사용합니다. 최소한의 운영 오버헤드로 회사의 목표를 달성할 수 있는 솔루션은 무엇입니까?", "opts": ["MySQL 서버를 포함한 소스 서버에 AWS Replication Agent를 설치합니다. 모든 서버에 대한 복제를 설정합니다. 일반 훈련을 위한 테스트 인스턴스를 시작합니다. 실패 이벤트의 경우 워크로드를 장애 조치하기 위해 테스트 인스턴스로 컷오버합니다.", "MySQL 서버를 포함하여 소스 서버에 ": [1]}, {"q": "회사가 온프레미스에서 AWS로 애플리케이션을 마이그레이션했습니다. 애플리케이션 프런트엔드는 Application Load Balancer(ALB) 뒤에 있는 두 개의 Amazon EC2 인스턴스에서 실행되는 정적 웹 사이트입니다. 애플리케이션 백엔드는 다른 ALB 뒤에 있는 3개의 EC2 인스턴스에서 실행되는 Python 애플리케이션입니다. EC2 인스턴스는 애플리케이션의 최대 사용량에 대한 온프레미스 사양을 충족하도록 크기가 조정된 대형 범용 온디맨드 인스턴스입니다. 애플리케이션은 매월 평균 수십만 건의 요청을 처리합니다. 그러나 애플리케이션은 주로 점심 시간에 사용되며 나머지 시간에는 트래픽이 최소화됩니다. 솔루션 설계자는 애플리케이션 가용성에 부정적인 영향을 미치지 않으면서 애플리케이션의 인프라 비용을 최적화해야 합니다. 이러한 요구 사항을 충족하는 단계 조합은 무엇입니까? (2개 선택)", "opts": ["모든 EC2 인스턴스를 기존 EC2 인스턴스와 동일한 수의 코어가 있는 컴퓨팅 최적화 인스턴스로 변경합니다.", "애플리케이션 프런트엔드를 Amazon S3에서 호스팅되는 정적 웹 사이트로 이동합니다.", "AWS Elastic Beanstalk를 사용하여 애플리케이션 프런트엔드를 배포합니다. 노드에 대해 동일한 인스턴스 유형을 사용하십시오.", "모든 백엔드 EC2 인스턴스를 스팟 인스턴스로 변경합니다.", "기존 EC2 인스턴스와 코어 수가 동일한 범용 버스트 가능 EC2 인스턴스에 백엔드 Python 애플리케이션을 배포합니다."], "answers": [1, 4]}, {"q": "회사는 AWS에서 이벤트 티켓팅 플랫폼을 실행 중이며 플랫폼의 비용 효율성을 최적화하려고 합니다. 이 플랫폼은 Amazon EC2와 함께 Amazon Elastic Kubernetes Service(Amazon EKS)에 배포되며 Amazon RDS for MySQL DB 인스턴스의 지원을 받습니다. 이 회사는 AWS Fargate를 사용하여 Amazon EKS에서 실행할 새로운 애플리케이션 기능을 개발하고 있습니다. 플랫폼은 드물게 최고 수요를 경험합니다. 수요 급증은 이벤트 날짜에 따라 다릅니다. 플랫폼에 가장 비용 효율적인 설정을 제공하는 솔루션은 무엇입니까?", "opts": ["EKS 클러스터가 기준 로드에서 사용하는 EC2 인스턴스에 대한 표준 예약 인스턴스를 구입합니다. 피크를 처리하기 위해 스팟 인스턴스로 클러스터를 확장합니다. 해당 연도의 예상 최대 로드를 충족하려면 데이터베이스에 대한 1년 전체 선결제 예약 인스턴스를 구입하십시오.", "EKS 클러스터의 예상 중간 로드에 대한 Compute Savings Plans를 구입합니다. 피크 이벤트 날짜를 기준으로 온디맨드 용량 예약으로 클러스터를 확장합니다. 예측된 기본 로드를 충족하기 위해 데이터베이스에 대한 1년 선결제 없음 예약 인스턴스를 구매합니다. 사용량이 많을 때 일시적으로 데이터베이스 읽기 전용 복제본을 확장합니다.", "EKS 클러스터의 예상 기본 부하에 대한 EC2 Instance Savings Plans를 구입합니다. 피크를 처리하기 위해 스팟 인스턴스로 클러스터를 확장합니다. 예측된 기본 부하를 충족하기 위해 데이터베이스에 대한 1년 전체 선결제 예약 인스턴스를 구입합니다. 사용량이 많을 때 일시적으로 DB 인스턴스를 수동으로 확장합니다.", "EKS 클러스터의 예상 기본 부하에 대한 Compute Savings Plans를 구입합니다. 피크를 처리하기 위해 스팟 인스턴스로 클러스터를 확장합니다. 예측된 기본 부하를 충족하기 위해 데이터베이스에 대한 1년 전체 선결제 예약 인스턴스를 구입합니다. 사용량이 많을 때 일시적으로 DB 인스턴스를 수동으로 확장합니다."], "answers": [1]}, {"q": "회사에서 AWS Elastic Beanstalk에 애플리케이션을 배포했습니다. 애플리케이션은 데이터베이스 계층에 Amazon Aurora를 사용합니다. Amazon CloudFront 배포는 웹 요청을 처리하고 Elastic Beanstalk 도메인 이름을 오리진 서버로 포함합니다. 배포는 방문자가 애플리케이션에 액세스할 때 사용하는 대체 도메인 이름으로 구성됩니다. 매주 회사는 일상적인 유지 관리를 위해 응용 프로그램을 서비스에서 제외합니다. 애플리케이션을 사용할 수 없는 시간 동안 회사는 방문자가 CloudFront 오류 메시지 대신 정보 메시지를 받기를 원합니다. 솔루션 설계자는 프로세스의 첫 번째 단계로 Amazon S3 버킷을 생성합니다. 요구 사항을 충족하기 위해 솔루션 설계자가 다음으로 수행해야 하는 단계 조합은 무엇입니까? (3개 선택)", "opts": ["정적 정보 콘텐츠를 S3 버킷에 업로드합니다.", "새 CloudFront 배포를 만듭니다. S3 버킷을 오리진으로 설정합니다.", "원래 CloudFront 배포에서 S3 버킷을 두 번째 오리진으로 설정합니다. 원본 액세스 ID(OAI)를 사용하도록 배포 및 S3 버킷을 구성합니다.", "주간 유지 관리 중에 S3 오리진을 사용하도록 기본 캐시 동작을 편집합니다. 유지 관리가 완료되면 변경 사항을 되돌립니다.", "주간 유지 관리 중에 새 배포에서 S3 오리진에 대한 캐시 동작을 생성합니다. 경로 패턴을 \\로 설정합니다. 우선 순위를 0으로 설정합니다. 유지 관리가 완료되면 캐시 동작을 삭제합니다.", "주간 유지 관리 중에 S3 버킷의 트래픽을 제공하도록 Elastic Beanstalk를 구성합니다."], "answers": [0, 2, 3]}, {"q": "회사는 사용자에게 맞춤형 애플리케이션에서 이미지를 업로드할 수 있는 기능을 제공합니다. 업로드 프로세스는 Amazon S3 버킷에서 이미지를 처리하고 저장하는 AWS Lambda 함수를 호출합니다. 애플리케이션은 특정 함수 버전 ARN을 사용하여 Lambda 함수를 호출합니다. Lambda 함수는 환경 변수를 사용하여 이미지 처리 매개변수를 수락합니다. 회사는 종종 최적의 이미지 처리 출력을 얻기 위해 Lambda 함수의 환경 변수를 조정합니다. 회사는 다양한 매개변수를 테스트하고 결과를 확인한 후 업데이트된 환경 변수로 새 기능 버전을 게시합니다. 또한 이 업데이트 프로세스에서는 새 기능 버전 ARN을 호출하기 위해 사용자 지정 애플리케이션을 자주 변경해야 합니다. 이러한 변경 사항은 사용자에게 방해가 됩니다. 솔루션 설계자는 이 프로세스를 단순화하여 사용자의 혼란을 최소화해야 합니다. 최소한의 운영 오버헤드로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["게시된 Lambda 함수 버전의 환경 변수를 직접 수정합니다. SLATEST 버전을 사용하여 이미지 처리 매개변수를 테스트합니다.", "이미지 처리 매개변수를 저장할 Amazon DynamoDB 테이블을 생성합니다. DynamoDB 테이블에서 이미지 처리 매개변수를 검색하도록 Lambda 함수를 수정합니다.", "Lambda 함수 내에서 이미지 처리 매개변수를 직접 코딩하고 환경 변수를 제거합니다. 회사에서 매개변수를 업데이트하면 새 기능 버전을 게시합니다.", "Lambda 함수 별칭을 생성합니다. 함수 별칭 ARN을 사용하도록 클라이언트 애플리케이션을 수정합니다. 회사에서 테스트를 완료하면 함수의 새 버전을 가리키도록 Lambda 별칭을 재구성합니다."], "answers": [3]}, {"q": "글로벌 미디어 회사는 애플리케이션의 다중 지역 배포를 계획하고 있습니다. Amazon DynamoDB 글로벌 테이블은 사용자가 집중된 두 대륙에서 일관된 사용자 경험을 유지하기 위해 배포를 지원합니다. 각 배포에는 퍼블릭 Application Load Balancer(ALB)가 있습니다. 퍼블릭 DNS는 회사에서 내부적으로 관리합니다. 회사는 apex 도메인을 통해 애플리케이션을 사용할 수 있게 하려고 합니다. 최소한의 노력으로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["퍼블릭 DNS를 Amazon Route 53으로 마이그레이션합니다. ALB를 가리키도록 apex 도메인에 대한 CNAME 레코드를 생성합니다. 지리적 위치 라우팅 정책을 사용하여 사용자 위치를 기반으로 트래픽을 라우팅합니다.", "Amazon Route 53에 대한 ALMigrate 퍼블릭 DNS 앞에 NLB(Network Load Balancer)를 배치합니다. NLB의 정적 IP 주소를 가리키도록 apex 도메인에 대한 CNAME 레코드를 생성합니다. 지리적 위치 라우팅 정책을 사용하여 사용자 위치를 기반으로 트래픽을 라우팅합니다.", "적절한 AWS 리전의 엔드포인트를 대상으로 하는 여러 엔드포인트 그룹으로 AWS Global Accelerator 액셀러레이터를 생성합니다. 액셀러레이터의 고정 IP 주소를 사용하여 apex 도메인에 대한 퍼블릭 DNS의 레코드를 생성합니다.", "AWS 리전 중 하나에서 AWS Lambda가 지원하는 Amazon API Gateway API를 생성합니다. 라운드 로빈 방법을 사용하여 트래픽을 애플리케이션 배포로 라우팅하도록 Lambda 함수를 구성합니다. API의 URL을 가리키도록 apex 도메인에 대한 CNAME 레코드를 생성합니다."], "answers": [2]}, {"q": "회사에서 Amazon API Gateway 및 AWS Lambda를 사용하여 새로운 서버리스 API를 개발하고 있습니다. 이 회사는 Lambda 함수를 API Gateway와 통합하여 여러 공유 라이브러리와 사용자 지정 클래스를 사용했습니다. 솔루션 설계자는 솔루션 배포를 단순화하고 코드 재사용을 최적화해야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["공유 라이브러리 및 사용자 지정 클래스를 Docker 이미지에 배포합니다. 이미지를 S3 버킷에 저장합니다. Docker 이미지를 소스로 사용하는 Lambda 계층을 생성합니다. API의 Lambda 함수를 Zip 패키지로 배포합니다. Lambda 계층을 사용하도록 패키지를 구성합니다.", "공유 라이브러리 및 사용자 지정 클래스를 Docker 이미지에 배포합니다. 이미지를 Amazon Elastic Container Registry(Amazon ECR)에 업로드합니다. Docker 이미지를 소스로 사용하는 Lambda 계층을 생성합니다. API의 Lambda 함수를 Zip 패키지로 배포합니다. Lambda 계층을 사용하도록 패키지를 구성합니다.", "AWS Fargate 시작 유형을 사용하여 Amazon Elastic Container Service(Amazon ECS)의 Docker 컨테이너에 공유 라이브러리 및 사용자 지정 클래스를 배포합니다. API의 Lambda 함수를 Zip 패키지로 배포합니다. 배포된 컨테이너를 Lambda 계층으로 사용하도록 패키지를 구성합니다.", "API의 Lambda 함수에 대한 공유 라이브러리, 사용자 지정 클래스 및 코드를 Docker 이미지에 배포합니다. 이미지를 Amazon Elastic Container Registry(Amazon ECR)에 업로드합니다. Docker 이미지를 배포 패키지로 사용하도록 API의 Lambda 함수를 구성합니다."], "answers": [3]}, {"q": "제조 회사에서 공장용 검사 솔루션을 구축하고 있습니다. 이 회사는 각 조립 라인 끝에 IP 카메라가 있습니다. 이 회사는 Amazon SageMaker를 사용하여 기계 학습(ML) 모델을 교육하여 스틸 이미지에서 일반적인 결함을 식별했습니다. 회사는 결함이 감지되면 공장 작업자에게 현지 피드백을 제공하려고 합니다. 회사는 공장의 인터넷 연결이 끊어진 경우에도 이 피드백을 제공할 수 있어야 합니다. 회사에는 작업자에게 로컬 피드백을 제공하는 API를 호스팅하는 로컬 Linux 서버가 있습니다. 회사는 이러한 요구 사항을 충족하기 위해 ML 모델을 어떻게 배포해야 합니까?", "opts": ["각 IP 카메라에서 AWS로 Amazon Kinesis 비디오 스트림을 설정합니다. Amazon EC2 인스턴스를 사용하여 스트림의 스틸 이미지를 찍습니다. 이미지를 Amazon S3 버킷에 업로드합니다. M
