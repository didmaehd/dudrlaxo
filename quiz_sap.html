n Bedrock 지식 기반에 저장합니다. 모델이 진단 조언을 제공하지 않도록 시스템 프롬프트를 구성합니다. 추론 후 AWS Lambda 함수를 사용하여 모델 응답에서 PII를 제거한 다음 사용자에게 응답을 반환합니다.", "승인된 지원 대화에 맞춰 FM을 세밀하게 조정합니다. 진단 조언을 금지하는 프롬프트 템플릿을 추가합니다. 대화가 끝난 후 금지된 주제와 민감한 정보가 있는지 대화 내용을 검사하는 별도의 검토 프로세스를 실행합니다.", "애플리케이션에 사용자 지정 검열 계층을 구축하여 프롬프트에서 금지된 주제를 검사하고 사용자 입력에서 민감한 정보를 제거합니다. Converse API를 통해 모델을 호출합니다. 사용자에게 응답을 표시하기 전에 별도의 후처리 로직을 사용하여 응답에서 민감한 정보를 제거합니다.", "Amazon Bedrock 가드레일을 생성합니다. 의료 진단 조언에 대한 금지된 주제를 구성합니다. 개인 식별 정보(PII)를 마스킹하기 위해 민감한 정보 필터를 구성합니다. 콘텐츠 필터를 구성합니다. 추론 전에 사용자 프롬프트에서 ApplyGuardrail API를 호출합니다. 모델 응답을 평가하기 위해 Converse API에도 동일한 가드레일을 포함합니다."], "answers": [3]}, {"q": "머신러닝(ML) 회사는 지속적으로 새로운 버전의 모델을 개발합니다. 이러한 모델은 RESTful API를 사용하여 사용자 지정 Python 코드를 호출하는 웹 애플리케이션에 통합됩니다. 이 애플리케이션은 Amazon EC2 Auto Scaling 그룹에서 실행됩니다. 고객 피드백에 따르면 새로운 모델 버전이 이전 버전보다 성능이 저하되는 경우가 있습니다. 회사는 성능 검증을 위해 초기에는 트래픽의 10%를 새로운 모델로 라우팅하는 점진적 배포 방식을 구현하고자 합니다. 또한 이 솔루션은 인프라 관리 운영 오버헤드를 줄여야 합니다. 이러한 요구 사항을 충족하면서 운영 오버헤드를 최소화하는 솔루션은 무엇입니까?", "opts": ["모델 버전을 Amazon SageMaker AI 멀티 모델 엔드포인트에 배포합니다. 새 버전의 가중치를 10%, 이전 버전의 가중치를 90%로 설정합니다. Python 코드를 AWS Lambda 함수로 마이그레이션합니다. Amazon API Gateway를 사용하여 Lambda 함수를 호출합니다.", "각 모델 버전을 별도의 Amazon SageMaker 서버리스 추론 엔드포인트에 배포합니다. 가중치 기반 무작위 선택에 따라 호출의 10%는 새 엔드포인트로, 90%는 이전 버전으로 라우팅하도록 AWS Lambda 함수를 구성합니다. Amazon API Gateway를 사용하여 Lambda 함수를 호출합니다.", "각 모델 버전을 별도의 Amazon SageMaker AI 단일 모델 엔드포인트에 배포합니다. 호출의 10%는 새 엔드포인트 URL로, 90%는 이전 버전으로 라우팅하도록 AWS Lambda 함수를 구성합니다. Amazon API Gateway를 사용하여 Lambda 함수를 호출합니다.", "모델 버전을 Amazon SageMaker 서버리스 추론 엔드포인트에 배포합니다. 카나리 배포를 사용하는 Amazon API Gateway를 통해 트래픽의 10%를 새 모델 버전으로 점진적으로 전환하고, 나머지 90%는 이전 버전으로 유지합니다."], "answers": [3]}, {"q": "한 회사에 20개 이상의 애플리케이션 개발 팀이 있습니다. 모든 팀은 AWS CloudFormation을 사용하여 회사 프로덕션 AWS 계정에 애플리케이션 리소스를 배포합니다. 프로덕션 계정은 모든 기능이 활성화된 AWS Organizations의 구성원입니다. 회사는 개발 팀이 프로비저닝하는 모든 리소스가 미리 정의된 규칙 집합을 준수하는지 확인해야 합니다. 또한 CloudFormation을 통해 사용자가 규정을 준수하지 않는 리소스를 프로비저닝하는 것을 방지하는 솔루션이 필요합니다. 이러한 요구 사항을 가장 적은 운영 오버헤드로 충족하는 솔루션은 무엇입니까?", "opts": ["각 구성 규칙을 별도의 AWS Config 사용자 지정 AWS Lambda 규칙으로 구현합니다. Lambda 함수를 회사 프로덕션 계정에 배포합니다. Lambda 함수의 변경을 방지하고 프로덕션 계정에서 AWS Config 또는 해당 규칙이나 트리거를 비활성화할 수 있는 모든 작업을 거부하는 SCP를 구현합니다.", "CloudFormation Hooks를 사용하여 구성 규칙을 구현합니다. 각 규칙을 적용하기 위해 별도의 AWS Lambda 함수를 사용합니다. CloudFormation StackSets를 사용하여 조직의 모든 구성원 계정에 Hooks를 배포하고 등록합니다. SCP와 IAM 정책을 사용하여 멤버 계정에서 Hook 수정 및 Lambda 함수 변경을 방지합니다.", "구성 규칙을 AWS Lambda 함수로 구현합니다. CloudFormation에서 Lambda 함수를 사용할 수 있도록 CloudFormation 매크로 정의를 구성합니다. 함수가 CloudFormation 템플릿을 구성 규칙과 비교하도록 구성합니다. 모든 CloudFormation 배포 템플릿에서 해당 매크로를 사용합니다.", "AWS CloudFormation Guard 규칙을 사용하여 구성 규칙을 구현합니다. `cfn-guard-lambda` 명령을 사용하여 Guard를 AWS Lambda 함수로 설치합니다. Lambda 함수를 호출하여 Guard를 빌드하고 실행합니다. CloudFormation 템플릿과 규칙 세트를 함수의 입력으로 제공합니다."], "answers": [1]}, {"q": "다국적 보험 회사가 Amazon Bedrock FM으로 구동되는 내부 클레임 처리 AI 어시스턴트를 배포하고 있습니다. 이 AI 어시스턴트는 클레임 기록 조회, 사기 검사, 보험 증권 데이터 업데이트 등을 위해 여러 내부 API를 사용해야 합니다. 회사는 이미 중앙 집중식 Amazon Bedrock AgentCore 게이트웨이를 통해 API를 노출하고 있으며, 엔터프라이즈 정책을 통해 IAM 권한 부여, 요청 유효성 검사, 도구 수준 액세스 제어를 시행하고 있습니다. 클레임 처리를 위한 일부 특수 유효성 검사 로직은 컨테이너화된 마이크로서비스에서 실행됩니다. 추론 과정에서 회사는 FM이 엔터프라이즈 통합 계층을 통해 노출된 승인된 도구만 자동으로 검색하고 호출하기를 원합니다. 또한 도구 실행을 위한 애플리케이션 측 오케스트레이션 루프를 구현하고 싶지 않습니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["Amazon Bedrock Responses API에 AgentCore Runtime 서비스 엔드포인트를 도구로 등록하여 Amazon Bedrock이 AgentCore Runtime에 호스팅된 사용 가능한 도구를 자동으로 검색하도록 합니다.", "Responses API를 구성하여 AgentCore 게이트웨이 ARN을 도구 커넥터로 지정하고, 모델이 승인된 도구 카탈로그를 검색하고 호출하도록 합니다.", "AI 어시스턴트가 런타임 서비스를 호출할 수 있도록 Amazon Bedrock과 AgentCore 런타임 클러스터 간에 MCP 연결을 설정합니다.", "AgentCore 런타임 서비스를 Amazon Bedrock 액션 그룹으로 구성합니다. FM 추론 중에 InvokeModelWithResponseStream API를 통해 액션 그룹을 호출합니다."], "answers": [1]}, {"q": "한 회사가 원격 근무 직원이 애플리케이션의 웹 인터페이스에 액세스할 수 있도록 해야 합니다. 이 애플리케이션은 AWS 클라우드의 VPC에 호스팅되어 있으며, 여러 가용 영역에 걸쳐 있는 프라이빗 서브넷의 Amazon EC2 인스턴스에서 실행됩니다. 원격 근무 직원은 현재 회사 VPN 연결을 사용하고 있지 않습니다. 회사 정책상 공용 인터넷에서 애플리케이션으로 직접 연결하는 것은 허용되지 않습니다. 다음과 같은 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["회사의 외부 IP 주소를 사용하여 고객 게이트웨이를 생성  처리하고 저장해야 합니다. 또한 EU 주권 경계 밖의 워크로드가 EU 고객 콘텐츠를 처리하는 것을 방지해야 합니다. 기업은 팀이 실수로 EU 워크로드 또는 인프라를 EU 리전 외부에 배포하지 않도록 예방적인 거버넌스 제어가 필요합니다. 이러한 요건을 충족하는 솔루션은 무엇입니까?", "opts": ["API Gateway와 Lambda를 사용하여 EU 및 비EU 처리 스택을 분리하여 배포합니다. Amazon Route 53 지리적 위치 라우팅을 사용하여 EU 업로드를 EU 엔드포인트로 전송합니다. EU 미디어는 EU 리전의 Amazon S3에 저장합니다. EU 메타데이터는 EU 리전의 DynamoDB에 저장합니다. Organizations SCP를 사용하여 리전 제한을 적용합니다.", "여러 리전의 Lambda 함수를 호출하는 단일 글로벌 API Gateway 엔드포인트를 배포합니다. EU 업로드에는 Amazon Route 53 지리적 위치 라우팅을 사용합니다. EU 미디어는 eu-west-1 리전의 S3 버킷에 저장합니다. EU 메타데이터는 동일 리전의 DynamoDB 테이블에 저장합니다. IAM 정책을 사용하여 액세스를 제한합니다.", "모든 고객 업로드에 대해 API Gateway 및 Lambda 워크로드를 EU 리전에만 배포합니다. EU 업로드에는 Amazon Route 53 지리적 위치 라우팅을 사용합니다. EU 미디어는 EU 리전의 Amazon S3에 저장합니다. EU 메타데이터는 EU 리전의 DynamoDB에 저장합니다. AWS Config 규칙을 사용하여 EU 리전 외부에 배포된 리소스를 감지합니다.", "API Gateway 및 Lambda를 사용하여 EU 및 비EU 처리 스택을 별도로 배포합니다. Amazon Route 53 지연 시간 기반 라우팅을 사용하여 가장 가까운 엔드포인트로 요청을 보냅니다. EU 미디어는 EU 리전의 Amazon S3에 저장합니다. EU 메타데이터는 EU 리전의 DynamoDB에 저장합니다. AWS Control Tower 컨트롤을 사용하여 EU 리전 외부에 배포된 리소스를 모니터링합니다."], "answers": [0]}, {"q": "한 회사가 AWS Step Functions를 사용하여 여러 단계를 오케스트레이션하는 자동화 파이프라인을 구축하고 있습니다. 이 파이프라인에는 확인 단계가 포함되어 있습니다. 회사는 불필요한 컴퓨팅 자원 소모를 피하고자 합니다. 또한 워크플로가 상태 손실 없이 장기간 대기 상태로 유지될 수 있도록 해야 합니다. 확인 신호는 별도의 AWS 계정에서 실행되는 컨트롤 플레인 서비스에서 발생하며, 담당자의 검토 후 비동기적으로 전송됩니다. 솔루션은 승인된 외부 시스템만 실행을 재개할 수 있도록 보장해야 하며, 장기간 유효한 자격 증명을 노출해서는 안 됩니다. 다음과 같은 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["동적으로 연장되는 대기 상태를 구성합니다. 재시도할 때마다 외부 시스템에서 승인 상태를 확인하는 AWS Lambda 함수를 호출합니다.", "콜백 패턴을 사용하여 고유한 상관 관계 토큰을 제공하고, 외부 시스템에서 승인 후 해당 토큰을 반환할 때만 실행을 재개하는 작업 상태를 구성합니다.", "작업을 검색하고 외부에서 승인이 확인될 때까지 워크플로 실행을 자체 장기 실행 프로세스 내에서 유지하는 액티비티 워커를 구성합니다.", "승인 상태 및 상관 관계 식별자를 반영하는 입력을 사용하여 워크플로를 다시 호출함으로써 실행 재개를 주기적으로 트리거하는 Amazon EventBridge 규칙을 구성합니다."], "answers": [1]}, {"q": "한 회사가 온프레미스 단일 노드 Kubernetes 클러스터로 구성된 플랫폼을 보유하고 있습니다. 이 클러스터는 Windows 기반 및 Linux 기반 파일 스토리지를 공유 스토리지로 사용합니다. 회사는 이 플랫폼을 AWS로 마이그레이션하려고 합니다. 클러스터에는 운영 체제 취약점 및 프로그래밍 언어 패키지 취약점을 지속적으로 검사하는 여러 컨테이너화된 애플리케이션이 있습니다. 회사는 모니터링, 로깅 및 멀티프로토콜 공유 스토리지를 지원하는 고가용성 솔루션이 필요합니다. 운영 오버헤드를 최소화하면서 이러한 요구 사항을 충족하는 단계 조합은 무엇입니까? (두가지 선택)", "opts": ["기존 Kubernetes 클러스터를 AWS에서 관리하는 단일 노드 Amazon EKS 클러스터로 교체합니다. 공개 Docker 이미지를 사용하여 EKS 클러스터에 Prometheus 및 Grafana를 설치합니다. 애플리케이션 Docker 이미지를 Amazon ECR에 저장합니다. ECR 향상된 스캔을 활성화합니다.", "기존 Kubernetes 클러스터를 AWS에서 관리하는 다중 노드 Amazon EKS 클러스터로 교체합니다. 모니터링을 위해 Amazon Managed Service for Prometheus 및 Amazon Managed Grafana를 설정합니다. 애플리케이션 Docker 이미지를 Amazon ECR에 저장합니다. ECR 향상된 스캔을 활성화합니다. C. 기존 Kubernetes 클러스터를 AWS에서 관리하는 멀티노드 Amazon EKS 클러스터로 교체합니다. Amazon EC2 인스턴스에 Prometheus 및 Grafana의 오픈 소스 버전을 설치합니다. 애플리케이션 Docker 이미지를 Amazon ECR에 저장합니다. ECR 향상된 스캔 기능을 활성화합니다.", "Amazon FSx for Windows File Server 파일 공유와 Amazon EFS 파일 시스템을 프로비저닝합니다. Amazon EKS 클러스터에서 실행된 컨테이너에 파일 공유와 파일 시스템을 영구 볼륨으로 마운트합니다.", "Amazon FSx for NetApp ONTAP 파일 시스템을 프로비저닝합니다. Amazon EKS 클러스터에서 실행된 컨테이너에 파일 시스템을 영구 볼륨으로 마운트합니다."], "answers": [1, 4]}, {"q": "글로벌 헬스케어 분석 회사가 수십 개의 AWS 계정에 걸쳐 AWS에서 규제 대상 워크로드를 실행하고 있습니다. 이 회사는 AWS Organizations의 조직을 사용하여 계정을 관리합니다. 회사는 특정 보안 제어가 구현되고 지속적으로 시행되고 있음을 외부 감사자에게 정기적으로 입증해야 합니다. 이러한 보안 제어에는 스토리지 서비스에 대한 암호화 요구 사항, 중앙 집중식 로깅 구성 및 공용 네트워크 액세스 제한이 포함됩니다. 회사는 계정 전반에 걸쳐 제어가 구현되었음을 보여주는 증거를 지속적으로 수집하는 자동화된 솔루션을 원합니다. 이 솔루션은 지정된 기간 동안 과거 증거를 보존해야 합니다. 또한 특정 규제 프레임워크에 맞춰 감사자를 위한 보고서를 생성해야 합니다. 회사는 사용자 지정 증거 수집 파이프라인을 구축하고 싶지 않습니다. 운영 오버헤드가 가장 적은 솔루션은 무엇입니까?", "opts": ["모든 계정에서 AWS CloudTrail 조직 추적을 활성화하고 로그를 감사 계정의 중앙 집중식 Amazon S3 버킷으로 전송합니다. Amazon Athena를 사용하여 중앙 집중식 로그를 쿼리하고 감사자가 필요한 보안 제어에 대한 증거를 검토할 수 있도록 예약된 보고서를 생성합니다.", "모든 계정에서 AWS Security Hub를 활성화합니다. 위임된 관리자 계정을 지정하여 조직 전체의 보안 결과를 집계합니다. Security Hub 결과 및 규정 준수 검사 결과를 Amazon S3로 내보냅니다. 감사자를 위해 정기적인 규정 준수 보고서를 생성합니다.", "각 계정에서 AWS Config 규칙을 활성화하여 필수 보안 제어를 평가합니다. 구성 스냅샷을 중앙 집중식 Amazon S3 버킷에 저장합니다. 감사 계정에서 AWS Lambda 함수를 사용하여 스냅샷을 주기적으로 분석하고 감사자를 위한 규정 준수 증거 보고서를 생성합니다.", "모든 계정에서 AWS Config 규칙을 활성화하여 필수 보안 제어를 평가합니다. 감사 계정에서 AWS Config 애그리게이터를 사용하여 구성 데이터를 중앙 집중화합니다. 필수 규제 프레임워크에 맞춰 AWS Config 적합성 팩을 배포합니다. AWS Audit Manager를 사용하여 증거를 수집하고 감사 보고서를 생성합니다."], "answers": [3]}, {"q": "한 회사가 모든 인프라 코드를 GitHub Enterprise에 호스팅된 중앙 Git 저장소에 저장합니다. 이 회사는 풀 리퀘스트를 사용하여 모든 인프라 업데이트를 제출하는 프로세스를 구현하려고 합니다. 각 풀 리퀘스트는 자동으로 AWS CloudFormation 변경 세트를 받아야 합니다. 풀 리퀘스트가 승인되면 CloudFormation은 업데이트를 직접 적용해야 합니다. 이 프로세스는 사용자 지정 파이프라인이나 수동 템플릿 처리를 필요로 하지 않아야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["CloudFormation을 사용하여 AWS CodePipeline 액션을 호출합니다. CodePipeline 액션을 구성하여 템플릿 유효성을 검사하고 유효성 검사 결과를 풀 리퀘스트 댓글로 게시합니다.", "CloudFormation Git 동기화를 사용하여 CloudFormation과 저장소를 연결합니다. 풀 리퀘스트 업데이트에 대한 자동 변경 세트 생성을 구성합니다. CloudFormation이 변경 세트 요약을 게시하고 풀 리퀘스트가 승인 및 병합될 때 업데이트를 적용하도록 구성합니다.", "CloudFormation 드리프트 감지를 사용합니다. 풀 리퀘스트 업데이트에 반응하는 Amazon EventBridge 규칙을 생성합니다. EventBridge 규칙을 구성하여 드리프트 비교 결과를 생성하고 스택이 업데이트되기 전에 댓글로 전송합니다.", "CloudFormation Lambda Hooks를 사용합니다. Lambda Hooks를 구성하여 업데이트된 템플릿을 평가하고 스택 업데이트가 요청될 때 계획된 변경 사항을 풀 리퀘스트에 기록하도록 합니다."], "answers": [1]}, {"q": "한 회사가 온프레미스 워크로드를 AWS로 마이그레이션하려고 합니다. 워크로드는 Linux 및 Windows 운영 체제에서 실행됩니다. 이 회사는 수많은 애플리케이션을 호스팅하는 물리적 머신과 가상 머신으로 구성된 대규모 온프레미스 인프라 구조를 보유하고 있습니다. 회사는 온프레미스 시스템의 구성, 성능, 실행 중인 프로세스 및 네트워크 구성에 대한 세부 정보를 수집해야 합니다. 또한 AWS 마이그레이션을 위해 온프레미스 애플리케이션을 그룹으로 분류해야 합니다. 회사는 AWS에서 워크로드를 가장 비용 효율적인 방식으로 실행할 수 있도록 Amazon EC2 인스턴스 유형에 대한 권장 사항을 필요로 합니다. 솔루션 아키텍트는 이러한 요구 사항을 충족하기 위해 어떤 단계 조합을 수행해야 합니까? (세 가지 선택)", "opts": ["물리적 머신과 가상 머신에 AWS Application Discovery Agent를 설치하여 기존 애플리케이션을 평가합니다.", "물리적 머신과 가상 머신에 AWS Systems Manager Agent를 설치하여 기존 애플리케이션을 평가합니다.", "AWS Systems Manager Application Manager를 사용하여 마이그레이션을 위해 서버를 애플리케이션별로 그룹화합니다.", "AWS Migration Hub를 사용하여 마이그레이션을 위해 서버를 애플리케이션별로 그룹화합니다.", "AWS Migration Hub를 사용하여 권장 인스턴스 유형 및 관련 비용을 생성합니다.", "서버 크기에 대한 데이터를 AWS Trusted Advisor로 가져옵니다. 비용 최적화를 위한 권장 사항을 따릅니다."], "answers": [0, 3, 4]}, {"q": "한 회사가 Amazon Bedrock AgentCore Runtime에 AI 에이전트를 배포하고 있습니다. 이 에이전트는 AWS 리소스 및 외부 서비스에 액세스하여 비즈니스 프로세스를 자동화합니다. 에이전트는 사용자 상호 작용이 필요하지 않은 작업을 수행합니다. 회사는 에이전트가 하위 서비스에 액세스할 때 자체 ID로 인증해야 합니다. 또한 에이전트는 수행하는 모든 작업에 대한 에이전트 ID를 기록하는 감사 추적을 유지해야 합니다. 다음과 같은 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["에이전트를 Amazon Bedrock AgentCore Identity 에이전트 ID 디렉터리에 워크로드 ID로 등록합니다. 각 하위 서비스에 대해 OAuth 2.0 클라이언트 자격 증명 부여 흐름을 사용하여 리소스 자격 증명 공급자를 구성합니다. 워크로드 ID를 사용하여 하위 서비스 및 감사 시스템이 각 작업을 수행한 에이전트를 식별할 수 있도록 합니다.", "에이전트용 IAM 사용자를 생성합니다. AWS Secrets Manager에 장기 액세스 키를 저장합니다. 런타임에 키를 검색하고 각 하위 서비스에 인증하는 데 에이전트를 구성합니다.", "에이전트를 Amazon Bedrock AgentCore Identity 에이전트 ID 디렉터리에 워크로드 ID로 등록합니다. 각 다운스트림 서비스에 대해 OAuth 2.0 권한 부여 코드 부여 흐름을 사용하여 리소스 자격 증명 공급자를 구성하여 각 사용자를 대신하여 위임된 액세스 토큰을 얻습니다.", "에이전트용 IAM 역할을 생성합니다. 각 다운스트림 서비스가 IAM 서명 버전 4(SigV4)로 서명된 요청을 수락하도록 구성합니다. 감사 목적으로 AWS CloudTrail을 사용하여 IAM 역할 ARN을 기록합니다."], "answers": [0]}, {"q": "한 회사가 온프레미스 인트라넷 애플리케이션을 AWS 클라우드에 백업하려고 합니다. 백업 솔루션으로 AWS Elastic Disaster Recovery를 사용하려고 합니다. 복제 트래픽은 전용 프라이빗 연결을 통해 전송되어야 하며, 애플리케이션은 공용 인터넷에서 접근할 수 없어야 합니다. 또한, 백업 솔루션은 온프레미스 네트워크와 AWS 간 가용 대역폭의 75%를 초과하여 사용해서는 안 됩니다. 이러한 요구 사항을 충족하는 단계 조합은 무엇입니까? (세 가지를 선택하십시오)", "opts": ["최소 두 개의 프라이빗 서브넷, 두 개의 NAT 게이트웨이, 그리고 가상 프라이빗 게이트웨이를 포함하는 VPC를 생성합니다.", "최소 두 개의 퍼블릭 서브넷, 가상 프라이빗 게이트웨이, 그리고 인터넷 게이트웨이를 포함하는 VPC를 생성합니다.", "온프레미스 네트워크와 대상 AWS 네트워크 간에 AWS 사이트 간 VPN 연결을 생성합니다. 백업이 가용 대역폭의 75%를 초과하지 않도록 QoS(서비스 품질)를 구성합니다.", "온프레미스 네트워크와 대상 AWS 네트워크 간에 AWS Direct Connect 연결과 Direct Connect 게이트웨이를 생성합니다.", "복제 서버가 데이터 복제에 개인 IP 주소를 사용하도록 구성합니다. Elastic Disaster Recovery 서버의 대역폭이 사용 가능한 대역폭의 75%를 초과하지 않도록 복제 인스턴스에 스로틀링을 구성합니다.", "복구 인스턴스의 개인 IP 주소를 소스 서버의 개인 IP 주소와 일치하도록 구성합니다. 복구 인스턴스가 사용하는 총 대역폭이 사용 가능한 대역폭의 75%를 초과하지 않도록 복구 인스턴스에 스로틀링을 구성합니다."], "answers": [0, 3, 4]}, {"q": "수천 개의 기업 고객에게 서비스를 제공하는 멀티테넌트 SaaS(Software as a Service) 고객 지원 플랫폼입니다. 이 플랫폼은 티켓 분류, 추론 인프라 비용 최적화, 200ms 미만의 지연 시간 유지를 위해 동일한 머신러닝 프레임워크를 사용하는 5,000개 이상의 맞춤형 모델을 배포해야 합니다. 또한 개발, 스테이징, 프로덕션 환경을 위한 별도의 계정을 포함하는 멀티 계정 AWS 아키텍처에서 운영되어야 합니다. 이러한 요구 사항을 가장 비용 효율적으로 충족하는 솔루션은 무엇입니까?", "opts": ["각 모델을 전용 Amazon SageMaker AI 실시간 엔드포인트에 배포합니다. 최대 트래픽 처리를 위해 ml.g5.xlarge 인스턴스를 프로비저닝합니다. 교차 계정 IAM 역 var MISSED_KEY = 'aws_sap_missed_v1';

var queue=[],cur=0,okCount=0,missed=[],sel=new Set(),done=false;

function loadMissed(){
  try{var r=localStorage.getItem(MISSED_KEY);return r?JSON.parse(r):[];}catch(e){return [];}
}
function saveMissed(arr){
  try{localStorage.setItem(MISSED_KEY,JSON.stringify(arr));}catch(e){}
}

function showHome(){
  var m=loadMissed();
  var mw=document.getElementById('missed-start-wrap');
  var bc=document.getElementById('btn-clear-missed');
  if(m.length){
    mw.classList.remove('hidden');
    document.getElementById('missed-count').textContent=m.length;
    bc.style.display='';
  }else{
    mw.classList.add('hidden');
    bc.style.display='none';
  }
  show('s-home');
}

function clearMissed(){
  if(!confirm('오답 기록을 초기화할까요?'))return;
  localStorage.removeItem(MISSED_KEY);
  showHome();
}

function show(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function shuffle(a){
  var b=a.slice();
  for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}
  return b;
}

function startQuiz(qs){
  var source=qs||ALL_Q;
  queue=document.getElementById('chk-random').checked?shuffle(source):source.slice();
  cur=0;okCount=0;missed=[];
  show('s-quiz');
  renderQ();
}

function startMissedOnly(){
  var m=loadMissed();
  if(!m.length)return;
  startQuiz(m);
}

function renderQ(){
  var q=queue[cur];
  var multi=q.answers.length>1;
  sel=new Set();done=false;
  document.getElementById('q-num').textContent='문제 '+(cur+1)+' / '+queue.length;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('q-hint').textContent=multi?'※ 정답 '+q.answers.length+'개 선택':'';
  document.getElementById('fb').className='feedback';
  document.getElementById('btn-check').disabled=true;
  document.getElementById('btn-check').classList.remove('hidden');
  document.getElementById('btn-next').classList.add('hidden');
  document.getElementById('score-live').textContent='정답 '+okCount;
  var pct=Math.round(cur/queue.length*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-txt').textContent=(cur+1)+' / '+queue.length;
  document.getElementById('prog-pct').textContent=pct+'%';
  var c=document.getElementById('opts');
  c.innerHTML='';
  q.opts.forEach(function(opt,i){
    var d=document.createElement('div');
    d.className='opt';
    d.innerHTML='<div class="opt-num">'+(i+1)+'</div><div class="opt-text">'+escHtml(opt)+'</div>';
    d.addEventListener('click',function(){toggleOpt(d,i,multi);});
    c.appendChild(d);
  });
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function toggleOpt(el,idx,multi){
  if(done)return;
  if(multi){
    if(sel.has(idx)){sel.delete(idx);el.classList.remove('sel');}
    else{sel.add(idx);el.classList.add('sel');}
  }else{
    document.querySelectorAll('.opt').forEach(function(o){o.classList.remove('sel');});
    sel=new Set([idx]);el.classList.add('sel');
  }
  document.getElementById('btn-check').disabled=sel.size===0;
}

function checkAnswer(){
  var q=queue[cur];
  done=true;
  var instant=document.getElementById('chk-instant').checked;
  var correct=q.answers.every(function(a){return sel.has(a);})&&sel.size===q.answers.length;
  if(correct)okCount++;
  else missed.push(q);
  if(instant){
    document.querySelectorAll('.opt').forEach(function(el,i){
      el.classList.remove('sel');
      if(q.answers.indexOf(i)>=0)el.classList.add('ok');
      else if(sel.has(i))el.classList.add('ng');
    });
    var fb=document.getElementById('fb');
    if(correct){fb.className='feedback ok';fb.textContent='정답입니다!';}
    else{fb.className='feedback ng';fb.textContent='오답입니다. 정답: '+q.answers.map(function(a){return (a+1)+'번 '+q.opts[a];}).join(' / ');}
  }
  document.getElementById('btn-check').classList.add('hidden');
  document.getElementById('btn-next').classList.remove('hidden');
}

function nextQ(){
  cur++;
  if(cur>=queue.length)showResult();
  else renderQ();
}

function showResult(){
  show('s-result');
  var total=queue.length;
  var pct=Math.round(okCount/total*100);
  document.getElementById('r-score').textContent=okCount+'/'+total;
  document.getElementById('r-pct').textContent=pct+'%';
  document.getElementById('r-ok').textContent=okCount;
  document.getElementById('r-ng').textContent=total-okCount;
  document.getElementById('btn-retry').disabled=missed.length===0;

  // 오답 누적 저장
  if(missed.length){
    var existing=loadMissed();
    var existingQs=existing.map(function(q){return q.q;});
    var newMissed=missed.filter(function(q){return existingQs.indexOf(q.q)<0;});
    saveMissed(existing.concat(newMissed));
  }

  var ms=document.getElementById('missed-sec');
  var ml=document.getElementById('missed-list');
  if(missed.length){
    ms.classList.remove('hidden');ms.style.display='flex';
    ml.innerHTML=missed.map(function(q){
      return '<div class="missed-item"><div class="missed-q">'+escHtml(q.q)+'</div>'
        +'<div class="missed-ans">정답: '+q.answers.map(function(a){return (a+1)+'번 — '+escHtml(q.opts[a]);}).join(' / ')+'</div></div>';
    }).join('');
  }else{ms.classList.add('hidden');}
}

function retryMissed(){if(missed.length)startQuiz(missed);}

showHome();
</script>
</body>
</html>
