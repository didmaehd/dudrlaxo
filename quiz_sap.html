{"q": "유럽과 아시아에 사무실을 두고 가전 제품을 개발하는 회사는 유럽의 온프레미스에 60TB의 소프트웨어 이미지를 저장했습니다. 회사는 ap-northeast-1 리전의 Amazon S3 버킷으로 이미지를 전송하려고 합니다. 새로운 소프트웨어 이미지는 매일 생성되며 전송 중에 암호화되어야 합니다. 이 회사에는 모든 기존 소프트웨어 이미지와 새 소프트웨어 이미지를 Amazon S3로 자동 전송하기 위해 사용자 지정 개발이 필요하지 않은 솔루션이 필요합니다. 이전 프로세스의 다음 단계는 무엇입니까?", "opts": ["AWS DataSync 에이전트를 배포하고 이미지를 S3 버킷으로 전송하는 작업을 구성합니다.", "S3 Transfer Acceleration을 사용하여 이미지를 전송하도록 Amazon Kinesis Data Firehose를 구성합니다.", "AWS Snowball 디바이스를 사용하여 S3 버킷을 대상으로 하는 이미지를 전송합니다.", "멀티파트 업로드가 포함된 S3 API를 사용하여 Site-to-Site VPN 연결을 통해 이미지를 전송합니다."], "answers": [0]}, {"q": "회사에 Amazon API Gateway를 사용하는 웹 애플리케이션이 있습니다. AWS Lambda 및 Amazon DynamoDB. 최근 마케팅 캠페인으로 인해 수요가 증가했습니다. 모니터링 소프트웨어는 많은 요청이 마케팅 캠페인 이전보다 응답 시간이 상당히 길어졌다고 보고합니다. 솔루션 설계자는 API Gateway용 Amazon CloudWatch Logs를 활성화하고 요청의 20%에서 오류가 발생하고 있음을 발견했습니다. CloudWatch에서 Lambda 함수 Throttles 지표는 요청의 1%를 나타내고 Errors 지표는 요청의 10%를 나타냅니다. 애플리케이션 로그에는 오류가 발생하면 DynamoDB가 호출된다는 내용이 나와 있습니다. 웹 애플리케이션이 대중화됨에 따라 현재 응답 시간을 개선하기 위해 솔루션 설계자는 어떤 변화를 취해야 합니까?", "opts": ["Lambda 함수의 동시성 제한을 늘립니다.", "테이블에 DynamoDB 자동 조정을 구현합니다.", "API 게이트웨이 제한 한도를 늘립니다.", "더 잘 분할된 기본 인덱스를 사용하여 DynamoDB 테이블을 다시 생성합니다."], "answers": [1]}, {"q": "회사에 웹 프런트엔드가 있는 애플리케이션이 있습니다. 애플리케이션은 회사의 온프레미스 데이터 센터에서 실행되며 중요한 데이터를 위한 파일 스토리지에 대한 액세스가 필요합니다. 애플리케이션은 중복성을 위해 3개의 Linux VM에서 실행됩니다. 아키텍처에는 HTTP 요청 기반 라우팅을 갖춘 로드 밸런서가 포함되어 있습니다. 회사는 가능한 한 빨리 애플리케이션을 AWS로 마이그레이션해야 합니다. AWS의 아키텍처는 가용성이 높아야 합니다. 아키텍처를 가장 적게 변경하여 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["3개의 가용 영역에서 Fargate 시작 유형을 사용하는 Amazon Elastic Container Service(Amazon ECS) 컨테이너로 애플리케이션을 마이그레이션합니다. Amazon S3를 사용하여 세 가지 컨테이너 모두에 파일 스토리지를 제공합니다. Network Load Balancer를 사용하여 트래픽을 컨테이너로 전달합니다.", "3개의 가용 영역에 있는 Amazon EC2 인스턴스로 애플리케이션을 마이그레이션합니다. 파일 저장에는 Amazon Elastic File System(Amazon EFS)을 사용합니다. 세 개의 EC2 인스턴스 모두에 파일 스토리지를 탑재합니다. Application Load Balancer를 사용하여 트래픽을 EC2 인스턴스로 전달합니다.", "3개의 가용 영역에서 Fargate 시작 유형을 사용하는 Amazon Elastic Kubernetes Service(Amazon EKS) 컨테이너로 애플리케이션을 마이그레이션합니다. Lustre용 Amazon FSx를 사용하여 세 가지 컨테이너 모두에 파일 스토리지를 제공합니다. Network Load Balancer를 사용하여 트래픽을 컨테이너로 전달합니다.", "3개 AWS 지역의 Amazon EC2 인스턴스로 애플리케이션을 마이그레이션합니다. 파일 저장에는 Amazon Elastic Block Store(Amazon EBS)를 사용하십시오. 세 개의 EC2 인스턴스 모두에 대해 교차 리전 복제(CRR)를 활성화합니다. Application Load Balancer를 사용하여 트래픽을 EC2 인스턴스로 전달합니다."], "answers": [1]}, {"q": "한 회사가 온프레미스 데이터 센터를 AWS로 마이그레이션할 계획입니다. 이 회사는 현재 Linux 기반 VMware VM에서 데이터 센터를 호스팅하고 있습니다. 솔루션 설계자는 VM 간의 네트워크 종속성에 대한 정보를 수집해야 합니다. 정보는 호스트 IP 주소, 호스트 이름 및 네트워크 연결 정보를 자세히 설명하는 다이어그램 형식이어야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["AWS 애플리케이션 검색 서비스를 사용하세요. AWS Migration Hub 홈 AWS 지역을 선택합니다. 데이터 수집을 위해 온프레미스 서버에 AWS Application Discovery Agent를 설치합니다. Migration Hub 네트워크 다이어그램을 사용할 수 있도록 Application Discovery Service에 권한을 부여합니다.", "서버 데이터 수집을 위해 AWS Application Discovery Service Agentless Collector를 사용하십시오. AWS Migration Hub에서 네트워크 다이어그램을 .png 형식으로 내보냅니다.", "데이터 수집을 위해 온프레미스 서버에 AWS Application Migration Service 에이전트를 설치합니다. AWS의 Workload Discovery에서 AWS Migration Hub 데이터를 사용하여 네트워크 다이어그램을 생성합니다.", "데이터 수집을 위해 온프레미스 서버에 AWS Application Migration Service 에이전트를 설치합니다. AWS Migration Hub의 데이터를 .csv 형식으로 Amazon CloudWatch 대시보드로 내보내 네트워크 다이어그램을 생성합니다."], "answers": [0]}, {"q": "한 회사가 AWS에서 SaaS(Software-as-a-Service) 애플리케이션을 실행합니다. 애플리케이션은 AWS Lambda 함수와 MySQL 다중 AZ 데이터베이스용 Amazon RDS로 구성됩니다. 시장 이벤트 중에 애플리케이션의 작업량은 평소보다 훨씬 높습니다. 사용자는 많은 데이터베이스 연결로 인해 피크 기간 동안 응답 시간이 느려지는 것을 발견합니다. 회사는 데이터베이스의 확장 가능한 성능과 가용성을 개선해야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["리소스 사용률이 임계값에 도달할 때 MySQL용 Amazon RDS 읽기 전용 복제본을 추가하기 위해 Lambda 함수를 트리거하는 Amazon CloudWatch 경보 작업을 생성합니다.", "데이터베이스를 Amazon Aurora로 마이그레이션하고 읽기 전용 복제본을 추가합니다. Lambda 핸들러 함수 외부에 데이터베이스 연결 풀을 추가합니다.", "데이터베이스를 Amazon Aurora로 마이그레이션하고 읽기 전용 복제본을 추가합니다. Amazon Route 53 가중치 기반 레코드를 사용합니다.", "데이터베이스를 Amazon Aurora로 마이그레이션하고 Aurora 복제본을 추가합니다. 데이터베이스 연결 풀을 관리하도록 Amazon RDS 프록시를 구성합니다."], "answers": [3]}, {"q": "한 회사가 애플리케이션을 온프레미스에서 AWS 클라우드로 마이그레이션할 계획입니다. 회사는 애플리케이션의 기본 데이터 스토리지를 AWS로 이동하여 마이그레이션을 시작합니다. 애플리케이션 데이터는 온프레미스 공유 파일 시스템에 저장되고, 애플리케이션 서버는 SMB를 통해 공유 파일 시스템에 연결됩니다. 솔루션 아키텍트는 공유 스토리지에 Amazon S3 버킷을 사용하는 솔루션을 구현해야 합니다. 애플리케이션이 완전히 마이그레이션되고 기본 Amazon S3 API를 사용하도록 코드가 다시 작성될 때까지 애플리케이션은 SMB를 통해 데이터에 계속 액세스할 수 있어야 합니다. 솔루션 아키텍트는 온프레미스 애플리케이션이 데이터에 액세스할 수 있도록 허용하면서 애플리케이션 데이터를 AWS의 새로운 위치로 마이그레이션해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["새로운 Amazon FSx for Windows File Server 파일 시스템을 생성합니다. 온프레미스 파일 공유를 위한 위치 하나와 새로운 Amazon FSx 파일 시스템을 위한 위치 하나를 사용하여 AWS DataSync를 구성합니다. 온프레미스 파일 공유 위치에서 Amazon FSx 파일 시스템으로 데이터를 복사하는 새 DataSync 작업을 생성합니다.", "애플리케이션용 S3 버킷을 생성합니다. 온프레미스 스토리지의 데이터를 S3 버킷으로 복사합니다.", "AWS SMS(AWS Server Migration Service) VM을 온프레미스 환경에 배포합니다. AWS SMS를 사용하여 파일 스토리지 서버를 온프레미스에서 Amazon EC2 인스턴스로 마이그레이션합니다.", "애플리케이션용 S3 버킷을 생성합니다. 온프레미스 VM에 새로운 AWS Storage Gateway 파일 게이트웨이를 배포합니다. S3 버킷에 데이터를 저장하고 파일 게이트웨이와 연결된 새 파일 공유를 생성합니다. 온프레미스 스토리지의 데이터를 새 파일 게이트웨이 엔드포인트에 복사합니다."], "answers": [3]}, {"q": "한 글로벌 기업이 티켓 바코드를 표시하는 모바일 앱을 보유하고 있습니다. 고객은 모바일 앱의 티켓을 사용하여 라이브 이벤트에 참석합니다. 이벤트 스캐너는 티켓 바코드를 읽고 백엔드 API를 호출하여 데이터베이스의 데이터와 비교하여 바코드 데이터의 유효성을 검사합니다. 바코드가 스캔된 후 백엔드 로직은 데이터베이스의 단일 테이블에 기록하여 바코드가 사용된 것으로 표시합니다. 회사는 api.example.com이라는 DNS 이름을 사용하여 AWS에 앱을 배포해야 합니다. 회사는 전 세계 3개 AWS 지역에서 데이터베이스를 호스팅할 예정입니다. 가장 낮은 대기 시간으로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["Amazon Aurora 글로벌 데이터베이스 클러스터에서 데이터베이스를 호스팅합니다. 데이터베이스와 동일한 리전에 있는 3개의 Amazon Elastic Container Service(Amazon ECS) 클러스터에서 백엔드를 호스팅합니다. AWS Global Accelerator에서 액셀러레이터를 생성하여 요청을 가장 가까운 ECS 클러스터로 라우팅합니다. api.example.com을 액셀러레이터 엔드포인트에 매핑하는 Amazon Route 53 레코드를 생성합니다.", "Amazon Aurora 글로벌 데이터베이스 클러스터에서 데이터베이스를 호스팅합니다. 데이터베이스와 동일한 리전에 있는 3개의 Amazon Elastic Kubernetes Service(Amazon EKS) 클러스터에서 백엔드를 호스팅합니다. 3개의 클러스터를 오리진으로 사용하여 Amazon CloudFront 배포를 생성합니다. 요청을 가장 가까운 EKS 클러스터로 라우팅합니다. api.example.com을 CloudFront 배포에 매핑하는 Amazon Route 53 레코드를 생성합니다.", "Amazon DynamoDB 글로벌 테이블에서 데이터베이스를 호스팅합니다. Amazon CloudFront 배포를 생성합니다. CloudFront 배포를 바코드 검증을 위한 백엔드 로직이 포함된 CloudFront 함수와 연결합니다. api.example.com을 CloudFront 배포에 매핑하는 Amazon Route 53 레코드를 생성합니다.", "Amazon DynamoDB 글로벌 테이블에서 데이터베이스를 호스팅합니다. Amazon CloudFront 배포를 생성합니다. CloudFront 배포를 바코드 검증을 위한 백엔드 로직이 포함된 Lambda@Edge 함수와 연결합니다. api.example.com을 CloudFront 배포에 매핑하는 Amazon Route 53 레코드를 생성합니다."], "answers": [3]}, {"q": "한 의료 회사가 Amazon EC2 인스턴스 세트에서 REST API를 실행하고 있습니다. EC2 인스턴스는 ALB(Application Load Balancer) 뒤의 Auto Scaling 그룹에서 실행됩니다. ALB는 3개의 퍼블릭 서브넷에서 실행되고, EC2 인스턴스는 3개의 프라이빗 서브넷에서 실행됩니다. 이 회사는 ALB를 유일한 오리진으로 사용하는 Amazon CloudFront 배포판을 배포했습니다. 원본 보안을 강화하기 위해 솔루션 설계자는 어떤 솔루션을 권장해야 합니까?", "opts": ["AWS Secrets Manager에 임의의 문자열을 저장합니다. 자동 비밀 교체를 위한 AWS Lambda 함수를 생성합니다. 원본 요청에 대한 사용자 지정 HTTP 헤더로 임의 문자열을 삽입하도록 CloudFront를 구성합니다. 사용자 지정 헤더에 대한 문자열 일치 규칙을 사용하여 AWS WAF 웹 ACL 규칙을 생성합니다. 웹 ACL을 ALB와 연결합니다.", "CloudFront 서비스 IP 주소 범위의 IP 일치 조건을 사용하여 AWS WAF 웹 ACL 규칙을 생성합니다. 웹 ACL을 ALMove와 연결하여 ALB를 3개의 프라이빗 서브넷으로 이동합니다.", "AWS Systems Manager Parameter Store에 임의의 문자열을 저장합니다. 문자열에 대한 Parameter Store 자동 교체를 구성합니다. 원본 요청에 대한 사용자 지정 HTTP 헤더로 임의 문자열을 삽입하도록 CloudFront를 구성합니다. 사용자 정의 HTTP 헤더의 값을 검사하고 ALB에서 접근을 차단합니다.", "AWS Shield Advanced 구성 CloudFront 서비스 IP 주소 범위에서의 연결을 허용하는 보안 그룹 정책을 생성합니다. AWS Shield Advanced에 정책을 추가하고 ALB에 정책을 연결합니다."], "answers": [0]}, {"q": "업계 규정을 준수하기 위해 솔루션 아키텍트는 회사 본사가 위치한 미국을 포함하여 여러 공개 AWS 지역에 회사의 중요 데이터를 저장할 솔루션을 설계해야 합니다. 솔루션 아키텍트는 AWS에 저장된 데이터에 대한 접근을 회사의 글로벌 WAN 네트워크에 제공해야 합니다. 보안 팀은 이 데이터에 액세스하는 트래픽이 공용 인터넷을 통과해서는 안 된다고 규정하고 있습니다. 솔루션 설계자는 요구 사항을 충족하고 비용 효율적인 고가용성 솔루션을 어떻게 설계해야 합니까?", "opts": ["회사 본사에서 사용 중인 모든 AWS 리전으로 AWS Direct Connect 연결을 설정합니다. 회사 WAN을 사용하여 트래픽을 본사로 보낸 다음 해당 DX 연결로 보내 데이터에 액세스합니다.", "회사 본사에서 AWS 리전까지 두 개의 AWS Direct Connect 연결을 설정합니다. 회사 WAN을 사용하여 DX 연결을 통해 트래픽을 보냅니다. 리전 간 VPC 피어링을 사용하여 다른 AWS 리전의 데이터에 액세스합니다.", "회사 본사에서 AWS 리전까지 2개의 AWS Direct Connect 연결을 설정합니다. 회사 WAN을 사용하여 DX 연결을 통해 트래픽을 보냅니다. AWS 전송 VPC 솔루션을 사용하여 다른 AWS 리전의 데이터에 액세스합니다.", "회사 본사에서 AWS 리전까지 두 개의 AWS Direct Connect 연결을 설정합니다. 회사 WAN을 사용하여 DX 연결을 통해 트래픽을 보냅니다. Direct Connect Gateway를 사용하여 다른 AWS 리전의 데이터에 액세스합니다."], "answers": [3]}, {"q": "한 회사가 온프레미스에서 호스팅하는 VMware vSphere VM에서 Windows Server를 실행하는 애플리케이션을 개발했습니다. 애플리케이션 데이터는 애플리케이션을 통해 읽어야 하는 독점 형식으로 저장됩니다. 회사는 서버와 애플리케이션을 수동으로 프로비저닝했습니다. 재해 복구 계획의 일환으로 회사는 회사의 온프레미스 환경을 사용할 수 없게 되는 경우 일시적으로 AWS에서 애플리케이션을 호스팅할 수 있는 기능을 원합니다. 회사는 재해 복구 이벤트가 완료된 후 애플리케이션이 온프레미스 호스팅으로 돌아가기를 원합니다. RPO는 5분입니다. 최소한의 운영 오버헤드로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["AWS DataSync를 구성합니다. 데이터를 Amazon Elastic Block Store(Amazon EBS) 볼륨에 복제합니다. 온프레미스 환경을 사용할 수 없는 경우 AWS CloudFormation 템플릿을 사용하여 Amazon EC2 인스턴스를 프로비저닝하고 EBS 볼륨을 연결합니다.", "AWS 탄력적 재해 복구를 구성합니다. Amazon Elastic Block Store(Amazon EBS) 볼륨에 연결된 복제 Amazon EC2 인스턴스에 데이터를 복제합니다. 온프레미스 환경을 사용할 수 없는 경우 Elastic Disaster Recovery를 사용하여 복제된 볼륨을 사용하는 EC2 인스턴스를 시작하세요.", "AWS Storage Gateway 파일 게이트웨이를 프로비저닝합니다. 데이터를 Amazon S3 버킷에 복제합니다. 온프레미스 환경을 사용할 수 없는 경우 AWS Backup을 사용하여 데이터를 Amazon Elastic Block Store(Amazon EBS) 볼륨으로 복원하고 이러한 EBS 볼륨에서 Amazon EC2 인스턴스를 시작합니다.", "AWS에서 Windows 파일 서버용 Amazon FSx 파일 시스템을 프로비저닝합니다. 데이터를 파일 시스템에 복제합니다. 온프레미스 환경을 사용할 수 없는 경우 AWS CloudFormation 템플릿을 사용하여 Amazon EC2 인스턴스를 프로비저닝하고 AWS::CloudFormation::Init 명령을 사용하여 Amazon FSx 파일 공유를 탑재합니다."], "answers": [1]}, {"q": "회사는 eu-north-1 지역의 Amazon EC2에서 고가용성 데이터 수집 애플리케이션을 실행합니다. 애플리케이션은 최종 사용자 장치에서 데이터를 수집하고 Amazon Kinesis 데이터 스트림과 레코드를 처리하는 일련의 AWS Lambda 함수에 레코드를 씁니다. 회사는 레코드 처리 결과를 eu-north-1의 Amazon S3 버킷에 유지합니다. 회사는 S3 버킷의 데이터를 Amazon Athena의 데이터 소스로 사용합니다. 회사는 글로벌 입지를 확대하고자 합니다. 솔루션 아키텍트는 sa-east-1 및 ap-northeast-1 지역에서 데이터 수집 기능을 시작해야 합니다. 솔루션 아키텍트는 두 개의 새로운 리전에 애플리케이션, Kinesis 데이터 스트림 및 Lambda 함수를 배포합니다. 솔루션 아키텍트는 데이터 분석을 중앙 집중화하기 위한 요구 사항을 충족하기 위해 S3 버킷을 eu-north-1에 유지합니다. 새로운 설정을 테스트하는 동안 솔루션 아키텍트는 새 리전에서 S3 버킷으로 데이터가 도착할 때 상당한 지연이 있음을 발견했습니다. 이 지연 시간을 가장 많이 개선할 수 있는 솔루션은 무엇입니까?", "opts": ["두 개의 새로운 리전 각각에서 VPC에서 실행되도록 Lambda 함수를 설정하십시오. 해당 VPC에 S3 게이트웨이 엔드포인트를 설정합니다.", "eu-north-1의 S3 버킷에서 S3 Transfer Acceleration을 켭니다. 애플리케이션이 S3 버킷에 데이터를 업로드할 때 새로운 S3 가속 엔드포인트를 사용하도록 애플리케이션을 변경합니다.", "두 개의 새로운 리전 각각에 S3 버킷을 생성합니다. 각 새 리전의 애플리케이션을 해당 S3 버킷에 업로드하도록 설정합니다. eu-north-1의 S3 버킷에 데이터를 복제하도록 S3 교차 리전 복제를 설정합니다.", "여러 코어를 사용할 수 있도록 Lambda 함수의 메모리 요구 사항을 늘립니다. 애플리케이션이 Lambda에서 Amazon S3로 데이터를 업로드할 때 멀티파트 업로드 기능을 사용합니다."], "answers": [2]}, {"q": "회사는 단일 공유 VPC에서 호스팅되는 중앙 집중식 Amazon EC2 애플리케이션을 제공합니다. 중앙 집중식 애플리케이션은 다른 사업부의 VPC에서 실행되는 클라이언트 애플리케이션에서 액세스할 수 있어야 합니다. 중앙 집중식 애플리케이션 프런트 엔드는 확장성을 위해 NLB(Network Load Balancer)로 구성됩니다. 최대 10개의 사업부 VPC를 공유 VPC에 연결해야 합니다. 비즈니스 단위 VPC CIDR 블록 중 일부는 공유 VPC와 겹치고 일부는 서로 겹칩니다. 공유 VPC의 중앙 집중식 애플리케이션에 대한 네트워크 연결은 승인된 비즈니스 단위 VPC에서만 허용되어야 합니다. 솔루션 아키텍트는 사업부 VPC의 클라이언트 애플리케이션에서 공유 VPC의 중앙 집중식 애플리케이션으로 연결을 제공하기 위해 어떤 네트워크 구성을 사용해야 합니까?", "opts": ["AWS 운송 게이트웨이(Transit Gateway)를 생성합니다. 공유 VPC와 승인된 사업부 VPC를 운송 게이트웨이(Transit Gateway)에 연결합니다. 단일 운송 게이트웨이(Transit Gateway) 라우팅 테이블을 생성하고 이를 연결된 모든 VPC와 연결합니다. 첨부 파일의 경로가 경로 테이블로 자동 전파되도록 허용합니다. 운송 게이트웨이(Transit Gateway)로 트래픽을 보내도록 VPC 라우팅 테이블을 구성합니다.", "중앙 집중식 애플리케이션 NLB를 사용하여 VPC 엔드포인트 서비스를 생성하고 엔드포인트 승인을 요구하는 옵션을 활성화합니다. 엔드포인트 서비스의 서비스 이름을 사용하여 각 사업부 VPC에 VPC 엔드포인트를 생성합니다. 엔드포인트 서비스 콘솔에서 승인된 엔드포인트 요청을 수락합니다.", "각 사업부 VPC에서 공유 VPA로의 VPC 피어링 연결을 생성합니다. 공유 VPC 콘솔에서 VPC 피어링 연결을 수락합니다. 트래픽을 VPC 피어링 연결로 보내도록 VPC 라우팅 테이블을 구성합니다.", "공유 VPC에 대한 가상 프라이빗 게이트웨이를 구성하고 승인된 각 사업부 VPC에 대해 고객 게이트웨이를 생성합니다. 사업부 VPC에서 공유 VPC로 Site-to-Site VPN 연결을 설정합니다. VPN 연결로 트래픽을 보내도록 VPC 라우팅 테이블을 구성합니다."], "answers": [1]}, {"q": "한 회사에서 웹사이트를 AWS로 마이그레이션하려고 합니다. 웹사이트는 마이크로서비스를 사용하며 온프레미스 자체 관리형 Kubernetes 클러스터에 배포된 컨테이너에서 실행됩니다. Kubernetes 배포의 컨테이너 배포를 정의하는 모든 매니페스트는 소스 제어에 있습니다. 웹사이트의 모든 데이터는 PostgreSQL 데이터베이스에 저장됩니다. 오픈 소스 컨테이너 이미지 저장소는 온프레미스 환경과 함께 실행됩니다. 솔루션 아키텍트는 회사가 AWS의 웹 사이트에 사용할 아키텍처를 결정해야 합니다. 최소한의 마이그레이션 노력으로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["AWS App Runner 서비스를 생성합니다. App Runner 서비스를 오픈 소스 컨테이너 이미지 저장소에 연결합니다. 온프레미스에서 App Runner 서비스로 매니페스트를 배포합니다. PostgreSQL 데이터베이스용 Amazon RDS를 생성합니다.", "관리형 노드 그룹이 있는 Amazon Elastic Kubernetes Service(Amazon EKS) 클러스터를 생성합니다. 애플리케이션 컨테이너를 새로운 Amazon Elastic Container Registry(Amazon ECR) 리포지토리에 복사합니다. 온프레미스에서 EKS 클러스터로 매니페스트를 배포합니다. Amazon Aurora PostgreSQL DB 클러스터를 생성합니다.", "Amazon EC2 용량 풀이 있는 Amazon Elastic Container Service(Amazon ECS) 클러스터를 생성합니다. 애플리케이션 컨테이너를 새로운 Amazon Elastic Container Registry(Amazon ECR) 리포지토리에 복사합니다. 각 컨테이너 이미지를 새 작업 정의로 등록합니다. 원래 Kubernetes 배포와 일치하도록 각 작업 정의에 대한 ECS 서비스를 구성합니다. Amazon Aurora PostgreSQL DB 클러스터를 생성합니다.", "Amazon EC2 인스턴스에서 클러스터를 호스팅하여 온프레미스 Kubernetes 클러스터를 재구축합니다. 오픈 소스 컨테이너 이미지 저장소를 EC2 인스턴스로 마이그레이션합니다. 온프레미스에서 AWS의 새 클러스터로 매니페스트를 배포합니다. 새 클러스터에 오픈 소스 PostgreSQL 데이터베이스를 배포합니다."], "answers": [1]}, {"q": "한 회사는 AWS의 모바일 앱을 사용하여 온라인 콘테스트를 운영합니다. 회사는 각 콘테스트가 끝날 때 무작위로 우승자를 선택합니다. 콘테스트는 다양한 기간 동안 진행됩니다. 회사는 콘테스트가 끝난 후 콘테스트의 데이터를 보관할 필요가 없습니다. 이 회사는 Amazon EC2 인스턴스에 호스팅된 사용자 지정 코드를 사용하여 콘테스트 데이터를 처리하고 우승자를 선택합니다. EC2 인스턴스는 Application Load Balancer 뒤에서 실행되며 Amazon RDS DB 인스턴스에 콘테스트 항목을 저장합니다. 회사는 콘테스트 운영 비용을 줄이기 위해 새로운 아키텍처를 설계해야 합니다. 이러한 요구 사항을 가장 비용 효율적으로 충족하는 솔루션은 무엇입니까?", "opts": ["컨테스트 참가작의 스토리지를 Amazon DynamoDB로 마이그레이션합니다. DynamoDB Accelerator(DAX) 클러스터를 생성합니다. Fargate 시작 유형을 사용하는 Amazon Elastic Container Service(Amazon ECS) 컨테이너로 실행되도록 코드를 다시 작성합니다. 콘테스트가 끝나면 DynamoDB 테이블을 삭제합니다.", "콘테스트 참가작의 스토리지를 Amazon Redshift로 마이그레이션합니다. 코드를 AWS Lambda 함수로 다시 작성합니다. 콘테스트가 끝나면 Redshift 클러스터를 삭제합니다.", "RDS DB 인스턴스 앞에 Redis용 Amazon ElastiCache 클러스터를 추가하여 콘테스트 항목을 캐시합니다. Fargate 시작 유형을 사용하는 Amazon Elastic Container Service(Amazon ECS) 컨테이너로 실행되도록 코드를 다시 작성합니다. 콘테스트 종료 시 각 항목이 만료되도록 각 항목의 ElastiCache TTL 속성을 설정합니다.", "콘테스트 참가작의 스토리지를 Amazon DynamoDB로 마이그레이션합니다. 코드를 AWS Lambda 함수로 다시 작성합니다. 콘테스트 종료 시 각 항목이 만료되도록 각 항목의 DynamoDB TTL 속성을 설정합니다."], "answers": [3]}, {"q": "회사에서 새로운 보안 요구 사항을 구현했습니다. 새로운 요구 사항에 따라 회사는 회사 VPC에 있는 회사 AWS 인스턴스의 모든 트래픽에서 회사 보안 정책 위반 여부를 검사해야 합니다. 이러한 스캔 결과, 회사는 특정 IP 주소에 대한 접근을 차단할 수 있습니다. 새로운 요구 사항을 충족하기 위해 회사는 프라이빗 서브넷에 Amazon EC2 인스턴스 세트를 배포하여 투명한 프록시 역할을 합니다. 회사는 이러한 EC2 인스턴스에 승인된 프록시 서버 소프트웨어를 설치합니다. 회사는 프록시 소프트웨어가 포함된 해당 EC2 인스턴스를 기본 경로로 사용하도록 모든 서브넷의 경로 테이블을 수정합니다. 또한 회사는 보안 정책을 준수하는 보안 그룹을 생성하고 이러한 보안 그룹을 EC2 인스턴스에 할당합니다. 이러한 구성에도 불구하고 프라이빗 서브넷의 EC2 인스턴스 트래픽이 인터넷으로 제대로 전달되지 않습니다. 이 문제를 해결하려면 솔루션 설계자가 무엇을 해야 합니까?", "opts": ["프록시 소프트웨어를 실행하는 EC2 인스턴스에서 소스/대상 확인을 비활성화합니다.", "이 보안 그룹이 있는 인스턴스 간의 모든 트래픽을 허용하도록 프록시 EC2 인스턴스에 할당된 보안 그룹에 규칙을 추가합니다. 이 보안 그룹을 VPC의 모든 EC2 인스턴스에 할당합니다.", "VPC DHCP 옵션 세트를 변경합니다. 프록시 EC2 인스턴스의 주소를 가리키도록 DNS 서버 옵션을 설정합니다.", "각 프록시 EC2 인스턴스에 하나의 추가 탄력적 네트워크 인터페이스를 할당합니다. 이러한 네트워크 인터페이스 중 하나에 프라이빗 서브넷에 대한 경로가 있는지 확인하세요. 다른 네트워크 인터페이스에 인터넷으로의 경로가 있는지 확인하십시오."], "answers": [0]}, {"q": "회사는 수동으로 생성된 VPC의 AWS에서 솔루션을 실행하고 있습니다. 회사는 AWS CloudFormation을 사용하여 인프라의 다른 부분을 프로비저닝하고 있습니다. 새로운 요구 사항에 따라 회사는 모든 인프라를 자동으로 관리해야 합니다. 최소한의 노력으로 이 새로운 요구 사항을 충족하려면 회사는 무엇을 해야 합니까?", "opts": ["기존 VPC 리소스 및 구성을 엄격하게 프로비저닝하는 새로운 AWS Cloud Development Kit(AWS CDK) 스택을 생성합니다. AWS CDK를 사용하여 VPC를 스택으로 가져오고 VPC를 관리합니다.", "VPC를 생성하는 CloudFormation 스택 세트를 생성합니다. 스택 세트를 사용하여 VPC를 스택으로 가져옵니다.", "기존 VPC 리소스 및 구성을 엄격하게 프로비저닝하는 새 CloudFormation 템플릿을 생성합니다. CloudFormation 콘솔에서 기존 리소스를 가져와 새 스택을 생성합니다.", "VPC를 생성하는 새로운 CloudFormation 템플릿을 생성합니다. AWS Serverless Application Model(AWS SAM) CLI를 사용하여 VPC를 가져옵니다."], "answers": [2]}, {"q": "한 회사에서 인기 비디오 게임의 새 릴리스를 개발하여 공개 다운로드할 수 있도록 하려고 합니다. 새 릴리스 패키지의 크기는 약 5GB입니다. 회사는 온프레미스 데이터 센터에 호스팅된 Linux 기반의 공개 FTP 사이트에서 기존 릴리스에 대한 다운로드를 제공합니다. 회사는 전 세계 사용자가 새 릴리스를 다운로드할 것으로 예상하고 있습니다. 회사는 사용자의 위치에 관계없이 향상된 다운로드 성능과 낮은 전송 비용을 제공하는 솔루션을 원합니다.", "opts": ["Auto Scaling 그룹 내의 Amazon EC2 인스턴스에 탑재된 Amazon EBS 볼륨에 게임 파일을 저장합니다. EC2 인스턴스에서 FTP 서비스를 구성합니다. Auto Scaling 그룹 앞에 Application Load Balancer를 사용합니다. 사용자가 패키지를 다운로드할 수 있도록 게임 다운로드 URL을 게시합니다.", "Auto Scaling 그룹 내의 Amazon EC2 인스턴스에 연결된 Amazon EFS 볼륨에 게임 파일을 저장합니다. 각 EC2 인스턴스에 FTP 서비스를 구성합니다. Auto Scaling 그룹 앞에 Application Load Balancer를 사용합니다. 사용자가 패키지를 다운로드할 수 있도록 게임 다운로드 URL을 게시합니다.", "웹 사이트 호스팅을 위해 Amazon Route 53 및 Amazon S3 버킷을 구성합니다. 게임 파일을 S3 버킷에 업로드합니다. 웹 사이트에는 Amazon CloudFront를 사용하십시오. 사용자가 패키지를 다운로드할 수 있도록 게임 다운로드 URL을 게시합니다.", "웹 사이트 호스팅을 위해 Amazon Route 53 및 Amazon S3 버킷을 구성합니다. 게임 파일을 S3 버킷에 업로드합니다. S3 버킷에 대한 요청자 지불을 설정합니다. 사용자가 패키지를 다운로드할 수 있도록 게임 다운로드 URL을 게시합니다."], "answers": [2]}, {"q": "회사는 데이터베이스와 웹 사이트로 구성된 클라우드에서 애플리케이션을 실행합니다. 사용자는 웹사이트에 데이터를 게시하고, 데이터를 처리하고, 데이터를 이메일로 다시 전송할 수 있습니다. 데이터는 Amazon EC2 인스턴스에서 실행되는 MySQL 데이터베이스에 저장됩니다. 데이터베이스는 2개의 프라이빗 서브넷이 있는 VPC에서 실행되고 있습니다. 웹 사이트는 하나의 퍼블릭 서브넷이 있는 다른 VPC에 있는 단일 EC2 인스턴스의 Apache Tomcat에서 실행되고 있습니다. 데이터베이스와 웹사이트 VPC 사이에는 단일 VPC 피어링 연결이 있습니다. 지난 한 달 동안 트래픽 폭주로 인해 웹사이트가 여러 차례 중단되었습니다. 솔루션 설계자는 애플리케이션의 안정성을 높이기 위해 어떤 조치를 취해야 합니까? (3개 선택)", "opts": ["Application Load Balancer 뒤에 여러 EC2 인스턴스가 있는 Auto Scaling 그룹에 Tomcat 서버를 배치합니다.", "추가 VPC 피어링 연결을 프로비저닝합니다.", "하나의 Aurora 복제본을 사용하여 MySQL 데이터베이스를 Amazon Aurora로 마이그레이션합니다.", "데이터베이스 VPC에 두 개의 NAT 게이트웨이를 프로비저닝합니다.", "Tomcat 서버를 데이터베이스 VPC로 이동합니다.", "웹사이트 VPC의 다른 가용 영역에 추가 퍼블릭 서브넷을 생성합니다."], "answers": [0, 2, 5]}, {"q": "한 소매 회사가 AWS에서 전자상거래 애플리케이션을 운영하고 있습니다. 애플리케이션은 ALB(Application Load Balancer) 뒤의 Amazon EC2 인스턴스에서 실행됩니다. 회사는 Amazon RDS DB 인스턴스를 데이터베이스 백엔드로 사용합니다. Amazon CloudFront는 ALB를 가리키는 하나의 오리진으로 구성됩니다. 정적 콘텐츠가 캐시됩니다. Amazon Route 53은 모든 공개 영역을 호스팅하는 데 사용됩니다. 애플리케이션 업데이트 후 ALB는 때때로 502 상태 코드(잘못된 게이트웨이) 오류를 반환합니다. 근본 원인은 ALB에 반환되는 잘못된 HTTP 헤더입니다. 오류가 발생한 직후 솔루션 설계자가 웹 페이지를 다시 로드하면 웹 페이지가 성공적으로 반환됩니다. 회사가 문제를 해결하는 동안 솔루션 설계자는 방문자에게 표준 ALB 오류 페이지 대신 사용자 정의 오류 페이지를 제공해야 합니다. 최소한의 운영 오버헤드로 이 요구 사항을 충족하는 단계 조합은 무엇입니까? (2개 선택)", "opts": ["Amazon S3 버킷을 생성합니다. 정적 웹페이지를 호스팅하도록 S3 버킷을 구성합니다. 사용자 정의 오류 페이지를 Amazon S3에 업로드합니다.", "ALB 상태 확인 응답 Target.FailedHealthChecks가 0보다 큰 경우 AWS Lambda 함수를 호출하는 Amazon CloudWatch 경보를 생성합니다. 공개적으로 액세스 가능한 웹 서버를 가리키도록 ALB에서 전달 규칙을 수정하도록 Lambda 함수를 구성합니다.", "상태 확인을 추가하여 기존 Amazon Route 53 레코드를 수정합니다. 상태 확인에 실패할 경우 대체 대상을 구성합니다. 공개적으로 액세스할 수 있는 웹페이지를 가리키도록 DNS 레코드를 수정합니다.", "ALB 상태 확인 응답 Elb.InternalError가 0보다 큰 경우 AWS Lambda 함수를 호출하는 Amazon CloudWatch 경보를 생성합니다. 공개 액세스 가능한 웹 서버를 가리키도록 ALB에서 전달 규칙을 수정하도록 Lambda 함수를 구성합니다.", "CloudFront 사용자 지정 오류 페이지를 구성하여 사용자 지정 오류 응답을 추가합니다. 공개적으로 액세스할 수 있는 웹 페이지를 가리키도록 DNS 레코드를 수정합니다."], "answers": [0, 4]}, {"q": "회사에서는 Amazon Aurora MySQL DB 클러스터를 기존 AWS 계정에서 동일한 AWS 리전의 새 AWS 계정으로 마이그레이션하려고 합니다. 두 계정 모두 AWS Organizations에서 동일한 조직의 구성원입니다. 회사는 새 데이터베이스에 대한 DNS 컷오버를 수행하기 전에 데이터베이스 서비스 중단을 최소화해야 합니다. 이 요구 사항을 충족하는 마이그레이션 전략은 무엇입니까? (2개 선택)", "opts": ["기존 Aurora 데이터베이스의 스냅샷을 찍습니다. 새 AWS 계정과 스냅샷을 공유합니다. 스냅샷의 새 계정에 Aurora DB 클러스터를 생성합니다.", "새 AWS 계정에 Aurora DB 클러스터를 생성합니다. AWS Database Migration Service(AWS DMS)를 사용하여 두 Aurora DB 클러스터 간에 데이터를 마이그레이션합니다.", "AWS 백업을 사용하여 기존 AWS 계정의 Aurora 데이터베이스 백업을 새 AWS 계정으로 공유합니다. 스냅샷에서 새 AWS 계정에 Aurora DB 클러스터를 생성합니다.", "새 AWS 계정에 Aurora DB 클러스터를 생성합니다. AWS Application Migration Service를 사용하여 두 Aurora DB 클러스터 간에 데이터를 마이그레이션합니다."], "answers": [0, 1]}, {"q": "SaaS(Software as a Service) 회사는 고객에게 미디어 소프트웨어 솔루션을 제공합니다. 이 솔루션은 다양한 AWS 리전 및 AWS 계정에 걸쳐 50개의 VPC에서 호스팅됩니다. VPC 중 하나가 관리 VPC로 지정됩니다. VPC의 컴퓨팅 리소스는 독립적으로 작동합니다. 이 회사는 50개 VPC 모두가 서로 통신할 수 있어야 하는 새로운 기능을 개발했습니다. 또한 새로운 기능을 사용하려면 각 고객의 VPC에서 회사의 관리 VPC로 단방향 액세스가 필요합니다. 관리 VPC는 미디어 소프트웨어 솔루션에 대한 라이선스를 검증하는 컴퓨팅 리소스를 호스팅합니다. 회사가 솔루션을 호스팅하는 데 사용할 VPC의 수는 솔루션이 성장함에 따라 계속해서 늘어날 것입니다. 최소한의 운영 오버헤드로 필요한 VPC 연결을 제공하는 단계 조합은 무엇입니까? (2개 선택)", "opts": ["전송 게이트웨이를 생성합니다. 모든 회사의 VPC 및 관련 서브넷을 운송 게이트웨이(Transit Gateway)에 연결합니다.", "회사의 모든 VPC 간에 VPC 피어링 연결을 생성합니다.", "라이선스 검증을 위해 컴퓨팅 리소스를 가리키는 NLB(Network Load Balancer)를 생성합니다. 각 고객의 VPA가 사용할 수 있는 AWS PrivateLink 엔드포인트 서비스를 생성합니다. 엔드포인트 서비스를 NLB와 연결합니다.", "각 고객의 VPC에 VPN 어플라이언스를 생성합니다. AWS Site-to-Site VPN을 사용하여 회사의 관리 VPC를 각 고객의 VPC에 연결합니다.", "회사의 관리 VPC와 각 고객의 VPC 간에 VPC 피어링 연결을 생성합니다."], "answers": [0, 2]}, {"q": "회사에는 모회사로 연결되는 여러 LOB(사업 부문)가 있습니다. 회사는 솔루션 설계자에게 다음 요구 사항을 충족하는 솔루션을 개발하도록 요청했습니다. • LOB에서 사용하는 모든 AWS 계정에 대해 단일 AWS 송장을 생성합니다. • 각 LOB 계정의 비용은 송장에서 분류되어야 합니다. • 회사의 거버넌스 정책에 정의된 대로 LOB 계정의 서비스 및 기능을 제한하는 기능을 제공합니다. • 각 LOB 계정에는 거버넌스 정책에 관계없이 전체 관리자 권한이 위임되어야 합니다. 솔루션 설계자는 이러한 요구 사항을 충족하기 위해 어떤 단계 조합을 수행해야 합니까? (2개 선택)", "opts": ["AWS Organizations를 사용하여 각 LOB의 상위 계정에 조직을 생성하십시오. 그런 다음 각 LOB 계정을 적절한 조직에 초대합니다.", "AWS Organizations를 사용하여 상위 계정에 단일 조직을 생성합니다. 그런 다음 각 LOB의 AWS 계정을 초대하여 조직에 가입합니다.", "서비스 할당량을 구현하여 허용되는 서비스와 기능을 정의하고 할당량을 각 LOB에 적용합니다. 적절한.", "승인된 서비스 및 기능만 허용하는 SCP를 생성한 다음 LOB 계정에 정책을 적용합니다.", "상위 계정의 결제 콘솔에서 통합 결제를 활성화하고 LOB 계정을 연결합니다."], "answers": [0, 4]}, {"q": "솔루션 아키텍트는 사용자 지정 도메인 아래 두 AWS 리전의 사용자에게 서비스를 제공하는 웹 애플리케이션을 배포했습니다. 애플리케이션은 Amazon Route 53 지연 시간 기반 라우팅을 사용합니다. 솔루션 아키텍트는 각 지역에 대해 별도의 가용 영역에 있는 웹 서버 쌍과 가중치 기반 레코드 세트를 연결했습니다. 솔루션 설계자는 재해 복구 시나리오를 실행합니다. 한 지역의 모든 웹 서버가 중지되면 Route 53은 자동으로 사용자를 다른 지역으로 리디렉션하지 않습니다. 다음 중 이 문제의 근본 원인은 무엇입니까? (2개 선택)", "opts": ["웹 서버가 중지된 지역의 가중치는 다른 지역의 가중치보다 높습니다.", "보조 지역의 웹 서버 중 하나가 HTTP 상태 확인을 통과하지 못했습니다.", "지연 리소스 레코드 세트는 가중치 리소스 레코드 세트와 함께 사용할 수 없습니다.", "웹 서버가 중지된 리전의 도메인과 연결된 지연 시간 별칭 리소스 레코드 세트에 대해 대상 상태를 평가하는 설정이 켜져 있지 않습니다.", "중지된 웹 서버와 연결된 하나 이상의 가중치 기반 리소스 레코드 세트에 대해 HTTP 상태 확인이 설정되지 않았습니다."], "answers": [3, 4]}, {"q": "홍수 모니터링 기관에서는 10,000개 이상의 수위 모니터링 센서를 배포했습니다. 센서는 지속적인 데이터 업데이트를 보내며 각 업데이트의 크기는 1MB 미만입니다. 이 기관은 온프레미스 애플리케이션 서버를 보유하고 있습니다. 이러한 서버는 센서로부터 업데이트를 수신하고, 원시 데이터를 사람이 읽을 수 있는 형식으로 변환하고, 결과를 온프레미스 관계형 데이터베이스 서버에 기록합니다. 그런 다음 데이터 분석가는 간단한 SQL 쿼리를 사용하여 데이터를 모니터링합니다. 기관에서는 전반적인 애플리케이션 가용성을 높이고 유지 관리 작업을 수행하는 데 필요한 노력을 줄이고 싶어합니다. 애플리케이션 서버에 대한 업데이트 및 패치를 포함하는 이러한 유지 관리 작업으로 인해 가동 중지 시간이 발생합니다. 애플리케이션 서버가 다운되면 나머지 서버가 전체 작업 부하를 처리할 수 없기 때문에 센서의 데이터가 손실됩니다. 기관은 운영 오버헤드와 비용을 최적화하는 솔루션을 원합니다. 솔루션 아키텍트는 AWS IoT Core를 사용하여 센서 데이터를 수집할 것을 권장합니다. 솔루션 설계자는 이러한 요구 사항을 충족하기 위해 또 무엇을 권장해야 합니까?", "opts": ["센서 데이터를 Amazon Kinesis Data Firehose로 보냅니다. AWS Lambda 함수를 사용하여 Kinesis Data Firehose 데이터를 읽고 .csv 형식으로 변환한 후 Amazon Aurora MySQL DB 인스턴스에 삽입합니다. 데이터 분석가에게 DB 인스턴스에서 직접 데이터를 쿼리하도록 지시합니다.", "센서 데이터를 Amazon Kinesis Data Firehose로 보냅니다. AWS Lambda 함수를 사용하여 Kinesis Data Firehose 데이터를 읽고 이를 Apache Parquet 형식으로 변환한 후 Amazon S3 버킷에 저장합니다. 데이터 분석가에게 Amazon Athena를 사용하여 데이터를 쿼리하도록 지시합니다.", "센서 데이터를 Amazon Kinesis Data Analytics 애플리케이션으로 보내 데이터를 .csv 형식으로 변환하고 Amazon S3 버킷에 저장합니다. 데이터를 Amazon Aurora MySQL DB 인스턴스로 가져옵니다. 데이터 분석가에게 DB 인스턴스에서 직접 데이터를 쿼리하도록 지시합니다.", "센서 데이터를 Amazon Kinesis Data Analytics 애플리케이션으로 보내 데이터를 Apache Parquet 형식으로 변환하고 Amazon S3 버킷에 저장합니다. 데이터 분석가에게 Amazon Athena를 사용하여 데이터를 쿼리하도록 지시합니다."], "answers": [1]}, {"q": "공개 소매 웹 애플리케이션은 Amazon RDS MySQL 다중 AZ 배포가 지원되는 지역의 여러 가용 영역(AZ)에서 실행되는 Amazon EC2 인스턴스 앞에 Application Load Balancer(ALB)를 사용합니다. 대상 그룹 상태 확인은 HTTP를 사용하도록 구성되고 제품 카탈로그 페이지를 가리킵니다. Auto Scaling은 ALB 상태 확인을 기반으로 웹 플릿 크기를 유지하도록 구성됩니다. 최근 애플리케이션이 중단되었습니다. Auto Scaling은 중단 중에 인스턴스를 지속적으로 교체했습니다. 후속 조사에서는 웹 서버 지표가 정상 범위 내에 있었지만 데이터베이스 계층에서 높은 Toad 현상이 발생하여 쿼리 응답 시간이 심각하게 증가한 것으로 확인되었습니다. 다음 중 향후 성장을 위해 전체 애플리케이션 스택의 가용성 및 기능에 대한 모니터링 기능을 개선하는 동시에 이러한 문제를 해결하는 변경 사항은 무엇입니까? (2개 선택)", "opts": ["Amazon RDS MySQL에 대한 읽기 전용 복제본을 구성하고 웹 애플리케이션에서 단일 리더 엔드포인트를 사용하여 백엔드 데이터베이스 계층의 로드를 줄입니다.", "제품 카탈로그 페이지 대신 간단한 HTML 페이지를 가리키도록 대상 그룹 상태 확인을 구성하고 제품 페이지에 대한 Amazon Route 53 상태 확인을 구성하여 전체 애플리케이션 기능을 평가합니다. 사이트에 장애가 발생하면 관리자에게 알리도록 Amazon CloudWatch 경보를 구성합니다.", "Amazon EC2 웹 서버의 TCP 확인과 제품 페이지에 대한 Amazon Route S3 상태 확인을 사용하여 전체 애플리케이션 기능을 평가하도록 대상 그룹 상태 확인을 구성합니다. 사이트에 장애가 발생하면 관리자에게 알리도록 Amazon CloudWatch 경보를 구성합니다.", "데이터베이스 계층에서 로드가 높고 손상된 RDS 인스턴스를 복구하는 작업을 사용하여 Amazon RDS에 대한 Amazon CtoudWatch 경보를 구성합니다.", "Amazon Elastic ache 클러스터를 구성하고 이를 웹 애플리케이션과 RDS MySQL 인스턴스 사이에 배치하여 백엔드 데이터베이스 계층의 로드를 줄입니다."], "answers": [1, 4]}, {"q": "한 회사는 온프레미스 데이터 센터를 보유하고 있으며 Kubernetes를 사용하여 AWS에서 새로운 솔루션을 개발하고 있습니다. 이 회사는 개발 및 테스트 환경에 Amazon Elastic Kubernetes Service(Amazon EKS) 클러스터를 사용합니다. 프로덕션 워크로드를 위한 EKS 제어 플레인과 데이터 플레인은 온프레미스에 있어야 합니다. 회사에는 Kubernetes 관리를 위한 AWS 관리형 솔루션이 필요합니다. 최소한의 운영 오버헤드로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["온프레미스 데이터 센터에 AWS Outposts 서버를 설치합니다. 프로덕션 워크로드를 위해 Outposts 서버에서 로컬 클러스터 구성을 사용하여 Amazon EKS를 배포합니다.", "온프레미스 데이터 센터에 있는 회사 하드웨어에 Amazon EKS Anywhere를 설치합니다. EKS Anywhere 클러스터에 프로덕션 워크로드를 배포합니다.", "온프레미스 데이터 센터에 AWS Outposts 서버를 설치합니다. 프로덕션 워크로드를 위해 Outposts 서버에서 확장된 클러스터 구성을 사용하여 Amazon EKS를 배포합니다.", "온프레미스 데이터 센터에 AWS Outposts 서버를 설치합니다. Outposts 서버에 Amazon EKS Anywhere를 설치합니다. EKS Anywhere 클러스터에 프로덕션 워크로드를 배포합니다."], "answers": [0]}, {"q": "회사는 AWS Organizations를 사용하여 개발 환경을 관리합니다. 회사의 각 개발 팀에는 자체 AWS 계정이 있습니다. 각 계정에는 겹치지 않는 단일 VPC 및 CIDR 블록이 있습니다. 회사는 공유 서비스 계정에 Amazon Aurora DB 클러스터를 보유하고 있습니다. 모든 개발팀은 DB 클러스터의 실시간 데이터로 작업해야 합니다. 최소한의 운영 오버헤드로 DB 클러스터에 필요한 연결을 제공하는 솔루션은 무엇입니까?", "opts": ["DB 클러스터에 대한 AWS Resource Access Manager(AWS RAM) 리소스 공유를 생성합니다. 모든 개발 계정과 DB 클러스터를 공유합니다.", "공유 서비스 계정에 전송 게이트웨이를 생성합니다. 운송 게이트웨이(Transit Gateway)에 대한 AWS Resource Access Manager(AWS RAM) 리소스 공유를 생성합니다. 모든 개발 계정과 전송 게이트웨이를 공유합니다. 개발자에게 리소스 공유를 수락하도록 지시합니다. 네트워킹을 구성합니다.", "DB 클러스터의 IP 주소를 가리키는 ALB(Application Load Balancer)를 생성합니다. ALB를 사용하는 AWS PrivateLink 엔드포인트 서비스를 생성합니다. 각 개발 계정이 엔드포인트 서비스에 연결할 수 있도록 권한을 추가하세요.", "공유 서비스 계정에서 AWS Site-to-Site VPN 연결을 생성합니다. 네트워킹을 구성합니다. 각 개발 계정에서 AWS Marketplace VPN 소프트웨어를 사용하여 Site-to-Site VPN 연결에 연결합니다."], "answers": [1]}, {"q": "한 회사는 AWS CloudFormation을 사용하여 AWS 회원 계정에 새로운 인프라를 모두 생성했습니다. 리소스는 거의 변경되지 않으며 예상 로드에 맞게 크기가 적절하게 조정됩니다. 월별 AWS 청구서는 일관됩니다. 개발자가 테스트를 위해 새 리소스를 생성하고 테스트가 완료되면 리소스를 제거하는 것을 잊어버리는 경우가 있습니다. 이러한 테스트의 대부분은 리소스가 더 이상 필요하지 않을 때까지 며칠 동안 지속됩니다. 회사는 사용되지 않은 리소스를 찾는 프로세스를 자동화하려고 합니다. 솔루션 아키텍트는 AWS 청구서 비용이 증가하는지 여부를 결정하는 솔루션을 설계해야 합니다. 솔루션은 비용 증가를 유발하는 리소스를 식별하는 데 도움이 되어야 하며 회사 운영 팀에 자동으로 알려야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["청구 알림을 켜십시오. AWS Cost Explorer를 사용하여 지난달 비용을 확인합니다. 총 예상 요금에 대한 Amazon CloudWatch 경보를 생성합니다. Cost Explorer에서 결정한 비용보다 높은 비용 임계값을 지정합니다. 경보 임계값이 위반되면 운영팀에 알리는 알림을 추가합니다.", "청구 알림을 켜십시오. AWS Cost Explorer를 사용하여 지난 3개월 동안의 월 평균 비용을 확인하세요. 총 예상 요금에 대한 Amazon CloudWatch 경보를 생성합니다. Cost Explorer에서 결정한 비용보다 높은 비용 임계값을 지정합니다. 경보 임계값이 위반되면 운영팀에 알리는 알림을 추가합니다.", "AWS 비용 이상 탐지를 사용하여 연결된 계정 모니터 유형이 있는 비용 모니터를 생성합니다. 일일 AWS 비용 요약을 운영 팀에 보내려면 구독을 생성하세요. 비용 차이에 대한 임계값을 지정합니다.", "AWS 비용 이상 탐지를 사용하여 모니터 유형이 AWS 서비스인 비용 모니터를 생성합니다. 일일 AWS 비용 요약을 운영 팀에 보내려면 구독을 생성하세요. 비용 차이에 대한 임계값을 지정합니다."], "answers": [3]}, {"q": "회사에서 새로운 웹 기반 애플리케이션을 배포하고 있으며 Linux 애플리케이션 서버용 스토리지 솔루션이 필요합니다. 회사는 모든 인스턴스에 대한 애플리케이션 데이터 업데이트를 위한 단일 위치를 생성하려고 합니다. 활성 데이터 세트의 크기는 최대 100GB입니다. 솔루션 설계자는 매일 3시간 동안 최대 작업이 발생하고 총 225MiBps의 읽기 처리량이 필요하다고 결정했습니다. 솔루션 설계자는 재해 복구(DR)를 위해 다른 AWS 리전에서 사용할 수 있는 데이터 사본을 만드는 다중 AZ 솔루션을 설계해야 합니다. DR 사본의 RPO는 1시간 미만입니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["새로운 Amazon Elastic File System(Amazon EFS) 다중 AZ 파일 시스템을 배포합니다. 프로비저닝된 처리량의 75MiBps에 대해 파일 시스템을 구성합니다. DR 지역의 파일 시스템에 대한 복제를 구현합니다.", "새로운 Amazon FSx for Lustre 파일 시스템을 배포합니다. 파일 시스템에 대한 버스팅 처리량 모드를 구성합니다. AWS Backup을 사용하여 파일 시스템을 DR 리전에 백업합니다.", "처리량이 225MiBps인 범용 SSD(gp3) Amazon Elastic Block Store(Amazon EBS) 볼륨을 배포합니다. EBS 볼륨에 대해 다중 연결을 활성화합니다. AWS Elastic Disaster Recovery를 사용하여 EBS 볼륨을 DR 리전에 복제합니다.", "프로덕션 리전과 DR 리전 모두에 Amazon FSx for OpenZFS 파일 시스템을 배포합니다. 10분마다 프로덕션 파일 시스템에서 DR 파일 시스템으로 데이터를 복제하는 AWS DataSync 예약 작업을 생성합니다."], "answers": [0]}, {"q": "회사는 인터넷에 연결되지 않은 원격 위치에서 실험을 통해 데이터를 수집해야 합니다. 실험 기간 동안 전체 네트워크에 연결된 센서는 1주일 동안 예비 형식으로 6TB의 데이터를 생성합니다. 데이터 파일을 FTP 서버에 주기적으로 업로드하도록 센서를 구성할 수 있지만 센서에는 자체 FTP 서버가 없습니다. 센서는 다른 프로토콜도 지원하지 않습니다. 회사는 실험 후 가능한 한 빨리 데이터를 중앙에서 수집하고 거짓말 데이터를 AWS 클라우드의 객체 스토리지로 옮겨야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["AWS Snowball Edge Compute Optimized 디바이스를 주문하십시오. 장치를 로컬 네트워크에 연결하십시오. 대상 버킷 이름으로 AWS DataSync를 구성하고 NFS를 통해 데이터를 디바이스로 언로드합니다. 실험 후에는 데이터를 Amazon S3에 로드할 수 있도록 디바이스를 AWS로 반환합니다.", "Amazon Linux 2 AMI를 포함한 AWS Snowcone 디바이스를 주문합니다. 장치를 로컬 네트워크에 연결하십시오. 디바이스에서 Amazon EC2 인스턴스를 시작합니다. 각 센서에서 주기적으로 데이터를 다운로드하는 셸 스크립트를 만듭니다. 실험 후에는 데이터를 Amazon Elastic Block Store(Amazon EBS) 볼륨으로 로드할 수 있도록 디바이스를 AWS로 반환합니다.", "Amazon Linux 2 AMI를 포함한 AWS Snowcone 디바이스를 주문합니다. 장치를 로컬 네트워크에 연결하십시오. 디바이스에서 Amazon EC2 인스턴스를 시작합니다. EC2 인스턴스에 FTP 서버를 설치하고 구성합니다. EC2 인스턴스에 데이터를 업로드하도록 센서를 구성합니다. 실험 후에는 데이터가 Amazon S3에 로드될 수 있도록 디바이스를 AWS로 반환합니다.", "AWS Snowcone 디바이스를 주문합니다. 장치를 로컬 네트워크에 연결하십시오. Amazon FSx를 사용하도록 장치를 구성합니다. 장치에 데이터를 업로드하도록 센서를 구성합니다. 업로드된 데이터를 Amazon S3 버킷과 동기화하도록 디바이스에서 AWS DataSync를 구성하여 데이터를 Amazon Elastic Block Store(Amazon EBS) 볼륨으로 로드할 수 있도록 디바이스를 AWS로 반환합니다."], "answers": [2]}, {"q": "여러 사업부를 보유한 회사는 모든 기능이 활성화된 AWS Organizations를 사용하고 있습니다. 회사는 각 사업부가 자체 AWS 계정을 갖는 계정 구조를 구현했습니다. 각 AWS 계정의 관리자는 Amazon Athena를 사용하여 해당 계정에 대한 자세한 비용 및 사용률 데이터를 확인해야 합니다. 각 사업부는 자체 비용 및 활용 데이터에만 액세스할 수 있습니다. AWS 비용 및 사용 보고서 설정 기능을 관리하는 IAM 정책이 마련되어 있습니다. 조직의 모든 데이터가 포함된 중앙 비용 및 사용 보고서는 이미 Amazon S3 버킷에서 사용할 수 있습니다. 운영 복잡성을 최소화하면서 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["조직의 마스터 계정에서 AWS Resource Access Manager(AWS RAM)를 사용하여 비용 및 사용 보고서 데이터를 각 회원 계정과 공유합니다.", "조직의 마스터 계정에서 중앙 비용 및 사용 보고서가 포함된 S3 버킷에 새 파일이 도착할 때마다 AWS Lambda 함수를 호출하도록 S3 이벤트를 구성합니다. 각 회원 계정의 데이터를 추출하고 Amazon S3의 데이터를 별도의 접두사 아래에 배치하도록 Lambda 함수를 구성합니다. 각 회원 계정이 자체 접두사에 액세스할 수 있도록 S3 버킷 정책을 수정합니다.", "각 회원 계정에서 AWS Cost Explorer에 액세스합니다. 계정에 대한 관련 비용 정보가 포함된 새 보고서를 만듭니다. Cost Explorer에 보고서를 저장합니다. 계정 관리자가 저장된 보고서에 액세스하는 데 사용할 수 있는 지침을 제공하십시오.", "각 회원 계정에서 비용 및 사용 보고서 데이터를 저장할 새 S3 버킷을 생성합니다. 비용 및 사용 보고서를 설정하여 데이터를 새 S3 버킷으로 전달합니다."], "answers": [1]}, {"q": "한 회사가 제조 애플리케이션을 위한 AWS 환경을 설계하고 있습니다. 애플리케이션은 고객에게 성공적이었으며 애플리케이션의 사용자 기반이 증가했습니다. 회사는 1Gbps AWS Direct Connect 연결을 통해 AWS 환경을 회사의 온프레미스 데이터 센터에 연결했습니다. 회사는 연결을 위해 BGP를 구성했습니다. 회사는 솔루션의 가용성, 내결함성 및 보안을 보장하기 위해 기존 네트워크 연결 솔루션을 업데이트해야 합니다. 이러한 요구 사항을 가장 비용 효율적으로 충족하는 솔루션은 무엇입니까?", "opts": ["동적 프라이빗 IP AWS Site-to-Site VPN을 보조 경로로 추가하여 전송 중인 데이터를 보호하고 직접 연결 연결에 대한 복원력을 제공합니다. Direct Connect 연결 내부의 트래픽을 암호화하도록 MACsec을 구성합니다.", "회사의 온프레미스 데이터 센터와 AWS 간에 또 다른 Direct Conned 연결을 제공하여 전송 속도를 높이고 복원력을 제공합니다. Direct Conned 연결 내부의 트래픽을 암호화하도록 MACsec을 구성합니다.", "여러 프라이빗 VIF를 구성합니다. 복원력을 제공하기 위해 온프레미스 데이터 센터와 AWS 사이의 VIF에 걸쳐 데이터 로드 밸런싱을 수행합니다.", "전송 중인 데이터를 보호하고 Direct Connect 연결에 대한 복원력을 제공하기 위해 정적 AWS Site-to-Site VPN을 보조 경로로 추가합니다."], "answers": [3]}, {"q": "회사는 애플리케이션을 현대화하고 해당 애플리케이션을 AWS로 마이그레이션해야 합니다. 애플리케이션은 사용자 프로필 데이터를 온프레미스 MySQL 데이터베이스의 단일 테이블에 텍스트로 저장합니다. 현대화 후에 사용자는 애플리케이션을 사용하여 최대 4GB 크기의 비디오 파일을 업로드하게 됩니다. 다른 사용자는 애플리케이션에서 비디오 파일을 다운로드할 수 있어야 합니다. 회사에는 신속한 확장을 제공하는 비디오 스토리지 솔루션이 필요합니다. 솔루션은 애플리케이션 성능에 영향을 주어서는 안 됩니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["AWS Database Migration Service(AWS DMS)를 사용하여 데이터베이스를 Amazon Aurora PostgreSQL로 마이그레이션합니다. 비디오를 데이터베이스의 TEXT 열에 base64로 인코딩된 문자열로 저장합니다.", "AWS Schema Conversion Tool(AWS SCT)과 함께 AWS Database Migration Service(AWS DMS)를 사용하여 데이터베이스를 Amazon DynamoDB로 마이그레이션합니다. 비디오를 Amazon S3에 객체로 저장합니다. 해당 DynamoDB 항목에 S3 키를 저장합니다.", "AWS Schema Conversion Tool(AWS SCT)과 함께 AWS Database Migration Service(AWS DMS)를 사용하여 데이터베이스를 Amazon Keyspaces(Apache Cassandra용)로 마이그레이션합니다. 비디오를 Amazon S3에 객체로 저장합니다. 해당 Amazon Keyspaces 항목에 S3 객체 식별자를 저장합니다.", "AWS Schema Conversion Tool(AWS SCT)과 함께 AWS Database Migration Service(AWS DMS)를 사용하여 데이터베이스를 Amazon DynamoDB로 마이그레이션합니다. 해당 DynamoDB 항목에 비디오를 base64로 인코딩된 문자열로 저장합니다."], "answers": [1]}, {"q": "회사는 Amazon Elastic File System(Amazon EFS) 파일 시스템에 문서를 저장하고 관리합니다. 파일 시스템은 AWS Key Management Service(AWS KMS) 키로 암호화됩니다. 파일 시스템은 독점 소프트웨어를 실행하는 Amazon EC2 인스턴스에 탑재됩니다. 회사는 파일 시스템에 대한 자동 백업을 활성화했습니다. 자동 백업은 AWS Backup 기본 백업 계획을 사용합니다. 솔루션 설계자는 삭제된 문서를 RPO 100분 이내에 복구할 수 있는지 확인해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["새로운 IAM 역할을 생성합니다. 새 백업 계획을 만듭니다. 새로운 IAM 역할을 사용하여 백업을 생성합니다. 새 IAM 역할이 키를 사용할 수 있도록 KMS 키 정책을 업데이트합니다. 파일 시스템에 대해 시간별 백업 일정을 구현합니다.", "새로운 백업 계획을 생성합니다. AWSServiceRoleForBackup IAM 역할이 키를 사용할 수 있도록 KMS 키 정책을 업데이트합니다. 30분마다 파일 시스템 백업을 실행하려면 사용자 정의 cron 표현식을 구현하십시오.", "새로운 IAM 역할을 생성합니다. 기존 백업 계획을 사용합니다. 새 IAM 역할이 키를 사용할 수 있도록 KMS 키 정책을 업데이트합니다. 특정 시점 복구를 위해 지속적인 백업을 활성화합니다.", "기존 백업 계획을 사용합니다. AWSServiceRoleForBackup IAM 역할이 키를 사용할 수 있도록 KMS 키 정책을 업데이트합니다. 파일 시스템에 대해 교차 지역 복제를 활성화합니다."], "answers": [0]}, {"q": "솔루션 설계자는 클라우드 엔지니어 팀이 AWS CLI를 사용하여 객체를 Amazon S3 버킷에 업로드할 수 있는 안전한 방법을 제공해야 합니다. 각 클라우드 엔지니어에게는 IAM 사용자가 있습니다. IAM 액세스 키 및 가상 MFA(다단계 인증) 디바이스. 클라우드 엔지니어의 IAM 사용자는 S3-access라는 그룹에 있습니다. 클라우드 엔지니어는 MFA를 사용하여 Amazon S3에서 모든 작업을 수행해야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["정책을 S3 버킷에 연결하여 IAM 사용자가 S3 버킷에서 작업을 수행할 때 IAM 사용자에게 MFA 코드를 묻는 메시지를 표시합니다. AWS CLI와 함께 IAM 액세스 키를 사용하여 Amazon S3를 호출합니다.", "보안 주체가 그룹을 맡을 때 보안 주체가 MA를 사용하도록 요구하도록 S3 액세스 그룹에 대한 신뢰 정책을 업데이트합니다. AWS CLI와 함께 IAM 액세스 키를 사용하여 Amazon S3를 계산합니다.", "MFA가 없는 경우 53개 작업을 모두 거부하도록 정책을 S3 액세스 그룹에 연결합니다. AWS CLI와 함께 IAM 액세스 키를 사용하여 Amazon S3를 호출합니다.", "MFA가 존재하지 않는 한 모든 S3 작업을 거부하도록 정책을 S3 액세스 그룹에 연결합니다. AWS 보안에서 임시 자격 증명을 요청합니다. 토큰 서비스(AWS STS) 사용자가 Amazon S3에서 작업을 수행할 때 Amazon S3가 참조할 프로필에 임시 자격 증명을 첨부합니다."], "answers": [3]}, {"q": "회사는 60개의 온프레미스 레거시 애플리케이션을 AWS로 마이그레이션해야 합니다. 응용 프로그램은 NET Framework를 기반으로 하며 Windows에서 실행됩니다. 회사에는 마이그레이션 시간을 최소화하고 애플리케이션 코드 변경이 필요하지 않은 솔루션이 필요합니다. 회사는 또한 인프라 관리를 원하지 않습니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["AWS Toolkit for NET Refactoring을 사용하여 애플리케이션을 리팩터링하고 컨테이너화합니다. Fargate 시작 유형과 함께 Amazon Elastic Container Service(Amazon ECS)를 사용하여 컨테이너화된 애플리케이션을 호스팅합니다.", "Windows Web Application Migration Assistant를 사용하여 애플리케이션을 AWS Elastic Beanstalk로 마이그레이션합니다. Elastic Beanstalk를 사용하여 애플리케이션을 배포하고 관리하세요.", "Windows Web Application Migration Assistant를 사용하여 애플리케이션을 Amazon EC2 인스턴스로 마이그레이션합니다. EC2 인스턴스를 사용하여 애플리케이션을 배포하고 관리합니다.", "AWS Toolkit for NET Refactoring을 사용하여 애플리케이션을 리팩터링하고 컨테이너화합니다. Fargate 시작 유형과 함께 Amazon Elastic Kubernetes Service(Amazon EKS)를 사용하여 컨테이너화된 애플리케이션을 호스팅합니다."], "answers": [1]}, {"q": "회사는 Amazon S3 버킷에 저장된 데이터에 대해 대규모 일괄 처리 작업을 실행해야 합니다. 작업은 시뮬레이션을 수행합니다. 작업 결과는 시간에 민감하지 않으며 프로세스는 중단을 견딜 수 있습니다. 데이터가 S3 버킷에 저장될 때 각 작업은 15~20GB의 데이터를 처리해야 합니다. 회사는 추가 분석을 위해 작업의 출력을 다른 Amazon S3 버킷에 저장합니다. 이러한 요구 사항을 가장 비용 효율적으로 충족하는 솔루션은 무엇입니까?", "opts": ["서버리스 데이터 파이프라인을 생성합니다. 오케스트레이션을 위해 AWS Step Functions를 사용하세요. 프로비저닝된 용량과 함께 AWS Lambda 함수를 사용하여 데이터를 처리합니다.", "Amazon EC2 스팟 인스턴스를 포함하는 AWS Batch 컴퓨팅 환경을 생성합니다. SPOT_CAPACITY_OPTIMIZED 할당 전략을 지정합니다.", "Amazon EC2 온디맨드 인스턴스 및 스팟 인스턴스를 포함하는 AWS Batch 컴퓨팅 환경을 생성합니다. 스팟 인스턴스에 대한 SPOT_CAPACITY_OPTIMIZED 할당 전략을 지정합니다.", "Amazon Elastic Kubernetes Service(Amazon EKS)를 사용하여 처리 작업을 실행합니다. Amazon EC2 온디맨드 인스턴스와 스팟 인스턴스의 조합이 포함된 관리형 노드 그룹을 사용합니다."], "answers": [1]}, {"q": "회사에는 온프레미스에서 이미지 데이터를 분석하고 저장하는 애플리케이션이 있습니다. 이 애플리케이션은 매일 수백만 개의 새로운 이미지 파일을 받습니다. 파일 크기는 평균 1MB입니다. 파일은 1GB 단위로 분석됩니다. 애플리케이션이 배치를 분석할 때 애플리케이션은 이미지를 함께 압축합니다. 그런 다음 애플리케이션은 장기 저장을 위해 이미지를 온프레미스 NFS 서버에 단일 파일로 보관합니다. 회사는 온프레미스에 Microsoft Hyper-V 환경을 보유하고 있으며 사용 가능한 컴퓨팅 용량을 갖추고 있습니다. 회사는 스토리지 용량이 없어 AWS에 이미지를 보관하려고 합니다. 회사는 요청 후 1주일 이내에 보관된 데이터를 검색할 수 있는 능력이 필요합니다. 이 회사는 온프레미스 데이터 센터와 AWS 간에 10Gbps AWS Direct Connect 연결을 보유하고 있습니다. 회사는 대역폭 제한을 설정하고 업무 시간 외에 보관된 이미지가 AWS에 복사되도록 예약해야 합니다. 이러한 요구 사항을 가장 비용 효율적으로 충족하는 솔루션은 무엇입니까?", "opts": ["새로운 GPU 기반 Amazon EC2 인스턴스에 AWS DataSync 에이전트를 배포합니다. NFS 온프레미스 서버에서 Amazon S3 Glacier Instant Retrieval로 파일 배치를 복사하도록 DataSync 에이전트를 구성합니다. 복사가 성공한 후 온프레미스 스토리지에서 데이터를 삭제합니다.", "AWS DataSync 에이전트를 온프레미스에 Hyper-V VM으로 배포합니다. NFS 온프레미스 서버에서 Amazon S3 Glacier Deep Archive로 파일 배치를 복사하도록 DataSync 에이전트를 구성합니다. 복사가 성공한 후 온프레미스 스토리지에서 데이터를 삭제합니다.", "새로운 범용 Amazon EC2 인스턴스에 AWS DataSync 에이전트를 배포합니다. NFS 온프레미스 서버에서 Amazon S3 Standard로 파일 배치를 복사하도록 DataSync 에이전트를 구성합니다. 복사가 성공한 후 온프레미스 스토리지에서 데이터를 삭제합니다. 1일 후 객체를 S3 Standard에서 S3 Glacier Deep Archive로 전환하는 S3 수명 주기 규칙을 생성합니다.", "Hyper-V 환경의 온프레미스에 AWS Storage Gateway 테이프 게이트웨이를 배포합니다. 테이프 게이트웨이를 AWS에 연결합니다. 자동 테이프 생성을 사용합니다. Amazon S3 Glacier Deep Archive 풀을 지정합니다. 이미지 배치가 복사된 후 테이프를 꺼냅니다."], "answers": [1]}, {"q": "회사에서는 사용자 기반 라이선스 스키마로 전환하기 위한 전략의 일환으로 애플리케이션의 핵심성과지표(KPI)를 기록하려고 합니다. 이 애플리케이션은 웹 기반 UI를 갖춘 다중 계층 애플리케이션입니다. 회사는 CloudWatch 에이전트를 사용하여 모든 로그 파일을 Amazon CloudWatch에 저장합니다. 애플리케이션에 대한 모든 로그인은 로그 파일에 저장됩니다. 새로운 라이센스 스키마의 일부로 회사는 각 클라이언트의 일일, 주간, 월간 고유 사용자 수를 파악해야 합니다. 애플리케이션을 최소한으로 변경하면서 이 정보를 제공하는 솔루션은 무엇입니까?", "opts": ["성공한 각 로그인을 지표로 저장하는 Amazon CloudWatch Logs 지표 필터를 구성합니다. 사용자 이름과 클라이언트 이름을 메트릭에 대한 차원으로 구성합니다.", "로그인이 성공할 때마다 AWS SDK에 대한 호출을 생성하여 CloudWatch에서 사용자 이름과 클라이언트 이름 차원을 기록하는 사용자 지정 지표를 증가시키도록 애플리케이션 로직을 변경합니다.", "로그에서 성공적인 로그인 지표를 추출하도록 CloudWatch 에이전트를 구성합니다. 또한 성공적인 로그인 지표를 지표의 차원으로 사용자 이름과 클라이언트 이름을 사용하는 사용자 지정 지표로 저장하도록 CloudWatch 에이전트를 구성합니다.", "애플리케이션 로그의 Amazon Cloud ]}, {"q": "회사에는 온프레미스 데이터 센터에서 실행되는 많은 서비스가 있습니다. 데이터 센터는 AWS Direct Connect(DX) 및 IPSec VPN을 사용하여 AWS에 연결됩니다. 서비스 데이터는 중요하므로 연결이 인터넷을 통과할 수 없습니다. 회사는 새로운 시장 부문으로 확장하고 AWS를 사용하는 다른 회사에 서비스를 제공하기를 원합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["TCP 트래픽을 허용하는 VPC 종단점 서비스를 생성하고 이를 Network Load Balancer 뒤에서 호스팅하고 DX를 통해 서비스를 사용할 수 있도록 합니다.", "HTTP 또는 HTTPS 트래픽을 허용하는 VPC 종단점 서비스를 생성하고 이를 Application Load Balancer 뒤에서 호스팅하고 DX를 통해 서비스를 사용할 수 있도록 합니다.", "인터넷 게이트웨이를 VPC에 연결하고 네트워크 액세스 제어 및 보안 그룹 규칙이 관련 인바운드 및 아웃바운드 트래픽을 허용하는지 확인합니다.", "NAT 게이트웨이를 VPC에 연결하고 네트워크 액세스 제어 및 보안 그룹 규칙이 관련 인바운드 및 아웃바운드 트래픽을 허용하는지 확인합니다."], "answers": [0]}, {"q": "회사는 AWS Organizations를 사용하여 AWS 계정을 관리합니다. 솔루션 설계자는 관리자 역할만 IAM 작업을 사용할 수 있도록 허용되는 솔루션을 설계해야 합니다. 그러나 솔루션 아키텍트는 회사 전체의 모든 AWS 계정에 액세스할 수 없습니다. 최소한의 운영 오버헤드로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["관리자 역할에 대해서만 IAM 작업을 허용하려면 모든 AWS 계정에 적용되는 SCP를 생성하십시오. 루트 OU에 SCP를 적용합니다.", "IAM 작업과 관련된 각 이벤트에 대해 AWS Lambda 함수를 호출하도록 AWS CloudTrail을 구성합니다. 작업을 호출한 사용자가 관리자가 아닌 경우 작업을 거부하도록 기능을 구성합니다.", "모든 AWS 계정에 적용되는 SCP를 생성하여 관리자 역할이 있는 사용자를 제외한 모든 사용자에 대한 IAM 작업을 거부합니다. 루트 OU에 SCP를 적용합니다.", "IAM 작업을 허용하는 IAM 권한 경계를 설정합니다. 모든 AWS 계정의 모든 관리자 역할에 권한 경계를 연결합니다."], "answers": [2]}, {"q": "회사는 AWS Organizations의 조직을 사용하여 여러 AWS 계정을 관리합니다. 회사는 회사의 스네어 서비스 계정에 있는 VPC에서 일부 애플리케이션을 호스팅합니다. 회사는 공유 서비스 계정의 VPC에 전송 게이트웨이를 연결했습니다. 회사는 새로운 기능을 개발하고 있으며 스네어 서비스 계정에 있는 애플리케이션에 액세스해야 하는 개발 환경을 만들었습니다. 회사에서는 개발 계정의 리소스를 자주 삭제하고 다시 생성할 예정입니다. 또한 회사에서는 필요에 따라 공유 서비스 계정에 대한 팀 연결을 다시 생성할 수 있는 기능을 개발 팀에 제공하려고 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["개발 계정에 전송 게이트웨이를 생성하십시오. 공유 서비스 계정에 대한 전송 게이트웨이 피어링 요청을 생성합니다. 피어링 연결을 자동으로 수락하도록 스네어 서비스 전송 게이트웨이를 구성합니다.", "공유 서비스 계정에서 전송 게이트웨이에 대한 자동 수락을 켭니다. AWS Resource Access Manager(AWS RAM)를 사용하여 공유 서비스 계정의 전송 게이트웨이 리소스를 개발 계정과 공유합니다. 타이 개발 계정의 리소스를 수락합니다. 개발 계정에 전송 게이트웨이 연결을 생성합니다.", "공유 서비스 계정에서 전송 게이트웨이에 대한 자동 수락을 켭니다. VPC 엔드포인트를 생성합니다. 엔드포인트 정책을 사용하여 개발 계정에 대한 VPC 엔드포인트에 대한 권한을 부여합니다. 연결 요청을 자동으로 수락하도록 엔드포인트 서비스를 구성합니다. 개발팀에 엔드포인트 세부정보를 제공하세요.", "개발 계정이 연결 요청을 하는 전송 게이트웨이 연결 값을 수락하는 AWS Lambda 함수를 호출하는 Amazon EventBridge 규칙을 생성합니다. AWS Network Manager를 사용하여 저장합니다. 개발 계정이 있는 공유 서비스 계정의 전송 게이트웨이입니다. 개발 계정에서 전송 게이트웨이를 수락합니다."], "answers": [1]}, {"q": "회사는 온프레미스 데이터 센터에서 AWS로 가상 Microsoft 워크로드를 마이그레이션하려고 합니다. 이 회사는 AWS에서 몇 가지 샘플 워크로드를 성공적으로 테스트했습니다. 또한 회사는 VPC에 대한 AWS Site-to-Site VPN 연결을 생성했습니다. 솔루션 설계자는 데이터 센터의 모든 워크로드 마이그레이션에 대한 총 소유 비용(TCO) 보고서를 생성해야 합니다. 데이터 센터의 각 VM에서 SNMP(Simple Network Management Protocol)가 활성화되었습니다. 회사는 데이터 센터에 VM을 더 추가할 수 없으며 VM에 추가 소프트웨어를 설치할 수도 없습니다. 검색 데이터는 자동으로 AWS Migration Hub로 가져와야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["AWS Application Migration Service 에이전트 없는 서비스와 AWS Migration Hub 전략 권장 사항을 사용하여 TCO 보고서를 생성하십시오.", "Windows Amazon EC2 인스턴스를 시작합니다. EC2 인스턴스에 Migration Evaluator 에이전트 없는 수집기를 설치합니다. TCO 보고서를 생성하도록 마이그레이션 평가기를 구성합니다.", "Windows Amazon EC2 인스턴스를 시작합니다. EC2 인스턴스에 Migration Evaluator 에이전트 없는 수집기를 설치합니다. TCO 보고서를 생성하도록 Migration Hub를 구성합니다.", "VPC 내부에서 AWS 마이그레이션 준비 평가 도구를 사용하십시오. TCO 보고서를 생성하도록 마이그레이션 평가기를 구성합니다."], "answers": [1]}, {"q": "모바일 게임을 개발하는 회사는 두 개의 AWS 리전에서 게임 자산을 사용할 수 있도록 만들고 있습니다. 게임 자산은 각 지역의 ALB(Application Load Balancer) 뒤의 Amazon EC2 인스턴스 세트에서 제공됩니다. 회사에서는 가장 가까운 지역에서 게임 자산을 가져와야 합니다. 가장 가까운 지역에서 게임 평가를 사용할 수 없게 되면 다른 지역에서 게임 평가를 가져와야 합니다. 이러한 요구 사항을 충족하려면 솔루션 설계자가 무엇을 해야 합니까?", "opts": ["Amazon CloudFront 배포판을 생성합니다. 각 ALB에 대해 하나의 원본이 있는 원본 그룹을 만듭니다. 원본 중 하나를 기본으로 설정합니다.", "각 ALB에 대해 Amazon Route 53 상태 확인을 생성합니다. 두 개의 ALB를 가리키는 Route 53 장애 조치 라우팅 레코드를 생성합니다. 대상 상태 평가 값을 예로 설정합니다.", "각각 하나의 ALB를 오리진으로 사용하는 두 개의 Amazon CloudFront 배포판을 생성합니다. 두 CloudFront 배포를 가리키는 Amazon Route 53 장애 조치 라우팅 레코드를 생성합니다. 대상 상태 평가 값을 예로 설정합니다.", "각 ALB에 대해 Amazon Route 53 상태 확인을 생성합니다. 두 개의 ALB를 가리키는 Route 53 지연 별칭 레코드를 생성합니다. 대상 상태 평가 값을 예(YES)로 설정합니다."], "answers": [3]}, {"q": "회사는 여러 AWS 계정에 워크로드를 배포합니다. 각 계정에는 중앙 집중식 Amazon S3 버킷에 텍스트 로그 형식으로 게시된 VPC 흐름 로그가 있는 VPC가 있습니다. 각 로그 파일은 gzjp 압축으로 압축됩니다. 회사는 로그 파일을 무기한 보관해야 합니다. 보안 엔지니어는 때때로 Amazon Athena를 사용하여 VPC 흐름 로그를 쿼리하여 토그를 분석합니다. 수집된 토그 수가 증가함에 따라 시간이 지남에 따라 쿼리 성능이 저하됩니다. 솔루션 아키텍트는 토그 분석의 성능을 향상시키고 VPC 흐름 로그가 사용하는 저장 공간을 줄여야 합니다. 가장 큰 성능 개선으로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["gzip 파리의 압축을 풀고 bzip2 압축으로 타일을 압축하는 AWS Lambda 함수를 생성합니다. Lambda 함수를 s3: ObiectCrealed;Put S3 버킷에 대한 S3 이벤트 알림에 구독합니다.", "S3 버킷에 대해 S3 Transfer Acceleration을 활성화합니다. 연결이 업로드되는 즉시 파일을 S3 Intelligent-Tiering 스토리지 클래스로 이동하도록 S3 수명 주기 구성을 생성합니다.", "파일을 Apache Parquet 형식으로 저장하도록 VPC 흐름 로그 구성을 업데이트합니다. 로그 파일에 대해 시간별 파티션을 지정합니다.", "데이터 사용량 제어 제한 없이 새로운 Athena 작업 그룹을 생성합니다. Athena 엔진 버전 2를 사용하세요."], "answers": [2]}, {"q": "회사는 온프레미스 인프라와 AWS 간에 전용 연결을 설정하려고 합니다. 회사는 계정 VPC에 대한 1Gbps AWS Direct Connect 연결을 설정하고 있습니다. 아키텍처에는 여러 VPC와 온프레미스 인프라를 연결하기 위한 전송 게이트웨이와 Direct Connect 게이트웨이가 포함되어 있습니다. 회사는 Direct Connect 연결을 사용하여 전송 VIF를 통해 VPC 리소스에 연결해야 합니다. 이러한 요구 사항을 충족하는 단계 조합은 무엇입니까? (2개 선택)", "opts": ["1Gbps Direct Connect 연결을 10Gbps로 업데이트합니다.", "전송 VIF를 통해 온프레미스 네트워크 접두사를 광고합니다.", "전송 VIF를 통해 Direct Connect 게이트웨이에서 온프레미스 네트워크로 VPC 접두사를 반대합니다.", "Direct Connect 연결의 MACsec 암호화 모드 속성을 암호화해야 하도록 업데이트합니다.", "MACsec 연결 키 이름-CKN/CAK(연결 연결 키) 쌍을 Direct Connect 연결과 연결합니다."], "answers": [1, 2]}, {"q": "한 회사에서는 씬 클라이언트 디바이스와 함께 Amazon Workspaces를 사용하여 노후된 데스크톱을 교체하려고 합니다. 직원들은 데스크톱을 사용하여 임상 시험 데이터를 다루는 애플리케이션에 액세스합니다. 기업 보안 정책에 따르면 애플리케이션에 대한 액세스는 회사 지점으로만 제한되어야 합니다. 회사는 향후 6개월 내에 지점을 추가로 추가하는 것을 고려하고 있습니다. 가장 높은 운영 효율성으로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["지점의 공용 주소 목록을 사용하여 IP 액세스 제어 그룹 규칙을 만듭니다. IP 액세스 제어 그룹을 Workspaces 디렉터리와 연결합니다.", "AWS Firewall Manager를 사용하여 지점의 공용 주소 목록이 포함된 IPSet가 포함된 웹 ACL 규칙을 생성합니다. 위치 - 웹 ACL을 작업 공간 디렉터리와 연결합니다.", "ACM(AWS Certificate Manager)을 사용하여 지사 위치에 배포된 시스템에 신뢰할 수 있는 장치 인증서를 발급합니다. Workspaces 디렉터리에 대한 제한된 접근을 활성화합니다.", "지점의 공용 주소에 대한 접근을 제한하도록 구성된 Windows 방화벽을 사용하여 사용자 지정 작업 공간 이미지를 만듭니다. 이미지를 사용하여 작업공간을 배포합니다."], "answers": [0]}, {"q": "회사는 AWS Organizations를 사용합니다. 회사는 중앙 네트워킹 계정에서 두 개의 방화벽 어플라이언스를 실행합니다. 각 방화벽 어플라이언스는 수동으로 구성된 고가용성 Amazon EC2 인스턴스에서 실행됩니다. 전송 게이트웨이는 중앙 집중식 네트워킹 계정의 VPC를 멤버 계정의 VPC에 연결합니다. 각 방화벽 어플라이언스는 회원 계정에서 인터넷으로 트래픽을 라우팅하는 데 사용되는 고정 개인 IP 주소를 사용합니다. 최근 사건 중에 잘못 구성된 스크립트로 인해 두 방화벽 장비가 모두 종료되었습니다. 방화벽 장비를 재구축하는 동안 회사는 시작 시 방화벽 장비를 구성하기 위한 새로운 스크립트를 작성했습니다. 회사는 방화벽 어플라이언스 배포를 현대화하려고 합니다. 방화벽 어플라이언스는 네트워크 확장 시 증가된 트래픽을 처리하기 위해 수평으로 확장할 수 있는 기능이 필요합니다. 회사는 회사 정책을 준수하기 위해 방화벽 장비를 계속 사용해야 합니다. 방화벽 어플라이언스 공급자는 최신 버전의 방화벽 코드가 모든 AWS 서비스에서 작동함을 확인했습니다. 솔루션 설계자는 이러한 요구 사항을 가장 비용 효율적으로 충족하기 위해 어떤 단계 조합을 권장해야 합니까? (3개를 선택하세요.)", "opts": ["중앙 네트워킹 계정에 게이트웨이 부하 분산 장치를 배포합니다. AWS PrivateLink를 사용하는 엔드포인트 서비스를 설정합니다.", "중앙 네트워킹 계정에 Network Load Balancer를 배포합니다. AWS PrivateLink를 사용하는 엔드포인트 서비스를 설정합니다.", "방화벽 어플라이언스를 구성하기 위해 새 스크립트를 사용자 데이터로 사용하는 Auto Scaling 그룹과 시작 템플릿을 생성합니다. 인스턴스 대상 유형을 사용하는 대상 그룹을 생성합니다.", "Auto Scaling 그룹을 생성합니다. 새 스크립트를 사용자 데이터로 사용하여 방화벽 어플라이언스를 구성하는 AWS Launch Wizard 배포를 구성합니다. IP 대상 유형을 사용하는 대상 그룹을 생성합니다.", "각 회원 계정에 VPC 엔드포인트를 생성합니다. VPC 엔드포인트를 가리키도록 라우팅 테이블을 업데이트합니다.", "중앙 네트워킹 계정에 VPC 엔드포인트를 생성합니다. VPC 엔드포인트를 가리키도록 각 멤버 계정의 라우팅 테이블을 업데이트합니다."], "answers": [0, 2, 5]}, {"q": "솔루션 아키텍트는 웹 애플리케이션을 지원하는 PostgreSQL용 Amazon RDS 데이터베이스에 대한 다중 리전 아키텍처를 구현해야 합니다. 데이터베이스는 기본 및 보조 리전에 모두 존재하는 AWS 서비스 및 기능을 포함하는 AWS CloudFormation 템플릿에서 시작됩니다. 데이터베이스는 자동 백업을 위해 구성되었으며 RTO는 15분, RPO는 2시간입니다. 웹 애플리케이션은 Amazon Route 53 레코드를 사용하여 트래픽을 데이터베이스로 라우팅하도록 구성됩니다. 모든 요구 사항을 충족하는 고가용성 아키텍처를 구현하려면 어떤 단계를 조합해야 합니까? (2개 선택)", "opts": ["보조 리전에 데이터베이스의 리전 간 읽기 전용 복제본을 생성합니다. 장애 조치 이벤트 중에 읽기 전용 복제본을 승격하도록 보조 리전에 AWS Lambda 함수를 구성합니다.", "기본 리전에서 오류가 감지되면 AWS Lambda 함수를 호출하는 데이터베이스에 대한 상태 확인을 생성합니다. 보조 리전의 최신 데이터베이스 스냅샷에서 데이터베이스를 다시 생성하고 데이터베이스에 대한 Route 53 호스트 레코드를 업데이트하도록 Lambda 기능을 프로그래밍합니다.", "2시간마다 최신 자동 백업을 보조 리전에 복사하는 AWS Lambda 함수를 생성합니다.", "Route 53에서 데이터베이스 DNS 레코드에 대한 장애 조치 라우팅 정책을 생성합니다. 기본 및 보조 엔드포인트를 각 리전의 엔드포인트로 설정합니다.", "보조 지역에 상시 대기 데이터베이스를 생성합니다. 기본 데이터베이스에 오류가 발생할 경우 AWS Lambda 함수를 사용하여 보조 데이터베이스를 최신 RDS 자동 백업으로 복원합니다."], "answers": [0, 3]}, {"q": "전자상거래 회사가 AWS에서 애플리케이션을 실행하고 있습니다. 애플리케이션에는 AWS Lambda 함수를 호출하는 Amazon API Gateway API가 있습니다. 데이터는 PostgreSQL DB 인스턴스용 Amazon RDS에 저장됩니다. 회사의 가장 최근 플래시 세일 기간 동안 API 호출이 갑자기 증가하여 애플리케이션 성능에 부정적인 영향을 미쳤습니다. 솔루션 설계자는 해당 기간 동안 Amazon CloudWatch 지표를 검토한 결과 Lambda 호출 및 데이터베이스 연결이 크게 증가한 것을 발견했습니다. DB 인스턴스에서도 CPU 사용률이 높았습니다. 솔루션 설계자는 애플리케이션 성능을 최적화하기 위해 무엇을 권장해야 합니까?", "opts": ["Lambda 함수의 메모리를 늘리십시오. 데이터가 검색될 때 데이터베이스 연결을 닫도록 Lambda 함수를 수정합니다.", "Redis용 Amazon ElastiCache 클러스터를 추가하여 RDS 데이터베이스에서 자주 액세스하는 데이터를 저장합니다.", "Lambda 콘솔을 사용하여 RDS 프록시를 생성합니다. 프록시 엔드포인트를 사용하도록 Lambda 함수를 수정합니다.", "함수 핸들러 외부의 데이터베이스에 연결하도록 Lambda 함수를 수정합니다. 새 연결을 만들기 전에 기존 데이터베이스 연결을 확인하세요."], "answers": [2]}, {"q": "한 소매 회사에서 애플리케이션 아키텍처를 개선하려고 합니다. 회사의 애플리케이션은 새로운 주문을 등록하고 상품 반품을 처리하며 분석을 제공합니다. 애플리케이션은 MySQL 데이터베이스와 Oracle OLAP 분석 데이터베이스에 소매 데이터를 저장합니다. 모든 애플리케이션과 데이터베이스는 Amazon EC2 인스턴스에서 호스팅됩니다. 각 애플리케이션은 주문 프로세스의 다양한 부분을 처리하는 여러 구성 요소로 구성됩니다. 이러한 구성 요소는 다양한 소스에서 들어오는 데이터를 사용합니다. 별도의 ETL 작업이 매주 실행되어 각 애플리케이션의 데이터를 분석 데이터베이스에 복사합니다. 솔루션 설계자는 서버리스 서비스를 사용하는 이벤트 기반 솔루션으로 아키텍처를 재설계해야 합니다. 솔루션은 거의 실시간으로 업데이트된 분석을 제공해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["개별 애플리케이션을 마이크로서비스로 AWS Fargate를 사용하는 Amazon Elastic Container Service(Amazon ECS) 컨테이너로 마이그레이션합니다. 소매 MySQL 데이터베이스를 Amazon EC2에 보관하세요. 분석 데이터베이스를 Amazon Neptune으로 이동합니다. Amazon Simple Queue Service(Amazon SQS)를 사용하여 수신되는 모든 데이터를 마이크로서비스 및 분석 데이터베이스로 보냅니다.", "각 애플리케이션에 대해 Auto Scaling 그룹을 생성합니다. 각 Auto Scaling 그룹에 필요한 EC2 인스턴스 수를 지정합니다. 소매 MySQL 데이터베이스와 분석 데이터베이스를 Amazon Aurora MySQL로 마이그레이션합니다. Amazon Simple 알림 서비스(Amazon SNS)를 사용하여 들어오는 모든 데이터를 올바른 EC2 인스턴스와 분석 데이터베이스로 보냅니다.", "개별 애플리케이션을 마이크로서비스로 AWS Fargate를 사용하는 Amazon Elastic Kubernetes Service(Amazon EKS) 컨테이너로 마이그레이션합니다. 소매 MySQL 데이터베이스를 Amazon Aurora Serverless MySQL로 마이그레이션합니다. 분석 데이터베이스를 Amazon Redshift Serverless로 마이그레이션합니다. Amazon EventBridge를 사용하여 수신되는 모든 데이터를 마이크로서비스 및 분석 데이터베이스로 보냅니다.", "개별 애플리케이션을 마이크로서비스로 Amazon AppStream 2.0으로 마이그레이션합니다. 소매 MySQL 데이터베이스를 Amazon Aurora MySQL로 마이그레이션합니다. 분석 데이터베이스를 Amazon Redshift Serverless로 마이그레이션합니다. AWS IoT Core를 사용하여 수신되는 모든 데이터를 마이크로서비스 및 분석 데이터베이스로 보냅니다."], "answers": [2]}, {"q": "한 회사가 온프레미스 데이터 센터에서 AWS 클라우드로 마이그레이션을 계획하고 있습니다. 회사는 AWS 조직 내에서 관리되는 여러 AWS 계정을 사용할 계획입니다. 회사는 처음에 소수의 계정 비용을 지불하고 필요에 따라 계정을 추가합니다. 솔루션 아키텍트는 AWS 계정을 활성화하는 솔루션을 설계해야 합니다. 이러한 요구 사항을 충족하는 가장 운영 효율적인 솔루션은 무엇입니까?", "opts": ["조직의 모든 AWS 계정에 새로운 cloudTrail 추적을 생성하는 AWS Lambda 함수를 생성합니다. Amazon EventBridge에서 예약된 작업을 사용하여 Lambda 함수 실행을 호출합니다.", "조직 마스터 계정에 새 CloudTrail 추적을 생성합니다. 조직의 모든 AYYS 계정에 대한 모든 이벤트를 기록하도록 추적을 구성합니다.", "조직의 모든 AWS 계정에 새로운 CloudTrail 추적을 생성합니다. 새 계정이 생성될 때마다 새 트레일을 생성합니다.", "조직의 모든 AWS 계정에 클라우드 트레일을 생성하는 AWS 시스템 관리자 Automaton Runbook을 생성합니다. Systems Manager State Manager를 사용하여 자동화를 호출합니다."], "answers": [1]}, {"q": "소프트웨어 개발 회사에는 원격으로 작업하는 여러 엔지니어가 있습니다. 이 회사는 Amazon EC2 인스턴스에서 AD DS(Active Directory Domain Services)를 실행하고 있습니다. 회사의 보안 정책에는 VPC에 배포된 모든 내부 비공개 서비스가 VPN을 통해 액세스할 수 있어야 한다고 명시되어 있습니다. VPN에 액세스하려면 다중 요소 인증(MFA)을 사용해야 합니다. 솔루션 설계자는 이러한 요구 사항을 충족하기 위해 무엇을 해야 합니까?", "opts": ["AWS Site-to-Site VPN 연결을 생성합니다. VPN과 AD DS 간의 통합을 구성합니다. VPN 연결을 설정하려면 MFA 지원이 활성화된 Amazon Workspaces 클라이언트를 사용하십시오.", "AWS 클라이언트 VPN 엔드포인트를 생성합니다. AD DS와의 통합을 위한 AD Connector 디렉터리를 만듭니다. AD 커넥터에 대해 MFA를 활성화합니다. AWS 클라이언트 VPN을 사용하여 VPN 연결을 설정합니다.", "AWS VPN CloudHub를 사용하여 여러 AWS Site-to-Site VPN 연결을 생성합니다. AWS VPN CloudHub와 AD DS 간의 통합을 구성합니다. AWS Copilot을 사용하여 VPN 연결을 설정합니다.", "Amazon WorkLink 엔드포인트를 생성합니다. Amazon WorkLink와 AD DS 간의 통합을 구성합니다. Amazon WorkLink에서 MFA를 활성화합니다. AWS 클라이언트 VPN을 사용하여 VPN 연결을 설정합니다."], "answers": [1]}, {"q": "회사는 온프레미스 데이터 센터에서 3계층 웹 애플리케이션을 실행하고 있습니다. 프런트엔드는 Apache 웹 서버에서 제공되고, 중간 계층은 모놀리식 Java 애플리케이션이며, 스토리지 계층은 PostgreSQL 데이터베이스입니다. 최근 마케팅 프로모션 중에 애플리케이션이 다운되어 고객이 애플리케이션을 통해 주문할 수 없었습니다. 분석 결과 세 계층 모두 과부하가 발생한 것으로 나타났습니다. 애플리케이션이 응답하지 않게 되었고 읽기 작업으로 인해 데이터베이스가 용량 제한에 도달했습니다. 회사는 가까운 시일 내에 이미 여러 가지 유사한 프로모션을 계획하고 있습니다. 솔루션 아키텍트는 이러한 문제를 해결하기 위해 AWS로 마이그레이션하기 위한 계획을 개발해야 합니다. 솔루션은 확장성을 극대화하고 운영 노력을 최소화해야 합니다. 이러한 요구 사항을 충족하는 단계 조합은 무엇입니까? (3개 선택)", "opts": ["정적 자산이 Amazon S3에서 호스팅될 수 있도록 프런트엔드를 리팩터링합니다. Amazon CloudFront를 사용하여 고객에게 프런트엔드를 제공합니다. 프런트엔드를 Java 애플리케이션에 연결합니다.", "Auto Scaling 그룹에 있는 Amazon EC2 인스턴스에서 프런트엔드의 Apache 웹 서버를 다시 호스팅합니다. Auto Scaling 그룹 앞에 로드 밸런서를 사용합니다. Amazon Elastic File System(Amazon EFS)을 사용하여 Apache 웹 서버에 필요한 정적 자산을 호스팅합니다.", "Auto Scaling이 포함된 AWS Elastic Beanstalk 환경에서 Java 애플리케이션을 다시 호스팅합니다.", "Java 애플리케이션을 리팩터링하고, Java 애플리케이션을 실행하기 위한 Docker 컨테이너를 개발합니다. AWS Fargate를 사용하여 컨테이너를 호스팅합니다.", "AWS Database Migration Service(AWS DMS)를 사용하여 PostgreSQL 데이터베이스를 Amazon Aurora PostgreSQL 데이터베이스로 플랫폼을 변경합니다. 읽기 복제본에는 Aurora Auto Scaling을 사용합니다.", "온프레미스 서버보다 메모리가 두 배 많은 Amazon EC2 인스턴스에 PostgreSQL 데이터베이스를 다시 호스팅합니다."], "answers": [0, 2, 4]}, {"q": "한 회사가 AWS에 새로운 애플리케이션을 배포하고 있습니다. 애플리케이션은 Amazon Elastic Kubernetes Service(Amazon EKS) 클러스터와 Amazon Elastic Container Registry(Amazon ECR) 리포지토리로 구성됩니다. EKS 클러스터에는 AWS 관리형 노드 그룹이 있습니다. 회사의 보안 지침에는 AWS의 모든 리소스에 보안 취약성이 있는지 지속적으로 검사해야 한다고 명시되어 있습니다. 최소한의 운영 오버헤드로 이 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["AWS 보안 허브를 활성화합니다. EKS 노드와 ECR 리포지토리를 스캔하도록 Security Hub를 구성합니다.", "Amazon Inspector를 활성화하여 EKS 노드와 ECR 저장소를 스캔합니다.", "새로운 Amazon EC2 인스턴스를 시작하고 AWS Marketplace에서 취약점 검색 도구를 설치합니다. EKS 노드를 스캔하도록 EC2 인스턴스를 구성합니다. 푸시 시 기본 스캔을 수행하도록 Amazon ECR을 구성합니다.", "EKS 노드에 Amazon CloudWatch 에이전트를 설치합니다. 지속적으로 검색하도록 CloudWatch 에이전트를 구성합니다. 푸시 시 기본 스캔을 수행하도록 Amazon ECR을 구성합니다."], "answers": [1]}, {"q": "회사는 티켓팅 애플리케이션의 신뢰성을 향상시켜야 합니다. 애플리케이션은 Amazon Elastic Container Service(Amazon ECS) 클러스터에서 실행됩니다. 회사는 Amazon CloudFront를 사용하여 애플리케이션을 제공합니다. ECS 클러스터의 단일 ECS 서비스는 CloudFront 배포의 오리진입니다. 이 애플리케이션에서는 특정 수의 활성 사용자만 티켓 구매 흐름에 참여할 수 있습니다. 이러한 사용자는 JWT(JSON 웹 토큰)의 암호화된 속성으로 식별됩니다. 다른 모든 사용자는 구매할 수 있는 용량이 확보될 때까지 대기실 모듈로 리디렉션됩니다. 애플리케이션에 높은 부하가 발생하고 있습니다. 대기실 모듈은 설계된 대로 작동하지만 대기실의 부하로 인해 애플리케이션 가용성이 저하됩니다. 이러한 중단은 애플리케이션의 티켓 판매 거래에 부정적인 영향을 미치고 있습니다. 부하가 높은 기간 동안 티켓 판매 거래에 가장 높은 신뢰성을 제공하는 솔루션은 무엇입니까?", "opts": ["ECS 클러스터에 대기실용으로 별도의 서비스를 생성합니다. 별도의 확장 구성을 사용하세요. 티켓 서비스가 JWT 정보를 사용하고 요청을 대기실 서비스에 적절하게 전달하는지 확인하세요.", "애플리케이션을 Amazon Elastic Kubernetes Service(Amazon EKS) 클러스터로 이동합니다. 대기실 모듈을 발권 포드와 별도의 포드로 분할합니다. 티켓팅 포드를 StatefulSet의 일부로 만듭니다. 발권 포드가 JWT 정보를 사용하고 요청을 대기실 포드에 적절하게 전달하는지 확인하세요.", "대기실을 위해 ECS 클러스터에 별도의 서비스를 생성합니다. 별도의 확장 구성을 사용하세요. JWT 정보를 검사하고 티켓 서비스 또는 대기실 서비스에 요청을 적절하게 전달하는 CloudFront 함수를 생성합니다.", "애플리케이션을 Amazon Elastic Kubernetes Service(Amazon EKS) 클러스터로 이동합니다. 대기실 모듈을 발권 포드와 별도의 포드로 분할합니다. Kubernetes용 App Mesh 컨트롤러를 프로비저닝하여 AWS App Mesh를 사용하세요. 티켓팅 포드와 대기실 포드 간의 통신을 위해 mTLS 인증 및 서비스 간 인증을 활성화합니다. 발권 포드가 JWT 정보를 사용하고 요청을 대기실 포드에 적절하게 전달하는지 확인하세요."], "answers": [2]}, {"q": "솔루션 아키텍트는 기존의 수동 생성된 비프로덕션 AWS 환경에서 AWS CloudFormation 템플릿을 생성하고 있습니다. CloudFormation 템플릿은 필요에 따라 삭제하고 다시 생성할 수 있습니다. 환경에는 Amazon EC2 인스턴스가 포함되어 있습니다. EC2 인스턴스에는 EC2 인스턴스가 상위 계정의 역할을 맡는 데 사용하는 인스턴스 프로필이 있습니다. 솔루션 설계자는 CloudFormation 템플릿에서 역할을 다시 생성하고 동일한 역할 이름을 사용합니다. CloudFormation 템플릿이 하위 계정에서 시작되면 권한이 부족하여 EC2 인스턴스가 더 이상 상위 계정의 역할을 맡을 수 없습니다. 이 문제를 해결하려면 솔루션 아키텍트가 무엇을 해야 합니까?", "opts": ["상위 계정에서 EC2 인스턴스가 맡아야 하는 역할에 대한 신뢰 정책을 편집하십시오. sts:AssumeRole 작업을 허용하는 기존 문의 대상 역할 ARN이 올바른지 확인하십시오. 신뢰 정책을 저장합니다.", "상위 계정에서 EC2 인스턴스가 가정해야 하는 역할에 대한 신뢰 정책을 편집합니다. 하위 계정의 루트 보안 주체에 대해 sts:AssumeRole 작업을 허용하는 문을 추가합니다. 신뢰 정책을 저장합니다.", "CloudFormation 스택을 다시 업데이트합니다. CAPABILITY_NAMED_IAM 기능만 지정하세요.", "CloudFormation 스택을 다시 업데이트합니다. CAPABILITY_IAM 기능 및 CAPABILITY_NAMED_IAM 기능을 지정합니다."], "answers": [0]}, {"q": "회사의 웹 애플리케이션에 안정성 문제가 있습니다. 이 응용 프로그램은 전 세계 고객에게 서비스를 제공합니다. 애플리케이션은 단일 Amazon EC2 인스턴스에서 실행되며 Amazon RDS for MySQL 데이터베이스에서 읽기 집약적인 작업을 수행합니다. 부하가 높으면 애플리케이션이 응답하지 않게 되며 EC2 인스턴스를 수동으로 다시 시작해야 합니다. 솔루션 설계자는 애플리케이션의 안정성을 향상해야 합니다. 최소한의 개발 노력으로 이 요구 사항을 충족할 수 있는 솔루션은 무엇입니까?", "opts": ["Amazon CloudFront 배포판을 생성합니다. EC2 인스턴스를 배포 원본으로 지정합니다. RDS for MySQL 데이터베이스에 대한 다중 AZ 배포를 구성합니다. 읽기 집약적인 작업에는 대기 DB 인스턴스를 사용합니다.", "Auto Scaling 그룹에 있는 EC2 인스턴스에서 애플리케이션을 실행합니다. ELB(Elastic Load Balancing) 로드 밸런서 뒤에 EC2 인스턴스를 배치합니다. 데이터베이스 서비스를 Amazon Aurora로 교체합니다. 읽기 집약적인 작업에는 Aurora 복제본을 사용하십시오.", "AWS Global Accelerator를 배포합니다. RDS for MySQL 데이터베이스에 대한 다중 AZ 배포를 구성합니다. 읽기 집약적인 작업에는 대기 DB 인스턴스를 사용합니다.", "애플리케이션을 AWS Lambda 함수로 마이그레이션합니다. RDS for MySQL 데이터베이스에 대한 읽기 전용 복제본을 생성합니다. 읽기 집약적인 작업에는 읽기 전용 복제본을 사용하세요."], "answers": [1]}, {"q": "회사는 타사 데이터 공급업체로부터 업데이트를 받으려면 Amazon S3 버킷과 함께 AWS Transfer Family SFTP 지원 서버를 사용해야 합니다. 데이터는 PGP(Pretty Good Privacy) 암호화로 암호화됩니다. 회사는 데이터를 수신한 후 자동으로 데이터의 암호를 해독하는 솔루션이 필요합니다. 솔루션 설계자는 Transfer Family 관리형 워크플로를 사용합니다. 회사는 AWS Secrets Manager 및 S3 버킷에 대한 접근을 허용하는 IAM 정책을 사용하여 IAM 서비스 역할을 생성했습니다. 역할의 신뢰 관계를 통해 전송 amazonaws com 서비스가 기계적 역할을 맡을 수 있습니다. 자동 복호화 솔루션을 완성하려면 솔루션 설계자가 다음에 무엇을 해야 합니까?", "opts": ["Secrets Manager에 PGP 공개 키를 저장합니다. 파일 암호를 해독하려면 Transfer Family 관리 워크플로에 명목상의 단계를 추가하세요. 명목 단계에서 PGP 암호화 매개변수를 구성합니다. 워크플로를 Transfer Family 서버와 연결합니다.", "Secrets Manager에 PGP 개인 키를 저장합니다. 파일 암호를 해독하려면 Transfer Family 관리 워크플로에 예외 처리 단계를 추가하세요. 예외 처리기에서 PGP 암호화 매개변수를 구성합니다. 워크플로를 SFTP 사용자와 연결합니다.", "Secrets Manager에 PGP 개인 키를 저장합니다. 파일 암호를 해독하려면 Transfer Family 관리 워크플로에 명목상의 단계를 추가하세요. 명목 단계에서 PGP 암호 해독 매개변수를 구성합니다. 워크플로를 Transfer Family 서버와 연결합니다.", "Secrets Manager에 PGP 공개 키를 저장합니다. 파일 암호를 해독하려면 Transfer Family 관리 워크플로에 예외 처리 단계를 추가하세요. 예외 처리기에서 PGP 암호 해독 매개변수를 구성합니다. 워크플로를 SFTP 사용자와 연결합니다."], "answers": [2]}, {"q": "한 회사가 대규모 멀티플레이어 게임을 위한 인프라를 AWS로 마이그레이션하고 있습니다. 게임 애플리케이션에는 플레이어가 실시간으로 순위를 확인할 수 있는 리더보드가 있습니다. 순위표에는 마이크로초 읽기 및 한 자릿수 밀리초의 쓰기 지연 시간이 필요합니다. 데이터 세트의 크기는 한 자릿수 테라바이트이며 기본 노드 오류가 발생할 경우 1분 이내에 쓰기를 허용할 수 있어야 합니다. 회사에는 데이터 파이프라인을 통한 추가 분석 처리를 위해 데이터를 유지할 수 있는 솔루션이 필요합니다. 최소한의 운영 오버헤드로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["클러스터 모드가 활성화된 Amazon ElastiCache(Redis OSS) 클러스터를 생성합니다. 애플리케이션이 기본 노드와 상호 작용하도록 구성합니다.", "읽기 복제본이 있는 Amazon RDS 데이터베이스를 생성합니다. 애플리케이션이 쓰기 작업을 쓰기 엔드포인트로, 읽기 작업을 읽기 엔드포인트로 가리키도록 구성합니다.", "Muit-AZ 모드에서 Redis용 Amazon MemoryDB 클러스터를 생성합니다. 기본 노드와 상호 작용하도록 애플리케이션을 구성합니다.", "여러 가용 영역에 분산된 Amazon EC2 인스턴스에 여러 Redis 노드를 생성합니다. Amazon S3에 대한 백업을 구성합니다."], "answers": [2]}, {"q": "한 회사가 AWS 클 azon Route 53 프라이빗 호스팅 영역을 구성합니다."], "answers": [1]}, {"q": "한 회사에서 대기 시간에 민감한 애플리케이션을 개발하고 있습니다. 애플리케이션의 일부에는 가능한 한 빨리 초기화해야 하는 여러 AWS Lambda 함수가 포함되어 있습니다. Lambda 함수는 Java로 작성되었으며 라이브러리를 로드하고, 클래스를 초기화하고, 고유 ID를 생성하기 위한 핸들러 외부의 초기화 코드를 포함합니다. 스타트업 성능 요구 사항을 가장 비용 효율적으로 충족하는 솔루션은 무엇입니까?", "opts": ["모든 초기화 코드를 각 Lambda 함수의 핸들러로 이동합니다. 각 Lambda 함수에 대해 Lambda SnapStart를 활성화합니다. 각 Lambda 함수의 $LATEST 버전을 참조하도록 SnapStart를 구성합니다.", "각 Lambda 함수의 버전을 게시합니다. 각 Lambda 함수에 대한 별칭을 생성합니다. 해당 버전을 가리키도록 각 별칭을 구성합니다. 해당 별칭을 가리키도록 각 Lambda 함수에 대해 프로비저닝된 동시성 구성을 설정합니다.", "각 Lambda 함수의 버전을 게시합니다. 각 Lambda 함수가 해당 버전을 가리키도록 프로비저닝된 동시성 구성을 설정합니다. 게시된 버전의 Lambda 함수에 대해 Lambda SnapStar를 활성화합니다.", "사전 스냅샷 후크를 추가하도록 Lambda 함수를 업데이트합니다. 고유 ID를 생성하는 코드를 핸들러로 이동합니다. 각 Lambda 함수의 버전을 게시합니다. 게시된 버전의 Lambda 함수에 대해 Lambda SnapStart를 활성화합니다."], "answers": [3]}, {"q": "솔루션 아키텍트는 AWS Import/Export의 Amazon EC2 VM Import 기능을 사용하여 온프레미스 환경에서 VM을 가져오고 있습니다. 솔루션 아키텍트는 AMI를 생성하고 해당 AMI를 기반으로 하는 Amazon EC2 인스턴스를 프로비저닝했습니다. EC2 인스턴스는 VPC의 퍼블릭 서브넷 내에서 실행되며 퍼블릭 IP 주소가 할당되어 있습니다. EC2 인스턴스는 AWS Systems Manager 콘솔에 관리형 인스턴스로 표시되지 않습니다. 이 문제를 해결하기 위해 솔루션 설계자는 어떤 단계 조합을 수행해야 합니까? (2개 선택)", "opts": ["Systems Manager 에이전트가 인스턴스에 설치되어 실행 중인지 확인하십시오.", "인스턴스에 시스템 관리자에 대한 적절한 IAM 역할이 할당되었는지 확인합니다.", "VPC에 VPC 엔드포인트가 있는지 확인합니다.", "AWS Application Discovery Agent가 구성되어 있는지 확인합니다.", "Systems Manager에 대한 서비스 연결 역할의 올바른 구성을 확인합니다."], "answers": [0, 1]}, {"q": "회사는 모든 애플리케이션에 대한 배포 도구로 AWS CloudFormation을 사용하고 있습니다. 버전 관리가 활성화된 Amazon S3 버킷 내의 모든 애플리케이션 바이너리와 템플릿을 준비합니다. 개발자는 통합 개발 환경(IDE)을 호스팅하는 Amazon EC2 인스턴스에 액세스할 수 있습니다. 개발자는 Amazon S3에서 EC2 인스턴스로 애플리케이션 바이너리를 다운로드하고 변경한 후 로컬에서 단위 테스트를 실행한 후 S3 버킷에 바이너리를 업로드합니다. 개발자는 AWS CodePipeline을 사용하여 기존 배포 메커니즘을 개선하고 CI/CD를 구현하려고 합니다. 개발자의 요구 사항은 다음과 같습니다. • 소스 제어를 위해 AWS CodeCommit을 사용합니다. • 단위 테스트 및 보안 검색을 자동화합니다. • 단위 테스트가 실패하면 개발자에게 경고합니다. • 애플리케이션 기능을 켜거나 끄고 CI/CD의 일부로 배포를 동적으로 사용자 정의합니다. • 애플리케이션을 배포하기 전에 수석 개발자의 승인을 받으십시오. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["AWS CodeBuild를 사용하여 단위 테스트 및 보안 스캔을 실행하십시오. 단위 테스트가 실패할 경우 Amazon EventBridge 규칙을 사용하여 개발자에게 Amazon SNS 알림을 보냅니다. 다양한 솔루션 기능에 대한 AWS Cloud Development Kit(AWS CDK) 구성을 작성하고 매니페스트 파일을 사용하여 AWS CDK 애플리케이션에서 기능을 켜거나 끌 수 있습니다. 수석 개발자가 애플리케이션을 승인할 수 있도록 파이프라인에서 수동 승인 단계를 사용합니다.", "AWS Lambda를 사용하여 단위 테스트 및 보안 검색을 실행합니다. 단위 테스트가 실패할 경우 파이프라인의 후속 단계에서 Lambda를 사용하여 Amazon SNS 알림을 개발자에게 보냅니다. 다양한 솔루션 기능을 위한 AWS Amplify 플러그인을 작성하고 사용자 프롬프트를 활용하여 기능을 켜거나 끌 수 있습니다. 파이프라인에서 Amazon SES를 사용하면 수석 개발자가 애플리케이션을 승인할 수 있습니다.", "Jenkins를 사용하여 단위 테스트 및 보안 검색을 실행합니다. 파이프라인에서 Amazon EventBridge 규칙을 사용하여 단위 테스트가 실패할 경우 개발자에게 Amazon SES 알림을 보냅니다. 다양한 솔루션 기능 및 매개변수에 대해 AWS CloudFormation 중첩 스택을 사용하여 기능을 켜거나 끕니다. 파이프라인에서 AWS Lambda를 사용하면 수석 개발자가 애플리케이션을 승인할 수 있습니다.", "AWS CodeDeploy를 사용하여 단위 테스트 및 보안 검색을 실행합니다. 단위 테스트가 실패할 경우 파이프라인에서 Amazon CloudWatch 경보를 사용하여 개발자에게 Amazon SNS 알림을 보냅니다. 다양한 솔루션 기능에 Docker 이미지를 사용하고 AWS CLI를 사용하여 기능을 켜거나 끕니다. 수석 개발자가 애플리케이션을 승인할 수 있도록 파이프라인에서 수동 승인 단계를 사용합니다."], "answers": [0]}, {"q": "한 글로벌 전자상거래 회사는 전 세계에 많은 데이터 센터를 보유하고 있습니다. 저장된 데이터가 증가함에 따라 회사는 레거시 온프레미스 파일 애플리케이션에 확장 가능한 스토리지를 제공하는 솔루션을 설정해야 합니다. 회사는 AWS Backup을 사용하여 볼륨의 특정 시점 복사본을 가져올 수 있어야 하며 자주 액세스하는 데이터에 대한 지연 시간이 짧은 액세스를 유지해야 합니다. 또한 회사는 회사의 온프레미스 애플리케이션 서버에서 iSCSI(인터넷 소형 컴퓨터 시스템 인터페이스) 장치로 탑재할 수 있는 스토리지 볼륨을 보유해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["AWS Storage Gateway 테이프 게이트웨이를 프로비저닝합니다. Amazon S3 버킷에 데이터를 저장하도록 테이프 게이트웨이를 구성합니다. AWS Backup을 배포하여 볼륨의 특정 시점 복사본을 만듭니다.", "Amazon FSx 파일 게이트웨이 및 Amazon S3 파일 게이트웨이를 프로비저닝합니다. AWS Backup을 배포하여 데이터의 특정 시점 복사본을 만듭니다.", "캐시 모드에서 AWS Storage Gateway 볼륨 게이트웨이를 프로비저닝합니다. AWS Backup을 사용하여 온프레미스 Storage Gateway 볼륨을 백업합니다.", "캐시 모드에서 AWS Storage Gateway 파일 게이트웨이를 프로비저닝합니다. AWS Backup을 배포하여 볼륨의 특정 시점 복사본을 만듭니다."], "answers": [2]}, {"q": "회사에는 AWS Key Management Service(AWS KMS)를 사용하여 데이터를 암호화하고 해독하는 애플리케이션이 있습니다. 애플리케이션은 AWS 리전의 Amazon S3 버킷에 데이터를 저장합니다. 회사 보안 정책에 따라 데이터가 S3 버킷에 배치되기 전에 데이터를 암호화해야 합니다. 애플리케이션은 S3 버킷에서 파일을 읽을 때 데이터를 해독해야 합니다. 회사는 S3 버킷을 다른 리전에 복제합니다. 솔루션 설계자는 애플리케이션이 여러 지역에서 데이터를 암호화하고 해독할 수 있도록 솔루션을 설계해야 합니다. 애플리케이션은 동일한 키를 사용하여 각 리전의 데이터를 해독해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["KMS 다중 지역 기본 키를 생성합니다. KMS 다중 지역 기본 키를 사용하여 애플리케이션이 실행 중인 각 추가 지역에 KMS 다중 지역 복제 키를 생성합니다. 각 리전의 특정 복제본 키를 사용하도록 애플리케이션 코드를 업데이트합니다.", "애플리케이션이 실행되는 각 추가 리전에서 새로운 고객 관리형 KMS 키를 생성합니다. 각 리전에서 특정 KMS 키를 사용하도록 애플리케이션 코드를 업데이트합니다.", "AWS 사설 인증 기관을 사용하여 기본 리전에 새 인증 기관(CA)을 생성합니다. 애플리케이션의 웹사이트 URL에 대해 CA에서 새 개인 인증서를 발급합니다. AWS Resource Access Manager(AWS RAM)를 사용하여 CA를 추가 리전과 공유합니다. 각 리전에서 공유 CA 인증서를 사용하려면 애플리케이션 코드를 업데이트하세요.", "AWS 시스템 관리자 매개 변수 저장소를 사용하여 애플리케이션이 실행되는 각 추가 지역에 매개 변수를 생성합니다. 기본 리전의 KMS 키에서 키 구성 요소를 내보냅니다. 각 리전의 매개변수에 키 자료를 저장합니다. 각 리전의 매개변수에서 키 데이터를 사용하도록 애플리케이션 코드를 업데이트합니다."], "answers": [0]}, {"q": "한 회사는 ALB(Application Load Balancer) 뒤의 Auto Scaling 그룹에서 여러 Amazon EC2 인스턴스를 사용하는 애플리케이션을 호스팅합니다. EC2 인스턴스를 처음 시작하는 동안 EC2 인스턴스는 사용자 데이터 스크립트를 실행하여 Amazon S3 버킷에서 애플리케이션에 대한 중요한 콘텐츠를 다운로드합니다. EC2 인스턴스가 올바르게 시작됩니다. 그러나 일정 시간이 지나면 다음과 같은 오류 메시지와 함께 EC2 인스턴스가 종료됩니다. \"ELB 시스템 상태 확인 실패에 대한 응답으로 인스턴스가 서비스에서 제외되었습니다.\" 무한 루프의 Auto Scaling 이벤트로 인해 EC2 인스턴스가 계속 시작되고 종료됩니다. 최근 배포에 대한 유일한 변경 사항은 회사가 S3 버킷에 많은 양의 중요한 콘텐츠를 추가했다는 것입니다. 회사는 프로덕션 환경에서 사용자 데이터 스크립트를 변경하고 싶지 않습니다. 프로덕션 환경을 성공적으로 배포하려면 솔루션 아키텍트가 무엇을 해야 합니까?", "opts": ["EC2 인스턴스의 크기를 늘립니다.", "ALB에 대한 상태 확인 제한 시간을 늘립니다.", "ALB에 대한 상태 확인 경로를 변경합니다.", "Auto Scaling 그룹의 상태 확인 유예 기간을 늘립니다."], "answers": [3]}, {"q": "회사는 일부 온프레미스 Oracle 데이터베이스를 AWS로 이전해야 합니다. 회사는 비즈니스 규정 준수를 위해 일부 데이터베이스를 온프레미스에 보관하기로 결정했습니다. 온프레미스 데이터베이스에는 공간 데이터가 포함되어 있으며 유지 관리를 위해 cron 작업을 실행합니다. 회사는 데이터를 외부 테이블로 쿼리하기 위해 AWS에서 직접 온프레미스 시스템에 연결해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["Auto Scaling이 활성화된 Amazon DynamoDB 글로벌 테이블을 생성합니다. AWS Schema Conversion Tool(AWS SCT) 및 AWS Database Migration Service(AWS DMS)를 사용하여 온프레미스에서 DynamoDB로 데이터를 이동합니다. 공간 데이터를 Amazon S3로 이동하는 AWS Lambda 함수를 생성합니다. Amazon Athena를 사용하여 데이터를 쿼리합니다. Amazon EventBridge를 사용하여 DynamoDB에서 유지 관리 작업을 예약합니다. 외부 테이블 지원을 위해 Amazon API Gateway를 사용하십시오.", "Microsoft SQL Server DB 인스턴스용 Amazon RDS를 생성합니다. 기본 복제를 사용하여 온프레미스에서 DB 인스턴스로 데이터를 이동합니다. AWS SCT(AWS Schema Conversion Tool)를 사용하여 복제 후 필요에 따라 SQL Server 스키마를 수정합니다. 공간 데이터를 Amazon Redshift로 이동합니다. 시스템 유지 관리를 위해 저장 프로시저를 사용합니다. 외부 테이블 지원을 위해 온프레미스 Oracle 데이터베이스에 연결하는 AWS Glue 크롤러를 생성합니다.", "Amazon EC2 인스턴스를 시작하여 Oracle 데이터베이스를 호스팅합니다. EC2 인스턴스를 Auto Scaling 그룹에 배치합니다. AWS Application Migration Service를 사용하여 온프레미스에서 EC2 인스턴스로 데이터를 이동하고 실시간 양방향 변경 데이터 캡처(CDC) 동기화를 수행합니다. Oracle 기본 공간 데이터 지원을 사용합니다. AWS Step Functions 워크플로의 일부로 유지 관리 작업을 실행하는 AWS Lambda 함수를 생성합니다. 외부 테이블 지원을 위한 인터넷 게이트웨이를 만듭니다.", "PostgreSQL DB 인스턴스용 Amazon RDS를 생성합니다. AWS Schema Conversion Tool(AWS SCT) 및 AWS Database Migration Service(AWS DMS)를 사용하여 온프레미스에서 DB 인스턴스로 데이터를 이동합니다. PostgreSQL 기본 공간 데이터 지원을 사용합니다. 유지 관리를 위해 DB 인스턴스에서 크론 작업을 실행합니다. 외부 테이블 지원을 위해 AWS Direct Connect를 사용하여 DB 인스턴스를 온프레미스 환경에 연결합니다."], "answers": [3]}, {"q": "Accompany는 Amazon EC2 및 AWS Lambda에서 애플리케이션을 실행합니다. 애플리케이션은 Amazon S3에 임시 데이터를 저장합니다. S3 객체는 24시간 후에 삭제됩니다. 회사는 AWS CloudFormation 스택을 시작하여 애플리케이션의 새 버전을 배포합니다. 스택은 필요한 리소스를 생성합니다. 새 버전을 확인한 후 회사는 이전 스택을 삭제합니다. 최근 이전 개발 스택 삭제에 실패했습니다. 솔루션 설계자는 주요 아키텍처 변경 없이 이 문제를 해결해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["S3 버킷에서 객체를 삭제하는 Lambda 함수를 생성합니다. S3 버킷 리소스를 가리키는 DoesOn 속성을 사용하여 CloudFormation 스택에 Lambda 함수를 사용자 지정 리소스로 추가합니다.", "CloudFormation 스택을 수정하여 값이 삭제된 DeletionPolicy 속성을 S3 버킷에 연결합니다.", "S3 버킷 리소스에 대한 Snapshot 값을 사용하여 DeletionPolicy 속성을 추가하도록 CloudFormation 스택을 업데이트합니다.", "CloudFormation 템플릿을 업데이트하여 Amazon S3 대신 임시 파일을 저장하는 Amazon Elastic File System(Amazon EFS) 파일 시스템을 생성합니다. EFS 파일 시스템과 동일한 VPC에서 실행되도록 Lambda 함수를 구성합니다."], "answers": [0]}, {"q": "회사에는 S3 Standard 스토리지를 사용하는 Amazon S3 버킷에 사용자가 업로드한 비디오를 저장하는 애플리케이션이 있습니다. 사용자는 동영상이 업로드된 후 처음 180일 동안 동영상에 자주 액세스합니다. 180일 이후에는 액세스할 수 없습니다. 지정된 사용자와 익명 사용자가 비디오에 액세스합니다. 대부분의 동영상 크기는 100MB를 넘습니다. 사용자는 동영상을 업로드할 때 인터넷 연결 상태가 좋지 않아 업로드에 실패하는 경우가 많습니다. 회사는 비디오에 멀티파트 업로드를 사용합니다. 솔루션 아키텍트는 애플리케이션의 S3 비용을 최적화해야 합니다. 이러한 요구 사항을 충족하는 작업 조합은 무엇입니까? (2개 선택)", "opts": ["S3 버킷을 요청자 지불 버킷으로 구성하십시오.", "S3 Transfer Acceleration을 사용하여 S3 버킷에 비디오를 업로드합니다.", "S3 수명 주기 구성을 생성합니다. o 시작 후 7일이 지나면 불완전한 멀티파트 업로드가 만료됩니다.", "1일 후에 객체를 S3 Glacier Instant Retrieval로 전환하도록 S3 수명 주기 구성을 생성합니다.", "180일 후에 객체를 S3 Standard-infrequent Access(S3 Standard-IA)로 전환하기 위한 S3 수명 주기 구성을 생성합니다."], "answers": [2, 4]}, {"q": "한 회사가 AWS에서 전자상거래 웹 애플리케이션을 실행하고 있습니다. 웹 애플리케이션은 콘텐츠 전송을 위해 Amazon CloudFront를 사용하여 Amazon S3에서 정적 웹 사이트로 호스팅됩니다. 아마존 API Gateway API는 AWS Lambda 함수를 호출하여 웹 애플리케이션에 대한 사용자 요청 및 주문 처리를 처리합니다. Lambda 함수는 온디맨드 인스턴스를 사용하는 MySQL용 Amazon ROS DB 클러스터에 데이터를 저장합니다. DB 클러스터 사용량은 지난 12개월 동안 일관되게 나타났습니다. 최근 해당 웹사이트에서는 SQL 인젝션과 웹 익스플로잇 시도가 발생했습니다. 또한 고객은 사용량이 가장 많은 기간 동안 주문 처리 시간이 늘어났다고 보고합니다. 이 기간 동안 Lambda 함수는 콜드 스타트되는 경우가 많습니다. 회사가 성장함에 따라 회사는 트래픽이 최고조에 달할 때 확장성과 낮은 지연 시간의 액세스를 보장해야 합니다. 또한 회사는 데이터베이스 비용을 최적화하고 SQL 주입 및 웹 악용 시도에 대한 보호 기능을 추가해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["피크 기간 동안 시간 초과 값을 늘리도록 Lambda 함수를 구성합니다. 데이터베이스에는 RDS 예약 인스턴스를 사용합니다. CloudFront를 사용하고 AWS Shield Advanced를 구독하여 SQL 주입 및 웹 악용 시도로부터 보호하세요.", "Lambda 함수의 메모리를 늘리고 데이터베이스를 Amazon Redshift로 전환합니다. Amazon Inspector를 CloudFront와 통합하여 SQL 삽입 및 웹 악용 시도로부터 보호합니다.", "피크 기간 동안 컴퓨팅을 위해 프로비저닝된 동시성을 갖춘 Lambda 함수를 사용하고 데이터베이스를 위해 Amazon Aurora Serverless로 전환합니다. CloudFront를 사용하고 AWS Shield Advanced를 구독하여 SQL 주입 및 웹 악용 시도로부터 보호하세요.", "피크 기간 동안 컴퓨팅을 위해 프로비저닝된 동시성을 갖춘 Lambda 함수를 사용합니다. 데이터베이스에는 RDS 예약 인스턴스를 사용합니다. AWS WAF를 CloudFront와 통합하여 SQL 삽입 및 웹 악용 시도로부터 보호합니다."], "answers": [3]}, {"q": "회사는 단일 Amazon EC2 인스턴스에서 웹 애플리케이션을 실행합니다. 최종 사용자는 CPU 사용률이 지속적으로 95%를 초과하는 최대 사용 시간 동안 애플리케이션 성능 저하를 경험합니다. 사용자 데이터 스크립트는 EC2 인스턴스에 필수 사용자 지정 패키지를 설치합니다. 인스턴스를 시작하는 프로세스는 몇 분 정도 걸립니다. 회사는 혼합 인스턴스 그룹, 다양한 CPU 및 최대 용량 제한이 있는 Auto Scaling 그룹을 생성하고 있습니다. Auto Scaling 그룹은 다양한 구성 옵션에 시작 템플릿을 사용합니다. 회사는 Auto Scaling 중에 새 인스턴스가 시작될 때 애플리케이션 지연 시간을 줄여야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["예측 확장 정책을 사용하십시오. 인스턴스 유지 관리 정책을 사용하여 사용자 데이터 스크립트를 실행합니다. 기본 인스턴스 준비 시간을 0초로 설정합니다.", "동적 조정 정책을 사용하십시오. 수명 주기 후크를 사용하여 사용자 데이터 스크립트를 실행합니다. 기본 인스턴스 준비 시간을 0초로 설정합니다.", "예측 확장 정책을 사용하십시오. Auto Scaling 그룹에 대해 웜 풀을 활성화합니다. 인스턴스 유지 관리 정책을 사용하여 사용자 데이터 스크립트를 실행합니다.", "동적 조정 정책을 사용하십시오. Auto Scaling 그룹에 대해 웜 풀을 활성화합니다. 수명 주기 후크를 사용하여 사용자 데이터 스크립트를 실행합니다."], "answers": [3]}, {"q": "회사는 온프레미스 데이터베이스를 Amazon RDS로 마이그레이션해야 합니다. 이 회사는 현재 Microsoft SQL Server, MySQL 및 Oracle 데이터베이스를 혼합하여 사용하고 있습니다. 일부 데이터베이스에는 사용자 정의 스키마와 저장 프로시저가 있습니다. 회사는 마이그레이션을 위해 어떤 단계 조합을 취해야 합니까? (2개 선택)", "opts": ["Migration Evaluator Quick Insights를 사용하여 원본 데이터베이스를 분석하고 마이그레이션해야 하는 저장 프로시저를 식별합니다.", "AWS Application Migration Service를 사용하여 소스 데이터베이스를 분석하고 마이그레이션해야 하는 저장 프로시저를 식별합니다.", "AWS SCT(AWS Schema Conversion Tool)를 사용하여 소스 데이터베이스에서 필요한 변경 사항을 분석합니다.", "AWS Database Migration Service(AWS DMS)를 사용하여 소스 데이터베이스를 Amazon RDS로 마이그레이션합니다.", "AWS DataSync를 사용하여 소스 데이터베이스의 데이터를 Amazon RDS로 마이그레이션합니다."], "answers": [2, 3]}, {"q": "한 회사가 블로그 플랫폼을 AWS로 마이그레이션하고 있습니다. 회사의 온프레미스 서버는 AWS Site-to-Site VPN 연결을 통해 AWS에 연결됩니다. 블로그 콘텐츠는 여러 작성자에 의해 하루에 여러 번 업데이트되며 NAS(Network-Attached Storage) 서버의 파일 공유를 통해 제공됩니다. 회사는 콘텐츠 업데이트를 지연하지 않고 블로그 플랫폼을 마이그레이션해야 합니다. 이 회사는 Application Load Balancer 뒤에서 블로그 플랫폼을 실행하기 위해 여러 가용 영역에 Amazon EC2 인스턴스를 배포했습니다. 또한 회사는 가능한 한 빨리 200TB의 보관 데이터를 온프레미스 서버에서 Amazon S3로 이동해야 합니다. 이러한 요구 사항을 충족하는 정류장 조합은 무엇입니까? (2개 선택)", "opts": ["Amazon EventBridge에서 주간 크론 작업을 생성합니다. cron 작업을 사용하여 AWS Lambda 함수를 호출하여 NAS 서버에서 EC2 인스턴스를 업데이트합니다.", "콘텐츠 액세스를 위해 공유할 EC2 인스턴스용 Amazon Elastic Block Store(Amazon EBS) 다중 연결 볼륨을 구성합니다. 매주 EBS 볼륨을 NAS 서버와 동기화하는 코드를 작성합니다.", "Amazon Elastic File System(Amazon EFS) 파일 시스템을 온프레미스 서버에 탑재하여 NAS 서버 역할을 합니다. 블로그 데이터를 EFS 파일 시스템에 복사합니다. 콘텐츠를 제공하기 위해 EFS 파일 시스템을 C2 인스턴스에 마운트합니다.", "AWS Snowball Edge Storage Optimized 디바이스를 주문하십시오. 정적 데이터 아티팩트를 장치에 복사합니다. 디바이스를 AWS로 배송합니다.", "AWS Snowcons SSD 장치를 주문하십시오. 정적 데이터 아티팩트를 장치에 복사합니다. 디바이스를 AWS로 배송합니다."], "answers": [2, 3]}, {"q": "회사는 레거시 온프레미스 애플리케이션을 AWS로 마이그레이션할 계획입니다. 애플리케이션은 PostgreSQL 데이터베이스를 사용하여 Apache Tomcat에서 실행되는 Java 웹 애플리케이션입니다. 회사는 소스 코드에 액세스할 수 없지만 애플리케이션 JAR(Java Archive) 파일을 배포할 수 있습니다. 매달 말에 애플리케이션의 트래픽이 증가했습니다. 최소한의 운영 오버헤드로 이러한 요구 사항을 충족하는 솔루션은 무엇입니까?", "opts": ["여러 가용 영역에서 Amazon EC2 인스턴스를 시작합니다. Amazon Elastic File System(Amazon EFS) 탑재 지점을 사용하여 모든 인스턴스에 Tomcat 및 PostgreSQL을 배포합니다. AWS Step Functions를 사용하여 트래픽 증가에 맞춰 확장할 수 있는 추가 EC2 인스턴스를 배포합니다.", "여러 AWS 지역에 걸쳐 Auto Scaling 그룹에 Amazon Elastic Kubernetes Service(Amazon EKS)를 프로비저닝합니다. 컨테이너 이미지에 Tomcat 및 PostgreSQL을 배포합니다. 증가된 트래픽에 맞춰 확장하려면 Network Load Balancer를 사용하세요.", "Java 애플리케이션을 Python 기반 컨테이너로 리팩터링합니다. 애플리케이션 로직에 AWS Lambda 함수를 사용합니다. Amazon DynamoDB 글로벌 테이블에 애플리케이션 데이터를 저장합니다. AWS Storage Gateway와 Lambda 동시성을 사용하여 트래픽 증가에 맞춰 확장합니다.", "AWS Elastic Beanstalk를 사용하여 여러 가용 영역에서 자동 확장 기능을 갖춘 Tomcat 서버를 배포합니다. PostgreSQL용 Amazon RDS 데이터베이스에 애플리케이션 데이터를 저장합니다. 트래픽 증가에 맞춰 확장하려면 Amazon CloudFront와 Application Load Balancer를 배포하세요."], "answers": [3]}, {"q": "한 회사가 온프레미스 IoT 플랫폼을 AWS로 마이그레이션하고 있습니다. 플랫폼은 다음 구성 요소로 구성됩니다. • 수집 및 처리된 모든 IoT 데이터를 위한 데이터 저장소인 MongoDB 클러스터. • MQTT(Message Queuing Telemetry Transport)를 사용하여 5분마다 IoT 장치에 연결하여 데이터를 수집하는 애플리케이션입니다. • 정기적으로 작업을 실행하여 IoT 데이터로부터 보고서를 생성하는 애플리케이션입니다. 작업 실행을 완료하는 데 120~600초가 걸립니다. • 웹 서버에서 실행되는 웹 애플리케이션. 최종 사용자는 웹 애플리케이션을 사용하여 일반 대중이 액세스할 수 있는 보고서를 생성합니다. 회사는 성능을 유지하면서 운영 오버헤드를 줄이기 위해 플랫폼을 AWS로 마이그레이션해야 합니다. 최소한의 운영 오버헤드로 이러한 요구 사항을 충족하는 단계 조합은 무엇입니까? (3개 선택)", "opts": ["AUS Lambda 작업으로 AWS Step Functions 상태 머신을 생성하여 보고서를 준비하고 Amazon S3에 보고서를 작성합니다. 보고서를 제공하기 위해 S3 오리진이 있는 Amazon CloudFront 배포를 구성합니다.", "AWS Lambda 함수를 생성합니다. IoT 장치에 연결하도록 Lambda 함수를 프로그래밍합니다. 데이터를 처리하고 데이터 저장소에 데이터를 씁니다. 처리를 위해 메시지를 임시로 저장하도록 Lambda 계층을 구성합니다.", "보고서를 준비하기 위해 Amazon EC2 인스턴스로 Amazon Elastic Kubernetes Service(Amazon EKS) 클러스터를 구성합니다. 보고서를 제공하기 위해 EKS 클러스터에 수신 컨트롤러를 만듭니다.", "IoT 장치를 AWS IoT Core에 연결하여 메시지를 게시합니다. 메시지가 수신되면 실행되는 AWS IoT 규칙을 생성합니다. AWS Lambda 함수를 호출하도록 규칙을 구성합니다. 디바이스 메시지 데이터를 구문 분석, 변환 및 데이터 스토어에 저장하도록 Lambda 함수를 프로그래밍합니다.", "MongoDB 클러스터를 Amazon DocumentDB(MongoDB 호환 가능)로 마이그레이션합니다.", "MongoDB 클러스터를 Amazon EC2 인스턴스로 마이그레이션합니다."], "answers": [0, 3, 4]}, {"q": "회사에서는 Amazon API Gateway API를 생성하고 해당 API를 외부 개발 팀과 공유합니다. API는 AWS Lambda 함수를 사용하며 Production이라는 단계에 배포됩니다. 외부 개발팀은 API의 유일한 소비자입니다. API는 특정 시점에 사용량이 갑자기 증가하여 비용 증가에 대한 우려를 낳습니다. 회사는 Lambda 기능을 재작업하지 않고도 비용과 사용량을 제한해야 합니다. 이러한 요구 사항을 가장 비용 효율적으로 충족하는 솔루션은 무엇입니까?", "opts": ["Lambda 함수에 직접 요청하는 대신 Amazon Simple Queue Service(Amazon SQS) 대기열로 요청을 보내도록 API를 구성합니다. 대기열의 메시지를 사용하고 요청을 처리하도록 Lambda 함수를 업데이트합니다. 새 메시지가 도착할 때 Lambda 함수를 호출하도록 대기열을 설정합니다.", "각 Lambda 함수에 대해 프로비저닝된 동시성을 구성합니다. AWS Application Auto Scaling을 사용하여 Lambda 함수를 대상으로 등록합니다. API 사용량의 변화에 ​​맞춰 용량을 늘리거나 줄이는 확장 일정을 설정합니다.", "API Gateway API 키와 AWS WAF 지역 웹 ACL을 생성합니다. 웹 ACL을 프로덕션 단계와 연결합니다. 웹 ACL에 비율 기반 규칙을 추가합니다. 규칙에서 X-API-Key 헤더를 사용하는 비율 제한과 사용자 지정 요청 집계를 지정합니다. API 키를 외부 개발팀과 공유하세요.", "API Gateway API Key 및 사용 계획을 수립합니다. 사용량 계획에서 제한 및 할당량을 정의합니다. 사용량 계획을 프로덕션 단계 및 API 키와 연결합니다. API 키를 외부 개발팀과 공유하세요."], "answers": [3]}, {"q": "엔터테인먼트 회사는 Auto Scaling 그룹에 속한 Linux Amazon EC2 인스턴스 집합에서 티켓팅 서비스를 호스팅합니다. 티켓팅 서비스는 가격 파일을 사용합니다. 가격 파일은 S3 Standard 스토리지가 있는 Amazon S3 버킷에 저장됩니다. 제3자가 호스팅하는 중앙 가격 책정 솔루션이 가격 파일을 업데이트합니다. 가격 파일은 1~15분마다 업데이트되며 수천 개의 항목이 있습니다. 가격 파일은 인스턴스가 시작될 때 각 EC2 인스턴스에 다운로드됩니다. EC2 인스턴스는 때때로 고객에게 잘못된 요금을 부과할 수 있는 오래된 가격 정보를 사용합니다. 이 문제를 가장 비용 효율적으로 해결할 수 있는 솔루션은 무엇입니까?", "opts": ["가격 파일이 업데이트될 때마다 Amazon DynamoDB 테이블을 새로운 가격으로 업데이트하는 AWS Lambda 함수를 생성하십시오. 가격을 조회하기 위해 DynamoDB를 사용하도록 티켓팅 서비스 업데이트", "파일이 업데이트될 때마다 Amazon Elastic File System(Amazon EFS) 파일 공유를 가격 파일로 업데이트하는 AWS Lambda 함수를 생성합니다. Amazon EFS를 사용하여 가격 파일에 액세스하도록 티켓팅 서비스를 업데이트합니다.", "Amazon S3용 탑재 지점을 EC2 인스턴스의 AMI에 로드합니다. 가격 파일이 포함된 S3 버킷을 탑재하도록 Amazon S3용 탑재 지점을 구성합니다. $3 객체에 액세스하기 위한 마운트 지점과 경로를 가리키도록 티켓팅 서비스를 업데이트합니다.", "Amazon Elastic Block Store(Amazon EBS) 볼륨을 생성합니다. EBS 다중 연결을 사용하여 모든 EC2 인스턴스에 볼륨을 연결합니다. 새 EC2 인스턴스가 시작되면 EBS 볼륨의 가격 파일을 업데이트하도록 새 인스턴스를 구성합니다. 새로운 로컬 소스를 가리키도록 티켓팅 서비스를 업데이트하세요."], "answers": [2]}, {"q": "회사에 Auto Scaling 그룹의 Amazon EC2 인스턴스를 사용하는 애플리케이션이 있습니다. 품질 보증(QA) 부서는 애플리케이션을 테스트하기 위해 다수의 단기 환경을 시작해야 합니다. 애플리케이션 환경은 현재 AWS CloudFormation 템플릿을 사용하여 부서 관리자가 시작합니다. 스택을 시작하기 위해 관리자는 CloudFormation, EC2 및 Auto Scaling API를 사용할 수 있는 권한이 있는 역할을 사용합니다. 관리자는 테스터가 자신의 환경을 시작할 수 있도록 허용하고 싶지만 각 사용자에게 광범위한 권한을 부여하고 싶지 않습니다. 이러한 목표를 달성할 수 있는 설정은 무엇입니까?", "opts": ["AWS CloudFormation 템플릿을 Amazon S3에 업로드합니다. QA 부서의 사용자에게 관리자 역할을 맡을 수 있는 권한을 부여하고 템플릿과 템플릿이 생성하는 리소스에 대한 권한을 제한하는 정책을 추가합니다. CloudFormation 콘솔에서 템플릿을 시작하도록 사용자를 교육합니다.", "환경 템플릿에서 AWS Service Catalog 제품을 생성합니다. 기존 역할이 있는 제품에 실행 제약 조건을 추가합니다. QA 부서의 사용자에게 AWS Service Catalog API만 사용할 수 있는 권한을 부여합니다. AWS Service Catalog 콘솔에서 템플릿을 시작하도록 사용자를 교육합니다.", "AWS CloudFormation 템플릿을 Amazon S3에 업로드합니다. 템플릿과 템플릿이 생성하는 리소스에 대한 권한을 제한하는 조건으로 QA 부서의 사용자에게 CloudFormation 및 S3 API를 사용할 수 있는 권한을 부여합니다. CloudFormation 콘솔에서 템플릿을 시작하도록 사용자를 교육합니다.", "환경 템플릿에서 AWS Elastic Beanstalk 애플리케이션을 생성합니다. QA 부서의 사용자에게 Elastic Beanstalk 권한만 사용할 수 있는 권한을 부여하세요. Elastic Beanstalk CLI를 사용하여 Elastic Beanstalk 환경을 시작하도록 사용자를 교육하고 기존 역할을 서비스 역할로 환경에 전달합니다."], "answers": [1]}, {"q": "회사는 전자상거래 웹사이트에 단일 AWS 리전을 사용하고 있습니다. 웹 사이트에는 ALB(Application Load Balancer) 뒤에 있는 여러 Amazon EC2 인스턴스에서 실행되는 웹 애플리케이션이 포함되어 있습니다. 웹사이트에는 Amazon DynamoDB 테이블도 포함되어 있습니다. Amazon Route 53의 사용자 지정 도메인 이름은 ALB에 연결됩니다. 회사는 AWS Certificate Manager(ACM)에서 SSL/TLS 인증서를 생성하고 해당 인증서를 ALB에 연결했습니다. 회사는 설계의 일부로 콘텐츠 전달 네트워크를 사용하지 않습니다. 회사는 재해 복구를 제공하고 향후 성장을 계획하며 사용자에게 향상된 액세스 시간을 제공하기 위해 전체 애플리케이션 스택을 두 번째 지역에 복제하려고 합니다. 솔루션 설계자는 이러한 목표를 달성하고 관리 오버헤드를 최소화하는 솔루션을 구현해야 합니다. 솔루션 설계자는 이러한 요구 사항을 충족하기 위해 어떤 단계 조합을 수행해야 합니까? (3개 선택)", "opts": ["현재 인프라 설계를 위한 AWS CloudFormation 템플릿을 생성합니다. 지역을 포함한 중요한 시스템 값에 매개변수를 사용합니다. CloudFormation 템플릿을 사용하여 두 번째 지역에 새 인프라를 생성합니다.", "AWS Management Console을 사용하여 첫 번째 지역의 기존 인프라 설계를 문서화하고 두 번째 지역에 새 인프라를 생성합니다.", "가중치 기반 라우팅을 사용하도록 애플리케이션에 대한 Route 53 호스팅 영역 레코드를 업데이트합니다. 트래픽의 50%를 각 지역의 ALB로 보냅니다.", "애플리케이션이 지연 시간 기반 라우팅을 사용하도록 Route 53 호스팅 영역 레코드를 업데이트합니다. 각 지역의 ALB로 트래픽을 보냅니다.", "DynamoDB 스트림을 활성화하여 기존 DynamoDB 테이블의 구성을 업데이트합니다. 두 번째 리전을 추가하여 글로벌 테이블을 생성합니다.", "새 DynamoDB 테이블을 생성합니다. 새 테이블에 대해 DynamoDB 스트림을 활성화합니다. 두 번째 리전을 추가하여 글로벌 테이블을 생성합니다. 일회성 작업으로 기존 DynamoDB 테이블의 데이터를 새 테이블에 복사합니다."], "answers": [0, 3, 4]}, {"q": "한 회사는 데이터 과학자가 업무 관련 문서를 저장할 수 있도록 단일 Amazon S3 버킷을 생성하려고 합니다. 회사는 AWS IAM Identity Center를 사용하여 모든 사용자를 인증합니다. 데이터 과학자를 위한 그룹이 만들어졌습니다. 회사는 데이터 과학자에게 자신의 작업에만 액세스할 수 있는 권한을 부여하려고 합니다. 또한 회사는 각 사용자가 어떤 문서에 액세스했는지 보여주는 월별 보고서를 생성하려고 합니다. 이러한 요구 사항을 충족하는 단계 조합은 무엇입니까? (2개 선택)", "opts": ["데이터 과학자에게 사용자 이름 태그와 일치하는 S3 버킷 접두사에 대한 액세스 권한을 부여하는 사용자 지정 IAM ID 센터 권한 세트를 생성합니다. 정책을 사용하여 ${aws:PrincipalTag/userName}/* 조건이 있는 경로에 대한 액세스를 제한합니다.", "Amazon S3 읽기 액세스 및 쓰기 액세스 권한이 있는 데이터 과학자 그룹에 대한 IAM 자격 증명 센터 역할을 생성합니다. IAM 자격 증명 센터 역할에 대한 액세스를 허용하는 S3 버킷 정책을 추가합니다.", "S3 데이터 이벤트를 기록하고 로그를 S3 버킷에 전달하도록 AWS CloudTrail을 구성합니다. Amazon Athena를 사용하여 Amazon S3의 CloudTrail 로그에 대한 쿼리를 실행하고 보고서를 생성합니다.", "S3 관리 이벤트를 CloudWatch에 기록하도록 AWS CloudTrail을 구성합니다. Amazon Athena의 CloudWatch 커넥터를 사용하여 로그를 쿼리하고 보고서를 생성합니다.", "EMRFS(EMR 파일 시스템)에 대한 S3 액세스 로깅을 활성화합니다. Amazon S3 Select를 사용하여 로그를 쿼리하고 보고서를 생성합니다."], "answers": [0, 2]}, {"q": "한 회사가 Amazon EC2 인스턴스에서 데이터 처리 애플리케이션을 호스팅합니다. 애플리케이션은 새로 업로드된 파일에 대해 Amazon Elastic File System(Amazon EFS) 파일 시스템을 폴링합니다. 새 파일이 감지되면 애플리케이션은 파일에서 데이터를 추출하고 논리를 실행하여 파일을 처리할 Docker 컨테이너 이미지를 선택합니다. 애플리케이션은 적절한 컨테이너 이미지를 시작하고 파일 위치를 매개변수로 전달합니다. 컨테이너가 수행하는 데이터 처리에는 최대 2시간이 걸릴 수 있습니다. 처리가 완료되면 컨테이너 내부에서 실행되는 코드가 파일을 Amazon EFS에 다시 쓰고 종료됩니다. 회사는 컨테이너를 실행하는 EC2 인스턴스를 제거하기 위해 애플리케이션을 리팩터링해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "opts": ["Amazon Elastic Container Service(Amazon ECS) 클러스터를 생성합니다. AWS Fargate 작업으로 실행되도록 처리를 구성합니다. 적절한 Fargate 작업을 시작하는 Amazon EventBridge 규칙으로 실행할 컨테이너 선택 로직을 추출합니다. EFS 파일 시스템에 파일이 추가될 때 실행되도록 EventBridge 규칙을 구성합니다.", "Amazon Elastic Container Service(Amazon ECS) 클러스터를 생성합니다. AWS Fargate 작업으로 실행되도록 처리를 구성합니다. 적절한 Fargate 작업을 시작하는 Fargate 서비스로 실행되도록 컨테이
